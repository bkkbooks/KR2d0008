body:
  text: 路史卷二十九宋羅泌撰國名紀六古國饒嵬姓今深州有饒河齊大夫采邑趙孝城拔之以封弟長安君攘嵬姓宜即穰穰侯國秦封魏冉今鄧之穰縣利嵬姓潛夫云嵬姓饒利一作剎雲陽今茶陵西南十里有雲陽山少昊亦居之又在甘泉亦曰雲陽山在馮翊雲陽縣今𨽻耀非丹徒蜀今成都見揚子雲蜀紀等然蜀山氏女乃在茂詳後妃后國蠶蠶叢氏國今彭之𨗳江有蠶崖而漢之蠶陵縣在翼之翼水縣西有蠶陵山瞿今雙流縣南十八里有瞿上城益之西南二十縣北有瞿上鄉𨗳江魚鳬治今眉之彭山縣北東二里有魚鳬津南北八郡志云犍為有魚鳬津廣數百步􅀈杜宇治􅀈韋婁石樓也開山圖云石樓山在琅邪昔有巢氏治此在城陽縣東北有婁鄉是然去琅邪逺矣今隰有隨石樓縣隨本曰土京東南六十有石樓山水經注蒲水出石樓下是也庸城許所遷定四年楚城今嶽之華容垂拱二以武氏諱與雄之容成皆改增土天寶復舊陽武柏柏皇後黃帝臣柏髙春秋之柏子國楚滅之今蔡之西平有柏亭寰宇九域云古柏國大庭魯地昭五年傳有大庭氏之庫輿地廣記云在仙源今𨽻兖東里東里子諸侯也栗陸臣夏后臣有東里槐祝宗祝融氏後祝丘祝融氏後祝丘氏今沂之臨沂東南五十有即丘城春秋之祝丘也桓五年城祝丘鄭樵云漢即丘縣彌在益部詳紀中朱襄九域志云南京柘城古朱襄氏之邑右上古帝王之世子曰道千乘之國敬事而信節用而愛人使民以時學之為王者事其此已矣千乘諸侯之謂也而其所謂道道此而已敬者所以重事也信者所以立政也節用所以冨國愛人所以固本而使民以時者所以興財也五者治天下之常經而聖人之所以道有國者唯有國者從而道之則君安而國家可保矣是故道之以敬而民莫不承聽道之以信而民莫不承任道之以節用而財不匱道之以愛人而民不失於生使之以時則穀不可勝食財不可勝用而道之之道畢矣經曰在上不驕髙而不危制節謹度滿而不溢髙而不危所以長守貴也滿而不溢所以長守富也冨貴不離其身然後能保其社稷而和其民人蓋諸侯之孝也夫不驕則敬事矣謹度則信行矣制節則謹用而不溢則愛民矣和其民人則又時使之矣固諸侯之事也故曰古之亡國皆以無道記曰國家未道此撢人所以道國之政事者也上失其道則其散亦久矣而顧可國乎詩云逮天之未隂雨徹彼桑土綢繆牖戶今此下民或敢侮豫孔子曰為此詩者其知道乎能治其國家誰敢侮之乃若夫子之得邦家所謂立之斯立道之斯行固不外乎此也夫夫子顧未始得邦家也而曰得邦家者上之所以道其君而下之所以道其民者固所以行之天下而得邦家也湯於亳文王之于岐因此道爾故以亳之政道之天下則商之王矣以岐之政道之天下則周之王矣夫子之得邦家特亦不過推中都之政道之天下而已矣吾固曰敬事而信節用而愛人使民以時此治天下之常經而聖人所以道有國者也故曰泉有源治有本道者審本而已齊一變至於魯魯一變至於道豈惟千乘之國哉三皇之世苑即鬱鬱華國金金提國帝堯時有金道華種蘭唐韻云周附庸金州也金氏出此唐新羅金姓漢金日磾因祠金人為姓非也紀紀侗國後有紀后為虞帝師陽陽侯伏羲臣許慎云陵陽國侯也國近江今宣之涇縣有陵陽山蹇蹇修國後有蹇氏寋氏秦有蹇叔姓書云因邑又有寋氏姓解音愆四者太昊臣共工地在𢎞農虞帝時共工或云居此赤赤奮赤松炎帝諸侯後有赤氏赤民髙陽師􅀈􅀈夭國􅀈州巨鹿郡巫巫咸國故巫縣今夔之巫山漢巫咸隋曰巫山淮南子云巫咸在軒丘北經在女五北今巫咸山在陜之夏縣屏屏封屏翳國白白阜國六者炎帝臣胡炎陵廟胡真官者同遷侍臣也按媯歸後皆有胡然按世本胡曹作衣當不在五帝後考工妢胡之笴云胡子國在楚補炎帝伐補遂史伯云塢蔽丹是也姓苑有補氏通典作輔遂非遂炎帝伐之吕春秋易之遂城古遂武也媯姬皆有遂質沙帝魁所伐世本之夙沙也後有夙氏夙沙氏宿沙氏齊夙沙衛鼓子相夙沙釐吳炎臣吳權黃帝母吳樞國紂時亦有吳伯今陜之平陸有吳山廣夀廣成仙傳云廣成居空同今汝之梁縣西南四十有空同山廣成城廣成澤廣成子廟宣和中守林時奏其事立觀其澤漢安以賜貧民有廣氏風俗通刁音雕道書多作刁仁廟編隂陽書猶有刁牧地戶開歷世盡作力白虎通云黃帝師力牧朝錯云帝得力牧而為五帝先姓書後有力氏未究伍仵也伍胥黃帝臣見玄女兵法今慈之仵城鄧黃臣鄧伯溫魯地隱十年齊魯盟處與南陽子姓鄧二寧杜云汲郡修武今衛之獲嘉有寧城故修武也詩外傳武王伐紂勒兵於寧改曰修武魏土地記大寧城西二十里有小寧城今在懷戎容成侯國漢縣𨽻涿本蜀易今𨽻雄州燕之西境徐廬國也漢丐奴降王封有容氏姓纂容成氏仙傳容成公恆恆先國常也一作常先衛康叔孫封之世本云後有常氏恆氏老師常從楚有恆思公宜為恆山亦作常鵊鵊治黃帝臣乃俠也漢俠侯國有俠氏窺窺紀黃帝臣方方回國帝堯時有方明習風俗通云習國名傳有少習哀四年預云商洛武關按此晉禦楚之塞在商洛東南九十今永興軍漢有習響陳相離涓涓子黃帝師臣岐即岐豐至商文王為岐侯詳髙辛後國靁靁伯國漢有靁侯屬東海鬼容區國商有鬼侯即九侯今漳浦有鬼侯山亦曰九侯山俗云山魈之居圖經容區謂少康九子之居皆妄霍山後漢朱㻛九江夀春記金明城西南百二十有黃帝時霍丘城楚莊廢為戌寰宇記廢霍丘在霍山庸庸光侯國詳商世侯國奢奢比國車車區國泠泠倫國衛之泠邑近魯作冷非冕宛也宛侯即冕侯寃朐是今曹之宛句云古寃濮須句之間俞鄃也俞跗國今大名夏津西南五十有鄃故城後魏漢清河之鄃縣田蚡邑音輸德州平原西南吕他為俞侯國有俞氏喻氏漢有俞達敕救切盧俞跗或作盧跗今鄆之陽榖有故盧城齊地久廢後扁鵲居之桐仙傳桐君世族譜云楚東小國文二年桐叛楚地名九域志云小國楚附庸定二年楚滅之今舒之桐城圖經云春秋時桐國蓋桐邑也漢之樅陽昭五年吳敗楚鵲岸注桐國離尾渚西南有桐亭廬州舒城西南有漢桐鄉朱邑所􅌾榮榮援國周之采地或云滎鄭地宣十二乃滎陽滎澤然閔二年戰滎澤衛地也橋姓辨書云黃帝子孫守橋山者或云喬非沮沮誦音菹黃帝史後有沮氏共茄黃帝㓝茄豐玄中記楚地昔楚城州屈以復茄人城丘皇以遷訾者使熊相謀郭巢季然郭卷子太叔聞之曰楚王將死矣使民不安其土云云昭二十五記音加張揖以為荷雍郡國志許州雍城黃帝雍又為杵臼處或作羅非於於則作履者今鄧之內鄉東七里有於村㓝州圖副與商近所謂商於説者以商於為一國失之裴云商於在順陽南鄉丹水二縣有商城在於中所謂商於劉氏云商於二國相去二百里傳言商於析酈四邑近南陽有於氏袁紹傳有於授左左徹後有左氏今聞喜漢之左邑有北帝戮蚩尤遷其民善者于鄒屠惡者于有北詩云投畀有北惡可知矣右三皇時侯伯之國萬盈數也易之比曰先王以建萬國堯協萬邦以其號數之多也而塗山之會贄玉帛且萬數則古嘗萬國矣粵自黃帝畫野分壇方割萬里得百里之國萬區而劉恕遽摘其非謂百里者萬非方十萬里有不能容是殆尺分之也尺以一直為十寸國界之分直依枰罫枰罫之勢百里者萬特方一萬里爾是故方十里者為方一里者百方百里者為方十里者百方千里者為方百里者百方萬里者為方千里者百方百里者萬矣枰一十九路方為三百六十一路雖然虞夏之前四正疆理東止郎邪之海西積石之河五千而縮南至衡山北洎單于府五千而贏使皆封建百里之國惟堪二千五百縱並遼東勃海長城外盡契丹髙句驪積石塞黑水靺鞨流沙之地亦不能五千國况古百里當今百二十一里六十步烏得所謂萬區百里國哉蓋古嘗有萬國之制而非皆百里也故吕覽言神農封建彌近彌大彌逺彌小海上乃有十里之邦以大運小要如臂使指者而孔子亦曰安見方六七十如五六十而非邦者是衰周時列國雖足強大猶有不五十者然則古之萬國從可知矣執玉者不皆百里則執帛者安能皆五十哉伯七十里則百里可二子男五十則百里可四矣孟子曰海內之地方千里者九古之天下方三千里止矣五千里者古今盛衰山川萊藪之通數也周世九服號七千里而職方藩畿為方萬里斯亦末記之敝王畿所止亦曷嘗千里哉宗周八百成周六百此以百同度計言之故子思曰天子封畿千里公侯百里伯七十里子男五十里虞夏商周之常制也畿門域也非所謂王圻者也周官班固蓋因玄鳥之詩而失之不知玄鳥所云正以謂門畿內而其所謂千里者特徑度三十一里半而強耳公侯之畿徑度十里伯畿八里半而弱子男七里而強又奚以宗周八八成周六六而合於百里者百哉九州之分如此古者九州特亦以概率者王制之言四海之內斷長補短方三千里此概率約也五服之制王城之外甸侯綏服面千五百已盡九州三千里地要荒二服綴九州外其數然也而况九州面距不齊自恆山距南河東河抵西河為各千里此則圻內甸服所建然自東河至東海西河至流沙南河至江亦各千里南西二方侯綏所建外為要荒可矣而東距海要荒已無容繫北距恆山已接邊陲雖侯綏有不得而立惟南自江至於衡山更越千里則要荒二服亦並在九州內而自衡山南盡揚域且復千里未汔南海悉為荒外南為太贏北為太朒則知先王之制必有圓法豈至説者之拘哉九州之界濟河淮岱相去不能千里荆河千里而贏海岱千里而縮荆山衡陽二千而遙東海西河二千而近而夀春之淮朝陽之海相去五六千里龍門之河屯蝗之黑相距且四千里華陽黑水窮數千里猶未知其所終荆河淮濟之間斷長補短不能淮海一州之半則知所制各有當矣周之西都今之關中而東都則洛陽也二都地踞南山之隂北山之陽東西長南北短短長相補猶不能以千里今古不變而禮王畿四方相距為方千里逺郊近郊甸地稍地小都大都率相距為百里豈千里之方所能容哉固知畿服諸説有匪圓通上世必有除補相乘之道為疆理之定制者方隨盛時東南並海西且未北五原東西九千三百南北萬四千八百一十五唐文皇時東極洋海而抵焉耆九千五百一十南盡林州北延陀萬六千九百一十八兹亦人迹逐曲所計而步畿之法取之虗空鳥道揆以日景而參之乎圭表其於人迹迂直大約三而去三萬五千之折正亦五千而已王制之言惟其大約也五帝之世玄都少昊時諸侯外傳云玄都氏黎國或謂重黎非也周書云昔玄都氏謀臣不用龜策是從忠臣無祿神巫用國而亡洪芻志都夫人按風俗通出古元都玄都氏避聖祖諱為元氏都氏渌髙陽師渌國或作渌圖今湘東澧陵有淥水或作瀌非鱣鱣先國宜為澶古之得姓俱自其封國而命其以字者蓋鮮蹇修鵊治之類亦必其封國也爽鳩齊地昭十二今之青州季萴繼之晏子之説杜云虞夏諸侯有爽氏姓苑爽鳩氏姓纂且鳩後有且氏祝融儈是今鄭州有祝融冡與祝融氏異咸髙辛臣咸黑宜是咸陽有咸水柞柞卜邑展展上公帝嚳時得道者隂唐虞時國商世隂君長生之祖故長生詩云惟豫之先佐命唐虞周有隂忌今濠之定逺有隂陵城項羽失道處管叔後采于隂則今襄之榖城東北有隂城是故鄼地師古云古隂國又有下隂在隂城之西隂後遷此左白今化光乾德漢隂縣隨隂城春秋時道柏巢吕申息房應胡隂桐與楚比者務一作瞀帝堯時務成商有務光諸侯也後有務氏一作牟或云即牟見後庾帝堯時侯國春秋時有庾子皮皮子過邑於維氏為庾氏庾公差姓書以為帝堯時掌庾大夫之後殳殳戕國齊地一曰冒澤即朱故亦作朱戕有殳氏朱朱虎國虢之朱陽嚴許繇之友嚴憘按樗里子傳嚴君之封在嚴道樊帝堯時有樊仲文今武昌有樊山放放齊後有放氏被齧缺師被衣被陽也今淄之髙苑西南八十步有漢被陽侯國故城音皮齧春秋時有齧桑衛地狐狐攻定六年狐人周地僖十六有狐厨今晉治臨汾西北有狐谷亭繇余鴻蒙育唐帝堯夏桀皆嘗伐之南陽章陵之上唐鄉也班固云古國括地象唐鄉故地在隨州西夏今鄂故大夏有夏水漢水也漢水之曲為夏口今屬漢陽江夏記沈尹射奔命于夏納者周書云西夏仁而去兵城郭不修武士無位堯伐亡之叢帝堯欲伐叢枝胥敖四國也或云兩國枝春秋傳戎伐楚侵訾枝訾枝楚地胥胥臣胥氏之先一作須舊春秋圖有湑與檜接在虢密之間敖滎澤西有敖山有敖倉城在滎澤西十五秦置在敖山下舜曰夫三子者是宗膾為三胥敖為一也宗帝堯欲伐宗膾者按漢一曰宗昔文十二年子孔執宗子遂圍巢則在廬江預云宗巢二國羣舒之屬膾當即會會人鄶也在河南密縣微道齊桓之伯江黃道柏附之四國皆弦姻邵云安陽縣道國也杜云汝南安陽西有道亭楚靈遷之今蔡之確山西南有道故城後有道氏楚有道翔闕三國皆帝堯時婁九江夀春記金明城西南百二十有雩婁城堯之婁子城也寰宇記雩婁城在霍丘臨帝堯時有臨侯望博見春秋運斗樞注臨侯國氏今趙之臨城漢故縣雄雄陶或為熊夏有熊髠東東不訛國或作陳非南南郡夏禹西省南西西縣和仲宅西北有北東固為東國也秦秦不宇魯地臺於秦者在濮之苑北莊三十一年杜云東平范縣東有秦亭九域志云西北今𨽻鄆紀虞帝師紀后一作冀后蒲長垣東北十里有蒲城詳有虞後國春秋有蒲侯氏莒地襄三十三年單善帝舜師單卷今鄆城有單父城即善卷也傳言堯師善卷或吳之善道也襄五年今旴台阮勝之南徐記春秋時善道也歸夔之封一曰夔杜甫所謂夔子國者後有慿氏詳髙陽後國胡歸姓世本左傳皆云胡子國歸姓歸姓夔出有歸姓王符云歸姓胡有何有有子也有九委音故本一作洧宛地今開封扶溝有洧水有曲洧城何歸姓虞帝末何侯得道於九疑今道之寧逺廣濟鄉有何亭墟然伯陵同何女緣婦則何姓黃帝時已見若僧伽何國人則非此泗州僧伽傳云僧伽何國人世謂不知為何國人按西域有何國見隨書歡濟之乘丘有歡亭或云歡兜國今濟治巨野齊人歸歡預云濟北蛇丘西有下歡亭説文作酄中容山海經中容之國舜之所生或云即諸馮穆天子傳有容氏國或是右五帝時侯伯國其有先代後者見逐姓下泌嘗謂古之法皆可行于今學者得無笑之封建民兵井田肉刑豈惟可行於古固可行之今非惟可行之今亦可行於後惟通變而已矣易曰通其變使民不倦通變天下無敝法矣唯古與今同此之天均此之地又等生乎此人日月八百率十里為湯沭於王城何得此八千里况以商三千率三十里於泰山之傍乎商之三千使率依男為附庸三猶應附九千國况以夏萬國率九率十於侯伯之邦乎是備湯沭者固有數而無附之國滔滔是也町原防井衍沃則衍沃者以井而原防固以町是井田不可概施髙庳之區矣戮防風流共工則宜戮者戮宜流者流是肉刑不得專用於三五之時矣是故外諸侯嗣有所不必嗣內諸侯祿有所謂嗣先聖之法要必如是而後可以行之萬世而無敝專用者固無時可時而措之何時而不可哉可井而井可町而町何厭乎今田之井可流而流可戮而戮何患乎今刑之肉而益削之法堯舜之道蓋亦設法而時措之者天下之大萬國之多惡者何勝削而善亦何勝益哉諸侯之疆有定域也今日之益曰取之間田明日之益地於何取東西有間田南北當益地將越數百千里而取之乎抑乞之其鄰乎徒取諸彼以與此然且仁者不為今日削十數明日削數十果先王之意邪吾固曰此先王之法設而時措之者也且湯伯也文王伯也湯以七十里而文王以百里自稷契始也自契至湯自稷至於文王如是久矣非無賢德也而地不加舊是則無益地也然則禮記白虎之義其亦繆而不足徵歟錫之山川土田附庸錫魯公也錫山土田于周受命錫召虎也無益地哉蓋昔先王三嵗而一修封必其俊異之功殊偉之德乃於千百輩中陟其尤者一二而稍益之故善者以勸必其敗羣之憝違命之最乃于千百輩中絀其一二尤者而稍削之故不善以沮時而措之是所謂益削也魯公召虎見之歌頌惟其希濶而不可易得也乘馬之法凡立國都非于大山之下則必廣川之上髙無近旱而水用足下無近水而溝防省因天之材就地之利是故城郭不必用規矩道路不必用繩準又孰有城畿國服開方引直而可為者益削之法豈一概之施哉夏世侯伯西王夏后師西王慖童童律一作僮即􅥧也故下邳􅥧縣後有童􅥧􅥧氏姓纂出老童非狂夏后臣章律狂章按經有狂水徑綸氏城在今陽城有狂氏宋大夫狂校繇余錢記作由朝氏今𢎞農有地名朝一作郖斫盧氏今之盧氏縣有盧氏山章商氏犂婁氏鴻蒙氏右五神夏后所囚者烏烏陀陶臣或云烏陀猶鴻蒙又烏木田太康地志梁國烏縣今國孰西南二十烏城郭郭哀夏后御博之聊城有郭水出東南郭商有郭崇子三一經云商人彭真人弟子以嘗殺人不得真人范今幽之范陽漢縣有故城在易東南有范水扶登扶登氏典樂之臣豎豎􅀈國或作豎亥杜鳳翔普潤漢杜陽地有杜水既七大夫杜子墨既子黥孟孟塗國隱十一年向盟即孟今河南孟津偃師西三十一里穆傳至於孟氏近河南丹塗後封今建平郡有丹陽城括地象云丹陽故國歸州巴東縣也甘鄠西五里甘亭水經在甘水之東啓扈戰其野屈北屈隰之吉鄉北二十一里有古屈城北屈也晉二屈驁夏后伐屈驁吕覽云啓曹潛夫論曹有薑姓者魏夏后攻曹魏吕覽亦以為啓詹伯曰祖自夏以稷魏駘為吾西土盟會圖云嬴姓非姬姓魏西河后啓征之見紀年有洛洛也上洛商州上洛郡治上洛晉地紀年晉烈公三年楚人伐我南鄙至於上洛漢屬𢎞農唐洛州侯爵風俗通云夏諸侯國今利之胤山乾德三年平蜀天寶元曰胤山出舞衣今川錦有胤氏嗣氏鄧氏云國諱改耝羿邑襄四澶之衛南縣東十五有故耝城一曰外里襄十一年城耝者邑界宋魯窮有窮羿邑楚地今夀之安豐有窮谷窮水即窮石故記皆謂刪丹蓋以淮南子弱出窮石窮石山在刪丹今在張掖似太遼隔楚人救潛沈尹戍與吳師遇於窮潛今之舒與寒過皆相邇因夏民代夏政則此為近故得及夔子也説文作窮寒浞國邑樂史云伯明氏所立本國世本云鄖姓今濰之北海東二十三有寒亭杜云在平夀東今夀光界非晉塞晉地五氏一曰塞氏過夏之國即有過括地象云猗姓國今萊之掖西北二十有過鄉過亭地道記有過城有過氏戈仍别見鬲有鬲氏夏諸侯近鬲津後有鬲氏姓書膠鬲後非今德之安德西北有故鬲城即有隔世族譜有鬲與有隔為二非漢之鬲縣應氏以為偃姓臯後酈氏以為有窮后國俱非武武羅世本云夏武羅國冀都之武邑一云衛北境武父陳留有武父城厖圉厖圉國莒邑有大厖冝出厖降猗河東猗氏縣南二十有猗氏故城魯人因陶朱興富於猗氏因曰猗頓棲猗姓疏猗姓潛夫論棲疏猗姓女女艾國汝也商有女鳩今之臨汝一云晉之汝濱本陸渾地晉取之集韻邚音如媯東海后抒征東海伐王夀王夀宜是平夀衛之下邑在濰州西南三十里有易經云王亥託於有易河伯僕牛有易殺女王亥取僕牛竹書云殷王子亥賓於有易淫焉有易之君綿臣殺而施之是故殷上甲微假師於河伯伐有易滅之殺綿臣原后抒居原者預云泌水西北有原城今河內軹桀以原侯夸師者千桀臣千辛邗也説文邗國屬臨淮一作𨝍吳地昔吳城邗溝今揚州故廣陵開皇曰𨝍江十八武德邗州七年今作韓江繆蒙山岷山桀伐蒙山氏即岷山氏今蒙州蒙山郡非晉陽之蒙山有施扈趙桀世趙梁伊摯所尹六渾伊川許氏所云伊維侯國萊湯佐命萊朱國登湯御登恆有登氏慶湯臣慶誧湟里七大夫有慶誧湟里沮􅀈樵云鄭地卞卞隨蓋晉下漆膝國乾之永夀漢之漆縣今鳳翔之普潤有漆水昔隗囂攻略陽上至漆漢之漆今邠治也寰宇記邠之新平漢漆縣有漆水屬扶風非寃句長垣之漆舊云防風氏漆姓後然世本無漆姓防風姓黎南巢右夏世侯伯之國堯禪舜禹為司空平水土弼成五服至於五千堯五服服五百里要服之內方三千里其外荒服為之四海方五千里康成謂方萬里以七千里為九州妄也方以為國五國有長長有師十長而一師師五十國州十有二師州有牧牧稟命於上京此以傳之説裁之外薄四海咸建五長四海謂千里要荒之內要荒雖異九州不盡建侯亦有五長五國之長也一云每方五長五百里以為甸甸佃也為天子治田里賦納總二百里納銍三百里納秸服四百里粟五百里米邇重而逺輕甸服之賦供天子四方之賦供諸侯甸之外率五百以為侯綏要荒甸服外即為諸侯侯者喉也惟以射而進退侯外漸逺綏之而已綏者鞚也綏外益逺故惟責其要服之外則又荒逺邇於夷矣此唐虞之制也周之九服不能如是佃服即移侯服之外采又在男之外衛乃在采之外而侯邦男邦且雜建於天下無復逺近之别知虞夏之制為盡善侯服之內采男諸侯之所𨽻也卿大夫采在六百里內男國小在七百里內侯國大在千里內以大庇小故男在內懼大陵小故侯在外周又異於此矣綏服之內以揆文教以奮武衛千三百里之內近於侯服使揆文以教為以文治千三百里之外逼於要服使奮武以衛亦猶今之邊郡尚武略也要服之內夷蔡屬焉荒服之內蠻流屬焉禹貢蠻夷三百里流蔡二百里此言其實與上古侯甸不同夷性近人蠻性逺人故夷近而蠻逺罪輕則蔡之夷罪重則流之蠻大不可以變而不忍殺則放之要荒爾左傳蔡蔡叔説文作􅔁散也放散之也書云囚於郭鄰安國以為中國之外非侯綏之內八州所布州六百國凡四千八百要荒之內惟不悉建隨地而區通之則亦萬國甸服親事時時而見侯服嵗朝綏服再嵗而朝要三荒四四嵗而天下諸侯畢一朝一朝則天子時巡所謂五載一巡狩羣后四朝東漸于海西被于流沙朔南暨聲教小大之國內外之侯三正所用蓋七十有餘國十二師之制州六百國故説者謂十二州為七千二百國州擇十二諸侯以為之師以九州則異矣鄭謂每州得百里之國二百七十里之國四百五十里之國八百州計千四百國以二百為名山大川不封之地餘百國立一師州十二師八州計九千六百國以圻內子男備數為萬所謂萬國固非必如是惟周王撫萬邦而幽王且有萬邦之屏周亦何由有萬邦哉謂禹弼成每服加五百里為萬國尤妄嗟乎塗山之會贄玉帛者萬國其君長世及不知其幾侯伯也其可見于國名紀者如此而已令名醜行均寂滅而無餘矣况流風善政之欲知乎後世之士蓋不勝膬薄也德藝智略曾不足以任建立而第相粉澤蚉功蚤德以􅀈剔金石而蘄取流傳乃至爭起片文隻字以圖自託於不朽者其果足以滿戴晉人之一吷耶彼夢者之在寢也其四肢鼻口率故形也據其旁者未始一見而若之神遊或羽而􅋖或冕而朝城郭宫室輿服臣妾乃忽冨而驟榮宫偝興乎時鹵簿敶乎後若無有極逮其既覺蘧蘧然無毫黻之可攬矣然後自笑其始之妄而奭然以悲然則竊勢希合次且愒日專利以封已者其犬言彘裾未始少變而且枵然顯大自智莫之與對顧不為尹氏老役咍者鮮矣孔子曰禹吾無間然矣夫孔子之功惟見于六經而自比于禹夫子于禹若不相似然然而後世且曰生民以來未有則六經之文比隆堯舜可也比之于禹蓋小著矣宜乎後世之不以為非也豫觀班志劉略文字固已不勝紀矣其果皆有益乎無益也而隨唐之書卷􅀢之多動數十百千萬使後之學士腐唇蔑齒眵昏雙明而不知其統豈不悲哉古人云修短隨化皆期於盡豫考古之封君曾無隻影而文人詞士殘窮竹帛誠不能不以之興懷從而列之焉知後之視今不猶今之視昔也商世侯伯馮馮夷國詳文昭中應汲古文云商時國寰宇云故城郟城東南四十故殷之應國杜云陽城父南應國也隗史伯云南有應鄧西有晉隗侁姺也唐韻古有姺國一作􅀈姺先典切集並穌典切説文云商諸侯為亂者或以為莘非集小禮切又音韻妚傳云啇有姺妚昭後三有妚氏云邳也定元年有邳薛地今淮陽治下邳集同胚姓纂纂要方凡切姓苑始音鄙一音缶弊􅀈終葵商時侯國後有終葵氏髙平商有髙平子見三一經薄姑商諸侯即薄丘一曰蒲姑在青之博興地志有薄姑城在臨淄西北五十杜云蒲姑城在樂安隨博昌北唐博興也青圖經云與四國作亂成王滅之以封太公按史記則胡公徙之按晏子爽鳩氏始居之季萴因之伯陵又因之薄姑氏又因之然後太公因之爽鳩太昊時季萴夏季而伯陵薄姑商末也然太公實居營丘非此落姑按春秋傳落姑齊地閔元年或云魯地魯大夫采姓書落姑氏蒲侯襄公與莒子遇蒲侯氏二十二年預云邑名蒲如商侯國齊地有蒲如氏預云下邳取慮東南有蒲如城春秋蒲隧或云即薄姑蓋其分也姑幕商侯國今密之莒東北百六十有姑幕故城故晉琅邪姑幕縣後齊併入東莞晉志通典十道記等俱謂即蒲姑蓋非又史以為薄姑氏國與四國亂周公滅之以封太公又云青之博昌界有薄姑城是亦一之按書大傳謂奄君薄姑語録父舉事以薄姑非名誤矣傳所謂薄姑商奄吾西土者豈惟晏子之言哉酈酈山是後為酈氏食其氏音異基其孫賜為氏侍其氏其曾賜氏黃洛寰宇記盧龍有黃洛城黃洛水殷諸侯國貸成湯時有貸子相邊商國周有邊伯莊十八年膠膠革國今沛之公丘續云本膠國通典則以萊之膠水為古膠東國括地象云在膠東南六十里即墨城也錫錫疇商末錫疇子斯一云錫疇國鄭六邑有戈錫錫宋鄭之間鄭人滅之以處宋元公之孫瞿商􅀢有瞿父鼎有商瞿氏冝為瞿上陵玉篇國名冝即􅎦三􅎦也湯伐之字書書傳作艐從舟故雅訓至𨽻從月史夌通典㚇一也漢廣川子則封三融侯屬東海甘甘盤小乙臣髙宗學焉後受遺有大功九鬼紂三公即鬼侯明堂位為紂所殺彪云鄴西鬼侯國也隨圖經臨水縣九侯城今相之隆陽有九侯城磁之滏陽西南五十誕生音仇故或謂即􅢿非羑羑里地在相音九或即九字書音牖失之鄂史記九侯鄂侯為紂三公紂虞所封南陽所謂大夏有鄂氏姓書出晉鄂侯或作邗非邢𨝍邢侯亦紂三公昭十四晉施邢侯音邢作𨝍訛或云即鄂即云𨝍侯俱非按世紀邢侯事紂以忠諫死而邗為文王所伐文王豈伐賢哉𨝍見武穆中崇二崇侯虎紂佞臣文王虜之今崇有崇城崇侯墳九域志云虎也集韻􅀈猥寰宇記彭城北三十垞城臨泗水秦地志云垞城古崇國兖人謂實中城曰垞直加切城西南有崇侯廟在廟山與秦崇異杜云杜扈永和志云在秦晉之間蓋以宣元趙穿侵崇以求成於秦也張子厚疑非一國虞芮别見文王質虞芮之訟暨師武伐紂乃收虞師芮師六韜春秋虞公虞仲之後周初封之小國稱公今陜州密文王伐之詩云密人不恭者事見周書蓋與紂有謀周之意黎夏諸侯九黎預云東夷國晉侯略狄土立黎侯非文王所戡矣故晉志二黎國飢􅢿耆昔文王伐飢本作􅢿音祈即耆黎也周書傳五年伐耆而大傳作戡耆故説以為黎也周傳一年質虞芮二年伐𨝍三年伐密須四年伐犬夷五年伐耆六年伐崇周紀平虞芮明年伐犬夷又明年伐密須又明年伐耆又明年伐𨝍又明年伐崇侯虎字書帆訛􅀈飢帆同集云伊􅀈古瓜子號按􅢿有祈音兔罝叶逵趙王歌龜策傳皆叶之也酆豐也事周紂惡之韓子云文王侵盂克莒舉酆三舉春秋徐之豐縣又楚地杜云祈縣南有豐鄉閎有閎夭為閎氏漢廣陵相侯孺散宜散宜生後有散氏於陵書大傳散宜生之於陵氏今淄之長山長子周史辛甲封今潞之長子晉執衛石買處商蓋周公勝殷將攻商蓋辛甲曰難攻請先九夷攻九夷而商蓋服庸庸氏伯爵助武伐紂今房之竹山漢之上庸文十六楚滅之楚飢率諸蠻叛楚也寰宇記上庸故城在州西二百五十楚子為庸浦之役者説襄十三蜀地文鄘南夷國寰宇記金州周庸國地戰國時為楚附庸後滅之楚使盧戢黎侵庸有禆倏魚三邑髳庸蜀羌髳微盧彭濮皆西南夷助伐紂者微瀘盧戎也古文作纑齊之長清南五十有盧城齊鄭尋盧之盟者然非此記每為廬今襄之中廬寰宇云中廬廬戎國文十六年楚師自廬以往者彭黔之彭水縣又有彭溪在忠之臨江即巴賨彭濮者非濛陽矣僰僰侯國今戎之僰道音撲一作􅀈集音棘云縣名又音拍慢靡周書世俘云武王伐靡及陳者戲武王克商命吕他伐戲方云紂畿內按襄九年戲鄭地艾侯爵穆鼎有艾侯作􅦁王俅以為共誤并之廣陽漢之上艾後漢石艾也又吳有艾縣隋入建昌有艾城今在武寧佚武王俘艾侯佚侯小臣四百六是也皆商國恭姓纂云商末侯國厯華國莘思康成云商有思侯梅伯霍侯爵武王禽之汝之梁縣西南七十有故霍世本云霍國真姓今本作姬姓知非晉霍臧文王觀於臧遇臧丈人釣者近渭遲商有遲任賢者集韻引書遲任􅀈吕春秋揚􅀈世本又君新􅀈字從邑僣也當邑國右商世侯伯之國王制四海之內九州州方千里建百里之國三十十三公七十里之國六十十六卿五十里之國百有二十三十二小卿圻內大夫凡二百一十國三等相倍八州千六百八十國大二百四十次四百八十小九百六十名山大澤不以封與民同財稅供而已其餘以為附庸間田州餘方百里者十方十里者六十若封者為附庸未封者為間田有功者取之間田録之其有削地則歸之間田天子之寰縣內方百里之國九視公侯者三為三公之田有致仕者副之為六餘三以待封王子弟其一大國之命七十里之國二十有一視伯者六為六卿之田致仕者副之為十二又三為三孤餘六待封王子弟其三次國之命三孤無副五十里之國六十有三視男子者二十七為大夫之田致仕者副之為五十四餘九以待封王子弟此鄭氏説非必盡爾然鄭又以王制前所言三公等田為商制後言縣內國為夏制采地殊不可曉凡九十有三國三等而二倍之名山大澤不以朌王以給民虞人掌之其餘以祿仕以為間田畿內無附庸餘方百里者六十方十里者九十六周官以大都之田任疆地公所受地在焉小都之田任縣地卿所受地在焉家邑之田任稍地大夫受地在焉此言縣內舉中言之然則公邑之田任甸地元士于此受地可知此其大凡也其地有餘有不足蓋又有通法故卿或在縣地取足于封而已甸稍縣都無過十二謂如百畝而徹賦民什一於一之中又以十分為率取二也畿外諸侯以歸公上大略如此九州千七百七十三國天子之元士諸侯之附庸不與八州餘方百里者百八十方十里者四百八十附庸祿仕間田在焉寰內夏后氏之畿也故康成以為夏氏之衰戎狄內侵諸侯相并國滅數少商湯承之更制中國方三千里以為九州建此一千七百七十三國杜佑因之蓋失之矣夫湯之興資者三千王斶云湯時諸侯三千洛誥傳云武王伐殷同國三千長育其材設其禮義被之文章便可與事宗廟也千八百者周家之始受也九州州方千里此於禹服五千里內斷長補短建國多寡之數三代同也鄭謂湯制中國方三千里周公復唐虞之舊為七千里妄也孝經説云周千八百諸侯布列五千里內足相參考烏在七千里哉夏之萬國至商湯至周逾數百年間不應所減如此商之去周又數百年何得並無減損知此周數商益多矣書傳云退見文武之尸者千七百七十三諸侯玄謂此周所因商世九州諸侯之數所謂萬國固亦號數知文武之後制千里之內曰甸千里之外曰采曰流甸者服治田出榖稅采者采取以當榖稅謂所貢物上言采下言流其中舉矣天子百里之內以供官千里之內以為御官官府所用御御府所用百里內謂如納􅖽皆粗者千里內謂如粟米皆精者太府入賦不以逺物待近近物待逺近供官逺為御也太宰制國必合王府之賦為之調度此則王府之所供止百里膳服之御必千里也千里之外設方伯州伯五國以為屬以屬制名大事從其長小事則專逺屬有長州四十二長十國以為連以聫制名言以授邦職以役國事如聫也連有帥州二十二帥三十國以為卒以卒制名言以比追胥令貢賦如卒也卒有正州七正連帥比年柬車卒正三年柬徒羣牧五年大柬車徒二百一十國以為州州有伯牧伯八州八伯各以其屬屬於天子之二老兹商周之通制也八州八伯五十六正一百六十八帥三百三十六長凡五百六十八多少雖不同方伯連帥一也嗟乎置天子非以優天子收天下也置諸侯非以優諸侯收一國也諸侯之有方伯連帥牧長卒正非以優強大在小國也故以小事大大字小致治之要春秋之所與也分災救患濟弱扶傾是王政之所急黎侯迫逐衛宣不救而旄邱以為責四國災流許人不吊而君子必其亡詩云伯也執殳此州伯也時齊侯亦自謂小伯見國語是故什伍之法於州鄉則聨其民於師畋則聨其徒於宿衛則聨其官夫然故能以中國為一人而無內患為屬連卒州以聨其國為長帥正伯以聨其人夫然故能以天下為一家而無外虞此大司馬比小事大以和邦國若職方氏邦國小大相維之事也先王之建諸侯豈顧私其力以自衛使子孫世得王哉不如是有不足以寧天下而世之治不治子孫之世不世有不在乎此也世之人徒見三代之能長則以為建侯之力見春秋之紛亂則以為建侯之失夫以禹之功又非無諸侯也而世未三易太康不道俄失其國其所以未亡而再集者幸有窮之顛越而少康之明賢爾諸侯何力之有東遷之後非無疆大也然而載祚數百世乏令主猶克永世雖危無咎則周公之法在而四國不能以相賓也諸侯亦何罪邪先王之設法固為後世之能守者設也使後之世果能守邪安有春秋之末世茍不能守則亂之起有繇矣豈設法之罪哉謂諸侯之敝有春秋之末世則司馬氏之季天下裂於夷狄大業之際天下散於盜賊其為禍亦至矣豈以有諸侯至此極邪丁武王時丁侯叛者羑羑侯今武功縣界有羑陽故城或云湯隂者非湯隂北六里有羑城羑水城北臨水周二百五十步即羑里城史音牖里元和志牖里一名羑城湯隂北九里通典相州湯隂羑里城隋國經湯隂有防城紂囚文王築此防之濁有濁氏元后傳有濁賢濯氏鄭有子濯孺子風俗通云濯輯之後説文濁水出齊郡厲巨山東北紆穆王伐之大起九師東至九江蚖蟬為梁在江東矣紀年四十七年因穆王西征至因氏郭云國也近河房穆王里圃田之路東至於房郭云房子國趙地有巑山紀年作魴即髙邑之地十道志云髙邑趙房子也通典云趙臨城舊房邑寰宇有房子城漢之鄗邑後漢之髙邑􅀈穆天子傳有􅀈子郭云夷國有德者稱子剻剻傰也剻伯綮國穆天子西征至於剻河宗之子孫剻伯綮逆天子郭叵肯切伯爵綮名廣韻上聲引之云漢有剻城侯又步登切故楚漢春秋作慿城又作馮馮朋通也地記陳倉有蒯城云河宗之子孫則宜在此非沛之剻姓纂作剻伯綮穆傳今作剻伯絮訛剻説文沛城父有剻鄉玉篇蒲梅切蘇林廣韻為薄回切云鄉名在右扶風集一作剻又音浮顔為薄肯切則又誤矣姓纂剻氏以為出伯綮國在虞芮間者妄或作非諸剻剻􅀈蒯字並詳字經􅀈是春秋得之先訛為蒯苦怪切括地志河南縣西四十有蒯亭縣今有蒯鄉玉篇説文從省汝南安陽鄉名或作簣周世侯伯詩邿邿也魯取之襄十三預云亢父有邿亭亢父𨽻濟説文附庸國漢志詩亭詩國水經云春秋詩國也在任城界欒盈克邿乃齊地例云平隂城西有邿山鄟成六年取鄟外紀云附庸栒邠之三水東北二十五栒原上有古栒城見寰宇記郡縣志云安定縣界有三水故城周鼎銘云王命尸臣官此栒邑者班固以為文昭元和志從之非也應云郇侯伐晉者今謂水南一里有故城建德二為栒州三年廢皆因國誤城今在郿淖楚淖國先為淖氏集韻音卓魯共王淖􅀈𩱘周器南宫中鼎云𩱘人是説文有􅀈賴子爵蔡之褒信有賴亭楚滅之昭四年非炎帝後賴春秋滅賴古本作厲故世以為即厲非也晉志厲賴二國又哀六安孺子如賴乃齊地郵王良邑為郵氏庳吕覽晉文之霸東伐庳廬者渠畿內國周大夫渠伯紏後有渠氏昭二十六渠周地昔周大夫所封見風俗通通作夕故有夕侯後有昔氏夕氏巨鹿故昔陽城一云貝丘今恩之清河有􅀈亭乃音籍清河乃秦厝縣貝州也或云臨清有􅀈鄉非用風俗通云古用國見毛詩在髙唐乃用地故有用姓名士録有用羽之吕徐之彭城東有吕梁城五十九里春秋為宋地漢吕縣郙甫也汝南上蔡有郙鄉郙亭或云即吕非也孝經偶引吕􅀈為甫爾鄦在潁川玉篇云甫侯所封非按鄭世家有鄦公本許云鄫鄭地今滎陽有鄫水城鄫水溱也而故鄫城在襄邑東南有故城襄元年次鄫者非姒姓鄫故晉志有二鄫國宋春秋有宋子乃小國今趙之平棘有宋子故城漢之宋子縣非微子國封􅪿奧一作郁有郁氏姓苑慎潰魯有慎潰氏奢侈逾法敗家語沈猶古附庸後魯沈猶氏孟子有沈猶行姓苑云太山人漢劉穢為沈猶侯地在千乘韻直忱切師古音審云沈亭是無終無終子翟國今葪之玉田渙陽亦其地晉滅之燕為右北平有無終山故無終縣在右北平城西三十萬嵗通天二為玉田以蔽北燕之路亦春秋之山戎零支齊桓公北制零支今平之盧龍故零支縣古離支也臯虞故侯國漢郎邪臯虞縣中牟佛肹邑今縣𨽻開封開皇之內牟北十二有中牟故城又河北有中牟在濕之北趙獻侯徙治者晉地瓉説詳矣班固杜佑以為滎陽中牟縣故樂史以為河南有肹墓因年表誤之衛侯如晉過中牟不在趙之東也定九年晉車千乘在中牟預嘗疑之吳曾云當在溫水之上逌疑年表趙都中牟謂新鄭恐趙嘗都亦繆矣東牟文登西北百一十有東牟古城堂陽九域記漢縣今𨽻冀城冡記商之太子封母弟才為堂陽侯在堂水之陽闕鞏國也昭十五年傳有闕鞏之甲郇瑕預云郇瑕古國僖二十四郇郇瑕氏伏氏云在解東郇瑕氏之虛也地薄水淺近於鹽謂鹽澤也然郇與瑕二郇音環詳周國中瑕見卷末析成今鄧之內鄉介根東夷預云黔陬東北計基城即介根國漢之計斤今密東南四十計斤故城廣記密之膠西介葛廬國黔陬隋省入膠西故城在今諸城東北百一十徐吾徐吾氏茅戎之别後有徐吾氏今潞之屯留西北三十有故漢餘吾城閼與通典儀之和順韓之閼與趙奢破秦軍處和順今𨽻遼寰宇記今名島蘇城銅鞮西北二十今潞之銅鞮故閼與城漢梁榆也九域志一曰榆城盧諶征艱賦云訪梁榆之虛郭乃閼與之舊都謂此安陵國事云小國侯其後氏安陵經為楚王妃卑梁吳之邊國吳梁氏卑梁人也楚滅之今濠之鐘離吳世家昔卑梁女與鍾離人爭桑相攻遂滅卑梁曲梁晉伐之宣十五今之潞預云廣平曲陽縣今洺之雞澤漢曲陽地仇吾一曰仇繇韓子云仇繇小國為智伯所滅後有仇吾氏吕春秋中山國有風繇之君智伯伐亡之即厹一之誤一作厹猶非國事云智伯欲伐之遺以大鍾韓子智伯以大鍾遺仇繇見二十卷二十六卷又云遺以廣車按河東盂縣有原仇城元和志以為仇繇樂云即盂之外城仇繇城俗名原仇九域志亦在九原并厹猶班志屬臨淮今泗之漣水代以為即仇繇非智伯所伐不在是鍾吾一作鍾吳春秋鍾吳子國昭二十七吳滅之預云泗之宿遷西北十里司吾故城是寰宇洞峿俗為鍾吾氏漢尉氏今鍾吾蒼餘丘於餘丘也莊二慶父伐之預云為邾所併故二傳云邾邑經不繫邾魯附庸也邑不言伐沙隨春秋地名云本國也今南京寧陵西北七有沙隨亭成十六預云北浮來即邳來紀邑今東莞北有邳鄉邳鄉之西有公來山邳來澗彭戲秦武公元年伐彭戲氏於華山地近華隂蛇丘音移封者為氏泰山蛇丘縣葵丘外黃東有葵丘大夫邑食者氏焉英賢傳有葵丘欣潁春秋圖有潁國樂云潁侯國通典以為洛之潁陽考叔邑即城潁許之長葛西一里有故潁城潁谷考叔冡在汝廟在許亦有周潁昭九年潁周地蘧伯玉先國陳留傳云長垣有蘧伯鄉一曰新鄉伯玉之冢單單伯魯孤與周之單子别介之推先國即汾之介休有介山綿上山地今沁之綿上竇蘋以為密界晉黔陬乃介根也駕楚附庸吳圍巢伐駕圍釐虺者成十七年湯亳秦寧公二年伐湯三年與亳戰蓋京兆杜亳豐秦襄公以弟穆嬴為豐王妻地蓋豐水之西一作酆哀四昔文王侵盂克莒舉酆三舉而紂惡之韓子預云南鄉析縣南有酆亭談儲齊大夫有儲子姓源云儲人後繆酄春秋酄闡一作歡在巨平今濟北蛇丘西下歡亭唐入巨野今濟治然此為聞喜之酄有酄亭自音圈水經蛇水徑下歡城南即灌水也今龔丘析所謂析酈楚附邑白羽之地秦人過析隈今鄧之內鄉有淅水魏淅州故漢南陽淅縣聊聊莒即墨皆齊東界今博之聊城漢屬東郡攝昭二十晏子云聊攝以東故博平是今聊城東北三十有故攝城博平西南二十或以聊攝為一誤博兖之奉符漢之博縣隨為博城涓齊有涓子涓蜀艮之先荀子涓蜀吕濁艮非離本舒鳩地今通利軍之黎陽有故東離城漢鄧弱為離侯於此史表或云黎非儀儀封人儀之封人也注衛邑今開封東明西北二十有儀城后宜即郈有后氏弟子后處云出后土妄牟牟子國楚滅之為附庸預云泰山牟縣今奉符廣記奉符漢牟縣故牟國樵云登之牟平非鄄莊十四衛縣大夫鄄子士音眷衛侯自鄄入哀十七本齊豹邑曺植之封晉八王故事云東海王越洎鄄城城無故壞今濮之鄄城漢屬濟隂郱本紀邑有郱故城在青之臨朐東南鄑昭十一年鄑魯地舊云都昌西之訾城詳楚後訾郚密之安丘西南六十故郚城漢郚縣杜云卞縣南又朱虛東南有郚城隨之郚縣縣武德中併文七年五梧紀邑後屬魯南與邾境莊元齊遷莒郱鄑郚凡書遷者自是滅矣崇春秋之箕崇小國趙穿尋崇者非崇侯國廬九域志廬州古廬子國劭有廬氏郲鄭地時來也預云滎陽東釐城吕河東永安博物古今地名記有吕鄉吕甥之邑郡縣志云霍邑西南十里有吕城紀聞云霍邑古吕州即彘也唐為吕州彘即永安其城甚固紀年晉獻公十九年會虞師伐虢滅夏陽虢公醜奔衛乃命瑕父吕甥邑於虢都志云北虢也非彭城樵云彭城東五十九里吕梁漢吕縣肥二漢故肥城今在鄆之平隂志肥子國屬泰山唐𨽻濟然災川劇自有肥亭志亦云肥子國蓋二邦云魚魚人逐楚師者文十九長楊之魚城也長楊西北五十四面險絶舊云魚復通典夔州春秋魚國也然魚復之名始於漢也即魏之人復故城在州西十五沔河東十五禆鯈魚庸之三邑禆鯈文十七年待於鯈樵云晉鄭之境漆從征記髙平南平陽東北有漆鄉杜同定十五年城漆邾庶其以徠奔者襄二十一今兖有古漆城宛即有宛長垣西南有宛亭近濮水衛宛濮也戎戎州已氏邑今宋之楚丘九州記云已氏戎君之姓混吾之後漢已氏縣哀十七預云濟陽東南有戎城此會潛伐凡伯者隱二又山戎在漁陽國都城記云燕北通山戎莊三十公及齊侯遇於濟謀山戎以其病燕也今幽州東二百十三漁陽縣茅戎在陜杜云大陽西有茅亭亭今在𢎞農陜有茅城樵云陳留襄戎在秦九域記秦州有平襄城古襄戎邑漢陽驪戎在新豐莊二十八瀘戎桓十二薑戎僖三十二隂戎昭九蠻哀四年蠻氏潰蠻子赤奔晉今河東伊陽伊闕鎮即古戎蠻子國漢新城唐伊闕也寰宇以梁縣西南蠻中聚為其國今謂麻城夷紀所戎夷國也隱二城陽壯武治夷安漢壯武城在即墨西非魯地之夷閔二殺哀薑處若臯夷蕪湖東淮夷僖十三東夷居淮上者安國以為徐夷之屬非也閟宫詩與昭四年春秋淮夷徐明為二狄翟也晉語蒲人翟人狄類非一居中國者若白狄僖三十三宣八與秦同州預云故西河地有白狄部胡神異記白狄先今鄜坊綏延間皆其地一曰白翟居乃秦髙奴故董翳為翟王都髙奴今膚施中行穆子伐翟乃鮮虞列子言襄子攻翟取左人中人則鮮虞矣开开羌居金城今蘭之五原逯風俗通云逯秦邑集韻音録有録氏逯氏漢有逯並髙馸將逯並右周世侯伯之國事之𢎞逺固有不得盡計於其始而有俟於後之人者封建之事非一世之利固非一旦之可為非一朝之事亦非一日之可計要必因其平時漸而為之則何事而不立是故古先哲王擇明賢比勳德年增而嵗益之所以成爪牙之勢者固非一旦而衆建之也修禮法謀連帥朝厲而夕勉之所以為長久之計者固非一日而驟為之也規模者本之前善善者存乎後是故羲炎以來歷載千百而封建之設猶有遺利則凡事之立固不在乎始謀之善不善者漢封諸侯初本率意事微周度是以土宇過制嵗未幾何而叛九起則其始謀者既不善矣誠使惠文景武而徠克原其故修方伯謀連帥明君臣父子之恩正疏戚尊卑之分漸而維之使安其樂絀貪殘寵賢德崇惠而涵養之則三代之緒將復見矣奈何吹􅀢過計一饐廢膳遂使成功頓毁美惡俱盡而不可以復起豈不惜諸是故成久長之業者必非一旦之可為也周有天下商之諸侯存者猶千八百因而崇之故為勢易而説者謂周之興也八百之侯同會伐紂故不得而不封且以為一旦封之此皆書生􅀈嘐嘗試疏闊談也暴長者云云推久長之策造速成之功此非陛下之福天下非一時之用海內非一旦之功云云朱浮云上世妃后之國華胥伏戲母國在閬中列子云華胥氏之國在弇州之西台州之北娥陵女媧氏之臣有娥陵氏少典黃帝父大叢少典氏則其後襲封者有典氏姓纂又有少氏妄有喬僑也一作橋少典取有僑氏傳作有蟜賈云諸侯集云古諸侯又云上世國名國語有矯故玉篇為居兆切後有喬氏橋氏蟜氏春秋有蟜固漢有蟜彥沖姓纂以為蟜牛後承桑神農取承桑氏一曰桑水陜之靈寶有桑里亭晉桑田今即陵有桑里西陵黃帝元妃嫘姓國作儽同今江夏安陸間故吳以安陵為西陵有嫘氏西陵氏春秋有西陵羔見世本方纍黃帝次妃方儽氏一曰方靁靁纍聲注靁祖方靁用字每相犯故世以方靁即靁祖誤有靁氏纍氏儽纍雷傫嫘單從田皆非字彤魚黃帝三妃彤魚氏國固表作彤非干類青陽取干類氏生少昊後有類氏蜀山昌意取蜀山氏益土也詳前紀今濟有蜀山或其分也鄒屠髙陽取鄒屠氏者昔黃帝戮蚩尤遷民善者於鄒屠勝濆勝奔也髙陽允妃勝奔氏國帝系注宋𠂻云國名或作騰隍誤根水卷章取根水氏今土軍縣有根水是史多作即水非鬼方陸終取鬼方氏殷高宗伐鬼方或此陳豐一作鋒酆也僑極取陳豐氏生帝嚳嚳復取陳氏生帝堯齊之豐丘陳氏邑也有娀帝嚳次妃國訛作嵩殷武疏簡狄國桀敗有娥之虛蓋陕虢間故世紀晉志桀敗於焦淮南子有娥在不周北逺有娀氏嵩氏有陬帝嚳三妃之國音輒史作訾陬或作陬訾俱非姓書訾陬三皇時諸侯冨冝帝堯取冨冝氏史記班表作散冝散冝為二登北帝舜之三妃傳多作癸北姓纂又作癸比經云國在巨燕之南倭之北屬燕有姺􅕐納有姺氏生伯禹唐韻云國名帝繫作有莘今陳留有莘城國語之莘虛土敬􅕐妻圡敬氏見山海經塗山太康地記塗山故當塗國固云九江當塗今夀春東北塗山也山在濠之鍾離四百十七里當塗故城州西九十六有禹廟塗山神祠山頂漢魏不害劉聖公為當塗侯國應以為會諸侯處非塗山侯國大誤酈山戎胥軒取酈山氏蓋即酈侯契和老子祖理徵取契和氏後有契氏純狐后羿妻純狐氏浞納之有仍見商世國州山南嶽取州山氏曰女右上世帝王妃后之國子曰周監於二代郁郁乎文哉文者禮文加詳之謂也夏商氏非不文也以周而視之則猶質也方封建之行也豈惟利其私哉豫之所嘉亦正以其文也且姑以大婚一事言之王妃取於諸侯而王女下嫁於國君之世子不過下一等爾逆送之有文以相接丙丙乎不可尚矣自其郡縣而兩勢懸后妃遂取於齊民而王女下嬪於匹庶矣豈不異夫桓二年紀侯來朝何休以為稱侯者天子將娶於紀故封之以百里謂天子得娶庶人女以其得專封非也劉元輔云天子養天下之民居天下之尊守天下之法能刑人能爵人然刑人當以罪爵人當以德豈以得專而妄刑人爵人哉又况撓以情愛援百里之命於匹庶輕宗廟褻社稷使後代庸君欲以百里之女共天地之事豈不失觀諸六典云兩漢皆列侯尚主自魏晉來尚主者皆駙馬都尉駙馬都尉鄙矣然兩漢亦不專列侯也或曰何傷乎是所以為無私也嗟乎亦不究其本矣天下多故人非齊聖敵則敬其相洎者未有不生於不等者也秦漢而徠不原其本脫先王之意務以尊君抑臣為治列侯尚主帥使男事其女而公卿壻天子者一至舅姑屈跪其婦以故王陽條奏原以為失長樂王回亦首其敝謂父母至不敢畜其子而舅姑且不敢有其婦人倫悖於上風俗頺於下則不等而已矣惟不等故不敬不敬故相洎相洎不敬失伉儷之義矣失伉失儷乂烏足以言之封建之代哉古之亡國皮氏信不行義不立哲士陵君政禁之生亂而亡皮氏詳雜國中華氏方正日逺邪人專政禁之生亂而亡六韜作莘氏又博物志平林挾德責數賢能日疏位均而爭遂亡詩會伐平林後漢平林盜起者按平林在隨縣東北九域志史記有平林老引見姓纂三鱙美言聞於內惡言聞於外內外不相聞而亡或云三苗昭元義渠二子異母皆重君病大臣分黨以爭而亡春秋之義渠戎秦昭滅之為北地今慶州平州二功大而不賞諂臣日賞功臣怒而生變平州出奔盟會圖疏平州在汾州介休西若齊之平州漢平州國在梁父宣元平州杜云泰山牟縣西有平州鄉有林召離戎君朝之而不親禮逃而誅之天下叛之林氏以亡六韜林氏國出騶經與葛鼠近預云中牟林亭非今開封春秋之北林曲集自伐其智廢仁義事強力賢良伏匿君孤無使榆州伐之而亡今符陽郡有集云萬山所集六韜作西譙州氏伐之榆州孤而無使曲沃伐之而亡見博物志當亦周書文今不見儀之榆社或云魏榆晉曰雍榆亦曰魏榆預云朝歌東有雍榆城今衛縣隨改有鄶蔑爵損祿後君少弱禁伐不行重氏伐之而亡考之潛夫即祝融後也今鄶城六韜曰會氏重氏伐有鄶者宜句芒國滄之南皮有千童城年表云故重是也城在今無𨽻漢縣也云因徐福妄上衡與林氏爭權林氏再戰弗克上衡為義弗克俱亡有果好以新易故故者興怨新故不合內外不附而亡今果州畢程損祿增爵羣臣貌匱而亡文王卒於畢程長安志引孟子今作畢郢而武王嘗窮於畢程吕十八地今咸陽陽氏自伐而好改作事無故業官無定位民運於下而亡夫國以陽名者多矣如陜有上陽下陽晉魯鄧越皆有東陽南陽難可悉數榖平慢類無親破國弗克業荆用國內外相援而亡一作平氏縣宗狠而無親執事不從守職者疑羣臣解體國無立功而亡六韜作懸原扈氏二鄭地預云滎陽故卷有扈城亭卷後齊入滎陽故卷城在原武西北洛氏宫室無常池囿廣大工巧日進失其民時民人匱竭飢饉不食商伐亡之即有雒雒以色㖕魚豢云漢火行忌水故去水加佳妄也按漢字從水不改師古云光武後改亦非史記已用之六韜作有熊誤重丘二以美女遺青陽者括地象云曺州武城有重丘故城今在濟隂東北三十一亦曰廩城孫蒯飲馬重丘遂伐曺取重丘者襄十七寰宇以乘氏東北三十七古重丘城是與德之重丘異二十五年盟處乃齊地邵云平原安德北有重丘鄉今有故重丘城在德治安德北樂史云故城在博之聊城東南右古亡國見周書史記解及六韜周志凡國三十皆敘其所以致亡之道以詔徠世者二書俱云二十八國然文止二十有二今以張華等記參綜得此其有夏后居殷商有虞質沙有巢共工南氏阪泉玄都西夏十國已别見嗚乎謀人則智謀已則愚謀末則獲謀大則疏此天下之通患也彼有宗社者莫不欲安也俄而危矣莫不欲存也俄而亡矣虞夏不可言矣商之三千周之千八百至秦漢之世者不千一莫不失於是也有一裘褐必即良工有一羊豕必資良宰人主欲善射中微而及逺也則張貴爵厚賞以招之內不阿其子弟外不隱於逺人惟能中者取之雖有骨肉之親便媚之好不之使誠以不能是也至於治國御民調一上下內以固其城外以拒其難治則制人而不制於人亂則危亡削滅可立而待然而求卿相輔佐不如是之公惟便僻説已之庸是豈不獨過歟是故明主有私人以百金良珠玉而無私以官職事業國無常強無常弱奉法者以強而不奉法者以弱荆莊併國二十六開地三千猶荆莊之氓社稷而荆已亡齊桓併國三十開地三千猶齊桓之氓社稷而齊已滅燕襄以河為境以葪為國殘齊而平中山有燕者重無燕者輕魏安釐攻趙破荆利都平陸攻韓拔管兵四布於天下而尋皆亡者羣臣官吏務其所以亂而不務其所以治也戈盾異用刀鑑殊施易位而用之則俱廢矣三公九卿人之司命今也不惟其人而惟親戚便佞之與無故而處豈非大不智歟韓嬰子云彼不能而主使之是暗主也臣不能而妄為之是詐臣也主暗於上臣詐於下滅亡無日俱亂之道故明主惟能愛其所愛暗主則危其所愛矣豫讀周志而益信國之亡未有不自已以求者後之取亡亦未有不出此而君人者尚不知戒豈不悲哉路史卷二十九

body:
  text: 路史卷十九宋羅泌撰後紀十疏仡紀髙辛紀下周之初興大封同姓五十有三國而文武之胙又三十有二管蔡成霍魯衛毛􅳙告雍曹滕畢原豐荀文之昭也亏晉應韓寒狄武之穆也而凡蔣邢茅之與胙祭則周公之裔也伯益考之父已亡管叔誅周公為禰也召虢燕陽閻鎦邠鎬方卬息隨彤單縱寧梁項岑鄄滑養盛極鞏穀謝郭密榮丹陽楊逢觚欒甘鱗主頓鼓肥宫遂冥麗暴載岐費紀胡康萇解張隗藺運冀潘龎馮沈賈鄭暌芮魏焦樊巴周徐橋北燕鮮虞陽樊皆姬國也七十九國如召祭閻原畢劉等猶是商世所封餘乃後之分封者文之昭十有六而泰之生者十詳譜圖文公采于周在扶風武功成王封其子伯禽于魯三十有四世而楚滅之洛誥云豫小子其退即辟于周命公後周公留相周成王封其子于魯明矣陶潛作諸侯孝傳以為武王封之于魯誤也伏云周公致政封魯老于周心不敢逺成王欲事文武之廟公疾曰吾死必葬成周示天下臣于成王及死成王葬之畢而云示天下不敢臣故公封于魯身未嘗居魯而説者更以為成王以公有勳勞于天下賜以天子禮樂妄矣有辨説見發揮後有有蟜臧會臧文臧孫公山武仲南宫惠叔叔仲仲顔仲叔公孫東門子家子叔子服子我子言子翬子于子成子寤子孟子駒子有子士子華子陽子楊公施公襄公冉公為公思公石公之公析公巫公父公伯公慎公索公肩公良公哀公若公冶公輸公鉏公儀少施慶父富父賓牟意如仲梁仲顔孟仲叔季之四孫子陽公族子陽後子楊出季桓世本無子陽公孫公鉏公冶二子傳皆曰伯及聲意南懿陘般僖榮禽于賜湣閔騫哀隱悼引毗彌展施衡為穆作昨婼尾鞠麴孟仲叔季之氏叔出叔盻甚明姓纂出叔達又云叔向繆矣風俗通哀出哀公吳有隱蕃云隱公後鞠氏伯禽後與鞠見王禹儞集云本出于魯其以邑氏者臧衆鄟秦運鄆管栁厚郈顔即費蔑魯孝公子彄采于臧展禽采于栁孝公八世廢采厚曰厚成叔與郈通姓苑有厚丘費乏碑云季文封費為氏懿公孫費伯城即居之顔乃齊靈公妃顔懿姬者及栁下瑕丘厚丘梁其榖梁梁其伯禽庶子見英賢録逮項公孫足守秦符璽又為符氏潛夫論魯又有乙華向非也周公使管叔監郼與蔡惎郼間王室周公蔡蔡而辟管爰代以中旄父管故不嗣周書管叔霍叔經死囚蔡叔杜預訓蔡為放二蔡管叔初亦為蔡故云文王惠慈二蔡後有禽氏管氏敬仲相齊公伯卒于齊其耳孫修適楚為隂大夫漢始南陽世奉仲祭號相君有隂氏隂嵩又為丘自陵氏後周書賜隂嵩至隨復姓君子曰管氏之世祀也宜哉釋例以管叔為周公後管仲為穆王後皆非蔡叔既蔡于郭凌子胡改行帥德周公使為魯卿魯治乃復之王邦之蔡澤是為蔡仲子蔡伯生宫侯至平侯徙新蔡益微每賦役于楚遷之州來故州來為下蔡二十四世而楚滅之齊世家云周公舉胡為魯卿士治言于成王復封蔡書疏辨之孔朝云郭凌地方有蔡氏辰氏盱氏朝氏歸生氏生氏太史氏蔡仲氏子履氏大利稽氏後周書賜蔡裕姓一作蔡總曹叔甸伯二十六世而宋滅之哀八年宋景有曹氏羈氏僖氏釐氏子臧氏射姑氏夕姑氏公強氏其攴于卞者為卞氏欣氏于牟者為曹牟氏重丘氏子臧氏欣時字子臧先賢傳有曹牟君卿曹操􅔨漢而有魏五世劫于典午非髙陽後曹氏見魏武自作家傳成伯子爵後附于齊還奔魯而滅于楚成十三年之成子成肅公也肅公恆公皆為卿按成即郕文王之子不詳名寰宇記引史記武封母弟季載于郕按管世家季載封冉又云後世無所見非成也有成氏郕氏上成氏邽氏肅氏戰國郕午仕趙始為成氏然周魯皆有成邑云霍處以祿父降而經至永公滅而奔齊晉旱卜之在嶽于是復霍而登旋滅于晉有霍氏冠軍氏􅔸氏閔二年與耿魏俱滅叔封司寇采康及成王降霍以商餘地封之統三監為孟侯宋咸云長也若云方伯康告云朕弟小子封以為成王知康告周曰衛伯周書謂之殷八世頃侯始侯孫和桓厲宣九十猶戒于國所謂睿聖武公者五子懿公殺公于狄宋立戴公狄載至徙楚丘子成公遂遷昆吾凡三十有五世而衛亡秦二世時衛封滅不見經有小王成公公上趙陽羌師辟閭析龜北宫強梁會庌羌憲祝固祝國祝史史朝史朝史桑太叔卷子南公世叔仲叔石駘石伯公叔子叔公明公孟公孫子髙公析公甫公荆公文子文子伯子玉子郢子強子季子齊夏戊夏丁將軍右宰司馬司寇及左右之公子蕢為司馬與石聶彌承禮免勉左右伋壽南朝蒯輒頑衎林凌稷牧冷嗣眷兼孫孟𢎞洪璧辟憲孺黔渠朝世監寇針文齊開彪孔之氏𢎞唐改為洪朝錯史作朝又作鼂孔達非宋出孟亦與魯異如衛經雖嘗為縣長張氏之後以禁異姓復為衛不著其懸氏懸潘氏求氏仇氏裘氏纂非刀裘也康氏衛氏戚氏傶氏濮陽氏元氏元咺氏常氏商氏凌氏因采者也武公孫耳采于戚後為孫氏一作傶集韻傶邑姓音簇凌即凌人商乃鞅封仇見世本裘之轉陶叔授民為陶叔氏司徒氏司徒定四年非宋司徒武公生季釁采于寧九世居卿為寧氏周威王師寧越齊威師寧戚孫權啓吳四世而歸于晉又有厲氏皓以秀奔魏改為厲氏春秋之時惟魯衛希王政武王克商以毛叔鄭從史記武王克商尚父牽牲毛叔鄭奉明水劉原父得毛伯敦疑為鄭穆王時有毛班郭以為毛伯衛之先成王以鄭為三公有毛氏毛伯氏毛庶氏也有衛過得三毛伯世采武王之封母弟也惟季載少使食于沈成王立為司空爰封之冉曰冉季是為那􅳙有冉氏那氏􅀈氏􅳙氏冉即那見國語冉耕冉會姓纂出叔山冉妄傳多作𣆀尤繆春秋尹氏訟𣆀啓鬭章囚鄭𣆀伯亦皆作耽太史公𣆀作冉或以為借不知其誤今亦或􅳙乃𣆀厖國故雲安冉本巴東蠻不可不辨然記皆謂季載封沈唐沈氏表云季載字子揖封沈按成八年晉獲沈子揖豈季載哉疑沈乂耽之訛不然或聲之轉餘詳少昊紀告分南北南後入晉北入宋有告氏郜氏國姓之字古少從邑其從邑者皆出後世朱曽之類反謂後世去邑妄矣雍伯入周後有雍氏雍氏音擁又于用切與姞雍畢𨽻為雍叔繡居錯文公侯之縢三十有一世齊滅之嘗一貶子尋復世本云錯叔繡封縢漢志以為懿王子誤有縢氏滕氏騰氏卜氏滕叔氏公丘氏錯氏姓苑宋大宰錯君又有􅀈並去聲姓纂云溫泉多此姓文公薨畢公髙入職焉姓書文王少子子季孫邑潘既復分龎裔孫畢萬事晉獻公滅魏而封之十世而斯始命文侯師子夏子方惠徙大梁又八世虜于秦始皇二十二年有畢魏藩番龎吕獻豫苪垣新王吕出魏犨子錡王氏出信陵君孫卑子望京兆山陽番同潘係見食志豫讓畢陽孫見國事及魏強伯夏曼多令狐宇文新垣葉大夫之氏陳留傳新垣衍居大梁虛為梁垣氏潘後又周令狐整為御正賜姓宇文曽孫元超唐復之德棻楚綯系也華侯采馮城為馮氏有北燕畢後采馮亭春秋有馮簡子杜云歸姓然無考後漢馮魴亦云魏之攴别采馮城東觀記魏之别封曰華侯華侯孫長卿食采馮城馮城為氏信都馮和孫跋為北燕十一年武伐紂原公把小鉞原莊公後亡有原氏佼氏原仲氏原伯氏跪氏姓書陳大夫原仲後英賢傳原伯氏絞之然後原貫在絞前已百年鄭有原繁與原仲所謂南方之原也荀侯諸侯之伯晉滅之為公族後逝敖為荀氏郇氏旬氏孫氏孫伯氏夙氏程氏中行氏伯宗氏籍氏席氏投氏投壺氏風俗通云中行穆子後姓纂引世本為仲行孫息食知為知氏智氏孫息後為三族一公族逝敖生林父為中行將謂荀中行氏一林父弟首邑于知為荀智氏一逝敖曽孫歡食邑程為荀程氏後漢荀恁一作郇智果諫謡不從乃别族于太史為輔氏汲古文晉武公滅荀以賜大夫原氏世族譜荀侯荀姓魏正平有荀城故或以為鄭地之荀豐侯坐酒亡國以故負罌于首以為式爼豆中有豐即鄉飲禮中豐侯也都斫一木為之象豆而卑一同坫爵射禮置罰豐西階下音訓謂豐國君以酒亡國故以為罰爵之名三禮圖云射為罰爵之豐作人形豐國名其君以酒亡國戴盂以戒酒故崔駟酒針云豐侯沈酒荷罌負缶自僇于世啚形戒後李尤銘曰豐侯荒繆醉亂迷逸乃象其形為禮戒式也後有豐氏酆氏出鄭多仕鄭姓纂第十七武之穆四于邗為長先是唐有禍成王以封子干子􅀢父而謂晉十一世文侯勤周受錫豫昭侯立其弟于曲沃五世而曲沃滅晉君之五世文公遂霸諸侯又十六世而析徙端氏曲沃武公滅晉周命為晉君有晉進戊恭整舅咎羊甲獻射席籍陽欒司籍或以籍席出于荀及士貞樓季太戊叔魚叔向叔夙季夙季嬰楊食食我凡閭伯宗伯州公仇公師弗忌臼季子羽之氏叔向叔夙見世本公師成師後見辨證凡閭見賈執英賢傳及韻姓纂云子羽晉公族復為楚邑大夫然鄭衛皆有行人子羽韓起庶子亦曰子羽云其以采者絺郤步涉畜鄐臼傗苦冀解張楊陽端續溫祁塢羊介翼盂駒州欒及揚干銅鞮羊舌祈夜長魚五鹿東關却州晉既分乃封其君于端氏其苦成庫成古成車成出于苦晉校尉車成將欒書下軍及嘉若欒出于欒靖侯孫賓采欒隄遆蹄鞮鮭出于銅鞮共六姓澄城鮭縣有鮭姓自云鞮氏避事改之鞮纂文音隄犨分于郤郗出于絺自步居溫則為步溫郤至采溫由祈易續則為續祈狐鞠居采續為氏先軫封原胥臣為原大夫次卿也故先縠曰原縠繼于彘且居徙霍為霍伯有先氏左行氏國語且居蒲城伯後受霍為霍伯康王以虞之幼子公明為賈伯曲沃滅之有賈氏右行氏賈孫氏晉滅以封公族狐射姑即賈季姓苑以賈孫出王孫賈者妄出公生伯僑封揚曰揚氏揚孫氏秦大夫揚孫為穆公戍鄭密謀取鄭覺奔宋為揚孫氏雄其出也出公遊齊生僑歸周封于揚而溫則狄滅之僖十一溫子奔衛叔虞後或為狐氏世本有大狐氏小狐氏溱為大狐氏射姑為小狐氏大狐容即大戎氏云唐叔子孫在者然狐本重耳外祖狐突郤陽狐皆采溫故後以狐為溫出蓋晉後以封狐爾韓武庶子幽世失國宣王中興韓討不庭錫之梁山奄受北國是為韓西衛滿伐之而鄱于海韓侯為燕師所滅宣王錫之外紀云平王時晉滅之曲沃并晉有韓萬為戎御復采韓原至景侯始命凡二十有四世秦滅之萬唐叔十一世孫預以為出曲沃故或以為成師之子俱妄有韓何橫俠罌言賈褐李吕賈謐韓壽子隨外家姓至後充復詔所謂以恩繼情者李嗣昭本姓韓又周賜韓褒侯吕陵氏後為吕氏及韓侯無忌公族韓褐韓籍韓嬰韓信信都之氏籍嬰信三韓見姓纂韓褐見英賢録公族乃厥子無忌曰公族穆子厥之玄康采趙藺為藺氏哀侯少子婼采平為平氏婼氏張氏灌氏良五世相韓佐漢灌夫父張孟幸于灌嬰因氏信之後又有韓餘氏信敗于參合後亡入胸奴景帝時子頽當赤來降餘胸奴中為韓餘氏于之後有于氏邘氏盂氏晉有盂苪盂大夫也唐邢之盂縣而邘則在懷州蓋分封者万紐于氏東海于公裔孫隨拓跋鄰徙代為万紐于氏至孝文復為于外都大官新安公栗磾六世謹從孝文入關始籍長安應侯次四晉滅之有應氏深氏韓詩云成王戲弟以桐葉圭封之周公曰天子無戲言請封之王應聲而封曰應侯吕春秋則以為封叔虞狄子寒侯偕武穆也後各為氏唐表云成王封母弟孝伯于狄城為狄氏孔子弟子有狄黑廣韻云春秋狄國之後漢有博士寒朗乃武王子寒侯後而遊俠傳寒孺乃以為出后寒姓書以韓寒聲變則非也然朗説為姓寒周公之祚七長魯禽父次凡伯為凡氏􅀈氏汜氏次伯齡封蔣男爵後以功侯二十二世併于楚有將氏定氏次靖淵封邢侯爵滅于衛有邢氏陘氏僖二十五年玉篇作郱輕干切非是乃金邢丘正音形次祭事文王受商之命祭叔為卿士祭公事穆王祭伯襲國有祭氏謀氏訾氏祭公氏姓苑云祭氏以不祥改為訾音紫祭公氏見姓解次胙次茅胙入南燕有胙氏作氏姓纂茅有茅氏茒氏苑本立絞切俗以為茅若夫周𨽻之國則伯鹵之孫仲奕武王封之閻晉滅之有閻氏奕氏大野氏一云昭王少子生手有文曰閻康王封之閻城一云唐叔後成公子懿采于閻晉滅之俱非晉滅之以賜公子懿爾周書閻慶賜大野氏至隋復唐姓録以仲奕為太伯之曾孫亦非虢仲虢叔文王敬友二卿國語亦母弟也馬融云叔同母仲異母仲曰西虢後遷上陽為南虢而留者為小虢虢晉滅之東虢滅在春秋前西虢下陽滅在僖五年小虢滅在莊七年叔為東虢亦曰郭叔見王會解郭輔碑云王季中子文王卿士采于虢武王錫封後世謂之郭平王奪其地與鄭楚莊責王乃求其裔孫敘封之陽曲曰郭公晉滅之有虢氏郭氏制氏若上陽夏陽西郭南郭南伯之氏又李子和本郭氏賜鎦康公卿後有留氏劉氏康氏官師氏師氏帥氏鎦後世作劉晉師昺以晉諱為帥氏文王之異弟輝之子渠封岑為岑氏唐表作耀武王封之亦有王氏虔仁氏鉗耳氏箝耳氏虔仁氏仁氏此王季之穆也王氏望馮翊狀云王季第四子虔仁居湟水西羌音訛為鉗耳隨改為王氏唐有王宗按隨九門令鉗耳君徹頌云朝邑人王子晉後避地西戎以地為姓今廢天德軍牟那山有鉗耳觜故英賢傳云鉗耳本胡姓然以為子晉後則非矣成王侯次子于翟為翟氏姓纂云少子非又封其攴于彤為彤伯宗伯是為彤氏廣韻彤又封幼子臻于單單世卿為甸侯有單氏靖氏單伯氏旗氏柯陵會單襄公卿士單朝也與魯之單伯異昭王子成公男後有成公氏李利涉編古命氏成公生與李斯男由同時遂不仕宣王封庶弟友于咸林曰鄭一作棫林襄八注鄭子國為司徒死戎難子武公以夾俌賜虢鄶十邑徙拾爵伯二十有二世韓滅之厲公居櫟文公徙新鄭漢侯成碑云文王之後封鄭鄭共仲賜氏曰侯非有鄭藺語京將良孤尉具司髠燭禆諀堵泄泄羽渾然遊逰駟國渝俞喻諭軍會雅邃繻罕豐賸歂僑參眅薑蠆印頡梧倏皇蟜佚衛五十姓遊望廣平逰望馮翊禆通作諀渝通作喻蟜固出子蟜衛青乃鄭季孽子穆公十一子子然子二子孔三族亡子羽非卿存者罕駟豐印良國遊七族也及田章封具羌憲強梁趙陽史龜去疾大季公文公德共叔世叔大叔子人子強子駟子罕子孔子晳子國子遊子寬子然子羽子軒子革子旗伯有馬師東里行人西門西宫京城俟伏賀吐之氏凡三十六子旗豐施之字子人穆公弟語字吕春秋鄭大夫公息房而世叔討論乃子太叔遊吉西宫則鄭執政所居苑纂未詳侯植從魏孝政西遷賜俟佚氏又賜賀吐氏姓纂引世本云宋司城子革又云季平子支孫為子革氏按二國無子革乃七穆子然之子丹之字奔楚爾子晳一云楚出亦非宣之子三一尚父為楊侯地紀熊渠伐之一食陸卿曰陸侯陸氏譜宣王支子一封謝丘為謝丘氏見盟會圖云皆幽王封人表有謝丘章平之子三長曰精封縱為縱氏精縱氏見英賢録次曰唐封梁山為梁伯千姓編云平王少子唐少曰秀封汝川謂之周十九世併于秦為周氏併其地為汝南郡烈繼文升興晏安宏明隱壽容休雄揮寬員成雍十九世雍生秀秀生仁漢興復封汝墳侯周仁也號正公或云赧出非長安沛二望赧後楊侯曽孫失國平王以賜晉封叔盻後氏為楊洎堅為三世而為唐有梟氏屋引氏越勒氏普六茹氏煬誅元感賜梟氏周賜楊紹崖引氏一為君口引氏楊忠為普六茹又為普陋如楊粵為越勒並至隋而復惠之子帶封甘曰昭公子成公世官王所有甘氏甘士氏甘先氏甘莊氏染女氏鑒氏即叔帶甘先甘氏姓染見姓苑頃之孫武強滿為武強氏姬氏周氏唐以諱改姬氏周望長安簡之子儋季為儋氏子括景之孫封陽樊後宅無終為公翁陽氏陽氏陽樊氏無終氏陽氏譜云春秋末宅無終因陽樊而易氏仙傳拾遺陽翁伯適北燕葬父無終山為右北亭人天祚玉田事亦見于寶記范通燕書云後有雍于無終山獲玉是也名世以陽氏為景王少子敬之子封鄄為鄄氏靈王之太子超古幼有成德以諫廢年十八而賓是為晉字子晉或云名晉一云諡或云字子喬坤監云字開山俱妄子宗敬為司徒號王子家平陽為王子氏田氏緱氏王人氏王氏李氏拓至氏可頻氏乙速孤氏王氏琅琊祁諸房皆出子晉可譜者以多仕齊周書王秉王興並賜拓至氏王雄太原人貞觀志西魏賜為可頻太原王顯後魏賜為乙速孤遂為醴泉人召康公願封燕名奭乃實字世紀以召公為文王庶子而富辰所言無召乃以郇為召蓋以下泉言郇伯而黍苗言召伯爾非也傳言公封燕九世惠侯始就國亦妄康王復為太保年百有八十其長居燕而攴襲召召世為伯王安石云元子既國燕次子守者猶食卲也有召氏邵氏召伯氏東陵氏傳又有奭氏盛氏非也其分于唐者為陽伯齊滅之昭十二年齊髙偃納北燕伯于陽左云伯欵迫逐遷之然本曰唐即閔二年滅者是也北燕歸國不達于革凡四十有三世秦滅之始皇三十二年太史公曰燕之社稷血食者九百年于姬姓獨後亡抑召伯不鄙其民有亡執之德也後有燕喜攸繆釐噲快噲之氏秦已卯年亡喻本音快盛伯子姬姓之長降于齊有盛氏痛氏穆天子盛姬國春秋書成公羊云盛也韻譜姓纂云先姓奭後改為盛蓋以漢元諱意其字曰盛而召公之名字皆為奭也盛姬卒王改其族為痛氏急就章有痛無忌密公榮公瑕公萇伯賈伯芮伯桃叔尹公康公鞏伯甘單公暴公詹伯家父巷伯方叔卭叔世卿家後各為氏又有尹公氏竒氏榮叔氏南宫氏榮伯氏芳氏竒出尹芳出方伯輿大夫有瑕禽服辛世本暴辛公作塤宋云平王諸侯樂書平王時人風俗通諸侯也賈芮等伯非爵芮為司徒寰宇記封芮為附庸妄齊侯滅穀秦穆滅滑楚文滅息晉文滅巴魯滅項巴楚昭妾巴姬國與風姓巴别輿地廣記云武王封商姓為巴子七國時與蜀俱稱王張儀虜之為巴郡有穀氏滑氏滑伯氏英賢傳息氏息夫氏風俗通巴氏通氏吕春秋項氏劉氏辛氏羽敗並賜姓劉項伯封射陽侯與桃侯襄平皋侯他及先武侯皆為劉後周賜項亶為辛氏召公俌周西伯夫人紹兩交龍不樂遂娠生子有文在手曰盛因名氏之年十有八封之譙侯晉武公滅譙有之為譙氏焦氏李利涉盛氏譜孔至之説同以為譙侯因為望其地譙國焦縣漢東之國隨為大楚滅之有隨氏少師氏世本楚滅鱗宋滅之宫虞滅之紀遂齊滅之岐鄗周廢之養頓徐胡入于楚肥鼓魏焦入于晉觚則麗屆于秦而鮮虞則在狄極入于無駭而隗丹暌載逢冀冥主亦衰除矣後各以國令氏甘鱗主逢觚欒等見潛夫諸論載姬姓見風俗通考王封弟褐河南曰東桓公至孫惠公傑分其子姓于鞏以奉王曰西惠公號二周赧王之立二周分理四十九年秦取西周遷東惠之孫咎公于􅓆狐王崩秦昭取西王稽次年七年秦莊襄取東西周地而以賜人聚為周君祀東周後有咎公西後有昭文君西周王城東洛陽也史遷于此極為紊亂二周封滅歲月俱不能詳蓋時二周微甚紀録蔑載二周比亡才七縣譜云秦不絶其祀以陽人地賜周君使奉祭祀于周亦未深愧矣輿地廣記徙西周君于􅓆徙東周君于陽人聚誤矣應二周以來詳見譜圖中山武公東桓公子也厥後桓公荒淫不恤國王問晉史餘曰今諸侯孰先亡對曰中山乎二年而魏拔之處之靈壽烈王十二年國世本中山武公居願桓公徙靈壽按樂羊為魏拔中山封之靈壽史言趙武靈以惠文三年滅中山遷其君于膚施是也漢于此置靈壽縣蓻副輿嗇种稷賓校顯黨惠偏公富大泰亞辟組驪治棸治鞠鞫儋技支宰忌舞蝮三十二宰忌周公後幽王內史棸子乾封元年改武惟良為蝮氏風俗通文出文王隱公時有武氏子唐書平王世子手文曰武為武氏妄及王孫王叔王子賈孫王史內史公祖叔服太伯黑肱黑肩西周武強司空陳留之氏皆周枿也武公世子稱西周氏共王子圉後為王史氏鄭有王子氏齊衛吳皆有王孫氏俱出周王惟楚王孫出伍員英賢傳陳留姬姓國因為氏漢封之衛唐表云封周仁考之非文帝時有周仁無封也元鼎四年武帝至河南求周後得姬嘉以三十里封為周子南君光武復封子衛次妃有娀氏曰簡狄一作東翟即簡易也于寶作索倓繆書中侯云玄鳥翔水遺卵娀簡易拾吞生契封商後萌水易注云易疑洛娀簡在水中浴而吞卵生契後人當天應嘉乃以水易為湯吕春秋娀氏二佚裔為九成之臺飲食必鼓帝令燕視之鳴謐隘諡隘二女爭摶之覆以玉匡遺卵北飛二女作歌云云故史有行浴遺卵之説列女傳曰姊妹浴于玄丘之水即晉丘之水今浚儀清丘一曰玄池寰宇記簡狄浴于晉丘之水云云即此水然湯自從昜不從易也仁而有禮飲食必鼓感乙致胎乙燕也特男子之祥感遇生子非必吞卵厯代遂于禖壇立卵石故束晳議禖壇有石以為吞卵之象經無文乞除之張掖記謂所感在縣界雞頭山之黑水云簡狄所浴重丘之水也去俗都逺矣疈而生􅀢于寶云前志所謂修已背坼而生禹簡狄胸剖而生契􅀢契也古作􅀢從奴蟲也􅀢一卨非一作偰聰明而仁堯命司徒使布五教而民輯及虞不廢是以受商賜姓子氏商人謂之玄王所封乃華隂鄭縣有欒都城故潘邑也世本謂契居蕃是矣中侯握河紀云棄契皆堯封長發箋云堯小封舜末年益為大妄也子昭明居砥石世本復遷商生相土克承商業始居商丘出長諸侯威武烈烈至孫冥為司空世事虞夏十有二世而湯遂興傳二十有八王國幾亡者五而紂遂失天下姬武王居之乃封其子武庚于弼偝即鄁衛地弼叛周公攝伐殺之更求帝乙之元子魏子啓邦之宋户東夏為周客魏即微紂之母兄母末後生之商法不得立故成王曰殷王元子而樂記左氏史記云武封之妄也微圻內國古胄子雖遷爵而班爵不及故者以故官稱故二微為宋公猶以微之號終三十有二世君偃不道齊魏楚戮而三析之偃諡康見吕覽國事有幾微衍尾沃據卿穆止舍近宋弼鄁㔨石母戚懷既椒督沙猛政正桓完牛牢遼寮虞華耐還狂臼朱耦酁郃邉坎冀仲靈祿虺勃聖省牽伉錯鋭兊左宗正所六十四乂有楚匹並音所錯音措牛金後為牢又為遼魏將以難為尞周遼兀復為牛矣朱暉傳注東觀記先宋微子之後以國氏宋滅奔碭易姓朱氏後徙宛風俗通又有宣云宣公後邵姓解有卨契二氏繆及王夫皇父空相事父不更幹獻申屠三伉魚孫圍龜樂王白馬黑夷鳩夷不夷艾歲西鉏中野即利子朝子奢子蕩子罕右師左師司城司寇司馬司徒右歸公朱陽門季老微生孔父侯老男并官武信復三十八因夷不夷幹獻見世本魚孫白馬見風俗通不更不茅見潛夫論墨夷見邵氏姓解世本楚大夫公朱髙出宋公子朱宋義事懷王封武信君為氏與季老男氏巨辰經氏三字姓因夷不茅西鄉已氏木門東鄉祝其及木坎合向皇樂戎御魚鱗蕩氏于采也祝其出戴公子祝其而齊靈子牙母乃戎子或又冇鍾氏之出州犁木氏出木門風俗通宋大夫西鄉錯尸子隱者西鄉曹又南雍闕為皇父漢皇父鸞乃為皇甫其支于戴者鄭取之有戴氏災氏災氏隱十年鄭伯伐取戴附庸不言滅姓書戴公後以諡為氏假采禇為禇氏石氏禇師氏恭公子字子石石彄仲思之曽湣公生弗父何義國其弟四世孔父嘉之難子木金父逋于魯為孔父氏孔氏生祁父為防大夫子防叔生伯夏伯夏生叔梁紇字叔梁姓解有叔梁氏妄紇封聊生皮及尼孟皮襲聊為聊氏姓又有棸云出聊晉棸儔音紂又音鄒尼母顔野合謂非正聘詳少昊紀家語等有廟見等事妄也生而頨頂故名丘而字仲尼尼古夷字頨蓋圬字坳貌故世本史記家譜皆作圬頂緯書言孔子反宇世本云反首張面言頂上窳也淮人謂堰水平浸為圬然字書集韻舉音為篇説云頭妍從翩誣矣世言顔氏禱尼丘山而為名字更著之于魯圖豈不以山川之義哉四十有九表堤眉谷竅參臂駢脅要大十圍長九尺有六寸時謂長人事詳世本及孔子家譜祖庭記等有生日辨在餘論廣博聖武為魯司寇齊人患焉歸女季氏子乃去之厯于諸侯莫能用也十有三年而歸于魯敬王二十三年去魯哀十一年冬反魯厯周鄭宋曹衛陳楚把吕齊梁頓牟云厯七十國過也然後樂正禮得乃刪詩定書繫周易作春秋以示炯戒自惟商後而宋不足徵乃述考志追商頌以尾魯故曰明王不興天下其孰能宗豫不亡幸于宋也反魯蓋六年而沒敬王之四十有一年也商頌宋頌也頌襄公之詩耳敘詩者以為正考父所得商詩中言湯孫而毛鄭遂以為太甲中宗之詩妄也夫言奮伐荆楚襄公事也萬舞有奕非商樂也蓋宋有商王之廟而詩為宋祀之詩此常理爾故韓嬰馬遷亦以為美襄公然遷以為考父作則繆矣考父佐戴武宣非襄公時蓋因而誤之此宋也而謂之商不志本也六藝論云文王創基至魯僖間商頌不在數矣孔子刪詩時録此五章豈無意哉商邑翼翼四方之極我有嘉客亦不夷懌豈能忘哉景山商墳墓之所在也商邑之大豈無賢才哉松柏丸丸在于斫而遷之方斫而敬承之以用之爾松柏小材有挺而整布衆楹大材有間而靜别既各得斾則寢成而孔安矣拱成羣材而任以成國則人君髙拱仰成矣是綢繆牖户之義也疏云景山泰山誤矣商有景亳之命而衛詩亦言景山商之山也顧伯弼乃以為宋人幸周室之衰又謂夫子存之者以見二王之後有此顗覦烏足知聖人哉初武丁封季父于河北曼曰蔓侯有曼氏蔓鄤氏優鄧其出也廣韻云封河北為鄧誤杜云鄧城在頴川邵陵滅于楚有鄧氏登氏鄧侯氏養氏𣆀氏騅氏莊十六年滅優人後有優鄾憂氏蔓姓鄭之分楚武鄭莊妃祖庚封弟文于苑有苑宛庚氏左傳有苑何忌苑鎮碑失之封子于權楚人遷之卶處為卶氏那氏權氏莊十八年滅今為那不知卶也姓纂以權出鬭緡非太丁侯母弟堂陽為堂陽氏城冢記蕩陽番署御姓國也四時荼共梅稚定巢郅同黎比髦扐假瓦鐵繁沛來向施蕭飢索空桐鮮虞皆子國也二十六詳國名紀西伯戡黎武王復以封湯後黎侯豐舒奄之有黎氏犁氏六韜決大疑云甲子武王封湯後于犁殷後于宋三百以為殷社黎犁也即黎陽故陳球碑作犁陽商國萊侯與太公爭營丘及齊復入萊共工浮柔奔棠晏弱遷之郳有萊氏郲氏浮萊氏浮氏在國東曰東萊蕩則秦滅之一曰湯氏巢則吳滅之昭二十四比干則受刳之干四月四日生武王封墓貞觀十九年再封之贈太師諡忠烈梅伯則醢之矣有蕩氏比氏梅氏枚氏梅伯氏武王封伯玄孫黃梅曰忠侯居楚鄭間以梅為氏韻云梅伯本出干姓歐文忠梅氏銘云逺出梅伯世久籍不明匆也比干死子堅逋長難林為王氏林氏王望及則河間林王為十德之門邵氏云少師比干後鄧名世久為無失之成王以商之六族條氏徐氏蕭氏索氏長勺氏尾勺氏錫魯公復以商民七族賚康叔陶氏施氏􅀢氏錡氏樊氏飢氏終葵氏皆商之族分封後為民乃商之巨室故賜之潛夫論􅀢作繁飢作飢云皆商之舊姓桃子蕭姓春秋時猶在鄭穆公少妃桃子蕭人則楚滅之宣十二太心采桐門為還氏桐門氏太心戴公子衎後是為空桐或云太心始萊蕭為氏非夏有蕭矣還蕭大夫還無社蕭道成遷劉宋七世號齊衍代之為梁世四易入于陳又有孛氏蛸氏叨餮氏齊武改其子巴東子響為蛸梁武賜豫章王綜為孛然宋先已有勃氏武陵王已敗賜為叨餮氏孛名世作悖而乙氏湯氏殷氏商氏祖氏亳氏薄氏北殷氏殿氏武氏皆湯後也姓書乙出天乙非本吞乙爾江南湯悅本殷崇義改而殿乃崇陵間商殿全袒姓殷徙撫因訟令以似改之次妃塦豐氏曰慶都生堯有紀篇言或作陳鋒傳又言堯母為有窮氏妄次妃有陬氏曰常羲生而能言髮逮其踵是歸髙辛生太子康及月十二山海經云羲和者帝俊之妻也生十日又曰帝俊妻常羲生月十二蓋月當為日十日者謂以日名如甲乙丙丁之類云羲和者乃常羲有陬氏也大戴禮名常羲傳作尚儀作常儀又作常宜士安作常耳失之陬音輒見大戴史漢世紀作娵訾氏非也劉敬叔異苑云陬訾氏生而髮與足齊墮地能言及為帝室八夢日而生八子皆有賢智世號八元伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍也年代厯云陳留氏生八元蓋誤有陬為陳豐誤陳豐為陳留爾八元實沉閼伯晏龍叔戲巫人續牙猒越也八元為虞布五教十六相十六臣爾姓書以貍虎豹為八元後氏宜非實沉閼伯居曠林干戈日尋后帝不臧遷閼于宋是為商沉于大夏是為參後有實氏參氏閼氏遏氏堪氏奮氏龎氏搗氏商丘氏實沉為隂陽宫閼伯為倐火大神續牙友舜于貧貴而遺之為續氏經云帝俊生身是也人表韓非説疑淵明二八目皆作續牙蓋𨽻者多以牙為身也晏龍事虞為納言是主琴瑟生司幽是為司幽之國有龍氏即龍也巫人封巫為巫氏生􅪝民􅪝民盼姓經有􅪝民之國韻作􅪝國誤其侯于蜀者更生號後分苴苴侯好于巴故巴仇蜀蜀伐苴苴侯奔巴巴求援于秦秦之滅蜀遂及苴巴有蜀氏苴氏葭氏蜀志云帝嚳封攴子于蜀是為蜀侯秦滅之為巴蜀二郡蜀王弟葭萌封苴叔戲生搖民搖生居越生女且為搖氏漢海陽侯搖無餘世以為越後未悉爾髙辛遊海濱過棘城闞顓頊之虛樂之暨其歸居猒越于昌黎邑于紫蒙之野號曰東胡漢初敗于凶奴退保鮮卑之山曰鮮卑是曰烏丸隨國經山在栁城東南二百里又棘城東塞外及遼西北百里亦有鮮卑山皆其地杜佑不能詳魏初莫護跋部入遼西置國大棘城之北曰步搖徒河涉歸進拜單于二子長吐谷渾置國甘松南孫葉延為吐渾氏次若莫廆遷徒何之青山以大棘顓帝之虛徙焉子皓遂王燕前後南燕皆出也詳餘論又有豆盧賀蘭慕輿慕利慕護庫狄豆盧寧本慕容歸義賜姓北人謂歸義為豆盧也賀前本鮮卑依賀蘭山谷者為氏及裕慕暮之氏西秦鮮卑大人裕苟降汴有慕氏出此姓苑又有暮氏晉書慕容有熊氏後因山號妄柔僕羸土亦帝之裔末也山海經柔僕之國帝俊之生已一曰贏土髙辛崩而帝康立襲髙辛氏康見年代厯史傳皆作摯故髙誘陳伯宣以帝摯為少昊而以少昊為嚳之子尹子遂有少昊逐弟之説妄也按少昊在位八十四年摯在位九年摯立不善而少昊之德在人如此夫何疑哉世紀云摯母于四人中班最下而摯于兄弟中年最長故登位後立弟放勳為唐侯按康音致人必誤為摯而繆為少昊爾世孰有名曽祖哉帝康之立不善九載以其仲立是為堯故議郎衛宏云摯立九年而唐侯德盛因禪焉故世紀云摯政軟弱而唐侯德盛諸侯歸之摯服其義乃率諸侯造唐朝致攝焉又云摯因委心為臣堯知天命所在乃受而封之髙辛蓋意逆之言有子玄元堯封之于中路厯夏侯服國盡為中路氏路氏辛氏僑氏囂氏囂見世本僑出僑極姓書辛出堇非堯封舜故舜郊嚳而商周用禘姓也者性也與生俱生者也山行十驛形不脫祖水行千里性本其處山有形水有性是故性不可易子孫十世不免性類我者諸薑之性𢎞諸姚之性仁張王之性寬李趙之性慤劉范性急羸偃性雄吕尚性狷熊羊性奰姬黃性廣曹儈性𥚹豈聖人固為區哉所以别亂兆明人義也傳曰男女同姓其生不繁行路有禮惟其原有以使之也余起路史既歸天下之姓氏見孔氏之出髙辛老氏之出少昊既為周著而後怪佛者之來獨靡適從不姓不氏而孤出乎神州之外為其徒者纍垂出沒百千萬億至亦自蔑其姓氏而從之嗟乎彼之教以滅道來不知所從去不知所往不仁不敬理固應爾而乃不知先王大倫實亂于此今夫削頭鉢食羣趨而輩脅者誕謾誣讕莫不倀倀自以為得髙視濶步至不認其宗祖父母兄弟是豈名人也邪冠婚喪祭此人道之大者也自天子至庶人兵戈戮殺亦不過此四者而已而今也冠昏易亂而無以酬生喪祭蔑薄而莫以報死而又奚以生為孔子曰窮理盡性以至於命父兄子母所以窮理飲食裘葛所以盡性而歸根守白凡所以至命也不窮理不足以盡性不盡性不足以知命窮理至命固非可獵等也而彼佛者每得其偏而不蔽其全故知性者必達乎理命知命者必達乎理性每執一見自為至足亦可謂不知務矣吾夫子亦何嘗蔑性而薄命哉雖然弟子之惑滋甚若老之説修而上之至于無上清虛之境人皆空濛散為清陽之氣虛無縹眇無有形質從佛之説修而上之至於果位入三摩地人皆罔蕩斂為善爽之鬼寂冷坐結弗復變化而無有君父妻子朋從之與往來且以父祖子孫人之所以為際而冠昏喪祭生之所以為奉者也奈何有父祖而不得其所以為奉有子孫而不得其所以為際父祖子孫冠昏喪祭既無以自盡則亦奚用于有生寂冷坐結觸輒散弛而無有形質則亦奚貴于有我哉究言索理固不足以滿神禹之一笑是以聖人于此必因乎父祖子孫冠昏喪祭事上而為之制使之不失其本原而後已然則教者其可以不嚴所道而沉迷乎寂滅誕謾之區哉自古及今亦有不仁義之真仙若無君親之佛覺乎别生分類人道之極摯聖人之所甚急而不可後者顧可厭而棄之歟路史卷十九

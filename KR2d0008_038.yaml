body:
  text: 路史卷三十八宋羅泌撰餘論一路大之訓太常主簿劉君清之逮泌之史何以謂路謖按爾雅路之訓大路寢路朝路門路鼓路車路服皆以大為之稱路朝路寢亦或用露故或者謂設之路側云露之外惟弗得其説爾夫路之所以謂大者叵不知也據遂人職自遂上之徑至于川上之路凡五鄭氏謂徑通牛馬略容大車塗容乘車一軌道容二軌路容三軌其説蓋本匠人王城之經塗九軌環塗七軌野塗五軌環塗以為諸侯之經塗野塗以為都之經塗差之諸侯之環塗五軌野塗三軌都之環塗野塗皆三軌則遂人之路容三軌道容二軌以至徑容牛馬理宜然也又按宫中弄謂之壼廟中路謂之唐而堂塗謂之陳一逹謂之道路二逹謂之岐旁三逹謂之劇旁四逹為衢五逹為康六逹為莊七逹劇驂八逹為之崇期九逹為逵塗莫枝于逵莫小于徑莫大于路故兔罝言在彼中逵在彼中林以中林之德晦中逵之德顯也洪範無有作好遵王之道無有作惡遵王之路以作好之利小作惡之害大也塗一曰旅亦謂之行所謂旅樹微行者國語司空視塗蓋藏其數而周禮量人掌天下之塗數皆書而藏之欲知所逹逺近修否也道若大路然豈難知哉故路史者亦大史之云爾公曰善是皇王大統之義也無以易海國從北塞下仰視仰極且在人北凶奴之北地之邉陲北上視天復北髙而南下日月之道亦復在上從日南縱望斗南諸星仍復在南日月之道亦復在上會稽流沙乃九州東西極際今從流沙之西視日小大與會稽海上無異烏弋之國去長安萬二千里西行百日至于條支國臨西海問之惟云長老傳聞有昆崙山未有至者韓愈送嶺南節度使書云海外雜國若耽浮羅流求毛人夷亶之洲林邑扶南真獵于陀利之屬東南際天地以萬數維未究悉而佛告阿難閻浮提海中間平陸有三千洲正中大洲東西括量大國凡二千三百所其餘小洲在諸海中或三兩百國或一或二至于三十四十五十蓋有之矣大食之國在珠崖南其王使船齎糧南去窮之八年不極其西南崖計糧有限途取莫繼而還八極之際何可得而既邪八會文之初乾天也本乎三畫之天字本只如此古文作非謂一而大與乾同音故梵語竺乾為竺天班固以天竺為乾竺釋名云天顯也在上髙顯也以舌腹言之青徐以舌頭言之天坦也坦然髙逺故異域有狄因切近以贑人亦為此音也川地也本乎六畫之父母之道也川古文坤字見漢服志古文又以為順字坤順也天陽物故天乾一音地隂物故坤地兩號水坎也本乎篆為水一居中火離也本乎男女之道也篆為火二居中水內景故一在內火外景故一在外天地自然之理不可易也而亦不可得也豫嘗以智索索之而不可得以離朱索之而不可得以子野索之而又不可得三索之而不得也乃以罔象索之而得焉故忍與流俗言也今夫囦有中孚之象而非有小過之象焉故其繇曰信及豚魚又曰非鳥離之鯤化為鵬正為是也囦近坎非近離此可與流俗言哉後世非為飛而囦為淵流為蜚淵已失之矣而李騰乃云朱為非反非為􅘢此何等語邪非古之飛字史漢用蜚蔡湛頌與孔耽碑皆以飛為是非字古通用也吾聞南丹洞陽上館為學士王龍賜説玉字之訣皆諸天內音非玄之氣自然成結八角垂芒精光亂視道君説遍皇人注之赤明玉帝于北土煉文亦火瑩發于字形瑶林枝葉皆成紫書而三皇內文皆三元八會自然成文諸仙皆謂鳥迹之始逮夫四目開運爰復甄符闡祕以惠黎元而天地之妙始黨䓪而不可制矣蒼牙法龍而書契作伯牛睹穗而時令攽玄律體雲少皓鸞皇髙陽科斗玉子仙書八眉龜兆伯禹象形牟光倒薤吕尚連錦周佚虎書史籕復伯氏雕殳子韋轉宿雖其屢變而俱本自然至于相期刻符趙魏之英與古始離又變而為上谷之羽人八分無岑之尚方徒𨽻與夫肝陽佐書主父行稿而或失其真矣然其天地自然之妙猶或存者頃豫嘗病世之説文字破碎大道胡言漢嗽讕哰􅀈拏而不可為解使後之人不幸不見天地之純古人之大體逮觀童氏錢書玉球集古若薛氏之鍾鼎欵識洪公𨽻纂𨽻續之書乃知往聖心畫猶有遺者于是自慶曰天地之純何嘗而不存乎史皇羲氏之意斯亦可以見矣世徒罪斯變古斯知草創豈能變古哉人自不之思爾若夫瓊羽之門連福之書四司所保青空捒名固玄名不著者之不得而窺也吾而窺之抑不知天之之捒之邪其譴之邪大素之年按春秋命歷敘自開闢至獲麟二百二十七萬六千嵗分為十紀漢嘉平中沛相計掾陳晃上言歷元不正謂自開闢至獲麟凡二百七十五萬九千八百八十六嵗故易乾鑿度春秋元命苞云二百七十六萬嵗每紀為二十七萬六千年廣雅因之均為荒誕按禮含文嘉推以上元為始起十一月甲子朔旦夜半冬至日月五星俱起牽牛之初是為歷本故鄭玄云上元者大素以來所求之年也唐李淳風推自麟德元年甲子上距上元甲子積才二十六萬九千八百八十載而僧一行以大衍數推上元甲子積距開元甲子亦止得九千六百九十六萬一千七百有四十是其日數也然則大素以來之年從可知矣夫二十九萬一千八百四十嵗而反大素冥莖此道之根本也惟賾于歷數之理者能知之近世邵堯夫以十二萬四千五百年為一會云自開闢至堯正當其中數故名雍字堯夫後世必有辨其學者以今釋氏又有所謂祕法華三卷者言開闢以來悉本廣雅而增益之譎妄尤甚其徒更鬼神之以誑流俗每見士夫更問不知其淺陋也且以疏仡之紀始自黃帝于今不滿四千嵗爾稍知氣數諸説廢矣何卷帙紛糾之足惑乎五龍紀按十紀二曰五龍按春秋命歷敘云皇伯皇仲皇叔皇季皇少五姓同期俱駕龍號曰五龍遁甲開山圗云五龍見教天皇榮氏云五龍爰皇後君也昆弟五人人面而龍身然以五音五行分配為五龍之名如角龍木仙商龍金仙之類而以宫龍土仙為父又言五龍以降天皇兄弟十二人分五方為十二部法為龍之迹行無為之化為十二時神是天皇在五龍後妄矣酈元水經云父與諸子俱仙治在五方亦見李善遊仙詩注今上郡奢延膚施縣有五龍山蓋出治之所也故漢宣帝立五龍仙人祠于膚施亦著地理志按膚施今𨽻延安五龍山在焉有帝原水黃帝祠九域志五龍池有黃帝五龍祠四在山上亦曰仙泉祠寰宇記五龍泉出山東一里平石縫雄吼甘美上有五龍堂而五龍谷水乃在耀之雲陽縣雲陽宫西南亦非上黨之五龍山也杜宇鱉令按諸蜀記杜宇末年遜位鱉令鱉令者荆人也舊説魚鳬畋于湔山仙去後有男子從天墮曰杜宇為西海君自立為蜀王號望帝徙都于郫或瞿上自恃功髙諸王乃以褒斜為前門熊耳靈關為後户玉壘娥眉為城郭江潛綿洛為池澤岷山為蓄牧南中為園苑時鱉令死尸隨水上荆人求之不得至蜀起見望帝望帝以之為相後禪以國去之隱于西山民俗思之時適二月田鵑方鳴因號杜鵑以志其隱去之期一云宇禪之而淫其妻恥之死為子嶲故蜀人聞之皆起曰我望帝也杜甫每每起歎所謂杜宇曽為曹帝王者據風俗通等鱉令化從井出既死尸逆江至岷山下起見望帝時巫山擁江蜀洪水望帝令令鑿之蜀始陸處以為刺史號曰西州自以德不如令從而禪焉是為蜀開明氏年號萬通生蘆保亦號開明時武都出五力士輔之開明子孫八代都郫九世至開明尚始去帝號稱王治成都自開明五世開明尚始立宗廟于蜀則猶在五帝時以今蜀記望帝逺記周襄王至鱉令王蜀十一代三百五十年當始皇時號蜀蘆子霸王夫始皇時蜀滅久矣記言儀錯伐蜀蜀王開明拒戰不利退走武陽獲之樂史云在彭山縣則是張儀滅之也鱉水名也字一作鄨音别縣在牂柯集韻音幣而刺史乃秦官故王充劉知幾以子雲之紀杜魄荆尸為妄鱉令亦作鱉靈墓在郫西五里野義落落羅剎也國在婆利東黑身朱髮獸牙雁爪碧眼與林邑為市市必夜至常掩其面畏人之見之也大業三年常駿使赤土至其國野義夜義也國在北海海鬼之北三面抵海俗狗毛布夏服魚皮冬衣鹿豕不能乘馬北行月餘有所謂夜義城其人豕牙翹出頭有肉角數寸又蘇都匿亦有夜義城城中有夜義窟不知深極旁百餘家一年再于窟近設關祭之或逼窟則煙出觸之輒死因擲尸魄其中博物志言獨南沈黎髙山之中有物似猴髙七尺而人行曰攫見婦女輒盜之入穴呼夜義窟沈黎即今黎州漢源也西畨部落尤切畏之狗國即五代胡嶠所至兩面乃三國王頎所至此類種種悉著絶域見乃為異今釋所繪以怖流俗者蓋以佛國與之比近常所見爾五勝相感方以類聚物以羣分至精交感應不待召豫求五運譯之路史詳矣陽燧來火方諸致水箕動而風畢麗而雨土龍致澤桐魚鳴鼓獺膽分杯十膽鳴釡冡灰傳漏啄木愈齲匛湯引妳鵙枝速語堂蜋之氣含之出火蚯蚓之塵背之起霧結巾投地而兔走針綴丹帶而蛇去狗舐甕而疊生蓬生地而沙不聚萬應不齊固亦有其故矣蟾切玉橘明珠油鑽針薑解荼葦化牛鹽消瓜甘草硬角木賊軟牙磢錫以茄畫暈以蘆灑油以蜜濯錦以魚新灰拘駒然柳煞雛蓋不得而誣也今夫魫甌裂毒硫杯毁熱薑磁免爆礬線不熱翡翠屑金神沙碎鐵雨將至七絃緩大風起痼疾發癲疾作而匏血動蠶餌絲而商絃絶投醪醉士望梅止渴既呼出而響隨亦形休而影滅以至駝煙殺蛟犀火照怪磁石引針虎珀拾芥勃荷醉貓皂莢宜蟹黍以蟹散栗因酒壞麻得黍而涌酒得麻而敗蒲荷憎油草木忌桂阿膠止濁犀株離水弊篦匡鹹石灰正醪戎鹽纍卵青􅘿還錢麟角續劒鸞膠集弦屠狗者狗逐之屠牛者牛觸之理固可言言固可得而復君子舉其一隅淮南劉安之術未必能多而陀頭小人得其一二每以之而行惑固不可不識也路史卷三十八

body:
  text: 路史卷四十一宋羅泌撰餘論四渚為陵少昊紀地有興廢各因其時按休子言少昊生於稚華之渚其渚一旦化而為山凡物有數有關軸轉動雌雄相就皆興廢之由也後世亦有子生而門出渚洲者昔襄陽以下二千里無洲渚臨沔張興世之生一旦門前忽生洲嶼年嵗增長及為雍伯洲遂至十餘頃三十國春秋殷仲堪葬流棺門前洲忽成峰夢徐彥伯達云君將為州已而果然江陵九十九洲古傳滿百則應天子桓玄破其一以應之隨即漂散及太青末忽一洲自立明年文帝即位元凶之禍此洲還沒泊髙繼沖時李景威復告云舊傳江陵諸處九十九洲滿百則王者興自武信王之初江心深浪中忽生一洲昨此洲忽漂沒若可憂也繼沖遂以納欵伊闕大溪每僚佐有入臺則小灘泛出世謂之御史灘牛僧孺為尉而灘出堂吏謂曰是分司爾若以西臺當有溪勑雙至牛視頃間俄溪勑雙下不旬浹果西臺方泰始中益州市橋忽出小洲道士邵碩謂當有貴王臨州厥後齊始興鑑刺益督二州加鼓吹凡此類固不少矣夫地固有沈沒波潭若隱土中者謂之伏龍以見時發不得為不信五祀五祀門户中霤井竈見於儀禮自天子至士無隆殺司服曲禮禮運禮器天子諸侯大夫同之惟五者家國之所皆有誰能去之自黃帝立五祀厯代守之無敢或廢世本言湯五祀故曲禮謂天子五祀嵗遍康成以為商制漢志一户二霤三竈四門五井白虎通義范曄髙堂隆劉昭之説皆然後漢魏晉亦皆從之湯五祀户井竈中霤行有行無門而月令書乃有行而無井康成倣之以故隋唐以行代井開元禮祀户司命以春竈以夏門厲以秋行以冬霤以季夏逮林甫詔修月令始復井而絀行以神行神軷於始行非冬祀也必欲祠行則湯之法去門為允惟户即兼門而井非家國可得廢者若天子之七祀乃有泰厲司命宫正舞師七祀自與五祀不相統也且以五祀四至三祀二祀一祀其説尤乖祭法諸侯五祀乃在厲命而去户竈大夫三祀族厲門行適士二祀門行庶士庶人一祀或户或竈是則家無井竈而士庶無門井矣果合已乎鄭於祭法大夫與王有别故以周禮解之至於王制大夫五祀乃又以為有采地者無地則祭三而遽以曲禮為商禮祭法為周制其不達乃如此祭法王為羣姓立七祀又自為立七祀是二七祀矣夫王不過為羣姓祀為羣姓祀即自為矣烏有二哉記為羣姓立社又自為立社故説以為天子諸侯皆有私社以為私禱其有是乎乃若宗伯三祀禋祀實柴槱燎則祀天神之三禮酒正之三祀大祀天地宗廟中祀日月星辰社稷五祀小祀司中司命山川風雨如宗伯小祀之五祀康成以為五行之氣司農以為五色之帝一云礿祠蒸嘗祫或曰展禽之説禘郊祖宗報之五祭五行之氣迎於四郊而祭五德之帝故禮含文嘉云南郊北郊西郊東郊中郊兆正謀也注言東郊去都城八里南郊九里西郊七里北郊六里中郊西南去城五里兆者作兆域也謀者齋戒謀慮其事也王制天子祭天地諸侯祭社稷大夫祭五祀而外傳楚語謂天子遍羣神品物諸侯祭天地三辰其土山川大夫祀其先禮言五祀及所自出士庶不過其祖諸侯何得及天地三辰哉此又外傳之妄解豸獬豸解豸神羊也王充論衡云臯陶之時有解豸者如羊而一角青色四足性知曲直識有罪能觸不直臯陶跪事之治獄罪疑者令羊觸之故天下無寃許説文云如牛一名任法古者決獄命之以觸不直黃帝時有遺者帝曰何食何處曰食薦夏處水澤冬處松柏故因名薦薦字象獸有尾角及四足蘇氏演義亦云毛青四足似熊性忠直見鬭則觸不直聞論則咋不正古之神人以獻聖帝而神異經乃云獬豸性忠直見邪則觸之困則未止東荒之獸故立獄階東北依所在也田求子云堯時有獬豸緝其皮毛為帳後書志云北荒中獸一角性烈知曲直見人鬭觸不直咋不正者古説神羊能觸邪故晉志法冠一名柱後解豸冠也斯亦繆説竊據解豸蓋羊爾羊性自知曲直昔齊莊公之臣王國卑與東里檄訟三年而不斷乃令二人共一羊盟齊之社二子相從刲羊以血灑社讀王國之辭已竟東里辭未半羊起觸之齊人以為有神則其性也字一作獬豸豸豸並楚買切大抵羊行多倒行而逆豸蟲豸亦然或音雉非王充許氏之言吾不謂然好學而後釋者不能惑荷蓧正今之佛者惻隱之心人皆有之聖人者因惻隱之心充而大之造倫類之極而其道曰仁羞惡之心人皆有之聖人者因羞惡之心充而大之造倫類之極而其道曰義人皆有辭讓之心聖人因辭讓之心充而造之而其道曰禮人皆有是非之心聖人因是非之心充而造之而其道曰智是皆本之身出之性而皆人之所可能者聖人者惟能充之不有以害之爾故能充其惻隱之心而無害其惻隱則無往而不為仁能充其羞惡之心而無害其羞惡則無往而不為義辭讓之心充而無害則無往而不為禮是非之心充而無害則無往而不為智兹非甚難能也而人不之為者失於不能充而有以害之也孟子曰人能充無欲害人之心而仁不可勝用矣能充無穿窬之心而義不可勝用矣孺子入井而人不忍以其無欲害人也茍能擴無欲害人之心而充之則殺一不辜而得天下真不為矣穿窬得財而人不為以為之非義也茍能擴非義不為之心而充之則行一不義而得天下亦真不為矣惟其不能充是故必穿窬必害人以至傾險賊殺而莫之止火之始然一爝之寡及其充之可燎原野泉之始達一勺之多及其充之可成江河大可以保天下而或不足以保父母逺足以保四海而或不足以保妻子豈有他哉安危治亂特在充不充而已今夫執非有滯頑空肩摩背脅而不知所為充也多矣嘗試語來晨門荷蓧此正今之所謂釋者流也方子路之從夫子而後也遇丈人之荷蓧者而問之見夫子乎否夫子路之問之也固非真索吾夫子也識其索隱而託其辭以問如亦能知有吾夫子之道乎否也丈人者固亦察夫子路之問非索夫子故亦設之辭以應而植其杖以藝焉若人者固若漠然無人之情而不攖夫世者子路識之抑將以敬而動之於是為之拱而不去而丈人者果為子路一拱所動於是遽止子路宿至於殺雞為黍以食而且見其子焉夫以一敬而動其心則非絶無人情者也止宿具雞黍則非絶無友愛者也見其二子則是父子夫婦君臣上下長幼之節皆森然具在咸不得而廢矣父子夫婦君臣上下長幼之節既不可廢則是生於世者顧得不攖夫世而絶人之情乎此子路所以前告夫子而夫子遽使反見之夫夫子蓋亦見其所謂人之情者具在而未嘗蔑故將使子路還告之以長幼之節與夫君子之所以仕者且不仕無義可也長幼之節如之何其廢之欲潔其身而亂大倫君子之仕也行其義也道之不行也我知之矣此夫子使子路反告之之辭也而儒氓方領曽不之知乃更章分而絶之前離别其説使聖人之意果泯而不復見豈不悲乎嗟夫豚子猶食其死母乳鵠蒼且􅰉其死子懷父母之心物皆有之何至員首方足卑陬克忍每絶人之情哉仁義禮智人之所以為人而神之所以為神者也今而曰吾以觀空而不俟於仁義禮智不俟於仁義禮智而方且資小慧以為智摩頂放踵以為仁往來問勞進旅退旅以為義擎跽局拳朝參莫拜以為禮是則仁義禮智卒不可得而廢也仁義禮智卒不可廢而方且遺其父母棄其君臣絶其妻子賊其肢體倀倀然以從事於外豈其不知愛哉特放於利而不知其類不能充爾極於不能充猶失其類而况不知其要者乎極於能充舜堯是矣極於不能充桀跖是矣充而不得其要釋者是矣故以堯舜之能充則為仁以桀跖之不能充則為暴而釋者之不得其要則為愚子曰好仁不好學其蔽也愚夫人嘗有好仁者矣而不得其道者不好學也是故有不忍人之心而欲充之者必從堯舜而去釋者先王有不忍人之心斯有不忍人之政老吾老以及人之老幼吾幼以及人之幼五十者帛七十者肉無父之孤皆有常餼此不忍人之政也封天下之君則俗自成矣均天下之田則人自足矣刑天下之暴則人自安矣任天下之賢則人自服矣此先王之治也一狗彘之不盡其性一雞鳥之不得其情彼固不自安矣奚至君臣朋友則方且過而弗之存父母妻子方且擯而弗之顧飢􅈱之不愧疾眚之不察而方且倀倀從事於寂默曰吾觀空而達性其為愚不仁也甚矣吾固曰欲知先王之道而不他惑必自好學始好學而後釋者不能惑也俗士不可為史俗士之為史官孰有如李延壽之甚者乎其為南史也稱宋武北侵而寧朔將軍王玄謨夜遁就逮將斬夢有教誦觀音經者因以獲免及作北史復稱盧景裕者以敗繫晉陽獄誦經而枷鎖自脫且謂有當死者亦夢沙門誨之課誦臨刑刀刃為折及反訊之則髙王經也一何猥俗之如是耶頃見載記言徐羲之將殺也以誦觀音經比夜門開械脫遂免慕容之禁每切鄙之夫以二經今且具在偏袒之徒莫不攘是説以蕩愚俗愚俗流遁遂相信而不返然而冒法之徒臨刑懇切誦之者比比而竟不聞前效之一見豈李將軍之射虎出於一時偶然而不可以再效於後世邪抑當時實無是事而記事者因其俗説而無識以絀之邪不然則亦齊梁之際一時天地之間有此氛祲欲肆行於天下適兹二子天命未訖故山鬼得以託為靈響以驅一世之人於杳杳昏昏之地爾而延夀等輒爾特書亦可謂無識矣大抵此等皆小人倡之世之小人愚暗無識貪於欲得而輕於冒法及觸憲網又無計以自釋則惟起幸心冀空飛而隙竄是故易以誑惑一有誑之則牢結胸次而不可破而乃不知無是理也請以鄭伯有晉申生楚成王之事明之方伯有之報帶段也通國恐矣然伯有之出乃子晳攻之而後段始伐焉使其報怨必不先段而後晳今也不晳之報而急殺段亦昧所輕重矣此蓋人心之疑伯有者久而致之然爾夫以申生能報公之改葬而曷不能報譛殺已之驪姬楚成王能使臣之改諡而顧不能報親殺已之太子其昧於小大亦甚矣且將以為強魄邪則三十六弒君不聞報其臣以為忠亮邪則比干子胥不聞報其君由此觀之玄謨景裕等事足可知矣雖然以左氏之文猶未免俗則碌碌延夀者復何齒邪或曰延壽之書固有誦孝經而獲應者斯又罔矣孝經之作豈亦世俗妄為鬼神出沒之書邪梁使王固聘魏魏開之宴網設昆明固以佛語呪之一鱗莫獲斯特一時巫祝小術今世固多有之此何足道而固以為異耶乃若宋如周以不信佛經而面狹長之類又何等俗語延夀真狐場兔落之俚儒也䪫鍾説髙陽記大晟府有古䪫鍾六皆有欵識云宋公成之䪫鍾崇寧三年甲申之嵗得諸南都崇福禪窟錫貢內府考其文宋器原其出宋地也於是詔與大晟即以為法所謂得英䪫之器於受命之邦者䪫傳皆作莖案樂緯叶圖徴淮南鴻烈解與班氏之志俱言帝嚳之樂曰五英顓帝之樂曰六莖白虎通議云六莖者言和律厯調隂陽著萬物也獨樂動聲儀以為六英五莖宋均釋言云六英者能為天地四方六合之英而五莖者能為五行之道立根莖疏矣夫六䪫之作顓帝之所以文治美也由辛及商制始大備商亡畀周而其器制流在宋國其傳可得而知矣周備六代樂雲門咸池韶夏濩武莫不備有而英䪫猶以非作者不得著宋以商祚二王之後得用其樂是以宋公獨得其傳蓋不誣矣成平公之名也宋自微子二十有六世而平公之名始見於魯昭十年春秋之書牟銘端合真可謂不世出之符者平公之立當簡王之十一年乙酉之嵗即魯成公之十有六年距崇寧之三一千六百有八十載而其器適出受命之區復丁上聖駿惠先烈制作之際得以協成治世之音端總清之盛舉也且以䪫鍾雖出宋境而其實則顓帝之樂也博古殿中古鍾之見為不少矣而於周鍾率上設衡甬旁傅旋蟲或內實而側垂或仰通而中貫一皆振掉而不能安惟此䪫鍾雙螭踆踞上為平鈕大晟之鍾實所取則且其垂之也正而鼓之也和無復振掉弗安之患此其所以逖越三代非五帝之盛樂渠以及此孿生坼疈孿生坼疈古嘗有矣昔周祖甲一産二子曰囂曰良許僖公一産二女曰妖曰茂楚唐勒生一男一女女瓊男貞兹世之所常有而坼疈之事尤為昭彰詩人美后稷之生不坼不疈則古固有坼疈者矣黃始六年魏守孔羡表言黎陽掾屈雍妻王以去年十月十二日在草生男從右脅下水腹上生其母自若無他異痛今子母安全又廣五行記李勢末年馬氏妊從脅生子母無恙李宣妻樊生兒從額瘡中出及長將兵宋武時武寧揚歡妻妊女從股中生至齊猶在唐志大順元年資州兵王全義妻孕漸下至股入足拇指痛折生珠漸大如柸何譙周致疑於陸終乎老𥅆疈左釋迦疈右夏后闢背此豫之不疑者公羊髙風俗通西京雜記謂雙生者以後産為兄以其先胎而譙子法訓辨之謂野人之鑿語君子不測暗安知其胎之先後或曰禹逆生故刑背稷順生故不坼疈逆生者子孫逆死故桀王討順生者子孫順亡故懿奪邑而已充云妄也蟬生腹育開背而出天生聖子豈同腹育兔吮毫而孕從口出簡狄吞乙則宜從口不闢背梁嬴之字過期過期不生卜曰是將生一男一女男為人臣女為人妾故字之曰過期若后稷之名棄豈吾欺哉天地合祭子曰事父孝故事天明事母孝故事地察天地明察神明章矣人君之事天地正人子之事父母故知事父母則知所以事天地矣天明地察厥類惟章孰有南北郊祀之不明者乎人皆曰吾知信孔孟然知信孔孟而理不達猶無學也喪欲速貧死欲速朽夫子之言也而有子以為非君子之言學惟其理而已是故違之者失而執之者又失老生常談吾知詩書之信而已其不在詩書者一切不取也詩云郊祀天地則天地必合祭他有顯證非所知也曰不然是可矣而未達也昊天有成命郊祀天地者謂用是以郊天亦以之而祀地言郊祀天地皆用此詩章爾般之祀四嶽河海豈謂其合祭哉合祭天地此王莽之妄武后之失也而顧用之果為得耶夫聖人之為祭必求其類以為之數是必合其情而後神可交也燔柴於泰壇瘞埋於泰折泰壇南郊之壇泰折北方之坎壇於圓丘南坎於方澤北是故圓丘貴祀方澤貴祭因天事天因地事地輕重髙下隂陽清濁員方南北判然其不同矣父天圓丘母地方澤此則事不同也南郊就陽北郊就隂此則地不同也祭日南郊祭月北郊此則配不同也圓丘以南至郊方澤以北至祀此則時不同也郊逺而尊故以郊言祀近而親故以時紀此則名不同也郊以騂犢祀以黝牲則牲不同矣壇圓中規折方中矩燔柴於泰壇瘞埋於泰折則制不同矣璧琮而禮蓋軫而祀則禮不同矣圓鍾為宫冬至於地上圓丘奏之函鍾為宫夏至於澤中方丘奏之則樂不同矣神南面君北面示北面君南面則位不同矣夫不同者顧若此而且謂其必合祭豈盡敬之道哉祭帝於郊所以定天位也祀社於國所以列地利也郊社者所以尊天而親地也故明乎郊社之禮禘嘗之義者治國其猶示之掌中庸所言郊社之禮所以事上帝若郊社可合則禘嘗亦可合矣圓鍾以禮天神函鍾以禮地示黃鍾以禮人鬼若天地可合則人鬼亦可合矣其不達乃如此抑嘗原禮之所失矣自秦而來雍鄜密上下四時以祀四帝祠天不於圓丘祠地不於方丘以為天好隂地貴陽乃兆天於髙山之下兆地於澤中之圓丘漢又增之北畤以祀五帝祠天不於南郊而於甘泉祠地不於北郊而於汾隂壇有八觚席有六采樂有玉女車以鸞路騂駒龍馬一非舊典此匡衡劉向之徒邪正同異之説所為起也元始之間始稍從正春秋天地同牢南郊而冬夏則分祭於南北尋以廢改至光武乃兆南郊於洛陽自是不復此康成王肅之徒所以有郊丘異用之辨及賈曽定為合祭之説而議者益紛惑唐初鋭意禮制郊祀之臣訖無一定王全仲蕭嵩輩紛錯尤甚而君無可否玄宗爰復合祭南郊而尊敬之心曽不加於侈靡乃者蘇軾劉安世之徒反覆辨論亦已備矣若軾之説既以合祭為是而安世則以合為未善雖卒從合而世之識者猶未以為得古諉安世則亦豈無明古誼者哉或曰二説其來逺矣聖人不作則若之何從曰郊之與祀自為二禮必異其方各從其時更欲盡事則以間嵗為禮而重合之於明堂可矣圓丘方澤不可合也燔瘞無玉祭天燔燎祀地瘞埋蓋牲幣爾先儒以為俱有玉者謂以降神出示學者承襲遂以為燔瘞皆有玉莫之察者夫古郊祀蒼璧禮天黃琮禮地四圭有邸以祀天而兩圭有邸以祀地未聞燔瘞之玉也天之常祭嵗九則玉之燔者為九地之常祀嵗二則玉之瘞者為二其所以用之常祀之外者又不勝一矣燔瘞之玉何其多邪以皆燔邪則玉不受火以皆瘞邪而泰壇之下泰折之側耕斸旦旦未見獲一玉者按六經緣祭祀而言玉者多矣無所謂燔瘞之玉也惟韓嬰詩傳始有天子奉玉升柴加之於牲之説而崔靈恩遂引詩之圭璧既卒以實之為燔玉且謂肆師立大祀用玉帛牲牷為論燎玉之差降而鄭注大宗伯職亦遂以為或有玉帛燔燎而升煙夫以祀而言燔瘞之玉於百氏書曽不之見大祀玉帛若圭璧既卒兩説此世以為見之經者猶不近情韓詩鄭注端未足據詳考肆師所用玉帛特禮神之用而非論燎玉之差降雲漢所言亦禮神之玉爾其説以謂宣王承厲之後遇災知懼禱祠供給靡所不至而遂至於圭玉罄盡蓋所以美之也鄭氏以為禮神之玉又已盡者斯得之矣何自而指為燔且瘞哉禮運云祭祀瘞繒是祭地不瘞玉而瘞繒然則燔於泰壇瘞於泰折無玉明矣若古輯瑞三帛二生一死贄則受而五玉之器則卒而復知此則祀大神無燔玉祭大示瘞繒而不瘞玉又可知矣曷至膠膠曲臺儀省之間哉天地各兩牲不用牝天地之祭牲各二降神之牲祀神之牲也燔柴於泰壇瘞埋於泰折或曰實牲體焉所以降之也掃地而祭羞牲體焉所以祀之也故牛人凡祭祀共其享牛求牛享牛者祀神之牛求牛者降神之牛也降神之牛於天騂犢於地黝牲從其類也牧人凡陽祀用騂牲毛之隂祀用黝牲毛之鄭以陽祀為祭天隂祀為地祀神之牲於天用蒼於地用黃象其功也大宗伯以蒼璧禮天黃琮禮地而牲幣各從其器之色本其類也天地之祭俱有兩牲其來久矣召誥云用牲於郊牛二而禮器乃云祭天特牲有以少為貴者此特謂享牛爾享牛主於祭若求牛則主在降神非所言者是故禮器言祭召誥言郊皆有所不及彼熊氏等乃以為郊惟一牲而祭有兩處分牲體以供之失所依矣切稽楚語禘祀之祭則有全蒸若分牲體豈得謂全蒸哉方唐顯慶長孫無忌等議始以蒼璧黃牲燔於泰壇加以騂犢而實之以俎四圭有邸則奠之於坐其後張説又以祭後方燔考之經乃不合蓋不知郊祀天地有禮神之玉又有祀神之玉有求神之牛而又有享神之牛也或曰孟春之月山川林澤犧牲無用牝則非孟春非山澤牲用牝矣郊特牲云天子牲孕弗食也祭帝弗用也鄭謂任子曰孕祭帝之牲必孕然後弗用則不孕之牝若可以祭帝矣曰否天地宗廟社稷牲惟牡也敢用玄牡此天地之牲也從以騂牡則宗廟之牲而奉時犉牡者社稷之牲也孕者牝牡之為通非特為任子也奔騰之時牲雖牡通孕則非犢矣故弗食於天子弗用於帝蓋取所謂貴誠者非用牝路史卷四十一

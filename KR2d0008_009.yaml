body:
  text: 路史卷九宋羅泌撰前紀九禪通紀昊英氏昊英氏或曰子英見三墳䇿皇辟云為太昊臣潛龍氏作甲歴者妄也昔者昊英之世以伐木與殺獸人民少而木獸衆人帝之世不麛不卵官無共備之勞而死不得用享事不同而階王以時異也伐木者衣薪之世也見商子後有昊氏風俗通云昊英氏後有昊氏而氏譜昊氏出自少昊夫氏姓重出亦多有之如賀氏楚出而慶亦為賀來本郲後而來纎亦為來孔氏宋後而孔達出于衞孔張出于鄭陳又有孔寜齊有孔虺孫氏晉出而一出于商一出于衛漢荀卿又曰孫楚宋皆有司馬楚衛皆著子南周楚之王孫既異于衞秦宋之巫臣後别于楚諸國之分侯姓三代之殊王氏不可勝數矣至于後世兵火饑蕩又有違諱避仇隨母假養寄冒之類紛然層出不可不攷也太上無名其次有為而名從之其次名先而實後名先實後而名實離矣是故為善無近名中失而事過當名尊而實可泊君子不為也有為皆善而孰為善邪温良恭儉明允篤誠人與我以是名也何朅朅然擊鼓而求亡子乎故善不可以有心為也有心則偽而一失之矣上世親死則内之溝它日過之狐狸食之蠅蚋蛄􅀈之心與目㑹而泚達于顙于是反累梩而掩之掩之誠也非為儉非為奢也掩之矣而土親膚也于是厚衣之薪而棺槨興焉葢孝子仁人之掩其親茍可以致其誠者亡不至也喪三日而殯凡附于身者必誠必信三月而葬凡附于棺者必誠必信勿之有悔焉而已矣古者棺槨無度中古棺七寸槨稱之天子七種諸侯五大夫三士二庶人一非直為觀美也彼藏千金之璧者緹衣十襲匣户九扄齋沐而出之猶以未滿也况于親伏羲人帝之時非無供備之勞者死皆用槨豈固是彌文哉而墨子曰堯舜之喪衣衾三領窽木之棺葛以緘之夏禹之喪桐棺三寸蘧蒢以歛餘壤為坋􅀈可謂儉乎堯舜禹不如是也下銅三泉上􅀈南山金玉城闕水銀河海固非君子之志而孝子之心不如是之貧也雖然天子之喪動四海屬諸侯諸侯之喪動通國屬大夫大夫動一國屬修士修士動一鄉屬朋友庶人之喪合族黨動州里古之數也惟刑餘罪人之喪不得合族黨獨屬妻子棺槨三寸衣衾三領不以總不以晝行凡縁而徃埋之反無哭泣已事而踆若無喪者此之謂至辱是則舜禹若啟以刑餘罪人喪其君也是墨子者以至辱事其親也且吾聞之君子不以天下儉其親墨之治喪也以泊為其道也惡足以為儉中古之制聖人固不欲速朽也以璠璵歛而孔子麗級豈慮其墓之抽哉而王充猶欲明死者無知以降泊葬古之人胡為而死其親乎嗟夫儉者一善之名聖人御世之寳也在乎内不在乎其外何說者之譚堯舜舉狥外而反卑之也且怵戒塗䰍者尉李野人之璞俗土階三尺者由余窮邦之陋風蓽戸不扉葢茨不剪此楚之交子魯之周子之鄙習也而堯居衢室之宫垂衣襞幅䆳如神明集五瑞而見羣后帶幅舄而入覲者若衆星之拱極舜㳺巖廊之上被袗衣皷五絃繪日月于常備十有二章黼黻𤣥黄爛如也出聞鑾和動有環佩步趨中于莖招之節堯舜之備物也如此而惡有所謂土階三尺茅茨不剪欲塗䰍而怵戒哉此腐儒之所守而汚俗之所以相欺也人之言曰天子無老夫食則太牢而加珍服則五采而飾玉坐設章容黼扆而諸侯孤卿奔走乎堂下出乘大路越席以養安載臯芷以養鼻錯衡以養目和鑾以養耳三公奉軛諸伯持輪居如大神動如天帝扶老養衰渠有善于此者彼桀紂之奢而亡也則戒奢者有禮存焉今也覽四海之賦受九垓之經入而茅茨土階欲以塗䰍而不敢信不然矣且先王之制改玉則改行旂旒冕璪以示登降之品而汚世之人不通于禮處尊而偪賤居大而侵小以天子之尊窮天之産罄地之毛而為圉𨽻監門之奉亦難乎為下矣不惟以陋于厥躬也而又房無施其族黨上不豐其宗祭而曰吾以是為儉也不亦鄙野夷貊之人已乎故曰中失而事過當名尊而實可泊君子不為而况唐虞與有夏氏乎有巢氏昔在上世人固多難有聖人者教之巢居冬則營窟夏則居曽巢未有火化搏獸而食鑿井而飲􅝸􅺁秸以為蓐以辟其難而人說之使王天下號曰有巢氏木處顛風生燥顛傷燥夭于是有聖人焉教之編槿而廬緝􅀢而扉塓塗茨翳以違其髙卑之患而違風雨以其革有巢之化故亦號有巢氏禮運所言有巢氏在遂人氏之前六韜所叙乃昊英氏之後有巢也而汲書所說有巢氏為在夏商間故外紀云非人皇後有巢氏也駕六龍從日月是曰古皇河圖云有巢氏王天下也駕六龍飛麟從日月號古皇氏龜龍効圖書畀于是文成而天下治易曰河出圖洛出書圖書聖人出世之符也春秋說題辭云河以通乾出天苞洛以流坤吐地符河龍圖發洛龜書感故圖有九篇書有六篇孔安國云河圖八卦是洛書九疇是名畫記云聖人受命則有龜字効靈龍圖呈寳巢燧以來皆有之迹映乎瑶鈴事傳乎金册及苞羲發于榮河而典籍圖畫萌矣鄭六藝論云河圖洛書皆天神語言以告王者其為政也授而弗惡予而弗取故天下之民皈仁焉其及末也有禮臣而貴任之專而不享欲削之權懼而生變有巢氏遂亡見汲冢書或以為夏商之間特起于一方者葢其後世居于􅀢及盤領􅀢屬益部盤嶺在安長安三秦記云長城有平原數百里無山川湖水民尚井汲巢居地多井深者五十丈今興平始平原也故杜甫云好鳥不妄飛野人半巢居喜見淳璞俗坦然心神舒乃五盤嶺也王康居亦云昔在太平時亦有巢居子葢有巢之遺化也夫鳥能巢蟲能穴天地而來至今如此性不變也人何惟不然哉後有巢氏巢父友許繇樊竪繇居沛澤其道日光堯朝焉而逭之父適聞之洗耳于頻竪方飲其牛乃毆而還朝見之也繇居箕山今山下有牽牛墟潁水犢泉及樊父還牛處石上牛迹存焉而潁昌有巢父臺許繇臺而臨汝有巢父井二臺在陽翟東十五里臨潁水髙士傳云巢父堯時隱人聞堯禪繇曰何不隱汝光而見若身非吾友也擊而下之繇乃去之逸士傳巢父聞堯禪繇繇不受逃之以為汙也乃洗耳池濵樊竪方飲其牛乃驅去之耻牛飲其洗耳之下流繇字武仲陽城槐里人竪字仲父巢父冢在登封東南四十髙一丈五尺古史攷云繇一號巢父非也葢因琹操言繇夏則居巢而繆之人表二人也利器人之所大欲而予奪者天下之怨府也百金之家不滿于千金一命之士不登于三命繇庶而止有不足者是故聖人乘理而制天下必有以厭服之然後小大罔敢不壹于正在易之觀神道設教禮者聖人之神道也五之履顯以中正而觀天下以中正觀天下故下觀而化之然而上且觀其可樂之生而有輆軩之志是以觀盥而不觀薦孔子曰聖人患禮之不達于下也故祭帝于郊使下觀而化也觀化之道莫尚于祭祭祀之禮爵先盥灌而後薦盥者敬之始也薦者禮之末也然薦備物而盥無有焉觀盥而不觀薦取虚誠以著信也是以有孚顒若無器而人自趨不言而信自諭爵賞刑政有設而不用矣豈復侵陽之事乎哉陸希聲云盥手酌鬯祭之始薦進獻熟祭之末灌鬯之時誠敬内充齊莊之容顒顒外見則與祭者皆觀感而化矣儀禮正義作不觀薦非不薦也不觀薦爾初六童子之觀不見宗廟之美所觀者小故小人吉九二闚觀不見其全女人之事若達人則大觀矣九三觀我生自觀也九五觀我生謂天下之人觀我也上九觀其生觀五也九三觀我不如無生自我欲未失上九觀五志有未平故君子无咎五雖中正觀之于民然三上伺我故亦君子斯可无咎吾嘗原易之所以消長者矣一陽上長復二陽上長臨三陽上長泰四陽上長壯五陽上長夬君子道長之時也一隂上長姤二隂上長遁三隂上長否四隂上長觀五隂上長剝小人勢長之時也五陽之卦皆述君子姤遁否剝各戒小人而觀之彖有不言焉觀八月之卦也而臨卦其前方臨之時剛浸而長而先戒之曰八月有㐫是戒禍于微而防患于未朕也瓜瓞弱物也非藉物引蔓則不能上者也杞包于瓜漸引上也乾中姤長而五乃包𤓰戒其進也進之不戒得亡喪乎自九二喪而遁始無臣九五喪而剝始無君初繫金柅則何進之足憂金堅物也柅制動者也故曰利用于堅制之防戒之至計也方陽之消也五存而不足及其復也以一而有餘此盛衰之勢也故善用物者不使極盛不極則衰不生衰不極則盛不成自陽之不繼而後復生之隂之不繼而後姤生之姤之卦也一隂遇妃故初六曰龍化于虵或潛于窪兹孽之牙象不可與長也易中垢初爻所謂一人如女尚可以去者故名之以女焉復之卦也一陽反始故初七曰龍潛于神復以存神淵兮無畛操兮無垠象可與致用也連山復初爻反始際變静以待定是以明王至日閉關不可以有為也君子之道始于復而成于泰泰而臨臨而復則能見天地之心矣三卦見上經反而逆復泰而不復則薦之大壯乃决之以五陽之夬以反接乎六陽之乾又不能决則極而無繼繼極而無繼則小人出焉故受之以姤小人之勢始于姤而成于否上二卦見下經自是而退則反乎姤而入乎坤之順自是而進則至于觀而利賔于王此觀之六三所以未失道者以觀我生而進退也孔子以三隂始否于上經次以四隂之觀乃次以五隂之剝而下經則自二隂之遯而次以一隂之姤而反接六隂之坤與堯歴先天圖不同以明用也且姤與遁否小人道長而莫之止者也非不之止也有其利而無其利勢不能反也至觀之時小人盛矣而其位足以制之中正足以臨之又能觀我生以神教是以下自觀而化之茍觀又莫之能正則進而至于剝矣剝極而無繼則君子生焉故受之以復戲䄠農炎䄠黄湯放桀武王伐紂時也故上七曰數窮致剝而終象曰致剝而終亦不知變也連山剝上爻辭夫小人之為剝豈惟易之憂哉始乎下而卒乎上始乎外而卒乎内未有不然也詩云池之竭矣不云自頻上失其道此剝之所以起也詩云泉之竭矣不云自中亂之生也無窮而剝之進也不已則上未有能安其宅者也詩云溥斯害矣職况斯𢎞不灾我躬其斯之謂歟惡戲明王先戒于姤初庸主猶忘于剝廬方萌于用而致戒焉或者謂早計也一日切近灾矣泰早乎聖人之于易胡為而小人之詳邪小人無樽者也其所以加乎爾者特㳂隙而已矣茍動而中正不顯其符俾無隙之可㳂則天下之吝其庶矣非觀之神道設教以中正觀天下疇克爾夫有觀之位而不知變又不能順巽中正以觀焉以至于剝者其惟有巢氏乎豈惟有巢氏乎朱襄氏有巢氏没數閱世而朱襄氏立于是多風羣隂閟曷諸陽不成百物散解而果蓏草木不遂遲春而黄落盛夏而痁痎乃令士達作五絃之瑟以來隂氣以定羣生令曰來隂士達似是不達之訛然樂錄吕覽等明言命士達今從之都于朱故號曰朱襄氏朱或作株劉昭云陳留株邑朱襄氏之地也厯代作秋今宋之下邑縣古史攷亦云陳之秋邑朱襄氏之邑攷之范志秋當作株即朱也按即陳之株野寰宇記柘城為朱襄氏之邑柘故城在下邑南七十後有朱襄氏邵氏姓解樂者隂陽之和也聖人者協隂陽之聲制其器以宣其和而已琴瑟者樂之本和者也琴統陽瑟統隂以陽佐隂不可易也是故登歌惟王備琴瑟諸侯則有瑟而無琴燕禮登歌有瑟而已所以别于王也瑟惟隂也故朱襄鼓五絃之瑟而羣隂來琴惟陽也故虞氏鼓五絃之琴而南風至隂陽之應各從其類是以伯牙鼓琴而馬仰秣瓠巴鼓瑟而魚出聽魚水物而馬火物以類應也楊泉曰琴欲髙張瑟欲下聲數不踰琴以佐陽也陽主生故其情喜隂主殺故其情悲隂陽并毘則寒暑不成而四時忒矣此帝女之鼓瑟所以動隂聲而悲不能克也故樂惟不可苟作也先王以術調鼎以鼎調樂樂和而玉燭調矣詩云琴瑟在御莫不静好此古之君子無故之所以不徹歟隂康氏隂康氏之時水􅭖不疏江不行其原隂凝而易閟人既鬱于内腠理墆著而多重膇人之生也天地合其氣萬物資其用氣以形運是故形不動則精不流精不流則氣鬱閼處于頭則為腫為風處于耳則為􅀈為聾處目則為蔑為盲處鼻則為􅍠為酲處腹則為張為府處足則為蹷為痿然亦係于上之人是以太平之世疵癘不行衰亂之時機鬼交作子華子曰亂世之人長短頡􅀈百疾俱起民多疾癘道多褓襁盲秃傴尫萬怪皆生之謂也得所以利其關節者乃制為之舞教人引舞以利道之是謂大舞見吕氏春秋孟頻帝王統錄云隂康之王次于葛天有襄陵之變而始制舞亦見教坊記云次葛天非也治于華原葬浮肺山之隂驪山也亦見長安冢志今存焉後有隂氏風俗通䨧氏隂氏見姓纂古姓書作䨧相如遊獵賦云奏陶唐氏之舞聽葛天氏之歌注云陶唐當作隂康葢以吕覽訛作陶唐乃字畫之轉誤外紀云筋骨壅閼而不達堯作為舞以宣導之葢因吕覽誤本之失無懷氏無懷氏帝太昊之先其撫世也以道存生以德安刑過而不悔當而不愉當世之人甘其食樂其俗安其居而重其生意恙不見于色堅白不刑于心而漸毒不萌于動形有動作心無好惡雞犬之音相聞而民至老死不相徃來令之曰無懐氏之民世用太平鳳凰降龜龍閣風雨節而寒暑時于是陞中泰山以宗天禪云云以復墬仂石昭示而天下益趣于文矣見管子大戴禮史記後有懐氏無懷氏姓纂贊曰惟彼無懐以德安形人甘其食而重其生形有動作心無好惡彘犬相聞龜龍以格登代降云勒堅昭示孰曰無懐聿臻文辭孰謂王通之不知禮乎通之言曰封禪之費非古也徒以夸天下其秦漢之侈心乎封禪之禮豈其非古哉其所以非古者費也封禪帝王之盛禮也厯五帝三王而不能去之非不去之也我愛其禮也昔孔子之論述六藝傳也畧言觀易姓而王封泰山禪梁父昭姓攷瑞者七十有餘君矣而俎豆之禮不章葢難言之見大戴禮孔子之言惟出于此或疑六經中無問答封禪者大抵無所事此則其禮不講封禪之禮惟起國之君得行世所不知孔子之時天命未改宜問之所不及大戴之說偶不在乎禮記爾或問禘之說子曰不知也昭穆之序籩豆之品或人亦能知之非特孔子今截然曰不知者不可說也一纔及禘之說則魯之非禮便不可逃于天地之間故不知者是知之矣張九成以為欲人之自得之非也知其說者之于天下也其如示諸掌明則在禮樂幽則鬼神禮樂鬼神其致一也豈有知鬼神能制禮樂而不達于人情治道者朝踐之前以素惟貴父子之事多饋食以後以文為貴君臣之事豈惟聖人惟能享帝以其盡人道而與帝同德孝子惟能享親以其盡子道而與親同心知禘之說則諸侯尊王大夫尊君君臣之義明民無犯上天下可運于掌矣故曰禮之所尊尊其義也知其義而敬守之天子之所以治天下也中庸兼郊社禘嘗言之其義一也云禘大祀其義衆非其說子張問十世子曰雖百世可知也何獨于禘而不知哉直不欲觀之爾禮不王不禘魯侯國而以禘禮祀大廟誣其先矣此不可言也灌者求神之始也既灌則别尊卑分昭穆而不欲觀者以其逆也夫自灌已不欲觀則自始至終皆不是矣豈一二小節之云哉始其游觀而嘆說者顧以為嘆魯葢以其答言偃者知之杞之郊禹也宋之郊契也是二王之後天子之事守也魯何為哉而陽虎且復禘僖公故曰魯之郊禘非禮也周公其衰矣夏殷之禮吾能言之而把宋不足質也不足質者文獻不足故也文者夏時之類獻謂老成之人神而明之存乎其人如有用我則吾能質之矣故曰鳯鳥不至河不出圖吾已矣夫自傷可致而不得致也聖人之道建之天地而不悖攷之三王而不繆于禮何疑而不足質者質證也無證人不信不信人不從把宋之禮文獻既不足與明魯又僭差而不足觀攷之前世已如彼質之當今又如此事可知矣按禮運亦言把宋而中庸惟言把不足質至學商禮則有宋存者子長居宋冠章甫則夫子之從商可知葢觀道則皆不足學禮則僅或存者非茍言之太史公亦曰自古受命帝王曷嘗不封禪葢有無其應而用事者矣未有符瑞見而不陞中于泰山者也故每世之隆則封禪答焉商受在位文王受命政不及于泰山武王克商二年天下未寜而崩爰周德之洽者惟成王成王之封禪葢近之矣禋柴之禮存于大宗伯告祭柴望播于時邁之詩於皇時周陟其髙山則成王褒神之對見矣惡得謂之非古邪且屈說者尚何稱于後而云七十二君哉燔柴于泰壇瘞埋于泰圻此封禪之禮也作樂崇徳殷薦之上帝此封禪之事也大抵封禪一代惟一行之必剙業興繼之君可也又須攷瑞崇德然後可以盛薦之故商有天下六百年惟湯行之周有天下八百年惟成王行之有其功而無其徳有其應而無其時皆所不行太史公之論未悉也謂之無經見邪昔舜類于上帝而又初載之狩柴燔岱宗封禪之禮莫此為盛矣柴燎今世之爇香也至岱宗柴餘岳則惟望秩且初載之巡行之自後五載之巡不復封禪然燔柴望秩之禮所不廢也堯十二年一巡亦然謂始皇孝武之侈邪彼以侈心用之非封禪之非也刑用之久矣咎陶用之而仁鞅湯用之而慘豈刑罪邪季氏旅于泰山子曰惡乎曽是泰山不如林放乎猶曰泰山必不歆于季氏也禮天子祭天地諸侯祭山川大夫祭五祀士祭其先諸侯不得祭天地大夫不得祭山川夫猶士庶人不得祭它人之祖于家也泰山厯代帝王望祀之所也魯之祭之因境内也季氏旅焉要福而已曽不知祭所當祭乃可得為福冉求為季氏家臣季氏僭禮夫子欲求救之非救季氏僭禮也必求之力可以救而求不領遽曰不能故子不之復語惟嘆泰山曽不如林放若曰泰山有神其知禮也必不至林放之不如季氏之祭必將吐之不惟以此意望之于神葢禮之本者已不足與言矣旅封禪之細也三家之僭乎公室也仲尼非少乎泰山也朝見曰朝夕見曰夕旅見曰旅類見曰類皆人臣見君之禮類于上帝旅于泰山曰類曰旅皆以臣見君之禮見天莫大之祀也故一獻之禮不足以大旅周大宗伯典瑞職金皆言旅上帝掌次言大旅上帝司尊彛眂瞭笙師言大旅皆天子之禮也又祭山亦曰旅龜人言旅則四望預矣故四望山川不設皇邸不用金版兩圭有邸而已禮書例以為大故之祭則非也魯既非禮陪臣復僭之如禮何齊小白既伯㑹諸侯于葵丘因謀封禪秦穆公九襄王元年管仲曰古之封禪七十有二家夷吾所識者十有二無懐氏封泰山禪云云伏羲氏封泰山禪云云神農氏封泰山禪云云炎帝氏封泰山禪云云黄帝氏封泰山禪亭亭髙陽氏封泰山禪云云髙辛氏封泰山禪云云唐堯氏封泰山禪云云虞舜氏封泰山禪云云禹封泰山禪㑹稽湯封泰山禪云云成王封泰山禪社首皆受命然後得封禪表凖正論云禹禪㑹稽告天則同祭地不得有異會稽可禪是四岳皆可禪也洛陽天地之合嵩髙天地之中然則今處天地之中告于嵩髙可也不必泰山公曰寡人東救徐存魯蔡陵南伐楚逾方城一戰率服者三十有一國北伐山戎過孤竹刜令支破屠河西拘秦夏涉鳴沙收西虞方舟投柎而浮于泲束馬句車越大行逾辟耳之溪南伐牂柯􅀈不庾至卲陵陞熊山而望冮漢九合諸侯一康天下三代受命亦何以異乎仲乃設以辭曰古之封禪鄗上之黍北里之禾所以為盛江淮之間一茅三脊所以為藉東海致比目之魚西海致比翊之鳥然後物有不召而自致者十有五今鳯凰不來而鴟梟比至嘉穀不生而藜荻茂庶神不格守龜不兆而欲封禪無乃不可乎公乃止夫桓公以敬仲之言而遂安冉有不能救而季氏卒僭曰救云者為其有顛溺也司馬相如非惟不能救而又以將死之言道之故曰敬仲加于人一等矣封禪天子之事也王妥古今通論云泰山上為天門地戸户為明堂聖帝受天官之宫也王者即位三十年功成治定則告成于天到泰山刻石紀號仲葢不欲明言而託辭爾惡戲無諸侯不得行巡狩有天下可以為封禪巡狩之事豈不可行邪秦漢而下勢不可行也先王所作相時而動不可以常情執方觀之時則以省方觀民設教至復之世則商旅不行后不省方葢在復猶有難復而省方則或剥也古禮之名存者惟封禪矣忍去之乎方漢家之為封禪太史公自以不得從事其間發憤而卒子遷返使適遭河洛把腕啜清直以不得從行為命誠以希濶之不可幸也鄉使始皇能下車請罪而不至下刑弃灰卑宫室而不至上象天極孝武能茅茨不剪而不至木不呈材舞干羽而不至于賣武窮邉立謗木而不至誹者捕死躬堯舜之行蹈顓嚳之為使天下之人引手加額忻忻然願世以為君然後備葅楷飭蒲車躡凌兢而封禪乎天地不亦美哉世無管敬仲弗能救其用之以侈心非封禪之非也路史卷九

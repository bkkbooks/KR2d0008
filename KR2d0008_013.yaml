body:
  text: 路史卷十三宋羅泌撰後紀四禪通紀炎帝紀下炎帝柱神農子也魯語烈山氏之子柱內傳説同祭法云烈山氏之子曰農農官也即為柱七歲有聖德佐神農氏歷谸原銘百藥爰惎其人比梩定利芟芨及寒垈土時雨至則挾創乂以從事於疇殖百疏區百穀别其疏遫深耕聖作以興歲天均時而地均財于是神農之功廣而天下殷賑矣真源賦云神農有子年七歲有聖德同厯名山辨其百藥闢田墾土興于穀帛化于市鄽民無征役任公而不物任法而不數守其餘以制其嗇故其人不佻不病民亡䵨事審時而權宜是以老幼安里而無謝生之心滣西蕩河源東淡海滣南耀丹垠北汔幽虛莫不來享來咨來茹亦曰烈山氏傳云烈山氏始為稷謂柱五帝以來稷之昭公二十九年左氏云柱為稷夏氏以上祀之周棄亦為稷自商以來祀之所言者皆人神孝經援神契云社土地之主稷五穀之主俱土神而所主之功異所主既異故其配亦異柱棄句龍苐配食爾説炎帝慶甲帝柱之伯也自帝慶甲至帝臨書傳蔑記不得其考事固不可以概論有顯然之是而世以為非有皭然之非而世以為是者神農有天下傳七十世而書傳止存八葉年眇記落固無足惑然運歷諸書復侜張爭詭其為政之日而世交引以為是春秋命歷敘炎帝八世五百二十年古今通系年代歷世紀補史記外紀紹運紀運圖等並因乎此真誥有炎慶甲而國語烈山氏有子曰柱二者記並無有以今內簡炎氏為世以十抴者亦七首于二帝然自是至帝臨汔亦無紀楊長史手録云炎慶甲古之炎帝也楊君受旨書云今為北大帝君隱居真誥乃疑其為神農又謂神農功高無應而為鬼帝當是黃帝所伐大庭氏稱炎帝者失之夫古之有天下最長世者無神農若也故尸子曰神農七十世有天下豈每世賢哉牧民易也呂覽亦曰神農七十世有天下豈不足信如後世之書耶尸子之言記為孔子然世猶以為非宜乎士之不考古也炎帝臨通歷代紀並作臨外紀復以臨魁為神農子尤妄通系外紀以帝臨為臨魁非也夫帝臨在帝承前年代歷等而帝魁乃在帝承之後補史紀等蓋自異代世本書言夙沙民叛以歸帝魁則非臨也惟諸歷紀炎帝八世故臨與帝魁遞為存廢或合臨魁以為一復有不知神農嘗有後代者則又以帝魁為即神農如南都賦注等以帝魁為神農名尤妄而更以神農為魁傀氏潛夫論云炎帝身號魁隗帝堯碑作塊㠕陶潛云在炎帝帝魁之世獨砥修以自勤非帝臨也嘻儒之無特操如此夫彼又烏知黃帝之元孫帝魁哉炎帝承帝臨息也其政因民之仭發虛土監賈區儲偫廢舉以符其詭蓋五百而始收於是貢胥之法行焉神農書云承為民賦二十而一按管子言共工氏之霸取民有法而神農亦有終歲獻貢之事賦貢之來久矣特神農教民稼而後有穀米之賦帝承為之制爾説炎帝魁帝魁之後八世而為榆罔升玄有魁岡其説非是帝魁之立祗修自勤質沙氏始叛其大臣錮職而譁誅臨之以罪而弗服其臣箕文諌之不聽殺之三卿朝而亡禮怒而拘焉譁而弗加譁卿二質沙之民自攻其主以歸質沙炎帝時侯者也世本世紀皆作夙沙亦見英賢録文子作宿沙云宿沙民自攻其君歸神農氏説苑淮南子尹逸告成王曰桀紂之臣反讐桀紂而臣湯武夙沙之民自攻其主而歸神農吕覽亦以為歸神農此特謂炎帝爾世本唐韻等言夙沙氏煮海為鹽以為炎帝之諸侯今安邑東南十里有鹽宗廟吕枕云宿沙氏煮鹽之神謂之鹽宗尊之也或以為靈公之臣夙沙衛非也齊多此姓其後爾説炎帝明帝魁之子子也明生直炎帝直直生釐是為帝值炎帝釐釐生居是為帝來説炎帝居母曰聽訞承桑氏之子也太平御覽訞音妖生常林女子宜有镺音或作談作郯轉失也炎居生節莖婦人之賢亦有能世其聲者尤為不恆有也夫世固有賢母眷其孫子而願授其孫若姪終以間有家者杞蕩二姬為子來逆原流益别惟其賢有以知之也昔者神農取於承桑氏矣至於炎居復納承桑氏后稷取于有駘氏矣至於泰王復納有駘氏此其子孫繁衍盛大豈偶然耶夫婦人倫之本也魯自惠公而上世取于宋桓公以降世取於齊非一日矣所謂必齊之薑必宋之子文薑何為哉莊公世嫡而猶制使必取其黨抑果賢而合于禮耶齊女待年公齒晏矣而且牽惑薑氏至年六六不有內主以陷不孝之域聖人書子同生徒以見公之失婚爾若云喜其正則文武之生不書若云冡嫡則出薑之子不見於經惡呼婦賢而世其聲誠為不恆有哉炎帝節莖節莖生克及戲炎帝克年代歷帝刻同餘書皆作哀非古書克作扈又作􅀢繆為哀爾炎居生節莖節莖生戲戲生器見山海經書傳釐後為哀哀後為榆岡失之按釐來互音故書傳多作帝來小司馬記釐生哀哀生克克生榆岡又以哀克為二矣樂樂其所自生禮不忘其本是故狐死首丘魚肉之蟲集於地而北行葬於北方北首三代之達禮也豫遊陵山拜靈丘倣徨重阜覿玄廬潛闥之竄其間者崔嵬隱約且二百所以傳信之神農有天下七十世若其妃后亞旅則有之矣方金戎犯順初原之氓㓽隴穿焉方中尸首會撮而腯黑玄綃單衣偃負穿中附旁惟銅鼎劍璽既取掩之他日邑胥魁或新室丐其鼎榮焉燕合未既而室燬鼎遂亡之而棄劔鼎者亦門滅茶陵大姓老尹將為豫詳其事嗟夫易墓非古也太公之封營丘比及五世皆反葬于周而文武周公猶反玷畢族葬合兆古之道也是何魯人長府之事豫稽而切悲之夫長府昭公之所居也公之二十五年欲逐季氏居于長府九月戊戌伐季氏是故季氏惡公欲改為長府故閔騫曰仍舊貫如之何何必改作以言長府自爾又何必改作以自章其惡不韙哉此孔子之所以聞之而發言必有中之語蓋亦嘉其深中季氏隱也方昭公之出也平子禱於煬宫故九月立煬宫由此觀之則其欲改為長府意可知矣定公之元年公之喪至自乾侯戊辰定公即位季孫使役如闞公氏將溝焉榮駕鵝曰生不能事死又離之以自旌也縱子忍之後必或恥之季孫乃止問于駕鵝曰吾欲為君諡使子孫知之對曰生不能事死又惡之以自旌將焉用之七月癸巳葬公于墓道南孔子為司冦也乃溝而合之墓夫闞者魯羣公墓之所在也周代冡人掌公墓地必辨兆域而為之圖先王中居昭穆左右凡諸侯以前卿大夫以後惟兵者不入兆域季孫惡其君乃溝絶其兆使之不得上同先君故孔子于是溝而合之以反于義族葬合兆自天子達由古然矣何惑乎炎墓之叢哉或曰周公蓋附其亦不詳于禮者歟炎帝戲戲生器及小帝自慶甲以來疑年古今通系系炎世在位之歷帝承六十年臨八十年明四十九年直四十五年來四十八年哀四十三年榆岡五十年小司馬史記乃有魁無臨而通鑑外紀神農後為臨魁六十年帝承繼之帝承六年諸書不同世紀等不逾此夫神農七十世以炎黃之在位觀之不下數百千年而命歷敘等類以為八世五百四十年此所以致傳記之紛紛且以炎黃為世皆逾百載其子孫無一及于百年又皆上下于四五十間知其難據炎帝器器生巨及伯陵祝庸山海經炎帝生巨封又云器生祝庸巨為黃帝師胙土命氏而為封巨夏有封父封文侯至周失國有封氏巨氏巨氏封父氏富父氏世本鄭大夫封父彌真然代北是賁氏又為河南封氏伯陵為黃帝臣封逢實始于齊經云炎帝之孫伯陵左氏言齊之先逢伯陵是也故周語云太薑之姪伯陵之後逢公之所憑神而説者謂為夏之諸侯非也蓋因晏子序爽鳩在其前耳太常禮書以伯陵為伏羲孫高頥碑以為顓帝之苗俱失之妄同吳權之妻何女緣婦孕三年生三子曰殳曰鼓曰延延始為朝鮮記殳戕後出臣堯一云二人鼓兊頭而􅀈􅀈歸藏云麗山氏之子鼓與延同事是始樂風為編鍾生靈恝靈恝生氐人山海經云氐人能上下于天氐羌也記傳多作互草書之繆有逢氏蜂氏殳氏延氏氐氏齊氏蜂非逢漢以來書為蜂遂有之後漢氐人齊鍾留魏孟觀擒氐帥齊萬年祝庸為黃帝司徒居于江水生術囂兊首方顛是襲土壤生條及勾龍條喜逺逰歲終死而為祖禮記外傳荀彧傳注風俗通皆云共工之子修好逺逰死為祖神非句龍為后土高陽時蘄春月子山下有句龍廟無猛獸其居治也能平九州是以社祀湯既勝夏欲遷其社不可以其功高而不可易也故祭法內外傳言商初稷以棄代柱而句龍為社不改蓋後世水土之神功無及句龍者故湯不得而遷見後世祀之輕易生垂及信信生夸父夸父以駛臣丹朱有句氏句龍氏書作勾鄧姓書云近勾以諱改從系或從金垂臣高辛為堯共工不貴獨功死葬不距之山句龍生共工而傳記皆云共工生句龍蓋漢儒因山海經之誤失之不考夫句龍臣高陽而共工事堯孰有子先于父百五十年事高陽者按經後云後生垂垂即共工以知前者之誤脫為信國語以四伯為五官之後謂共工侵諸侯而自王祭法以為伯九州者俱妄矣生噎鳴是為伯夷為虞心吕且功於水封吕生嵗十二泰嶽襲吕餘列申許堯代有許繇泰嶽蓋長伯夷之子世謂即伯夷始繆于伏氏按朝鮮記云伯夷生四嶽則泰嶽為伯夷之子明矣故子晉云共工從孫四嶽佐之書咨四嶽僉曰言僉非一人也見書大傳伯夷之子為西嶽或襲之爾太史公不應以四嶽為一人韋昭以四嶽為伯夷也泰嶽生先龍先龍生玄氐玄氐乞姓二氐異孔朝云今曰氐侯湯革夏伐氐氐人來朝白帖其别為青白朒之三氐後有羌氏羌戎氐楊氐符氐氐羌數十白馬最大非無弋後者齊書氐楊氐與符氐同出略陽漢世居仇池周初復泰嶽後于申申伯入鄉而楚蝕其壤宣王開元舅申伯于謝詩申伯畨畨既入于謝命召伯定申伯之宅徹其土田在周之中世後有宇氏申氏申叔氏申鮮氏謝氏射氏宇文氏大野氏周賜北海公申徽為宇文魏賜謝懿為大野三輔録云後漢末謝服以出征不祥改射威然元封已有射姓吕侯為穆王司冦訓夏贖刑後曰甫春秋初入於楚或云入蔡按新蔡吕本併于楚王取申吕以為賞田是也國語齊許申吕皆由泰薑宣王時吕始曰甫不與我戍甫是也有吕氏旅氏吕相氏甫氏共氏龔氏藥羅氏唐藥羅真本吕姓為回紇飬子因從其姓姓纂共龔為共工氏後非商周之際有吕渭字子牙敏而內智而動偶諸閼遊諸侯而不用退居東海之濱及棄于室伏于兹泉太公河內汲縣人史傳外紀等皆謂東海人因孟子失之按汲縣太公碑云昔崔爰為汲令縣民會稽守杜宣白爰曰太公甫生于汲故居猶存君與高國同宗之宜正其位乃立廟水經汲故城北三十有太公泉及廟故居也列仙傳冀州人釣于卞溪三年不獲比嫗曰止尚曰非爾知果獲大鯉得兵鈐腹中後葬無尸惟玉鈐薦棺卞溪即磻溪在岐之虢縣然今汲北石夾谷水亦名磻溪書中侯云尚釣于渭濱魚腹得玉璜刻云姬受命吕佐之滋泉極清冷在磻溪中按渭水至郁夷磻溪水注之水出南山兹谷激流注溪積成川太公釣此今曰凡谷石壁東南有石室云公所居流次平石兩跂膝存汲之溪勿信四友與居文王見之吕遁陳以釣道遂成周業是為太公望師尚父望其後名書中矦云文王至磻溪太公釣于崖王趨拜曰切望七年今見光景遂變名曰望符子方外云太公渭釣隱溪五十六年矣不得一魚季連往見之太公望跽石隱崖不餌而釣仰詠俯吟及莫釋竿膝處成臼跗觸成路季連曰釣所以在魚無魚何釣公曰不見康王父之釣耶吾方之猶一日也或曰尚三入商朝三入周朝然後合有二説在發揮成王封之營陵曰齊十五世小白伯于諸侯又若世而陳和移齊鍾鼎寶玉七百餘年後有丁牙丘尚左洴國晏賓平紀癸柴苑慶賀掌厲獻易竪氏是年欒襄牽捷青管柯析其裔壬角望紹茶駱弦旗眀靈孝彥閭門柏亘威齊蓋鐸暢李五十六苑亦作宛大夫艾孔即裔欵暢見陳留傳邴粲以唐諱改李東觀記柏齊矦作伯支庶以為氏姓辨云紹興二年以國諱改亘明出孟明古人先字後名南史明僧紹傳云以名為姓非也隋唐間有是光又稱齊後復為齊氏見孔至雜録及子旗子雅子尾子襄子囊子剡子功子牽子淵子泉子乾子公公齊旗公牛公牽公翰母知祭公仲長諸兒士疆樂利齊季申鮮將其雍門東門東宫西宫南史邴意獨孤宇文東北西南四郭若左右子因之氏復四十姓曰子曰公皆以王父字者非可妄加世有自號子劉子之類為不知據西魏後周賜崔宣猷士謙忱皆為宇文名至孫復周賜高穎父賓為獨孤至隋復又後魏賜晏氏為高氏其以采者丙氏邴氏艾氏隰氏高氏劇氏棠氏高堂氏檀氏灌檀氏禚氏甗氏崔氏移氏若氏丁若氏陸氏大陸氏井氏百里氏西乞氏白乙氏余氏余丘氏蛇丘氏丁公嫡子季子遜國叔乙采于崔百里等氏出于井伯世以為虞仲後妄穆天子與井公傳顔云井子牙後晉滅虞執其大夫井伯奚媵于虞邑于百里也風俗通云高徯采高堂公子雍采于移後為氏齊棠公薑姓故郭偃不娶之余丘公族采漢有余丘炳開元有余欽皆音為蛇拾遺記有蛇丘云西王玉母神異傳姚萇后蛇氏宜出此若閭丘鉏丘籍丘咸丘梁丘廪丘蒲盧盧蒲之氏又三原盧氏本閭丘氏改閭珣亦改為盧宣氏子之孫封汲為汲氏或作伋非乃丁公之名姓書必謂公子伋封于汲兩引之可笑徯封于盧為盧氏徯氏柴氏文公子高之孫漢盧敖其後徯之裔孫恭仲柴孔子弟子字子羔後為柴氏其支于章者為章氏鄣氏章仇氏申章氏赤章氏赤張氏漢章弇始加仇氏開元十九年置先師太公廟命京兆功曹盧若虛録太公之後薑吕尚齊高盧柴慶國紀紹檀賀柏罕厲牽晏望獻易章謝丁申營浦采許蓋雍門東門子雅子尾子襄子剡子功子牽公旗公牛盧蒲祭公閭丘仲長章仇等止四十八姓刻記禮部外郎崔宗之制銘廟門然多有非其後者敏按唐扶碑乃有三閭氏蔡氏吁氏之類皆失據先是武王得泰嶽後文叔紹之許靈公徙葉悼公遷城父曰焦夷昭九年書許遷于夷周紀謂武王封之焦非也昭十八年遷柝定四年遷容城二十有四世鄭滅之定六年遊吉滅許以許男歸一作斯蘧然哀元年許男與楚圍蔡蓋國滅而君在説者以為復立之非矣有許氏􅀈氏叔氏函氏禮氏容成氏錫我氏買氏止氏焦氏譙氏嶽氏文氏苴氏苴人氏亳之譙即焦也故譙敏碑引譙貢唐李利涉定譙氏出姬姓故或謂不出炎帝而出于曹按曹伯陽雖滅焦未嘗居之兹又大妄小帝少也佚名蓋為政日淺者自慶甲徠俱兆茶陵今陵山尚存二百餘墳蓋妃后親宗子屬在焉魯僖公二十有四年襄王出居於鄭文公三年王子虎卒求之於例則皆曰王臣謂春秋所書王臣之卒者三尹氏紀世卿之禍劉眷存定難之功而子虎之義不眀見於天下其所以言王臣又自不得其説左氏説者既以為翟泉同盟之王人而公穀氏且以為會葬之叔服夫王臣之來會葬同盟衆矣何獨子虎而且指之為叔服哉此惑于左氏晉文公己定襄王之説而臆之也王子虎周之居守者也夫春秋始書天王出居後四年五月書公朝于王所冬天王狩于河陽公朝于王所時諸侯會溫以勤王因以傍狩公朝王所而衛不會故執之歸之於京師者歸王子虎此王命也故曰歸之于緩辭與曹伯異昔未之究文公八年書天王崩未嘗書入也王猛居皇敬王居翟泉此圻內境而其入也猶切書之天下之主也鄭他國也亦既逺而戒矣孰有入不書哉京師不必成周成周不必王城成周都之别所至王城然後入其城説者多不悉納天子定王室是乃人臣之極勳而顧蔑紀何以春秋為然則襄王未始入也未始入則何居狩鄭寄也踐土之會鄭地也朝書王所則猶在鄭矣會于溫因以天王至河陽故公朝于王所踐土未嘗書天王而朝王所故三傳以為王在而不書為晉侯諱必致天子至于再而後書狩以罪之是一致天子不為罪也其妄若此不知踐土之會正以天王在鄭為之天王實不在會千金之家三錢之府不可一日虛也文之八年王之在外十三年矣而君不立顧不有居守者乎然則居守非王子而誰與由此觀之虎之居守可知矣王猛居皇王猛入於王城此以宜為王也而其卒也書王子猛未正乎其位也未正其位而以王子猛書則王子虎之書卒又可知矣子虎書卒益以信襄王之未入也以王子大居守厥任亦已重矣任重者其禮異是故其卒必登于䇿非王臣比也烏乎聖人之慮天下亦深而示其後世也亦至矣西孛東狩必三書而後巳豫既誦之而王之居外亦三書而後已出而不入其事亦已眀矣而或且疑焉至謂不能乎母而絶之日何妄耶或曰天子無出禮然其實則與諸侯分土而守出乎其守則與諸侯之奔者無異不然圻者天子之閫也皇翟圻內故不書出鄭越圻外出乎閫也雖然王子瑕之奔晉王子朝之奔楚出其閫矣而不書出周公奔晉瑕朝等也而以出書周公有官守瑕朝無官守也是又不可不辨雖然後世學士將復䯂其間兹豫之所深憂而過計者魯公居乾侯猶王居鄭也而于嵗首必書公在乾侯比其沒也必曰公薨于乾侯以是例凖則凡年首必書天王在鄭及其隕也亦必書曰王崩于鄭而且不有則王其入矣兹益不然句也之與以相去千里周公魯公似矣而大殊也鄭雖圻外猶吾之鄭而乾侯𨽻晉非吾境也惟其不入則明在鄭矣又豈詳魯而略周哉嗟乎聖人不作聲謂過情諸侯而不諡則見謂今王戰國以上天子而蒙出則謂之少帝漢魏上下魏收所述且至以少帝目平陽事靡憲章乃頻于是小帝之謂其亦孺帝之倅為政無幾如後世携王哀王之等者與炎帝參盧是曰榆岡居空桑按世紀空桑為陳留故歸藏啓筮云蚩尤伐空桑帝所居也政束急務乘人而鬬其捷于是諸侯携㒃乃分正二卿命蚩尤宇于小皓以臨西方司百工二卿殆猶二伯者德不能御蚩尤産亂逐帝而居于涿鹿頓戟一怒并吞亡親黃帝時為有熊氏實懋聖德諸侯利賓之參盧大懼設禪于熊黃帝乃暨力牧神皇風后鄧伯溫之徒及蚩尤氏轉戰執蚩尤而誅之于是四方之侯爭辨者賔祭于熊爰代炎輝是為黃帝乃封參盧于路亦作露路今茶陵軍露水鄉有露水山高與衡山等初封蓋在此元和姓纂云黃帝封榆岡支子于路而崇炎帝之祀于陳黃帝所崇宜在陳蒼故秦靈公于吳陽作下畤祠炎帝上畤祠黃帝皇甫謐以為宛丘未的路露也潞是後繁于河之北東商周别為赤白之狄狄歷牆咎臯落九州之戎王符云炎帝後薑戎伊洛陸渾也故戎子駒支曰謂我諸戎四嶽之後楊匱泉臯吾離等皆是也宣子謂駒支曰昔秦人迫逐乃祖吾離于瓜州吾離來歸惠公與之田居伊川陸渾與允姓隂戎各别平王之末渭首有狄獂邽兾之戎涇北有義渠戎洛川有大荔戎渭南有驪戎潁首有蠻氏戎伊洛有楊匱泉臯之戎義渠大荔驪戎為少昊後他皆薑姓鄭樵猶以九州戎為隂戎駒支居魯南鄙踈矣按僖二十二年泰晉遷陸渾戎于伊川惠公與之南鄙之田三十三年卒以敗秦于殽昭九年晉梁西率以伐賴周人辭于晉曰伯父惠公歸自秦誘以來使逼我郊旬者也十七年荀吳伐之陸渾子奔楚遂有其地非允戎也續漢書渭羌出三苗者為薑姓亦非有隗氏狄氏落氏臯落氏戎氏戎子氏齊靈妾戎子袁紇氏斛律氏解批氏烏護氏紇骨氏一利吐氏異其斥氏狄歷氏為敕勒紇骨烏護薛延陀等皆是延陀姓一利吐氏回紇九姓一回紇二僕固三渾四拔曳固即拔野古也五同羅六思結七契苾唐神著八阿思布九骨崙屋骨思天寶後始列貞元以咸安公主改為鶻高車十二族其衍也泣伏利氏叱盧氏乙旃氏大連氏窟賀伏氏達薄于氏阿崙氏莫允氏俟分氏副伏羅氏乞袁氏布叔沛氏也東魏北夷傳及北史云高古赤狄餘種初號狄歷北曰敕勒諸夏以為高車車高丈餘丁零種有狄氏等六氏及十二姓潞子嬰兒甲氏留吁薑路之餘晉滅之後有潞氏路氏路中氏露氏甲氏榆氏諸露惟薑世以為皆隗姓非也按狄為隗昔狄人伐牆咎如獲二隗襄王以狄伐鄭德之立其女隗氏則赤狄亦隗氏當時見傳者五曰東山臯落氏曰牆臯如曰甲氏曰潞氏曰留吁鐸辰皆赤狄也惟甲潞臯落則以部為氏伊列舟駱淳戲怡向州薄甘隋紀皆薑國也禹有天下封怡以紹列山是為默台莊注文列即賴成湯之初析之離支是為孤竹即觚竹離支即零支元年三月丙寅封西伯之興有允及致老矣而歸俌之未至西伯薨武急伐商叩諫不及義棄周祿北之止陽上俾摩子難之逮聞淑媛之言遂擲薇終焉是為伯夷叔齊二子祠墓在蒲坂首陽山首陽靁首也事著不疑二子之來事詳吕氏書當時何有叩馬之事譙史考云夷齊采薇有婦人難之故劉孝標有夷齊斃媛之事而黃庭堅謂無餓死之事列士傳云夷齊之諫周公曰義士王欲以為左相去之王摩豫往難之遂不食事有信不信類林以為棄薇不食有白鹿乳之韓非以為武王遜以天下而不受有説見餘論先是齊嫡而夷長父初欲立夷不可初薨夷齊偕巽去之北海之濵于是憑立論語讖云伯夷叔齊義遜龍舉孔叢注云夷齊墨台初之二子也按允字公信伯夷也致字公逺叔齊也夷齊為諡春秋少陽篇允字公信智字公逺不同今北海有孤山九域志引孟子隱居北海濱即此父初字子朝見韓詩外傳故孔子曰伯夷叔齊不念舊惡怨是用希又曰求仁而得仁又何怨嗟乎適世暴亂而道不行能亡怨乎忘天下之不善去之海濱放于義以俟其清則其怨亦希矣一巽而獲其親安其弟美其身求仁得仁夫又何怨之有有論在發揮憑世其國定王之十一年辭于齊憑夷齊之弟烈士傳云異母弟伯僚是也漢光和元年柳城岸壞遼守虞翻夢人曰豫伯夷之弟孤竹君之子也遼海見漂旦往視之有浮棺尸絳衣露冠者葬之搜神記曰見浮棺破之而語破者尋死民有襁褓視者皆無病而死此其異者有竹氏笁氏孤竹氏孤氏墨氏墨台氏默怡氏怡氏台氏周書怡峯傳云出于墨台乃默怡也又東莞竹氏後漢樅陽侯竹晏後報怨不改姓加二以存夷齊而遷于莒侍中笁其孫也夜郎竹初宜亦本此范史乃有剖竹得兒之説若姓纂竹出天竺俱妄伊耆之國堯之母家下及湯代有伊摯以本味進為之左相是為保衡伊尹尹豐上而兊下僂黑下聲鉤深本草妙逹湯液有伊秩氏耆氏伊耆氏尹氏伊祈氏阿氏衡伯氏衡氏阿氏衡伯氏見風俗通衡方碑云尹稱阿衡因氏英賢傳又有空桑氏妄也夫去亳適夏五就湯桀此事之難非聖人有不能彼以為為湯作間者戰國之士私意也世紀謂為湯妻有莘氏之媵臣以見紀年以為交于妹喜而遂以間夏俱不足信有説在發揮紀侯以道事齊不得免乃大去而俾季奉酅入于齊有紀氏郱氏裂氏嶲氏鄣氏紀侯譛齊哀公于周莊公四年齊襄復九世之讐滅紀紀侯義不下齊不忍其民乃去其國子孫因氏有復讐説淳于不復有淳氏淳于氏于氏于同唐憲氏宗諱為于甘夏滅之州把滅之舟駘戲薄至周尤在列賴則楚滅之矣後各以國令氏戲露薄見潛夫論薑之𣲖又有列氏厲氏麗氏巫氏神氏靈氏農氏夸氏節氏烈氏藥氏山氏鄒屠氏風俗通山氏烈山氏後漢有神曜出神農農氏見姓源戎子遁朔野有葛烏釋世長鮮卑又以俟斤俟汾渝汾嗣汾俟畿為氏或云神農既滅子孫遁居北方鮮卑呼草為俟汾以其嘗草功號俟汾氏或以葛烏菟為南單于之裔非俟汾者藥也則又為宇文氏宇氏普氏俟豆氏後周書云炎帝裔孫普四狩得王璽三紐有文曰皇帝以為天授俗謂天子為宇文因氏焉按普四生莫那自隂山徙遼西諡獻侯生可地汗莫何單二闈地西出玉門孫普撥普撥五世孫俟豆歸稱大單于為慕容晃所滅六子長阿若彥後魏都牧主安定侯徙代生系系生韜韜生泰是為周太祖俟豆歸從其主亦號宇文氏世為魏沃野鎮軍主化及祖也庫莫奚氏費乜頭氏阿會氏莫賀弗氏李氏宇文之别後分五部有辱紇主莫賀弗等阿會五部為盛士及先野頭氏費乜頭臣突厥元和三年賜奚首領索低為李氏蚩尤傳附阪泉氏周書阪泉氏用兵無已而亡記為蚩尤蚩尤集韻作蚩蛔從蟲謬薑姓炎帝之裔也隂經遁甲云蚩尤者炎帝之後與少昊治西方之金故祭蚩尤文云將軍敢以牲牢祭爾炎帝之裔蚩尤之神蚩尤出于炎帝代弗知也兄弟八十人河圗云八十一人或云七十有二人非蚩尤疏首虎捲八肱八趾見歸藏啓筮蚩尤虎捲威文立兵見春秋元命苞好兵而喜亂隳黨崇讐惛欲亡猒惟作五虐之刑延于平民罔不冦賊鴟義姦宄敓攘矯虔書云蚩尤惟始作亂延及于平民惟作五虐之刑曰法刑統隂云尤性酷毒作五虐之刑謂車裂燒銅柱使抱及沿之之類發葛盧雍狐之金啓九冶作兵刑劍撥劍撥作而嵗之諸侯相兼者二十一管子云葛盧山發而出水金從之蚩尤受而制劍鎧矛戟是嵗諸侯相兼者九雍狐山發而出水金從之蚩尤受而制為雍狐之戟狐父之戈是嵗諸侯相兼者十有二天下頓戟一怒伏尸滿野世本皆云蚩尤作五兵戈矛戟酋矛夷矛黃帝誅之涿鹿之野而三朝記哀公問曰蚩尤作兵歟子曰蚩尤庶人之貪者反利無義以喪厥身何兵之能作歟民皆生也故吕氏云蚩尤非作兵利其械也未有蚩尤之時民固剝林木以戰矣越絶書云神農以石為兵黃帝以玉禹以銅鐵繆也帝榆岡立諸侯攜㒃胥伐虐弱周書嘗麥云赤帝乃分正二卿命蚩尤宇于小皓以臨西方周書作四方黃庭堅云當作西方蓋為方伯司百工德不能馭蚩尤産亂出羊水登九淖上黨羊頭山水以伐空桑逐帝而居于濁鹿即涿鹿地記濁鹿有凶黎丘今幽州懷戎有涿鹿山下有涿鹿城涿水出焉即􅀈縣冡山美頡山有泉廣百步深無底四時一色古之阪泉城東二百步泉上有黃帝祠西一里為涿鹿城大康地記阪泉蚩尤泉自二處魏土地記云涿鹿城東南六里蚩尤城泉水淵而不流霖雨則注阪泉亂流東北入涿水周書又作濁鹿興封禪號炎帝蚩尤炎帝之後恃親強恣逐帝而自立篡號炎帝鄧展謂神農後子孫亦稱炎帝而登封者故史言炎帝欲侵陵諸侯大戴禮言黃帝與赤帝戰于阪泉之野後周書云炎帝為黃帝所滅文子亦謂赤帝為火災故黃帝禽之皆謂蚩尤而書傳舉以為榆岡失之集仙録云言黃帝克榆罡于阪泉黃帝非與榆罡戰也至世紀遂謂黃帝與神農戰而炎帝克蚩尤非也陸德明云神農後第八帝曰榆罡時蚩尤強與罡爭王逐榆罡罡與黃帝合謀擊殺蚩尤此得之乃驅罔兩興雲霧祈風雨以肆志于諸侯傳記黃帝以車戰蚩尤以騎戰蚩尤作霧黃帝作指南車通典云蚩尤氏帥魑魅與黃帝戰于涿鹿帝命吹角作龍吟以禦之頓戟一怒并吞亡親九隅亡遺文亡所立智士寒心參盧于是與諸侯委命于有熊氏有熊于是暨力牧神皇厲兵稱旅順殺氣以振兵法文昌而命將熊羆貔貅以為前行雕鶡雁鸇以為旗幟列子熊羆貔貅言勇鋭之士雕鶡雁鸇亦旗之所繪如曲禮所言前朱雀後玄武左青龍右白虎謂前旗後旐左旗右旗而招搖在上謂太常斗居中以正四方耳兵法止則植五􅡲午地以朱雀酉地白獸子地玄武卯地青龍中央招搖何裔云言如鳥之翔如蛇之毒龍之騰虎之奮無能敵也注以此四獸為軍陳非也士既成矣逮蚩尤逆筮之巫咸曰果哉而有咎歸藏云將戰筮之晉侯將勤王卜偃筮之遇黃帝戰于阪泉之兆時遇大有之暌或者是也正義云卜遇黃帝吉兆是戰克也筮得大有是天享也乃率風后鄧伯溫之徒及尤嘬兵濁鹿之山郡縣志濁鹿城在修武東北二十三山陽公所居三年九戰而城不下問之五胥乃設五旗五軍具四面攻之三日而後得志玄女戰經云帝與蚩尤戰九戰九不勝引歸泰山三日夜霧帝仰天而歎遇玄女授以兵符又玄女兵法云攻之三年城不下得術士五胥問之胥曰是城中之將白色商音帝之始攻得無以秋之東方行乎今皇帝為人蒼色角音此雄軍也請以戰為帝曰為之若何曰請攻三日城必下其中黃直曰帝積三年而攻不下何三日也曰不如言以罪法論乃設五旗五軍已具四面攻之三日城果下封之世不絶傳戰執尤于中冀而誅之爰謂之解今之解州寰宇記云蚩尤之封域有鹽池之利故絳之鹽也王氷黃帝經序云其血化為鹵今之解池是也方百二十里鹵色正赤故俗呼解池為蚩尤血其中有一甘泉得之鹵乃成泉北一水曰巫咸河其水入澤則鹵不復結一曰堯稍水俗作巫咸非也中冀見周書嘗麥冀州也解州本解縣天授二析虞鄉置乾祐李守貞反鄭元昭奏置州禦之以甲兵釋怒用大政順天思敘紀于太常用名之曰絶轡之野尤始亂在幽州其死在兾山海經等言黃帝命應龍攻蚩尤于冀州之野殺之啓筮云蚩尤出自羊水八肱八趾疏首登九淖以伐空桑黃帝殺之于青丘書傳皆言殺之涿鹿之野誤也尚書刑德考云涿鹿者竿人頭也黃帝殺之涿鹿之野身首異處故别葬豈竿其首于涿鹿地乎身首異處今正冡在臨河夀張而肩髀冡在巨野縣東北九里高三丈皇覽冢墓記云蚩尤冢在夀張縣闞鄉城中高七尺常以十月祠之有赤氣出亘天如匹練謂之蚩尤旗肩髀冡在山陽郡巨野縣十三州志云重聚大小與闞冡等寰宇記云濟之巨野有蚩尤墓乃肩髀冡今鄆之夀張有蚩尤冢祠以故後代聖人著其像于尊彛以為貪戒蚩尤天符之神狀類不常三代彛器多著蚩尤之像為貪虐者之戒其狀率為獸形傳以肉翅蓋始于黃帝龍魚河圗云黃帝之初有蚩尤氏兄弟七十二人銅頭鐵額食沙石制五兵之器變化雲霧演義云漢武時太原有蚩尤神畫見龜足蛇首疾其里人遂立祠齊魏間太原村落中祭蚩尤神尚不用牛頭述異記冀州有蚩尤神俗謂蚩尤人身牛蹄四目六首涿鹿間往往掘得髑髏如銅鐵蚩尤骨也齊梁間尚有蚩尤齒長二寸堅不可碎秦漢間説蚩尤牛耳鬢如劍戟有角與軒轅鬪以角觸人人不能何兾州舊樂名蚩尤戲其人兩兩三三戴角而相觸即角抵之制由其威械故貊焉貊祭蚩尤詳禮書九十一方漢祖徇沛為沛公則祠黃帝祭蚩尤于沛廷釁鼓旗後立祠長安置祠官宣帝乃立祠于夀良等史記言尤能徵召風雨而記志尤説多異龍魚河圗至謂尤亂黃帝仁義不能禁尤沒天下復擾帝乃畫尤像以威天下天下咸謂尤不死乃服妄矣後有蚩氏貪必敗虐必敗淫奢必敗不忠必敗賊必敗而昏懦不與焉方夫事之渙也常若有利有不利族而觀之固未有不敗者吾行年四十所閲載籍數十百千萬卷所見所聞若所傳聞衆矣自黃帝以來貪如蚩尤如龔工如蜀王盜跖虐如桀紂如秦皇如高緯劉鋹淫如丹朱如東昏隋煬奢如秦虎如蜀昶崇愷賊如莽卓布安史巢泚不忠如趙高王莽恭顯京卞幾千百輩矣而一身一首汔未見全保者是非其必敗耶嗟乎為善與為惡等用心作偽與作德均致力彼作偽而至于小人為惡而至于賊殺豈有他哉不過祈飽暖爾君子何嘗不衣食耶堯桀同飽顏跖同暖是故無二道也彼以豐而亡此以約而長由此語之桀跖之豐固不若堯顏之約而樂也富貴者人之所欲也而聖人者常以不得已而後居之故其有為也必推己之有餘以善於人而不竭人之有以奉于己是故勞心以治人盡神以及物其任愈重其憂愈大遜許繇遜四嶽蓋未以位為樂也天下之人見其有憂而無樂知其憂之為已也于是為之儀衛以榮之為之輿服以尊之輿服成儀衛作而聖人之所以為聖人者亦猶是也聖人何加損焉奈何繼世乘其基業不知其憂之不得已而乃紛紛從事于末侈輿服盛儀衛崇臺榭而夸子女窮日卜夜上不思所以紹其業下不思有以保其樂庸夫妄卒覷其儀衛之都輿服之姣也於是盡盡然羣起其後以篡奪之而事始擾矣易曰負且乘致冦至子曰負也者小人之事也乘也者君子之器也小人而乘君子之器盜斯奪之矣上嫚下暴盜斯伐之矣夫盜之處心非有經世之具也非有為仁之方也跳梁跋戶亦不過祈飽暖圖自肆于一日而已故其所覬曽未轉盼而禍敗已隨之矣嗚呼為善作德必有餘慶為惡作偽必有餘殃此天之定理也蚩尤天之戾氣也其威力與天通矣徒以貪殘且猶不免于戮而况其降者乎然則貪淫賊虐不忠狂􅔵之徒顧何規于後而猶囂囂以犯于惡不韙自棄于人類也耶帝柱老子曰民不畏死奈之何以死懼之刑法以治盜賊法令滋章盜賊多有何者民窮則不畏死法令奚施焉今有二舟一實而一虛相薄于中流虗者恃其無傷也盛鬪而俱覆焉今天下剽掠者莫非虛舟也而法令奚施焉是以先王之時民以里居田以井授翹農抑末所以處之者至矣凶年飢嵗為之荒政以聚之散利薄征緩刑弛力使之家給人足豈復有盛鬬之患哉剝之象曰君子以厚下安宅必厚下者固所以安其宅下不厚則宅不安宅不安者剝之道也孔子嘗言刻核太至必有不肖之心應之昔者大安歸賦雜調十五石盜賊起文成將與除之毛法仁以為軍國資用去之弗可賴帝不惑卒遂蠲削曰使地利無窮民力不匱百姓有餘吾誰而與不足于是賦調輕清而民復厚開皇之間曽未幾何常賦益輕而藏府以益積是知哀公有年飢不足之問而有子有盍徹之對為見逺矣于時之人猶以為異蓋不知百姓既足君是以足百姓既足天下尚何更得虛舟之有帝承非利仁之事前日未起不可從我始寓人以徇而有殱良之慘二十收一而有率扉之苛殱良而後輕殺臣民之怨深繆公從死者百七十有七人始皇死後宫無子者盡徇率扉而後委棄山海之命易漢武告緡算舟車戶口減半隋焬頭會箕斂道路暴骨德宗括商稅間架人多死山海古人有言始作俑者其無後乎塗車芻靈自昔有之而必曰無後者為其象人而用之也其曰無後者甚疾之之辭也揚雄曰俑哉俑哉奚食而已則哉韓昌黎俑作踊踊言刑貴踊象人足而用之李翺云始為肉刑者仲尼猶疾之况坐視飢民之死乎蓋以踊指一刑而言之周官有象人或説為俑安石非之損下益上損上益下此天地之定理也生老病死此人之定數人萌財晦此天地之定數也川竭谷虛丘夷淵實固未有利于此而不害于彼者黃食澤乳豈能益人之數哉伐其夀以強其欲而已豫悲其欲則暫強而夀則暗摍矣用其二而民有歉用其三而父子離正恐其歉不待于二離不必于三也人而言曰吾能生財斂不及民而用度足夫誰欺昔者楚靈為章華之臺伍舉諌曰君民者將民之與處民實瘠矣君安得肥唐明皇既以韓休為相而無一朝之歡或請去之帝曰吾雖苦瘠天下肥矣故孔子曰未有子富而父貧者知夫此則知損益之道矣豫既玩易而妄論夫財矣今又于帝柱帝承而再三者誠以民事之為重矣春秋書初稅畝用田賦皆重其首為民害爾帝柱之裔則大矣而帝承之胄世不得而聞之兹豫之所甚惑也帝魁夫勢之去未有不先敗其本者也國之將亡必出將亡之事人之將死必形將死之為昔武王之説詩曰支支之言曰天之所支不可壞也而其所壞亦不可支也支壞壞支其名曰逆天有不亡乎箕文之于質沙支壞也質沙之于箕文壞支也是以箕文見殺質沙卒亡其能免夫子華子曰厚而不博敬守一事正性是喜而務成一能盡能既成四夷乃平惟彼天符不周而周此神農之所以長堯舜之所以章也堯曰若何而為日月之所燭舜曰若何而服四荒之外禹曰若何而治青北九陽竒怪之所際是以重塞之主無有存國固有道之主因而不為責而不詔以不知為道以奈何為寶鄧析名言堯置諌鼓舜立謗木湯有總街之誹武有􅀈戒之鼗四君之勤如是至于桌日人人睦氏殺東里子夙沙君僇箕文桀誅關龍逢紂刳比干四主之嫉賢如仇是以賢愚之較九地之下而重天之上也由此語之自敗自成豈有難見者哉特其寐已久矣帝直帝釐有其善喪厥善無為無作此古聖之治也非特無為惡亦無為善非惟無作敝亦無作法寒而衣飢而食誰能易之是故帝者之為世或傳焉或禪焉何容心于間哉知善其治而已矣炎帝有天下七十世何乃于禹而德衰哉仁義者教世之不可後而衰亂者先王之所不能免者也抑為之善後焉爾託人以府庫弗能任其弗竊也託人以封疆弗能任其弗叛也先王躬仁義以善天下之俗是故俗成而竊者莫之蓋也叛者莫之與也言無咎釁則雖有百萬之智不足以勝天下之衆矣是以先王惟不私其後世之子孫如欲私其後世之子孫而不由先王之道未有能之者也炎耶禹耶曷德之衰路史卷十三

body:
  text: 路史卷二宋羅泌撰前紀二中三皇紀天皇氏天地成位君臣道生粤有天皇易通卦驗文按洞神部以此為中三皇君是君臣道生之後是曰天靈外紀云十二頭號曰天靈望獲強尊以獲為名以望為姓字子潤號中天皇君並詳洞神部頎嬴三舌十二文驤首鱗身傳記三皇皆虵身此亦形相爾説在女媧紀碧盧禿楬丹壺記首出庶物君有五期五行期運一云猶五條非實司元化嵗紀攝提見徐整厯紀斟元陳樞以立易威春秋保乾圖云天皇于是斟元陳樞以立易威言斟酌元化該皇極以建易道宋君云威則也言斟酌元氣陳列樞机之行以改立先法妄矣秉籙司契無文不懐乾曜迨元像符合氣太微黃書云天皇象符以合元氣長生之要亭毒萬有風行焱逝亭蓄其形毒散其氣靈書八會玉經隐注云三皇天文謂之太上玉策按洞神第十四一天皇内字二地皇内紀三人皇内文皆三元八會自然成文鳥迹之始也真誥曰八會文章之祖也一皇演八會之文為龍鳯之章雲篆之迹是矣太微黄書云靈書八會字無正形自然洞神三皇經云三皇自然之文皆以金玉為用天皇所授𤣥玉為簡青玉為文地皇所授皇玉為簡白玉為文盖道家者流以三皇經為三墳大洞經云三皇經者玉真洞清上清洞𤣥太清洞神也三洞蒼元經云洞真上清也洞𤣥靈寳也洞神三皇也然近代三墳書非此也有跋見發揮玉劵十華洞神經有三皇印三皇玉劵一曰金契三皇經云自然之文皆綴以金鈎置以玉案覆以珠巾芬以五香恃以十華人風真淳太真科云大化始立人風真淳故三寳度三品之人洞神名僊寳之道接三皇之世洞𤣥名靈寳之道明三才度五帝之世洞真名天寳之道紀清正之方濟三代之後體真得極靈寳經云三一者上一真帝之極中一真皇之主下一真王之妙天皇得極故上成皇極地皇得主故上成正一人皇得妙故上成衆妙三皇體真而守一其真極也得一而已提名旋復提名䇿名也旋復言其變化無門無旁神運四奥被迹無外無熱之陵遁甲開山圖云天皇出于柱州即無外山也鄭康成云無外之山在崑崙東南萬二千里水經注云或言即崑崙榮氏云五龍及天皇皆出其中三輔九翌為世億齡項竣始學篇天皇十三頭皇氏洞紀云一姓十三人也他書皆然獨春秋緯言天皇地皇人皇皆九人分為九州長天下故河圖括地象云天皇九翌提名旋復盖輔翌者九人爾易通卦驗云天皇氏之先與乾曜合元君有五期輔有三名注云君之用事五行更王者亦有五期三輔公卿大夫也故禮記正義謂三才既判尊卑自然而有天地初分即應有君臣治國第年代綿逺而無文爾三輔九翌併皇是十三人地皇氏天皇氏逸地皇氏作出于雄耳龍門之岳見遁甲開山圖鏗名岳姓字子元號中地皇君馬踶妝首十一龍君迭辟繼道地皇十一君皆女面龍顙馬踶水經注榮氏云兄弟十人面貌皆如女子而相類蛇身獸足出龍門山主治荒極雲章載持逮天恊徳與地侔貲洞神經云中地皇君主治八荒四極四海山川谿谷太始之元三皇一一等經云中天皇以平初元年出治中地皇以太始元年出治平初太始云上竟號年按道書有元景延和赤明延康康秦龍漢開皇無極等號而武帝内傳又有青虚三統經序有中皇之類悠悠無驗特取太始太初之意云上成正一不生不化覆却萬物覆于下却于後正一見上紀得道之秉立乎中央神與化游唯庸有光見中子等書立中道也鬼出電入龍興鸞集鈞旋轂轉周而復匝鴻烈解爰定三辰是分宵晝見通厯或謂三辰有度晝夜有經何定分之有曰不然兹特後世作儀器以揆躔度準盈虚以正昏明者固非移日月而易晝夜也是知躔度晷景之用有自于此矣魄死魂生式殷月候通厯云地皇以三十日為月十一月為冬至亦見髙氏小史此亦本自然爾凡事有出而無攷姑取以証者此之類也諸治徑易火紀周正帝系譜云天皇氏以木王地皇氏以火紀始學篇亦謂天皇以木徳王故或有疑二皇為羲炎者非也草榮木替亦號萬齡三皇經天皇地皇人皇開治各二萬八千嵗而河圖帝系譜等天地二皇俱萬八千嵗始學篇則云八千嵗按真源云盤古氏後有天皇君一十三人時遭刼火乃有地皇君一十一人各萬八千餘年乃有人皇君兄弟九人結䋲刻木四萬五千六百年皆難取信夫太素蓂莖固有定數然方此時嵗厯未著烏從而紀之哉三墳書以一嵗為一易草木盖以草木周禅為之紀辨爾今都波之人莫知四時之候女貞之俗不知正朔紀年但云已見草青幾度流求之國以月生死辨時以草木榮枯為嵗儋崖觀禽獸産乳識時占􅘂芋成熟紀嵗土番以麥熟為嵗首宕昌黨項皆候草木以記時序太古之世中國之俗有以與蠻夷同斯不疑者曰萬齡者亦號數之萬爾伯陽父曰太古二皇得道之秉立乎中央神與化游以撫四方是故能天運地墆而輪轉無廢水流不止而與萬物相終始然不曰三皇者豈非泰皇之世人道大備非復二皇之代故退首乎十紀而不遂與二靈參邪予故從之别紀二靈而返泰皇氏于九頭紀九頭紀泰皇氏地皇氏逸于有人皇九男相像其身九章見雒書胡洮龍軀姓愷名胡洮字文生人面龍身九頭驤首逹腋玉篇云亦臂也今作掖腋出刑馬山提地之國遁甲開山圖云人皇出于刑馬山提地之國山今在泰州伯陽谷水出之老子之所至相厥山川形成勢集才為九州謂之九囿見雒書春秋命厯叙云人皇出暘谷分九河别居一方因是區理是以後世謂居方氏見三墳又雒書云人皇出于提地之國兄弟别長九州已居中州以制八輔則九州肇此分矣今石􅀈有九皇里非一所也太平元正肇出中區太平元年正月出治大中祥符五年神祖降言上天祐徳之意以為玉清分職實曰九天司命在昔乃為人皇盖九人之一亦嘗降治國家之始祖云駕六提羽乗雲祗車見雒書寰宇記作抵車誤制其八土為人立命守一得妙人氣自正太平經云三皇之時人皆氣清深知天地之至情故悉得至道爰役風雨以御六氣昭明神靈光際無臬挻挏萬物無門無毒以叶言教為天下谷言教如云言辭猶文教也廸出谷口谷口古塞門或云上暘谷蜀秦宓傳云三皇乗祗車出谷口謂今之斜谷樂史從之妄矣還乗青冥覆露六幕罔不承命上下四方道褱髙厚何徳之僣其所付畀與人天參離艮是仇雒書適三辟云人皇别長九州離艮地精生女為后夫婦之道始此又見春秋命厯叙有佐無位主不虚王臣不虚貴文子鶡冠子云九皇之制主不虚王臣不虚貴階級尊卑名號自居吏民于次者無國厯寵厯録副其所付授與天人參相結連鉤考之具不備也政教君臣所自起也飲食男女所自始也此言政教君臣所自起飲食男女所自始則前乎此者無政教無君臣有不男女不飲食者矣他可類推當是之時天下思服日出而作日内而息無所用已頽然汔終為世之日兩皇並隆右中天皇而下河圖年代厯等皆記之三五厯云人皇百五十六代合四萬五千六百年小司馬氏取之不足稽也寳櫝記云斯頻國石室中有三皇石像皆龍形長六丈天皇十二頭地皇十一頭人皇九頭頭者人也若今數牛魚然古質故爾有天地則有萬物有萬物則有男女有男女則有夫婦有夫婦則有父子有君臣道也昔者太極泮而渾敦氏職焉渾敦氏逸而有初三皇君三皇射而二靈作二靈後乃有十紀其六在鉅靈氏之前百七十有八姓其四在鉅靈氏之後三紀五十二姓而䟽仡之紀自黃帝始其嵗之逺近置而勿論可也録條刺于右端春秋命厯序云自開闢至獲麟二百二十七萬六千嵗分為十紀易乾鑿度及春秋元命苞皆云二百七十六萬嵗每紀為一十六萬七千年廣雅因之均為誕妄夫二十九萬一千八百四十嵗而反太素㝠莖此道之根本也推賾于厯數之理者能知之有太素之年説見餘論其一曰九頭是為一姓紀則泰皇氏紀也秦丞相綰曰古有天皇有地皇有泰皇泰皇最貴貴者非貴于二皇也以其阜民物備君臣政治之足貴也按孔衍春秋後語泰皇乃人皇張晏云人皇九首韓敕孔廟碑云前開九頭以叶言教是也泰皇即九頭紀舊記不之知爾真源賦云人皇厭倦塵事乃授籙于五姓知為九頭紀也韋昭亦云人皇九人所謂九皇然鶡冠子所稱九皇則又非此至董仲舒繁露乃推神農為九皇異矣五龍二是謂五姓紀治在五方司五類五方之象類布山岳張陵二十四治圖云伏羲造天地五龍布山岳也方是時也世亟巢穴日月貞明真源云五姓乗雲車而治天下時人穴處巢居日月貞明一曰五龍紀盖龍徳而正中者也漢世祠之膚施春秋命厯序云皇伯皇仲皇叔皇季皇少五姓同期俱駕龍號曰五龍遁甲開山圖云五龍見教天皇榮氏云五龍爰皇後君也昆弟五人人面而龍身然以五音五行分配為五龍之名如角龍木僊之類而以宫龍土僊為父又言五龍以降天皇兄弟十二人分五方為十二部法五龍之迹行無為之化為十二時神是天皇在五龍之後妄矣酈元水經云父與諸子俱僊治在五方亦見李善游僊詩注今上郡奢延膚施縣有五龍山盖其出治之所也故漢宣帝立五龍僊人祠于膚施亦著地理志按膚施今𨽻延安五龍山在焉有帝原水黃帝祠九域志云五龍池有黃帝五龍祠四在山上亦曰僊泉祠寰宇記五龍泉出山東一里平石縫雄吼甘美上有五龍堂而五龍谷水乃在耀之雲陽縣雲陽宫之西南又非上黨之五龍山也攝提三是謂五十九姓紀孟詵錦帶前書謂之括提紀或作提揵提揵皆非盖攝提首紀爾太史公言九皇氏沒六十四氏興六十四氏沒而三皇興是也謂六十四氏盖併五姓而言而所謂三皇者乃合雒之三姓也在漢皆餼漢舊儀云凡聖王之法祭天地日月星辰山川萬神皆古之人能紀天地五行之氣奉其功以成人者也故其祭祀皆以人事之禮食之天與土地金木水火土石是矣又祭三皇五帝九皇六十四氏凡八十有一姓皆古帝王也故鄭釋周官以三皇五帝九皇六十四氏為四類氏或作民誤合雒四是謂三姓紀龜圖出雒從而合之所謂黃帝合而不死者或作雄又轉為熊俱非教人穴居錦帶書云合雒四姓教人穴居有巢教人巢居四姓謂叙命紀乗蜚鹿以理見真源賦連通五是謂六姓紀或作連逋乗蜚麟以理見賦蜚鹿蜚麟蜚羊之類盖皆馬名如蜚莵青龍白鶴野麋娥鹿走孤騶吾等爾叙命六是謂四姓紀克以命叙而通之也駕六龍而治賦云五姓後付七十二姓駕六龍而治天下七十二姓者攝提合雒連逋叙命之四紀也然云次傳五龍氏又以六姓紀為後五姓次傳叙命紀合一百一十萬七百五十年至遂人則妄矣右古六紀在鉅靈氏前循蜚七是謂二十一姓紀自鉅靈氏而下紀也徳厚信矼天下之人循其化以若飛也陶𢎞景譜厯云上古有循飛紀因提八如辰放氏之衣皮有巢氏之編堇遂人氏之出穴皆因其變而舉之也即十有三姓也諸記不一按雒書云三皇號九頭紀次五帝號五龍紀次攝提紀次連逋紀次叙命紀次因提紀次禪通紀次為合雒循蜚傳之謬爾禪通九是謂十有八姓紀史皇氏之通封禪者十有八姓也三墳書作通姓氏又以九頭五龍提犍三紀在通姓後妄也大率此書雖有所取然淺陋每難据云䟽仡十自黃帝氏而紀䟽以知逺仡以審㫁仁義道徳之所用也自泰氏沒而嘗無君矣其于民也聚生羣處無君親之異仁義禮智之所不用也施報往來之所不行也其有君者五紀予不知幾氏矣司馬貞曰九紀之間豈惟數千百載三二十皇而已哉而莊周之説易姓而王封泰山禅梁甫者盖七十有二代其有形兆整堮者千八百餘所然則宇宙之耑握符登紀為萬物之主者可勝記邪予讀易大傳而知天地之有初翔於僻邑荒村恍見大古之俗顧豈俟身親而後信哉昔者成湯之問夏棘曰古初有物乎夏棘曰古初無物今烏得物使後之人而謂今之無物可乎冉求亦問於仲尼曰未有天地可知乎仲尼曰古猶今也曰然則昔吾昭然而今昒然何也曰昔之昭然神者先受之今之昒然又且為不神者求也祇裯新襲蟣蝨生之州沼創出蟲魚産之一氣之易萬物自見故雖天地必有初也而况于人乎譚藪云道言天地初闢一日為雞二日為狗三日為猪四日為羊五日為牛六日為馬七日為人賤者易生貴者難毓故今人以建寅之月一日起至七為人日其源于此盖不知也兩間之物彼亦一無窮此亦一無窮豈以不接而遽蔑斷之哉兹固存而不論泰皇以下五紀凡九萬嵗十紀者舊言六在遂人前鄭康成六藝論云遂人後厯六紀九十一代至伏羲始作十二言之教方叔機注云九頭一五龍五攝提七十二合雒三連逋六叙命四凡九十有一如鄭所言則十紀皆在遂人之後而四紀又在伏羲之後非也馬緫之徒俱謂十紀通百八十有七代又云伏羲前三後六各立年嵗亦惟取據張揖貞到徐整等爾皆不可質路史卷二

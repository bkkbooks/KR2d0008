body:
  text: 路史卷十八宋羅泌撰後紀九疏仡紀髙辛氏帝嚳髙辛氏姬姓古史考云或云房姓妄也一云妘姓曰嚳一作嚳集韻髙辛號通作嚳一曰逡見世紀一作夋山海經作俊言帝俊處甚多皆謂嚳郭景純皆以為舜謂舜俊聲相近失所考矣嚳之字曰亡斤黃帝氏之子曰玄枵之後也世本嚳黃帝之曽孫漢志言顓帝蒼林昌意之子帝嚳青陽玄囂之子皆並二人而言繆亂如此外紀玄囂雷祖之子是父僑極大戴禮蟜極取陳豐氏曰裒髙堂隆北郊表日握裒履巨迹是也履大迹而􅰊生嚳方嚳之生握裒莫覺生而神異自言其名遂以名見大戴禮世紀故曹植贊及張顯析言云髙辛氏初生自言其名其君氏終無迷繆也方頥龎覭珠庭仳齒戴干河圖矩起及白虎通云帝嚳駢齒上法日參秉度成紀以理隂陽帝系亦云方頥駢齒元命苞云帝嚳戴干是謂清明發節移度蓋像招搖注云干楯也招搖為天戈戈楯相副戴之像見天中以為表干或作辛古辛作干干作干二字相似云厥德神靈厥行祗肅年十有五而佐髙陽氏受封于辛為侯國十道志襄邑有髙辛城地志云下邑梁國也今碭山縣下邑今𨽻南京帝系譜云帝嚳年十五佐顓頊有功封為諸侯邑于髙辛九域志有髙辛城廟髙陽崩而嚳是立以木紀德色尚黑正朔服度惟時之宜十三月為正三正記云正朔三而改文質再而復禮記正義云夏以上以此推正朔皆三而改矣鄭説三帛謂髙陽氏用赤繒髙辛以黑其餘諸侯用白繒以此却推舜以十一月為正尚赤堯以十二月尚白餘諸侯用白繒髙辛以十三月尚黑故用黑繒髙陽氏以十一月尚赤故云以赤繒少昊以十二月尚白又謂黃帝以十月尚黑神農以十一月尚赤女媧以十二月尚白伏羲而上未聞易言帝出乎震則當以伏羲為始後世如漢循秦用十月太初始用夏正魏景初之建丑唐載初之建子仁而威惠而信其色郁郁其德嶷嶷其動也時其服也士聰明濬武嶷嶷涘涘侻衣服而不駔冬輕以暖夏輕而清窶薶其屋室土事不文木事不飾以示民之節謂德莫髙于博愛人政莫髙于博利人故政莫大于信治莫大于仁吾慎此而已約身博施惟愛人利物是圖謂黃帝之言曰道若川水其出亡已其流亡止是以服人而不為仇分人而不為噂順天之義知民之急修身而天下服故達于天下而不忘緣巧者之事行仁者之操上由黃帝之道而明之守髙陽之庸而正之節仁之器以修其財而身專其美矣于是敘三辰以著衆厯日月而送迎之以順天之則謂寅賓出日寅餞納日魯語云嚳能次序三辰以治厯明時教民稼穡以因民也命重為木正黎為火正該為金正修及熙為水正句龍為土正是為五官分職諸國封為上公社稷五祀是尊是奉五官顓帝所命髙辛從而任之昭公十七年傳顓頊之下服注曰春官為木正夏官為火正秋官為金正冬官為水正中官為土正髙辛因之此五人神而配五行之神者勾芒祝融之徒乃五行之神名非重熙之徒雖非其名以其名以配食故亦得名之如社稷本五榖之神配食黎者亦曰社稷所謂尊本也氏克官説天文卯下地火紀昭融而世賴之賈逵云祝甚也融朗也逮其繼世失遺其業守乃命弟回嗣綏厥職昭顯天地之光以生柔嘉材爰封之吳謹農祥乩欿傺故六氣正而天道平五正建而人事理春秋文耀鈎云髙辛受命重黎説天文昭二十九年傳蔡墨曰遂濟窮桑顓頊所居然黎乃顓頊之孫其世相及故鄭語謂黎為髙辛氏火正堯典注謂髙辛氏命重為南正司天黎為火正司地周禮疏序謂髙辛與顓頊相繼無隔故重黎事顓頊又事髙辛如稷契事堯又事舜也乃闓閟塞履龍斷委關貸賑亡益恤逺人盍閭連墓使人相親故飲食相與守望相助而疾病相扶持揖其民力更相為師因其土宜以為民􅀢故生亡乏用而死亡傳尸貴賤賤貴以通其器耕以自養而以其餘應于上故平管云應良天子耕以云云工賈以通故關夷而市平財亡鬱廢而愚亡不教修其禮樂正其兵農故升降得以有數長幼得以有敘而班白者不負戴矣粵命臺駘宣汾洮鄣大澤道演擊汰而民離湍決之患帝用嘉之封之汾川以處太鹵封允格賞帥味而下以和允格封鄀以日至設丘兆于南郊以祀上帝日月星辰先王偕食潔其祭服備其帷帳陳之圭幣薦之黑繒右社稷而左宗廟制其溪陵明鬼神而敬祭為之數薦所以重本也二儀實録云帝嚳始制帷帳命咸黑典樂為聲歌作九招制六列五罃樂緯及潛夫論等皆作六英竇蘋以六英為少昊樂誤享上帝以中罃即中英命柞卜柞卜吕氏傳世紀咸作倕世紀云嚳命倕作鞞先儒小鼓有柄曰鞀大鞀謂之鞞作鼙鼓制笭管塤箎祥金之鐘沉鳴之磬伶人咸抃鳯皇天翟舞之以康帝功鼓奏以觀聲歌奏以觀和舞奏以觀禮禮以樂和政是以成命曰九招咸黑為頌以歌九招之就劉協文心雕龍云帝嚳之世成纍為頌咸黑見吕氏春秋作成纍字之誤也兔園策引吕氏春秋咸黑為九歌六英以康帝功樂緯黃帝曰咸池顓頊曰六莖帝嚳六英堯大章舜大招湯大濩周曰酌是以清和上升天下白虎通云樂者所以象德表功而殊名也記曰顓帝樂曰六莖六莖言律厯以調隂陽著萬物也帝嚳曰五韺言能調和五聲以養萬物調其英華也注志謂顓頊作六莖帝嚳五英英者英茂莖者根莖羿以善射服事先王乃命司衡賜以纍矰彤弓蒿矢郭云纍矰矢名以白羽為之大傳云白羽之矰是也或作繒非羿是以去下地之白難而民得以佚白難凶頑為亂之人如封豕長蛇之類皆其號名爾以故羿死託于宗布鴻烈解云羿死託祀于宗布布祭名也説者以為夏之窮羿失之夫窮羿非若蚩尤僅作兵器徒能僭叛為盜爾豈宜有祀按字書有羿云古之射人廣韻云羿古諸侯一云射官而説文乃云羿嚳時射官少康滅之則似以羿為之後世矣故世紀以為帝嚳之世掌射加賜弓矢封之于鉏為帝司射厯唐及虞而賈逵云嚳賜弓矢者羿之先祖皆失所考于是盡地之制受少昊髙陽之經理卒創九州以統理下國正甽均賦以調民人水中之可居者曰州川有所擁也後世加水故共工幽州作州而蘇子遂云北裔水中非也九州之制久矣伯禹作九賦爾而説者乃謂禹始分九州妄也炎黃已九州矣通典等謂帝嚳九州蓋皆定其疆理欲其支脈貫通得所爾非創之也非若後世率意割南益北斷手屬足而不預其地理者也和以仁義持以信禮為亡為事亡事混美于下故卿而不理管云靜也動而民罔不欽言而民罔不勸男有分女有歸壯有用老有終涼風至而陳麾太白髙而轉戰然後倔強惠命因其時而誨其民修其方而天下定守髙陽之道而不務乎其前任智守數以道其常周聽廣莫以補其明于是致學柏昭而師于赤松舟人授書于鍾山而拜師于牧德記言帝嚳拜師牧德按四極明科謂九天真王于牧德之臺授嚳以靈寶內文帝以道治世遂祕之鍾山而太霄琅書謂靈寶祕文內符九天真王等以授帝嚳藏之鍾山北河劍經則言王子詣鍾山授九化十變之書隱遁日月遊行星辰其言難考李膺紀青城有天皇受帝嚳五符文于此山牧德之臺今在發節移數順天思序以道御世秉度成紀行星辰遁日月以從天地之固然故山不童而用贍澤不弊而養足不出百里而求足管子舉星畢曳雲稍春乘馬而秋登龍黃斧紼衣溉執中而獲天下大戴禮云春夏乘馬秋冬乘龍龍馬八尺者充亂龍云古者畜龍乘車駕龍故今畫之非也法尚乎一而政貴乎信故下服度不備待而得和故民反纍皇道炳燠萬流仰鏡牛馬之牧不相反人民之俗不相知管子侈靡霜雹所沾日月所監亡不尊親地寶天瑞應誠而至于是省方以齊民之物而登封以報其政之成是以四海同風九州共貫天下歸往而人以樂生都于亳殷亳殷辛其始國故號曰髙辛氏或謂河南偃師城西二十里乃鄉春氏之尸氏今睢陽治宋城之地秦再思云周封商後于宋太祖皇帝初作鎮于此及有天下號大宋叶于皇考之諱又宋主大火而德復在火可謂符契今髙辛陵廟去宋城三十里是為王子者道書謂帝嚳為王子帝生三十而御天六十有三載崩葬頓丘臺城隂野之秋山所謂頓丘臺也山在魏之頓丘元和志頓丘西北三十五有秋山縣北三十有帝嚳墓寰宇記秋山冢見存皇覽云在頓丘城南唐以仲春祀帝嚳于頓丘三年一享藏景録及形神經云王子曽詣鍾山獲九化十變經一旦疾崩營冢渤海山即秋山也山經九域志皆作狄云山隂今陵見存又云夏中衰有人發渤海山王子墓室中無有唯一劍在北寢上作龍鳴數聲人不敢近蓋仙者言解法多以劍自代也後失所在云四后胄后則一為正三為妃論者以為四妃並列妄故隨主欲立五后辛彥之曰后與天子亡體齊尊不宜有五而博士何安駮之謂嚳四妃舜二妃何有常數不學之失上妃有駘氏曰薑嫄鄭玄云嚳立四妃以象后妃四星一明者為正三小為次帝堯因之夫薑嫄既曰上妃則為后矣劉瑜疏古天子一娶九女姪娣有寢河圖授嗣正在九房以此清淨專一而好稼穡列女衣帝衣履帝敏居期而生棄山海經云后稷生于巨迹列子因之太史公禇先生鄭康成記之是説也先諸詩而有也春秋元命苞曰薑嫄遊閟宫其地扶桑履大人迹而生稷又云蒼神精感薑嫄而生卦之得震故周蒼代商蒼神謂嚳木王者也論衡曰嫄衣帝嚳之衣坐德帝所而妊故怪之詩言履帝武敏或問豫曰歐永叔蘇明允洪駒父輩皆辨無是事豫曰神理所在居于恍忽汗漫之間氤氲通行蓋有難廢者今齊之章丘縣龍蟠山上有神迹祠焉皇覽云即薑嫄所履者亦見十道志及述征記伏琛齊地記宋濟南太守蕭承之立祠于山妻學履之是生齊帝亦見本史則列子之言未可遽非棄惟元子披頥象亢潛夫論云后稷披頥元命苞曰稷岐頥自求是謂好農蓋象角亢戴土食榖注云面皮有土象頥面為下部下部為地巧于利也棄之每異嫄乃收之爰名曰棄而字之曰度辰世本嫄為上妃天問稷維元子元妃之子也真源賦云帝未立時有薑嫄履大迹而生男耻之三棄草野有異帝聞薑嫄有聖子乃詔為妃賜姓姬名曰棄名棄亦借苪司徒少名棄赤而毛棄之恭姬之妾取以入而名棄韓郎伯竒生棄荆棘數日兵散乃收養之王充云或時禹稷之母欲妊適吞薏乙履迹邪古今好怪謂不見怪則亦不異爾性敷而仁戲惟稷黍列女傳云性敷而仁簡狄教之時藝桑麻長研耕稼為唐天官及事虞夏以耕織為本教發災糞土别五土之宜教民時萟嘉穀致貽有相之道書刑德考云堯使稷為司馬文子云為大農師齊職儀文云堯命羲叔為司馬夏官也虞夏以司馬為夏官棄居其職孔頴達云舜命羣官使禹宅百揆天官也契敷五教地官也伯夷秩宗春官也咎陶為士秋官也垂共工冬官也惟夏官不言命然上言禹遜于稷契帝曰汝后稷播時百榖不言命官明是稷為司馬夏官也故鄭詩箋云稷居稷官民賴其功後雖為司馬天下猶以后稷稱焉頴達不知后稷乃官也鄭氏昏禮謁文讚云稷為天官故齊職儀云棄授人時尊為天官則稷實天官又非司馬矣麥牟天降故云周有麥瑞后稷始貽民以麥種絳郡有稷山隨圖經云稷播種百榖于此竇蘋云山西南去安邑六十里唐之稷山今屬河中修封疆為田順土造區迪民降岌而後闕云稷始為甽田以二耜為耦闕一甽一夫三百甽而播種于闕后稷天下之為烈也豈一手一足哉虞帝乃國之漦號后稷與台邰同一作駘昔景王使詹桓責晉曰我自后稷駘苪岐畢吾西土也注武功邰城是十三州志云古文作台然稷之母有駘氏傳皆作漦其地在齊世不知也􅕆百穀而山死山海經云后稷死于黑水之山國語展禽之言世紀云死于黑水潢渚之野五行書云以癸巳日死取姞人是生漦繭世濟其德漦繭生叔均是代其父及稷播穀是為田祖自商以來祀之五行書云田祖以甲寅日生田主以乙巳日死辛亥葬大司徒注云田主田神后土及田正之神所依疏辨為堯稷官立稼穡死配稷名為田正詩人謂之田祖籥師注云田祖謂神農以神農為造田之祖而后稷亦有田功故傳謂有事于尊可以及卑祭田祖則后稷田正后土亦在焉然此經言叔均為田祖則自是一人知其仂田者衆不得指云神農后稷先嗇司嗇田祖當别人也世為后稷及夏之衰有不窋者失其官守竄居于尉李不窋非稷之子乃夏末時人國語云不窋事虞夏非也而史記本世紀遂以為稷所生妄也有辨見發揮尉李即春秋義渠之地成相篇砥石是也今慶州有不窋城生鞠是為鞠陶生公劉公劉能修后稷之業民保歸焉周道由興生慶節始國于邠生皇僕皇僕生弗差弗差生偽隃偽隃生公非公非生辟方辟方生髙圉髙圉能帥稷者周人報焉生侯牟侯牟生亞圉亞圉卒弟雲都立生叔組紺是為祖類祖類生諸是為泰公生亶父是為古公泰王不窋周家之世最為繆亂世本云公非辟方髙圉侯牟亞圉雲都祖紺諸太公如此而已班氏表乃云辟方公非子髙圉辟方子夷俟髙圉子雲都亞圉弟其世顯甚然史記乃無辟方侯牟雲都諸故皇甫謐遂以髙公非髙圉亞圉祖紺之字吾知其牽于單穆公之言而合之也故遂詳之釋例亦云髙圉僕窋九世孫而索隱謂辟方侯牟皆二人為得之侯牟或作夷岐偽隃即毁隃祖紺即公叔祖類人表曰公祖世表曰叔類也避熏育居岐陽實始剪商復取于駘曰泰薑生泰伯仲雍季厯季厯居程見周書世紀古公屬焉泰伯闞知及弟仲雍竄于荆曼居梅里荆人義而君之號勾吳古公薨計于近郊而還于畨離亦稱越梅里在盍閭城北五十里世本云孰哉居畨離伯卒仲繼剪髮文身裸以為俗是謂孰哉虞仲史記謂泰伯斷髮文身非也乃仲雍也左傳及潛夫論詳之王充亦云太伯教吳冠帶孰哉隨其俗而與之俱倮也故吳之知禮義太伯改之也此與左氏端委以治周禮仲雍嗣之斷髮文身陸氏吳地記雍冢在常熟虞山上與言偃家並武王封其曽孫仲于夏虛為西吳亦曰虞仲十二世而晉滅之仲攴孫卿于周封樊為樊氏樊仲氏卿氏皮氏虞氏方紐于氏僖五年滅虞定五年于越入吳虞滅吳始大二十四世而越滅之有燭庸厥由常壽夫餘鳬臾胥門慶忌慶師公冶公祖公劉泰伯漆雕以上復姓及夢餘句壽延畨夫槩冶延闔㧁􅔨常開周古蠧禽頗之氏其以邑氏者偃州州來延陵棠溪堂溪唐溪郁閭及郁􅪿或柯之氏潛夫論又有成氏梁氏公氏延出延陵與州來為二姓纂又有延州氏誤越滅吳流其三子長曰鴻流婺源葬焉寰宇記婺源西七十五村葬處名吳山倭鄖無錫皆吳分也周處云武王追封周章于吳乃封章之子越于無錫魏略云倭王自稱太伯後季厯再世而興周即王季子思云帝乙時王季以九命作伯文王因之小戎啚云帝乙命王季為西伯又命文王典治南國史記紂以西伯為三公賜之弓矢鈇鉞得專征伐又再世康王一晏朝而暴公作關睢之詩以諷史遷云周道衰詩人本之祍席而關雎作幽厲之闕始于祍席故曰關睢之亂以為風始齊魯韓三家則云康王政衰詩也楊雄亦云周康之時關雎作乎上陸云康王晚朝關雎作刺也又再世穆王耄荒訓夏贖刑而書不續又再世懿益衰詩人遂刺又五世幽王不道死于驪山之下申侯立平王而東遷黍離遂作世謂孔子降王風妄也夫風者風土之歌耳黍離自是東周之土風東遷之後政僅施于圻內不能刑于四方故國人隨其土風如此非謂降也若以黍離為降則七月何為列于風邪且雅亦有東周之詩世不知爾節南山十月之交乃桓莊之詩亦可謂降雅乎曰王風者春秋書王之意也然新序又以為衛宣公之子壽閔其兄伋而作韓詩及曹植惡鳥論以為伯封作學者宜勿妄談王政陵遲至魯惠公遂請郊廟之禮未與而顧用之于是禮樂征伐不由于天子故孔子傷之而春秋作又十三世而敬王丐立子朝之難遂止成周三十有八年有星孛于東方明年而西狩獲麟聖人于是絶筆春秋而書亦終于秦誓吾知秦之必蹶周也故十一世王然而周卒亡秦卒有天下於呼王者之迹熄而詩亡詩亡而後春秋作詩亡謂孔子時説者云詩亡于陳靈公謬哉靈公之殺乃魯宣之十年春秋之作百二十一年矣絶筆獲麟有二論見發揮四贊曰帝逡髙辛厥德神靈生而有異自言其名其色郁郁侻衣薶屋次序三辰六畜遮育工賈以通拜師牧德樂作五罃鳯皇天翟法尚乎一政貴乎信霜雹所沾孰不尊親路史卷十八

body:
  text: 路史卷十二宋羅泌撰後紀三禪通紀炎帝炎帝神農氏農從䢅囱聲弊文作由古作故吕春秋管法法皆云堯使稷為田之訛也農厚也籕作襻洞靈經皆滋于此姓伊耆一作祈世以為堯姓非也熊安云伊耆氏即神農詳詩禮正義集韻作帆云古天子號蓋誤當作阠名軌見春秋鉤命訣注一曰石年見春秋命厯序或作耳訛是為後帝皇君見洞神部禮記正義云神農下為地皇作耒耜播百穀炎精之君也乘火德母安登感神于常羊春秋元命苞云少典妃安登遊于華陽有神童首感之于常羊生神子人面龍顔好耕是謂神農詩含神霧云龍首顔似龍也此亦後世劉媪潘夫人之事爾常羊華陽之常陽也安登傳多作女登生神農于列山之石室即烈山厲山也見荆州記水經賴山今江夏隋縣北界厲鄉村南重山也生而九井出焉荆記云井在山北重塹周之廣一頃二十畝內有地云神農宅神農所生神農既育九井自穿舊言汲一井則八井震動寰宇記云縣北百里人不敢觸按今一穴大木木傍蔭人即其處為神農社年常祠之荆州圖言永陽縣西北二百三十厲鄉山東有石穴高三十丈長二百丈謂之神農穴神農生此老子亦生于此故崔玄山瀨鄉記以為老子教堂之故處初少典氏取于有蟜氏是曰安登有蟜國也世紀云神農母任姒有蟜氏女曰女登非也孰有一姓而任蟜兩國者蓋任姒乃帝魁之母世多以帝魁為神農因合之爾生子二人一為黃帝之先襲少典氏一為神農是為炎帝詳譜圖炎帝長于薑水成為薑姓薑姓之祖也扶風薑陽鄭駁異義云炎帝薑姓太昊所賜黃帝姬姓炎帝所賜其初國伊繼國耆故氏伊耆伊即伊尹之邦耆即文王之所伐者猶陶唐然詳國名記長八尺有七寸𢎞身而牛顛願顛首今炎陵廟像正為王者衣衮戴冕按太祖皇帝詔修先代帝王祠廟至百二十間以上令禮院立定配享功臣檢討儀相宜其有所據矣龍顔而大脣懷成鈐戴玉理命厯序云有神人名石耳蒼色大肩戴玉理注云日月清有次序故神應和氣以生之大脣一作大睂玉理一作玉英猶玉勝也生三辰而能言五日而能行七朝而齒具三嵗而知稼穡般戲之事必于黍稷日于淇山之陽求其利民宜久食之穀而藝之天感嘉生菽粟誕苓爰勤收拾剛壤地而時焉已則釐牟五子偕至周書曰神農之時天雨粟神農取種之夫五穀未有不自天來者或曰天道逺神農后稷之事未必皆然詩言有相之道第以其翼翼油油若有相之者爾此不通之論天人之交何逺之有詳發揮雨栗説神農灼其可以養民也于是因天之時分地之利垡土㽨穢燒􅀈埩野以教天下播種嗣瓜蓏之實而省殺生之敝始諸飲食蒸民乃粒梁武祠像碑云神農氏因宜教田闢土種穀以振萬民而管子謂神農教耕生穀以致民利陶𢎞景本草序神農嘗草以省殺生之弊惟生亡德咸若古政形墳文于是師于悉諸九靈學于老龍吉祖其高矩以致于理悉諸新序作悉老鄧姓辨作悉清非九靈或云大成也莊子云妸何甘與神農同學于老龍吉或者以為寓言非實夫寓言者謂寓其理于言借事以寄吾之理爾非鑿空造端之説也受火之瑞上承熒惑故以火紀時焉神農之有天下伐邪禪邪不可得而詳矣董仲舒繁露云神農氏之有天下與天地俱起乎其有所伐乎神農有所伐則可湯武有所伐則不可何也是以神農氏為伐非邪于是修火之利管子云神農作種五穀于淇山之陽九州之人乃知穀食黃帝作鑽燧生火以熟腥臊民食之無兹􅠽之疾而天下化此正言炎燧改火事字誤為黃故下乃言黃帝之王童山竭澤云云可見范金排貨以濟國用班志云食貨興于神農之世而易明言神農氏聚天下之貨貨幣之來久矣故杜佑謂神農列鄽于國以聚貨幣日中為市以變有無竊考前譜異布中有一種長二寸六分首廣寸六分有肉好無輪郭足間正圓面文六字背一字又一種長二寸四分上廣寸五分下寸七分首廣六分足間八寸重八銖有郭面七字縱橫神農幣也又不知年代品有一大錢圓徑寸五分重七銖好圓無輪郭狀如半兩銅色純赤左有字鉤畫甚精神字也而董譜文有幔由一金佑所推知貨自神農以來有之不知已二三分金貨矣因時變㷄以抑時疾以炮以燖以為澧洛醴酪也醴味似澧酪味似洛禮運言汙尊抔飲謂神農時楊仲昌加籩議云神農時雖有黍稷猶未有酒醴後聖作為醴酪猶存玄酒示不忘古儀酒正義亦云神農以上水為元酒此不知何所見古史考云始有燔炙裹肉燒之曰炮此燧人之世謂木器液金器腥聖人飲于土而食于土于是大埏埴以為器而人壽陶冶之事始于燧人蓋有人事則有之若古聖人每創一事必盡其變而後已是故卦立則有貞悔占稽之事室立則有宫隅門牆之制穀藝而烹蒸杵銍之用興藥嘗而炮炙佐使之法起槌輪為大輅之始兜帽為軒冕之源燔豕為柴望之濫觴土鼓乃雲門之拳石理勢之來事有必至此燧人出火而陶冶燔炮之事有不待于後世也黃帝內傳言黃帝始作陶蚩尤作冶吕春秋言昆吾始陶冶蓋廣之爾此類尤多宜考官長師事悉以火紀故稱炎焉世紀云以火承木位在南方主夏故謂炎帝關尹告列子云神農有炎之德者通典云有火星之瑞也肇迹列山故又以列山厲山為氏或作烈山厲山同按列厲與烈音本通垂帶如厲裂也故音為裂趙都賦與越叶蜀賦亦與結叶詩栗烈叶卒嵗而校獵賦隆烈亦與內叶知古同也且厲山即賴山故登真隱決音薤字為咸厲切蓋音如賴注者不知謂音小異誤矣開山圖云列山氏産山谷分布元氣蓋即厲山氏蔡墨曰列山氏炎帝也起于厲山者禮七祀太厲傷神也儀禮正義謂帝王之無後者至漢七祀無厲而有山神説者遂以為厲山氏妄矣杜預又以烈山謂炎帝時諸侯劉玄已非之預若天命正氣節審寒暑以平早晚之期謂人之生太倉為主而太倉穀為主天下萬物亡以易于穀于是斫木為耜揉木為耒􅀈窮髮跋艽野制畝清甽分龍斷而戒之耕然後六穀䑋以供粢盛而給軍國漢書云神農之教帶甲百萬而無粟則不能守也兵書謂神農以石為兵而帝亦嘗伐補遂則軍旅已備矣漢代猶有神農兵法一篇則兵武之事有不出于有巢太昊之時乎第年載遼邈有不得而詳乎爾爰布國禁春夏所生不傷不害謹修地利以成萬物亡敓人所務而農得以順其時教之桑麻以為布帛相土停居令人知所趍避乃命赤冀創救鐵為杵臼作耝耨錢鎛梋鬵井竈以濟萬民􅀈䀁刳􅀈以蒸以􅀢民始播食而不勝赤冀即赤糞赤糞若也一作赤制炎帝之臣與攝提諸稽元囂皆十二支神作糞者誤按易傳九事非必盡黃帝堯舜時吕春秋云赤糞作杵臼而新論以杵臼為伏羲作黃帝內傳以為黃帝作鉏耨􅀈釜之類事始等始各不同有説别見故為政曰唯天生民惟君奉天唯食喪祭衣服教化一歸于政林林生人亡亂政典此三墳書神農政興之言又設教曰民為邦本食為民天農不正食不充民不正用不衷士丁壯而不耕則受其飢女當年而不織則當其寒不貴難得之貨不器無用之物是故耕不強者亡以養其身織不力者莫以蓋其形有餘不足各歸其身是故亡十倍之賈倍稱之民士力耕而女力績力歸于上而功被于下嵗守十三三年與少半成嵗三十一而國有十一嵗之儲有以利下而不足以傷民乃制為之數一穀不登損一穀穀之法十倍二穀不登損二穀穀之法倍十蓰夷疏滿之亡食者與之塵亡種者貸之新農夫敬事力作故天毁地凶旱泆並作而亡有入于溝壑乞請者時其時以待天權也是以年穀順成衣食足而禮義興姦邪不作亡制令而人從淮南子云神農無制令而人從唐虞有制令而無刑罰非無制令設而不用也故六韜云神農以為賞在于成民之生然賞不施于民而天下化則非無制令矣衆金貨通有亡按神農貨曰一金則其為幣已衆矣故董氏譜謂杜佑推貨自神農以來不知已二三分金貨也列廛于國日中為市致天下之民聚天下之貨交易而退各得其所而有亡于是俱興耒耜之益臼杵之小過交易之噬嗑皆世之急務固不在連山易之後神而化之使民宜之故天下號曰皇神農南方火為神明命厯序注云其教如神使民粒食故天下號皇神農禮含文嘉云神者信也農者濃也德信濃厚若神故名神農謂亂時不殖亂氣作沴乃紀上元調氣朔以端啓閟拂焄蒿辟尸隰以逃民害神農書云冬至隂陽合精天地交遜天為尸隰地為不凍君為不朝百官為不親事不可出遊必有憂悔此復之商旅不行后不省方之事也隋志云神農分八節蓋定之也三朝具于攝提七曜起于天關所謂太初厯也神農之厯自曰太初非漢之太初也楊泉云疇昔神農始治農功正節氣審寒溫以為早晚之期故立厯名太史公曰神農以前尚矣漢使校厯淳于陵渠覆太初厯晦朔弦望最密日月如合璧五星如連珠應劭云太初上元甲子夜半朔朝冬至日月五星俱起牽牛雖非漢太初然其法亦不大相逺乃命司怪主卜巫咸巫陽主筮見世紀外紀非商巫咸經有巫咸而郭氏巫咸山賦乃以為帝堯之醫豈其職名哉于是通其變以成天地之文極其數以定天下之象八八成卦以酬酢而佑神以通天下之志以定天下之業謂始萬物終萬物者莫盛乎艮艮東北之卦也故種艮以為始所謂連山易也艮前寅而後丑丑嵗之終寅嵗之始也萬物之終始也夫伏羲六十有四卦其名未著而神農之卦名又與今代為異代弗之知陽豫遊徙之類連山卦也演孔圖云孔子修春秋九月而成卜之得陽豫之卦而史記始皇得壁言明年祖龍死不樂卜之卦得遊徙是矣世紀云夏人因炎帝曰連山禮言夏謂之連山夏人用之也陸佃云長安人家有之其卦皆縱然北齊劉光伯常撰為連山魯史記以應遺書之詔後亦敗矣世有連山三十卷者乃梁元帝之所撰故亦曰連山氏艮山也字音轉注列山者亦連山之轉邪然則連山以帝而名容可知也謹時祀盡敬而不蘄喜挹春間焚封豨塊桴土鼓以致敬于鬼神而上下達矣見莊子晉志杜子春云以瓦為匡鄭注不從孔頴達云始諸飲食敬鬼神祭祀吉禮起于神農土鼓因于中古神農之器云悼澆泊閔愚愗爰問于泰乙小子曰上古之人壽過百嵗後世不究天年而有殂落之咎獨何氣使然邪小子曰天有九門中道最良乃稽太始説玉册素問大論岐伯言臣覽大始天元玉册天之文册氣經于牛女戊巳分云云戊巳分者奎壁角軫天地之門戶也唐馬總意林云神農稽首再拜問于太一小子曰鑿井出泉五味煎煮口别生熟後乃食咀男女異利子識其父曽問上古之時人壽過百無殂落之咎獨何氣之使邪太一小子曰天有九門中道最良日月行之名曰國皇字曰老人出見西方長生不死衆曜同光神農從其嘗藥以救人命玉氷云鬼臾區十世祖當神農之世説太始天元玉册今按文有十二篇磨唇鞭茇察色􅀈嘗草木而正名之小司馬史記云神農磨唇百草是嘗又云帝以赭鞭鞭草木按事載搜神記云神農赭鞭鞭百草盡知其平毒寒溫之性臭味所主以播百穀故號神農皇帝楊炯藥圖序所謂神農旋赤鞭而毆毒者夫草木之類雖則散殊然察其形色嗅其臭味自可别善惡堪作某藥可治某病固不待嘗而後知然聖人必逐一嘗啖制神鞭者蓋以重其事爾任述意云太原有神釜岡有神農嘗藥鼎又成陽山中有神農鞭藥處一曰神農亦名藥草山中有紫陽觀云帝于此辨藥審其平毒旌其燥寒察其畏惡辨其臣使釐而三之以養其性命而治病上藥養命中藥養性下藥治病一日之間而七十毒極含氣也傳記説同孔季彥獨以為伏羲嘗草木之可食者一日而七十毒世紀從之此亦陶氏序本草謂神農畫八卦等爾病正四百藥正三百六十有五著其本草過數乃亂見三墳書本草中今本中白字者是神農本經者用者大驗世紀云神農著本草四卷按漢紀雖及本草而志無録梁七録始有之止三卷是故或謂古無其書非也昔樓護少誦一經本草則漢世嘗有之特未廣爾乃立方書小史云神農方書靈樞云黃帝曰豫私覽諸方則方書古有之故岐伯曰此上帝所祕先師傳之命僦貸季理色脈對察和齊摩踵訰告以利天下而人得以繕其生僦貸季岐伯祖之師理色脈者移精變氣論云上古使僦貸季理色脈而通神明八素經云天師對皇帝云我于僦貸季理色脈已二世矣粵又制請雨之法蓋南置水掩髂埋胔以待天澤之至見神農求雨書其説别出尸子云神農之理天下欲雨則雨五日為行雨旬日穀雨旬五日為時雨萬物咸利故曰神雨赤松子者諸侯也移老襄城于是下之致為雨師神仙傳云赤松子服水玉神農時為雨師教神農入火至昆山上王母石室隨風雨上下炎帝少女追之俱仙去及高辛時復為雨師列仙傳云赤松子輿者黃帝時啖百草花不食穀至堯時為木工舊傳謂黃帝師赤松或云帝嚳師之一云堯時為官師猶火師龍師今道家有黃帝問赤松經而張良欲從赤松遊故代以為仙赤松子迹在襄陽平陽或云石室非也有説别見剸剸民食形盡悴而不顧通玄經每嵗陽月盍百種率萬民蠟戲于國中以報其嵗之成建亥之月火伏而蟄畢農事終而始蠟祭也或云後世之文考之郊特牲乃以周正非也周蠟以十二月蓋夏十月商之十一月晉以周十二月襲虞故宫之奇曰虞不臘矣月令以孟冬祈來年祠公社門閭臘先祖五祀蠟臘共月三代同之皇氏以為三代皆以十二月亦非也故祭司嗇山林川澤神示在位而主先嗇蠟者合聚百物而索享之山川神示皆豫非止八神而所重者八以尤有功于田也嗇先嗇司嗇所謂田畝神苖稼神者説者以神農為先后稷為司嗇蓋自後世故禮傳謂豈有神農始蠟而自祭其身哉皇氏云神農伊耆一代總號其子孫有天下者始為蠟祭其先祖造田者故籥師注以神農為田主為始造田謂之田祖先為穡事謂之先穡神其農業故曰神農漢晉以來東耕悉祠先農如社儀北齊以上辛丁亥祠先神農氏則又為先農矣故禮記以先農即為先嗇傳以先嗇為田祖司嗇為田畯據籥章樂田祖樂田畯也享農及郵表畷禽獸貓虎水防昆蟲通典曰蠟之義自尹耆之代有之而祝之曰土反其宅水歸其壑昆蟲亡作草木歸其澤傳以為神農蠟辭宜有傳宅澤皆音鐸葦籥土鼓榛杖喪殺既蠟而收民息已年不順成之方其蠟不通以謹民財也蠟者嵗終勞農休息之祭也蠟與臘異有説别見惟不順成則厭禮而婚條風至則合其亡夫家者以蕃其民是故淳鹵作而人民育教化興行應如桴鼓耕桑得利而究年受福孝經援神契云神農耕桑得利究年受福究窮也乃命邢夭作扶梨之樂制豐年之詠以薦釐來是曰下謀扶犁一作扶來即伏羲之鳯來來犁古同音爾帝繫譜云伏羲曰扶來神農曰扶梨蓋未達詳太昊紀制雅琴度瑶瑟以保合大和而間民欲通其德于神明同其和于上下曰瑶貴之也揚雄琴清音云神農造琴以定神禁淫僻淮南子云神農之初作琴以歸神反望反其天心新論云神農為琴七絃以通萬物而考治亂而洽聞記乃云二十五絃説文世紀隋志小史通厯又皆以為五絃非也按廣雅神農之琴長六尺六寸有六分然亦以為五絃有説在發揮于是神澧瀵嘉穀茁乃命屏封作穗書以同文攽令禮含文嘉云神農修德作耒耜地應之以醴泉書斷云上黨羊頭山嘉禾八穟炎帝乃作穟書用攽時令亦見墨藪及韋氏字源澤之高平北三十五里羊頭山也寰宇引山海經神農嘗五穀之所上有炎帝廟蓋郡國志也山今在上黨有神農城下有神農泉南帶太行右有散蓋今長子西南五十有神農井出羊頭小谷中九域志上黨有神農廟井又云隰州有穀城神農嘗五穀于此而上黨記廟西五十步石泉二所一清一白甘美呼為神農井風土記神農城在羊頭山上下有神農泉為神農得嘉禾處地形志亦云得嘉穀之所太原御覽屏封一作丙封命白阜度地紀脈水道窬木方竹杭潢洋而有亡達春秋元命苞云炎帝之臣曰怪義生白阜是圖地形御覽以怪義為白阜母名阜為神農通水脈使不壅塞遂甄四海紀地形逺山川林藪所至而正其制蓋正九州之制錦帶書云神農甄四海故文選詩云神農更王軒轅承紀畫野分疆爰封衆子命厯序云有神人駕六龍出地輔號皇神農始立地形甄序四海逺近山川林藪所至東西九十萬里南北八十二萬里世紀云自天地設闢未有經界之制三皇尚矣諸子言神農王天下地東西九十萬里南北八十五萬里蓋所制里于今有所不同者于是辨方正位經土分域處賢以便勢于以相用而寄其戚近國地廣而逺彌小負海之邦率三在地吕春秋云神農分國近國地廣逺國地愈小海上有十里之國與二十里也此特一聚落附庸采地爾以今觀之中華戶密緣海人稀而何以為國哉三墳書氣墳云山氣上聖人以安萬國夷考其制蓋制應有萬且不應見于炎帝之後世言黃帝始創萬國謬矣説詳國名記國土相望彘狗之聲相聞以大用小由中下外猶運指建瓴而王者以家焉乃課工定地為之城池以守之詳太昊紀注后嵗省方觀民設教月省時考終嵗獻功以時嘗穀祀于明堂見淮南子及隋書宇文愷傳明堂之制有蓋而無四方風土不能襲燥濕不能傷遷延而入之以享上帝祀鬼神如此而已晏子所言下之燥濕不能及上之寒暑不能入土事不文木事不鏤以示人之制者故王禹稱有巢氏碑云猶賴伊耆儉于一時椽不用斫階無翦茨則知自神農矣或謂黃帝制屋廬始作明堂妄説移在賦祿書補遂不㤨乃伐補遂而萬國定庾肩吾云炎帝本卷領唐勛載允恭方傳來世盛尚且欲從戎是兵伐矣補遂二國見吕春秋蘇秦云神農伐補遂黃帝伐涿鹿而禽蚩尤堯伐歡兜舜伐三苗不絶三光之明不傷百姓之心有王術焉通典作輔遂非爰崇郊祀封岱禪云以大報而天下治封禪之典郊丘之制也其興亦已久矣故曰羲農之郊曰禪後代之所守也或以為起于黃帝失之襲九窽種九愸提挈形氣而嫥捖乎剛朒以竅領天下是故萬物百族皆有經紀條理許叔仲云竅法也形也謂九天九地之形法嫥捖猶調和也不以物之壞自成也不以人之卑自高也不以遭時自利也一上一下而浮遊乎萬物之祖故其民璞重端慤有善而亡惡文子云智者無所施其巧勇者無所措其威虛素以公希聲若退樂與政為政樂與治為治是故威厲而不試謂賞在于成民之生賞誠設矣然施于人而天下化謂政亡有棄法而成治法誠立矣然刑罰不施于人而俗善見别本六韜淮南子云刑措而不用法省而不煩當此之時法寬刑緩囹圄空虛而天下一俗莫壞于姦心則既有囹圄矣囹圄柴柵獄之始也不忿爭而財足不勞形而成功因天地之資而與之和同任賢使能故官利則而賢者歸是以天下共尊共富之越絶書云神農不貪天下而天下共富之不以自智而貴于人而天下共尊之懷其仁成之心神不越于胸中智不出于四域知其白守其黑是故求死而不得還金丹訣云按黃帝內經神農知白守黑求死而不得注云知白守黑即是合二性也後其身而先外其身而存其神不國其鬼不神亡隅亡適而天下正南交北幽三危暘谷偎僾之人靡不戾止天不牟其道地不愛其寶故黃龍川泳丹渠先産風不鳴條雨不破剻亡扎瘥沈焙之惄氓人猶劮窪尊臼飲竦身戴聽以陶乎至化唯亡共胥之怒而不聞王役之搖故人皆惡其死而尚其生是以唐堯敷言朕之比神農猶民之于鼂旦也而嵬説者猶以為夫負妻戴以有天下是相率而為偽者也惡足以言人道邪尸子語按文子與淮南齊俗云神農之法曰丈夫丁壯不耕則天下有受其飢者婦人當年不織則天下有受其寒者故身親耕妻親織以為天下先不過親耕躬蠶而已故曰神農黃帝竅領天下紀綱四時和調隂陽萬民莫不竦身而思戴聽而觀故治而不和言使萬物莫不注其耳目而六韜兩疑云三勸皆親六懷有常天下安樂和乃立王神農並耕天下太平謬矣都于陳今宛丘有陳城故陳國傳云太昊之虛或云神農亦居此酈元云今故城北有所謂羲神實者其處也實者對虛之名天文旗中四星為天市其中星多則實虛則耗神農所在人民常實非若虛寨朝實而暮虛也豫以是知神農之去太昊為不逺矣傳無炎帝之虛而紀載皆以為都魯此謬認大庭為神農故爾世紀云太昊都陳豫州之域西望方外東及明諸胡公之封神農氏亦都之是羲炎果同處然考義炎之都似在陳倉太昊紀已詳之而世紀云又營曲阜故晉志云神農都陳又别營曲阜郡國志云自陳徙都于此昔大庭阪譙周云炎帝居大庭寰宇曲阜炎帝之虛皆相承之訛也蓋宇于沙是為長沙考神農之都宜在南方故顓帝之都在北益以知太昊之在東少昊之在西為信第世逺紀略傳者亂不得其定其詳見後及國名記中崩葬長沙茶鄉之尾是曰茶陵所謂天子墓者郡國志云炎帝神農氏葬長沙長沙之尾東至江夏謂之沙羡今郡有萬里沙祠故曰長沙世紀云神農葬茶陵衡圖經云茶陵者所謂山谷生茶名也地有陵名者皆以古帝王之墓竟陵零陵江陵之類是矣炎陵今在麻陂林木茂密數里不可入石麟石土兩杉蒼然逾四十圍兩杉而上陵也前正兩紫金嶺丁未春豫至焉寓人云年常有氣出之今數載無矣所葬代云衣冠赤睂時人慮發掘夷之陵下龍潭傳石上古有銅碑陷入焉五行書云神農丁亥日死丁未日葬有唐嘗奉祠焉有唐代舊記太祖撫運夢感見帝于是馳節敻求得諸南方爰即貌祀時序隆三獻廟在康樂鄉鹿原陂上乾德五年建太平興國中將事官覆舟憚險奏徙縣南隅廟有胡真官殿云帝之從臣帝病告以當葬南方視旗所矗遇嶠即止因葬于兹今中途嶠梁嶺也梁坑有轍迹淳熙十三年豫請守臣劉清之奏於陵近復置廟乞以陵前唐興敝寺為之謂佛殿其中而炎帝殿乎其旁不惟不正而三五之時初未嘗有西方之教君從之即命軍使成其事未竟而去惡戲盛德百世祀至神農亡以尚矣我宋火紀上協神農豈其苖裔邪何誰昔之夜神交萬載而乃丕揚于今日歟事具孫冠大字碑在治百四十有五祀世紀外紀並百二十或云百四十年百六十有八元年甲戌亦謂赤帝仲舒繁露云堯以神農為赤帝河圖言赤帝有女訛鐵飛之異而經亦有赤帝女女娃薑姓為精衛在上黨發鳩山知為炎帝云其崩也天下之人為之不將者七日丹壺記納承桑氏之子漢書作桑水氏書傳多作奔水氏字轉失也吳起云承桑之君修德忘武以喪其國神宗黃帝神武祕略言有唐滅之唐太宗金鏡述惟作桑氏即承桑也子十有三人贊曰火德開統連山感神謹修地利粒我蒸民鞭茇嘗草形神盡悴避隰調元以逃人害列廛聚貨吉蠲粢盛夷疏損穀禮義以興善俗化下均封便勢虛素以公威厲不試弗傷弗害受福耕桑日省月考獻功明堂天不愛道其鬼不神盛德不孤萬世同仁濟世有道豈可與貪而躁者謀哉天下無常勢而時勢有通塞世固有利害而利害有淺深近而淺貪而躁者能知之利害之長而深非聖智有所不能悉也封建郡縣其事槩可見矣借以巨室俔音顯又賢遍切譬也之偃豬音宴沃壤也有十囩音藝之籍其月舉亦博矣其課辨亦劇矣必委能囩率之將卒之儻來十鉗奴之為利乎抑何如推囩之願民而甲之邪其忠主仁民經略久近固不同也知此則封建郡縣可得而議矣豫嘗言之強幹弱流天之道也封建之行也豈利一宗哉其于民俗尤所急焉者也是以先王世雖極治猶且漼然莫敢或後況亂世邪聖人之憂患莫非為亂世計也苟上有明辟則封建而治郡縣而治上失其道則封建者亂郡縣者亡封建而民猶能存郡縣而四海纍氣事之深淺有間矣而昧者乃謂封建聖人之所不得已或又謂郡縣則主祚促而利于民談何易邪請毋多言而簡喻之王者奉天地法至公者也封建者天下之公也郡縣者一人之私也唯公也故人皆得遂其私惟私也是故公私俱廢士民兵政一切取苟且之術豈直越肥之視秦瘠耶又將剝之以自厚也郡縣若此而上之人猶欲冀俗之歸厚是何異于秉棁音拙楗上撑拄而招狗而栁鄉猶以為公天下之端自秦始何不思之甚歟聖人之所慮固不在于彼也昔者鼂子請削七國而七國反逮夫主偃策行而列侯之坐酎除者百有六可謂罰非其罪矣而汔亡叛其勢異也惡戲自封建法廢而後世不見成康之俗君無世臣民無常主無惑乎道之卑也國家承平百年之間民物阜育波夷夏海實超軼乎三代唯世變風移之事視之有愧則封建不行之所致也兹豈陋儒俗吏之所知哉日者漢唐雖稍封建然而因陋就簡事不稽古紀綱法制一無或備是顧得言封建邪兹其所以厯世紛紛慞偟救弊之不暇者豈封建之咎哉制之失其道也豫觀神農之治天下甄四海建諸侯處賢以便勢胥用而平民近者國地廣而逺彌小負海有十里之侯若二十里者以大制上猶幹役指由中下外如水建瓴是故上下得以相安而人皆惡死然後知賈顔之謨蓋亦善而未盡聖人之經國立法其慮世防患可謂至矣三代之所以長久此其效焉故曰三代之末尚有仁義六代之季盡矣不然揚子雲豈識下于栁宗元而王仲淹豈見卑于李百藥乎彼宋祁興遞救之言尤為可切厥哂不出齒笑也路史卷十二

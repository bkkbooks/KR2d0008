body:
  text: 路史卷十四宋羅泌撰後紀五疏仡紀黃帝紀上黃帝有熊氏或作雄姓公孫初姓後改姬馬總以來多沒其公孫者非也名荼河圗挺輔佐云黃帝告天老曰荼昔夢兩龍以白圖授豫天老曰河有河圖洛有龜書天其授帝圗乎帝乃齋往河洛有大魚泝流而泛白圖帝跪受荼古舒字或作余故世本云伯余製衣裳淮南子伯余之初作衣許注亦云黃帝王氷黃帝經序及難經疏乃云黃帝名全字轉訛一曰軒河圗握拒云黃帝名軒北斗黃神之精孝經鈎命決云附寶出降大靈生帝軒注軒黃帝名電黃精軒之氣故文選言登封降禪齊德黃軒牽秀云邈矣帝軒世紀云或曰帝軒尚書中侯云黃帝提象又云黃帝巡洛龜書赤文成字象軒而論語撰考亦有軒知地利九牧倡教之語是黃帝名惟曰軒不曰軒轅軒之字曰玄律見黃帝經序及難經疏按軒星謂之玄軒廣韻九合內志文云竹受氣于玄軒之宿是矣然則名軒而字玄律理或然也山海經帝律生帝鴻則帝之字律尤信小典氏之子黃精之君也鬻子注以少典為帝鴻氏妄母吳樞曰符葆即附寶河圗云黃軒母曰地祗之子附寶也宋書志作符寶皇朝列祀廟號聖母是為元天大聖后祕電繞斗軒而震二十有四月而生帝于夀丘河圗握拒云附寶之郊見電繞斗軒星照郊野感而生軒而世紀謂神農之末少典娶附寶見電光繞北斗樞星光照郊野感附寶而孕二十月生黃帝于夀丘脞説供奉官郭坦二十二月生初以為妖百計針藥不動生亦無他數自有久近爾夀丘在上邽或云濟南世紀又以為兖俱非詳水經注故名曰軒太史公謂名軒轅後世從之非也天文雖云軒轅黃帝之神黃龍之體然軒轅自是古帝按錢譜古幣二種文有作者黃帝貨有作當者軒轅氏幣也上世貨幣皆以代别知黃帝與軒轅為二也辨在軒轅紀生而紫氣充房見王氷序寶櫝記云黃帝以戊巳日生故以土王五行書云以戊子日生身逾九尺附函挺朵修髯花瘤河目隆顙曰角龍顔河圖云黃帝兊頥黑帝修頸蒼帝并乳餘見孔叢等書生而神靈弱而能言幼慧齊長敦敏知幽眀死生之故少典氏沒後軒嗣立成為姬姓古史考有熊氏已姓非并謀兼智明法天明中説并天下之謀兼天下之智以使民心一四國順之于是開國于熊世紀云有聖德授國于有熊鄭也炎帝氏衰蚩尤惟始作亂赫其火燀以逐帝帝弗能征乃帥諸侯責于后爰暨風后刀牧神皇之徒較其徒旅以曷小皓而弭火災刀音雕刀牧即刀墨書傳皆作力牧按國朝有刀牧四明經刀牧地户開歷然世紀言黃帝間居夢大風吹去天下塵垢又執千鈞之弩驅羊萬羣寤風為姓垢去土為后千鈞異力驅羊牧人也其有姓風名后姓力名牧者于是得風后于海隅得力牧于大澤亦見夢書故文選云占夢而得二賢其言為妄得一奉宸史得一奉宸逍遙襄城之域乃臨盛水録龜符見黃帝出軍訣及太白隂經云帝征蚩尤七十一戰不克晝夢金人引領長頭玄狐之裘云天帝使授符得兵符戰必克矣帝寤問風后曰此天應也乃于盛水之陽築壇祭太牢有元龜含符致壇似皮非皮綈非綈廣三袤一尺文曰天一在前太乙在後帝再拜受于是設九宫置八門布三竒六儀制陽隂二遁凡千八十局名曰天乙遁甲式三門發五將具征蚩尤而斬之又出軍決一云夢西王母使盛水作成水納三宫五意之機受八門九江之要見集仙録及遁甲等書衍握竒以為式見兵法六壬等唐太宗云世傳黃帝握竒文或作握機靖云餘零也音同故五旗五麾六毒見河圖及出軍決有説見餘篇而制其陳黃帝八陳法車箱銅當金也車工中黃土也鳥雲鳥翔火也折衝木也龍騰却月水也鴈行鵝濯天也車輪地也飛翼浮蛆巽也八陳古有漢以十月會營土為八陳是也世以為出孔明不然孔明八陳本一陳也蓋出黃帝丘井之法井分四道八家處之陳分八面大將軍處其中而握竒焉一軍萬二千五百人八千七百五十為正陳三千七百五十為竒兵陳問容陳隊間容隊衛公變為六花陳今出軍亦遺法也李靖云天地者本乎旗號風雲本乎幡名龍虎鳥蛇本乎隊伍古人祕之設此八名爾章懷云古有八陳亮法之年三十七戮蚩尤于中冀于是炎帝諸侯咸進委命乃即帝位都彭城史傳言帝居涿鹿世本云涿鹿在彭城代弗知也故魏土地記云濟城南東六十里有涿鹿城城東一里有阪泉泉上有黃帝祠則世本之言信矣然媯州懷戎乃故涿縣有涿鹿山黃帝祠阪泉蚩尤城世止以為帝邦在是而世紀遂疑上谷當名彭澤非也按涿鹿有三又有督濁二音上谷本蚩尤之居而彭城乃黃帝之都蓋帝克尤以其名來此猶漢春陵之內啓爾若修武之濁鹿與蚩尤二冢相近則尤死之地又嘗以此名冠之也王承填而土行故色尚黃而天下號之黃帝自有熊啓胙故又曰有熊氏傳謂有天下都熊非也其即位也適有雲瑞因以雲紀百官師長俱以雲名涿鹿之役五雲花葩金枝玉葉常覆帝上古今注云乃作華蓋昌黎表按宋書慶雲五色太平之應援神契云王者德至山陵則慶雲出故黃帝因之紀事虞舜由之作歌服虔云黃帝受命得景雲之瑞雲為官名無所出惟內傳有縉雲氏虔佑等遂有青縉白黑黃五名之列與五火五水五龍並不足信乃立四輔三公六卿三少二十有四官凡百二十官有秩以之共理而視四民三公六卿即為九卿二十四官與三少即二十七大夫靈樞有黃帝問少師則時有少師論語撰考云黃帝受地形象天文以制官蓋至是名位乃具命知命紏俗天老録教刀牧凖斥鵊冶決法五聖道級窺紀補闕地典州絡七輔得而天地治神明至絡維級等也窺紀即陶潛賢輔録中窺紀也論語摘輔象七輔有風后而無鵊冶世紀云黃帝以風后為主台與天老五聖為三公其餘知命規紀地典刀牧常先封胡孔甲等或為師或為將非一人也故張衡云方將師天老而友地典漢志隂陽有地典六篇鵊冶子一篇封胡五篇刀牧十五風后十三鬼容蓲三篇及容成隂道天老雜子隂道皆黃帝臣十有五年帝喜天下之戴已乃飬正命娛耳目昏然五情爽惑于是放萬機舍宫寢而肆志于昆臺方明執輿昌宇參乘張若謵朋前馬昆閽滑稽後車風后柏常從負書劍謵多作習宇多作宇唐音或以昌宇字字廣成非發軔紫宫之中涉洹沙而屆隂浦賈誼書云濟東海入江內取緑圖西濟積石涉流沙登崑崙還中國治天下子年云風后負書柏常荷劍旦涉洹流夕歸隂浦孫綽子云發軔紫宫不崇朝而屆六合大抵書傳言黃帝事如道書列子符子孫綽子之類多渺茫難托也陟王屋而受丹經抱朴子真源云黃帝以地皇九年正月上寅詣首陽山宰牧從焉次駕東行詣青丘紫府先生授三皇籙及天文大字次西入空桐禮廣成子回駕王屋啓石函發玉笈得九鼎飛靈神丹訣次遊玄圃禮雲臺先生授龍蹻經役使龍虎令詣天真皇人故庾信云治身紫府問政青丘也登空桐而問廣成莊子黃帝為天下十九年令行天下聞廣成子在空桐之上往見之空桐山在汝之梁縣西南四十有廣成澤及廟近南陽雉衡山故馬融廣成贊云面據衡隂北方遵化南三十亦有空桐襄城世謂帝謁廣成在此非也仲長子云廣成遊于九山之嶺來往嶕嶢嶕嶢在洛之永寧九山在鞏有廣成廟碑號九山府君有太華元子之稱非在北方唐盧貞碑亦詳封東山而奉中華君或云即中黃丈人受九品之方䇿大面而禮寧生大面青城也黃帝封為五嶽丈夫寧生劉向仙傳以為寧封寧封子為黃帝陶正能作五色煙積火自燔或云寧國封人入金谷而咨涓子心世有涓子書晉志云黃帝東海南江登空躡岱至昆峯振轡風山訪道存諸汗竹不可厚誣訪大恢于具茨黃帝經序于龍曲山逢大恢即大塊也具茨即今大塊山在陽翟一曰泰塊司馬云在滎陽密東即神牧于相成莊云牧馬童子相成即襄城金簡玉字云受襄城小童步六紀之法黃纍小童步三綱之法三洞云襄城小童授軒皇七元六紀天綱之經四極明科云帝封一通于太山一于勞盛山升鴻隄受神芝于黃蓋黃蓋童子陽城記遂盍群神大明之虗而投玉䇿于鍾隂自是愛民而不戰四帝共起而謀之各以方色青赤白黑為號起四方而僣亂者若蚩尤為赤帝朱宣為白帝之類故有赤帝城白帝城説者以少昊之徒當之非也蓋自後代邊城曰警介胄不釋帝乃焦然歎曰朕之過淫矣君危于上者民不安于下主失其國者其臣再嫁厥病之由非飬冦耶今處民萌之上而四盜起迭震于師何以哉乃正四軍神宗神武祕略云兵法處山之軍居高為陽水土之軍所就卑下斥澤之軍必依水草平陸之軍擇其坦易此四軍黃帝之所以勝四帝也即塋壘滅四帝而有天下萬機論云黃帝初立飬性愛民而不戰四帝交共謀之邊城日警云云向令黃帝不龍驤虎變而與俗同道則其臣民嫁于四帝矣謂國雖大好戰必亡天下雖平忘戰必危矢以仁義擾以信禮故投之死地而後生知彼知已故亡敵于天下于是以兵為衛內行刀鐻外用水火天目臨四維而巡行句陳并氣而決戰天目見黃帝太乙密推云欲知巡狩之年當視太乙與天目在四維之嵗法當巡狩冬官楊可能集聖歷云黃帝御宇真女降朝授神䇿于金縢緘兵符于玉匱至若省方巡狩天仗出而爰擇剛辰王師興而先求近日傍行天下未嘗寧居先之德正而後之以威刑必不譓者從而征之是以麾之所擬而敵開戶身五十二戰而天下大服焉乃達四面廣能賢稽功務法秉數乘剛而都于陳今寶雞故陳倉姚睦云黃帝都陳倉非宛丘故今隴右黃帝遺迹甚多水經注上邽有軒轅溪軒轅谷睦云黃帝生處遁甲太昊亦治陳倉豈三皇同在西乎仙傳謂都泰山之阿世紀都軒轅丘俱妄師于大填學于封巨赤誦赤松也大填即火真或作大莫非封巨即大封或作巨封非白虎通云黃帝師刀牧故晉書云軒轅聖人伏師臣而受圖所師固非一矣復岐下見岐伯引載而歸訪于治道時岐伯已百餘嵗見仙傳亦詳靈樞二十九素問稱天師或曰太師一云少師靈樞有問岐伯問少師少師似非岐伯于是申命封胡以為丞鬼容蓲為相刀牧為將而周昌輔之黃籙云黃帝坐玄扈閣上與大司馬容光左右輔將周昌二十二人臨觀鳳圗此本出河圖録運法春秋合誠圖云百二十二人也大山稽為司徒庸光為司馬論語摘象輔亦云容光為司馬而吕氏春秋大封為司馬蓋非一職恆先為司空建九法七相翌而下服度六帖云黃帝時恆常先為大司馬掌建邦之九法猶且蛩蛩常若僃盜豫若天令令人知禁風后善乎伏羲之道以為當天而配上台春秋內事云風后善于伏羲之道故推衍隂陽當天天官也陶氏職官要録云以風后配上台天老配中台五聖配下台環濟云為侍中管子六相又云帝以蚩尤明天道為當時非桓常審乎地利以為常平地官之職管云為廪者于是地獻草木乃述耕種之利內傳云升為天子地獻草木述耕種之利因之以廣耕種奢比辨乎東以為土師而平春種角穀論賢列爵勸耕饁禁伐厲即奢龍管注云土師司空角穀菉豆庸光辨乎南以為司徒而正夏種芒穀修馳戒僇發宿臧靜居農以戒力以宛夏功即祝融謂南種小麥赤豆種房穀以應戊巳之方謂中種麻王氷云黃帝所種五方穀也大封辨乎西以為司馬玩巽禽種遂穀收穀薦祖組甲厲兵戒什伍以從事謂西種白麥金穀故秋種夏死菽水穀黍火穀見金而成也后土辨乎北以之李行冬斷罪種稜穀劋箭伐木乃勞農始獵殺管五行云春者土師也夏者司徒也秋司馬冬李行六相得而天地治民為本土事嗇事為重故后土后稷以名教帝處中央而政四國分八節以紀農功命天中建皇極又三墳亦備乃下教曰聲禁重色禁重香味禁重室禁重國亡邪教市亡淫貨地亡壙土官亡濫士邑亡遊民山不童澤不涸是致正道是則官有常職民有常業父子不背恩兄弟不去義夫婦不廢情鳥獸草木不失其長而鰥寡孤獨各有飬也世紀云聲禁重聲衣禁重衣食禁重味居禁重室兔園策又三墳所謂有雄垂六禁之科也于是立貨幣以制國用問于柏高曰吾欲陶天下為一家有道乎對曰請乂其莧而時之吾謹逃其爪牙則可矣柏高舊云岐伯之名宜非靈樞帝曰子欲聞隂陽之義岐伯曰岐先師之所祕柏高猶不能明則似非矣莧胡官切細角山羊易言莧陸孟喜云獸名夬有兊兊為羊也曰若言可得聞乎曰上有丹矸者下有黃銀上有慈石者下有銅金上有陵石下有赤銅青金上有代赭下有鹽鐵上有蔥下有銀沙此山之見榮者也至于艾而時之則貨幣于是乎成乃燹山林破曽藪楚萊沛以制金刀立五幣設九棘之利而為輕重之法曰自言能司馬不能者釁鼓自言能治里不能者釁社自言能為官不能官者劓以為門故人亡有姦能誣祿而至于君者相任夤為官重門擊柝不能者亦隨之以法所謂李法教而後殺故法設而亡用所謂李法按黃帝李法曰壁壘已定穿窬不由路者殺注云李者法官之號總主征伐刑戮之事故稱其書為李法胡建為南北軍王假黃帝李法斬天子監軍李天李也説苑云壁壘已具行不由路謂之姦人姦人者殺本此致五法而布之天下故財用自是作而刀棘由此顯矣五法乃財用之法術太公素王妙論云黃帝設五法布之天下用之無窮世有能知之者莫不尊親如范子可謂曉之矣豈稅斂率削云哉河龍圖發洛龜書威鄭注中侯威則也亦見龍魚河圖易正義作威于是正坤乾分離坎倚象衍數以成一代之宜謂土為祥乃重坤以為首所謂歸藏易也歸藏初經卦皆六位初坤初乾初離初坎初兊初艮初震初巽也其卦又有明夷營惑耆老大明之類商隨志存十三卷晉薛正注長孫無忌論漢初已亡中經簿有之惟卜筮爾崇文三卷但有初經齊世本蓍三卷缺文昔啓筮明夷鯀治洪水牧占大明桀筮營惑武王伐商牧占耆老曰不吉是也故又曰歸藏氏易天事歸藏地事連山人事是所謂三易也坤乾南北是坤者地也萬物藏焉故謂之歸既受河圖得其五要春秋五始公羊疏云元者氣之始春者時之始王者受命之始正月者政教之始即位者一國之始漢書春秋緯皆言黃帝受圖有五始謂此五事夫王正月者京師之正朔爾元正即位實係大事如堯舜歷象日月齊七政定閏之類後世承已定之法故未蒙其害稍或不正其禍不勝説矣乃設靈臺立五官以敘五事史黃帝考定星歷建立五行起消息正閏餘于是始有天地神氓物類之官是謂五官中庸注云聖人制作其德配天地惟五始可以當之合誠圖言黃帝立五始制以天道公羊疏謂正物之法莫大於正其始也命臾蓲占星鬼容丘也或云即雷伯未核容丘亦有兵法鬬苞授規正日月星辰之象分星次象應著名始終相驗于是乎有星官之書規旋儀器晉志云黃帝創受河圖始明休咎故星傳尚存隋志云星官之書自黃帝始浮箭為泉孔壺為漏以考中星肇于軒轅見梁刻漏經隋志云黃帝創觀漏水制器取則以分晝夜命羲和占日僪珥旺適纓紐抱負關啓亡浮羲和日御故後世日官皆以為號或疑之則非尚儀占月繩九道之側匿紏五精之留疾即常儀車區占風道八風以通乎二十四晉志車蓲占星氣或謂即鬼臾蓲非也臾鬼訛爾𨽻首定數以率其羡要其會而律度量衡由是成焉四器生于律律本于數故陏志云𨽻首作數律之本也伶倫造律采解溪之篁斷篁間三寸九分為黃鍾之宫曰含少漢志帝使伶倫之大夏之西崑崙之隂取竹之嶰谷生竅厚均者斷兩節間吹之以為黃鍾之宫曰含少制十二筒寫鳯之鳴雄鳴六雌亦六此清宫也隋志云帝使伶倫取竹斷節間吹之為黃鍾清宫之管自清宫皆可生之夫律吕之數或還或否凡七十八黃鍾之數焉七十八三寸九分黃鍾之清倍之也十二律可以和聲可以作樂矣後代因其餘出之為六十為三百本于劉安未見加損也制十有二筒以之阮隃之下聼鳳之鳴以定其雌抱朴云帝轅候鳳鳴而調律隋毛爽云帝聼鳯阿閣之下造十二律鄒衍吹律以定五始正朔服色由斯而别未聞纍黍也乃作玉律以應候氣薦之宗廟察治忽以知三軍之消息晉志云黃帝作律以玉為琯長尺六寸為十二月玉者取其體含溫潤也晉人發汲冢得古周玉律及鐘磬鄭衆釋典同謂陽律管隂律銅順其性是亦用銅矣隋志云伶倫含少擅比竹之工虞帝昭華傳刻玉之妙是虞始以玉非也統和天人非玉莫致其至東漢二至以玉律十二候氣殿中以竹律六十候日靈臺其用有異太始十年中書考古器校古律乃七品一姑洗玉律二小吕玉律其來久矣不得而廢也以正名百物明民共財而定氏族易是類謀曰聖人興起不知姓名當吹律聼以别其姓黃帝吹律定姓是也律六律也故有五音姓之説堪輿經有黃帝問天老五姓而援神契亦謂聖王吹律有姓白虎通云聖人吹律定姓云演孔圖云孔子曰丘律而吹命隂得羽之宫而李房推律亦謂五音生于本姓遂自定為京氏定而繫之姓庶姓别于上而戚殫于下婚姻不可以通所以崇倫類逺禽獸也禮大傳云繫之以姓而弗别綴之以食而弗殊雖百世而婚姻不通周道然也或云六世親屬竭財通婚姻故杜佑云商以上親不隔同姓妄也大撓正甲子探五行之情而定之納音風后釋之以致其用而三命行矣伏羲已有甲子大撓特配甲子作納音爾燭神經云玄女授三式壬遁太乙也大撓黃帝史臣考天書三式以十干十二支衍而成六十取納音聲如今海中金沙中金之類風后所釋如甲子乙丑仗墓金丙寅丁卯乘象火是也世亦有之命鈐敘謂黃帝使風后為之以序九宫之法有納音説見餘論察三辰于上迹祻福于下經緯歷數然後天步有常而不倍張衡傳命容成作蓋天綜六術以定氣象問于鬼臾蓲曰上下周紀其有數乎對曰天以六節地以五制周天氣者六期為僃終地氣者五嵗為周五六合者嵗三十七百二十氣為一紀六十嵗千四百四十氣為一周太過不及斯以見矣六者六氣五者五位天以六氣臨地地以五位承天以六加五則五嵗而餘一氣故遷一位以承六則常六嵗乃備天元之氣故六年而環會周而復始也乃因五量治五氣起消息察發斂以作調歷嵗紀甲寅日紀甲子立正爻以配氣致重爻以抵日而時節定是嵗己酉朔旦南至而獲神䇿得寶鼎冕侯問于鬼容蓲容蓲對曰是謂得天之紀終而復始冕侯封禪書作宛昫爰興封禪迎日推䇿造六十神歷索隱云䇿神蓍也所謂太乙神䇿積邪分以致閏配甲子而設蔀嵗七十六以為紀紀二十而蔀首定之原名握先率二十而冬至復朔公孫卿云今年辛巳朔旦冬至與黃帝時等按黃帝冬至在己酉朔古未有合者太甲元年乙丑朔旦冬至後九十五年甲申朔得至又周公攝政五年丁已朔旦得至後七十六年丙申朔旦得至下至秦漢率七十六嵗而冬至一復朔果無己酉者至于皇朝政和八年而始一合于黃帝素問曰履端于始表正于中推餘于終而天度畢矣萬嵗一遇顧豈偶然哉凡二十推三百八十年而䇿定然後時惠而辰從沿革云黃帝歷曰調歷元鳳三年太史令張夀王言黃帝調歷漢元年以來用之今隂陽不調宜更歷之過詔下歷使者鮮于妄人詰壽王與治歷大司農中丞麻光二十餘人執候晦朔壽王非漢歷逆天道乃詔李信治調歷是也易乾鑿度云名曰握先即調也于是始有天地神民事物之官各司其序俾不相亂民是以能有忠信神是以能有明德民神異業敬而不瀆故神降之嘉生本次分范十有二鏡六乳四獸變異得以占焉應十有二次隨有得者以占蝕刻分無差集異記汾隂侯生死以一鏡授王度徑八寸麒麟鼻龜龍鳯虎布四方外八卦內十二辰二十四𨽻字承日則文影入見于面持却百邪云吾聞黃帝鑄十五鏡第一徑尺五寸以法滿日此為第八度隋御史嘗自為記述異記以鏡湖為軒皇鑄鏡處未究受祥金隱耀神鍾九乳神光玉聲于赤城乃本隂陽審風聲命榮猿鑄十二鍾以協月筒以詔英韶陏志云即鑄鐘帝命榮猿所鑄故國朝會要馮元等議云黃帝命伶倫與榮猿鑄十二鍾以調樂律今之鑄鍾是也調政之緩急分五聲以正五鐘令其五鐘以定五音垂則為鐘仰則為鼎其用甚重五鐘名詳餘論伶倫造聲以諧八音五音調以立天時八音交以正人位人天調而天地之美生矣伶倫即伶鰥一作倫通禮義纂帝使伶倫造磬命大容作承雲之樂是為雲門大卷著之椌楬以道其和椌柷楬敔也椌中空本樂出虛柷觸也有觸而作敔禦而已為伏虎者西方之獸疑樂極而憂伏也幽思賦注大容黃帝樂師中陽之月乙卯之辰曰在奎而奏之李淳風云黃帝時仲春乙卯日在奎至今三千餘年春分亦在奎此不韋月令也蓋秦歷如此淳風歷冬至在斗十三謂黃帝時亦在斗此偶合爾弛張合施動靜麗節是故翕純皎繹聲而聼嚴五降之後而不彈矣今曰咸池即咸䪧北門成曰黃帝奏咸池于洞庭之野劉子法語言黃帝之咸池言大道罔不備也阮嗣宗樂論黃帝詠雲門之神少昊歌鳯凰之迹雲門咸池樂殊奏異康成云咸池即大卷大卷即大章頴逹以雲門為大卷未詳何據乃廣宫室壯堂􅕆高棟深宇以避風雨春秋內事作合宫尸子管子即明堂杜佑謂黃帝祀上帝于明堂或謂合宫其制中有一殿四面無壁茅蓋通水水圍宫垣為復道上有樓從西南入名崑崙天子從之入以祭祀此公玉帶所上制度故元封列五帝明堂文中子云黃帝有合宫之聽唐志言帝朝萬方于明堂一曰明庭禮記外傳黃帝享百神于明庭又管子黃帝有明臺之議魏志崔融皆同或云别所蓋古堂作臺爾建鑾殿黃帝經序云帝見岐伯于鑾殿殿其堂宫其總名也如云未央前殿甘泉前殿者葉少藴等疑秦始名殿非也以祀上帝接萬靈以采民言四阿反坫褈亢褈即庫臺設移旋楹復格內階幽陛提唐山牆樀幹惟工斫其材而礱之乃命寧封為陶正赤將為木正以利器用並列仙傳有神人遇封教為五色煙黃帝封為陶正積火自燒隨煙下上赤將子一曰繳父命揮作蓋弓夷牟造矢以僃四方陳音云黃帝作弓以僃四方古史考云黃帝作弩岐伯作鼓吹鐃角靈鞞神鉦以揚德建武厲士風敵而威天下劉瓛定軍禮謂鼓吹不知誰造漢氏以雄朔野短簫鐃歌岐伯所造義纂又云制玄纛十二授帝黃鉞制角十二以警説詳餘論重門擊柝僃不速客易林師之頥辭命邑夷法斗之周旋魁方標直以携龍角為帝車大輅故曲其輈紹大帝之衛于是崇牙交旗羽搊㩧矟櫑劍華蓋屬車副乘記里司馬以僃道哄晉志聖人見秋蓬孤轉杓觹旁建乃作輪輿墨子言黃帝會鬼神于泰山駕象車六蛟龍記里華蓋之類修見內傳晉志古今注事始等昔馬鈞與高堂隆秦朗爭言指南車二子謂古典無紀鈞云古有故眀帝詔令作之唐服志云黃帝造車服為之屏蔽也命馬師皇為牧正臣胲服牛始駕而僕蹕之御全矣見河圖挺左輔及軒轅本紀黃帝內傳古今注等後志云乘牛駕馬遊覽八極師皇見仙傳及馬經為帝馬醫嘗醫龍胲見世本法乾坤以正衣裳制衮冕設斧黻深衣大帶扉屨赤舄玄衣纁裳紸纊贅旒以規視聽之逸玄衣纁裳天玄地黃之色土位西南南赤合黃而成纁故坤五曰黃裳衣上裳下乾坤之象説文曰黃帝初作冕而世本胡曺作冕注黃帝臣又世本云黃帝作旃冕合誠圖云黃帝黃冠白帝白文故三禮圖言黃帝黃冕也禮宗云黃帝深究物情始垂衣裳以化天下當是時素風尚近惟白布深衣齊則緇之蓋以黃帝有也大戴禮孔子云黃帝斧黻衣大帶斧裳乘龍駕雲勤勞心力耳目是也又世本云黃帝臣於則作扉履房觀翬翟草木之花染為文章以明上下之衰褘衣褕展以為內服故于是有衮龍之頌夏侯太初辨樂論龍衮者誤端璧瑞以奉天委珩牙以嫮武是以衣裳所在而凶惡不起易林坤之訟辭謂附于身者必誠必信乃飾棺衾以送死封崇表木以當大事棺槨久矣世以易九事在垂衣裳之後遂謂始于黃帝非也劉向上言棺槨之作自黃帝始而史考謂禹作土堲以周棺湯作木槨易土堲又因禮記誤創􅀢侲內傳云帝始儺按莊子云遊島問于雄黃曰逐疫出魅擊鼓呼噪何也曰黔首多疾黃帝氏立巫咸使之沐浴齋戒以通九竅鳴鼓振鐸以動其心勞其形趨步以發隂陽之氣飲酒茹蔥以通五藏擊鼓噪呼逐疫出魅黔首不知以為魅祟爾以知爆竹鬱壘之設矣設鬱律戰國䇿作余與鬱雷義同詳餘論説青烏記白澤以除民害而民宜之抱朴子云精推步則訪稽牧講占候則詢風后窮神姦則記白澤相地理則説青烏二書今代有之則非矣于是吉凶喪葬靡不備也凡伎術皆自黃帝始詳內傳乃命沮誦作雲書孔甲為史執青纂記言動惟實杜甫云風后孔甲充其佐漢志有史孔甲八篇田蚡習者黃帝始也天下已治百令具舉猶且恤然神蕊形茹用作戒于丹書曰施舍在心平不幸乃弗聞過禍福在所密存亡在所用下匿其私用試其上上操度量以割其下上下一日百戰故作巾几之銘曰毋弇弱毋俷德毋違同毋敖禮毋謀非德毋犯非義又著瑞書曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶凡事不強則枉不敬則不正枉者滅廢敬者萬世乃命史甲作戒盤盂籩豆奩鏡劍履輿席巾杖戶牖弓矛一著銘詩以彌縫其闕凡二十六昔周公誦之於成王並見大戴禮蔡雍銘論云黃帝有巾几之銘孔甲有盤盂之戒漢志有孔甲盤盂三十六太平御覽以為夏孔甲非惟口起兵惟動得吝乃為金人三緘其口而銘其背曰古之慎言人也夙夕念治瞿然自克是以功高業廣而亡逋事世謂太公作金人昔孔子見之后稷之廟按太公金匱公對武王之言明黃帝所作皇覽記隂謀曰黃帝金人器銘曰武王問尚父五帝之戒對曰黃帝之戒曰吾之居民上搖搖恐朝不及夕故為金人三封其口曰我古之慎言人也于是親事法宫觀八極而建五常素問黃帝坐明堂始正天綱臨觀八極考建五常請天師而問焉謂人之生負隂而抱陽食味而被色寒暑蕩之外喜怒攻之內天昏凶札君民代有乃上窮下際察五氣立五運洞性命紀隂陽極咨于岐雷而內經作謹候其時著之玉版以藏靈蘭之室濟序演倉穀道基經云倉穀者名之穀仙行之不休可長久王莽篡位種五梁禾于殿中各順色置其方面云此黃帝穀仙之術靈樞亦有説也推賊曹黃帝元辰經云血忌隂陽精氣之辰天上中節之位亦名天之賊曹尤忌針炙命俞跗岐伯雷公察眀堂究息脈謹候其時則可萬全素問謹候其時氣乃與期能合色脈可以萬全矣命巫彭桐君處方盄餌湔浣刺治而人得以盡年胃瘧以下五十九刺詳素問制瘧及黃帝中詰世紀云帝使岐伯嘗味百藥主典醫病今經方本草之書咸出焉故家語云黃帝嘗味草木又命岐伯雷公論經脈旁通問難八十一為難經著內外術經十八卷命西陵氏勸蠶稼月大火而浴種夫人副褘而躬桑乃獻繭絲遂稱織維之功因之廣織以給郊廟之服皇圖要覽云伏羲化蠶西陵氏始飬蠶故淮南王𧖟經云西陵氏勸蠶稼親蠶始此祀天圓丘牲玉取蒼漢舊儀云黃帝以來圓丘祭天于甘泉山今雲陽通天臺也史記公孫卿言黃帝作清靈臺十二日燒可治明庭接萬靈甘泉也漢書云黃帝郊雍上帝宿三月雍土積高神明之奧故立畤郊上帝諸神焉祀地于方澤牲玉取黃圓邱方澤皆取自然而成非人力所為者築壇除墠設醪醴制蘭蒲列圭玉而薦之圭謂璧琮玉謂圭山經尸子所謂吉玉七登之牀十絶之帳奏函夾之宫以致之而䄘䄓乎夀宫岐雷之醪醴七登牀十絶帳及壇墠並見內傳封禪記云黃帝列圭玉蘭蒲席上然沈榆之香沈立香譜云以分别尊卑華戎之佐故拾遺記云軒皇使百辟羣臣受教者先列圭玉于蘭蒲席上然沈榆之香或以漢得休屠神祭不用牛羊惟燒香禮拜為焚香出梵教今祭用之為非誤矣不知古燔柴即香也立五祀作其祝嘏咸以數薦而山川之典禮為多命共鼓化狐作舟車以濟不通車亦舟也越人謂舟為車地志故作舟楫化狐即貨狐説文作貨狄按古貨布貨止作化命竪亥通道路正里候命風后方割萬里畫野分疆班固云分州周公職録圖云黃帝受命風后受圖割地始布九州置十二圖又見太乙或占割定之也得小大之國萬區而神靈之封隱焉後漢書云昔在皇唐經略萬國燮定東西疆里南北傳言神靈之封七千此公孫卿假為申公説妄也劉恕外紀辨百里之國萬區非是詳國名記命匠營國國中九經九緯五置而有市市有館以俟朝聘之需班固賦分州土立市朝軒轅氏所以載帝功徐帖云經途九軌環途七軌野途五軌置左右大監監于萬國大戴禮及史記本作四監周大司馬建牧立監是也太宰乃施典于邦國乃建其牧立其監牧以侯伯有功德者加命州長是侯牧交獻而朝聘之事備禮記外傳夫黃帝之九牧倡教即周之六卿分職以倡九牧也禮記正義以論語撰考黃帝阮有九州之牧則有朝聘是賔禮也茄豐違命于是刑而放之而萬國服茄楚地昔楚子州城州屈以復茄人是也或作茹豐誤元中記云黃帝軒之臣茄豐氏有罪刑而放之扶伏而去是為扶伏民玉門外經土設井以塞爭端立步制畝以防不足八家以為井井設其中而收之于邑故十利得外紀十利本通典夏殷不易其制辨九地立什一什一之法天下之中正三代取民之制咸本之此存亡相守有無相權是以情性可得而親生産可得而均分之于井計之于州因所利而勸之是以地著而數詳禮運言大道既隱而云以立田里説者為三五時非也黃帝井法井一為鄰鄰三為朋朋三為里里五為邑邑十為都都十為師師十為州外紀誤云州十二師蓋因康成之説誤之矣置法而不變俾民得以安其法是以不使而成不扈而止策天命而治天下故天報眉夀唐裴舜云黃帝顓頊堯舜禹湯以功濟生人德配天地故天報之以眉夀德澤深後世故子孫皆以有土黃祚衍于天下于今未忘也見申子文子子華子自即位百年履地戴天循機提象不就物不違害不善求不緣道法中宿而要繆乎太祖之下職道義經天地别雌雄等貴賤不使不仁者加乎天下故用武勝殘而百姓以濟紀人倫敘萬物以信與仁為天下先是故法令明而上下無尤百年者號數帝在位七十八年列子曰帝立有十五年喜天下之戴已又有十五年而大治又四十八年而登遐世云百年坤監百一十年俱妄不章功不揚名隱真人之道以從天地之固然故物無忿敓之心而人亡爭傾之患耕父推畔道不拾遺狗彘吐菽粟而城郭不閟人保命而不夭嵗時熟而亡凶天地休通五行期化故風雨時節而日月精明星辰不失其行蓂莢屈軼紫房頳莖史不廢書海不揚波山不愛寶翠黃伏樎兹白戀皂焦明嚾阿而龍麟擾于階除日蟹虹蚓禺蛄牛蟻黃神黃爵白澤解豸府亡虛日是以九瀛仰化諸北貢職楊裘秬鬯貫胸長股莫不來庭而依朔或曰德而已矣世之言符瑞者妄也曰德義也符瑞命也古之受命者蓋嘗有符瑞矣古之人因其有而存之所以著命之不可以干然不敢後者亦義而已矣尸子云四夷之民有貫胸者深目者長股者黃帝之德皆致之諸瑞在音義乃撫萬靈度四方乘龍而四巡馬八尺為龍東薄海禪凡山十道志沂山縣之沂山也寰宇凡山在青之益都郡國志云黃帝封泰山禪凡山即此公玉帶云黃帝封泰山風后封東泰山禪凡山或東泰山即沂山漢武以其卑小祀之而不封者又靈武亦有泰山在河東之地非此西逾隴欵笄屯即鎮戎之空桐山俗呼雞頭山水經云大隴山之别名又臨洮亦有空桐山二山各有廣成廟故太史公兩言雞頭空桐相連倦遊録在平涼西南入江內涉熊湘南方亦多故迹永初山川記永寧有黃帝錬丹處張氏土地記東陽永康南四里石城山上有石城黃帝遊此而黃山皖公縉雲衡山衡之雲陽山皆有黃帝蹤迹焉北屆浡碣南臨玄扈玄扈者石室也臨洛水河圖云黃帝坐于玄扈之閣合誠圖云帝坐玄扈洛上與大司馬容光等臨觀鳯皇銜圖置前帝再拜受黃帝録云帝在玄扈閣上與大司馬容光左右輔周昌等百二十人臨之鳯銜圖至帝前黃玉為匣署曰黃帝詔司命集帝行録開之其文可曉宋書云黃帝坐玄扈洛水上有鳯集銜圖至帝前黃玉為匣世紀言帝齋宫中坐玄扈鳯止東閣也今商之上洛南有玄扈山寰宇記洛南縣西北百里乃開東苑帝曰余每之東苑未嘗不感去之則復亦見靈樞祓中宫詔羣神授見者齋心服形以先焉群神謂諸侯五等作清角樂大合而樂之鳴鶴翺翔鳯皇蔽日握河紀云堯即政七十年鳯皇止庭伯禹拜曰昔帝軒題象鳯巢阿白虎通云黃帝時鳯皇蔽日而至止于東園終身不去禮瑞命記云黃帝服黃服戴黃冕齊于宫鳯蔽日而來止帝園食竹實棲梧桐終不去詩外傳云黃帝即位宇內和平問天老乃服黃衣帶黃紳戴黃冕齊中宫鳯蔽日至帝降東階西面再拜乃止東園集梧桐終身不去于是合符于釡山以觀其會合符者合諸侯之瑞也如虞帝之瑞傳所謂黃帝合而不死者釡山覆釡山也昔魏明元玁牛川發釡山臨僥繁之水而南觀乎九十九泉是矣在荆山之前帝鑄鼎處索隱乃引郭子橫説以為在東海中妄也大抵儒生言三五事類引之渺茫曠絶不可致知之所如拾遺記黃帝厭世于昆臺乃鼎湖之峻處耳而説者必以為崑崙北有覆釡山故綿上有覆增山今維之北海溉源山亦曰覆增見漢地志寰宇記舊名塔山其形如塔水經溉水源出塔山者今青之北海東南六十天寶山亦曰溉源故凡不近人情者皆非也采首山之銅鑄三鼎于荆山之陽以象泰乙能輕能重能瀆能行存亡是諗吉凶可知虎豹百物為之視火參罏史黃帝鑄寶鼎三象天地人瑞應圖云以象三才陽極于九故聖人攝其數而云九鼎覆釡山在緱氏首山在蒲坂荆山在湖城世謂襄陽若縉雲之荆山者失之八月既望鼎成死焉五行書帝以甲戌日崩一云戊午孔子曰亡而人用其教是死也世言黃帝鼎成乘龍上升此秦漢方士之言爾按劍經言黃帝鑄鼎以疾崩葬橋山後五百年山崩空室無尸惟存寶劍赤舄是神仙冢亦謂黃帝有死矣又列仙傳云黃帝自擇亡日至七十日亡七十日還葬于橋山故莊子曰若人者將擇日而登遐而儒者反惑之有上升説著存發揮葬上郡陽周之橋山慶之華池西翟道山寧之真寧東八十子午山也郡縣志云陵在山上風土記陽周所有黃帝陵在子午山上今冢存大歷七年廟按混天記黃帝葬南陵山南陵也故莾曰上陵山而神鑑謂黃帝葬南甲山則首向也思元注云黃帝葬西海橘山地志亦謂山有黃帝塜史記武帝巡朔方還祭黃帝塜于橋山元魏諸帝亦數祭焉後魏書文成東巡涿鹿祠黃帝祭橋山觀溫泉幸廣寧泉今在上谷東南二十里九域志橋山又有軒轅太子陵廟而媯之懷戎川橋山有黃帝葬及祠焉其臣左徹感思取衣冠几杖而廟像之率諸侯而朝焉七年而立子九域地理志成州有軒轅廟晉周生招魂議云黃帝體仙登遐其臣扶微等斂其衣冠葬之扶微誤也汲書云左徹乃立顓帝亦非年百十有七或云三百宰豫以問于孔子子曰人賴其利百年用其教百年威其神百年曰三百年也見大戴禮五帝德榮伊之令也故列子曰百姓號之二百餘年不輟立后三妃以存靈憲彤史小臣以僃內官以教天下之內治大戴禮立四妃一后三妃也子二十五别姓者十二為姓十二祈酉滕針任茍釐結儇依苟國語史記皆作荀非及二紀也青陽夷彭餘循姫姓古書大概可質然不容無繆國語言青陽與夾彭同為紀姓是矣而又云青陽與蒼林為姫姓則非也夫姬姓乃玄囂而非青陽黃帝之子二十五人其十二人為十一姓餘十三人皆姬姓也今乃云惟二人同于黃帝者為姬姓其得信邪且昌意玄囂蒼林揮皆姫姓者豈惟二人哉元妃西陵氏曰儽祖纍儽靁同音羸傫纍嫘􅀈雷省非是集韻嫘祖為力偽切非生昌意玄囂龍苖三人昌意就德遜居若水姓書辨昌出昌意則昌或始封也然任後自有昌有子三人長曰乾荒次安季悃乾荒生帝顓頊是為高陽氏有本紀言安處西土後曰安息漢來復者為安氏延史傳謂安祿山出于昌意之子安妄也按祿山本曰軋落山實本姓康母阿史德氏為覡禱軋落山生之隨母嫁于虜將安延偃延偃以來依安道買乃冒姓之其山虜謂之戰鬪神舊書猶云突厥謂鬪戰以為軋落山李氏唐賜抱玉抱真為武威李悃遷北土後為黨項之辟為拓跋氏拓跋之説不一詳餘論至鬱律二子長沙莫雄次什翼犍初王于代七子其七窟咄生魏帝道武始都洛為元氏十五世百六十有一年周齊滅之十一世十五帝有黨氏奚氏達奚氏乞伏氏紇骨氏什氏乾氏烏氏源氏賀拔氏拔拔氏万俟氏乙旃氏禿髮氏周氏長孫氏車非氏兀氏郭氏俟亥氏車焜氏普氏李氏八氏十姓俱其出也八氏細封氏往利氏費聽氏頗超氏野辭氏房當氏米禽氏拓跋氏十姓者兄伊樓氏婁氏丘敦氏敦氏万俟氏俟氏叔乙旃氏為叔孫氏屬車輥氏為車氏也後魏改元覽為元氏大武賜秃髮傉禪為源氏周閔賜周瑤為車非氏又是云氏者任城王子避難是云家而姓至陏而復景元氏者出自景升冒姓乃元載之祖而郭崇播黨氏賜也他詳餘論拓跋思敬鎮夏以討巢功賜李姓有拓跋仁福者為畨部都指揮使亦從其姓將吏迎為州師開平中子彛超彛興繼有夏銀綏宥地彛興事周為定難節度中書令曲平王其後光獻繼筠等承襲服叛不常事具玄囂姫姓降居泜水史記元囂降居江水即泜水今之湔泜水大戴禮青陽降居泜水又誤以玄囂為青陽也生帝嚳是為高辛氏有本紀言龍苗生吾融為吾氏吾融生卞眀封於卞為卞氏郭璞云卞一作弔蓋古卞字故司馬貞作算眀爾史索作苗龍融吾皆非卞明棄其守降之南裔生白犬是為蠻人之祖見大荒北經白大乃其名若前世之未虎熊羆熊髠龎國後代之史雞豬狗烏犬子豹奴虎豚之類非實犬也槃瓠之説蓋因乎此有辨見發揮帝之南遊西陵氏殞于道式祀于行本紀云帝周遊時元妃􅀈祖死于道命次妃嫫母監護始置防喪今之方相也漢祀行神以西陵氏死在江夏韋昭國語注云西陵即方雷妄矣按世紀方雷氏生青陽大禮西陵生玄囂不云是方雷而人物表西陵氏乃在方雷之後蓋世以史記謬謂青陽為玄囂玄囂為少昊遂以方雷為儽祖耳以其始蠶故又祀先蠶北齊季春祀先蠶黃帝氏後周皇后祭先蠶西陵氏唐月令以為天駟天駟馬祖非先蠶也先蠶猶先飯先酒皆祀其始造者自蠶婦事亦不得為黃帝漢世祠苑窳婦人與氏公主亦後世之溢典耳次妃方纍氏曰節生休及清休見內簡休繼黃帝者也是為帝鴻氏有本紀言清次封清為紀姓是生少昊有本紀言次妃彤魚氏生揮及夷彭彤魚世作彤雷夷彭世作夷鼓皆非皇甫謐謂夷鼓為蒼林妄矣姓纂更謂青陽生揮鼓唐表以揮為少昊第五子尤無據蓋般爾非暉云揮次十五子造􅋃矢及司率罟受封于張為弓氏張氏陳子昂張氏銘軒轅錫亂􅋃弓崇威是也姓書謂主張羅記謂為弓之長而姓張俱妄李氏灌氏李有元惁惟簡元惁見英華九百六十五灌夫父張孟皆本張氏叱羅氏周氏張羡子照復之東方氏朔父張夷字少平母田氏遺腹生之三日母卒鄰母飬之時東方始明因為姓故世謂朔無父母洞冥記朔母田寡夢太白臨之而娠羞之曰人將棄我乃向代郡之東方里以五月朔旦生之因姓東方而名朔亦見時鏡新書仙傳不得其由而多妄説風俗通姓纂云伏羲後云出女媧俱妄夷彭紀姓其子始封于采是為左人有采氏左人氏夷鼓氏國語秦有夷彭思宜氏姓英賢録云黃帝子夷彭之後鄧姓辨引英賢傳作夷鼓偲宜誤次妃嫫母謐云第四妃即嫵母漢表説文為撫母兒惡德充帝內之曰屬女德而弗忘與女正而弗襄雖惡何傷是生蒼林禺陽任出禺陽而奚仲等皆任姓有自來矣或作萬乃莒字唐表作禹陽謬禺陽最少受封于任為任姓唐表又云顓帝少子陽封任妄謝章舒洛昌鍥終泉卑遇皆任分也十國後各以國令氏遇即禺見潛夫或作過非姓書謂泉出全暉封白水為氏妄也高麗王為蓋蘇文氏殺文乃泉氏禺號生禺京徭梁儋人禺京即禺強或作偶非字音虞郭為語龍切山海經黃帝生偶號偶號生偶京又云帝俊生禺號皆非梁簡文云黃帝孫莊注玄孫也京居北海號處南海是為海司有禺強氏強氏大荒東經強北海神海外經云黑身首乘兩龍歸藏云穆王子筮卦于禺強故莊子云立乎北極疏云與顓帝並黃帝之孫得道為水神儋人任姓生牛黎即今儋人故儋近有黎徭梁生番禺番禺是始為舟番禺南極海故主為舟生奚仲奚仲生吉光是主為車建侯于薛或云禹湯十二世生奚仲姓纂黃帝子第十二人以薛為姓一為任氏六世奚仲生所説俱妄又十二世仲虺為湯左相始分任太戊時臣扈武丁時祖已皆國薛竹書梁惠成三十一年邳復遷于薛歐文忠薛簡肅銘云虺遷邳而仲虺留居薛未詳祖已七世成遷為摯有女歸周是誕文王逮武為世復薛侯後滅于楚杜云歷三代六十四世齊威公時嘗絀為伯定元年薛宰曰薛之皇祖奚仲居薛為夏車正仲遷于邳仲虺居薛則仲亦居邳為薛氏蘖氏且氏祖氏奚氏嵇氏仲氏摯氏執氏疇氏伾氏丕氏邳胚娝氏李氏廷圭本姓奚江南賜徐氏光裔光祚乃薛昭簡子隨母嫁徐延瓊遂姓徐終古夏太史乘亂歸商為佟氏謝氏謝之後又有射氏大野氏後魏賜謝總大野氏然閻氏亦嘗為此氏歐文忠謝絳銘云黃帝後任姓十族謝其一也至詩嵩高始言宣王使召公營謝以賜申伯蓋始失國蒼林姬姓生始均是居北狄為始氏西經黃帝孫始生北狄漢書又以蒼林高陽云昌意之子妄結姓伯倏封於南燕後有吉氏姞氏孔氏伯爵本結姓傳多作姞蹶父姞姓讀尹吉之吉衛孔氏出了姞密須闞允蔡光敦逼燕魯雍斷密雖皆結分也一十四國針濟及滑針姓分也後合以國令氏見潛夫斷氏世本作假非密雖二國或謂即密須亦非餘詳國名記有虞氏作封帝之後一十有九侯伯禮記外傳其得資者為資氏􅀈氏得郮者為郮氏輔氏姓書又有婋云黃帝後婋音虎得虔者為虔氏鄧名世以虔在十四人中非得冦者為冦氏口引氏劉氏劉封本羅侯冦氏子先主飬之後魏賜冦携口引氏一曰若口音辰然姓書寇出蘇忿生姓源黃帝後忿生或云出康叔皆非國于酈者為酈氏儷氏食其氏侍其氏食其玄孫賜食其冒孫武國于翟者為翟氏糴氏狄氏晉滅翟姓書又有酒氏于詹者為詹氏自詹移葛則為葛氏詹葛氏葛伯國英賢傳詹葛有熊氏之後姓書謂諸葛訛為詹葛繆矣葛伯非嬴姓髠氏依之分狂犬任之種也武王克商求封帝之裔于葪以復鍥鍥葪本同蓋周始為葪又有葪氏橋氏喬氏陳氏姓纂橋山支孫守冡者為氏喬氏狀云本橋氏黃帝後按二姓周出蔡雍喬仁碑云黃帝子孫不在十二姓者以為姓至後周始去木蒼林氏有熊氏軒氏軒轅氏陳氏姓書有軒有軒轅云出軒轅又有頡氏云出蒼頡若是野哉按二姓皆鄭出古雖有軒轅氏唐雖有軒轅彌明必不出之云出黃帝後世依倣而託之洛之後又有落氏雒氏姓書洛氏為皋落氏後妄闞之後又有監氏史監止密須之後又有須氏舒之後又有舒子氏紀氏紀邁本姓舒贊曰稽古齊睿崇黃紀雲秉籙缺尢得一奉宸并謀兼智稽功務德立監興賢命中建極推䇿設蔀體統隂陽訪咨岐雷爰敘五常史垂世績車陳大路鼎樂雲門克諧調露衮衣棺衾凶惡不起井設什一城閭十閟去殺勝殘九瀛仰化澤被生民祚衍天下以詆名已也鄙語曰厲人憐王斯不恭之語也雖然不可以弗察也亂常犯上固皆小人之為然其所由來未始不有以實其喗民者君之天也天能違乎舜禹之得天下非天與之民與之也桀紂之失天下非天取之民取之也撫我則后虐我則讐此民之通言也凋匱之民自攻夙沙之君募耕之夫能滅強暴之秦烏在乎勢位之凝哉騶馬繻以胡公內之貝水邴戎閻職戕懿公于囿竹李兊餓主父于沙丘百日殺之淖齒擢涽王之筋于廟一夕而死怨也昭宗溺昏醉而妄喜怒劉季述排㩳以出幽錮之少陽院梁武泊宗廟而佞浮屠侯景更欲捽縛之為太平寺主劉曜既役所事晉懷青衫行酒而劉聰亦叱孝愍執戟前驅是皆已甚然亦未有不先詆其過甚矣扼其吭者也隋煬汰侈荒淫卒見雉于宇文化及而掖庭人復棺之床第唐莊褻習優猱竟招射于俳郭門高而五坊人又焚之樂器所謂君以此始亦以此終是以聖人春秋于弒逆必謹書之微則書人示人之不可欺衆則書國示民之不可違也弒必書君而蔡侯吳子則不君忽暴客狎刑餘濁斯濯足不戒履霜之漸也孟子曰禍福無不自己求之者蚩尤之亂以臣逐君雖其暴惡之尤然亦參盧之急政有以取之也四海之間善則吾蓄不善則吾讐此尹逸所以戒成王也夫民今而後得反之君無尤焉此言何謂邪由此語之厲雖憐王可也嗟夫君人得聞此言則寢不瞑食不旨尚何縱欲貪酷之有時日害喪豫及汝偕亡民欲與之偕亡夫誰舍之晉平公曰豫無樂乎為君也為人上者奈何不敬黃帝子曰加我數年五十以學易可以無大過矣五十者知命之年而易者窮理至命之學也以知命之年為至命之學可以無過矣而必曰可無大過是則小過者聖人猶未敢自必其無也是故過者聖人之所不能免也人誰無過見善則遷有過則改此易之所修聞義不能徙不善不能改斯聖人之所憂也堯稽于衆舍己從人舜審于衆豫違汝弼豈若小人之恥過作非又從而文之乎君子之過也如日月之食焉過也人皆見之更也人皆仰之非無過也所過者化不俟終日兹聖人之所以為聖人也過而能改善莫大焉食更而日愈明過改而人益聖此聖人之所以不貴無過而貴改過善改過者聖之資也始雖昧而今眀初雖慝而今臧吾何尤一過改而一益起矣昔者太甲之自艾猶夫人也而周公贊之衛獻公之復國猶夫人也而君子貴之善補過也若楚子虔聞右尹之言乃揖而入當饋不食數日不能以自克以及于難故孔子曰克己復禮仁也楚靈王若能如是豈其辱于乾溪乎右尹子革子虔靈王黃帝之初志于求仙養正命娛耳目愛民而不戰乃放萬機舍宫寢而肆志于昆臺發軔紫宫之中投䇿鍾山之下登空桐陟王屋升鴻隄而入金谷車轍馬迹半于天下于是四帝共起而謀之邊城日警介胄不釋當此之時民幾再嫁而非黃帝之有矣然而黃帝克自抑畏剗迹遊馳即營壘滅四帝而有天下則克己而已矣子曰一日克己復禮天下歸仁焉夫世固有大無道民心已離一旦翻然克自抑悔人猶懷之至于死而不忘漢武帝唐德宗可謂迷復者矣輪臺之命奉天之詔非必盡實也一日而播告上首之蠱靡不為之感泣而知戎冦之不足平卒以自保其國言發乎身加乎民行發乎邇著乎逺匹夫為不善一念之悔固有言未脫口而災變為之消弭者况稱孤之客邪易危之安轉亡之存夫又何難之有易曰復自道何其咎以黃帝之神聖一念之差猶幾至于不免而後之人乃至耻過飾非聞諌則咈曰吾為盡善豈不大悖乎聞黃帝之事其亦少知戒哉路史卷十四

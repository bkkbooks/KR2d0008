body:
  text: 路史卷二十三宋羅泌撰後紀十四䟽仡紀夏后紀下帝啓曰㑹見紀年連山作余一曰建見年代歴按歸藏鄭母經明夷曰夏后啓筮御龍飛升于天山海經楚辭等引作夏后開避漢諱也故云啓之字開伯禹之治水也娶于塗山生啓於行荒度土功三過門而弗入塗山氏能明訓教而致其化列女傳云及長化其徳卒成令名以故啓知王事達君臣義越絶書持禹之功列女傳云持禹之功而不殞禹崩啓繼世有天下户氏不恭今鄠縣姚察訓纂云户扈鄠一也扈己姓乃髙陽氏之後也信相失度威侮五行怠弃三正帝乃遷廟摯虞要注云古者帝王征行以齋車載遷廟之主行故甘誓云用命賞于祖曾子問以遷廟之主行必有尊也廟無虚主故無遷主則主命與有户大戰甘澤乃召六卿而誓鄭謂三王同有六卿故大傳夏書注以后稷司徒秩宗司馬士共工為六卿按地官卿大夫自有六卿毎鄉卿一人所謂軍将皆今卿是也章懐云古者天子寄庫政于六卿居則以田警則以戰素信著與衆相得也啓伐有户乃召六卿盖大夫之在軍為将如齊以髙子國子各率五卿或六卿外别有此六人無事掌其鄉之政属于大司徒有事則率其鄉之萬二千五百人為之軍将属于大司馬爾用兵之時事統司馬孰有天官冡宰更從属于司馬哉整軍實以伐之不勝六卿請攻之帝曰不可吾地非淺民非寡也兵刀接焉而不勝是吾徳薄而教不善也何以伐為於是般師琴瑟不張鐘弗撞鼓弗攷不因席不仍味親親長長尊賢委能隱神期月而户來享夏之失徳始于伐户孔子敘甘誓特以見夏之衰自此耳故馮衍云訊夏啓于甘澤兮知帝典之始傾注謂夏徳之薄同姓相攻失之魏霍性䟽云夏啓隱神三年而說苑乃云子貢謂禹與有扈戰三陣而不服修教一年而請服吕春秋以為相伐扈六卿請復之云云荘子亦以為禹伐之皆非遂滅之復昭夏功文選啓滅有扈而夏功昭有扈之罪經無明文史記以為啓為天子而扈不服啓滅之頴達謂堯舜禅而啓獨繼故不服書云不恭其事亦可知矣周書言夏之興也扈氏弱而不恭夫滅侮五行怠棄三正則不用正朔則其為罪甚明此其所以伐之而許叔重以為扈伐啓啓滅之吕春秋淮南子以為為義而亡胡益之更謂有歸益之心而啓討之抑又妄矣天問云有扈牧豎云何而逢擊牀先出其命何從王逸以謂扈本牧人逢時為侯啓攻之于牀擊殺之洪慶善謂啓滅之遂為牧人逸云扈澆之國故天對云澆扈爰踣承逸之誤既征西河紀年在二十五年能拘是達天問啓惟憂而能拘是達言能憂勤拘執者變通之敬承繼禹之道商契之來孫曰冥寔喜水功命為司空勤其官而水死商人是郊文武之功起于后稷故推以配天然祖有功有功而子孫不有天下亦不郊􅕐障水而殛死冥勤官而水死皆可郊故夏商郊之孟涂敬職而能禮於神爰封於丹今建平郡有丹陽城在秭歸縣之東七里丹山之西即孟涂之所理也丹山乃今巫山乃立五廟筮遷鼎禘黄帝而郊􅕐鄭云夏無祖但宗禹而已并四親為五商祖契而宗湯而湯不毁并四親而六故王制云商六廟七廟出于周或引伊訓七世之廟考之不然唐書云夏以大禹為始祖漢以髙祖為始祖非祖也命大亷祭鼎昆吾之谿墨子言夏后開命大亷折金山川鑄陶於昆吾作九鼎鼎成而方不炊而自烹不舉而自藏不動自響不遷自行圎象萬物鑄于鼎側以祭昆吾之虚使翁雞乙灼于白君之龜其兆曰蓬蓬白雲一南一北一東一西九鼎成遷三國焉夏人失之商人受之商人失之周人受之一云禹也歸藏云啓筮徙九鼎啓果徙之是則徙也而莁享大阾之上是為鈞臺之享連山陽文啓莁享神于大陵之上即鈞臺也鈞臺在陽翟地道記云下有鈞臺彼俗謂之臺陂九域志有鈞臺驛又筮於晉之墟作旋臺於水之陽在太原爰棘賔商九辨九歌天問騷經云啓九辨與九歌夏康豫以自縱王逸以九辨九歌為禹樂諸說皆妄予謂啓之所急在以商均作賔九辨即九韶盖商均以帝後得用備樂也辨當如遍夫禹九功之徳皆可歌也而王逸以為九州物可以辨治啓能承先徳育羣品而作之妄也舞九招紀年啓登后九年舞九韶登嬪抃馬秉翳執環而聲九辨中聲猶在而人皆仰夏之功山海經云上三嬪于天得九辨與九歌以下天指舜禹尊其賜爾注謂天帝之樂啓登天竊之以下妄矣經言大樂之野夏后啓于此舞九伐馬乗两龍雲盖三層左手秉翳右手􅋵環佩玉横在大運山在位十有六嵗年九十一紀年啓二十九年年九十八按禹年三十而娶行十月而生啓年代厯啓夀九十在位十六年又十五年在父朝六十年在虞朝生當舜攝之二十一年與娶塗之年合紀運圗等云九年非子太康立厥弟五人分封於衛是為五觀楚語觀射父云夏有五觀與朱均管蔡並列知為姒姓而左氏云觀扈至商失國夫觀與扈各國潁達引此為射父之言而以五觀為觀扈失之其支於莘者為莘氏辛氏甡氏觀氏卜氏世本莘國姒姓禹後文王妃家詩傳同楚武伐都俘觀丁父歸以為師故楚有觀氏世掌問卜曰卜君為卜氏姓苑又有啓氏與姓纂之啓氏皆云出夏啓非以上討下奉辭伐罪之謂征敵曰戰是故春秋有書戰而無征虞之於苖仲康之於羲和其事是也有户氏諸侯之國也啓禹子也以天子討諸侯宜曰征矣而孔子序書乃曰啓與有户戰于甘之野不謂之征有若敵然何也啓失其天子之禮也古者天子有六卿卿将一軍諸侯有罪則奉詞以討之天子弗躬也茅戎不道定王伐之為戎所敗春秋書曰王師敗績於茅戎言王者之師非戎之所可敗取敗而已王者之於天下也盖之如天容之如地豈可捐忿而與臣子争一决之功哉有户不恭則文徳以來之文徳而不至偏以劘之可也焉用戰啓失其御乃至遷廟而臨於小國之侯以至大戰而軍不勝予以是知夏徳之将衰矣甘誓之書所以及戰而不一及成敗成敗不足言也然則聖人於此可刪而反著之豈惟傷之哉又将以為萬世戒也帝太康太康既尸天子以佚豫蔑厥徳尸猶尸素尸厥官者居位而矌職之謂孔蘇訓為主非假國亡政不顧後圗㤀伯禹之命周書播棄五則而叶比於滛聲騷經云不顧難以圗後逸注太康不遵禹啓之樂更作滛聲放縱情欲卒以失國於是四夷背叛黎民咸貳爰大城築開封太康縣理城夏后太康所築漢為陽夏開皇七年改曰太康作為刑人不堪命乃般㳺亡度求用益匱而貢以敝孟子言夏后治地莫不善于貢謂後代之君非禹也若禹之為豈至于是有辨見發揮畋於洛表厥弟五人御其母以從徯于洛汭過時弗反有窮氏羿於是因民弗忍距諸河太康失邦五子咸怨述皇祖之戒作歌閔焉五歌之作在失邦後今按四子述禹之戒其五乃自述以傷己之亡攷之其一戒于微二言其亡三恨其亡國四恨其覆宗而五則痛追悔之無及從微至甚亦長㓜之序如此夸翔河上衆散亡歸而其弟仲康立汲冡古文太康居斟尋乃失邦斟尋今夀光漢之斟縣入瓉以為河南有尋未考也孔安國云為羿所拒不得國遂廢之在位盖十有九嵗失政又十嵗而死廢逐之後世莫知其死時代厯謂在位十二年按世紀云二十九年失政而崩外紀從之刀劍錄云太康二十九年嵗次辛卯春鑄一劍上有八方面長三尺一寸頭方盖廢逐之後然辛卯乃二十七年也帝仲康太康之弟也太康之亡國人立之孔氏云羿立仲康古史從之非也左傳屈騷皆不之及自太康之失徳天厭災流四國亡政不用其良日月告凶不用其行惟仲康肇位肘制於羿皇天哀禹錫以彭夀思以正夏史彭祖也本云太康時乃命𦙍侯大司馬統六師徹國之侯入為司馬肇位時即命於時羲和湎淫夏世羲和之官合為一王者之代天事畧也或曰夏時羲和以官為族如倉庾氏非也顛覆厥徳遐棄所司而酒荒於乃邑脇從梟嘑俶擾天紀荒于邑則不在其位矣脇從則嘯聚卒旅矣有邑有兵而為渠魁非䟦扈而何天紀謂五紀俶擾者始亂之也乃季秋月朔辰不集于房瞽奏鼓嗇夫馳庶人走道人嗇夫治官之属鄉黨宣令之官漢有郷嗇鄭立第五倫等皆嘗為之𢎞云主幣之官非而羲和蔑聞知唐書云五年此劉炫之說虞翻云無年非也盖誤肇位之語爾肇位四海乃命侯掌師之嵗非辰不集房之嵗九月日月合辰今不集故或以為失閠而非食夫瞽奏鼓嗇夫馳則食可知矣馳走者遑遽奔救以答天象若将失主而無歸爾非謂取位幣凡救食者出入不遇疾風暴雨有辰弗集房說别見王命𦙍侯征之蘇軾謂書序羲和罪止廢時亂日官為占天職甚輕誅之一法吏可辨何至命六師遂以𦙍后之命出于夷羿仲康所不能制說者皆從之至謂昬迷天象辰不集皆追數其前日之愆或謂子序惟言𦙍徃征之見非仲康之命皆妄按此篇與五子旅􅋙仲虺皆有兩序承王命已詳序故畧于新序且掌六師乃為司馬時及征羲和六師豈盡出哉以先時不及時為指司厯之失時此本二孔尤害義十有八嵗崩子相立世系譜以相為啓之子誤年代厯二十八年外紀紹運圗十三年俱非其支封鄧為鄧氏華夷國仲康子徙都鄧寰宇記同學者復𦙍征其言有八妄夫羲和有夏之賊臣而仲康則剛明果斷之主嗣后者忠亮有為之臣也説者乃謂羲和雋羿而忠夏謂仲康者夷羿之所立而𦙍后禀偽命以行誅是則仲康乃優柔失權之主嗣后者黨奸怙惡之人而羲和誠有夏之忠臣也方夷羿之放其君也盖因民之不忍未必心乎操懿之行也然而天下之事多由馴致辨之不早則将搂其柄而號制於天下矣仲康於此乃能沉幾先物于踐位之初首反六師以命𦙍兹乃先漢文帝自代入立夜拜周昌投幾之會也以故夷羿雖懐觖望汔仲康之代而弗得肆則仲康之辟得其御天下之柄歸於夏羿不得有之也夫羲和蓄其反徳嘯類囊槖而崇飲於私邑其将以俟釁而圗不軌也乆矣渠魁脇從叛夏之迹顯矣豈直廢時而亂日哉而蘇軾乃以為命征作誥皆出后羿或者又從而増繹之謂之挟天子以令諸侯如司馬懿之誅王陵諸葛誕蕭道成之制沈攸之楊堅之討尉遲廻皆以忠於王室而不順己之所圗者至謂書有非聖人之所取而猶存者豈理也哉夫以先時後時為羿所以名羲和之罪玉石俱焚為羿所以状羲和之惡以威克厥愛為任刑之事以脇從汚染為文致之詞其果然耶爾衆士同力王室尚弼予欽承天子威命則侯之忠忱見矣豈摟諸侯假王命者一切之言哉政典之言尸司馬法也其與玉石等語皆侯之所以戒敕吏士者也豈羿之所以數羲和哉威者果斷之謂愛者姑息之名也豈刑與仁之謂耶始魯昭公六月而食祝史請用幣平子止之昭子知其異志盖小人之圗國未有不自蔽其君始此𦙍征之書所以著於百篇之内者誠以見仲康之能立而𦙍后之能職也使非聖人所取而且存則是王莽之大誥誅翟義者文致之語一切之言又得與将巽使𦙍之典並傳不朽而𦙍侯之罪畧亡一句以示譏豈所以垂戒天下後世俾亂臣賊子之懼耶帝相史記帝太康崩子帝仲康立帝仲康崩子帝相立稽古錄凡帝皆易曰王失之詳譜圗一曰相安世紀相安之立選蠕而佳兵征淮畎淮夷畎夷紀年云元年羿逐之播於商丘依斟灌斟尋氏即介斟乃東郡之灌汲古文云相居斟灌盖被逐之後居于商丘依二國以為援二年征風黃夷范氏風夷黄夷七年於夷來賔並紀年衰亂之世夷戎之來不盡徳化非必繫國盛衰通典謂相征畎夷七年然後來賔樂史因謂七年乃服非也八年寒浞殺羿太康後亊惟屈原敘之甚詳與内傳之說相表裏班固以為劉安之說既升而子長紀全逸其事夫羿之簒夏盖在相世本以猥才貪于禄位逐相而後不復于意神器故相得以妄興征役内傳謂羿因夏之衰代夏政八年而遇烹得其寔記錄咸云相十四年方為羿逐盖誤又二十有二嵗猗奡滅二斟而弑帝寒浞自立馬縂虞世南皆云羿弑后相非也年代厯相羿二十八年晁公邁云相二十八年羿二年相之下安得别出羿二年哉后緡生少康譜商丘有相氏自古國家丁中否艱難之運朝廷之政類皆茍且姑息之為以故豺狼梟獍跳梁䟦扈乗間並起而不可繫止自非大有為之君奮其剛斷攬權綱以離奪之其濟鮮矣予讀𦙍征見仲康之能以威勝愛而相遂以姑息失之未嘗不痛之也夫兵權之失得社稷存亡之所繫也堯帝之末不誅四凶而付之舜則唐之兵權在舜矣舜帝之末不征三苖而付之禹則虞之兵權在禹矣兹豈陋儒之所知哉春秋之代魯人三弑其君盖未有不先有其兵權者慶父帥師伐于餘丘經必書者見慶父之得兵也夫以荘之㓜立而首以兵属慶父其所以致子般之禍有由矣公子翬再為主将專會諸侯而仲遂擅兵再出入杞伐邾救鄭威令信于其軍故翬弑隱而寪氏不能明其罪遂殺惡及親而叔仲惠不能免其死慶父殺子般而成季非正其惡皆兵權之失也秦漢而來魏晉齊梁隋唐之際其誰不然孝和以㓜冲即大位能遽誅鉏竇憲於是威權在手十六七年邦畿綏奠則兵制之不失也至宇文氏依周建號以宇文䕶為司馬逮其歸政猶属以兼司馬緫軍政以故周毓不制循致于難唐自中世一切姑息而強藩悍将擅殺主帥皆即授以節鉞於是握兵方命至自相推與或甲乙相攘𢷬闕逼京顯戮将相朝廷莫之或制自憲宗用剛斷平江東夷澤潞易定魏清貝衛澶相淮蔡蜀夏一時率服而有唐遂以中振穆敬懿僖世益頽靡而藩鎮益雄張卒以亡唐則不知果斷而已向若后相綜覈名寔蓄其威武權而用之則仲康之業何至是而覆哉優柔不斷反受其亂此志士之所以長拂膺與夷羿傳夷羿有窮氏窮國之侯也作同偃以女偃出臯陶或云姓鬲非也世紀云不聞其姓失之左臂脩而善射淮南子随巢子五嵗得法于山中括地象云羿五嵗父母與之入山處之木下以待蟬鳴還欲取之而羣蝉俱鳴遂捐而去羿為山間所飬年二十習于弓矢仰天嘆曰我将射四方矢至吾門止因捍即射矢靡地截草徑至羿之門乃随矢去傳楚弧父之道吳越春秋云黃帝作弓後有楚弧父以其道傳之羿以善射著既學射于吉甫其詞佐長故亦以善射著見世紀嘗從吳賀北㳺見雀焉賀命之射羿曰生乎其殺之乎賀請左目羿中厥右恥之由是毎進妙中髙出天下迨事夏王王命射于方豕之皮征南之的曰中之賞子萬金不中則削十邑羿援矢而色蕩射之矢逸再之又不中焉王謂傳彌仁曰斯羿也發無不中而今也不中何以對曰若羿者口懼之為災而萬金為之患也人能遺其喜懼之私若萬金之患則天下亡愧於羿矣王曰善吾乃今知亡欲之道矣符子太康之立滔滛亡度娛以自縱民興胥亂迷畋有洛之表十旬不反夷羿於是因民弗忍兵於河以距之太康失邦仲康立於時羲和沈湎于酒叛官離次将夷羿是與王命𦙍侯征之羿遽隱慝及相之立爰逐相而自立因夏民代夏政論語兼義云羿逐相而自立蘇軾云自立為帝自鉏遷于窮石鉏今澶之衛南窮石即有窮之地今夀之安豊地有窮谷窮水杜順而來皆以為西郡刪丹妄矣按汲書羿桀皆居斟尋則宜在此與鉏相近豈得逺出西塞因夏民乎天問云阻窮西征巖何越焉此謂羿也盖亦因誤予有以知天問非屈原作注以為鯀阻羽山尤妄滅樂正后䕫之子伯封即伯封叔見禹紀先有仍之女美而黰厥澤可鑑夔納之是為𤣥妻生伯封貪惏忿纇寔有豕心人謂封豕羿滅之后夔是以不祀即封狶史傳堯有封狶羿射之于桑林此也騷經等多言之如又好射乎封狐天問云馮珧利决封狶是射說者俱以為豚豬殊為寡理羿於是益時射不修民事忘其國䘏而蔽于從禽用不恢于夏家武羅伯因熊髠龎圍皆賢臣也乃棄之而信相伯明氏之䜛子寒浞伯明寒國之君猗姓又以龎門是子為受教之臣陳音􅈢父傳羿羿傳逢蒙論衡作龎門是子即逢門也孟子作逢蒙或作䗬門䗬蒙同炎帝之後浞乃蒸取羿室純狐爰謀殺羿純狐羿妻名天問云浞娶純狐眩妻爰謀何羿之射革而交吞揆之言羿能貫革之射人揆度而交吞之又云胡射彼河伯而妻彼洛嬪盖有洛氏之女也注以為宓妃妄矣傳言羿妻姮娥者字也竊藥奔月之說特假類之言爾射河伯殺窫窳僇九嬰等並見淮南子植之詐慝内行媚外施賂而虞羿以於畋内外咸服而羿弗察也八年将歸自畋龎門取桃棓殺之家衆亨之以飲其子子不忍食死于窮門伯靡奔有鬲氏太康君也奚禄崩而出玦羿得之於是簒帝及是而滅今江寜縣北五十有射烏神廟羿祀也然射烏言堯時羿按九域志亳惟有羿廟後有窮氏氏羿氏成敗不難見哉夫與死同病者越人所不醫與亡同政者屠黍所不處用賢則治有徳則昌此不易之理也是故古人論病以及國原診以知政秦為暴虐羽親滅之而暴虐益甚陳為滛侈隋親滅之而滛侈益甚是安得不亡哉夫以繼體之君艱難不知而抵于敗是故不足怪今也躬自伐之而躬自為之躬自成之而躬自敗之此何為也邪甚矣夫人之愚也湛于酒色小病大死人舉知之而人舉甘之好任小人大亡小亂理之必然而小人必用今世固有誨人以酒色亡身而自溺于酒色諫彼以小人破國而自惑于小人者矣是非不知戒也知思于憂患而死安佚也武王之鏡銘曰以鏡自照者見形容以人自照者見吉凶鄉使文皇非魏徴之徒朝夕勉之以隋為監則唐之為唐未可知也太康以佚豫作禽荒般㳺亡度而亡其國此羿所親滅也而羿不知戒復恃射而㤀國卹淫于原獸是又一太康也家衆亨之顧非其不幸矣嗚呼服留黃醉紅裙豈其不知戒哉而卒自蹈之故君子非茍知之寒浞傳寒浞者猗姓潜夫論有猗姓括地象云過猗姓國是也本以寒為邙姓國者失之寒君伯明氏之䜛子弟也好為䜛慝后寒惡之棄諸窮窮羿入之謖以為相而信使之方羿之逐后相相浞是從及羿立而荒㳺浞於是蒸其室而虞之以於畋内外從之則繼殺而代之襲羿之號盖循其所僭之名號外紀云不改有窮氏之號非也且因其室生澆及豷澆惟恃力盪舟走陸是曰奡奡一作敖說文云生敖及豷澆倪吊切集韻澆灌字一作盪浞任詐偽而不徳于民使澆帥師滅斟灌斟尋氏處澆於過處豷于戈過今之旅縣戈宋鄭間邑弑夏后相爰革夏命易天明四十有三年為伯靡所殺羿距太康及相立始逐之而自立八年夏祚未絶及寒浞殺羿而代之盖二十餘年始殺相代夏至是又四十三年計浞之簒盖六十餘年夏之亂向百載矣年代厯云浞四十年其說為近續漢書羿浞簒夏數十年泛言之而通厯等云浞二年外紀云十二年晁紀年云十年紀運圗云三十年其踈甚矣夫浞之殺羿因其室而生澆澆長殺相相死少康始生少康復生四子逮事而後誘豷滅浞以中興非數十年可知夏本紀言相崩子少康立益踈澆恃多力從欲不忍惡虐以逞朋淫不義而通于丘㛮岐日康娛以自忘館同所止天問女岐絳裳而舘同爰止注女岐澆㛮也少康滅之及女岐天問何少康逐犬而殞厥首注少康因田獵逐犬襲殺澆斷其首又云㒹易厥首注謂少康夜襲得女岐而斷之伯杼復誘豷殺之寒浞遂滅史臣言唐安史能以臣反君而其子亦能以子弑父以為天道之好還蘇竣之亂桓彛涕遣俞縱遮守蘭石竣數誘之縱益死守或勸以利縱曰吾徳桓侯惟有死報吾之不負桓侯猶桓侯之不負君也石演芬胡人也假父李懐光将遂與朱泚而演芬亦請討之懐光罵曰若為我子奈何亡我家耶對曰若天子股肱我公之腹心若負天子我何得不負公吾嘗言之造物者之報人也不報其人而報其人之天非惟報之其報之也必厚天道豈難知哉惟其效有遲速之不同爾而歐陽子遂有幸不幸之說惡可謂誼理也哉秦政焚書阬儒以愚黔首黔首未愚而其子胡亥已不分于鹿馬曺操令不仁不孝而有兵政術者咸舉無遺民俗未化而其子丕絰未反哭廣設百戲顯納二女殺妻害弟不善之報如是豈有所謂幸免者耶舍人須騐商鞅法也而鞅竟以無驗執納甕熾炭周興計也而興竟以熾甕服索元禮作鐡籠以􅀢囚而卒自冐之李林甫好歸獄于天下而國忠亦即其術以推治殷洪喬不作置書郵而子浩遂有竟達空函之厄小且若是秦宏違天地之道則天地違秦亦宏矣詩云敬之敬之天維顯思命不易哉曽子曰戒之戒之出乎爾者反乎爾者也唐虞以遜禪帥天下而商湯去其所以帥而帥之以其非所帥然則周之于商奚間焉曺孟徳能欺孤兒而奪之司馬仲達亦能紹其寡婦而攘取及劉裕之平逆亂則又司馬徳宗之曺操也隋煬弑父殺兄及宇文之變而父子更相為疑此豈有所愛者晉能與白狄伐秦秦亦能與白狄伐晉殺人之父人亦殺其父殺人之兄人亦殺其兄石勒病遣二王俾之國虎留之而紹以遣及虎之病留二王使輔政妻逐之而紹以留虎之於勒姪也殺其子以及其母遵虎子也亦殺虎而及其母甄后之戕郭后康窒其口既甄之戮亦以康窒其口朱温令蔣煇弑昭宗昭宗環柱而走劍之擊柱者三乃歸獄于裴季暨友珪之逆俾馮廷諤以劍犯温温亦走旋柱劍之擊柱者亦三乃歸獄于􅀶王友文及末帝之討逆友珪竟俾廷諤進刃而廷諤亦自殺矣夷羿之不道以臣逐君絶后夔而其妻與其相浞亦能賂龎􅂪而殺羿子亦死于窮門浞能弑相而伯靡卒能滅浞陽推五福以類升隂幽六極以類降天道好還豈不明甚矣哉予觀慶封蒲嫳之於崔杼慶舍蒲癸之於慶封與夫元昊訛嚨等亊而益嘆羿浞之會舉天理自然者故曰愛出者愛入福徃者福來鶴鳴于隂其子和之三后之裔皆王而有吴者卒夷昧之子孫視履考祥諶哉帝少康初奡之弑相也后緡方震亟出自竇歸于有仍緡少昊後仍太昊後生少康少長為仍牧正殊才異畧至徳正仁忌奡而能戒之奡使臣椒求之奔有虞為之庖正姚思妻之二姚而邑諸綸綸今宋之虞城竹紀年楚吾得及秦師伐鄭圍庖綸氏者博物志謂汾隂古綸邑為少康邑踈矣方多艱之際何得近舍虞仍而逺即汾隂餘詳國名記有田一成衆一旅乃布徳兆謀撫其官職旋收夏衆而用之一成十里百井也九百夫地五百人為旅八百家而五百人有増常數衆志叶也慶得四息伯杼曲列龍留季杼俱賢逮亊乃俾女艾諜奡季杼誘豷伯靡自鬲收二斟之藎滅浞而立少康汝國即女艾女之封猗奡被服彊圍朋淫不義而弗豫不虞少康乗之滅于過而伯杼復滅豷于戈復禹之績以紹都于櫟十道志云陽翟有少康城洛陽記云夏少康故邑水經頴水東歴康城又瀛有中水城圗經云夏少康所此于是方夷來賔獻其樂舞後漢書及汲紀年祀夏配天不失舊物左傳晉志云禹五服至于五千里夏徳中衰有窮之亂少康中興不失舊物正法度振凋攰嚴祀崇禮撫􅀈藥瘵而天下之民歸心焉是以振祚四百後世莫及在位四十有六嵗陟年八十有八九子漳浦縣有九侯山舊經云禹子少康封于會稽有子九人流于此山而名新圖經云少康九子今訛為鬼侯山以為山魈之居者妄矣伯杼嗣帝杼一曰松蔓音設見代厯世紀云或作公孫蔓非是為帝輿世本云季杼作甲又云杼作矛注少康子輿也墨子亦云輿作甲中侯作予一作宁又作佇世紀一作后予集韻云予夏后名音宁又柠始作矛甲滅戈豷及即位都于原紀年帝子居原自原遷于老王老王地闕五嵗征東海伐三夀本作王壽紀年云夏伯杼子之東征獲狐九尾乃封其仲曲列于繒是曰繒衍傳作鄫至周為莒所滅魯㐮四年有繒氏鄫氏曽氏宣室志有崇言曽氏陶唐氏之後以字為氏妄也封云西甌處于埤中􅗴髪文身以負俗曰無余無余者杼也云即季杼少康之庶子傳云季杼誘豷杼少康之長子不得謂季然姓書言少康崩時季杼尚少則滅豷非杼也寰宇記少康庶子無餘封于會稽世為越侯云無余紂誤初禹之會稽山也復于衆曰食其寔者不傷其枝吾獲覆釜書以除天下民有廬里其徳􅄎矣死則予欲瘞焉於是邑之安民治屈以為之法及崩羣臣葬之至于太康嵗弗及祀方皇不忍去人名其處為杼山顏真卿記山有夏王村其北有夏駕村張元之吳興記曰稽留山爰封杼以世祀盖十數傳而與民編及周之東有無壬百姓奉而君之是為漚粤東粤越也記云周遷時有人生而言曰鳥禽呼嚥喋指天而向禹墓曰我無余君之裔末也将修前祀為民請命民喜而封之粤無壬生􅀈􅀈生夫譚譚之子為元常故越北界有語兒鄉與萬嵗厯之說異按國語通典作禦而越人謂兵為兒盖禦兵云暨元常而始伯元王命之或作允常非其子執菼滅吳而遂霸勾踐也哀二十二年淮南子云勝夫差于五湖南面而霸天下泗上十二諸侯率九夷朝焉七世菼􅀈夘逃位巖間寖罕越人熏而出之是為無顓即子搜自勾踐而下傳無世次按紀年勾踐以晉出公十年卒鹿郢立是為鼯與六年卒育姑立是為不夀十年卒朱句立是為王翳三十七年卒王翳立三十六年卒子諸咎殺之諸枝立是為孚錯枝一年其大夫寺區定亂立初無余十二年寺區之弟思復弑其君莽而立無顓八年故子捜曰越人三弑其君其弟無疆為楚所破顯王四十六年楚威㓕越盡有其地史云粤之紀年無歐文忠云句踐五世王無疆非族散江南海上于越東野句餘姑妹姑于迭為伯長王徳璉畨陽記云東野王夏后氏之苖裔秦末為百粤君長餘並詳國名紀無疆之長王後去琅邪王子尊尊子親失其民見越春秋其次子蹄守歐餘之陽歐餘山在烏程歐文忠云諸子皆楚封之盖雖散處猶臣楚為歐氏謳氏漚氏餘氏烏氏烏餘氏甌氏歐侯氏歐陽氏歐羊氏謳區甌歐漚並同歐羊見熊喬碑無諸保泉山漢帝王之閩中漢五年立無諸為閩越王王閩故地都東冶建元三年閩越為東甌王遣助救之未至止東甌因請徙中國帥其衆處江淮間此摇也後頗出因立冶冶之即東冶今福之閩縣也按福圗經云勾踐六世孫為楚倂其後無諸以其境南泉山都之稱閩越王朱買臣云東越王保泉山在建安北界今衢之信安南二百里泉嶺山其季餘善與孫搖又以海東隅地稱王號三越俱會稽之域見福圗經按歐摇佐漢平秦漢惠三年封為東海王居東甌號東甌王顧氏譜云勾踐七世閩君摇寰宇記云疆七世殆俱非建元六閩越王郢擊南越佗孫胡上書上遣将兵郢弟餘善殺之降乃以為東越王郢舉兵無諸子繇君丑獨不預謀乃立為越繇君奉閩越祀元鼎六餘善反元封元冬兵入東越繇君居服殺餘善降上以東越陿多阻閩越數反覆徙之東越遂虚今之閩川也以顧餘王東越搖無餘侯海陽奉越祀尋以漢兵衆歸分郡之會稽郡吳郡姑越漚句章吳門餘復黄林餘不甌鄧俱其羡也越絶書云吳樓門外馬寜溪止復城者故越王餘復君所治門外鴻城故越王城也無餘史表作母餘並詳國名紀後有駱氏顧氏疇氏靈姑氏史無諸及揺皆勾踐後駱舊作騶其将有騶力徐廣一作駱是為越騶無本齊有馬繻矣諸氏搖氏傜氏稽氏多氏植氏菼氏舌氏余氏越氏羊姓諸越亦有越氏後魏越勒疆並為越氏姓書少康封少子會稽為會稽氏漢初徙譙稽山為稽氏漢功臣有多軍封無錫越将子夘嗣云龍苗居仍為竇氏六十有九世犨出北方仕晉二十世統以武誅入鮮卑拓拔部南竟代郡號沒鹿囬為沒鹿氏魏穆命為紇豆陸氏其歸華也魏武又復之為竇氏犨字鳴犢葬常山故姓書又有鳴氏紇豆或作紇旦非懐正敗溺僇尸為毒氏唐相與太平公主謀逆帝杼能帥禹者故夏氏報焉二十有七嵗陟子槐立帝槐世本外紀或作魁非一曰芬是為祖武並世紀立三嵗而東九夷來御畎十方黄白赤𤣥風陽凡九見竹書及後漢書二十有六嵗陟世紀二十八年紀年四十四年俱非子芒如立名以主謂字以尊徳名字不正則紀不順而文不從帝芬帝槐也固未悉其名若字也班氏表古今乃列芬于上下置槐于中中一作懷非特是也夔后䕫也居䕫于上中居后䕫于下上韋豕韋也置韋于下上置豕韋于上下韋在桀時豕韋在南庚時又出劉姓豕韋在武丁時居中上韋國名也此猶可諉郵無䘏與王良並著即尤旡恤王良也范武子與士㑹俱垂此何為邪武子列上中士會列中上以至列帝柱𤣥冥之後而龔工與女媧齊等陋矣夫人物之表也帝芒如史記夏后芒鄒誕生音荒一曰和世紀帝芒又曰和芒如之元年首以𤣥圭賔于河見紀年乃東狩海紀年云東狩于海獲大魚十有八嵗陟紀年后亡陟年五十八子洩立帝洩一作泄是為世宗二十有一嵗六夷來御於是始加爵命畎白赤𤣥風陽之六夷也紀年云繇是服從故范氏後漢孫子經書云東夷自少康後而出服王化獻其樂舞也二十有六嵗陟世紀同年代厯十六年紀年二十一皆非子不降立帝不降是為帝江史帝不降即帝降當音江山海經帝江也一曰北成世本世紀帝降或曰北成年代厯作江武一作江成非六嵗伐九苑紀年五十有九嵗陟紀年代厯同紀年六十九紹運圗六十三弟扄嗣帝扄或作禺世紀喬云芬子帝芒芒子帝泄泄子帝不降不降弟帝喬喬子帝廣年代厯作愚字之誤號曰髙陽世紀年代厯云或名曰髙陽二十有一嵗陟世紀年代厯等同子厪嗣帝厪太平御覧音近是也世紀作廣年代厯云一曰厘乂曰量江皆字之誤一曰頓見年代厯世紀云厪一曰頓一曰董江亦字之誤立二十嵗而陟世紀同紹運圗二十二子𦙍甲立人表帝厪在孔甲後失之帝𦙍甲見汲紀年左傳作孔甲世遂從之非也按古有孔甲乃黄帝史官孔姓也無因以為名號甲之立湎泮陂僻僾而不敏好方鬼神事淫亂夏后氏始衰諸侯叛之㳺畋黄萯之顏東陽萯山也天風晦冥遇神䙜而迷字書云䙜黄萯山之神能動天地孔甲嘗遇之吕氏春秋及地記皆作萯山急趨民舍主人方乳皆曰后來不勝句之必殃帝取子之曰其誰敢殃及長幕動撩析而中厥足帝曰有命遂以守御覧云以為守者守門之官劉子云析薪斬左足遂為大閽吕氏無此取嘽緩之聲以為破斧之歌始為東音而民邪僻之心生矣晏子春秋云桀為東音非於是得乗龍于河滅蔡墨云孔甲能擾于帝帝賜之言能順于天而天賜之傳者之妄不能飲食有劉累者學擾龍于豢龍氏以服事之賜之氏曰御龍左氏傳它日龍戰于庭流漦櫝之詳國語論衡如蛟妄事大似郭璞諫止任谷所化之女者既一雌死累潜醢以奉甲巳而求之懼而之魯或云師門非向列仙傳云嘯父冀州人梁母推其使火去之三危介登師門者嘯父之弟子也能使火為夏孔甲御龍不能順其心意孔甲殺而埋之野外一旦風雨迎之山木皆焚孔甲祠之未至而道死異矣𦙍甲在位四十嵗後居西河刀劍錄云孔甲四十年以九年甲辰采牛頭之鐡作劍一銘之曰夹長四尺一寸黄伯思引孔甲劍一字銘曰甲以為之銘天有妖孽十日並照於東陽有十日說别見其年𦙍甲陟以上紀年年代歴云三十一非子臯立帝臯或作睪是為簡臯世紀年代厯又作臯簡十有一嵗陟葬于殽所謂南陵蹇叔曰殽有二陵其南陵夏后臯之墓今洛之永寜三崤山也說詳餘論子敬發立帝敬發傳多作帝發一曰惠見紀年年代厯作發惠是為后敬其始即繼諸夷式賔獻其樂舞紀年云元年於是思禹之功庸意于治十有二嵗陟帝王本紀十三外紀云十一而弟履癸立世本臯生發及履癸史記人表世紀皆以癸為發之子故杜預以為臯之孫非也帝履癸是為桀桀名也或以為號為謚俱非初有窮之誑攘夏緒􅳩忽不絶諸侯胥亂民罹癉毒少康中興比𦙍甲再淫亂姦雄畔渙而夏以汨震三傳而癸諸侯之存者不能以四千矣衛彪徯云孔甲亂夏十四世而亡班志云禹後十三世孔甲好鬼神孔甲後十三世湯伐桀誤也癸不務徳好貨便佞慢神虐民侈後陳蔽㛫遂哫訾嚅唲恩信不申於國始遷於垂所謂天門在澤之晉城太行之上有天門說見餘論乃大淫昏洪舒于民䜛貸處榖而㓜色是與榖禄也大戴禮孔子言桀紂踈逺國老㓜色是與䜛貸處榖法言法行處辟又云桀不率先王之明徳荒耽于酒淫佚于樂徳昏政亂汙池土察以民為虐粒食之民懵然幾亡盛軍伍立兩億正書云桀有左億右億之衆自謂天父賈子云紂自謂天王桀自謂天父滅亡而民以為罵恃其多力用其虎視不克靈承于旅天下之民悴悴焉墨子桀為天子生裂虎兕指畫殺人淮南子云桀之力剔觡伸鈎索鉄歙金推移大戲大戱軍旗也故云遂擒移大戯桀盖以此自號言能移大槊爾或作大犠者為牛非也晏子乃謂夏有推移大戯偽矣書帝命驗云桀失玉鏡注玉鏡謂清明之道虎視謂其暴虐以羊莘侯哆為相侯哆韓子作侯侈吕氏春秋作惟多羊莘一作干莘吕云桀染于羊莘岐踵戎外紀又作干莘云恃威陵轢諸侯者尹諧斟觀岐踵戎曺觸龍介之闚道其志乃胥為虐於民至於百為大不克開荀子云桀惑于妹喜斟觀韓侍御云斟觀也皆桀佞臣世紀云左師曺觸龍謟諛不正賢良鬰怨按說苑孔子對哀公云桀不修禹之道毁壊辟法絶裂世祀荒淫于樂沉酗于酒其臣太師觸龍者謟諛不正湯誅桀觸龍者身死四肢不同檀壃而罟韓嬰荀况乃謂觸龍事紂誤矣於是犬戎侵岐居之諸夷内侵畎遂入居邠岐之間杜佑云邠新平岐扶風申命任威以原侯夸帥孝經援神契云后偷任威折其玉斗失其金推注右偷苟且自專也玉斗者渾儀金推言國之寔伐有唐歸藏桀筮伐有唐牧占于熒惑曰不吉不利出征惟利安處彼為狸我為䑕切用作事恐傷其父復伐䝉山得妹喜焉一作妹嬉故集韻未喜音希妹只音昧以妹妹目之或音秣變也天問云桀伐䝉山妹何得焉王逸云伐䝉山國得末嬉列女傳以為有施得之師古云有施之女盖以國語說施為嬉姓國外紀從之失之矣妹喜蠱惑一笑百媚而色厲少融好姣反而男行弁服劍帶而喜繒裂桀溺狥之毎加諸已董謁云桀媚妹嬉常加于膝以金簪貫玉螭媚之師古云未喜善于色女子行丈夫心桀常置于膝上聽其言而失道湯伐之放之南巢逺味四海尸子云桀紂欲長樂以苦百姓珍怪逺味必南海之薑北海之鹽西海之菁東海之鯨禍天下厚矣列女傳云大臣諫喜謂桀曰君之威衰今不從皆以妄為亂習願賜妾死桀乃行法過喜者誅忤喜者死譽者昌諫者亡羣下杜口矣駕人車以奉之井丹云亦見世紀廣優猱戯竒偉作東哥而操北里大合桑林驕溢妄行於是羣臣相持而唱於庭靡靡之音人以龜其必亡董繁露云桀侈宫室廣苑囿竭山澤之材困野獸之足驕溢妄行云云阮藉惡藥論桀之末傳慕淫聲晨歌達于三衢聞之悲酸史記云大進倡優漫瀾之樂設竒偉戯靡靡之聲而伏書毁傳湯誓云夏人飲酒醉者負不醉者相和而歌曰盍歸乎薄薄亦大矣伊尹退而閒居深聽樂音更曰覺兮較兮云云入告于王曰大命之亡有日矣王僴然嘆啞然笑曰天之有日猶吾之有民日亡吾乃亡矣尹乃去夏適湯侈屋室崇園囿傾宫旋臺晏子春秋云夏之衰也其王桀作旋臺商之衰也其王紂作傾宫旋臺在綘之正平寰宇記絳縣璇臺瓊室在城南門夏桀造列女傳璇臺瓊臺以臨雲雨傾宫造作傾反常若欹傾璇臺登之轉危常若璇轉所謂摇臺世不知作璿瑶者非汙池土察汙察深也言洞地為池摕狐批狻不足以攄志市縱虦獸以覲人之奔駭廣池漾酒一鼓而䩭飲者三千覘其醉溺且多發帛以希妖喜之一啴新序云桀為酒池足以運舟糟丘足望七里一鼓而牛飲者三千人列女傳云絡其頭復㑹于仍史桀為有仍之會賈逵以為緡非有緡叛之克有緡又命扁伐岷山氏岷山莊王以二女御焉愛而無子乃刻之苕華而棄元妃於洛二女曰琬曰琰刻名苕華之玉詳焞煌紀年吕覧云伊尹奔夏三年反報于亳曰桀迷惑妹喜好彼琬琰不恤其衆衆志不堪皆曰上天弗恤夏命其卒湯謂尹曰若告我曠夏盡如詩湯與尹盟誓滅夏云云詩志也或云元妃即妹嬉給過善非棄義即䜛淫侈滋甚不克終日勸於帝之迪衺人因財而進賢良日蔽而逺刑賞無信位随財而行淮南子云桀之時日暗晦而不明道熖熳而不修棄五帝之恩刑蹶三王之法籍舉事戾蒼天發號逆四時春秋縮其和天地除其徳仁君處位而不安大夫隱道而不言羣臣凖意而懐當䟽骨肉而自容君臣父子之間競載驕主而豫其意植杜稿而堮裂容臺振而掩覆西老折勝黄神嘯吟狐狸首穴馬牛放失云云云三王之法繆矣更為長夜之宫男女雜處十旬不出政一昔而風沙邕之地室也博物志云川為陵山復于下方冬穿陵毆以就之酒渾而戮刑殺彌厚纒子云桀為天下酒濁而殺厨人紂熊蹯不熟而殺庖人大傳云桀殺刑彌厚而民彌暴故爾梁逺遂以是亡注云故爾窮其近也梁讀為掠滅皇圗亂厯紀書帝命騐云桀無道殺關龍逢絶滅皇圗壊亂厯紀殘賊天下賢人逃遁淫色慢易不事祖宗玉瑞不行朔不告大戴用兵車桀紂妖替天道逆亂四時禮樂不行㓜風是御厯失制攝提失方邦大無紀玉瑞不行不告朔于諸侯於是天不畀純祅孛出柱矢射宋張鎰云桀誅諫而星孛紂耽荒而致彗世紀云紂淫亂災異並見兩日鬬射攝提移處五星錯行伊洛竭彗星出鬼哭于國湯伐之書運期授云白帝之治六十四世其亡也枉矢参射又見書中侯地震天血外紀天雨血水氷迅雷黄霧古今五行紀桀末年雷震殺人其年湯放之地吐黄霧見本候夏霜而冬露命厯序外紀云六月降霜大雨水里社坼汲紀年桀末年社坼裂因之以饑饉桀益重塞好富忘貧管子桀紂不肯慼言於民大軍之後必有凶年桀之饑饉因于殘刑湯之大旱因于大軍皆人事也大戴云桀紂時諸侯力政不朝于天子六蠻八夷交代于中國于是天降之災水旱臻焉霜雪大滿甘露不降百草嫣黄五榖不升民多夭疾六畜􅀈㫮此太上之不論不議也王充治期云災至有數年嵗有水旱五榖不成非政所致桀紂無耗之災非也大夫豢龍逄引圗進曰君人以禮義為基恭信為本節財愛民故國安而身夀今冬不為杠夏不束拊而視其死内有女華之隂傾而外有曲逆之姦穢役民如不勝用財若無窮民無所附君子莫死焉惟帝念之乃立而弗及朝遂死之即關逢見潜夫論桀之大夫戰國䇿云桀聽讒而殺其良将注以為逄則兼将也論語隂嬉云桀殺龍逄後庚子旦有金版出于中庭刻曰族王禽注云桀與逄同姓故云族王言必見禽妄也逄乃髙陽後故别本作旋王逄之死當有故有辨見發揮耆艾又諫以為祅言殺之見博物志金匱云桀時有芩山之水常以十月發民鑿山穿陵通河民諫曰孟冬鑿山穿陵是泄天氣發地藏天子失子道後必有敗桀以為妖言殺之朞年一旦芩山崩為大澤水深九尺山覆于谷上反居下耋老諫而殺之六韜外紀作瞿山世紀等云桀見籙書云亡夏者桀于是大誅豪傑也自是衺人参耦忠臣折口磬龜無腹蓍䇿日施大臣同叛其信費昌乃徙族以歸商太史終古亦負其圗哭而去之淮南子終古為太史令奔商三年而桀亡論衡云時兩日並出東者熖西者沈費昌問馮夷答云東若為商西為夏乃徙族之商傳言桀紂之世變異多矣日月五星圗云桀末年兩日並鬬五星交錯枉矢流火神見關龍逄引黄圗諫不聽焚圗誅逄火神祝融也伊䞇帝之酒保也醜夏而耕于商陕伊尹也商契之後有子履者天錫勇智得禹之錄齊聖廣淵不殖貨利不邇聲色以七十里為方伯安國云為方伯故得專征法三聖用三俊克寛克仁明徳䘏祀賢于諸侯聞贄之賢三枉聘而不至馳即見之既而幡然就商說以伐夏救民於是每進之夏桀俞自賢矯誣上天簡賢附勢率遏衆力窮父兄恥功臣不任其遇女鳩女方夏賢臣也亦遂去之贄既醜夏三年復歸于亳遇諸北門蟬連歎知夏命之将墜也乃遂相商鳩方世皆以為湯臣非也不期而會曰遇豈吾國乏臣而曰遇哉盖伊尹在夏時二友云子履之沛遇搫埸四面羅者一祝解而漢隂降東京賦幕帝乙之弛罟謂此子虚賦以為成湯好田誤也爰循禮法以觀天子天子不說既得仲虺萊朱於是有不譓者從而征之葛伯仇饟初征自葛而昆吾韋顧亦斬艾其民粒食之民人戮而不得以疾死於是伐韋伐顧伐昆吾以儆於桀誅其君弔其民東征西怨載十一而征無敵于天下二十有七征而徳施於諸侯歸之者三十有六國征者天子之事湯之征得無禀命乎湯七年九征南唐劉鶚云載十一征者伐二十二國也書中候云天乙在亳夏桀迷惑諸隣國強負歸之傳云漢南諸侯聞之歸之四十國故傳子言歸者四十國桀怒以諛臣趙梁計召而囚之均臺置之重泉嫌於死履乃行賂桀遂釋之而賞之賛茅商子云封之非史云囚之夏臺即均臺重泉在馮翊見漢志子履湯也湯有膻行天下之効之者且百國矣又得慶誧湟里沮東門虚南門壖西門庇北門側七大夫佐司御門尹登恒為佑始試之弱宻須氏以為武教試得宻須氏而知所服桀矣乃率六州攸徂之民以伐桀傳云景亳之命費昌為御世紀謂湯退居中野老㓜虚國奔之皇甫謐云同日員職者五百國始用𤣥牡昭告上天神后皇天后土也用𤣥牡尚從夏誓于衆庶良車七十乗必死六千人及桀戰于鳴條敗諸娀虚安國云伐桀升而出其不意皇甫謐云桀醉不窹湯伐之發揮冇辨桀與其属五百南徙千里至於不齊不齊之民去之轉之郕遂放之南巢氏封之也詳國名記尸子以為放之厯山故世紀云禽之焦門放之厯山乃與妹嬉及嬖妾同舟浮海奔南巢之山則非也晉志亦云敗于焦焦乃娀地淮南子云革車三百乗困之鳴條禽之焦門吕氏云戈子戰于郕遂禽移大犧登自鳴條乃入巢門逐有夏是矣尸子云革車三百乗伐之南巢收之夏宫益踈吕春秋云商涸旱猶發師以申尹之盟故合師從東方出國西以進未接刃而桀走逐之至大沙大荒西經云成湯伐夏桀于章山克之注云章山名大沙或云沙丘墨子云湯放桀于大沙戮尹諧滅斟觀昆吾氏皆桀同惡吕覧周書戊子戰桀于郕按傳桀與昆吾同以乙夘日亡昭公十八年二月乙夘毛得殺毛伯萇𢎞曰是昆吾稔之日也則非戊子湯乃復亳㑹羣后退從諸臣之位曰天子之位惟有道者處之三千諸侯無敢即乃簡代夏復禹功修舜緒為副于天周書殷祝解大傳皆言三千諸侯大㑹有湯遜辨見發揮反夏政國遷郼于旂反商之國號吕春秋云湯王為天子夏人大悦如得慈親朝不易位農不去畮商不變肆親郼如夏是謂至公髙誘讀如衣云今兖州人謂有殷猶曰有衣故鄭于中庸一戎衣為此讀康誥有殪戎殷之文為是不知康誥乃文王事與武成一戎衣異陸氏從之踈矣湯之國號本不為于斤切将遷其社不可遷如遷都盖勝夏已欲移其社于商地然禮王者當自立社不可以亡國之社稷立于商臣扈盖賛其不可者當移于桀之子孫國耳夫不可者湯不可之也世以謂欲變置社稷且以為湯始欲遷衆議以為不可非也不可而欲舉是妄舉矣如欲變置是易社非遷社也乃取璽書置座右見周書古有璽說者以秦制乗輿六璽以為秦始者非老子云為之符璽荘子云焚符破璽後至三王俗化雕文詐偽漸興始有印璽春秋運斗樞云黄帝得龍圗中有璽章文曰天黄符璽是古有發明徳作八政命于縂章大戴禮遂賢良築五庫藏五兵與民休息商君書爰封少康之後於把以郊禹後分于曺東之偻是為東樓生西樓公鄞生云湯放桀封其後于把故大戴禮云湯放移桀乃遷姒姓于杞偻盖其析也或云湯封之樓非周興求後得東樓公後之把為二後九世成公遷縁陵又十一世簡公而滅于楚楚惠滅之故傳云把夏餘也而即東夷或以州公為把後則非弟佗奔魯受爵為侯有封于陽其後去魯之沛分沛立譙為夏侯氏侯氏把氏題氏偻氏樓氏娄氏劉氏丐氏雝丘氏郁釐氏孫氏杷氏夏侯嬰曽孫頗尚主随外家姓孫而嬰子孫遂為孫漢髙帝云娄者劉也賜娄敬為劉姓纂杞若避重卓難改為杷或作抱疑桀立四十有三嵗而放三年死于亭山年代厯諸書五十二或五十三或云十二非夏氏凡四百八十有三嵗十七世汲記年并窮寒四百七十二年三統厯云十七主通羿浞四百三十二年世多從之非也六韜大明云禹之徳流三十一世至桀為無道湯得伊尹一舉而放之誤矣嗟乎湯放桀所以定禹功也然而猶有慙徳而後世猶曰于湯有光是以君子不為也殷祝解言桀請致國而奔于千里奔魯百姓去之湯不前止乃放之無戰之文桀始走保三鬷故伐之也别有湯武二誓說始夏之興青凋止郊雨金櫟陽而祝融降于崇山崇國之山非驩兠放處及是囬禄信於聆隧容臺覆岱淵振􅕆亡瞿瀦而湯之里社鳴焉亦天命之反郼也里社鳴聖人出湯社鳴見春秋潜潭巴淮南注容臺禮容之臺桀不行禮振動而覆外紀堯山崩庚山亡五行記云夏末年瞿山地一夕為大澤深九丈九年湯放之禹初姒姓其後分封以國為氏有泊氏弗氏􅞣氏鬻氏冥氏鄍氏褒氏沈氏男氏有南氏肜氏肜城氏姒氏弋氏綸氏弋即姒定姒把姓公羊作定弋休去莒姓誤矣或作戈失之泊見潜夫論或云鮑非也春秋公子譜鄍出姒氏卲姓解一作鄍誤弗見世本姓苑作費然少昊後自有費故金石錄云費少昊後陳湘姓林云音蜚夏禹後自不同如無極長房出此孫盛蜀譜云益州諸費名位者多字本作桀􅞣弗同漢有􅞣脩公孫瓉臣綸直有南以二臣勢均争權而分後有南仲翊宣王以中興辨証云湯八世孫盤庚妃姜氏夣赤龍入懐孕十二月生子手把南字長荆州號南赤龍生條孫仲為紂将平獫狁宫括為文王臣封南陽侯生邵成王司馬封白水侯生宫宣王時南陽侯生伯荘王上大夫南季聘魯宜公之子云褒君事夏至幽王嬖褒后遂亡周而褒亦亡矣肜伯事商而沈子亦滅於蔡矣定四年姒敬叔仕于齊采於鮑為鮑氏包氏或云鮑齊族非也成王封夏公又為夏氏夏后氏差氏禹氏王孫孺百家譜蘭陵蕭道㳺娶禹氏女而南唐将有禹萬成風俗通云攴庶以為氏史記又有斟氏戈氏有扈氏非也乃髙陽後桀崩其子淳維妻其衆妾遁于北野随􅀢轉徙號葷育逮周日盛曰獫狁玁狁匈奴樂産引括地圗云桀放三年死子獯鬻妻桀之衆妾居北野謂之匈奴盖别號獯鬻故服䖍謂堯時為獯鬻又史黄帝北逐獯鬻非自後世也晉史云淳維禹後又云軒後畏其干紀則又不能别矣秦有匃奴單于頭曼者復入于冐頓蔚為彊暴破東胡走月支南并樓煩白羊河南燕趙始長城却胡李牧破滅䄡襤秦亦被䝉恬城逐塞外既侵燕代窘戹漢祖於是屈婁敬之䇿和親單于由是稽胡子孫感漢為劉氏望河間河南扶羅助漢死子豹生淵居離石遂號漢二世而聦滅晉曜改曰趙石勒夷之四主二十五年勃勃興朔方為赫連氏右賢王去卑之後中平中羌渠扶羅将兵助平黄中扶羅子豹為左賢王生淵為前趙右賢王去卑裔庫仁三世號大夏後魏滅之有鐵伐氏雲氏其始姓虚連題是為攣鞮氏范史虚連鞮厥後異姓有呼衍氏蘭氏須卜氏丘林氏雕氏凋氏漢表匃奴王雕氏凋見載記盧氏赫連将呼盧古師古云呼衍即今鮮卑姓呼延者與蘭須卜三六姓宜皆出此宕昌白狼之羗亦其散也有宕氏庫氏黨氏渾氏房當氏夏亦二十五年夏錄勃勃詔云朕皇祖大禹受𤣥圭之錫號夏朕祖北遷幽朔姒氏音殊中國故從母為劉氏從母非禮朕以義易之王者係天為子是為煇赫寔與天連今改氏赫連非正統者以鐵伐為氏故號大夏亦聦之族也晉書以聦為冐頓後勃勃左賢後而黨出西羗故姚泰将黨耐康曰祖本夏后氏後為羗豪隋書以黨項白狼宕昌為三苗後失之黨集韻作黨鐵氏本曰鐵伐勃勃云庶攴族子孫剛鋭如鐵皆堪伐人是也古人有言天下之勢猶一堂也夫為堂者必得乎基址柱石然後堂可立為國者必得乎賢人君子然後國可存也基址堅柱石固是故居之安而罔飄摇之患賢人至君子用是故處之泰而無杌隉之憂賢人君子其國之基址柱石也歟桀紂之亂乆矣其可以亡矣然而兩賢猶在三仁未去則猶未至于遽亡及其一旦釋而去之基址傾矣柱石僵矣堂其能以獨存乎是故商書終於微子之命而夏書終於女鳩女方言賢人君子之去就社稷存亡之所繫也昔者子言衛靈公之無道也康子曰夫如是何為而不喪子曰仲叔圉治賔客王孫賈治軍旅祝鮀治宗廟夫如是奚其喪紂之去武丁未逺也其故家遺俗流風善政猶有存者又有微子微仲王子比干箕子膠鬲相與輔相之故乆而後失之然則國無道而幸存焉者亦必有人焉而為之也桀之乆其位惟可知矣君天下者何至掘基址而仆柱石哉黄河之水天下之最大者也禹則於兖州之域䟽大河之水為九河以分其勢又䟽通濟水漯水并九河皆注之海九河濟漯皆取北方水也又㳄南決海水漢水排淮水泗水而注之江天下大水則有此四水而數者皆𨗳其流而注之江海之中然後大地皆平中國之民可得而粒食也按爾雅九河一曰徒駭二曰太史三曰馬頰四曰覆釡五曰胡蘇六曰簡潔七曰鈎盤八曰鬲津其一則河之經流也先儒不知河之經流遂分簡潔為二此與集註小異吳氏曰曰簡曰潔集註與爾雅簡潔合為一而其一則河之經流殊不可曉然以水道考之九河率在河澗路滄洲境内今存有五六處何得盡湮入海南皮縣有潔河未聞與簡河合一集註未為非也帝太康雅徳曰太康失邦五觀胥怨其兄之不道而弟怨之仁人固如是乎曰仁人固如是也小弁人子之為詩也是人子之怨其親者也親天也天可怨乎怨者親愛之情也伊人子之於親惟欲用其情耳於其親不得用其情能無怨乎雖然君子之為怨亦有道矣思而怨怨而不訐是故虞帝怨申生亦怨豈若匹夫匹婦自經於溝瀆而人莫知之歟方幽王之惽也將放其太子宜臼而殺之夫為人子而将見殺此人情之至痛而無告者也茍於是而不怨則是䧟父不義而致己于不終矣此小弁之所以不得而不怨小弁之怨親其親也親親仁也兄弟之親情同手足安則同安辱則偕辱邦分崩族離析於此猶得而相忘乎然則五觀之怨亦涕泣乎關弓者也孔子曰詩可以怨此於詩所以取小弁於書所以取五子之歌禦務急難誰如兄弟至于失國而不怨則亦路人而已矣小弁說在發揮嗚呼予於五歌見五子之賢而可哀也古之為會也智者慮義者行仁者守三者備然後出㑹者所以講信而修睦也猶必仁者以為守而後出洛表逺矣十旬乆矣雖無后羿蕭牆之變起矣鄉使太康棄國不務五弟之中有一人焉為之守吾知夷羿之不作夷羿雖作亦可以不亡矣曷至五弟皆從傾國畢出以至於覆沒而莫之救邪柳莊曰如皆從孰守社稷太康之萌倀于是甚矣五子安得而不怨哉帝少康天下之亂未有如夏氏之乆者也羿浞之簒盖歴四世幾于千百年其根株可謂固矣少康之初以夏遺孽布徳兆謀旋收其民而用之盖五十有餘載然後始克復祀是豈商周漢唐中興者比哉皇父謐以為少康之興有田一成有衆一旅而漢再命不階成旅平暴反正續漢書謂復夏尚有虞思伯靡内外之助光武起自匹庶靡有憑藉以數千屠百萬克復炎漢無以加之是則俱以過少康矣豈亦未之思邪大抵因時特起者易為功而誅鉏積難者難為力故論成敗而不徼其時勢之難易而惟其一日之功言之未見其可也羿浞澆豷皆積年在内盤錯強梗之姦而王朗王尋者乃一時在外崛起不根之盗其難易固不可同年語也世之人有所席則有所懐無所顧則無所頼是故懐寳越都者競競一踣惟恐失之而為計俞拙罄身摩壘者滔滔獨徃無所顧惜則其從也輕唐神堯能以一旅取天下而其子孫不能以天下取河北光武之興亦可謂因時而特起矣一成一旅惡得以是殿成功哉以數千屠百萬是直一時之幸又可論之常勝之家邪於乎喪亂百年民心亦離夏矣浞豷之強梗以南征北伐之威討之猶懼或殆以光武而誅鉏希不傷其手矣竊尚論之后少康之志與夫辛苦艱難越句踐可畧似之光武不足嫓也雖然禍亂之小大抑又懸矣彼髙貴公之以髙帝為論劉知幾之以劉蜀為比擬人其倫于是為爽帝杼甚矣人有肖其祖也夏禹長頸鳥喙少康亦長頸鳥喙越王句踐亦長頸鳥喙非惟貎之肖也自夫椒之辱棲身㑹稽以致姑蘇之霸其辛苦艱難又何與少康無異歟兩越之分備國名記或曰越徐吳楚皆先王之族也春秋何貶焉曰非貶也王非所以為稱也春秋書侯伯俱從其寔獨此四國則人之子之言春秋者不知四國皆然乃以謂吴楚夷也哉聖人貶而稱子此大妄也夫聖人一視同仁夷亦人也何貶而况吴楚亦皆先王之後耶盖春秋之作所以尊王土無二王而此四國嘗稱王矣筆削之際于辭弗順故變之而曰子示不可重書一王非有貶也禮婦人明旌祠版有封書寔封無封書夫人亦是意也或曰滕侯來朝以其臣楚把侯來朝以用夷禮故悉書子斯亦繆矣二國當時固自有説非示貶奚以信曰不志葬凡葬必以寔所以正其終也齊小白晉重耳必於其葬而後書齊桓公晉文公若書越徐吳楚之君將何以為辭此不得而不子之非貶也春秋蠻夷雖大曰子昭二十六年楚子居卒定十四年吴子光卒是矣左氏曰其葬僣奚獨四國之葬僣哉故君子名之必可言也聖人豈徒較其區區毫末之僣哉春秋雖邾把小國且書卒葬獨四國不書知難乎其稱也名不正則言不順若書越王卒葬正則是與先王無異矣故必子之帝厪於乎夏自少康而後周自宣王而後皆累世循常政事無大過人可傳於後世者何邪豈非先王之後紀綱大定法度素著茍非孱虐惽悖則雖以庸常之君守不變皆足以保其宗社而太平之後富庻之世雖以中材之主血氣未定作聪明事改作厭鈍騁駿以乗快於一驟而乃蹶而遂不起與由是觀之任智者固不若愚而騁駿者未必如跛也蜚亷終日馳不能不蹶惡來終日搏不能不􅀈而危然深坐以觀焉者常自若也子思子曰喜怒哀樂之未發謂之中發而皆中節謂之和夫致中和而不於其未發之前求之則其所見無非喜怒之與哀樂其去中也逺矣而况以淫于㳺于畋于觀于逸以害其心哉極欲易衰省欲難老此天之常道也是以古之聖人不殖貨利不邇聲色土階茅茨惡衣菲食而不狥乎其外紛華盛麗以堯禹湯文之君為之應未害也而數君子必不為者知其蔽物累徳而無益於己也好大喜功澤車美室作章華建極殿晝夜照作架瓊而結綺與夫爵䝉犬馬刑及矜孤殺夫而奪婦者皆以速亡而亟斃則庸常之君守而不變有足多矣嗟乎耳目之官不思則蔽於物物交物則引之而已是故君子於此不可不致於學萬乗之主不致于學不知性命之重道徳之尊而為耳目情欲之所牽役以兵刑貨利膳服聲色賊其身害其政而致于滅亡夭死者可勝痛哉然則人臣之欲以生事動其君與人君之欲大有為者可不為之却顧而深思耶帝甲漢儒之言左氏以五靈妃五方行而為之說龍為木鳯為火麟為土白虎為金神龜為水水生木水生則木王木生火木生則火王土與金水亦復如是皆修其母以致其子是故水官修而龍至木官修而鳯至火官修而麟至土官修而白虎至金官修而神龜至於是又為說曰視明禮脩則麟出言從義服則龜㳺貌恭仁成則鳯來思睿信立則虎擾聽聰智得則龍見皆言修母以致子其為祥瑞之說也盖如此可謂屑矣雖然天地之間不離乎五拓而言之則是理也故東方多龍南方多鳯西方多虎而麟㳺乎中土北方一六虚危無位是故神龜藏六而神顓頊王者之行左青龍右白虎前朱雀後𤣥武而招摇大角乃在其上斯亦以其粗爾至於其微則有能言者矣後世國不脩其官官不辦其事而小大之政闕故傳曰水官棄矣而龍不得生王者之行亦以南面言盖前旟後旐左旂右旗而招摇斗柄大角軒轅麒麟之宿太常居中建四方也路史卷二十三

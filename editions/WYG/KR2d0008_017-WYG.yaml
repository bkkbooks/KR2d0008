body:
  text: 路史卷十七宋羅泌撰後紀八疏仡紀髙陽帝顓頊髙陽氏姬姓古史攷以為妘姓纂則謂顓帝帝風姓故唐表韋氏彭氏皆妘出風姓顓帝之後俱妄名曰顓頊顓頊厚養也河圖云瑶光貫日正白女嫗感于幽房之宫生黒帝名顓頊均云日月失行瑶光星精貫月集韻云頊頭煩音玉黄帝氏之曽孫祖曰昌意黄帝之震適也行劣不似遜于若水遜謂降封之史記𤣥囂降居江水昌意降居若水若即江之下流皆在蜀水經云水出旄牛徼外東南至故闗為若水即昌意之封又南過越嶲卭都至朱提西瀘江水則𤣥囂封處又九州要記云嶲之臺登有雙諾川鸚鵡山黒水之間若水出其下即黄帝子昌意降居于此杜預以為昌意所封在鄀鄀乃襄州樂鄉矣取蜀山氏曰景􅀈一作景樸即史云昌樸大戴禮為昌濮捜神記世紀作景僕云即女樞又以為昌意正妃妄生帝乾荒即韓流蓋乾荒之誤為乾流曰帝者如漢山陽公之日獻帝唐孝敬奉天承天三皇帝追稱云山海經丹朱商均皆曰帝亦若是也劉知幾所以唱謂朱均皆常為帝而舜禹為奪不學之過擢首而謹耳豭喙而渠股擢首長咽謹耳小耳或作擢耳謹首非海内朝鮮紀云謹耳豕喙鱗身渠股郭云謹耳未詳渠車輞傳言若大車之渠非也渠鉅也謹小也相書耳門不容麥夀過百是襲若水文選若水顓帝所生吕春秋云顓玉生自若水實處空桑乃登為帝世紀作弱水非取蜀山氏曰樞是為河女所謂淖子也淖子感瑶光于幽防而生顓頊潛夫論云幽防宫也世紀等云星貫月如虹含神霧云揺光蜺貫日正白感女樞注星光如虹蜺徃貫月也渠頭併幹通眉帶午元命苞云顓玉帶午是謂清明干謂成干字易乾鑿度云泰表戴干鄭氏云泰者人形體之彰識也干盾也王劭言隨文有龍顔戴干之表指示羣臣是也宋忠注為干盾故世紀云髙陽首帶干戈誤矣本文作帶午言如午字葉法善額有二午者或又作帶牛非淵而有謀疎以知逺年十五而佐小昊封于髙陽涿郡有漢髙陽縣以在髙水之陽名本𨽻河間今之順安軍然浚儀亦有髙陽故城開封圖經云髙陽氏佐少昊有功封于此九域寰宇從之非也蓋後都之冐髙陽之名于此爾故郡國志云汴之髙陽城髙陽氏之虚也車頻秦書云新平民畊獲玉器初有金彫者頗知圖記王猛勸誅之彫臨刑表言新平古顓帝之虚其故有白鷄閭記言此里應獲古帝王寳至是果信都始孤棘二十爰立乃徙商丘以故栁城衞僕俱為顓頊之虚古帝王于中國邉地每有二都孤棘今營州栁城東南百七十棘城是寰宇記云顓帝之虚通典云號曰顓帝之虚故慕容廆以大棘城帝顓頊之都移都之教農桑制同中國商丘濮陽也以帝居之因曰帝丘乃衛之都故今澶之臨河東北三有顓頊城史記顓頊都帝丘其地北至幽陵惑也世紀云自窮桑徙商丘大行東北及兖廣桑之野豕韋之次水經晉志因之非逃迹髙陽故遂以髙陽氏黒精之君也月令注以名為號故後世或姓焉神仙傳有太𤣥女顓頊和紹小昊金天之政乘辰而王以水窮厯故外書皆稱𤣥帝道書言𤣥帝者皆髙陽氏莊疏云十二冠十五佐少昊二十即位亦曰𤣥帝祭䬽牲用騂薦玉以赤繒載時以象天養材以任地依􅀈神而制義治氣性以立教自是不克逺紀始為民師而命以民事釐改服度符采尚赤乃立九寺九卿少昊顓帝官號蓋因黄帝而益詳故賈公彦云髙陽以前畧言于上成王言唐虞稽古建官惟百則上下百官之間重該修熈少昊氏之四叔也叔出季處之叔傳以為少昊裔子妄實能金木及水乃俾重為句芒該為蓐收惠王十七年虢谷夢在廟有神人面白毛虎爪執鉞立于西河云云覺召史囂古之蓐收也天之刑神修及熈為𤣥𡨕姓氏英賢錄云𤣥𡨕為水正熈氏佐之禮傳云五官古帝王子孫有功之人左正義言五官在髙陽之世居官有功以功見祀不是一時之人修熈代為水正非一時者不然蓋不知北方虚危無位權衡龜虵皆是二物與賢皆有左右之義有說别見𤣥𡨕為司寒乃修之職如言犂曰祝融孫犂顯曜乃命祝融而炎帝氏有子句龍俾為后土是謂五官春秋傳云句芒春官為木正蓐收秋官為金正祝融夏官為火正𤣥㝠冬官為水正句龍后土中央為土正恪共厥業遂濟窮桑帝立于窮桑蓋亦有窮桑之號故服傳云窮桑顓頊所居柱氏以窮桑為少昊之號而先儒遂以五官為少昊所命非也顓頊以來不能紀逺始為民師木正火正非鳥師之號上世人神異業是以禍災不至而求用不匱小昊氏衰𤣥都氏黎實亂天德賢鬼而廢人惟龜䇿之從謀臣不用喆士在外家為巫史亡有要質方不類聚物不羣分民匱于祀神䙝民狎嘉生不降龜䇿鬼神不足以舉勝左右背鄉不足以專戰乃命重犂典司祝融重獻上天以屬神犂抑下地以屬民以絶上下之通以規三辰之行隋天文志髙陽氏命北正犂司地按楚語云九犂亂徳民神雜探不可方物顓頊受之命南正重司天以屬神火正黎司地以屬民髙陽之世使復舊物毋相浸瀆民用安生重為南正犂為火正火正司馬故齊職儀云顓帝以司馬主火應劭曰犂隂官也火數二故火正司地以屬民鄭答趙商與昭皆以為三皇至道故舉南比正夏冬而春秋自正五帝中道故又命羲和于春秋夏詳人事乃合而一之漢髙可章商之奏以趙堯舉春李舜舉夏倪湯舉秋貢禹舉冬各職一官以舉時政宣帝時魏相請以明經通隂陽者四人各主時至明言所職此後惟有司厯之官而已月令開明堂布十二月之政當作北犂妄也于是窮四履稱險易申畫郊畿以殿任賦立勤人以職孤為正長以惠窮置宰喪以恤亡設射志以習雅守獵耘耔以習移出内簡乃䃣名岡倮大澤制十等之幣以通有亡曰權衡見管子髙陽貨一種作􅀢勹亏一幕文作仝髙陽貨一金也纂古髙字正同董譜髙陽金别種五等或出長平異布封演曰面有科斗書是也宿疇以成泉幣亡滯工賈時市臣僕州里俾毋交為是以主虞而安民璞而親官亡邪吏市亡型民事分職正而人反其故然猶悛慫自持焦心蛾伏以從事于賢謂功莫美于厺惡而之善辠莫大于沓惡而不變非惟善善善因善也非惟惡惡惡緣惡也乃旉令曰毋慢制毋虐民貴臣驕而弗譓男女不相辟于道者拂之四達之衢文龍負圖于是書科斗百辟作戒盈之器室而著復禮之銘詩以為德䵞之術後周書武帝詔云甲子乙夘禮云不樂昔周王受命請聞顓帝之廟有戒盈之器室與復禮之銘者也師于大欵赤民柏夷父柏亮父淥圖之流以濬其明而畀其聖淥從水見何氏姓苑傳多作綠國新序晉紀又作錄圖皆非謂至道不可過至義不可易而後治者復迹也故上緣黄帝之道而行之修黄帝之道而賞之弗或損益而致治平見鬻子及賈氏新書祭法黄帝正名百物以明民共財顓頊能修之乃注新厯十三月以為元歲紀甲寅上日乙已日月值艮維之初而五星㑹于天厯天厯營室也秦用顓帝厯元用乙夘竊按厯法黄帝顓帝夏商周魯凡六家皆有元顓帝厯術云天元正月乙已朔旦立春俱以日月起于天屆營室五度與月令合然秦厯以十月為歲首故說者謂顓帝厯首十月非也蓋秦遇閏則一切置之九月為後九月則是首十月亦非以十月為正也按二世二年閏在酉漢二年閏在已五年在寅而皆書後九月非法也傳又云顓帝厯正月用寅朔亦非冰始離蟄始動時雞三號而立春至天曰作時地曰作昌人曰作樂是以萬物應和而百事理是為厯宗傳言顓帝厯正月朔旦七曜直艮維之初漢太初厯冬至七曜㑹于牽牛按金水二星常附日而行故史記漢書及荀悅紀皆記髙帝元年十月五星聚東井而魏髙允以為史之失按五星乃以前三月聚東井非漢元年十月乃正出未序惟天之合正風乃行律家皆謂顓帝始作渾儀故後世尊用之不能改益部傳巴郡洛下閎改顓玉歴為太初云後八百年差一日隨顔慜楚上言亦云乂詳隂胄𤣥傳按厯帝紀顓頊造渾儀黄帝為蓋天以古未有歲差之法如顓帝厯冬至日宿牛初今宿斗六度古正月建丑又歲與歲合今亦差一辰且如堯典日短星昴今則日短東璧矣其疎如此顓帝之渾儀其法則實蓋爾故劉氏厯正問云顓帝造渾儀黄帝為蓋天皆以天象于蓋非今之所謂渾也有排渾别見熈熈鏘鏘帝好之爰命鱣先為倡洎蜚龍稱八音㑹八風之音以為圭水之曲以召氣而生物方時金石絲竹匏土革木之音備也后世有作以八方之物全五聲者制為八音以召氣以生物鱣先蜚龍蓋人名倡首也太晟云鱣鼓其腹吕氏之說怪浮金効珍于是鑄為之鐘太晟書云其金聲震百里作五基六䪫之樂以調隂陽享上帝命曰承雲漢書作六莖五英樂緯動聲儀作六英五莖于諸書獨不同非也按宣和古器有䪫鐘其銘凡六其字作䪫銘云宋公成之䪫鐘所鑄所謂六䪫也國家肇建鼎樂之際于應天得之制作雄偉雙龍盤鋸篆其帶曰黄鐘夫宋乃微子始封之地六莖乃髙陽氏之樂宋三王之後故得用之以祀則六鐘為商制而髙陽之遺法也故晉志曰敫不綱英莖之制已微元結亦誤矣劉恕以為帝系譜漢志世紀放六樂撰其名鄙哉上緣黄帝因事而憲功文德錫之鐘磬武德錫之干戈而人知鄉方矣見淮南子惠浸萌生信沾翔泳于是設簫鬱陳祼鬯仗萬靈以信順監衆神以道物馭百氣詔雷電采羽山葛嶧之銅鑄鼎以臧天下之神主諸著洞臺之山隂宫之丘悉寘之移安徳之石填焉詳陶𢎞景真告設玉兆太卜三兆玉兆瓦兆原兆顓帝玉兆象其玉帝堯瓦兆象其瓦疏云卜筮先王所作伏羲時已有未有玉瓦原之名爾至顓帝以來始有􅂒晝景乃乘結元之輦巡四海以寜民北爌幽陵南捬交止西際神沙東跂蟠水四行天下周旋八外動靜之物小大之神日芒所誋靡不砥屬集威成紀以理隂陽處乎𤣥宫摶心揖志不貪廣逺故地大而不淫在位七十有六崩韓愈云年七十九世紀云九十八二十一而立或云三十六立皆非按新序云齊閭丘卬遮宣王曰昔帝顓頊十二而治天下故禮傳謂顓帝十二而冠蓋因立而始加元服也葬東郡頓丘廣陽里務顒之陽俗謂之商王陵妄也郡國志云顓頊葬俗名青冢山皇覽冢墓記云在濮陽縣頓丘城門外廣陽里中崔鴻前趙錄云和苞諫劉曜曰堯葬榖林市不改肆顓帝葬廣陽下不及泉十道志云鮒鰅即廣陽山之别名也寰宇記在頓丘西北三十通其記帝陵在相州臨河乾徳四年置先代帝王守陵戸髙陽在臨河寰宇記臨河東九里顓頊廟而九域志順安髙陽縣有顓頊陵縣故𨽻瀛而臨河濮陽地相出入也然顔真卿吳地記烏程有顓頊陵則非矣務顒九域志與作鮒鰅同下不及洤四它衞之上郡石穿貳負乃見漢陽索出攴祈始聞女媧神變宜亦見而可知四虵衛之何足深怪昔漢丁姬與臨江王之葬皆有鷰數千銜王投壙中亦此類也象能耕烏能耘却未必為虞帝陸龜䝉辨之非其隂九嬪在焉其范林方三百里經云爰有熊羆文虎離朱鴟又視肉璿塊其立也歲居豕韋其崩也歲在鷻火故傳以塦為顓頊之族非也學者不曉此義故信而不疑夫塦土族而顓帝水也此學者之誤也取鄒屠氏勝濆氏初帝僇蚩尤遷其民善者于鄒屠惡者于有北鄒屠氏有女履龜不踐帝内之是生禹祖及夢八人蒼舒伯益檮演大臨龎江霆堅中容叔達是為八凱寳櫝記云一曰八神一曰八力一曰八英言神力英明也又記云夢日則生子八夢日而生八子故曰夢帝崩而元子立襲髙陽氏是為孺帝尋崩而帝嚳立山海經所謂孺帝顓頊是也伯益之字隤凱次居子族之三益廟碑云字隤凱帝髙陽第三子亦見水經注為唐澤虞是為百蟲將軍蟲今鞏洛嵩山有百蟲將軍廟是也自漢有之水經云晉元康五年七月順人吳義復立佐禹治水封之于梁舜嬗禹禹巽于益辭焉故韓孟稱益之避啟而張夀王謂伯益為天子代禹差矣漢志謂之伊益世本作化益或宜伯字年過二百南梁大敖梁之析也有梁氏敖氏伯氏見風俗通伯益治水封于梁亦見尚書春秋左傳故劉昭志云董氏與梁同祖光和元年有白衣入陽徳殿門稱梁伯夏亦見風俗通云顓頊大敖之後是也霆堅封安安既復分蓼後俱滅于楚猶以國氏安蓼皆姬姓故地理志云安姬姓國而世本蓼亦姬姓則皆庭堅後也杜預以庭堅為臯陶之字妄也魯文公五年秋楚仲歸滅六冬公子燮滅蓼臧文仲曰臯陶庭堅不祀夫臯陶乃少昊後四世而庭堅則髙陽之子六乃臯陶之後而蓼則庭堅之後也預既誤以庭堅為臯陶字乃復以蓼為臯陶後偃姓失之矣予嘗攷之臯陶之後有舒蓼而非蓼也舒蓼偃姓而蓼則姬姓也蓼㓕而舒蓼猶存至宣公八年始滅其地乃壽之霍丘而蓼乃安豐其地相邇也舒蓼與蓼既自二國而舒又自一國乃黄帝之後任姓見潛夫論預不知别有舒與蓼而分臯陶後舒蓼為二國謂皆偃姓正義以為文五年蓼滅復封而楚復滅之俱繆按舒僖公三年已滅矣勝奔氏曰娽奔即勝濆也埤蒼云娽顓帝之妻名世本人表皆作女祿大戴禮勝奔氏之子謂之女祿生老童生伯偁卷章季禺三人偁字伯服與卷章綿産昭二十五年疏引楚世家及世本顓頊生偁偁生卷章季禺是生叔歜大荒西經叔歜顓頊之孫卷章取梎水氏曰嬌即所謂嬌禍者一作橋極皆非也勝濆一作滕湟一作勝其梎水見世本一作即水皆字畫之轉失卷章史及大荒經作老章經云顓頊生老童非也生犂及囘犂為祝融淳曜敦芒天明地德臨照四海是食火土生長琴及噎噎處西極以行日月太子長琴居于揺山實始樂風犂卒帝嚳以囘代之楚語及史記云共工作亂帝嚳命祝融誅之不盡乃以庚寅日誅之而以弟囘為犂復居火正祝融非也囘食于吳是曰吳囘生陸終唐韻云陸終古天子妄也楚及司馬氏皆云陸終吳囘之後也司馬遷乃以為皆重犂之後失之重犂乃自二人有辨見發揮中取鬼方氏曰嬇世本帝系云鬼方國君之妹女嬇音蒯人表作女嬇故集韻音潰大戴作女隤一作女􅀈繆陸終彭祖之父也仙傳云彭祖遺腹而生三歲失母妄也黄囊經云彭祖父墓坤山下作癸向放坎入乾坎峯髙揖五行相生􅤟三年生子六人曰樊曰惠連曰籛曰求言曰晏安曰季連以六月六日圻左而三人生剖右而三人出㝈生圻㽬世有是事有說在餘論樊為已姓封昆吾昆吾為夏伯主其後裔自臧而無譐與桀同滅故孔子曰堯之有天下允恭以持之虚静以待下是以百載而愈成汔今而益章昆吾自臧滿意窮髙而不衰是以當時而虧久而愈惡損益之道也以乙夘日亡鄭語云昆吾為商伯非世本云昆吾者衞是後有昆氏吾氏昆吾氏氏書又有吳氏戰國策楚將吾得注當為五非顧温蘇扈廖董諸斟祝産皆已分也祝産見國語扈則啟滅之矣後有戸氏扈氏有扈氏前秦錄以蒲氏符氏皆出于扈妄也顧温則商滅之温則狄滅之後有顧氏雇氏温氏宋氏詩云韋顧既伐昆吾夏桀皆先衞桀滅者僖十一年温滅温子奔蘇伯吉利是世祝融逮妻摶頰死託于竈竈者老婦之祭許氏五經異義云吉利婦姓王名摶頰而世立祝庸為老婦者妄紂王欲伐有蘇蘇以妲進免紂寵之而亡周滅之有蘇氏司㓂氏平王時有蘇成公好箎其攴子封郗又為郗氏姓纂以為忿生支子已姓青陽之後妄也廖有叔安異封于董董甫以豢龍事虞封于鬷川别為鬷夷更為關龍音豢龍同關龍逢作平聲非廖董關龍則夏滅之鬷則商滅之後有廖氏飀氏飂氏飂叔氏董氏董甫氏廣負侯叟氏風俗通青史氏鬷氏鬷夷氏融夷氏豢氏關韻氏李氏關之轉又為關氏唐李忠臣本董氏從朱泚誅秦青史氏出英賢錄關上音豢下如字斟姓灌􅴙則夏滅之戈介則商滅之後有斟氏戈氏斟戈氏􅴙氏尋氏􅀈氏斟尋氏鄩氏斟灌氏灌氏介氏周大夫有鄩盻又有􅀈氏出姓纂要諸斟之姓世皆有之而史伯謂斟無後蓋在周無封土也史記遂以斟戈尋為禹後賈逵以諸斟為曹姓後皆因史伯之言而誤之也惠連妘姓其封參胡參胡者韓是周之鄅子其後也後有鄅氏參氏並見世本鄅子妘姓外傳謂參胡無後亦非故漢志以鄅子為堯後失之籛之字鏗封于彭是為大彭彭祖以斟雉養性事放勛其彭祖事備黄山君彭祖經中仙傳以為姓籛名鏗此出世本籛乃古翦字故虞翻云名翦國都記豕韋氏彭姓國祝融後陸終第三子曰翦封于彭今為祖姦切者非唐韻音牋夏之中興别封其孫元哲于韋是為豕韋迭為夏伯夏遷于商老彭守官大夫商王拼采女受術籛始去之終身不見寰宇彭門記殷之賢臣顓帝之𤣥孫至殷末壽七百六十七莊子云彭祖得之上及有虞下及五伯如此而已彭祖傳云商王時傳之三百歲已謬矣仙傳乃云喪四十九妻五十四子或云壽七百或云四百皆妄世本鏗在商為守藏史周為柱下史子云老彭蓋又誤為老子也潛夫論又謂顓帝師于老彭尤乖秃諸暨稽舟人皆彭分也髙辛師舟人即此晉有舟之僑暨諸稽則商滅之秃姓舟人則周滅之韋則夏甲遷之矣左傳言孔甲以劉纍更豕韋後矣而鄭語乃云大彭豕韋為商伯又云彭祖豕韋則商滅之則三國至商方盛豈劉纍遷魯之後而二國更復乎然襄二十四年范宣子言其祖又云在商為豕韋氏豈復封乎不然何兩立也後有籛氏錢氏禿氏舟氏韋氏豕韋氏伯氏霸氏覽氏壽氏名氏諸氏諸稽氏稽氏暨氏既氏周氏上元中賜暨佐時為周氏暨音吉又如字錢鏐當乾寜以十三州王吳越者百年而俶朝于我姓纂有彭祖孫子為周錢府大夫周氏六一文云錢氏三代以來無顯者初以士為周官久而以為氏來言䢵姓封于儈是為㑹人介于河伊貪嗇滅爵上下不臨重氏伐而亡之有儈氏鄶氏㑹氏即鄶也鄭語云號仲恃勢鄶仲恃險鄭武公滅之徐廣云在河南宻縣杜佑云在新宻史以為鄭非傿路云鄔偪夷皆䢵分也傿侯納仲任貪冒愛吝蔑賢簡耐而滅于鄭有傿氏鄢氏􅋣氏焉氏陸徳明以鄢為平上去三聲非是詳見國名記云近楚若敖父子娶焉後滅之有云氏員氏雲氏鄖氏䢵氏䢵又作溳䚋唐書員半千十世祖凝之本彭城劉仕宋後奔魏自比伍員改為員王淵切竇苹云唐人讀作運此皆好異按前凉錄已有員敞芸閣姓苑云員氏南陽與楚同族顓頊之後令尹子文鬭伯比之子育于鄭公辛辛生鬭懐員蓋辛之後路偪陽夷佹諸則晉滅之後各以國為氏魯襄十年滅偪陽以與向戌公羊作傳陽譜有偪陽姓晏安封􅲀為􅲀姓朱婁騶繹倪莒小朱根牟皆􅲀分也武王得􅲀挾復封之朱曰朱婁朱友以父夷甫顔功封倪三世居騶從齊尊王是為小朱子圈稱葛洪云邾武公字伯顔人謂顔公子孫為氏王儉云未知按邾婁顔公事見公羊傳魯公家譜亦以邾言代北可朱渾亦為朱望河南小朱十四世而朱二十有九世滅于楚封其君為鉅鹿侯後有朱氏侏氏姓書邾春秋後八世滅為朱氏然哀公時有齊大夫朱毛侏氏婁氏邾婁氏兒氏倪氏郳氏倪犁氏鄒氏騶氏蒥氏翼氏挾氏無婁氏庶其氏楚且氏鉏從氏茅成氏茅夷氏卑徐氏茅地氏夷氏儀氏夏父氏掶氏庚氏蘧氏繹氏顔氏茅夷卑徐鉏丘茅地蘧繹皆以附邑為氏見姓纂者顔氏見圈稱陳留傳及葛洪集要皆云顔出于邾而朱知儉譜獨以為出于伯禽之庶采于顔者非也故魯公尚書譜亦謂之儉為失据云仲尼之門顔氏之達者八路囘僕㑹何祖克辛也之推云仲尼母族故多賢蓋私言根牟者侔也魯耴之宣九年後有根牟氏牟氏侔氏牟孫氏莒則周滅之矣非紀姓之莒周滅之以封兹輿期伯禹定荆州季芈實居其地生附叙始封于熊故其子為穴熊芈谷野以名加姓附叙史作附祖大戴附祖氏産穴熊季芈即季蓮芈姓也荆楚名也夏有楚狐父厥後鬻熊子者師臣西伯世有鬻子書云文王初見鬻子年已九十王曰老矣對曰君若以臣逐麋則老矣坐䇿國事臣年尚少史記及釋例云鬻熊子早卒繆乃其子事文王云成王時熊氏畔乃復封子繹于荆居丹陽是為楚十七世通祈周顯號事抑乃自稱之子貲遷郢及魏為秦詐留子横徙陳凡二十有五世而秦滅之始皇楚名為秦郡意亦以莊襄王母名改焉世家云以為楚郡失之後有荆氏楚氏熊氏附氏穴氏粥氏鬻氏郢氏逞氏能氏叙氏序氏沮氏能奴代反沮音叙古有楚老左趙孟家臣楚隆其公族氏有成啟鬭囊賁善逯祿縣逮審側庇次連􅇀仵昭由景到聲㬊即圍尹后竟秉宜繹酒保枝乘春陽鈞甲環夘武莊霜雪蜎舉舉穿稱僕貴嚴徵庾奮賀列監減䪨闕卒度陳張李凡七十二氏由余本出中國而伍員後有孫氏秦有班民一避地為棲煩而度尚碑云度與熊同祖急就章有翠鴛鴦乃景翠之後列出列宗有禦㓂風俗通云出古帝王列仙氏妄姓纂復姓又有列禦繆矣姓氏之出固多矣潘本畢公後又有出于楚者故岳家風也詩云楚公族芈姓之後潘崇子尫生黨也其複氏則有鬭耆鬭乳鬬㜌鬭强鬭緡鬭文鬭班鬭比圍龜彌牟若敖叔敖堵敖郟敖越椒罷敵上官三閭五相五參諸將太宰公建良臣左尹右尹申叔申公楚季楚宗巫臣列宗子南子期子庚子西子建子午子重子季子乗子千子儀子木尹午無鈎無圉無宇無庸餘推涉其慶父襄老王孫成王黒肱舒堅來纎沉纎邑由利孫白男吉白屈南耆門市南伍叄慶父嬰齊弃疾枝如伯比師初熊卒熊相倚相辛廖接輿季連季融仲雄大心凡八十二氏及籃厩箴樂􅇗陵權莠清郊工連囂之十三尹沈即寢屈南一作男仲雄潛夫作熊非其氏于邑者有馮屈閻瓦堂棠蒍薳靳卷圈柘拳養包椒包申茍穰䝉蕩麻白渦淖慎匡訾貲棘棗龍俞園艾鑢苗聶蔓萬万利鄀主康蒍與蘧卷與圈園堂與棠訾與貲皆同也棗出于棘萬出于蔓匡出匡宰須句而李延昌本姓麻張遼本姓聶皇朝始以匡為主政和制不得以主為姓乃為康姓書楚有鑢音去聲然攷楚自有鑢及鄧陵卜梁魯陽櫟陽苞丘吳丘何丘軒丘商宻愈豆英賢武安期思田公白公涇陽葉陽之氏闕為郴氏圈公者始秦博士避世商山闕分非發揮帝摯之世九犂亂時重犂失職堯于是復育重犂之後使復舊葉是為羲和命羲仲宅嵎夷命羲叔宅南交和仲宅西和叔宅朔易和實為犂後為和氏易見詳堯紀班彪于寳皆云司馬犂後是也世紀云羲和四子羲仲羲叔和仲和叔分掌四岳王安石以四岳為一人非也商封之程有程氏司馬氏周宣王時程伯休父為宣王司馬掌六師伐徐為氏西京雜記云司馬出史佚休父出史佚也异之祖又左傳荀氏攴子邑程程鄭是程元及靈洗是具程祈之譜談云風姓有裔孫程伯始啟士失之史遷既刑作史記下及懿師三世事魏遂移其社為晉四世弃洛南渡又十一傳而劉宋滅之西五十三年東一百四年沈約晉書造竒以元帝牛金之子應牛繼馬之䜟鄴中學者王邵宋孝王等辨之魏收深疾南幸收其短著之司馬叡傳和仲孫宗處清纍為纍和氏左果毅誓狀云重黎誅共工堯命其子和中居春官代為岳牧和仲孫宗處代清素自守百姓號曰素和子孫氏焉濮羅歸越賨滇麕麋芊蠻皆芊分也楚子取麕麋以國其庶已而取之歸是䕫賨是宗繹之適昆摯以疾廢于䕫亦併于楚鄭語注摯乃繹元孫有疾自弃于䕫子孫有功為䕫子世家不紀有䕫氏歸氏賨氏宗氏宗俱碑云四岳之裔宗均資世皆作宋非也羅熊析也後亦入楚有羅氏羅侯氏初國宜城後轉徙枝江衆周之東乃定長沙滇祖莊蹻百濮芊蠻或竄或懐世不絶也有濮氏髙氏髙氏句麗後燕錄云慕容雲祖和髙句麗之支云髙陽氏之後故以髙為氏為慕容寳養子後僭即復為髙氏越狥芈姓是為南越越裳駱越甌越甌隑甌人且甌供人海陽目深扶摧禽人蒼吾蠻揚揚越桂國西甌損子産里海癸九菌稽余僕句比帶區吳所謂百越也百僕亦自多種揚越即揚粤是為蠻揚或作揚雩非也南海桂林象郡皆古南越之地並詳國名記中輿地志云東南二越而諸儒一之疎矣有駱氏李氏李嗣興本姓洛帝之後又有䝉氏容氏孺氏若氏雙氏玉氏頊氏蟲氏隤氏凱氏重氏童氏龎氏檮氏臨氏蒼氏蒼舒氏達氏叔達氏陸終氏淵氏聖氏周大夫有叔達為王恭曽孫孺興與陸終氏有惡又姓韻才子蒼舒謚淵八凱隤􅢺謐聖後為氏彭祖氏季連氏髙陽氏商丘氏贊曰玉子髙陽精氣揺光通眉戴干是濟窮桑履時象天疏以知逺上緣黄帝通變不倦集威成紀㥄慫自持内戒􅯐室外親客師惠寢萌生信沾翔泳乗彼結元范林何堋世無聖人亦無愚人非無愚人也務學從師則愚者聖非無聖人也違師背學則聖者愚矣乾之九二見龍在田此龍徳而正中者也而孔子發之曰君子學以聚之問以辨之學問從師之始也三皇五帝固未有不自師以成者而獨異黄帝氏髙陽氏之取師何如是之勵且博邪黄于諸臣風后力牧大填封鉅容蓲岐伯若廣成甯封一切師之髙陽之初師于淥圖矣師于栢夷父矣師于大欵矣師于赤民栢亮父矣不憚下風皇皇如有求而弗得何邪至道無所底失徳不以聖唯學然後知不足堯為御舜為左而伯禹為之右入于夢而訪荷蓧涉于津而訊淵客聖亦豈必達哉一人之智固不若衆之愚也師者人之斗極也入人之家則以重人之家入人之國則以重人之國是故古之聖人世至治矣政無為矣民悉仰化而天下之和舉至矣猶且恐然常若獸盗之將至而將不免者尚友親師常若不逮故徳愈隆性愈徹世愈治而後世愈不及也孔子師於老儋師于萇𢎞師于盂蘇䕫靖叔而老儋且師常樅是生知者焉不學然亦何常師之有神農師㶏隂之老黄帝拜空桐之叟㶏翁桐叟豈聖者邪炎黄之聖不自聖也唐虞夏后拜師稽古垂衣裳而天下治湯之于貸子相髙宗之于甘盤文王之于錫疇子斯武王之于太公周公之于庶秀成王之于郭叔此其憲也晉文公之咎犯隨㑹秦繆公之百里奚公孫枝楚莊之孫叔敖沈申巫闔閭之伍子胥文之儀句踐之范蠡大夫種若聖若賢莫不尊師而重學子張魯之鄙家顔涿梁父之大盗而學孔子段干木晉之大駔而學子夏髙何縣子石國之大暴而學于子墨索盧參東方之鉅狡學于籥滑六人者刑僇死辱之徒也而為天下名士顯人王公從而師禮之以其壽盡則得之師與學者君人之所知也齊小白伯者也師于管仲而致其理齊人有士畟也者小白執質請見之三而弗得嬖者曰畟也䯢臣君國之賤士也三往而弗得見其可已矣公曰烏是何言歟吾聞布韋之士不屑富貴不輕身于萬乘之君萬乘之君不事仁義不下禮于布韋之士夫子之不屑富貴則可矣謂不穀置仁義而可乎五反而遂見之天下之諸侯聞之爰胥師而賓焉于是九合諸侯不以兵車一匡天下則自一賤士始也詩曰有覺徳行四國順之其小白之謂乎先朝講臣范祖禹嘗為帝學八篇其槩曰三代八十四王厯年千九百三十以學見者禹湯髙宗文武成王而已夏之啟與少康商之祖甲中宗祖乙盤庚周之康宣皆功業並于詩書非學不至漢唐之君則蓋有矣要之少學而無師夏癸商受昬德弃祀豈性不足與為善邪由不法先王不親賢不問學也祖禹之言其不可戒哉學者聖之資而師者道之原也是故曰說義必稱師聽從必盡力天子入學祭先聖則以齒嘗為臣者弗臣所以尊師而敬學也學堯而堯學跖而跖途巷可以為禹而舜果人也由此語之治亂之分師不師學不學之一間爾郭隗之言中虺之戒其真有國者之龜鑑歟朱紫陽曰渾天儀古必有其法遭秦而滅至漢武帝時洛下閎始經營之鮮于妄人又量度之至宣帝時耿壽昌始鑄銅而為之象宋錢樂為鑄銅作渾天儀衡長八尺孔徑一寸璣徑八尺圍周二丈五尺强轉而望之以知日月星辰之所在即璿璣玉衡之遺法也厯代以來其法漸宻宋朝因之為儀三重其外曰六合儀以其上下四方于是可考故曰六合次其内曰三辰儀以其日月星辰于是可考故曰三辰儀其最在内曰四逰儀以其南北東西無不周徧故曰四遊此其大畧也路史卷十七

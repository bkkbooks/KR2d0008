body:
  text: 路史卷六宋羅泌撰前紀六禪通紀史皇氏倉帝史皇氏倉頡廟碑作蒼非是按蒼氏出于蒼舒倉氏出于倉頡論衡倉頡字盡作倉春秋時有倉葛字不從草名頡姓侯岡見地記龍顔春秋命歴序侈哆見内簡云四目靈光廟碑云蒼頡天生德于大聖四目靈光為百王作憲其銘曰穆穆聖蒼熹平六年立按春秋演孔圖及春秋元命苞叙帝王之相云倉頡四目是謂並明顓帝戴干是謂崇仁帝佶戴干是謂清明堯眉八采是謂通明舜目重瞳是謂無景禹耳三漏是謂大通湯臂三肘是謂栁翌文王四乳是謂含良武王􅀈齒是謂剛强不及人臣也故索靖草書狀曰聖皇御世隨時之宜倉頡既王書契是為而世紀乃言黄帝史官倉頡取象鳥迹始作文字記其言動䇿而藏之名曰書契妄也有辨見發揮上天作令為百王憲昔周初有於倉頡墓下得石刻藏之書府至秦李斯辨其八字云上天作命皇辟迭王或云叔孫通識十二字而不傳妄也任昉云周人不能辨而斯通識之余不信者詳攷二句乃㓂謙所纂黒帝安和國主禁文也實有睿德生而能書隨巢子云史皇産而能書亦見淮南修務訓及受河圖綠字河圖玉版云倉頡為帝南廵狩登陽虚之山臨于𤣥扈洛汭之水靈龜負書丹甲青文以授帝謂蒼頡陽虛山在上洛于是窮天地之變仰觀奎星圓曲之勢俯察龜文鳥羽山川掌指而剙文字形位成文聲具以相生為字字孶也言滋毓藩多也與孶孖同故乳牛羊曰字牛字羊以正君臣之分朝廷之上以嚴父子之儀閨門之内以肅尊卑之序䣊里之間法度以出禮樂以興刑罰以著為政立教領事辨官一成不外于是而天地之藴盡矣倉帝所制乃古文蟲篆孔壁古文科斗書即其體也魏畧言邯郸淳善倉頡蟲篆是矣自倉頡至周宣皆倉頡之體也宣王紀其史籀始作大篆十五篇號曰篆籀與倉頡二體所謂古文因而用之衞恒云倉頡造書因而遂滋則謂之字字有六義至三代不變改故孔頴達云倉頡至今字體雖變而六體之本古今不易漢志云倉頡多古字俗師失其讀宣帝徴齊人能正讀者張敞從受之傳至外孫之子杜林始為作訓子雲因作訓纂此書斷所以謂吕氏書言倉頡造大篆為非謂若倉造大篆則置古文于何地古文為本篆籀其子孫矣孝經援神契云奎主文章倉頡作文字者總而為言包意以名事也分而為義則文者祖父字者子孫滋蔓而相生爾天為雨粟鬼為夜哭龍乃潛藏論衡云河出圖洛出書聖帝之瑞倉頡作文字業與天地同指與鬼神合何非何惡而致雨粟鬼哭之怪哉圖書文章與作書何異使天地鬼神惡人作書則圖書出乃無此怪或倉頡作書適與之㑹爾葢一說也文字備于以存乎記注乃著績别生正名孚號而升封于介丘紀文字以昭異世而文亂日昌矣河圖真紀鉤云王者封泰山禪梁父易姓奉度繼典崇功者七十有二君管子墨子亦言封禪皆在先秦春秋之世封禪者帝王易姓告代之大禮也一姓惟一行之謂之岱宗其事可知矣惟后世目之以告太平為可惡爾按白虎通義云王者易姓而起必升封泰山何報告之義也必于泰山何萬物交代之處也必于其上何因髙告髙順其類也言封禪者莫此為近豈謂太平不敢歸已推徳于天哉云推徳于天乃所以為有已皆腐儒之見也夫以唐虞之盛猶曰四海困窮今乃自述太平不遜于天地其享之乎勒石紀號者特帝王之顯名耳亦非勒功德以示來世知此則知封禪亦無多事也史皇始備文字故首封禪紀文字此皆可得而知者世儒謂可廢者特不詳其本哉亂百有一十載見渾天記廬陵縣化仁山境舊有脞祠有倉頡像羅列宰邑治學先公侯徙其像于學四目龍衮古扁猶為倉王誤矣都于陽武今開封之祥符故浚儀縣即春秋之陽武髙陽鄉也有倉頡城陳留風俗傳云縣有倉頡城及列仙之吹臺地記開封縣東北二十有倉垣城及廟墓輿地志云城臨汴西北有倉頡墳城别仙臺郡國志云倉頡師曠城倉頡與師子野所造繆也時宜無城或後世緣其所都名之邪然按姓纂倉頡氏馮翌人則其後世氏倉頡者為之爾終葬衙之利鄉亭南書人禋之皇覽云墳髙六尺學書者皆徃上姓名投刺祀之不絶九域志鳯翔有倉頡廟今長安西南二里宫張村有三㑹寺者記為倉頡造書之堂斯亦未然豈亦馮翌者為之歟或書生習書之所也論衡云學書者諱丙日云倉頡以丙日死按古五行書倉頡丙寅死辛未葬葢五日始葬或疑其時未有甲乙然世皆言大橈作甲子而伏羲已有甲歴出于上古特未可執後有倉氏史氏侯氏侯岡氏夷門氏倉頡氏姓纂有倉頡氏姓書更有頡氏豈後世之姓孔名丘者邪今故不取倉史夷門見姓苑等按漢上谷長史侯相碑云侯氏出自倉頡之後逾商歴周各以氏分或著楚魏或顯秦齊卿士為斯其胄也然自春秋而下諸國皆有侯氏故姓纂以為晉後而侯成碑謂鄭共仲賜氏曰侯厥後宣多以功佐國因以為氏然祀之後與魏侯奴氏渇侯氏古引氏俟伏侯氏亦並為侯氏云嗚呼圖出河書出洛天地之所以畀聖人也而其末流禍天下亦深矣三代而上用而不恃文字之所用墳典鼎彛之外亡施焉三代而下有說命有政典然後文字亡所不用既著文字而六經託六經之託聖人之不得已也降至後世句連苦窳牢茹苫畢而後淫辭詖說始蔓羨霄塊間矣竒它之目如秋荼而民亡所措手足章句之學如凝脂而士不知所稅駕文者侮俗而姦者舞文至于讀易卜姦誦詩抇冡亡所不至人皆郵之而不知所郵者彼市祅夜哭謂鬼亡知吾得信諸栢皇氏栢皇氏姓栢名芝上清三天列紀云上清真人姓栢名芝乃中皇前人是知栢乃姓也莊子六韜人物表亦皆從本傳或作伯字云借用栢斯失據矣是為皇栢三墳書云伏羲上相共工下相皇栢妄也其失源于班固應劭叙于伏羲之後故爾後世以為襲伏羲之號或云其佐皆失之莊周所記封禪之帝叙次可以見矣出榑日之陽駕六龍春秋命歴叙云皇栢登出榑桑日之陽駕六龍而上下乃栢皇也以木紀德命歴叙為而不有應而不求干寳晉武革命論云栢皇栗陸為而不有應而不求執大象也莊子曰獨不知至徳之時乎栢皇栗陸之時斯至治矣立于正陽之南是為皇人山方志華夷圖謂之伏羲山輿地廣記皇栢山在開封陳留縣其後為栢今蔡州西平古栢國春秋時栢子之封有栢氏風俗通云栢皇氏後栢常為皇帝地官栢亮又為顓頊帥栢昭為帝嚳師堯治天下有栢成子臯立為諸侯堯授舜舜授禹栢成子臯辭為諸侯而畊一作子髙通變經老子言自開闢以來千二百變後世得道栢成子臯是矣逮周之世有栢冏為太僕正又有栢侯氏栢常氏白侯氏姓書又有白侯氏按漢尚書郎白侯雋吳張昭師白侯子安云栢侯之轉學者皆言五運尚矣自伏羲以來以斗精受命者七神得間氣而生者又二十有八所謂三十五際者也而終始之傳乃謂大庭栢皇悉有所紀何邪天地之大者在隂陽而五行為之次同符合證各象其類興亡之籙以次相代豈偶然哉是以皇天眷命必先幾見于下民聖王感運而興必求合德以為之表昔者黃帝之世天先見大螻大䘆黄帝曰土氣勝土氣勝故其色尚黄其事則土及禹之時雨金櫟陽禹曰金氣勝金氣勝故其事用金然其受命荷帝𤣥玉故其色尚黒下至湯代金刄先生于水湯曰金水勝金水勝故其色尚白其事則水及夫武王火烏流社武王曰火氣勝火氣勝然其衰在木火生于木故其色尚赤其事則木類固相召箕麗而風畢動而雨雲從龍風從虎其氣炎則有以取之矣伏羲髙辛俱感巨跡神農唐堯俱感赤龍黄帝有虞咸因大虹少昊伯禹咸繇流星與夫揺光貫月而􅤟顓湯若有同于劵鑰者殆叵信邪抑又取之劉季斷虵而遂感赤龍叔達繼水而復驚靈跡顧豈有司之者哉徃哲遺疑然物之來固可得而知也蒼姬祖弃既本跡瑞偰先湯修嗣嬴俱膺𤣥鳥之祥孰難見哉弃后稷周木徳之祖偰司徒商水徳之祖女修嬴秦水徳之祖喓喓草蟲趯趯阜螽黿鳴泮隰鼈應淵中馬氂截玉梧桐斷角承石取鐵毒冒噏􅬮娠臨門彩味蔑媍在軍臯鼓噎嫛婗號母乳泏匏血動痼疾發蠶餌絲而商絃絶緣類而升固有不期然而然者狼􅀈齒鶴䧿矢中彚彚使虎伸虵令豹止搏勞施虵守宫弭蠆唐郎捕蟬即且甘帶故曰道之制在人物之制在氣其生以是乃或闇乎其數矣若夫距王而興不能復禹之迹者非道殘百年之命則五神之餘氣也張說論唐數禹以金徳而得生數湯以水徳武以木徳而獲成數伯翳之命中天而堯裔以火徳承之是以傳世數再三百李唐以土為紀有統亦當千年緯以八元三百四歲為德運七百六十歲為代軌千五百二十歲為天地出符四千五百六十歲為七精反初以文命者十九而哀以武興者六八而謀天人相應若合符節劉氏唐書云王勃精于推步作大唐千歲歴言唐徳靈長合承周漢運歴不應近承周隋短祚大㫖謂以土王者五十代一千年以金王者四十九代九百年水王者二十代六百年木王者三十代八百年火王者二十代七百年乃天地之常期符歴之大數自黄帝至漢皆五運之真主五行既匝土運復歸乎唐因魏晉至周隋咸非正統五行之沴氣也是亦張說等之佞爾而正統之論煩結至于相承失次共工嬴秦俱不得簉而魏隨五代仍去仍留遂使應運之王當南反北人符天瑞不得其時稽之作者之猷不如太上之無也中皇氏中皇氏封禪之帝也或云即中黄古有中黄子道家有中皇經叙釋云中黄真人者九天之尊始自人間登于聖路即胎藏論也中黄子之言曰天有五方地有五行聲有五音物有五味色有五章人有五常故天地之間有二十五人焉上焉者五其次亦五中焉者五其次亦五而下焉者又五上之于下人半焉聖人所以駭天下真人未嘗過焉賢人所以綏聖世聖人未嘗觀焉葢道之不相謀者也亦見文子而靈樞言伯髙對黄帝天地之間六合之内不離乎五人亦應之故有五五二十五人之政葢本于此國朝編類地理有中黄子隱伏上清列紀云中黄之書白帝藏之瑤臺非有秘籙者不得當是時人結繩而用之莊子云昔庸成氏大庭氏栢皇氏中皇氏當是時人結繩而用之周所叙乃封禪之帝也居皇人山之西是為㟼鄗山地記謂之三皇山圖經同在孟之河隂縣一曰中央氏見六韜等傳記以謂虞氏之樂有五央掌其中央者以中央為氏妄矣按虞樂乃五英即帝俈之五英言五行之英華也故姓書有中英氏與中央氏别此葢又繆以央為英爾後有中央氏中黄氏封禪有矣古者五載一廵狩而每姓一封禪封禪帝王易姓告代之大典也一簞之饎鞠人之養也受之于旅且猶有謝而况得天下乎然則厯世而來開山命歴握河登紀者之所以攀嵩緣岱而對越乎清極豈茍然耶固所以告成功也是故皇非創業則廵告而不展三代八十四王歴年千九百三十其行之者禹湯成王而已他君曾未之行武宗中宗宣王亦未之行豈惟懲國度戒誣瀆哉繼世守成顧無得而謝也一自夷吾設祥瑞之說歫齊君諸儒為必俟泰平之言難秦帝而後中材之主誤其美稱不原其本茍存華觀至一代而數封中間妄引昌輝假稱蓂萐隲肅然除蒿里以誣瀆乎清寜者武接于中馗矣孽臣艶后穢挺嵩岱先王之禮意果安在邪咄哉末世之君不知夫禮而必欲行封拘儒辟者不知夫禮而必曰勿封奚必爾邪創業之辟茍當平世講禮戒費行其所謂代一之舉則嗣君無事於襲為矣君欲行之則盍反其本乎惟毋致羊皮雜貂裘之譏可也不然無重發陳莊伯之歎大庭氏大庭氏之膺籙也適有嘉瑞三辰曾輝五鳯異色見遁甲開山圖六帖韻海作五風誤都于曲阜故魯有大庭氏之庫昔者黄帝䄢于大庭之舘兹其所矣庫在魯城中曲阜之髙處今在仙源縣内東隅髙二丈治九十載以火為紀號曰炎帝後世以其火徳故以之為神農因復謂神農都魯妄也外紀知不可合乃以神農為大庭而謂與包羲後大庭氏異而為二大庭益繆後有大氏大庭氏見姓纂風俗通英賢傳云古天子大填為黄帝師大山稽為黄帝司徒唐代勃海尚其世也唐勃海姓大太山稽世音為泰誤量莫大於齊人而彼蒼為窄聖人在上情欵通乎人德惠加乎物則欣欣焉為之不可致之祥下甘露出醴泉三辰曾輝五星循軌歉歉然為聖人延禧而永卜及有失道則先出灾患以憲示之不知自省又出變異以恐懼之尚不知變乃弗復告而譴極以隨之是何數數然邪昔者泰皇倉帝大庭無懷之時清明之感上行而際浮下行而極幽故天不愛道地藏發泄而人化神伏羲神農之世其民侗􅀈瞑瞑蹎蹎不知所以然是以永年黄帝唐虞之代其民璞以有立職職植植而弗鄙弗夭是以難老末世則不然煩稱文辭而實不效智譎相誕而情不應一惽于上而羣有忮心者旋攻之于外是以父哭其子兄服其弟長短頡􅀈百疾俱起盲秃狂傴萬怪偕來變不虚生緣應而起而中材好大之君樂休祥而昧致戒己未有善而詹詹惟瑞之言又不思所以應之而因以自怠是以稱善未幾而昭士已􅀈于域門之外故儒老先薄言其事乃至詆符瑞為無有者皆過激之論也夫天人之相與特一指也日月星辰之麗風雨明晦之變即吾心之妙用而饑食渇飲利用出入即天地之機踵也拱生之榖同頴之禾雊鼎之雉退風之鷁果何與于丘哉而孛食星隕霖震木氷山崩地震蜚蝝麋蜮春秋悉與人事雜而識之是誠何意邪豈非四靈三瑞五害十煇靡不萌于念慮之初天道若逺而念慮之至則象類之見有不可而遮乎君髙其臺天火為灾多其下陣淫水殺人賤人貴物豺虎横出孽嬖專政榖果不實膻致螘臭引蝶亘古猶是故治世不能必天之無灾而能使灾之不至于害聖人不能使天之無異而能使異之不至于灾雷電以風㧞木發屋而嵗以大熟日食震電川􅘺冡崩而周以東播惟戒之不戒爾身有醜夢不勝正行國有祅祥不勝善政是故􅨣變異而怵者未有不興稔休祥而怠者未有不亡漢之武帝放意殺伐天下愁苦其治效茍不至于大亂則已矣然在當時旱䁧彌年孛彗數見顧乃以為偶然而景光嘉祥芝鴈金馬史不曠紀則歴代之事可知矣今嵗旱矣而曰天以乾封星孛矣而曰天報德星是則果自欺也何惑乎速化希㫖者之為欺邪惡戲孰能翊翊小心夙夜警戒如楚莊者而從之乎若昔楚莊之涖域也見天之不見祅地之不出孽則禱于山川之神曰天地或者其忘不穀乎若楚莊者可謂上畏天戒謹于厥躬者矣是以雖夷君而主盟諸夏方域大治子孫長久此其效焉行之非囏人何傷而自絶哉栗陸氏栗陸氏是為栗睦古以陸為睦漢郭仲竒碑云風崇和睦敖昬勤民愎諌自用于是乎民始攜東里子者賢臣也諫不行而醳之栗陸氏殺之天下叛之栗陸氏以亡鄧柝子後有栗氏睦氏陳靈公不君洩冶諫而死而傳稱孔子援詩以罪之予以為非夫子之志也夫春秋書曰陳殺其大夫洩冶葢以章靈公之惡悼冶之賢而死不以罪也迷于傳者乃以為夫子罪其直言于淫亂之朝而以累上書之失之逺矣竊嘗言之春秋之書可以義推而不可以例解也聖人之予奪若權衡然一參一累自有輕重權隨之而移爾惡可膠權而求其分兩之當哉稱國為討為累上此二傳之獨見非經意也榖梁云冶之死不以罪公羊云稱國者君殺之辭得之諸侯之臣書之策者無非大夫也書曰殺某則是殺大夫矣是故㑹聘涖事若盗殺俱不書大夫自大夫以上始書于䇿書殺大夫某者明大夫之不當殺也猶立君致夫人而不書明不當立不當致也葵丘之㑹齊小白為載書而盟諸侯其四命曰毋專殺大夫書殺大夫于春秋豈復有是者哉古者諸侯之大夫一偕命于天子及其有罪則請之天子命之殺則殺諸侯不得而專之周衰諸侯專恣大夫之罪未登于殺而輒殺故未有不書大夫者惟欒盈良宵不書大夫以其絶于國也皆奔而復入雖然書殺大夫亦固非一律矣有盗有人有名有國書名者三書人者七書國者三十有二稱國以殺者君殺之稱人者衆殺之而其名賊則大逆者也茍非弑君則不名賊三大夫者皆由君弑見及故及其賊之名孔父仇牧荀息葢遭簒逆力有所不能制而與君生死者以君而及之所以榮也杜預謂貶者妄矣君豈得而字臣哉二百四十二年之間固未有稱某君殺一大夫者則稱國殺為君殺明矣亦未有衆殺之而書國君殺之而書人者洩冶之死孔寜儀行父實殺之而書國殺曰君實殺之也書曰大夫是不當殺也夫冶致諫其君而二子請殺之靈公不禁是不曰君殺之乎于以是知聖人婉筆書之深見其惜之之尤也而辨者執左氏之說而求之春秋至有夫子懐寵不去亂朝之語是膠權而求分兩者之見也是後世不忠于君謀一已之利而不顧民社存亡者之言也聖人豈有異于人乎哉昔者夫子之言不諫則危君固諌則危身與其危君寜危身固當不義臣不可不爭于君紂之不道微子去之箕子為之奴比干諫而死而夫子俱謂之仁躬丁衰委之代垂老作書以示勸沮若冶之忠君死誼方褒嘉之不暇而且罪之惡在其為孔子也且冶在陳何寵之足懷哉史記比干見箕子諌不聽而為奴曰君有過不以死争百姓何辜乃直言而死冶之忠縱未比干仵固不在宋子哀魯叔盻後于何貶且大夫生死皆名禮也是故死雖無罪亦必名所以正君臣之分而非不在此也今徒以名為罪是所書之大夫無非罪矣曹宋之大夫特不足登春秋爾顧以為非罪邪晉一日殺三卿而皆名不皆罪也至于後世有曰良史而佐繆聖人之意以誣墓鬼者予于班固見之矣京房以忠憤死則以為不度淺深危言譏刺晁錯以忠謀死則以為知小謀大禍發如機至于翟義倡義討賊則又以為不量力以隕其宗是則仗節死義皆固之不取矣是則人臣之事其君必如無口匏立仗馬不鳴鴈然後為明哲歟王鳯以戚里擅政王章力爭以死漢忠也而曰不量輕重以陷刑獄王嘉爭董賢以死何武謀王莽以死死忠也乃曰區區以一簣障江河用没其身夫為人臣而量輕重以進者全軀擇利之徒也嘉武身乎將相可以區區自處哉陽處父晉太傅也既諫以死而左氏且以為侵官固可知也故非聖人而率肆詆短鮮有不害名教者昔范曄謂固下死節否正直不叙殺身成仁而予且不得以固為良史通鑑論東漢黨錮似此俱未善贊曰上天作令皇辟迭王穆穆聖倉四目靈光受河之圖仰觀俯察立我文字創制垂法朝廷之上以正君臣閭黨之間以肅尊親著績别生升中于岱文治以興布祅奚怪路史卷六

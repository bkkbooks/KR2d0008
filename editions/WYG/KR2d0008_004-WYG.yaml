body:
  text: 路史卷四宋羅泌撰前紀四因提紀辰放氏辰放氏是為皇次屈宋均注春秋命厯叙云辰放皇次屈之名也洛書摘亡辟以次是民即皇次屈非也渠頭四乳駕六蜚麐太平廣記作飛麋出地郣宋均云地郣地名而從日月上下天地與神合謀注云從謂順度古初之人卉服蔽體次民氏沒辰放氏作時多陰風乃教民㩃木茹皮以禦風霜茹藴也茹毛藴被其毛綯髮閐首以去靈雨而人從之命之曰衣皮之人命厯叙言被木枝者也治三百有五十載同上云離光次之事之始未有不善其末未有不敝服舍器用王道之本也自生民以來至黃帝而大備創修增革更幾聖而後至盖天下之事因乎時不因則不立不時則不成時之所未厭雖聖人不能以强去時之所未安雖聖人不能以强行若興若廢特顧其時而已矣始古之時虵獸方興鴻水未息人之患也極矣聖人者作淈沈鴻而致之海毆虵龍而放之菹然後人得平土而居天地之間滄熱而蕭藾之下足它恙於是教之巢穿以避之此百姓之所與也猶未艾也生者有所需焉故多寒也為之羽皮以禦之多傷也為之火食以遂之多疾也為之醫藥以濟之多滯也為之泉幣以行之不疏也為之歌舞以道之不通也為之舟檝以郵之相傾也為之符璽以信之相奪也為之權衡以平之無爪牙以自衛也然後為之城郭羽皮之不給也然後為之布帛木處而顛土處而病然後為之棟宇為之祭祀以致其報為之刑政以率其壊為之車輿以佚其體為之棺槨以厚其終以至為􅃠罟為耒耜為杵臼為弧矢為鯤鮸為茵幄為澧洛笵金合土墐竈泄井黼坐鼎食鞲牛乗馬兠矛劍㦸重門擊柝各以智巧變而通之害至而為之備患生而為之防因其時而極其用生生必具然後夫人知有生之為貴養生送死無憾然後人得安其生而樂其化此教治之大基也是豈有不善邪降及它時不原其故乃至窮耳目之好以徇人㓶生民之脂以自奉傾宫璇臺不足處則更為之萬户千門合宫龍鷁不足乗則復侈以錦颿珠兩南河西苑獵車千乗織金鋪翠費動萬計撞萬石之鐘伐雷霆之鼓窮日十夜有不足以既其懽弗聞天下之嘆嗟而施施自以為樂天道惡盈蜉䖻闕閲而何能以久生乎桀紂幽厲秦政石虎髙緯叔寳齊昏隋煬之流亦可以鍳矣唶哉䕫龍稷卨伊周孔孟分則人臣而安時處順不失天下顯名夏癸商受魯桓齊穆人君也而清虚者猶商其有禽獸之心惟其見善不明恣人欲滅天理物至而人化物爾物至而人化物則其夜氣不足以存夜氣不足以存則其違禽獸不逺也嗚呼物之感人無窮而人之受用無盡若以為足今固不啻足若猶未也雖萬此其足邪顧是數主之所盡力又奚足為美好哉逐物喪我特不思而已矣然則如之何曰吾不為奢亦不為儉使為儉則齊鸞永泰之間分裹蒸餘皁莢濼梁衍大同之際豆鬻布帳雖唐虞何以加諸吾無取焉必也當其分適其數而已矣蜀山氏蜀之為國肇自人皇世本揚雄蜀紀華陽志本蜀論等語其始蠶叢拍濩魚鳬各數百嵗見蜀紀號蠶叢帝拍濩帝魚鳬帝或作折護與伯雍者非寰宇記作伯禽尤踈號蜀山氏盖作于蜀今成都蠶叢縱目王瞿上瞿上城在今雙流縣南十八里縣北有瞿上鄉魚鳬治導江今眉之彭山縣北東二里有魚鳬津南北入郡志云犍為有魚鳬津廣數百步逮蒱澤俾明時人氓椎結左言不知文字上至蠶叢年祚深眇揚雄記云二萬四千嵗杜甫云二萬八千嵗蜀記等言魚鳬等君治蜀八萬年盖難取据俾明記作開明非最後乃得望帝杜宇實為滿捍盖蜀之先也杜宇鱉令説詳餘論司馬貞以杜宇出唐杜氏後妄舊記有女曰刹從地出為宇妃按女刹乃梁氏女詳餘論受禅在丁卯八月三日自叢以來帝號蘆保一作盧帝保帝今廣徳之建平有蘆保圩蘆保月圩未明何始時代久近詳餘論其妻曰妃俱葬之永明二年蕭鑑刺益治園江南鑿石冢有椁無棺得銅器數千種玉塵三斗金蠶虵數萬硃砂為阜水銀為池珍玩多所不識有篆云蠶叢氏之墓鑑責功曹何佇墳之内無所犯于上立神衣青衣即今成都青衣神也開明妃墓今武擔山也本曰武都在府西百二十步周三百五十步云妃始武都男子化為女美艶開明尚納之不習水土欲去王作東平之歌未幾物故既葬表以二石闕石鏡武陵王蕭妃掘之得玉石棺中美女容貌如生體如氷掩之而寺其上鏡周三丈五尺樂史云厚五寸徑五尺今杜宇廟在益治北五里永平橋西齊建武中劉季連自灌口鎮城内徙此昔黃帝為其子昌意取蜀山氏而昌意之子乾荒亦取於蜀山氏繼其後葉益山記岷山禹廟西有姜維城又西有蜀山氏女居昌意妃也本曰蜀山會西北九十里其會州周置喜為茂州今茂之汶山有眉山樂史亦云昌意娶蜀山氏也及髙辛氏以其少子封蜀則繼之者也昌意遜居若水元囂降居江水而禹生石紐其地皆在蜀盖五帝時嘗合中國世本謂蜀王每世相承為黄帝後而通典以蠶叢伯雍為帝俈之支樂史從之謂歴夏商至周始稱王因前誤云秦恵文元年蜀人來朝八年伐滅之初蜀道相攻來告急司馬錯請伐之見史記始降侯云使陳莊相之蜀遂屬秦寰宇記梓劍引常璩云静王五年秦大夫張儀司馬錯從石牛道滅蜀閬中縣引作順王五年嗚呼山川設險此天地之所以限疆界也嗟人之生雖聖且智其精神固有限劑而洞地之不可極今古同也奈何多欲之君溪心壑志貪以取敗然後百罅啟而天地閉矣予讀揚雄蜀紀而感夫蜀之所以通中國者夫蜀之為國富羡饒沃固自一天壌也西畨東漢北秦南廣一障之隔自生民以來君君世紹蜀不知有中國而中國亦莫知有蜀五帝以來羈縻服外蜀固不為中國少而中國亦不為蜀不足也逮安王時蜀王貪惏求欲無厭故秦恵得以圖之餙妖饒之子劖怪誕之牛以誘其衷而後褒余之路棧矣以故秦人得蜀之貲而遂併天下自是蜀山不閉莫有其有至於今為中州則貪求之所致也一自中國之有蜀也固不可謂之無利也然而風動之辰常先他國而綴靈府一或入保則無復中國之所有者是其為國固鬼神之所作也予既讀蜀紀而感夫蜀之所以通中國者及讀陳子昻之疏而又幸蜀之不通於吐畨也夫吐畨之於蜀猶昔日之秦於蜀也方其拏唐之兵大戰則大勝小戰則小勝幾十載矣未嘗亡一旅也以薛仁貴郭待封彪武之將屑十萬之衆於大非之川一甲不歸以李敬元劉審禮廊廟之宰辱十八萬衆於青海之上竟不能俘一醜而闗隴為墟可謂彊矣然其垂羡全蜀之珍如是之久而不得食者徒以山川之阻絶而障塞之不通也胡為議者欲以梁鳯巴蜓之兵開蜀道繇雅州以討生𦍑而襲吐畨夫𦍑人固未易討而昔者東漢之所由喪敗者也嗚呼其亦幸而不成歟萬一生𦍑可破而蜀道遂開則蜀之瑶庫自此轉而西矣使我而得吐畨其財固不足以裕國其地固不足以穡也而徒戮無辜之民竭有常之帑以狥之爾其或得之而得以穡亦何異於釋近熟而創逺業乎又何異於舍已之田而芸人之田者也况已之田舍矣而它人之田未及芸邪昔者漢之武帝好大而喜功使者張騫乃反誇以西域之富於是嘬兵以争之四十年間中都之財賦夏國之生靈略盡於西域矣非不得其地也得朔方之郡而自不能以耕也非惟不能耕也得朔方之生而棄上谷造陽之熟以予胡矣其所以危士臣以締怨者得大宛良馬數十而已使齊楚之巨擘怨而交訟所争亦不啻是一何黙邪嗟乎武之轍既覆於前矣而隋之裴矩又以西域之圖蕩煬帝之侈心於是親出玉門置伊吾且末而闗右蕭然始恃盛彊卒歸狼狽此魏公之所以傷之者也顧不韙歟予嘗言之溟渤漲洋此天地之所以限東徼也惡溪沸海此天地之所以限南徼也惡溪在閩多厲毒氣中者温屯嘔泄逾者脚輙腐弱其魚多鰐沸海常沸尤多惡魚朔云炎洲貢者經之䧟河懸度之設乎西自罽賔西行歴大小頭痛山赤土身熱之坂宋膺異物志云山皆在渠捜之東疏勒之西冬月過之必有頭痛身熱吐逆之患驢畜皆然夏日則死山有毒藥氣之所為又有三池盤道經三十里又經烏四百里右懸度山只尺之路下臨不測法顯記在盤陀西南今葱嶺冬夏有雪即佛書言雪山者道有毒龍犯之輙􅔨晦飛礫過者少全瀚海沙子之設乎北此天地之所以遮西而制北者也沙子在契丹後彌數千里乃者女真滅大遼其臣大石林牙挈其子三晝夜逾沙子立之數十年粘罕莫能近激障霧于東維東南瘴霧冐者多死其病如疫而重劇至七孔迸血故南方有大小法場之號今越嶲有瘴氣中之有聲着人人死着木木折曰鬼隟本山障之氣毒也界黑水于南極黒水在梁雍間涉者則脛黝黒泄流沙于西陲裴矩西域記自髙昌東南去𤓰州千三百里並沙磧乏水草四面茫茫盖西州之栁中路也又有一路自栁中縣南東行經大海之東又東南度磧入伊州即裴所謂伊吾路今使郵所至髙昌從武威西北有㨗路度沙磧千餘里四面茫然不可準記行者惟以人蓄骸骨驢駝糞為誌大雪即不得行或道見宫宇忽聞歌笑從之者多不反盖魑魅也當且末西北沙中夏則熱風為患惟老駝知之將作則聚鳴而擁其鼻口不則危斃今髙昌客旅皆由伊吾道决弱水于北㵄此天地之所以界四維也出陽關至于甸路經䧟河伐檉置中乃得度弱水亦䧟河之類羽毛皆沈今川廣之界亦惟一小河淖濕而深今古不得度盖亦弱也八荒之内奚有奚無八荒之外何窮何止古之聖人一視同仁為吾臣與為狄人臣奚以異是故人得其君則已矣請試舉一隅以憲之方昇明之二年倭王奉表以條其祖之勛謂東西之所服者二百九十有六國是固海東之國也倭王之所服者也其所不服者幾什伯君其盡制歟東毛人等五十五國西服衆夷六十六國渡北海北九十五國一云三百一十六國支顯西游道其所記亦數百國此于甸以西國也支顯之所知者也其不知者又不知其幾也智猛法盛之録曇勇道安之傳審至之國不下三四五百大延四域之使魏氏四道之賔所奏之國亦不下三四五百此世之未嘗聞者也是數千國者固俱樂土也其地可謂逺矣而其人亦未嘗有能道天之涯地之角者惡乎貪而不已邪有海國説見餘論慮亂者穿其頤志逺者刺其目黃帝堯舜非不能服逺也而所守者域服之外一無所事其在周公亦不過曰詰爾戎兵陟禹之迹而已夫禹聲教暨于四海而其制中國若是截也舜投四凶于四裔羽山乃今海州崇山乃今澧州幽州則今遼東而三危乃今渭水之源由今觀之皆為近地齊之伐山戎此特北平之地而當時已譏其逺伐韓愈之貶潮陽可謂逺陋蕭育之守張掖固已窮僻而今更為内地放臣遷客遂至編𨽻朱厓沙門島上猶以為未豈堯舜之心哉伊尹四方之令狗國豹胡亦不過三十有六國來者不可距往者不爾追又曷嘗勞吾萌宣吾府而奉之哉噫先王之政教其施於中國者盖詳矣惟先王之政教以治中國則禹之所制不為少矣不由先王之政教則禹之所制猶將不異於戎狄彼以逺畧誇後世而不詳乎其内者是豈禹之心也哉末世之君不知古者之所以為國而以貪求速敗豈不甚惑邪嗚呼其亦不聞蜀漢隋氏之事則已矣少有所知有不為之寒心哉豗傀氏豗傀氏後有豗氏傀氏見元和姓纂豗傀氏之迹學者必以不著每以屬之皇神農後世遂謂神農為豗傀氏失之渾沌氏渾沌氏是為渾敦後有渾氏沌氏屯氏見姓苑等姓苑三墳作混沌風俗通作混屯姓苑云後去水為屯姓纂又有屯渾氏云太昊佐謬若至于所謂盤古氏異矣盤古氏亦曰渾敦氏羅隐有渾敦氏施化之説謂盤古也如云支節為山岳腸胃為江河之類本出三五厯紀等書予嘗議三墳之偽渾沌氏豈太昊之佐哉六韜之書渾沌氏在昊英氏前及班固表古今始列之伏羲之下應劭作書遂以為太昊之良佐三墳姓纂一皆因之失其本矣昔者孔子謂子貢曰渾沌氏之治若予與汝奚足以知之渾沌氏豈太昊之佐哉此班生之失也雖然渾沌氏之治於今果何如邪老儋子曰古者被髮而無卷領以王天下其徳生而不殺予而不奪天下之人非其服而同懐其徳當是之時陰陽和平萬物無息蜚鳥之巢可俯而探也走獸可繫而從也盖執中涵和除日無嵗無内而無外者此渾沌氏之治也至其衰也鳥獸蟲虵皆為人害是故廹其難則求其便因其患則操其備故常不必循器械不必因後世因時而有變易亦以輔萬物之自然而已矣七十九代之君其為法不同而俱王于天下由此道也食也息也何久近之殊哉嗟乎舊國舊都望之悵然雖使丘陵草木之緍入之者十九猶之悵然况見見聞聞者乎夫有盛必有衰而衰者必復有冬必有夏而冬者必開此天地之化氣也今也覲古之人被畫冠服而企止者質厚魁偉重視深息氣象固已殊矣况三代之時乎三代之世聖賢自多而况出於其上者乎然則君子何獨於渾沌氏疑之哉彼將憮告賜之言者吾不憮也東户氏東户氏之熙載也紹荒屯遺美好垂精拱黙而九寰以承流當是之時禽獸成羣竹木遂長莊注云足其性而止無吞噬之心故物全道上顔行而不拾遺耕者餘餼宿之隴首其歌樂而無謡其哭哀而不聲皆至徳之世也見子思子淮南子云東戸季子之世道路不拾遺耒耜餘糧宿諸􅒪首使君子小人各得其宜也許氏云古之人君傳又作東扈或謂即夏之有扈謬矣人物表在炎帝之前魏文帝令叙黃帝于其後可知矣前世之史患乎略後世之史患乎詳予述此書自遂人而下益詳盖法之始禮之初政治可則不得而不詳也遂人而上雖復著之有不得而詳者若夫上之號氏世姓多得之外書與夫封禅之文于儒書無所見雖或有之連蹇其文濛澒其説如風俗通之列僊氏始學篇之卷須氏皆誕謬無鞅者也補史記作卷鬚又有得以僅存者如氏譜之吉夷氏莊子之冉相氏狶韋氏皇覽之巫常氏王潜夫之神民氏子思子之東户氏亢倉子之几蘧氏風俗通之帝疇氏和莵史之太嵬氏鬼嵬氏命厯叙之黃神氏􅩅神氏辰放氏皇談氏然皆不得攷其上下獨夏后氏之書注山水之所自多有諧其號氏者豈其人之所自出而迹之所麗邪以此諦其不誣也故予得以詳擇焉皇覃氏皇覃氏一曰離光氏兊頭日角六鳯皇出地衡春秋命厯序在而不治官天地府萬物審乎無假是故死生同兆而不可相陵在者任之而已一而不黨命曰天放若有心治物則求彼天然直致于尒任則物自足矣虞書云在治忽亦任其自然而已故莊子曰聞在宥天下不聞治天下管子亦云先王之在天下民比之神明之徳孔氏以來説者皆以為察其然哉在璇璣正非屑屑致察也在之而已治二百五十載命厯叙云次民沒離光次之號曰皇覃治二百五十嵗至政之謂時至變之謂世時政再而僿世變三而復三變則百年矣子曰善人為邦百年亦可以勝殘去殺矣勝殘去殺宜若小然今也善人為之猶有待于百年何邪世變之道然也男子生三十壯有立於是始室父子相及是故古者三十年而成世如有王者必世而後仁盖一世則變矣天時人事皆一更矣變極亂而為極治無生而為無殺至殘而為至安豈一朝一夕哉殘之勝殺之去故必三變而後復也五帝無殺者也三王無殘者也而五伯則無生也無安也伯一變而王王一變而帝帝則皇皇則道矣由無安而至於無殘無生而至於無殺必有漸也齊一變至於魯魯一變至於道風移世革宜必百年而後可也今夫五月旱熯人知為暑也而陰實生之十月氷霰人知為寒也而陽實始之治亂之變亦陰陽與寒暑也寒暑之期三月而移治亂之勢百年而復善嵗之家知寒暑之必至故在暑而裘成在寒而絺成是以終身無寒暑之憂善世之君知治亂之不常故在安而圖危在治而圖亂是以畢世無阽危之患居今之世不變今之道雖與之以天下不能一朝居矣嗟乎自有君汔於堯如辰放皇覃遂人有巢為世之期皆逾二百正所不論而羲炎若黃帝顓頊唐虞且不下於百年天下大治由堯而來三千年間百世矣紀載之不可明紀者盖亦時有之矣四海之内或合或離或治或隳或唱或隨或强或羸一二世而其風已替固未有兼世而能一其風俗者雖有名世繼世而興猶必化之一洽教之一浹而後民之情始可以一變其繼周者茍能不替則雖民如夷狄三變而帝道可期矣觀時會通豈欲速之功哉奈何國無百年之世世無百年之道以其代有賢不肖奚啻相灑兹文王所以望而未見時之難人之難此治世所以常少亂世所以常多先王之治所以不務廣地而務詳其政教誠以天下之治難乎其變復也子曰愽施濟衆堯舜其猶病諸五畆之宅樹之以桑五十者可以衣帛矣雞豚狗彘之畜無失其時七十者可以食肉矣謹庠序之教申之以孝弟之義班白者不負戴於道路矣斯先王之政也五十者帛七十者肉則少者有不帛而不肉矣班白者不負戴則少者不免於負戴矣聖人之心非不欲少者衣帛食肉不負戴也而所養有不贍此病施之不愽也内無怨女外無曠夫則江漢之民無鰥寡矣老有所養幼有所長則江漢之民無孤獨矣數罟不入汚池則魚鱉不可勝食矣斧斤以時入山林則材木不可勝用矣斯先王之政也然江漢之域鰥寡孤獨無失養則逺人有失養者矣九州之内魚鱉草木無不若則逺物有不若者矣聖人之心非不欲九州之外鰥寡孤獨皆得養魚鱉草木咸若也而所治有所不及此病濟之不衆也愽施濟衆此堯舜之所以猶病之也惟易有言既濟亨小無欲濟世而不至於大則吾之仁有不盡矣仁有不盡則吾之施有不可得而必矣施不可必則天下之寒饑屈枉厄窮而無憀者何時已邪見其生則不見有弗及矣聞其聲則不聞有弗及矣况其逺邪是以先王不務廣地而於吾之所制每致其詳於吾所制茍致其詳則四海之内將有聞風興起視則而視效矣然則修已以安百姓是必勝殘去殺而後可也而􅀈者曰竢河之清夸者又曰日月冀爾是故或七八年或五六年或三四年不至於大敗極亂喪亡相仍不止則其視羲炎黃帝辰放皇覃也何啻朝菌與螟􅀈哉今而匹之不亦悲乎此予所以賛古人之久治而每為之三太息也啟統氏啟統氏别無攷見獨起居舍人章衡運紹記若通載有之而乃序之尊盧氏之後觀衡自言歴觀四部古人圖籙其亦有所取矣嗚呼治古盛徳之君未有聞焉者多矣豈非地寕天澄物無害生萬庶涵泳春風之中而不知所以為稱邪草木以土為生而不知土魚鱉以水為命而忘其水是故聖人父母萬物澤及天下而不知其誰氏上清𤣥格曰大道似不肖盛徳若不足韜光晦迹自翳其身而人不知其啟統氏之謂乎路史卷四

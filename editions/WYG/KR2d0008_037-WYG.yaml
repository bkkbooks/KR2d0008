body:
  text: 路史卷三十七宋羅泌撰發揮六堯舜用人堯舜皆聖人也其為治則既無不同者矣然稽所以為治何其異邪方陶唐氏之用人也必須僉舉而後舉之又必反覆難疑然後用之至於虞氏咨俞一出諸已有其舉之莫或廢也未嘗一言以疑其臣下舉之之私與人材之濫者朝廷之上急莫急於用人也而二帝之用人奚大異也或曰堯不逮舜故每疑其臣舜徳光堯故無敢繆舉此臯陶之所以為帝難之斯亦妄矣夫堯舜之為治豈容心於間哉亦善為應而已曰都曰俞安有二道一難而一易者正亦不得而不然爾且臯陶之所謂難之者非不之知也堯自不易之爾伊尹嘗言昔者堯見人而知之舜任之而後知禹則成功而舉之三聖之舉異道而皆成功是則天下之知人莫堯若也今而曰不知人則何以得之於舜乎惟堯能不自信而舜唯不自任不自信故謀之人而參之已不以大臣之言而必従不自任故明之心而合之外不以獨炤之精而遂間使疑其下曷以得人而亦何以為治邪雖然虞氏之時用人由已四族去而二八升陶唐之代反覆備至然四凶在廷則弗知去十六俊在野則弗知舉也是何邪說者曰史克之言是堯之不能爾噫亦厚誣矣夫所貴乎堯者以能允釐於百工也今也乆抑元凱則克明俊徳為虚言長芘四凶則百姓昭明為妄語矣聖人豈徒言邪蓋莒僕之去也宣公不能而行父能之彼史克者恐宣公之以不能去為恥而行父以擅去之為專故借是以為釋爾乃若堯舜之為固皆以垂法於天下後世者也抑再質之十六俊之舉非一載也固有堯舉之者矣四凶之去亦非一載也固有堯去之者矣惟堯之時黎民變矣故十六俊不盡舉不足以損其猷萬國和矣故四凶不盡去不足以病其治不足損其猷是故知而不舉將以訓後世之審官也不足病其治是故知而不去將以訓後世之御姦也而舜也起㣲出側以立人極茍不盡明於黜陟則不足以變天下之耳目是故納於百揆則八元八凱不得而不舉賓於四門則流放竄殛不得而不行是故昔不舉而今舉者將以訓後世之用人昔不去而今去抑將以訓後世之屏姦也是固不得而不然者雖然凶去俊舉朝廷清明而天下以治萬物以安此其宜也俊不舉凶不去玉石雜揉而天下亦治萬物亦安又何邪或曰禹之征苖受命於舜則舜之去凶亦受命於堯也堯將禪舜恐天下之未安也故留四凶以遺之去存十六俊以貽之舉俾其去取於一旦之内而猒服於天下之心是一説也夫如是則堯舜固已有心為之矣三聖之授受顧豈後世姦憸相濟者若邪舜之所以信於天下之人者亦豈俟於今日去凶而舉俊邪天下固已信之於竭力耕田供為子職之時矣豈猶是邪大抵堯之圖任一皆始謀於下故其所舉不得俱當而其所任有不得而不難舜居山澤之中退藏於宻天下之材否平日已茂聞而熟詳之矣及一朝而達之天下則材者為我用不材者自我去事至而應物來而名以故不下几席而得其情又奚俟於反覆疑難而後用哉况其所用稷契之倫皆出申命故或僉舉有不待於難疑而後可也嗚呼人其果難知邪其人堯邪惟堯而後與之合也桀邪惟桀而後與之合也非必不合也人君惟去其如桀者而就其堯者則奚患乎不知堯與桀也固嘗言之知人納諫君人之第一載也納諫者非有甚患也特患乎人不我諫耳納之與否惟君人之為之至於知人天下之至難者君能知人萬事畢矣堯舜之所以治由此道也後世而有作者其能以外此乎論治水先後天下之事未始有人之不可為者也得其理則無不易違其理則無不難方洪水之為患也堯求有以治之者可謂急矣然以鯀則不治以禹則治之何哉得其理不得其理而已矣夫水之居於天地之間也猶氣血之周於人之一身也一身之間血氣之流無餘欠也方水未乂豈有餘乎壅之失其道而特行於地上爾及其既乂又非其欠也導之得其理而遂行於地中也孟子曰智若禹之行水也行其所無事又曰禹之治水水之道也禹之治之豈任智鑿於間哉亦不犯焉而已矣方行地上伯禹治之必有所従始矣浩浩瀚瀚川原為一吾不知畚臿之功何従而施哉後世之人見其功之無涯而不獲其迹求其説而不可得於是以為神聖之事非人力之所能致遂引而歸之不可窮詰之域而怪誕之説行矣為老子者至謂道有所謂金丹之靈得而餌之則可以知萬物之名究川源之理而禹嘗得之未始不真以為䇿雷電而役鬼物也不惟學者疑之始吾於此盖亦嘗疑之矣於是盡取凡禹貢之傳而讀之則無不以為禹之施功自下而之上始之於冀次之兖青徐而終於雍雍土最髙故治最後其説也盖以禹貢之所叙九州之次言之未嘗不笑之也夫上者水之源而下者水之委也上者既已襄且懐之則下者淹没而無餘矣今也治之而先乎下萬萬無是理也吾固謂治水者必上流始顧禹亦豈能倒行而逆施哉予乃屏衆傳攝伯禹之書而復之目營手畫於九州之次而不得其説則復稽之九州之次以求之又不得其説也於是退而求之𨗳山之文而始得其説焉然後信予之所謂始上流者斷不疑矣夫九州之别不在於水工方興之時而畚臿之工必先於水害尤急之處盖别州者不縁乎其水而治水者不限乎其州不縁乎水是故荆梁皆及於沱潜沱潜者江漢之别也不限乎州是故壺口必載於梁岐梁岐者梁雍之山也始於梁岐有以見上流之必先及於沱潜有以見下流之居後事不愆矣子曰禹别九州隨山濬川禹曰予隨山而刋木夫濬川刋木必隨乎山者上流始也山豈可𨗳哉曰𨗳山者𨗳水而已是故四列之山自正隂以至於正陽自北而南也中國七水自河以及於江亦自北而南也𨗳汧及岐河之始功也至於王屋濟之始功也渭自鳥䑕洛自熊耳淮自桐柏此隂列之山也漢自嶓冡江起汶山此陽列之山也孰曰先後之次而不可見乎濬畎澮以距之川決九川以距諸海先下乎哉抑又求之堯水之害盛者莫過於河濟而短者極於渭洛河之害在於冀兖雍而濟之害在於兖青徐是故河濟則治其近而不治其源洛止於豫渭止於雍是故渭洛則附於河而不待致力盖河一治而渭洛自従也且九州之地固非皆苦鴻也有甚者矣淮次於漢漢次於江江次於濟此小大之别也淮之所被者徐而江漢之所被者梁荆揚顧河之害則冀重而雍輕濟之害則徐輕而青重至於江漢則荆揚為尤多也今治冀而首於雍則治青者必先於徐而治揚荆者先於梁也必矣所謂水之道也夫惟自上而之下故揚州惟一敷淺原而兖青徐則無山事不愆也若夫九州之次則特沉洪既平之後分别疆界陂其餘浸作其平陸平土定賦之叙爾以故自北而東之轉乎南然後折乎西以復於王所而九州之叙則又貢賦已定而銓次功績之輕重短長先難後易之次爾以故先河漢次江濟而末後於渭洛若夫涇則小而附於渭黒弱則又遐荒而尤大其功尤難故冠之河首俱非治水之先後也是則禹貢之書實非治水作也以定賦而附見伯禹之功也九川之列非出治水之時也乃史官所條難易之次也是故次𨗳山於九州之後而綴九川於𨗳山之尾斯可見矣竊復索之水之功始於河而訖於河首於雍而終於雍徐兖梁荆往來經界皆非止乎一至今而曰雍土最髙而治最後豈理也哉嗟乎禹之决瀆也因水以為師神農之為穡也因苖而為教鯀之治水惟知以土勝水而不能從其就下之性於是堙其泄以逆犯之而激其怒故一行汨於下而五俱廢上帝震怒不畀洪範九疇至於殛死禹乃嗣興從而𨗳之九疇乃錫九疇者出於理之自然而非人力私智之所致者也是故順之則吉逆之則凶然則伯禹治之豈任智鑿於間哉直不犯焉而已矣嗚呼由禹而來惟商都河北時或墊圯然而遇圯輙遷故訖無大害春秋之際山崩地震變故畢備然而獨蔑河患則禹之功施於人者亦大矣後世之水患固無以加於伯禹者而一河之患訖未見其可治何邪亦舍順効逆而已崇其防而廬其上此何見歟夫又安知鯀禹之所以為功哉興利之臣何至殘民而與水争尺寸以盛涯壖之鬼歟予論治水之叙愴禹之功傷乎世之用鑿而不足以知禹也故重嘆之煬帝水戲隋煬帝䝉眊輕姢不脩政事荒於嬉戲大業間勅學士杜寳常脩水飾圗經一十五卷新成以上已㑹羣臣於曲水縦觀水飾有神龜負八卦出河進於伏羲黄龍負圖出河𤣥龜銜符出洛大鱸銜籙出翠媯之水以授黄帝黄帝䄢於𤣥扈鳯鳥降於洛上丹甲靈龜銜書出洛以授倉頡堯與舜等坐舟浮河鳯皇負圖赤龍載籙出河授堯龍馬䘖中赤文出河授舜堯舜觀於河渚值五老人來告帝期堯見四子汾水之陽舜陶河濵黄龍負黄文符璽之圖出河授舜舜與百工相和而歌魚躍於水白面魚身長人奉圖而出授禹舞而入河應龍以尾畫地𨗳决水源禹從之治禹鑿龍門䟽九河濟江而黄龍負舟𤣥夷倉水使者於是以山海經來既又遇兩神女神泉之上帝乙觀洛黄龍雙躍化為黒玉帶以赤文周公輔成王舉行舜禮榮光幕河其類凡七十有二以七十二航貯之迭進為樂嗟乎名教之内其樂固自多矣何至於以聖賢為戲不亡何待貢法非不善彼哉龍子之言古也貢何為不善哉孟子曰夏后氏五十而貢商人七十而助周人百畆而徹貢者自治其田而貢其税畆五十而以其五貢助者借民之力以治公田畆七十而以其七助而徹則公私合併百畆而取其十畆矣貢者獻也助者藉也至於徹則徹之而已先王之制名斯可見矣貢何為不善哉昔者先王制民之産豈固欲為之數邪不得已焉爾五十而貢此伯禹之與民約者非可加也盖有損而已今而曰校數嵗以為常豈先王之意哉原禹之法亦曷嘗不本之時邪顧後之人不達其宜而易之以削是故有不善烏可以是而議禹之法乎今也覩戰國貢法之弊而以病禹此何理邪樂嵗多取不為虐豈君子之言哉夏諺曰吾王不遊吾何以休吾王不豫吾何以助是知夏氏雖曰定貢盖亦輔之以補助之政矣何特於周為亦助哉黄帝之時八家為井故十利得一為公田公田之有助亦已乆矣何特夏之為亦助邪三代取民雖名不同然取之以什一初不變也什一者仁義之政而三代之中行也多乎此則重之於堯禹而入於桀有以傷乎民而不仁少乎此則輕之乎堯禹而入於貊無以養乎上而不義皆非三代之中行也惟貢則有末世不善之弊而禹不能逆變於未弊之前助雖有乆逺可行之善而固不能專用於已行之後然則周兼貢助而以徹法取之亦時更而事異爾説者故謂周畿内用貢税夫而無公田視年之上下以為法畿外用助制公田而不税夫因民之餘力以治野詩曰雨我公田而周禮遂人興耡里宰嵗時合耦於耡旅師聚野之耡粟故耡為助惟助為有公田此則周之用助也令地貢以司徒均地貢以土均而閭師任農以耕事貢九榖司稼廵野以年之上下出歛法此周之用貢也惟其税畆而用賦則助之隳已乆矣此孟子所以特援詩以明助而不及貢誠知當時之貢不善而欲滕侯之為助也夫野九一而助國中什一使自賦則畿外之邦亦自内外異矣雖然皆什一也九一者自井言而什一者自藉言也自康成匠人之釋謂通率什一為正而頴達之徒乃謂助則九而貢一貢則十而貢一是則助之所取者重而貢之所取輕矣豈孟子意哉雖然夏商周之授田一矣而其數不同者則伯禹之時沉菑未逺九州之土固有見而未作作而未乂者人功未足以盡地利而可耕之地尚少故家五十畆而授㳂厯商周人力浸廣疆土益闢是故啇七十而周則百詩云信彼南山維禹甸之畇畇原隰曾孫田之我疆我理南東其畆是則其法之略於夏而備於周可知矣皇氏劉氏乃謂夏之民多故家五十商民稀故七十周民尤稀故百熊氏則謂夏之政寛故一夫之地稅其半商政稍急乃稅其七至周煩極故盡稅之而賈公彦復取六遂上地與夫司徒四等據地之法為言謂夏之貢據一易之地家二百畆甸百畆而萊百畆則二百畆而税百畆是五十而貢也商之助法據六遂上地甸百畆者萊五十故百五十畆而稅一百畆是七十而助也若周之徹則據不易之地百畆而盡稅之是則古之民常多而後世之民愈少古之稅常輕而後世之稅愈重古之地皆一易而後世之地皆不易豈理也哉夫又豈知三易之地周室盡有而六遂之地與司徒之法已不同歟夫不易之地家百畆則遂人之上地田百畆也一易之地家二百畆則遂人之中地田百畆萊百畆也再易之地家三百畆則遂人之下地田百畆而萊倍也是何周地益治乃多下地而夏商之世反無也邪况乃遂人上地加萊五十則既異於其説反覆無據則更以為司徒主鄙言而遂人主野而言徒亦不知六遂加莱司徒三易髙下之法豈得以是論之三代之貢助歟夏據一易固有上地商據上地豈無一易之田哉且既曰皆什一而載師之征復二十而一若二十而三與十二不同者載師之法征也特征於有地之主而非取於井牧之民也嗟夫閭師司稼此貢也非助也以廵野觀稼視年之上下出歛法則嵗以為常豈夏后之法哉孟子之言盖以救戰國一時暴取之弊爾今夫九州之貢賦既有每嵗之常矣至於他時嵗儉境驗乃復有錯出之賦因時制變凶年豈有取盈之理哉惟其後世不善用之知取必於每嵗之常而無雜出他等之時者此其所以為弊而不全歟惟昔太宗皇帝既平河東制和糴之法是時米斗十錢草束八錢民樂與官為市厥後物貴而糴不改遂為河東世患夫謂河東和糴為弊政則可謂太宗皇帝和糴之法不善則不可禹之貢法謂後世不善用之則可謂禹之法不善則不可今也漸於戰國之弊而以之議禹法是乃目熟無鹽臼頭窪目之狀而議南威西子非必天下之正色者也吾故曰彼哉龍子之言古也貢何為而不善哉辯塗山伯益古往之事學士之言十失而九伯禹娶塗山而立記於巴渝又起祠於陸渾㑹於塗山而建碣於鍾離復指表於巴渝益先禹死而避啟於箕隂請章陳之陸渾乃三塗山故盟㑹圖云塗山在亳州非塗山國誤矣蘇鶚演義辨塗山有四一㑹稽二渝州三濠州皆置禹廟四者文字音義所云嵞山古國禹娶之地然以宣之當塗為是益謬矣夫巴東縣塗山巫山也以其近江禹生之地尤非詳紀注夫禹年二十而事舜舜命繼鯀治水盖八載而後洪水平洪水平然後作其九州故夏書云作十有三載乃同九州之同逾壯盖數年矣方其作州也實始冀兖冀兖治然後作青作徐揚年三十娶於塗山以年計之正當急於徐揚之下故四日而亟往趨事則娶在壽春之塗明矣舜受禪時禹纔十餘嵗又二十餘年而娶故吕不韋云三十娶於塗山夫禹之仕不在於舜攝之初亦不接於鯀殛之日其去鯀殛也逺矣十嵗非能治水之時也頴達更謂舜攝之年九州治畢尤疎妄並詳紀中昔吴伐越隳㑹稽得專車之骨使人聞諸孔子孔子以為防風氏之骨禹致羣神於會稽所戮者㑹稽棟山也一曰塗山即防山也故傳又云禹㑹諸侯於塗山防風氏守封禺之間塗山之㑹最近而最後至此帝之所以誅之則㑹之塗為會稽之塗明矣地名改易最為煩亂今宜州南陵之東南有故當塗城及禹墟記皆以當塗山之國應氏以為禹娶塗山侯國按今當塗乃太康二年之于湖縣成帝時以江北之當塗流人在于湖者僑立當塗縣屬淮南晉州郡志云愍懐之亂郎邪王濬出鎮揚州因渡江南卜金陵建大業衣冠禮樂郡邑之名並随渡江徙北地當塗徕江南自東晉始也封禺二山皆在湖州武康堯之諸臣惟彭籛臯陶伯益為最壽臯陶年百有六而伯益逾二百然計其年亦皆前禹死矣烏有所謂避啟者乎臯陶當髙辛氏之末事唐厯虞及禹受禪従而避之則年百六七十矣伯益乃髙陽氏之子其猶子黎逮事其父則髙陽之崩益年不下四十厯髙辛唐虞凡二百二十載如年二百六十始及禹之受禪且攷於書何嘗有遜益七年之事惟臯陶見禹受命之初亦不及禹之沒故其序曰謨明弼諧言其建謀則明為輔則合見其徳之止於輔佐而禹之不終遜之也此孟子之失凡此之類書之則不勝書辨之則有不足辨者聊引其彚觸而長之可以三隅反矣小弁序小弁之詩刺幽王者按其序則太子之傅作焉然稽孟子乃以為人子之怨大者何哉夫既以為人子之有怨則是詩不得為太子之傅作而詩序不出乎孟子之前矣孟子之言或且妄乎曰不然人子之於親也惟欲用其情爾於吾親而不得用吾情是故時而至怨怨者所以致其親愛之情而已如其傅作之則是陳義以達其情者髙子雖固豈得以為怨乎惟怨之生猶煙之方鬱也不有以抒之則其志不能以自見而為溝瀆之經矣故必有以抒而合乎義是亦聖人之所許者惟其非義不得其情此髙子所以謂之小人也孟子曰親之過大不得不怨然則此詩為人子之心有慉而作明矣使由其傅其怨豈得為愈䟽乎且凱風亦非人為之作也曰若是則詩序彼皆非歟曰不然小弁人子之為詩也詩序聖人之所作也夫曰刺幽則其義已該矣而説者以為子之怨父不可以訓是以託諸其傅而已雖然中山勝趙臺卿俱謂伯竒所作劉更生且以伯竒為王國子正謂繼母欲立其子伯封而譛之王王以信之豈其然乎方幽王之嬖申后而愛伯服將逐其太子宜臼而殺之故太子作是詩而伯竒何稱焉伯竒尹吉之子也吉甫頷嗣妻之愬而伯竒黜固似之而非未足登也曹子建惡鳥論云吉甫聴後妻之讒欲殺伯竒厥弟伯封求之弗得乃作黍離之詩俗云吉甫悟而遊於田見伯竒為鳥伯勞因體其妻斯固弗信然韓詩亦以黍離為伯封作則伯封之作黍離也民莫不榖我獨于罹豈其傅之言哉踧踧周道鞠為茂草豈伯竒之言哉夏氏户口户口之登耗非必為國盛衰然昔之覘國者必以民人衆寡為貧富而論相者亦以近郊户口為優劣治亂之迹亦得見諸此也養民者君相之職也是故先王以天下為一家省刑役薄賦歛所以懷保而存撫之者無不至視猶赤子惟恐其生之不蕃也成周之時司徒以保息愛養萬民嵗終登籍則王拜而受之鄉官稽比較登其事尤悉故成王時生齒之息至千三百七十一萬四千九百有七十三幽厲之亂黎民凋䘮抵莊王十三年五千里外已非天子之御自公侯達民止千一百八十四萬一千九百有二十三而諸侯之國猶千二百桓公二年春秋二百四十二年干戈鼎沸民不聊生故其詩曰知我如此不如無生民盖以身而為累矣已則又曰我躬不閲遑恤我後則復以家而為累矣如此則奚望乎人之蕃息也自時厥後戰國縦横生民魚肉秦築長城四十餘萬阿房驪山七十餘萬伊闕之敗首斬二十四萬長平之戰死者亦四十萬餘如十萬數萬若五七萬莫可殫紀然如七國之戍猶五百有餘萬秦項殘鷙斬殺無藝漢初平城兵才説三十萬而人之以萬數者僅逾二百逮孝文時六十年間休養生息煙火萬里不幸武帝窮奢黷武末年海内虚耗大半所謂代天地司牧者固如是邪降魏訖周或離或合盖不足比齊髙置校籍官納户三百三萬二千五百二十有八隋氏平陳有户僅四百萬三百九十九萬九千六百四即後周數大業二年乃至八百九十萬七千五百三十六煬帝承之遂恣荒淫首營洛邑月沒丁二百萬𨗳洛穿淮引沁通􅃰還築長城率逾百萬丁男不足充以婦女亡死大半倍之大業之季乃至十室九空身䘮國㓕北史云大業元年發河南諸郡男女七百萬開通濟渠自西苑引榖洛達於河自汶引河達於淮唐氏承之正觀末年户猶不三百萬迨終天寳唐興百四十載而人户僅比於隋乾元三年户三百一十萬四千七百二十六時一百九十六州課户一百九十三萬三千一百三十四不課户一百一十七萬四千五百九十二肅宗即位較户籍禄山一亂損户五百餘萬五年之間三又失其二矣所以然者徒内以一楊太眞外一李林甫爾成難敗易可傷也哉通典天寳十四年户摠八百九十一萬四千七百九唐志開元二十八年户亦止八百四十一萬二千八百七十一獨通鑑言天寳初天下奏户九百六萬九千一百三十四口五千二百八十八萬四百八十八二書莫見然仁宗皇帝時三司所上亦載唐户九百六十萬九千一百五十四盖為有據乾元三年校天寳損户五百八十八萬三千五百八十四損口三千五百九十二萬八千七百二十三當是時雖河朔强梁民版不入平便有其半亦亾其半矣以此校之通典為實僅少七百然唐志言减天寳户五百九十六萬一千四百八十四又少十萬則知厯代最數無非大約方永徽中天下進户多上問户部髙履行隋唐户因奏大業八百餘萬今户三百餘萬及開元大蝗户口逃散始用宇文融檢括招携才得八十餘萬自是州縣率相偽增代宗之時户部户最二百九十餘萬稍復生息口千六百九十餘萬至元和初合方鎮户才百四十有四萬奈何憲宗弗之或恤勤兵掊割閩越之俗乃至計産而育民廹餒饑往往相食嗚呼民之生肅代徳憲間可謂真不幸矣郭子儀請罷兵於前獨孤及請息疲於後而聴者蔑或聞生齒之虧全由横歛李勃每為言而憲宗且不省方時氓民雖欲求同草木自生自死於天地間不可得也或曰有盛必衰有成必毁此天地之數也以漢文景而武帝繼之隨髙祖而煬帝繼之唐明皇而禄兒繼之盈極復虧固非人所能遏此胡寅所以謂愽古者言自古人君養民至千萬尸則止謂三代不之見兩漢而下誠未有溢此者何獨不經而乃不知漢元始間户至千二百二十三萬三千六百一十二二年口五千九百五十九萬四千九百七十八永壽三年亦至一千六十七萬七千九百六十口五千六百四十八萬六千八百五十六世紀元始户一千二百二十三萬永壽户千六百七萬九百六我宋寳元之元户一千一十一萬四千二百九十七編年一千三百一十萬寳訓一千一十萬四千二百九十慶厯二年乃至千三百三十萬七千六百有四十嘉祐三年一千八十二萬五千五百八十見長編六年増三十六萬五千五百九主七百二十萬九千五百八十一客三百八十八萬一千五百三十一八年乃至一千二百四十六萬二千三百十丁二千六百四十二萬一千六百五十一熈寧十年至千四百二十四萬五千二百七十吕祖謙數元豐二年千三百九十萬見曾鞏太祖皇帝總序何獨不之見哉仁宗皇帝嘗讀真宗正説養民篇見厯代户口登耗之數頋問侍臣天下民籍徧詢不能對乃詔三司編修院檢閲前漢以來户口上之國家首繼五季衰殘太祖皇帝初年州一百一十一縣六百三十八户才九十六萬七千三百五十三末年州二百九十七縣一千八十六户三百九萬五百有四洎章聖天禧間户已八百六十七萬七千六百七十七安養之效若此建隆元年吏部恪取諸道見在官户口增耗為州升降未㡬罷在漢長吏以户最課故州縣希㫖攤逃痩蔽多以客而為主若為增者故伏無忌記每帝之即位户口墾撮之田大數以見滋减帝以後且不復較則固其大畧者孝平以來莽眉繼起存者不十二三孝桓而後巾卓迭作存者十一二矣民哉民哉不殆於無生哉嘗竊蔽之唐虞伯禹升平者三百載而自湯至盤庚且二百年保民之主世出固非後世無事淺促者比户籍於時又豈千萬而已邪然稽之傳禹平水後口才千三百五十五萬三千九百二十三雖云堯代水土初平民户未息然塗山之㑹贄者萬國不以侯伯曷有甫千口而可國者人民財用在天地之間亦血氣之周於人之一身也豈有餘不足哉以隨平陳不三年而户之増者五百萬雖云時平滋息亦豈能若是遽此則文帝好為吏事郡縣竭力按括所至雖能驟致富强而大業之亂已瓦觧不可復故朝廷雖極富而郡縣已極貧兵籍至繁而民力已至困民之膏血今日已盡而明日之兵亦竭矣魏太和間民苦户調至更相隱冐三五十家而共一户楊炎括隱户輙田四百萬而民以重困開元中宇文融檢括匿户羡田一嵗之間至收八百萬畆而生民之力亦盡户最何得而視為實若古先王與民為生後世不能與之為生則聴其自為生亦已矣又從朘苦之征科日來疾視掊歛茍不至貧賤潰敗者不已此無以為生者所以於是亦輕用其生於垂亾隕絶之餘疾視其上而無依依不忍之意如先王之季者豈惟民之罪哉昔簡子為保障而尹鐸捐户數以寛民及韓魏亂而襄子獨免則前日之寛民者所以為襄子一旦之歸也民何罪哉虞夏之民養之既至教之又悉而無札瘥兵革之禍父子祖孫貫十數世為太平氓代天地之職者斯無媿矣故曰保民而王不能保臣民何為保王哉闗龍逄桀紂事多過實凡事出於千百載之下不幸而不知其詳則宜疑以傳疑何至妄為之説哉闗龍逄桀之大夫也其當時之死君臣之間必有曲折第後世不得而聞之爾而為説者必従而溢之其可信邪竊嘗求之逄之入諫也是豈溢惡之言哉上下之交亦有間言者矣其在竹書始以為諫瑶臺新序則以為諫酒池然其為諌一也及其死也韓子以為傷其四肢而劉向則以為拘之其事為疑然至符子則復以為就炮烙孰為信邪夫其説曰桀觀炮烙於瑶臺顧龍逄曰樂乎龍逄曰樂桀曰觀刑而樂何無惻隱乎對曰刑固苦矣然天下苦之而君樂之君心也臣為股肱孰有心悦而股肱不恱者桀曰聴汝之諫得我攻之不得我刑之逄曰觀君之冠危石而履春氷也未有冠危石而不壓履春氷而不陷者桀曰汝知我亡而不自知其亡請就炮烙使吾觀汝亡以知我之不亡逄乃歌曰休哉造化者勞我以生而休我以炮烙也遂赴炮烙逮汲冡張華書則更以為諫長夜之宫而薦之以必亡之語桀曰吾之有民猶天之有日也日亡吾乃亡矣以為妖言遂殺之夫危石春氷言之不倫顧豈逄之語而炮烙之事攷之書則紂之行不聞其為桀也大抵書傳所記桀紂之事多出模倣如世紀等倒拽九牛撫梁易柱引鈎申索握鐡流湯傾宫瑶室與夫璿臺三里金柱三千車行酒騎行炙酒池糟丘脯林肉圃宫中九市牛飲三千丘鳴鬼哭山走石泣兩日並出以人食獸六月獵西山以百二十日為夜等事紂為如是而謂桀亦如是是豈其俱然哉外紀用此王充云既牛飲則必虎食矣若池在中庭非長夜矣車行酒則非池矣騎行炙則非林矣殆傾酒地上旁流如池掛肉林中恣人取食戯走其中故云祼逐言無節度爾昔周公告康叔以紂用酒期於悉極無是說也使果引鈎伸索倒拽九牛此但力爾何預於亡而為至惡邪夫吞珠紿吏一事也韓子以為伍員國事以為張丑弓影致疾一事也風俗通以為杜宣晉史以為樂廣之客抱罋出灌一事也莊子以為漢隂丈人説苑以為衛之五丈夫逆旅人勸就國太公也說苑則云鄭桓公寒且作􅃭韓康伯也别傳則云張蕪誨為長者太史公謂渤海守於宣帝禇生以為北海守於武帝化不孝子仇覽傳謂蒲亭長於陳元謝丞書以為陽遂亭長於羊元挑土梗語戰國策謂蘇秦於李兊史記謂蘇代於孟嘗君體寢石有熊渠繇基李廣之異獻壽藥有荆王燕王漢武之殊而獻空籠亦有淳于髠蔡無澤之不同流傳轉妄莫可為紀新序楚熊渠見寢石以為虎射之沒羽韓詩亦云沒金吕覽論衡則曰由基見寢石以為兕射之飲羽漢書西京雜記則以為李廣鮑昭古詩注則又謂景公造弓體石梁飲羽戰國䇿有獻不死藥於荆王中射士奪而食之王欲殺士對曰若殺臣是死藥矣遂不殺漢武内傳則以為東方朔帝欲殺之云云類說則云有語不死之藥於燕王人既死尚求其藥國事蔡無澤獻鵠於齊中途失之以空籠獻而君厚待之一以為淳于髠於楚王以至芻說稗官此類尤煩如廣異記𤣥恠録俱有妻筝投果之言記言開元中有張李同學道李厭而歸仕至大理後謁張張饌之而李妻持筝不敢言投以林擒至歸猶在録則謂王恭伯謁裴湛見其妻持筝投以朱李逸史仙傳拾遺俱有箜侯為婚之事史以為盧李二生拾遺以為崔宇過薛肇箜侯上書天際識歸舟二句同也而集異記韋侍御華山遇老翁引見諸祖姑及阿婆等乃逸史楊越公六代孫事乃若爛柯流紅䴏女等事說各不一大抵文人說士喜相倣撰以悦流俗飽食終日無所用心則描前摸古甘隨人後而不自病其妄也爛柯事述異記則云王質入信都石室山遇童子棊東陽等記則云鼓琴而歌異苑廣異記等則謂有入山者見二老樗蒲拄鞭看之俄鞭爛鞍朽流紅事乃盧渥見雲溪友議及本事詩及張子京記為于祐北夢𤨏言則以為李茵遇鬼雲芳子詐作宫嬪而䴏女墳在麗情集以為姚王京南史乃王整之女衛敬瑜之妻也言桀紂者特類於此昔祖伊始謫於紂也惟曰淫戯自絶而已及武王數之斮涉剖賢炙忠剔孕斯已甚矣而史傳復有醢鬼脯鄂之文六韜更出刳心等三十有七章焉故子貢曰紂之不道不如是之甚也史記紂醢九侯脯卾侯明堂位云脯鬼侯以享諸侯吕春秋亦謂殺梅伯醢之殺鬼侯脯之以禮諸侯於廟鬼侯者九侯也而淮南子以為醢九侯之女爼梅伯之􅀈春秋繁露云生燔人聞其臭剔孕婦見其化殺梅伯以為醢刑鬼侯之女取其瓌則非殺鬼侯矣外紀云九侯入女於紂女不喜淫紂殺之而醢九侯鄂侯争而并脯之盖出世紀豈足盡信台嘗言之揚善毋過辭抑惡毋過飾揚善而過辭則人弗信抑惡而過飾則人弗戒夏桀之惡好貨便佞戮諫嬖嬉一事足以亾矣說者又何必過為之説而俾人之不戒哉汲冡古文册書云桀飾傾宫起瑶臺作瓊室立玉門而淮尸二子乃云為象廊玉牀至謂其時至徳㓕而不揚帝道掩而不興植杜槁而罅裂容臺摇而掩覆群犬獋而入淵豕䘖蓐而席隩美人挐首墨面而不容曼聲蜃炭内閟而不歌飛鳥鎩翼走獸廢脚山無峻幹澤無洼水田無立苖路無莎蘋金積折亷璧襲無理豈非過甚之言乎老子云世之將䘮主闇昧而不明道廢而不行徳㓕而不揚舉事戾於天發號逆四時春秋縮其和天地除其徳大夫隱遁而不言羣臣推異而壊常邪人諂而隂謀骨肉踈而不附田無立苖路無緩步金積折㢘璧襲無贏殻龜無腹蓍筮曰施云云盖因此而演之韓嬰詩傳更謂糟丘足望十里管子載言女樂三萬晨譟端門而聞於三衢衆言殽亂蓋曰不如是不足謂之桀爾徒使後世庸君僻主多為不義聞諫則拒曰吾之罪未至於桀也豈不失諸故凡言桀紂之事者吾不敢盡信也伐桀升陑辨道二仁與不仁而已湯之得天下也以仁而桀之失天下也以不仁以仁存心豈有利於間哉應天順人不得已焉爾孔子之序湯誓曰伊尹相湯伐桀升自陑遂與桀戰鳴條之野夫桀都安邑而湯都亳亳居安邑之東而鳴條在安邑之西陑又出其西南河曲之南其去亳與安邑也逺矣湯之致伐乃不従東逕擣安邑乃從下反上至於陑而反下乃趨鳴條何邪此仁人之師也夫師必兼行而倍道今也不然而反迂廽逺餉以出於陑盖將以示桀衆而使之知備焉爾以故桀得出而逆戰於鳴條之野事可明也嗟夫伐人之國又有仁焉予於升陑見之矣而孔安國乃以為升道自陑以出桀之不意仁人之師固出不意而襲人乎應天順人猶有慙徳襲人不意而何以為湯乎且既曰出不意矣而故反倍道而緩期邪其不然必也夫襲非用兵之道九伐之法無有也春秋之書襲特以見君人而行盗賊之事爾齊之技擊不可以遇魏氏之武卒魏氏之武卒不可以敵秦人之鋭士秦人之鋭士不可以當桓文之節制桓文之節制固不可以對湯武之仁義節制之兵已不事於詐譎而况仁義之師乎劉子政曰湯欲伐桀伊尹請乏其職貢以觀其動桀怒召九夷之師九夷之師皆至尹曰未可也明年又乏之召九夷夷不副矣於是興師以伐之仁人之師曷嘗不以正哉而或者猶曰兵行詭道有險可據彼不知恃我則據之有釁可乗彼不知備我則乗之用兵之道期於取勝而已他匪計也是故古者伐國不問仁人天予不取反受其咎方天所賛李靖能因之遂破吐渾宋襄公不能乗之而徒守區區之仁義果敗於泓湯之所以由陑蓋出此道斯亦繆矣李靖曰正兵受之君竒兵將所有晉羊叔子務修徳信以懷吴人每有交兵必尅日乃為戰不為掩襲陸抗對境行人不絶抗每告邊戍曰彼專為徳我專為暴是不戰自服也以祐且爾况湯武之師乎詭道兵家之所有也臨危赴急所以濟其不及者是亦將家之事耳而湯奚事邪始湯之得尹也爰問之曰桀惡甚吾將伐之也如之何對曰可也而非可悖也予其為子往䂓之於是適夏告以君民之相須者而桀弗惠乃大淫昬大不克明保享於民有夏之民叨懫日欽劓割夏邑尹既反而復往為之酒保思入其誨而桀任是暴徳誕為厥佚尹始醜夏復歸商而説之以伐夏故曰伊尹相湯伐桀知伐桀者非湯也伐桀非湯則其為伊尹矣時日害䘮予及汝偕亡則天下之民欲其亡也乆矣尹湯固不得而已也戰鳴條而後誓非豫戒之兵也兵不豫戒衆志協也衆志協而尚伺人之不意乎然則桀之失天下非湯取之明矣天取之也天何以取之民取之也民取之則天取之天取之則湯取之矣湯豈容心於間哉因民而已故曰湯放桀所以定禹功也襲人之兵五伯不為而謂湯為之乎嗚呼孔氏漢儒之冠冕也其於書亦多㒺矣謂文王内秉王心陽率諸侯事紂而武王之會盟津為卜諸侯伐商之心既乃退而示弱且謂四岳為不得已薦舜而湯出桀之不意率由妄度嗟乎天下之妄説詎勝窮哉前史氏言髙定七嵗問父郢以湯伐君事父曰應天順人定曰用命賞於祖不用命戮於社此順人乎小子之言君子至今誦之而乃不詳其為啟誓非湯誓也彼皇甫謐者更以為桀醉不寤而湯伐之其足徴歟湯遜觧卞隨務光許由在四嶽中莊子曰湯伐桀因卞隨而謀之不對又因務光而謀乃用伊尹克商之後遜於卞隨隨投椆水又遜於光光投盧水而死亦詳吕氏離俗覽云隨投潁水光投募水紀佗聞之恐其及已帥弟子踆於窽水三年申屠狄者聞之爰踣於河故列仙傳言湯伐桀因務光而謀光怒曰非吾事也湯得天下遜之於光光遂負石而自沉盧水狄商時人鶡冠子云申屠易以世溷濁負石投河故墨子有申屠投河河伯分流之説皇甫謐以務光為黄帝時而韓嬰劉向以為崔嘉謀之狄稱子胥洩冶以對大率難信矣夫湯之伐豈其所欲哉應順天人拯民水火而已雖然其義則應順天人而其事則臣伐君也是故放桀而後有慚徳而無喜色盖湯之意躬以自厚誠恐啟天下後世亂臣賊子因以為利而叛其君者將以台為口實云爾然則湯之心豈以應順天人而自是哉唯不以應順天人而自是此仲虺之所以陳諭引義而廣釋之深有懼夫湯之憂媿不已而有害維新之政且將以破天下後世之見惑者嗟乎以湯勇智豈以天下動其心哉其克商而遜之蓋有之矣彼卞隨務光其何以承之邪昔有堯嘗遜天下於許繇繇耻之而不受退逃箕山莊周稱之且以為有子州支甫者亦􅂪堯禪而舜亦嘗以天下遜之子州支伯與夫善卷北人無擇若石户之農又有狐不偕者亦以為不受堯禪投河而死茲盖戰國之際分義不明君臣相賊故周之論唯有所激然聖人之授天下豈如是輕哉此太史公所以致疑於卞務而以許繇之事為虚語夫以天下遜此堯之至徳也堯知天下之将爭且亂而欲以遜禪示天下後世之標則乆矣其非一日也豈唯其子之不肖哉朱而不肖九子而俱不肖乎且舜之未見也其遜固非一人矣其遜四岳也則許繇已在其列矣許四岳之祚也說者又奚必為異而以堯之禪為虚哉羅昭文云治天下者必曰陶唐氏有虞氏嗣天下者必誡曰無若丹朱無若商均是陶虞氏為聖人而朱均為不肖矣天下知朱均之不肖而不知肖否不在朱均在陶虞用朱均於不肖也陶虞将推大器於公也故以不肖名而廢之然後俾家不自我而家子不自我而子而不係乎朱均之肖否也朱均蒙不肖名於後世也許繇之迹盖甚章著非寓言者吕正獻云許由不可謂無其人盖有見也雖然事有大惑不可以不析墨子書言湯以天下遜務光既而使人謂之曰湯昔伐桀而遜於子欲加惡名於子也光耻之遂投清泠之淵其在韓子亦云然則斯舉也果姑制為之名邪湯無是也說林云湯伐桀恐天下言已之貪也讓之務光恐光之受之也乃使人說之云云此以小人之腹而度之者列仙傳云務光耳長七寸即暓光也荀子作牟光類林逸士傳云禹聘之為上卿光投於河韓子亦云投於河而仙傳以為武丁欲相之投於梁水皇甫謐又以為黄帝時人其不一如此盧水在右北平椆水在潁川或云在范陽清泠水在南陽西鄂周下云此人無擇所投至周書殷祝解則復以為桀遜湯之王位說者疑焉而墨子且謂夏桀既北湯欲比迹堯舜乃制夏人為之推遜豈其然邪噫嘻隋氏以唐王為相國加之九錫而髙祖以為魏晉繁文却之不受斯可尚矣然以兵取而必欲云受禪於隋則猶未免末世之弊陋也此成湯之事所以至末世為可言歟小人勿用易何為而作乎為小人而作也春秋何為而作乎為小人而作也小人之患何世無之不幸世衰封君世辟惑於聴察往往問君子於小人致其舞手蹈足於尺宅之前稔惡連禍無所遮避有似黎丘之鬼指以小人往往左右顧而不得見當此之時亦可謂危矣子曰惟女子與小人為難養也近之則不遜逺之則怨夫小人女子一皆隂類其肅殺之氣中於人也如商飈素雨受其害者日深月慘皆不得而知之自外視之固有似柔脆不能以自立而其為患則莫之禦也小子學易抑嘗即山澤之象而得聖人之寄矣少男少女艮兊之正也而其費乃至於為妾為閽寺閽寺男之賤而妾者女之賤也彼以一隂為恱乎外此以二隂為阻乎内隂幽險陂其事正如此也雖然上之人固有能知之矣然每弗之去而每近之者惟見善之不明與用心之不剛耽佚樂而好輭媚爾天下固未嘗一日無君子亦未嘗一日無小人也惟所御之而已御得其道則君子之道勝而小人從之化御失其道則小人之勢盛而君子従之去此安危治亂之所由分也君子小人義利之間果非甚難知也君子懷義小人懷利懷義者難進而易退懷利者易進而難退難進惟不茍合易進惟巧迎逄不茍合者人之所嫌而巧逄迎者人之所喜喜故易親嫌故易踈易踈則責之備易親則待之恕待之恕則一遂足以盖百非而百欺不足以為戾責之備則扶天之徳不能蔽纎芥之踈一日之違可以沒千朝之績盖責之備者每不以為君子而待之恕者常不疑其小人二者既渾則順已者必親而恪正者必逺理勢然也茍簡以鴆其身快暫而㤀後恤此人之常情也是以中材之主常逺君子而近小人小人樂有為器近而功速君子行其所無事業逺而道似踈是以喜功不好要之君常好任用小人而每至於速亂也君子有所恤小人無所耻有恤故每有所忍不耻故無所不為是以小人常勝而君子常窮此天下見治之所以常希濶也伊摰夏庖而興商姜牙商屠以王武百里奚虞之亡虜而覇秦韓信楚之亾卒而成漢荀彧袁紹之棄臣而彊魏燕之彊也樂毅去魏魏之起也崔浩辭晉此七君得之而七興彼七主去之而七䘮何如是之憲憲也失度佐而有扈伐狐攻專而驩兠放成駒權而三苖竄俟侈佞而桀奔左强䛕而紂折優旃用而晉禍寺貂任而齊危惠廧委而宋亂是數君者其好任小人則均而其身及於禍則又等也易曰小人勿用必亂邦也使小人而可用則何亡國敗家之有此先聖明王之所以嚴防而切戒之夫豈得已邪禍天下之首壞國䘮家之具誠無先乎此也諸葛武侯曰親賢臣逺小人此先漢之所由興也親小人逺賢臣此後漢之所由亾也故權徳輿論西漢之亡以張禹東漢訖録始胡廣而崔羣亦謂罷九齡而相林甫則開元之治亂已分矣夫一賢制千里之命而一佞亦足以亡國君子小人之消長實為天下之戚休治亂之隨迅逾響答去任之際渠可以不遴之邪善乎富鄭公之言曰天子無職事惟審辨君子小人而進退之此天子之職也若唐徳宗亦可謂昧已職矣蕭陸姜湯毫釐之忤負已彌天而韓竇之徒每至以功目罪是不亦以待小人之術待君子而以禮君子之具禮小人乎烏得不亂君天下者其可不深戒於此而佚樂輭媚之是好邪路史絶筆昔湯遷九鼎於亳至大同而有慙徳武王布車遷九鼎於三巫及鹿丘而不進義士非之是以聖人刋書於君道則首以二典於臣道則始之兩謨皆以若稽古之言命之至商周氏之書俱不䝉焉豈非以堯舜禹臯益稷之事為可稽而商周之君臣有不足法歟曰若引辭李尤陽徳殿賦云曰若炎唐稽古作先李善引書皆作粤乃古書也若稽猶曰謹按云爾非訓順與如也兩謨者益稷合於臯陶謨故門人於堯曰之篇上記帝王之所以得天下在子一人以上下言帝王所以為治之道謹權量以下於堯舜禹則賛其執中至湯武則惟稱其罪已湯不執中邪盖門人之學所得於聖人之意者如是此則路史之所以為終也且作會而民始叛五典由是而薄矣有虞氏紀論未施信於民而民信之夏后氏紀論未施敬於民而民敬之其以是觀之論語堯曰之說書獨不録堯言禹謨所記乃帝舜命禹之言湯誥亦無成湯萬方有罪至以爾萬方之語盖聖人所見之博互為存去也或以為兩有脱錯妄矣嗚呼聖人之心其所以待天下者亦深而所以待後世者亦厚矣唐虞之時為君者揖遜乎其上為臣者訏謨乎其下天下未嘗争且亂也湯武固聖矣然其事則放焉殺焉伊周固忠矣然其事則放焉攝焉不幸而不變必湯武伊周為之則忠且聖也或聞之不詳其事而襲其迹其能保其終無争且亂邪是聖人以堯舜望天下後世之君而不願其為湯武之君以禹臯益稷望天下後世之臣而不願其為伊周之臣其所以待天下後世者可謂深且厚也後世學士不知出此而乃以為詩書始終之序皆出偶然無意至温公作稽古録爰始伏羲而終孔子遂以湯武干之豈聖人之㫖哉不然篤信明義崇徳報功之前非台敢稽路史卷三十七

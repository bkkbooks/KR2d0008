body:
  text: 路史卷三宋羅泌撰前紀三循蜚紀鉅靈氏鉅靈氏之在天下也握大象持化權乗太極而蹠灝淑立乎無間行乎無窮揣九變化而與物相弊􅀈遁甲開山圖云鉅靈與元氣齊生為九元真母出於汾脽汾水之脽上也其地隆起若尻脽然今成慶軍是廣韻云鉅靈出于汾脽今華陰縣北一百二里有鉅靈廟九域志云鉅靈祠河中府也揮五丁之士驅陰昜反山川正流並生神化大凝李淳風小卷云元始判氣天皇上帝鎮立名山各有所屬分野盖當是時六合之門有未融者故鉅靈女媧之徒以神通智力出而賛化也五丁盖非一按世本及蜀紀華陽志益州紀十三州志成都記等皆言五丁事蜀王開明負力能徙山通石則目以五丁矣又言五丁其時未有號謚但以五行方色為主故廟有赤黒黃白之帝云惟無恒處或云治蜀盖以其迹躔焉傳載鉅靈之迹多在蜀豈别一鉅靈邪薛綜以鉅靈為河神盖本水經所引謂國語華岳當河河神鉅靈手盪脚踏開而為兩言之今國語亦無此文又漢武帝内傳時東都送一小人長七寸東方朔謂為鉅靈異矣予既得丹壺名山之記又得吕梁碑獲逆帝王之世乃知天未喪斯文也丹壺書云皇次四世蜀山􅀈傀六世渾敦七世東户十七世皇覃七世啟統三世吉夷四世九渠一世狶韋四世大巢二世遂皇四世庸成八世凡六十有八世是為因提之紀倉頡一世栢皇二十世中央四世大庭五世栗陸五世麗連十一世軒轅三世赫胥一世葛天四世宗盧五世祝融二世昊英九世有巢七世朱襄三世陰康二世無懐六世凡八十有八世是為禅通之紀可謂備矣而又有鉅靈氏句彊氏自句彊而下次譙明氏次涿光氏以次至次民氏如下所叙總曰循蜚紀有號而無世自是而上亦惟有九皇氏地皇氏天皇氏又上而乃有盤古氏基之渾沌之説其言渾沌之初所謂上無復色下無復淵為説甚繁非足貽訓故絀焉自無懐降所叙與名山記大同此予之史篇所取􅮙者也鉅靈之號此世所聞焉者也遁甲開山圖云鉅靈與元氣齊生惟始氣之先者又曰鉅靈胡者偏得神元之道造山川出江河神化之宜豈非鶡冠子之所謂尸氣皇者邪予得是書乃更為之不疑也然上之五紀卒寂寥而無詔系不得而綴矣兹亦可謂富也謹闕之以俟以下辨論本史成而立説元不在正紀中子姓楫客凖例諸史將便觀覽取之以附於逐篇之末故其中所用字俱在已所用有異覽者知之句彊氏譙明氏涿光氏伯益之書有譙明之山涿光之山而俱載於北經譙明􅃰光信其為繼治者乃知邃故之事非必無傳特恨幽介弗之究爾予觀於經而信二書之足丁也鉤陣氏黃神氏黃神氏或曰黃祙黃頭大腹出天參政見春秋命厯叙云出天齊政則有官統故賈公彦云九頭紀時有臣無官人皇有輔佐燧皇伏羲既有官則其間九皇六十四氏有官明矣無文字以知官號也無易天生無散太璞按圖正端是致天極鶡冠子云物之始也傾傾至其有也碌碌至其成形端端正正勿損勿益幼少隨足以從師俗無易天生無散太璞自若則清動之則濁神聖踐承翼之位與皇神合徳按圖正端以致天極兩祭四致聞以正息云云三百四十嵗􅩅神次之號曰黃神見命厯叙按道家亦有所謂黄神盖與此異本起經云三始之道太初者道之初也其初精盛則為元明名曰太陽又為元陽子丹乃化道君故曰道之初蔵在太素是為一氣太素者赤氣也初變為黃名曰中和中和為老子乃化神君名曰黃神入于骨肉以之為人故曰人之素蔵在太始則二氣也太始者氣之始也黃氣乃復歸于白氣白若水精名之太陰為太和君此為三氣持亦體中之事而歸蔵經言者黃神與炎帝戰于涿鹿則以為黃帝矣抑又非此􅩅神氏人皇氏沒􅩅神次之出于長淮駕六蜚羊政三百嵗五葉千五百嵗見春秋命厯叙犁靈氏東荒經有犁靈之尸犁靈氏之尸也以不壊於予之路史亦異矣凡孔聖之未嘗言者予皆極言之矣予非好為異也非過於聖人也夫以周秦而下汔於今耳之所納目之所接其駭於聽熒者夥矣况神聖之事凡之莫既者邪是堯舜崇仁義六經論語其理備矣顧且言之吾見焦唇乾呃而聽之者愈悠悠也是故莊周之徒罵以作之意以起之而後先王之道以益嚴然則予之所摭正亦不得而不異爾予悲夫習常翫正與夫氛氛日趨於竒者之不可以虚言格也於是引其暱而景者著之此亦韓將軍學兵法之義而蕭相國作未央宫之意也雖然訞詭亂惑猶弗薦焉覽者知夫譲王胠箧漁父説劍之惜則吾知免矣大騩氏大騩氏見于南宻河南宻縣有大騩山記謂大騩氏之居即具茨也或曰泰塊昔者黃帝訪泰塊于具茨中山經次七敏山之東三十里大騩山又次十一有大塊山注滎陽宻縣大騩山也即具茨今在許之陽翟集韻具􅀈山一作次􅕆詳黃帝紀言歸大騩即大騩氏一曰大騩姓源韻譜云天水有大隗氏云出于大隗氏盖設於無垓坫之宇而臺簡以游泰清者後有隗氏大隗氏姓苑等鬼騩氏鬼騩氏後有嵬氏饒氏攘氏刹氏鬼騩氏嵬及鬼騩皆古侯國和莵史云古有大嵬氏鬼嵬氏嵬騩古通用潜夫論云嵬姓饒攘刹是也三國宜皆炎帝之代封之一作攘刹者訛弇兹氏泰逄氏和山者實為河之九都吉神泰逄司之于萯山之陽出入有光見山海經今東陽有萯山孔甲畋處字音培集韻倍負同音培云河神一云倍尾山世紀云即東首陽山太平御覽作萯山音為頻繆矣泰逄氏之神也子曰鬼神之為徳其盛矣乎昔者宰我請問鬼神之名子曰氣者神之盛也魄者鬼之盛也合鬼與神教之至也故無鬼神則鬼神之名不立矣奈何季路之問事鬼則曰未能事人既問死則曰未知生説者往往以生死鬼神為性命道徳外事有不可以致詰而子路未可與言故夫子不與之言夫若是則夫子既不誠於人之子矣聖人之言未嘗不自盡也鬼神生死人事之大奚為而不語邪盖能事人則能事鬼知生則知死矣生死者特性命道徳中之一事而鬼神者特性命道徳中之一物爾豈復外乎雖然神者天之徒鬼者物之徒也惟人之初與天為徒孰不具此神哉惟生之後開閉之不謹而好惡之偏適從而蔽之也古之聖人惟其然也是故開天之天而不開人之天閉人之竇而不閉天之竇開天者徳生開人者賊生徳生者陽明勝陽明勝故識性用賊生者陰濁盛陰濁盛故物欲行識性用則歸於神物欲行則歸於鬼歸於神者與天為徒歸於鬼者與物為徒亦天地之理也今夫天陽而地陰魂陽而魄陰是故智氣歸天而體魄則歸地神陽而鬼陰君子陽而小人陰是故正直為神而憸險則為鬼徳陽而欲陰男陽而女陰是故徳盛成男欲盛成女禽陽而獸陰老陽而釋陰是故釋誤多毛老誤多羽君子於此其可不毖又毖而自墮於鬼物之區哉三五之時人聰明而淵懿純天而不人是以黃帝太少神農顓頊専享乎其上句龍芒蓐祝融𤣥㝠作配乎其下其事然也帝嚳而來不能紀逺然而禺强閼伯𤣥枵諸稽實沈駘臺咎陶伯益豕韋䕫稷之流秩猶不遷之祀橫窮卓偏剛毅一真烏往而不神哉叔末之人佔侸僋俕綦溪利跂正直之道消而憸險之行多是以不能神明而歸于物詩云三后在天王配于京本賢愚也孔填不寕降此大厲逢吉凶也三塗六道其僣有自來矣期期區畛亦予之熱熱肺也冉相氏冉相氏得其環中以隨成與物無終無始無幾無時日與物化者一不化者也此之謂真人見南華真經注云環中中庸之道中之為道帝王之心即治天下之正道而聖人所以示世入徳之大方也自成世以來未有不本是以為政而能馴致於大治者今夫率意而射則終日無所中率意而視則終身無所與必也質的設而後天下之手無異鄉日月揭而後天下之目無異屬聖人之道獨立乎中而後天下之心無兩從盖中也者極之則世人之日月質的也衆見之所宗萬手之所會理之至義之盡配天地而不可以復進是故道得之而為太一天得之而為天一帝得之而為帝一帝一者立乎環中渾兮如有容泊兮如未始出其宗而茫兮無所終窮自伏羲氏以之傳炎炎帝氏以之傳黃無異付也堯帝氏以之傳舜舜帝氏以之傳禹無異語也降及湯文伊尹周公而中之所以為變者盡矣春秋之世惟皇不極而厥庶民亦失其所以保極之道以故上慢下暴王室如燬數千百年而不之復則極之不建其禍正如此也嗟乎臯謨箕範中極之説備矣此家所有也大易之書明言中者五十有五所不言者否剥屯頤咸革賁遯明夷九卦而已内之中六十有四外之中亦六十有四得其中動罔不吉失其中動罔不凶是故否剥之五亦獲其吉而復泰之三不免乎凶惟其中之不可失也雖然中庸之徳民鮮久矣自漢諸儒取過不及之説類之孔伋之書世遂泥於過與不及之中求之亡其統矣夫君子之於中無過也有不及而已致廣大極髙明夫孰得而過邪冉相之道兹其所以寂寥希濶而不繼之豈不􅜢歟聖人人倫之至者也欲為君盡君道欲為臣盡臣道盡倫盡制豈過不及之云乎而彼傖者附誠明假權變繳繞呫囁以綢其婟而濟其姦豈惟無忌憚哉其不至於幸小人而病君子亦已矣此予之所以賛冉相氏而為中庸泚也盖盈氏若水之間禺中之地若水之間地當川蜀在西南方此禺中之名所為立以知東北朔易前聖之為有説不盡朔易説詳發揮一有盖盈之丘盖盈氏之虚也海内朝鮮記南海之内禺中之國以去有九丘有陶唐之丘叔得之丘盖盈之丘昆吾之丘黑白之丘神民之丘以水絡亦陶唐昆吾之流也大敦氏雲陽氏雲陽氏是為陽帝見道書盖處于沙沙長沙所謂萬里沙見遁甲經今茶陵西南十里雲陽山也又萊之掖縣有萬里沙祠亦著甘泉以故黃帝以來大祀于甘泉甘泉山本亦曰雲陽在馮翊雲陽縣雲陽氏之常居云丹徒董覽呉地記云曲阿秦時曰雲陽嶺太康地記云曲阿本名雲陽秦始皇鑿北坑以敗其勢截其道使阿曲而名呉録云改曰丹徒天寳元年曰丹陽今屬潤絳北者非也十道志言雲陽氏古之仙人開山圖以為雲陽先生之墟言陽石山中有神龍池黃帝時雲陽先生養龍於此為歴代養龍之處水旱不時祀之中有神書鐵劵玉石之記故三輔黃圖引為雲陽先生然開山圖所言陽石山在絳北又非雲陽氏也遁甲經云沙土之福雲陽氏之虚也可以長往可以隐處雲陽之山在衡山之陽只今茶陵之雲陽山也予游衡湘道其麓見山川之靈秀土膏水沉方皇不忍去亦意嘗有異人者自之西首山阜麗倚皆西面而北上朝衡嶺矣然考之皇甫紀實為少昊之封雲陽氏之蹤固在甘泉甘泉之山本曰雲陽以故黃帝以來每大祀于甘泉則長沙之地其亦為始封乎雖然丹陽曲阿亦秦世之雲陽嶺也呉地記録曲阿正秦代之雲陽嶺太史時言東南有天子氣在雲陽間秦人於是發赭徒三千鑿雲陽之北岡曲之因曰曲阿則今之丹徒也昔呉岑昬鑿丹徒至雲陽杜野小辛間而陳勲屯田鑿句容中道至雲陽西城則今之破岡瀆也故杜佑以丹陽為古雲陽而學道傳謂是茅山若絳北之陽石者非其正矣載言之流以為僊者盖知其異也巫常氏泰壹氏泰壹氏是為皇人道言天真皇人者泰壹也杜甫云泰壹奉引包羲在右堯步舜趋禹馳湯驟開圖挺紀執大同之制調大鴻之氣正神明之位者也是故九皇傳授以索其自然之所生復自然之解與天地之所始見鶡冠子三皇經云皇人者泰帝之所使在峨眉山黃帝往受真一五才之法泰帝者泰皇氏也傳言泰帝興神鼎説者以為伏羲失之三十九章經云九皇上真玉虚君也即泰皇矣今鶡冠子有泰皇問泰壹天地人之事三孰急云昔者神農嘗受事於泰壹小子本草經而黃帝老子皆受要於泰壹元君盖范無形嘗無味要會久視操法攬而長存者開元詔盧鴻云鴻有泰壹之道竇華云洪荒無為之道按鶡冠子云泰壹之道九皇之傳清成之初太始之末見不祥事於名理之外范無形嘗無味以要名理之所會抱璞内篇及𤣥籙皆言泰壹餌金液而仙而亳人繆忌謂泰壹者天人之最貴故漢武以李少翁之言祠泰壹于甘泉然道書謂泰壹君者諱臈又言身中亦有所謂泰壹者諱務猷盖不足攷有兵法雜子陰陽雲氣黃冶及泰壹之書兵法雲氣書傳間出而黃冶雜子漢後不復見漢志七略有神農兵法黃帝兵法又有泰壹兵法一篇有伏羲雜子黃帝雜子又有泰壹雜子五十三篇泰壹雜子星二十八卷泰壹雜子雲雨三十四卷泰壹雜子黃冶三十一卷泰壹雜子候嵗二十三卷泰壹陰陽二十三卷兵法今或見之兵書其書言黃帝謁峨眉見天真皇人三一經云黃帝游靈臺青城山絶巖之下見天真皇人而上清記龍蹻經四極明科苞元玉籙抱璞子等皆言黃帝謁峨眉其事甚著或云在青城乃見寗封於青城爾事見玉匱寗封告帝曰天真皇人在峨眉山因授龍蹻等事見上清記及青城等記今青城有寗封洞室軒后壇及黃帝轍跡甚多拜之玉堂曰敢問何為三一之道皇人曰而既已君統矣又咨三一無乃朗抗乎古之聖人盍三辰立晷景封域以判邦國山川以分陰陽寒暑以平嵗道執以衞衆交質以聚民備械以防姦車服以章等皆法乎天而鞠乎有形者也天地有啟閉日星有薄失治亂有運會陰陽有期數賢愚之蔽夀夭之質貴賤之事吉凶之故一成而不變類氣浮於上而精氣萃于下性發乎天命成乎人使聖人以為之紀是以聖人欲治天下必先身之立權以聚財葵財以施智因智以制義由義以出信仗信以著衆用衆以行仁安仁以輔道廸道以保教善教以政俗從俗以毓質崇質以恢行勤行以典禮制禮以定情原情以道性復性以一徳成徳以叙命和命以安生而天下自爾治萬物自爾得神志不勞而真一定矣予以蕞爾之身而百夫之所為備故天和莫至悔吝屢庚生殺失寒暑之宜動静戾剛柔之節而貪欺終無所用無乃已浮乎黃帝乃終身弗違而天下治其為教也至矣此所謂玉珮金璫妙文也自使聖人以為之紀以上集仙録稍革其語以為雲華告禹之言水火大淵之事其所言哉楊谷授道記云黃帝見天皇真一之經而不决遂周流四方謁皇人於峨眉而問真一之道其言大率論水火絳宫大淵之事云予所叙古之帝王其世治夀考無以稽矣計其年皆不乏三數百嵗黃帝曰上古之真人夀蔽天地盖天真全而天一定不􅉸其元者也又曰中古之時有至人者益其夀命而强者也亦歸於真人而已盖乗間維而基七衡陵罔閬而隘八落者也又曰後世有聖人者形體不蔽精神不越亦可以齡逾數百雖有修縮之不齊亦時與數當然爾然未有不死者見素問天老養生經老子云人生大期以百二十年為節度䕶之可至千嵗釋氏有所謂無常經云天地及日月時至皆歸盡此言雖陋以台觀之物莫不有數有數故雖天地莫能逃山亡川邕郡陷谷遷沙漠遺舊海之蹤厓險著蜯蠃之甲晉殿破榏昆明刼灰則所謂地屢敗矣河側州郡今嵗在河南明年决出河北東西海岸亦皆如是今西北荒外沙漠之間皆是滄海遺跡而太行麻姑朱崖等山險崖石罅皆是蠃蜯之殻顔魯公等以為桑田之變者也土石自天星隕如雨或夜明逾晝或越裂崩地則天有時而毁矣雨土霣石星霣夜明並詳發揮雨粟説天崩裂事後世尤不勝多漢恵二年天東北開晉太康二年西北裂大安二年天中裂咸和四年西北又裂昇平五年天中裂哀帝即位又裂梁太清二年西北裂陳至徳元年十二月從西北開至東南或百丈或數十丈有聲如雷山雉皆呌或見宫室之類按内經云天墜將相死若見名字妄言語為凶殃十二年易主蕭子顯齊書永元中夜天開而時趙録建元初天大裂麟嘉二年天崩五年又崩唐乾元四年正月十八天中半裂是均于幻然亂應可知故曰乾坤毁則無以見易易不可見則乾坤或幾乎息矣宛首亦曰天地運度亦有否終日月五星亦有虧盈而况於人乎宛首道君之號奈何封君世辟不知乎此蔽於方士之言以求不死不死邈然而小者亂貽天下大者喪身失國不可勝數矣稽之其徒初無是説許玉斧言黃帝鑄鼎以疾崩葬橋山莊周言老子之死秦佚弔之三號而出而師曠亦謂周太子晉色赤不夀後三年而死孔子聞之曰惜哉殺吾君也是老子初無青鹿上陞之事黃帝初無蒼龍髙蹈之言而子晉初無綵鳯空騫之語皆方士之徒設辭以愚弄其君而取寵亦自其教之害焉且物壯不老是謂不道陰陽固有終變偓佺千嵗彭祖七百亦必死而已矣而荒君亂主方僕僕信事之以至于敗亂而終不悔豈不􅥒哉昔班生謂道家本出史官歴記成敗存亡禍福古今之道然後知秉要以自守清虚以自持君人南面之術而老君亦令㓂謙盡去三張偽法盍氣穢事謂大道清虚顓以禮度為首豈有兹事竊究其要與世禮正翓􅀈而尤以信行為輗軏初無不死之言子貢有云死生有命而孔子亦曰衆生必死自古皆有死使孔子而非聖人則斯言為不可信予悲夫世主之甘心於其聾瞽而不悟也故愽觀死生之際而極論焉尚其曉然知之而不蹈於悔也空桑氏空桑氏以地紀空桑者兖鹵也其地廣絶髙陽氏所嘗居皇甫謐所謂廣桑之野者或云窮桑非也窮桑在西小顥之君詳少昊紀若乃伊尹之生共工氏之所灌則陳留矣伊尹産空桑在陳留非魯地吕不韋等謂伊尹之母化為空桑尹生其中大妄空桑在東窮桑在西歸蔵啟莁云空桑之蒼蒼八極之既張乃有羲和是主日月職出入以為晦明盖指隅夷之地故記孔子生於空桑春秋演孔圖云徵在游於大冡之陂夢黑帝謂已汝産必於空桑而干寳所記徵在生子空桑之地今名孔竇在魯南山之穴故孔廟禮器碑云顔育空桑空桑魯北孔子魯人故説者指云空桑槩而言之魯南山穴之説正自戾矣乃若共工氏之振滔鴻水以薄空桑則為莘陜之間伊尹莘人故吕春秋古史攷等俱言尹産空桑空桑故城在今陳留固非魯也故地記言空桑南把而北陳留各三十里有伊尹村而所謂窮桑則非此矣拾遺記言窮桑者西海之濵也地有孤桑千尋盖在西垂少昊之居梁雝之域故周書嘗麥云帝命蚩尤宇於小顥而逺遊章句西皇所居西海之津西皇者少昊之稱而小顥者少昊之正字也宜為咸陽故咸陽曰雲陽而少昊一曰雲陽氏雲陽縣今𨽻曜漢甘泉宫即武帝之太畤也顓頊繼少昊者故世紀顓頊亦自窮桑遷商丘事可知矣而杜預遽以窮桑為在魯北至釋例地名乃云地闕故頴逹云言魯北者相傳言爾盖以定四年傳封伯禽於少昊之虚逆之而樂史之所記乃在曲阜此又因預而妄之也太昊在東少昊在西予既言之拾遺逺遊窮桑既在西極則魯曲阜之説得非太昊之虚乎郡國志云少昊自窮桑登帝位非空桑也神民氏天地開闢爰有神民民神異業精氣通行見潜夫論十列都于神民之丘山海經陶唐等九丘有神民之丘盖其所處一曰神皇氏駕六蜚鹿政三百嵗春秋命厯叙倚帝氏都倚帝山山海經有倚帝之山唐呉筠下第遂居南陽倚帝山即此竇子野云今内鄉東三十里踦立山也次民氏次民氏是為次是民洛書摘亡辟注以次是民為皇次屈非也次是民沒元皇出天地易命以地紀此春秋命厯叙文與洛書摘亡辟同注云次民沒民始穴處之世終也六皇者此此以下辰放氏而始穴處之世終矣丹壺之書其不繆歟今既闕著而或者有不懕命厯之叙其亦有所來乎胡為而多盍也貴人云何子之好言古曰有是哉今古一也若以古為見邪荀況有言詐人者謂古今異情是以治亂異道而衆人惑焉彼衆云者愚而無知陋而無度者也于其所見猶可欺也况千世之上乎彼詐人者門庭之間猶挾欺也况千世之上乎以心度心以類度類以説度功以道觀盡今古一也類不孛雖久同理故往縁曲而不迷也五帝之時無傳人非無賢人久故也五帝之中無傳政非無善政久故也虞夏有傳政不如商周之察也而况次民倚帝之時乎以今觀今則謂之今也以後而觀則今亦古矣以今觀古則謂之古以古自觀固亦謂之今也古豈必古今豈必今特自我而觀之千世之前萬世之後亦不過自我而觀爾傳近則詳傳久則略略則舉大詳則舉細愚者聞其大不知其細聞其細不知其大是以文久而惑滅節族久而絶曷古今之異哉右循蜚紀二十二氏六十餘世路史卷三

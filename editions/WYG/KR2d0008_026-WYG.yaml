body:
  text: 路史卷二十六宋羅泌撰國名紀三髙陽氏後髙陽三帝之初封瀛之髙陽縣在髙水之陽也至道三割𨽻順安然棘城實為髙陽氏之虚栁城東南一百七十今浚儀亦有髙陽故城葢後所都濮陽僖三十一帝後所都今澶之屬縣所謂帝丘有顓帝城城内帝冡亦號顓頊之虚梁西梁伯益國地理風俗傳扶栁西北五十有梁城故漢西梁縣西梁故城在今冀之南宫堂陽鎮鎮之東鹿南六十縣道記西梁故城二三里一名五梁城後漢入扶栁南梁在汝詳周後國以别大梁少梁云􅨝梁析傳謂顓頊大􅨝之後詩云薄狩于􅨝是也今沂之新泰東十一故􅨝國有􅨝山昔尭伐胥􅨝者安姬姓今壽之安豐與六近故漢為六安地書述六失安蓼姬姓侯爵淮南子陽侯煞蓼侯楚公子爕滅之襄王三十年今壽之霍丘杜云安豐蓼縣安豐城在霍丘南十三有蓼故城武徳四為蓼州七年廢寰宇元年立九年廢圖䟽云在光州廣記云偃姓水經臨水縣西翏邑臯陶之封皆誤與舒蓼别安蓼皆姬國也故班志云安姬姓國而世本蓼亦姬姓則俱庭堅後矣杜預乃以庭堅為髙陽之字妄也按文公五年秋楚仲歸滅六冬公子爕滅蓼臧文仲曰臯陶庭堅不祀夫臯陶乃少昊之後四世而庭堅則髙陽氏之子六臯陶之後而蓼則庭堅之後也預既誤以庭堅為臯陶字乃復以蓼為臯陶後偃姓失之矣予嘗考之臯陶之後有舒蓼而非蓼也舒蓼偃姓而蓼則姬姓蓼滅而舒蓼猶在至宣公之八年始滅其地乃壽之霍丘而蓼乃安豐地正相逺舒蓼與蓼地正為二而舒又自一國黄帝之後任姓見潜夫論預既不知别有舒與蓼而乃妄分臯陶之後舒蓼以為二謂皆偃族正義遂以為文公五年蓼滅而復封楚復滅之果皆臆見僖公之三年舒已滅矣己邔紀也故南郡邔縣己姓之祖昆吾昭十二哀己姓樊之國衞是澶之濮陽昆吾氏之虚也十七隨昆吾縣開皇十六置在顓王城内武惪四復割置濮陽八年廢城中有昆吾臺所謂昆吾之觀寰宇以昆吾為觧之安邑夏末遷許顧哀十四己姓子今濮之范東南二十八有古顧城人表以為鼔師古云即顧温己姓子今孟之温西南三十有古温城漢温縣僖十年秋滅温温子奔衞後襄王以賜晋忿生邑亦曰蘇蘇己姓子忟在夏曰伯今懐之武徳有蘇古城在濟源西北二里寰宇云忿生故邑蘇温見隱三年陽樊温原十二邑皆蘇故地户己姓商之崇扈古文作􅀈秦改為鄠漢𨽻扶風自後魏属京兆今永興鄠北二十有故城周四里有户谷户亭飂己姓廖也昭二十九有飂九域志方救切今唐之湖陽一作飀董文六己姓伯聞喜東有董池陂董澤之陂也竹紀季晉武公元年尚一軍芮人乗京荀人董伯皆叛者非秦川董舊云臨汾有董亭是或云秦川晉陽難當使兄子保宗鎮董亭者皆非郗己姓説文云周邑野王西北詳後周國鬷昭二十九董姓鬷夷也今濟隂東北四十九有龍池鬷亭即三鬷亭在定陶東北二十蔡墨云舜封豢龍子於鬷川鬷夷氏其後九州要記云董父好龍舜遣豢龍於陶丘為豢龍氏集韻去聲非豢龍董姓在滑之韋城古城内有豢龍井然寰宇記豢龍城在臨潁今長葛西四十豢龍城豢龍氏邑也而汝之龍興東南五十又有豢龍城韋城為古豕韋邑故王屋山有龍逄祠潞縣長垣有龍逄㞐皆在後長垣東南二十有龍城龍逄㞐有祠墓而靈寶西南七亦有豢龍墳城冡記闗龍逄塟龜頭原左脇髙三丈祝産己姓帝堯時國戎州斟己姓漢之北海斟縣北海今濰去州七里有斟亭寰宇州東南五十一作㘰草繆灌斟姓傳謂斟灌廣記云禹後誤今青之壽灮東南有斟灌城灌亭舊記髙宻有灌亭寰宇斟灌城一名東夀灮故淳于也水經淳于縣本夏后氏斟灌國武王以封淳于公淳于後齊併髙宻尋三斟姓傳謂斟尋張勃地記濟南平壽古斟尋國預謂青之北海北海今𨽻濰東南五十有斟城斟亭一作􅴙鄩今九江為尋陽一作鄩潯瓉謂河南有尋葢周地也昭二十三鄩預謂鞏西南鄩中周地介斟姓斟介也傳謂介斟在東郡衞地或云即斟灌非若葛廬國則宻之膠西東北百里有葛廬墓戈斟姓是為斟戈左氏世本皆以為即斟灌氏非按宋鄭間六邑有戈錫後為􅜦國右五斟本出己姓形聲轉繆而遂為姒故史記以斟戈尋為夏禹後非也賈逵更以之為曹姓葢因史伯之言失之云員䢵同妘也妘姓之祖亦作伝傊㜏鄖又用䚋雲晉志云雲子古之雲夢在江北今王沙監利等縣盟㑹圖云䢵子國在安州杜云江夏雲在東南今安州城旾秋鄖人楚滅之封閻辛為鄖公今安之安陸有鄖鄉鄖水鄖城鄖公廟周為鄖州參胡妘姓韓也惠連國鄅妘姓偊子爵景王二十一邾襲之班志云東海開陽故鄅國開陽故城今在臨沂北十五里春秋啟陽彭二即大彭彭姓之祖舊云徐治彭城有彭城山彭祖墓廟春秋為宋邑晉楚滅之為魚石采邑寰宇記州里外城即古大彭國考之初國當是彭州有天彭大澤垂拱為州後迻徐爾仙傳歴陽有彭祖宅韋豕韋彭姓商伯元喆之封豕韋也國都記豕韋氏彭氏之國劉絫更封之故世本謂豕韋防姓隨韋為城縣則白馬南之韋鄉也杜云東郡白馬東南有韋城今􅉸之韋城有豢龍井在韋故城内有古碑記云左右直殳上日汨水下入十一口禿彭姓暨既彭姓沂之承有蔇亭即古暨國杜云鄫縣東北有蔇亭今鄫城在承縣東其𣲖者為諸暨本日餘暨有暨浦諸山𨽻越一作既則江隂也常之江隂晉曰既陽諸莊二十九彭姓宻之諸城西北三十春秋之諸國漢諸縣故城在西南本魯邑正奢切或如字稽彭姓亳之譙有稽山舟人禿姓楚地昔常壽過克息舟城而居之者昭十三年越大夫儈䢵姓一曰㑹人鄶也詩之檜國在溱洧之間今新鄭東北三十五有古鄶城詩譜重黎後䢵姓國武公滅之然謂澮以水名按春秋之汾澮乃在絳故伯􅆁以為潧之誤妄矣傿䢵姓今襄之宜城楚之鄢都一曰郢昭四遷頼于鄢者漢惠三日宜城與莒鄢鄭􅋣異穆叔如莒及鄢陵登鄢陵城今沂之安陵也鄭克叚于鄢則開封之􅋣陵漢之故縣晉鄭戰鄢陵則鄭地故城在今鄢陵西北十八里有傿􅋣鄢氏地名人姓宜有定音陸氏兼平上去三聲非是按韓世家徐音于乾切而今鄢陵人皆平聲呼之與姓同今定鄭􅋣楚鄢上聲餘為平路䢵姓漢屬漁陽鄔二䢵姓春秋二鄔一在晉司馬彌牟為大夫者太原鄔縣一鄭地隱十一王取鄔今在懐杜云緱氏西南有鄔聚緱氏熈寧為鎮入偃師上聲集音烏偪陽䢵姓子晉滅之襄十楚為傳陽漢縣春秋偪陽國杜云彭城偪陽縣扶目切今沂之承有故偪陽城夷䢵姓詭諸邑楚滅之今亳之城父陳之夷邑曹二侯爵曹姓之始傮軰也今興亡之濟隂漢之定陶東北三十七有定陶故城即古曹國有曹南山髣山曹人之塟髣山廟定陶四五層阜之上連十五里曹國塟地髣髴於山也自振鐸至伯陽二十五世皆葬焉而曹城在禹城若衞之曹則下邑也一曰漕在􅉸之白馬俱徂侯切朱邾三曹姓子邾也周封挾後遷婁是為邾婁今濟之任城南二十有邾婁城呉苪都邾毛寶守邾城在是非江夏説文江夏邾縣玊云魯附庸地隔亦在黄黄岡東南百三十邾縣故城楚宣滅邾徙之此騶二曹姓子繹也兖之鄒縣有繹山邾文公遷繹後曰騶戰國滅于楚劉薈騶山記云鄒山即古繹山邾文公所卜鄒縣本邾國魯穆改曰鄒而山從邑變邾城在山南通典云周四十里在鄒縣東南故或謂騶即邾内傳邾伐魯史作騶也趙岐云鄒本春秋邾子之國至孟子時改曰鄒後為魯所併又言楚併者非然邾鄒本二近而移非改也邾為魯併而鄒為楚併古騶則今之鄒平廣輿記武徳為州則今臨濟元年鄒州非扶風玊篇鄒古扶風附庸國兒郳曹姓倪郳也從齊勤王命為小邾子公羊即小邾子郳黎字舉儋云小國無爵名髙厚定郳田今承縣滕東南有郳故城本滕邑宋人伐兒者或云宋附庸莒曹姓周滅以封少昊之後或云周邑昭二十六隂忌奔莒者非小邾曹姓倪之分滕縣是晉志蕃縣古小邾國隨曰滕今𨽻沂卲云蕃即小邾國魯附庸漢蕃縣一云仙源故曲阜東南四十古邾城或以此為邾婁非牟曹姓子魯宣取之定王七預謂琅邪陽都東之牟鄉城樵云琅邪今沂之陽都故苹云在沂樂史云牟國即宻之安丘隨之牟山縣或云牟人非閭丘漆從征記髙平東陽東北有漆縣漆鄉東北十里有閭丛鄉鬻楚先封鬻夏商間因為姓文王師鬻後𨽻省為粥不成字荆楚芊姓子爵季連封漫其處周初復之荆楚一本故春秋初猶書荆僖公后始書楚或謂孔子狄之非也秦莊襄以母諱復曰荆楚子爵芈姓後熊繹初封居丹陽今之秭縣本曰西楚縣東南有故丹陽城璞云今秭歸縣南成王以封熊摰今熊姓猶百家故晉志云秭歸故楚子國武徙枝江亦曰丹陽丹山之陽佑云楚自丹陽徙枝江亦曰丹陽記多徙丹陽非是為南楚枝江𨽻荆南漢志丹陽郡丹陽縣為繹所封秦之郼郡元封二年為丹陽郡而丹陽縣乃潤州境蕪湖縣東二十有石城山志為楚始封地陳宣詔云楚繹南城郢楚文庇是徙在江之南為南郢孫竒父雜題予知古渚宫故事楚文王都郢後九世昭王避敵遷鄀惠王因亂遷鄢玩立復歸而舊史闕見按惠王末墨翟重璽趨郢班子析謀宣王之時王宫遇盗郢軍見黜懐王入秦齊人使郢中立王因與王弟皆昭惠後莫不于焉根本則知鄢鄀之遷權週非乆都者襄王末郢為白起所㧞北遷陳城其地遂入邑于秦自文王襄大夫凡十九世以遷云郢居八世為矣今江陵北十二有召軫紀南城東一小城名曰南郢非郢州徙鄀今宜城為北郢云今郢州為北郢昔楚莊使公子燮子儀守羣舒二子作亂城郢襄十四年子囊遺言必城郢太史公云楚都郢至平王更城郢杜以為州北紀南城盛氏記昭王十年呉通水灌紀南城入赤湖進灌都城遂破楚則前破紀南後破郢也郢破乃徙鄀尒惠遷鄢桓十三在宣城項襄徙陳號西楚寰宇及陳州城楚惠所築考烈爰徙壽春亦曰郢今壽之羅城尖㴞正淮論云考烈所築字一作􅀈皆縁先代威名冠之也東楚西楚南楚東楚海州南楚廣陵西楚為陳其後乃以彭城自楚惠滅陳至項襄為秦所伐自郢徙之號西楚今㶏水西三有章華臺懐王都彭城羽遷之郴而都之號西楚至懐王孫都東楚則屬彭城故厲王胥都廣陵為南楚元王交都彭城為東楚而唐復以楚州為東楚郡句亶熊渠長子康封之今江陵夷王時鄂東熊渠中子紅封之世本今興國軍永興有故鄂城寰宇記州西北百八十鄂王城鄂人事鄂王神漢鄂縣本𨽻武昌故九州記云鄂國今之武昌東鄂也越章熊渠少子執庛封之皆江上或云即句章諸梁楚文子采馮周地定六屈武子瑕邑號屈侯姓書後為氏風俗通魏賢屈侯跗利邵姓録云楚公子采為氏為今利州閻西固安有閻安固城苖賁皇邑河内軹縣有苖亭互寢宣十二放邑沈也徐云寢國續志云固始有寢丘集􅎊子朕切秦滅楚蒙恬攻寢者潁之汝隂今沈丘南百歩與沈國近漢沈丘縣開皇為沈州今有叔敖祠堂棠也伍尚封號棠君今揚之六合秦漢之棠邑陳嬰侯國薳三薳蒍是楚地子玊治兵處僖二十七薳澨也昭二十三薳越縊于薳澨一周鄭地隱十一䧦鄭地鄭處誨云魯山地名亦作䧦鄬襄七楚子㑹鄬杜云鄭地説㞐為玉于彼切卷圈二即圈陳留傳云圈氏本出其國南陽葉縣南有卷城非鄭卷今鄭之原武西北七里有卷故城周十里故漢縣曹大家東征賦歴滎陽而過卷者姓辨並上聲蕩舊記蕩侯國楚地蒙姓纂云髙陽後封以為蒙雙云有雙氏預云東莞蒙隂有蒙隂城蒙隂後齊入新泰𨽻沂有小蒙城六國楚為蒙縣莊十五年䝉澤也昔莊周為漆園吏今宋之考城古䝉城東魏為䝉部今興化之寃亭有莊子漆園漢之寃句亦䝉地也麻棘酈麻俱楚邑按襄城縣乃故麻城今黄之麻城而辰有麻陽又碭山西北故麻城漢之麻鄉風俗通麻氏齊大夫麻嬰後郟汝之襄城有郟城九域志云令邑郟敖邑白邵陽有白公城即白公邑子西莒使處呉境為曹大夫曰白公慎二呉伐慎白公敗之哀十六今廬之屬縣西北四十一有故慎城慎水通典漢慎故城在今頴州頴上西北九域志楚縣白公之邑故白公救慎匡邼也本衞邑中屬晉文元年鄭伐匡今扶溝有匡城鄉匡亭而匡故城在􅉸之城西僖十五㳄于匡者漢之長垣地道記長垣南十里有衞故匡城孔子所厄淮南子注襄邑西匡亭承匡今拱州故襄邑近有匡水承匡山在仕城東七十五璠云襄邑西二十有承匡山訾鄭地成十三亦楚地昭十三始齊大夫采今濰之都昌西有訾故城國本屬紀一作鄑西訾也齊遷之莊元昭公時楚遷訾人二十五樵以為楚東訾枝哀六非訾母襄十八訾婁云僖十八長垣西十六棘棘名所在有之楚有棘櫟今城父東北十八有棘城唐有棘陽唐之湖陽北有故城棘水漢縣趙有平棘今州治平棘南有古平棘城春秋之棘邑十三州志云戰國改宋有大棘鄭破宋師處范志陳留有大棘鄉乃在襄邑西南今南京括城西北三十有大棘城有曲棘昭二十五外黄有曲棘里杜云城中鄭有上棘襄十八陽翟有上棘城棘澤襄十四衞有棘津冀之秦陽東北二十七有棘津城吕望乞食於此有賣漿臺太公泉廟汲南七里而齊魯皆有棘矣昭十棘杜在西安東南有㦸里亭城輿志云有㦸里郭魯棘在汶水北杜云蛇丘比棘亭又龔鄉縣東北七十五有棘鄉蛇丘今鉅野又魯城内有棘下芋艾今隆興分寧西北里有艾城春秋呉慶忌居之漢艾縣開皇廢入建昌九年十二真傳云今查田即今之寧州也罏穰楚别邑今鄧治秦宣太后弟穰侯魏拜皆芈姓楚後聶三楚屬􅀈有聶本衞大夫采僖元聶北􅀈地或疑後屬楚又云即攝俱非楚攝叔當别自楚地又􅀶之􅀶平有攝城析楚有析公邑襄二十四蔓今􅀈也今廣漢有􅀈鄉廬春秋有廬戢犂國語注廬楚邑戢犂為廬大夫飬繇基先鄧大夫有養甥楚地璠云襄城郟縣西南有養水由基之邑郟城今𨽻汝葉商子西為商公今商之商洛之地志屬𢎞農裴駰謂在順陽魏晉始分時𨽻之椒櫟陽櫟也預云新蔡東北有櫟亭昭四年呉入櫟有故櫟城在新蔡故城西北半淪江水魯陽今鄧之向城苞丘或云荷丘楚有荷丘子虞丘呉丘也楚相虞丘子邑吾丘夀王説苑作虞軒丘楚文庻子采邑期思楚下邑漢縣屬汝南故蔣國入楚大夫復遂遂為期思公今壽之霍丘有廢期思梁書天監四于期思置期思州葢移弋陽期思名徠有故城在固始西北七十漢賁開告布反封期思侯暌楚地右楚之分四六春秋褒貶乎曰無之有進退乎曰無之無則奚以勸曰善善惡惡善其善惡其惡直書其事而人自勸矣進者不得不進因其進而進之于何褒退者不得不退因其退而退之于何貶曷嘗求夫經之所以書者乎夷之日盛華之日㣲豈人所願哉徐之初也稱戎隱元以徠盛而稱徐莊二十六秋又盛而人之僖三又盛而子之昭四楚之初也稱荆莊十以徠盛而稱人二十三既而楚矣又盛而人之僖元又盛而子之二十一秋已而有使通矣已而有大夫矣聖人豈有心於進之哉因其進而進之至於此也葢王道衰諸侯僣一再降而政逮於大夫又再降而制歸於夷狄聖人豈有心於退之哉因其退而退之至於此也春秋徐初稱戎自稱徐不復見稱戎者山戎北戎皆種别之蘇文定以為徐不稱人人者羡文妄人與子何羡文之多哉五年一朝諸侯之於天子禮也天子於諸侯有聘而已諸侯而相朝聘講信修睦豈有大小彊弱之分哉周室東王政不綱於是大國聘而不朝小國朝而不聘故春秋書徠朝者三十有六皆邾把曹滕之君未有一大國也徠聘者三十有一皆晉宋齊秦之人無一小國也二百四十二年之間魯之朝楚者屢而楚未始一朝魯其徠聘也偃然既以大國自居而聖人亦因以大國書之矣晉宋齊秦亦然始其來聘進而人矣未名通也其再至也進而名矣未氏通也文六又至而名氏通襄三十一薳罷於是始與中國諸臣儕無别矣聖人之意豈不欲中國之盛而夷鎮之復郤哉不得已也鄭與楚盟又復與晉故楚伐之鄭窮告哀楚師退舎而鄭不服修其城郭故再克之鄭袒牽羊而楚復舎之始欲縣陳申叔時一言而楚亦遽止已而伐蕭蕭囚宜僚楚命勿殺蕭人殺之即復滅蕭則不為大悖道且春秋之於夷非不齒也徒以彼陋僣擬蔑朝享而陵中夏尒至於伐衞救齊有以排衆難而安諸夏者亦所不掩因其進而進之固將以恥諸夏而罪齊晉也向使諸侯知所自殆進賢退不肖節用而愛人懐仁義以事其君撫邦交定諸夏聖人何訾焉或曰慕義徠也故進之不然慕義周公明堂之盛舉也荆之聘三成之元穆之八與郟敖之二載俱其熾盛之日時魯方弱有無禮而加我尒具徠聘也固自謂大國而將責備於我者齊桓死晉文未起方僖公之盛際且甘心委質之盂之㑹至不出而受其㨗未㡬而乞師伐齊取榖則魯之附是乆矣孰有慕義於莊公哉濮熊姓書彭濮彭濮人皆峽外為楚害楚滅之文十六麋人卒百濮伐楚昭十九楚子為舟師伐濮預云建寧郡南濮夷地建建故縣今為鎮𨽻石首以多曰百濮一作䧤集彭䧤蠻國一作非衞濮羅熊姓羅君也初封在襄之宜城故信陽有羅山九域志羅國城在襄春秋時附庸後徙江陵之枝江故佑云岳州古羅國地桓二十一楚伐羅羅敗之宜在此桓公十一周東乃定長沙今潭之湘隂東北六十有羅故城秦之羅縣梁為羅州太清四年大業十三羅縣令蕭鋭起兵説為岳之巴陵岳陽志隋煬元年始為羅州非有羅水所謂羅汭汨水注湘處汨羅在縣東北䕫歸熊姓子爵歸是楚滅之僖二十六寰宇記䕫之巫山縣䕫子熊摰治多熊姓今秭歸城東二十有故䕫子城荆州記稊歸西有楊城即繹孫所㞐賨宗芈姓子宗也頃王四年居執宗子遂圍巢十六國春秋常璩志云宕渠古賨國寰宇故賨城江流縣東北八十四古賨國都又廣安軍渠江縣北十二即始安城宕渠今入伏虞賨城見存蓬州中興書云廪君後非滇滇王國今洮州與夜郎以西蠻皆云莊蹻後􅍪麇同所謂麇庸即麏也今之房陵楚饑與濮伐楚楚子再敗麇師于房渚者桓王三荆州記引釋例在當陽非也當陽乃麋岳志以岳之巴陵為麋子國地有兩城址尚存相去十里所楚昭奔隨王使王孫由于城麋者有麋州麋文十一又定五芈姓子今荆之當陽舊云均之鄖鄉非也乃古錫穴鄖鄉乃漢錫縣太康五為鄖鄉潘崇伐麋至錫穴者地形志漢中郡之東界古之錫穴右髙陽後濮羅䕫越等國諸侯以保社稷為孝是故國君去國止之曰奈何去社稷大夫以守宗廟為孝是故大夫去國止之曰柰何去宗廟士以守墳墓為孝故士去國止之曰柰何去墳諸侯失國曰䘮大夫士之失位亦曰䘮以不孝處之也孟軻曰世守也非身之所能為也効死不去此重去社稷之義也顔淵曰去國則哭於墓而後行此重去墳墓之義也土地人民諸侯之寶也是故春秋于外取滅必書所以見不能保其土地與人民也卿大夫死衆士死制是故國君死社稷謂之義大夫死宗廟謂之變四郊多壘大夫以為辱而謀人之軍師敗則死之則大夫不可以不死衆矣奉命以出有死無霣士大夫死行列百吏死職則士不可以不死制矣雖然國君死社稷而太王去邠大夫死衆士死制而管仲不死子紏葢死社稷以為民也去邠以為民無死可也死衆死制以為君也死非為君無死可也故君子之謀國勇足以制敵智足以謀必以死為尚哉所守然爾是故國滅君死之正也聖人猶不必其死也其見滅焉猶以取滅之道書之蔡獻舞潞嬰兒沈嘉許斯頓牂胡豹曹陽邾益之名所以見不能修徳保社稷而之滅爾諸侯失國而后託于諸侯孟子以為禮若譚子在莒弦子在黄温子在衞雖奔失國不名非其不道自抵滅也楚子滅䕫以䕫子歸不名非其所取滅也楚人謂䕫不祀祝融粥熊䕫子不伏楚人疾之遂滅之書楚人罪專滅也杜謂䕫不祀故楚不譏滅同姓妄也衞祖康叔不敢及稷魯祖周不及公劉䕫不祝融非所以為罪也況楚得專滅乎以歸録實也或曰以蔡侯獻舞歸明蔡之己滅蔡何嘗滅哉趙説誤越芈姓古南越盟㑹圖䟽云南越廣州按南海桂林象郡皆是非姒姓之越十道志云禺州古百粤婺女之分秦為象郡而容邕等州本皆越東南二越諸儒皆一之踈矣越常今灌之越裳縣呉置駱越今潰治欎平通典貴州古西甌駱越葢古甌駱周書載言云潘州古甌駱越之地而史記亦有西甌駱交止九員之域十道記號駱侯姚姓李竒説故九員有駱田益州記交止有駱田仰潮水人為駱人有駱侯或自名駱將漢代蜀王子將兵徕討駱侯自稱安陽王尉佗滅之邕有駱越水即驩水其㪚居襄通典襄陽縣漢之中廬駱越人徙此或云甌閩誤駱姓史記作騶誤甌越梁四公記合浦落黎縣甌越也董逌謂于越又訛為甌越妄甌隑太平御覧引周書五來切且甌西甌郭璞以建安為西甌非此集韻音嘔駱越别種郡國志欎林西越也故杜佑云西甌即言西以别東爾寰宇記欎林廢黨州經善勞縣即古西甌居供人或云文朗民也今之峯州目深又大荒北海深目之國盻姓近南地摧扶禽人或云羽氏蒼吾梧之蒼吾縣元始六年開蒼吾郡地廣東至湘潭揚􅀢呉起為楚收揚越者國事揚州之分漢南􅀢傳奏畧定揚􅀢注宜即蠻揚見王㑹觧或云蠻婺州也本屬會稽郡國志云東越之地為東揚州人俗輕狡少信行桂國見伊尹四方令經云八桂在賁禺東今畨禺葢桂陽也損子百濮九菌産里並四方令産里一云語兒也或作陸童誤九菌四方令在正南今九江之菌江海癸稽余北帯僕句區呉蒙之東區漢之荔浦也右髙陽後越之分余讀地書王㑹觧等知所謂百越矣是芈姓之越也至于㑹稽之越伯禹之苖又不在是自嶺而南唐虞三代為百越之國亦謂南越彫題之重隨畜轉居非先王建封職方之限自交至于㑹稽七千里内百越攸處各有種姓非盡少康之後甌越閩越亦非南越之種也若夫中盧之駱衛地之越則又昔之進于中華者桓元年越近垂上亦如鉤町鉤一用句集韻音劬西戎之君然字書作㽛町同竝皆今牂柯屬縣故同竝勾町二俟國義渠今慶州義渠縣秦昭滅義渠君封之此九域志邠州古義渠城義渠之國大荔地志臨晉故大荔國今同州朝邑貞王八年秦厲公滅而居之洛川漏卧牂柯漏卧縣故漏卧侯國陸渾在河南枹罕河州枹罕縣漢屬金城劭云罕羗侯國朐衍秦穆得由余西戎八國來服涇漆之北如義渠大荔烏氏朐衍皆是温宿今醴泉縣有温宿嶺漢世温宿國人居之隨書之温秀也之名縣也烏乎周之全也五服衣冠侯伯合沓曽何有於夷哉東遷而後强豪攻併禮廢樂壊然後諸夷得以㳂隙而入赤體白窒更踞泰半於中原矣呉越楚蜀徧為蠻境今荆湖川廣松茂姚保横賔邕梧等處皆是其類甚多通渠涪渝逄壁充畢等皆巴人之境秦隴晉魏悉成戎地如岐有犬戎趙有代戎渭南有允戎麗戎河南山北有隂戎伏羗有兾戎河蘭厚㑹鄯鳯文宕皆西羗氐人疊拓松恭靜維當亦悉羗戎之地河南為蠻河南陸渾新域故蠻子國惠帝四年置蠻中河西為狄杜謂白狄故河西郡鄜延坊銀綏丹之間皆古白狄地故云白狄與秦同州淮有羣舒魏有諸隗在在充蒲河北有赤狄甲氏留吁鐸屈潞子皆隗姓洛川亦有赤狄遺地狄䝠邽冀徃徃徧于渭首雖洛陽一王城而楊拒泉臯陸渾伊洛之戎亦且雜然分䖏其中為冠俗者葢無㡬也悲哉甲族將頺子弟卑舊制而聘新尖衞侯咅代王胡服咸失其死把居雝丘邾處魯甸乃用夷禮淮徐介莒牟萊之國在今京東而亦俱有夷名可勝嘆邪夗金而下典午之際齊州左衽言侏離矣被髪野祭誰其哀之仙李石晉而􅀈兹禍尤酷此許翰所以歸過謀國者之不知學春秋寧不劾乎若此族者猶先王之類也是故列之牟子爵祝融後續志云㤗山牟縣故牟國今文登輿地廣記云奉符春秋牟子之國堣夷堯命羲仲宅堣夷在遼西即青之堣夷今文書及帝命驗作禺鐡一作嵎銕故即郁夷故武后時福順冨為嵎夷公南交羲叔所宅今交州故交阯交郡也西和仲所宅今興元西縣漢故西縣古來田西而閬之晉安有西水上原由京兆水西西水縣界流入幽都和叔所宅幽也一曰北幽今之幽州居山之上有幽都山以隂幽名非宋地之幽莊十六易所謂朔易古有易之地商上甲㣲伐有易者今之易州北終東始有代易意故邇于代世不知有易朔易之地或謂冬收藏交易為言東作西成南為朔易皆以民事言非也謂嵗改易者亦非有易水出固安故固安為北易即安國河出故安閻鄉西川故安國經云故安謂之北易作故通復有南易燕趙記有三易漳為南易班固闞駰以呼沱為南易史云燕與趙易以龍亢分門與燕者而臨洺為漢易陽昔燕文公徙易則漢之易縣也有故城在城西五里有故易京城在涿之歸徳南十八里公孫瓉害劉虞于葪下謡云燕南垂趙北際河惟有此中可避世瓉以易地當之築城臨易徙都曰易京鐡門樓榜千重袁紹破之石虎自遼徙此惡其固毁之寰宇記歸義東南十五有大城燕桓侯之别都指此程商封呉回後今咸陽故安陵城周程邑也地志安陵𨽻扶風闞駰云古程邑一云洛陽上程聚程伯休父卿士之采黄桓七年桓公再㑹黄人爾登之黄縣東南二十五里故有黄城本紀邑後入齊黄亦多矣如内黄縣𨽻相外黄雍􅉌東六里有故外黄城小黄陳留東北有小黄園東北漢故小黄城土黄晉縣割臨沮立今襄之南漳與封丘隱元年宋敗處有黄池涪陵等皆有之岑彭破侯丹于黄今涪一作􅀈玉篇古國太昊宅東少昊宅西炎帝居南顓帝居北予嘗證之矣南交北幽東堣西栁處乎四方此不遷之㳄也己酉冬周益公退舎歸首以炎陵事來訪謂三皇五帝並居中原炎帝之墓無因南方即疑為偏據者予曰不然古之聖人惟與天地合必於我者無一毫之不盡則示之後斯悠乆而不渝後世聖人取之於古必其所履能合於天地動靜曲盡而無媿者然後執之視以為則茍在我者一毫之不盡則推之於彼者將厭棄而不繼矣盛徳在火不刋之祀其帝炎帝其神祝融此實司南方者是故炎墓茶鄉而祝融墓于衡山地道記誌顓頊之虚實在幽州逺逰章句寶櫝等記西皇所居乃在西海之津斯未得信然秦漢來大祝雲陽甘泉則雲陽固在咸陽之區而姓氏書譜皡顥等姓亦皆出於西方魯為少昊之虚衞為顓頊之虚固左氏説也開元揆天下景林邑驩愛所至悉謬而獨交州之晷分寸不訛予以是知聖人之所以為萬世法豈茍然邪而孔子國猶以為夏與春交果何義歟嗟乎隨室考嘗夭枉相繼而後姓神農本經句字不可變三十餘厯昏旦悉異而後信放勲之典中星不可違不登髙山不知天之髙而猶未得其所以髙悲夫安國字子國髙辛氏後髙辛髙陽封之今南京榖熟髙辛鎮也梁載云襄邑有髙辛城襄邑今𨽻東京而髙辛故城在榖熟西南四十五地理志在梁國榖熟西南漦釐漦台邰稷封作釐􅀢􅘭庲亦作台駘邰今永興武功西南二十二有故漦城有后稷姜嫄祠隋為稷州㳟帝武徳三分武功好畤四縣置稷州葢唐再置本曰周漢志漦属右扶風本曰周故後曰周與姜台異見炎後國許云邰姜姓炎帝稷后稷廟記云武功本名邰後改曰城失之􅃎邠邠也諸記開元十三年以􅃎似幽改邠按魏大和十四已為邠二十年乃為􅃎􅃎先一年為班州本谷名班云扶風栒邑􅃎鄉公劉邑詩云于􅃎斯語邠之三水西南三十有故􅃎城徐廣云新漆縣東北有故􅃎亭九域志太王都今􅃎亭栒故城皆在三水東北龎川水西有姜嫄公劉廟按渭水南一里故郇城武徳三為郇州三年廢故城今在郿尉季不窋居今慶之安化有尉季城在州東三里作尉季誤不窋今安化有不窋城不窋墓州東三里故順化也周地圖之郁郅城在白馬馬嶺両川交水口水經尉季一曰不窋疑郁郅之訛周語不窋竄戎狄間韋昭以為居􅃎故詩正義謂生來于􅃎邰亶父古公亶父或云亶地吕氏云宓子治亶父然宓子治乃單父也魏景王之十二秊昭九使􅉟伯辭於晉曰我自夏王之代以后稷之功故受魏駘芮岐畢為吾西土武王克商蒲姑商奄為吾東土巴濮楚鄧為吾南土肅慎燕亳為吾北土則周之先嘗受魏矣平陸乃故河東之河北縣春秋屬晉今陕之平陸有魏城岐古有岐伯至古公避狄遷岐之陽今鳯翔岐山縣西北有岐城故址後魏為岐州以山之岐而名即箭䇢嶺文王初為岐侯琴操在邰西北不百里而􅃎又在􅑢西北四百南有周原而乾之永壽亦為􅃎地故傳謂自稷至武五遷不出所封以此一作􅑢㟚地志文王徙􅑢非縣道記隴州呉山縣東四十五即岐山縣西南界有一故城彼人謂之文王城寰宇記考文王都酆不合于此有城疑是漢杜陽縣又岐山縣東十九有杜陽為内亦有杜陽故城二縣俱属扶風據十三州志郡縣道里數即隴州杜陽故城近之据漢志注杜水南入渭即普潤界文王城近之周黄帝臣有周昌商有周任千姓編云商太史周國乆矣預謂扶風雝東北有周城雝唐為天興葢即周原岐之小地名泰王遷之在美陽南故説文謂文王封岐在美陽中水鄉而漢志謂美陽西北中水鄉周泰王邑或謂太公徙岐下之周原號國曰周非程王季之居周書王季宅程世紀云王季徙于程在今咸陽故安陵亦在岐南與畢陌接所謂畢程吕十八武王嘗窮于畢程長安志孟子言文王卒于畢郢今作郢豐文王作豐武王作鎬豐豐宫鎬鎬宫豐在豐水之西鎬在豐水之東皆宗周地本小男國武王伐紂乃收虞師芮師豐師鎬師者亦作酆寰宇記文王酆宫在鄠盟會圖云豐鎬相去二十五里鎬鄗在長安之靈臺鄉鎬京宗周元和志鎬京在長安有武王宫漢穿昆明鎬之遺址淪焉今永興昆明北之鎬陂即京周昭元或作鄗非是世本荀子皆作鄗六韜酆師鄗師史鄗池君亦見春秋後傳然本只高字光武起鄗邑者若常山鄗邑在河北自音郝一作䧚集亦音鎬非王城洛二東西武王遷鼎郟鄏成王定之作東都洛曰王城周今河南縣皇城也澗水東瀝水西亦曰郟今縣西有郟鄏陌有郟山至平王遂居之曰東周而以豐鎬為西周子朝復居之二周分理此為東周赧王遷之而此為西周矣公羊云咸陽東周王城西周與秦之王城異杜云臨晉東有古王城今名武鄉城秦城之王城乃昭十五隂飴生㑹秦伯䖏即大荔城在今同州東周三西桓公孫惠公封少子于鞏號東周西周三經姬姓叔均國葢别一國宗周三周公既營洛又卜瀍水東作下都遷商頑焉曰成周今河南洛陽故城是洛陽熈寧省入河南城中有翟泉翟泉詳樵周地水及子朝入王城敬王居成周曰東周周衰為二而此為西周桓公居考王封自武以鎬為西豐為宗周後更鎬為宗周正月注雨無正曰周宗忞云宗周京兆宗周成周王城東西周不一學者宜詳􅓆孤聚秦以處東周君陽人聚秦以處西周君今汝州之西承休光武封姬常今汝東有承休故城商蕃契封在華隂之鄭鄭縣有欒都城及故藩邑故世本謂契居蕃闞駰云蕃鄭西今之巒城是矣地有商山魯連子云在太華之陽世紀謂在商洛故世謂上洛漢商縣非也括地象云商州闞云商州上洛九域志輿地記云契始封通典云商之商洛古商邑乃商君封檢地志盖南陽界古商于漢之商縣砥石昭明居鄴上甲㣲居即桐也世紀云鄴西南有上司馬太甲之居今湯隂有司馬泊司馬村或云太甲葢以鄴西桐有離宫商之墓地而􅓎以上甲為太甲爾參大夏實沈封大夏是為參今太原陽曲舊晉陽城也商隱元商丘閼伯封相土因之宋是今南京理宋城漢之睢陽或以為漳水之南商虚失之相虹之西北有故相城寰宇記云即相土居龍晏龍國䕫龍皆以名為國王符云優姓魯之北鄙成二年齊伐我北鄙圍龍世家作隆預云太山􅀶縣西南後為􅀶城今奉符有龍山漢陳署為龍侯者唐乾封非長垣之龍蕭縣東三十有龍城水經獲水所經開皇曰龍城今長垣有龍城續續牙國晉邑也狐鞠居采巫人今之巫山歸之巴東故漢巫縣利州其北境􅪝民經有巫人􅪝民􅪝民肜姓帝俊後廣韻有􅪝國集音替司幽一曰思幽見經列子曰思幽之國思士不妻而感思女不夫而孕蜀支子封蜀侯國自益昌西南至蜀皆其地張儀滅之蜀王八戰不勝而滅赧王元年秦惠文封公子通為蜀王苴蜀王封其弟葭萌于漢中為苴侯後命其邑曰葭萌今利州縣一曰吐費城揺氏經云帝嚳子國即揺民東胡厭越國後曰鮮卑盧綰所居鮮卑山在栁城東南二百里伊尹四方令東胡正北吐渾慕容柔僕一曰羸土之國赤烏穆傳赤烏之國在㫪山西三百與周同祖中路𤣥元國帝嚳之孫子何其盛歟傳曰昔帝嚳卜四妃之子皆有天下常儀之子為帝摰慶都之子為帝堯契之後為商而稷之後為周商周之後盛莫京矣予嘗求之帝嚳之治天下其迹之聞于代者初無赫赫之功是何邪得非有功者不如無過之難而作隂徳者弗若絶陽刑之惠大乎體嚳之政亦惟仁柔無苛而已而其裔之昌如此也不亦姣乎其若商周之後國别著于篇虞仲雝後陜之平陸呉山有故虞城虞井虞城在平陸東北六十本帝舜之後國所謂西虞互呉伯爵外傳云命圭有命固曰呉伯呉大也即泰伯居句呉也句呉故城在無錫梅里平虚城在無錫東三十梅里在葢閭城北五十寰宇太伯城西去縣四十平地數丈輿地志呉築城梅里平虚即此城内有泰伯宅及泰伯之墓墓在無錫縣東三十九里冡墓記在㑹稽呉縣北梅里輿地記宅東五里乃泰伯塟梅山也姑蘇呉興丹陽為三呉句踐即今蘇治呉縣哀公十三越滅之棠谿夫槩奔楚封之世家呉春秋云昭王封之為棠谿氏定五姓寰宇云唐陵書又為唐谿氏繆在汝南呉房房為丹朱封夫槩封呉因曰呉房今蔡之遂平有棠谿亭呉房城潜夫論云在汝南西平通典在郾城彪云亭在呉房呉房元和十為遂平盟㑹圖作堂谿云在豫之郾城有堂谿村郾城西界延陵西延陵五一在代一在綏後魏延陵縣今綏之延福一在丹徒隨延陵縣皆非季子之居一作金陵然亦非古今潤州延陵縣太康二分曲阿延陵鎮置古延陵在今常之晉陵故漢毘陵退畊在是地志㑹稽毘陵季札居公羊云札退居延陵終身葢因封此今江隂芙蓉湖西馬鞍山札所耕處有札墓孔父所至今墓在縣北七十申浦之西江隂西三十五州來二古國楚滅之呉取之封季子成七呉入州來昭十三滅之又二十三年伐封之釋例地闕地志在沛今壽治下蔡夫差遷昭侯于此自延陵徙故曰延州來今延陵東北九有季子廟太康地志云呉封季札州來而居延陵故曰延州野王云呉自有延州來地先已封季子非楚州來邑未詳朱方襄二十八潤之丹徒東二十地曰朱方呉邑也故慶封入呉與之朱方昭四年楚圍朱方者郁閭郁乆閭也或曰郁國乆閭其名一作􅪿今單之魚臺故方與縣東南有郁郎城或云禺夷一曰郁都有郁氏國語魯相郁貢鳩兹預云蕪湖縣東今臯夷也今太平蕪湖縣東四十員卿呉地記云有鳩兹城按輿地志以為臯兹今蕪湖之徳政鄉有句兹社句兹港為古鳩兹樂史以為松滋失之寰宇記壽之霍丘東十五有松滋故城葢本古今地記松兹古鳩兹漢屬江陵魏屬廬江一名祝兹誤松兹楚地楚伐呉及鳩兹無囚在江陵咸康三年以松兹流户在荆上立松兹縣𨽻河東乃荆之松兹鄖一作䚋呉地發揚也杜云鄖發揚也桓王十二鄖將與趙楚敗之今海陵今㤗州治縣西南有發繇口西呉一曰虞雝支子封今陜之平陸東北六十里故虞城也漢大陽地本帝舜後封即西虞有呉山虞井樊三􅀈􅀢仲山甫采宣王封之􅀢也今京兆杜陵有􅀢鄉樊川昔惠王使虢公伐樊執仲皮者記漢砠賜樊噲邑因號樊川妄王符以為封南陽在南雝州記荆州圖副摰虞等皆以為襄之鄧城然兖之瑕丘亦云樊仲皮國寰宇記瑕􅉌西南樊故城漢縣郡國志云樊仲皮國吉甫之墓則在南皮西三十髙三丈上二木自有墓來不老曰長秊樹亦作􅀈安陽周章次子風土記武王封周章小子斌于無錫安陽鄉今常之無錫有安陽山莾有錫閻有閻仲奕國閻􅀈三公晉之閻縣成王封康叔以有閻之土者定四為衛之朝宿邑地近洛與甘縣接境昭九年周甘人與晉閻嘉爭閻田預闕之樂史在河陽有閻坎一為閻田解縣也非鬼閻宋地杜云穎川太平西北有鬼閻亭潁川今許長平未詳邘哀九廣陵東南有邘江即邘溝太鹵太原榖梁云中國曰太原狄曰太鹵地與狄境今陽曲發繇海陵東南有發繇口哀十二年之發揚也右泰伯仲雝後子曰泰伯其可謂至徳也已矣三以天下讓民無得而稱焉禮讓為國之本也昔者虞帝一讓而九官皆讓范宣子一讓而其臣皆讓下之視俲芿草偃風況始國之君哉詩云受爵不讓至于己斯亡少康以克艱興而句踐亦以克艱興泰伯以天下讓而季札亦以呉國讓惟其有之下必有甚焉者故能禮讓則知禮而敬上矣知禮敬上于為國乎何有古公之時周家之業葢已形矣其所以當得之者泰伯也乃不受而三辭之其不受也非為名也非為其弟也以天下故豈其心之有是哉心無是是故天下莫之知天下莫之知何從而稱之哉范煜亦言泰伯伯夷未始有讓若許由者能逃天下而不能逃名迹不冺也鄉使泰伯遷延退辟不能堅决則民得而稱之矣豈至徳邪泰伯無子弟至徳不為雝文王者天之所命也伯惟知此是故致國不屑夫以君之元子而棄宗國以逃形身本中夏而冐先王之大禁以從狄安行獨復又曷嘗以讓為為美而為之哉符子曰泰伯將讓其國於季厯謂其傳曰泰王欲以一國之事屬我我其羞之吾聞至人不君一世而萬世以之君不貴一代而萬代以之貴吾焉能貴乎一國而賤乎萬代哉乃去其國夫泰伯以國讓而云以天下讓者非用天下讓為天下而讓也方古公時邑于梁山之下何嘗有天下禹稷躬稼而有天下文王一怒而安天下稷文王何嘗有天下為天下讓故民無得而稱若以天下何無得而稱哉三讓之説亦推見至隱而知周之所以得天下之本云爾太史公云伯知古公欲立季厯亡之荆蠻斷髪文身何嘗見其三讓如所謂南鄉讓天下三哉方太王時以與王季而王季以與文王文王以與武王皆泰伯啓之也論衡云泰伯見王季有聖子知太王意欲立之乃入呉采藥斷髪文身以隨俗太王薨泰伯還王季避世泰伯再遂王季不聴三遜曰吾之呉越呉越之俗斷髪文身吾刑餘之人不可為宗廟主王季乃權受之古今樂録云泰伯與虞仲俱去被髪文身變形託為王采藥及聞古公卒乃還發䘮哭於門外示夷狄之人不得入王庭于是季厯謂泰伯長當立伯曰吾生不供養死不含飯哭不臨䘮猶不孝之子也何得繼又斷髪文身則刑餘之人也戎狄之民也三者不除何得為君委而去之故孫盛三讓論曰鄭𤣥以託采藥而行不與發䘮斷髪文身為三者之美隱蔽不著而王肅則以謂其讓隱故民無得而稱𤣥既失之肅亦未為得也如𤣥所云天下共見何云隱而未著且逃去與不發䘮本止一事而斷髪文身文與左氏明文不合子言三以天下讓如季札子臧之倫者按王充書古公三子其季曰歴季歴生昌在褓瑞見古公曰吾世當有興者其不在昌乎泰伯知之乃去之呉夫泰伯葢知天命之在昌不去則惑惑且亂是故翩然有不俟駕此其去之為天下者明也真父云自竄荆呉以讓季厯也讓季厯者以有昌也所貴昌者以有發也伯見季厯仁人者文武乂聖知天意方啓周室故黙焉而退讓仁人者一讓聖人者二故云三以天下讓夫以為伯知文武之聖當得之而后遜則武之牧野無是心也而況於泰伯乎時平則先嫡國難則先功此憲之所以讓太子也若齊景公簒其君兄之位雖有千駟死之日曾何足為稱哉秦王世民功既髙矣而建成元吉猶不之寤卒以自斃則知為己而已夫又安能以天下哉泰伯可謂至徳也已矣路史卷二十六

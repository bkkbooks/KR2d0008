body:
  text: 路史卷三十四宋羅泌撰發揮三辯𤣥囂青陽少昊𤣥囂青陽少昊三人也説者以𤣥囂為青陽或以青陽為少昊或盍三者以為一劇為淺陋按春秋緯黃帝傳十世雖未足信然竹書紀年黃帝至禹為世三十世以今攷紀亦一十二世昔漢杯育冶始終黃帝而來迄元鳯之三三千六百二十九載帝世年世正自多有内簡黃帝後有帝鴻有帝魁有青陽有金天而後乃至高陽金天少昊俱為青陽之子攷之書則無疑質之世則不詭青陽𤣥囂自二人固也王氷黃帝經序云黃帝九子一曰帝鴻封冀二曰金天封荆三曰挈封青四曰青陽封徐五曰顓頊封預六曰高陽封雍七曰帝嚳封梁八曰帝辛封兖九曰姬都封陽子者非謂其生也謂其世也求之世則然矣而其記則誤也二金天當是帝魁三挈當是少昊四青陽則少昊之後六高陽則顓頊之子八高辛則挈九姬都則堯也司馬公作史記不紀少昊畧不識其所出而言𤣥囂不得居帝位夫少昊之榘度顯在人目三代以來皆所尊用祀于五帝之位正于月令之次徳之在人如是之著而𤣥囂不得居帝位則𤣥囂非少昊明矣外傳史記古書皆不言少昊為黄帝之子也史記云黄帝生𤣥囂是為青陽降居江水此太史公之誤也黄帝之子二十五宗賜姓十二惟紀有二餘十有三皆姬姓也史云得姓者十四人此本國語為十二姓二姬二紀其文甚明觧者乃破為十三盖不知國語姬紀二姓青陽之失青陽與夷彭同為紀姓𤣥囂與蒼林同為姬姓少昊生于青陽循其紀姓帝嚳出于𤣥囂循其姬姓世本紀姓出于少昊而帝嚳之子帝堯猶襲姬姓氏姓之來各有𣲖别則𤣥囂青陽又不得為一明矣𤣥囂西陵氏之子青陽方雷氏之子少昊于類氏之子夫𤣥囂降居江水青陽安得降居江水之事葢太史公統記二人皆出黄帝而並列之後世因傳習而誤之其初宜曰生𤣥囂青陽𤣥囂降居江水爾少一𤣥囂字魏曹子建之贊少昊也亦稱祖自軒轅青陽之裔則少昊為黄帝之孫而青陽之後矣惟帝徳攷云黄帝之子少昊曰清又曰清者青陽也其子曰摯兹太史公之所取所以致學士之疑者葢少昊二字傳之者之贅之也少昊非清而摯即少昊郯子曰我祖少昊摯之立是也是以張衡條遷固之違誤謂帝繫説黃帝産青陽昌意與周書之説異而郭璞亦云少昊金天氏帝摯之子也然以摯為青陽之名則又誤矣記注紊亂如此學士何從而要質之予故詳焉論史不紀少昊司馬氏父子世典太史其作史記也首于黃帝而繼之以顓帝帝嚳又繼之以唐虞以為紀三皇邪則不及羲炎以為紀五帝邪則不應黜少昊而首黃帝學者求之而不得其説此所以致後世之紛紛而蘇子之所以紀三皇也竊觀太史公記首黃帝者特因于世本若大戴禮帝繫五帝德葢紀其世而非主于三與五之説也抑以為後世氏姓無不出黃帝者故首而宗之至于羲炎鮮有聞焉是以不紀是太史公之本意也孔安國劉向服䖍以黃帝為三皇而司馬遷列之五帝首晁錯桓譚王肅遂以為據夫以黃帝首五帝則五帝為六而三皇少其一故甄曜度益以祝融氏白虎通益以共工氏鄭康成益以女媧為皇而五帝為六人以為德合五帝者稱之不必人數拘而梁武遂以燧人為皇黃帝少昊顓頊帝嚳堯為五帝舜弗豫謂舜非三皇亦非五帝特與三王為四代尤為無據然而少昊不紀則失之矣以為易不著邪則易稱神農氏沒黃帝堯舜氏作顓嚳且無而况少昊氏乎易傳不言固得謂之無哉無其人則無是號矣年渺世夐傳者自少豈直少昊與顓嚳乎葢五帝者皆循黃帝之道無所改作故易傳不之著劉恕不知出此乃竟黜而不特紀果為得歟難然此特世之所知者也世之所不知者又不少矣萬􅑤之下其或書出于巖壁有得以信聖人所不言者多矣非不之言也言之不及也非言之不及也制度之不章也言之不及後世因無得而觀焉此學者之不幸也豈直少昊顓嚳邪或曰易傳之不及之既聞命矣敢問周用六代樂封三恪何以皆不及之邪曰不用其樂先賢言之備矣葢制度之弗傳爾且夫司樂以雲門祀天神以咸池祀地示以大磬祀四望通夏商周之樂凡六磬古韶字今周官等皆作大磬謂舜樂大韶之外别有大磬繆也夫黃帝之樂多矣何獨取之雲門堯舜之樂多矣何獨取之咸池大磬乎葢以法度之可尊醇厚之可樂也所不用者法度之不足而遷之是以三統厯言周遷其樂故易不著崔靈恩謂非如舞之制又非今宜故越之而用雲門不立其樂亦不為恪是皆知其一未知其二也昔者六國之君魏文侯為最好古漢孝文時得其樂者竇公獻書乃周官大司樂樂章也厥後河間獻王與毛生等采周官及諸子言樂者以作樂記然大司樂有雲門大卷大咸而樂記則有大章咸池亦自牴牾矣雲門大卷皆黃帝之樂大咸即堯咸池之舞而大章又堯樂也豈非法度之可尊醇厚之可樂故邪且英韶本皆黃帝之樂後世所不知者鑄十二鐘以韶英韶是也顓帝曰承雲帝嚳曰大韶則是高陽承之而高辛大爾舜歌九淵以美禹功禹因之為大夏則固少昊之樂也帝嚳作大韶六列五英舜修而用之則是三后之樂虞兼修而用之矣然韶不言嚳而稱舜淵不稱少昊而言禹者以其備各詳本紀若曰三恪之不封則我未之前聞也少昊之後周封之于莒矣苐以代遠而黜于恪顓帝之後為禹為陸終禹之裔固已在恪而終之六子周代俱列土宇非不封也帝嚳之後則為陶唐為商周唐及商之裔已俱恪矣周固不論也若夫上古之君其世渺矣其系微矣其政散其樂缺有不可得而攷矣雖欲用且封其可得邪又或封之而所封不見亦不得而紀也固陋之言固不足惑然後之君子之所欲聞予得而略乎明三正甚矣周秦而下先王之政無一定之説也三代之所尚正朔異服色殊昔者竊聞之矣果且有是乎哉果且無是乎哉以為有是乎而説者以為正朔聖人之所不言文武政而正朔循嬴秦不害于治嬴秦政而服色從三代無損于亂顧其本而已矣以為無是乎則説者以為五帝以來正朔悉異三皇而往服色舉變不若是不足以為盛而廣川先生河汾老子猶以為言卒不得其衷也或曰授受者循其故革命者變其時是故夏禹而前不有改也其然乎孔安國云自古帝王皆以建寅為正惟商革夏命而建用丑周革殷命而建用子葢以為革命者必新制度以變天下之耳目也昔孔子作春秋書王三月而古之王者必存二代所以通三統也三易之書首乾坤艮而怠棄三正扈氏之所以為不恭者何至於禹而後革之哉三統合于一元故春秋書春王正月者九十三王二月者廿一王三月者一十九明此乃時王之正月所以通三統也故漢宣詔曰春秋于正月書王重三正謹三微也髙堂隆云三春稱王明三統也然竊攷之三皇之代歲皆紀寅顓帝之厯攝提首紀而帝堯之分四子亦鳥正于仲春是則其建同矣惟虞之法雖不著見而分巡岳鎭必按四仲是則三聖之相授所守一也使舜易堯正則禹改之矣夏正得天明不改也是不然亦人事而已矣葢亦有天事焉何則天下之事有本有文有因有革文者天之事而本者人之事可革者其文而不可革者其本也在文可革則三皇而必革在本可守則雖三代而必守是故湯既革夏而建用丑矣至于作厯紀元則復以冬首外紀湯革夏改正朔以建丑為正月變服殊號而作厯不復以正月朔旦為節更以十一月冬至為元周從之武既革商而建用子矣至於授時巡祭則猶用夏時是則本者未嘗革也外紀武王克紂改建子為正月以垂三統至于敬授民時巡狩祭享猶用夏時二事葢本世紀厯紀實出汲書周月云夏數得天百王所同商湯用師于夏順天革命改正朔變服殊號文與質示不相沿以建丑之月為正若天時大變亦一代之事越我周王致伐于商改正異制以垂三統至于敬授民時巡狩承享猶自夏焉知夏時不可改改正者示不相沿而已惟元祀十有二月太甲之正月也不以商正紀惟一月既南至周書之正月也不以周正書正月繁霜四月維夏五月鳴蜩六月徂暑九月授衣夏之時也故易説曰三王之郊一用夏正人事然也春秋書王正月説者為周正月周正建子天道然也雖然天道始于子而春必寅卯辰若以周之正月二月豈得為之春哉故如周官所言春夏秋冬皆為夏時小雅豳風亦皆夏正毛鄭之説皆然葢春秋方以尊周何得不用時王之正大傳云改正朔易服色此其所以與民變革也疏正謂年始朔謂月初言王者得政示從我改始故朔隨新正唐彭偃所謂王者之政以變人心為上是也晉傅常侍議應遜禪則不改正朔遭變征伐則改之魏受漢禪亦已不改者謂此傳曰五帝殊時不相沿樂三王異世不相襲禮夫不相沿者樂之器而樂之情未嘗渝不相襲者禮之文而禮之實未嘗易是故正朔之所異者寅子丑而春夘秋酉則同服色之所改者黒白赤而上繪下絺則等忠質文雖異尚而簠豆升降之節均爵富親雖異貴而仁義禮信之施一也豈非文者可革而本者不可革乎子曰商因于夏禮所損益可知也周因于商禮所損益可知也商繼夏周繼商有改制之名無改制之實革其文不革其本也今夫忠質文之相胥以成治猶寒暑之相代以成歲也有偏勝爾烏可以獨任哉奈何説者離之而指為相救術耶易曰兌正秋也夫以兌為正秋則震為正春而坎為正冬離為正夏也必矣周書之周月曰四時之成歲春夏秋冬各有孟仲季十有二月中氣以著時應春三月中氣雨水春分谷雨以至冬三月中氣天地之正不易之道故斗必指寅而後謂之春必建巳而後謂之夏此不易之道也今也以冬為春而以夏為秋則四時反易而失其位矣且既曰建丑矣而書始復位則曰三祀十有二月是月不易也曰建亥矣而書始建國曰元年冬十月是時不易也子丑非春亦明矣建用寅謂之歲用子謂之年太史歲年以敘事是也又用先代之厯周正建子而四時之事亦用夏正如正歲讀法三歲大計群吏用寅建也如司稼視年上下之類用子建也昔者顔子淵吾夫子之以帝王之道許之者也方其發為邦之問也則告之以四代之禮樂如乗輅則商之從服冕則周之從惟至於時則斷俾之行夏誠以人事之不可得而革也行夏之時見夏政之得天乗商之輅明商政之得地服周之冕周政之得人三者備然後成之以韶樂樂者政之成也昔縣子問子思曰顔子問為邦夫子曰行夏之時商周之異政非乎子思曰夏數得天堯舜之所同也商周革命以應天因改正朔所以神其事如天道之變然也而世有為歲本之説者乃謂子當夜半則輙屬來日遂以子丑之月屬之來歲葢亦不知此天事爾夫又烏知日出之二刻半為明聖人本人事而施之哉知夫此則三正可得而議矣天施地化之道葢自有理人生自寅而成于申地化自丑而畢于辰天施自子而復于于此又繁矣雖然商以建丑革夏正而不能行之于周周以建子革商正固不可行之于夏秦以刻建此何等時邪其不可行而謂之閏位也宜矣漢室承之不之能改至于孝武而始克用夏魏初寅建至其子叡乃建用丑及孫齊芳始復從夏唐至永昌尚猶行子既而用夏上元初載爰復以子又年而復寅紛更膠葛之如此雖然由漢迄今千有餘載惟夏正者卒莫能易豈非文可革而本者不可革歟紛紜之論夫亦豈知三代之政文變而本不革哉不然三代而下豈予之屑言歟青陽遺妹人主有大惑九材者處其四而不材者處其五好貨貪仙悦女色而事四夷此材者之所惑也為游觀喜符瑞好樂便佞而諛佛此不材者之所惑也是九者皆足以䘮身亡國而女色為尤急子曰我未見好德如好色者也天下之物好之斯惑之矣小惑易好大惑易性是故攫金者不見市賈逐􅊵者不見泰山而况女色之移情乎艶妃姯妓婐􅛭柔撓方其好之窮身究欲以至五情爽越人倫悖謬而不知所為主雖其屋漏匪隱無往不用其至有如當塗之子留心闇室無非肆意得志之所怦怦鞅鞅惟恐不極幽而甚密也當此之時敵國奚求而不得哉譖愬行于尊爼之間鴆毒作于言笑之下日朘月浸夫孰得而知之然則化人而禽自盛而衰孰非是邪昔者孔子用于魯齊景公以犂彌計歸女樂于季氏而孔子行舟之僑用于虢晉獻公以荀息計歸女樂于虢公而之僑去由余用于戎内史廖為穆公䇿遺以女樂二人而由余奔子胥用于吳陶朱公為勾踐䇿遺以西施鄭旦而子胥死是非神秘之畧也非有駭異之謀也然而四發四中如出一軌良以人之好耆不大相逺而德色之心不能兩重故雖大有為之君一蔽于是則從聖如孔子賢若僑余有去而已忠若子胥有死而已尚何道之能行而何謀之能濟哉雖然是特以取小國爾故有以下大國者矣昔者夏伐岷山岷山以妹喜伐夏商伐有蘇有蘇以妲己伐商周伐褒而褒以姒氏伐周晉伐驪而驪以姬氏伐晉故曰三代之亡皆是物也然則鄭武公困于胡人而先妻之女以娛其心然後襲而取之重丘氏苦于青陽而先遺之妹以惑其志然後襲而㓕之斯亦秦越人小兒宣轉累效之名方也嗟夫理義之備所以養其心芻豢之設所以養其形也理義勝者正氣盛而天理行芻豢勝者血氣滋而人欲熾人欲熾則好色之心軒天理廢故好德之心輕權輕物重權重物輕此不易之理也三代晉侯既覆于前而吳魯戎虢復溺之于後然繼此者代不乏有是何邪亦不剛而已矣剛者天之德而君子之操也終日乾乾自彊不息則凡天下之物有不足以動其心而況于格物之餘乎刑寡妻刑二女一正家而天下定矣又奚至氣轢萬夫而困躓于一粉黛哉由此語之貞觀之君亦足以豪矣貞觀二十年高麗進美女二太宗謂其使者曰爾其歸告爾主美色人所重也爾之所獻信美矣吾謂不然閔其離父母兄弟于本國留其身而忘其親若夫愛其色而傷其心朕不取也近日林邑獻鸚鵡彼鳥尚解思鄉訴請還國况人乎乃還之辨伯翳非伯益秦趙宜祖少昊事有若迃而實先似緩而實急者世次之亂姓氏之失此人倫之所由紊習俗之所由薄也予之紀少昊也既辨𤣥囂青陽少昊為三人矣復合太史儋老子老萊子以為一既辟仲衍不得為孟虧之弟矣乃復明伯翳不得為伯益之名若字豈無説邪夫孟虧當夏啟之時而仲衍事商大戊豈有同父之兄先已而出于四百載之前者乎伯翳者少昊之後臯陶之子而伯益乃帝高陽之第三子隤􅢺也然世俱以伯翳為即伯益其謬甚矣予嘗攷之伯翳者嬴姓之祖也書傳嬴姓實出少昊其源甚著非高陽後也郯子云我袓少昊而鄭語嬴為伯翳之後他記多同中候苗興云陶苗為秦臯陶少昊後也按陳杞世家序舜禹之功臣十有一人云伯翳之後平王封之秦而云垂益䕫龍其後不知所封不見也又云臯陶卒封其後于六或在許然後舉益而授之政則伯翳不得為伯益尤顯故劉秀表校山海經云夏禹治水伯益與伯翳主驅禽獸是則益翳為二人亦有能知之者苐太史公于益翳有時而不分所以致後生之繆爾秦本紀云高陽之裔孫女脩生大業大業娶女華生大費女脩乃高陽之裔女而適少昊之後大業之父者葢大業之父名不著見而秦趙二家遂以母族而祖顓頊非生人之義也郯子曰我祖少昊而嬴氏乃其族也則秦趙宜祖少昊為得其正班固之徒不知攷此乃直以女脩為男子而系之高陽之後故世遂以伯翳為伯益不復别也抑又稽之伯翳葢封于費者也是以有大費之稱若夫封大唐者費昌費仲俱其後也而世亦復論更以大費為伯翳之字益可嗤矣且大業者臯陶之父也而史記音義復以臯陶為即大業葢以史記大業之下無臯陶而失之至世紀書乃直以為髙陽生大業又以大業之妻女垂為大業之子而别出女華之妻名曰扶始扶始生臯陶臯陶生伯益唐書取而用之此春秋元命苞之説不足實也元命苞云堯為天子季秋下旬夢白帝遺以烏喙子其母曰扶始升高丘白帝上有雲如虎感之而生臯陶扶始問之如堯言烏喙子謂臯陶也原焚甚矣焚尸之酷也其禽獸之不若乎夫人之所以異于禽獸者以其存心也以其有禮也孟子曰存心養性所以事天也存養者盡其事而無媿之謂爾生有養死有葬所以事也子夏曰傷哉貧也生無以為養死無以為禮也人之生世豈惟自求飽煖逸樂而已哉生欲以為養死欲以為禮爾今也生無以為養而又離之死無以為禮而又焚之非惟離之又絶之非惟焚之又棄之可謂人乎孔子曰今之孝者是謂能養至于犬馬皆能有養不敬何以别乎夫能養亦難矣而猶未足為孝然則孝者豈惟能養而已哉必有敬焉既不敬復不養既不養復不葬此何理耶曽子曰愼終追遠則民德歸厚矣䘮祭之禮薄則倍死忘生之人衆矣敝帷不棄為薶馬也敝葢不棄為薶狗也孔子貧無葢于其狗死猶與之席聖人之于物亦且致其盡矣父兮鞠我母兮育我而顧生離之至于凍餒而弗之顧比其死也復一舉而焚之撲之湍流微塵漂散示以不返其不及犬馬也遠矣嗟夫焚事戎俗也在昔三代罪至惡逆乃有焚尸所以示凌遲而絶之人類也奈何末代不知其故反狥戎俗舉凌遲惡逆之刑而施其親豈不大可哀耶嘗試語來砭孕者胎必傷扶生者尸必疻天地之所以使人重其生也覺昏而夢靈生㝠而死神造物之所以使人謹其死也立和表而為神道陳𤣥輿而設偽物啟塗軷遣臯嘷而祝發之勿震勿驚凡所以安神而妥靈者惟恐其少不至斧棺裂槨過者褫魄是所謂妥靈耶方其熾焰皮㿰盎罐筋骸縮胎至有起而蹲者兹禽獸亦不忍而孝子順孫時且為之于汝安乎抑嘗稽之雷公之書炮炙之方一骨一石必曰存性而今爇者睎薪熇㷄橐而鼓之務桀其事靡遺餘力父母之一性果復存乎然而愚者卒惑至自喜其能然曰予之能事畢矣反控其故則曰佛者教也彼善為祝而善懴是將生善地也吁一何愚之至此極耶世有導人溺者語人曰我善為祝將俾而為水仙而第溺之毋憂而信之乎夫既已離而絶之方且燔不根之故楮以為薦既已焚而棄之方且作無用之蠻語以為祝其果信乎生受離絶之苦死受焚棄之酷而顧區區從事于無有所益之薦祝是之謂放飯流歠而問無齒决其不情悖誣也明矣曩予觀于秘閣閒談有鄭民張福詮者貴糶為雷所撲其妻焚之中道忽死既而讝曰福詮震死亦備苦矣而又且焚不已甚乎予以是知焚事之為死者苦也甚矣可不戒歟易曰敦艮吉象曰敦艮之吉以厚終也夫欲人之歸厚必自人倫始人倫之切莫若喪祭而顧可為畧耶藏千金之璧者緹衣十襲匣户九扄齋沐而出之猶恐不敬况于親乎王喬之仙彼固以為天下玉棺是則人情之不可磨滅者雖天上不廢也且其説曰世尊之死金棺銀槨其自奉也葢若此而顧以焚棄之事待世人乎謂不然矣若曰能遺形乎則波旬之叫哭文殊頓足果遺形乎然則今之為焚事者眞禽獸之不若也孝子順孫葢亦為之却慮而深思邪雖然流俗之為之抑有由矣奉佛事則曰無餘貲而不𦵏也溺陰陽則又曰無善地而不𦵏也嘻上世無佛地獄何無末代誦經天堂何有天堂無則已有則君子登地獄無則已有則小人入而顧佛者何為忠孝既昭三鶴自戾碑誄雖崇無後可守高緯之父母非不卜宅兆隋文之墓田非不叶吉而反為殃亦可以理曉矣然則世之君子盍亦為之觀相而節度之乎設棺槨以歛之捐壙原以安之使比化者不暴于外追逺者不失其處而又為之法制以禁其逾期不𦵏而為佛事説陰陽者其亦庶乎其可矣原理李二氏世之謬誤者無氏姓若也非氏姓之無統也由人之好言氏姓者謬誤之也予起路史而後天下之氏姓始得其正矣臯陶之後有嬴氏偃氏以其為理則又有理氏李氏理天理也故天官書云左角為李然則李理二字在古特通爾非有他義也陸佃説禮用云李水之子又水子也可謂正矣仁實也故古以為理官之字管子書云冬李也又云黃帝得后土辨乎北方以為李而呂春秋亦云后土為李又云臯陶為李昔晉文公命李離為李以為臯陶之後是矣是古者理官之理字直為李其義一也傳云一介行李即昭公十三年傳之行李也杜云行李謂使人今世並用周語行理以節逆之賈逵曰理吏也小行人也而孔晁本亦作李云行李行人之官宣公三十年傳行李往來郙閣頌云行李咨嗟葢在夏商之代已有此李氏矣詳少昊紀而姓氏之書及北史若唐新舊書等乃云老子生于李下而以為姓或云因亂食苦李而得姓或又以為饑餌木子而姓之均為妄誕范祖禹云書云臯陶為士而史以為大理既不經矣又以為李氏所出尤非族類唐之先祖出隴西狄道非如商周世次之可攷也夫謂唐出狄道可矣謂李不出臯陶則未覈暨葛孝先直謂老子之母李氏女也故老子因母以為姓迨其孫洪傳諸神仙因謂老子生于李家猶為李姓非也漢屬國侯李翊碑以李氏為出于箕子尤為無所本矣吁後世之妄日益繁矣氏姓不勝誤孰正之哉老子化胡説德經曰出生入死生之徒十有三死之徒十有三人之生動之死地十有三嘗謂道陽而德陰老氏歸陽釋氏歸陰分道德為二經其義斯在昔未有知此者惟道君皇帝以僧為德土葢體之矣夫一性之元湛然虛徹曽何有于生死哉其所以生死者出則為生入則為死而已矣生之徒十有三謂十之中生者居其三也死之徒十有三謂十之中死者亦居其三也而人之生動之死地十有三者則是一性本生而顧不能静每以物動而自趣于盡者十又處其三也葢生者居其一而死者處其二也既已十管其九矣而其一置而不顯者是何邪非出生而入死者邪乃不生而不死者也是生死之道九而不生不死之道一也佛者之教不出于此矣老子之所以化胡惟此道爾謂之德經事可見矣詳五千文意葢留猜後人者而韓非以為四肢九竅三生李宿以為之食神禄與倒食陽干前一陽干為食神後一陽干為倒食互相食伐皆在干十三數以是為所言生死之徒溺于術矣然釋氏之無知者輙諱其事又從而誣罔之固非毗皤尸之意釋氏推過去毘婆尸佛而老子者不知出此乃復羣起而較其容儀之盛衰與夫出世之先後以爭之祗見其不能勝爾雖然釋子之無耻豈惟誣老哉羲媧孔顔之聖且弗免也彼腐儒者既莫之能謫又從而怖之吁釋有所謂造天地經云寶厯菩薩下生世間號曰伏羲吉祥菩薩下生世間號曰女媧摩訶迦葉號曰老子儒童菩薩號曰孔丘復有清靜法行經云眞丹國乃能從化其見侵侮迦葉往為老子淨光童子往為孔丘又遣月明儒童往為顔回三弟子者出生其國乃能從化其見侵侮如此故唐杜嗣先有吉祥御宇儒童衍教之説而韓愈曰佛者云孔子吾師之弟子也釋者遂有詆韓論甚矣其無忌憚也雖然道家者流亦有記莊王癸巳之歲一陰之月老君遣尹眞人喜乗月精白象下天竺於静飯夫人口中託生佛者嘻事亦善于報復矣夫天下之事豈有二道老釋之教其初則一苐其立教各開户牖以自為異而末遂至于不相涉爾今溧水縣南七十五里有儒童寺者本孔子祠唐景福二年遂以為孔子寺以孔子適楚經此南唐改曰儒童寺故予嘗謂江南之亡非文之罪用浮屠之過己丑閉閲化胡經書論恒星不見語之無所稽妄言也聽之而不審妄信也和之而弗擇妄隨也佛者曰方摩也之誕也川地震動天夜有天而恒星不見此則妄言者也佛之父為淨飯王母為摩邪夫人摩邪者莫邪也故古今論衡周書異紀云姬周昭王之二十四年甲寅之歲四月八日井泉泛溢宮殿震動而恒星不見五光貫于太微王問太史蘇繇對曰西方有聖人生却後千年其教法來此矣是以世謂孔子書恒星不見者將以為異時之證而傳記悉從之此則妄信者也汲紀年云昭王末年夜有五色光貫于紫微其年王南巡不返所引異紀葢即此爾按春秋在昭王之後夫春秋所書恒星不見乃莊王之十年甲午之歲上去昭王之甲寅有三百四十年之差故顧微之吳地記謂佛法之始典籍無聞而亦狥舊以魯莊公之七年夜明恒星不見為佛生之日然恒星之不見乃四月辛卯之夕是歲四月丁亥朔辛卯乃月之五日非八日也是皆不得而牽合者莊公七年乃見莊王之十年故齊王巾有周魯二莊親昭夜景之語謝丞漢書以為癸丑七月十五日託于摩耶之腹莊王十年甲寅四月八日始生然莊王十年乃甲午又非甲寅甲寅又後二十年此則腐儒習于妄説屬意牽合而不知所攷者葢釋之徒欲蔑老子化胡之説故推而上之于昭王之時老者又不能以其道勝復為推曰老子以商王陽甲庚申之歲降于𤣥妙之胎紛紜誕妄不可殫紀使知退之弟不必不如師師不必賢于弟之語則必不為此妄矣嗟乎川地震動天夜有光而恒星不見星隕如雨變有大于斯者乎傳曰左氏臣與雨言其多也偕榖梁言既隕而後雨皆非夫晝星不見則見是夕無雲及雨矣故公羊曰非雨也春秋不修魯史記曰雨星不及地尺而復孔子修之曰如雨豈得雨偕乎本行經云虛空無雲自然而雨陋者之談經如此方三川之震于幽王之時也伯陽甫以為周亡之證厥後果然詳春秋外傳而厯攷前代天夜有光漢成帝元延元年晉穆帝永和十年皆為歲星亂權宋元嘉十一年張祚元年皆不乆大亂恒星不見古曰主不嚴法度消又云天子失政諸侯暴橫國亡之象陳太建五年九月晦恒星不見二十八宿及中外官搖動星隕如雨漢永始元年二月癸未晉太始四年七月皆西流太康九年八月壬子宋元嘉二十年三月乙未皆北行至曉不可計又二十四年正月大星皆西流至旦日光定乃止大明五年三月流星數萬千並西行梁中大通四年七月甲辰隋開皇十九年十二月乙未廣德二年二月丙寅中和元年八月癸丑及十三年十一月天祐二年三月乙丑五代長興元年九月辛酉皆亂世之兆以春秋言之前乎此則五國連衡旅拒王命後乎此則齊晉主盟王室遂衰永始之間亦以五侯擅權王莽簒祚自此而還晉梁尤多葢皆佛氏浸昌之應皆非佳事况諸祅叢夜今古獨此使佛果因此變而生固非家庭之令器矧復年庚日甲無一者之可合邪然倡之者皆以為實勃又從而神之兹非妄隨者邪或曰安知非昭王時乎曰非也彼所以牽合之者正以春秋所書在四月辛卯故遂誤以為八日爾古今占鏡云莊王九年四月八日已失不攷而杜預更以為七日豈自為長厯而自繆之邪又按髙僧傳世説宋書劉宣傳皆以四月八日為佛生日而歲時記乃以四月八日為彌勒生二月八日為釋迦之生信捨之家庭入關齋香花遶城謂之行城故壽陽記梁典有四月八日行城樂而阿那含經謂是日當行入關之戒云二月者葢以周正而記者妄别之爾故言佛年十九以四月八日出家而本起經云二月八日踰城出家則此八日特出家之日又非始生之日也再攷春秋恒星不見後百十五年而老始生而十有五年而孔始生妄者不知乎此求以相先故一意推而上之爾于通曰三教可合為一既曰三敎則孔老釋迦之生必不異時而佛决不以恒星不見時生三敎鼎立何有異代傳記之言誠不足惑然佛敎必出于老者以出生入死之章知之也抑又言之恒星之不見雖非必佛之生然稽其變知亦為後來之有佛也謂孔子為有為書之庸有之矣劉向曰夜中中國也其子歆曰夜象夷狄夫歆向雖説異同而其言俱理何則聖人不識夷狄因其有弊而中國䝉其弊則著之佛之為中國弊也篤矣三代之時闗譏而不征凡竒伎奇器怪迹孟行者皆不得進于城門之内慮其搖民蕩衆而不之能出也彼佛之敎固非三代而下有也三五之時固已有是人矣晨門荷蓧何代無有苐先王之道充滿乎天下天下之人厥有恒性而彼之偏習無自入三代而下四體虛羸方切畏戒而且不知守此邪風戾氣所以得長驅而入之方莊列之出也佛之敎將出矣孔子知之而莊列不知也觀微子之篇則見聖人之所以憂之者矣三代之際每切譏禁豈茍爾邪及後之世不惟撤其譏禁而從之又延之梱内而盡室以聽之矣二千年間其颺精破膽以至于死者不知幾千百億而猶以為得邪夫狂者東走逐狂者亦東走迷者赴水拯迷者亦赴水此未為失也其所往同而其所以往則異也今也見狂者之走亦竭蹷而效之覩迷者之赴水亦裭褕而從之其狂迷亦甚矣豈不哀哉佛之名學記曰其施之也悖其求之也佛釋名曰轡佛也言牽引佛戾以制馬也故曲禮曰獻鳥者佛其首畜鳥者則勿佛佛者拗戾而不從之言也觀佛制字以一弓從兩矢豈不拂哉語曰從諫勿拂是輔拂之拂亦作􅀢􅀈義可見矣佛曰吾之道佛于人者也人曰彼之道佛于我者也人固以此而名之佛固以此而自名其所謂佛如此而已而庸人事佛欲以崇之而不得其嘉號則轉其義以從嘉釋曰佛者覺也噫謂佛為覺亦不知所以覺矣梁武以佛有悖音始改悖音為倍後始經史循之非也宋子京既于國語音義正之雖然世俗之所以尊之可謂至矣然皆欲尊之而不知其所以尊之者予請得以大其説而遂解之曰滿世之人皆莫能譽佛欲夸其事我則能言之矣瑞應本起因果之經皆所以凂佛者也胡不揚孔子中備經之言以附之乎中備經曰觀夫震爻之動則知有佛矣又胡不舉列禦冦所記商太宰問孔子之語以譽之乎其為説曰太宰見孔子曰丘聖者歟孔子曰聖則丘豈敢博學多識者也三王聖者歟曰善任知勇者聖則丘弗知五帝聖者歟曰善任仁義者聖則丘弗知三皇聖者歟曰善任因時者聖則丘弗知商太宰大駭曰然則孰為聖孔子動容有間曰西方之人有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉丘疑其為聖矣弗知眞為聖歟眞不聖歟是則非佛也邪中備經列禦㓂之説吾不知眞孔子之説歟非孔子之説歟然説如是則三皇五帝俱不足以方其聖矣是則佛者不亦危然甚大矣乎然則世之人其亦有能如是而譽之乎吾故曰世之人皆莫能譽佛欲夸其事我則能為之言矣將譽佛者請參之台之説佛之俗長守富貴浮屠之為教所可惡者尤惡于以利言也夫人之情莫不欲生而惡死欲存而惡亡欲安而惡危欲富而惡貧欲佚而惡勞欲壽而惡夭何哉物重故爾聖人忘生不留于物自非聖人未有能免此者是故貧者莫不欲富也而處富者更憂其復貧賤者莫不欲貴也而處貴者更憂其復賤危者咸欲安也而已安者未嘗不惡其復危生者皆欲壽也而既壽者未嘗不惡其復死欲之既至牢不可解而為佛者乃為姦偽以中其情曰吾能生之安之富之貴之不惟是也而修吾事者則富弗復貧貴弗復賤而安且壽者弗復病且死也雖斷無是而世之愚莫不惑而奔之至于截髮掛缸煉腕釘髁賤身祈嗣棄子禳灾靡所不至而莫之禦也甚至在上之賢不知孔子所以長守富貴之道而時且為之然貧與賤病與死卒有時而不得離則亦不知以彼為非也彼姦偽者度知貧與賤病與死之不可免則其伎有時而遂敗于是又為不可勘之説以欺曰西方有極樂世界焉修吾事者死將得金地以處也雖斷亦無是而愚者信之愈益固則亦以其無從質故也夫舍衛諸國臣服天竺雪山鷲嶺驛使常至夜义落刹本乃三國而炮烙地獄正本自阿育王金剛舍利琉璃碼碯第如華之産鐵而青獅白象橐佗孔雀正猶華之畜乗斷刀破械解䯁吐火皆本幻術而剪髮貫耳吹蠡擊鈸俱其習俗本然世之惷人曽不之知乃類推而歸之不可致知之神其淺鄙者又倡而為詭怪之説殊可詆笑按晉宋浮屠記云臨倪國王生浮屠太子也父曰屑頭邪毋曰莫邪浮屠身服色黃髮若青絲始莫邪夢白象而孕及産從左脇出生而有髻能行七歩如此而已洎漢哀時景匿受大月氐使王使伊存口受浮屠經其所載者正與老子相出入葢昔老子西游出關過于天竺教胡人為浮屠厥後其徒更相推譽流傳而失實爾諸如法顯道安軰所記天竺等事槩可見矣顧豈若今之詭誕哉或曰子何釋之議惟不視其書則已矣程子有云佛書直不必觀觀必入之矣是則不然不觀其書此程子一人事也今有道者擿埴而示曰足之下寶窖也然後過者柅足莫不徘徊覬夫窖之得也知其罔者必發掘明告之而後來者不惑懷恐其入而止之則自亦不明其窖之眞有無也人滋不信矣故予為之發其虛窖以諭之則人心庶乎其正矣嗟乎堯孔之教立之如登天浮屠之人壞之如燎毛因循茍且此天下之至大患也庸人之所喜而聖人之所憂焉者也庸愔之徒易以誑惑而况樂因循而彼且與其因循安苟且而彼且誨之茍且此其教之所以易與而不可返也天行健君子以自强不息終日乾乾天行也未聞以因循苟且為之德也障百川迴狂瀾君子曷動心焉道以異端而明無異端則聖人之道尊然有異端而聖人之道愈尊道豈異端之所能昏哉浮雲翳月月何嘗昏其所以為月者者常存惟决其翳而月愈清異端害道道何嘗昏其所以為道者常在惟去其害而道愈明爾道以異端而昏亦以異端而明也佛老孔氏之道端大不同矣而世之人每惑而不能判者惟不知其所異爾其所以不知其異者由其不能合見故也不合其見安明其異不明其異烏識其尊此聖人之道所以至今為不明歟泌請獻其所以異夫老言命佛言性而孔氏則兼陳乎性命老説生佛説死而孔氏則兼明乎生死老修道佛修德而孔氏則合道德而修之兹其所以大不同也雖然老之于性非不言也而以命為之重於德非不修也而以道為之本佛者則不然惟知性之為急而無俟於命知德之為尚而不契于道其所以違于道命者亦徒不知下學之義與夫窮理而已矣若老子者非惟恭篤禮信治國有道而兵戎之事尤所致意博愛之方既已異于彼矣至于孔子則天地功深生人道備何特生死性命之一端邪子曰攻乎異端斯害也己夫異端之害道在所攻矣而聖人且不之攻者非不之攻也攻之則害有甚也春秋之法責備賢者彼之道可與行邪吾固不得而不責今既知其不韙則不應與之矣乃奮而與之較既以為異端則不應進之矣乃引而與之列虎兕出于柙而牛羊殞于阹矣然後從而仇之是誰之過歟嗟乎佛之為吾道害也乆矣昔之大賢莫不欲去之也然迄莫去之者睽者又從而挽之也王子曰吾乃今知三教可合為一栁子又曰其言往往與易論語合夫將取其不合而辨之是與而較之矣夫既引而與之列而三之是誘而進之矣豈非攻之則斯害也邪學者之大患莫大于不識易而妄言王子曰大易之妙盡在佛書此宗元之憒憒也更引之邪今夫蚩氓稚子見弄木虎者驚喜嘆訝且畏且愛歸而誇于鄰之嫂逾年未巳而乃不知彼眞虎者耽耽蹲伏深林之中神色不動宛不異狗苐人不可得而即之然則庸人之要佛者亦􅃖氓稚子之愛木虎者以其可即而弄之爾二子之説予將置之邪則恐世之人以為眞而莫之識辨之邪則復慮若等惑之之深而反見誹以貽斯害之灾雖然猶不得而不畧正之大抵天下之事大過則反傷理之常也眞君之坑沙門毁像事至與安而復建德之毁經像還僧道至大象而復及會昌之撤寺宗民僧尼至大中而復夫亦豈知易道之變通哉曰然則終不可攻邪曰正其義不憂路史卷三十四

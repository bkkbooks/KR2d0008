body:
  text: 路史卷十一宋羅泌撰後紀二禪通紀太昊紀下女皇氏女皇氏㚿媧媧一作去㚿與庖同出唐文集雲姓按洞神部伏羲姓風女媧姓雲號女皇名媧蓋古聖人有不相襲以知書傳所言女媧風姓止本伏羲言之不知其嘗更也一曰女希世紀云虵身人首一曰女希是為女皇而姓書希氏出于伏羲風俗通亦云女媧伏羲之妹知羲希古通用虵身牛首宣髪𤣥中記云伏羲龍身女媧虵軀列子以為皆虵身牛首虎鼻故曹植贊女媧云二皇牛首虵形蓋人之形自有同乎物者今相家者流取象禽獸之形體者是矣非真首牛而身虵也韓愈栁宗元且不之達至今繪畫羲炎者猶真為太牢委虵之狀夫宛然戢然作于堂上而何以君人哉王充云世圖女媧為婦人形斯得之矣至陶𢎞景遂疑佛氏地獄中有所謂牛頭阿旁者為是三皇五帝尤可怪笑太昊氏之女弟盧仝云女媧本是伏羲婦非也蓋以女媧一曰女婦妄之出于承匡山名在任城縣東南七十里寰宇記云女媧生處今山下有女媧廟生而神靈亡景亡􅞗少佐太昊禱于神祗而為女婦正姓氏職昬因通行媒以重萬民之判是曰神媒風俗通云女媧禱祠神祈而為女媒因置昬姻行媒始此明矣夫昬以昬時而昬由此因以因婭而因乎人姻者烟之始媒者煙之聚所謂昏因姻媒如此太昊氏衰共工為始作亂振滔洪水以禍天下隳天綱絶地紀覆中冀人不堪命于是女皇氏役其神力以與共工氏較滅共工氏而遷之然後四極正冀州寧地平天成萬民復生㚿媧氏乃立號曰女皇氏冀州即中冀如蚩尤亦滅于此蓋屢亂矣或曰中國總謂之冀州詳今福地記治于中皇山之原所謂女媧山也山在金之平利上有女媧廟與伏羲山接廟起伏羲山在西域女媧山在平利寰宇引十道要錄云抛錢二山焚香合于此山亦見九域志并守令圖繼興于麗長安志云驪山有女媧治處又云藍田谷次北有女媧氏谷三皇舊居之所即驪山也爰絶瑞席蘿圖許氏云殊絶之瑞承庖制度襲水勝主于東方喬潭女媧陵記云予謂媧皇受命在火火以示水谷不為陵蓋謂太昊以木生火爾非也年代厯云女媧共工大庭皆不承五運理或可信而古史攷以為女媧水徳神農木徳妄矣論語疏云女媧尚白神農赤黄帝黒少昊白高陽赤高辛黒唐白虞赤此以三正言之也造天立極惟虛亡醇一而不􅭵喋于苛事許云􅭵喋猶深算也上際九天下契黄壚合元履中開隂布綱而下服度春秋運斗樞云虙羲女媧神農為三皇皇者中也合元履中開隂布綱上合皇極其施元明指天畫地神化潛通者也乃命臣隨作制笙簧以通殊風以才民用禮記明堂位云女媧之笙簧世本以為隨作衷注以為女媧氏之臣笙簧二器詩云吹笙鼓簧並坐鼓簧鼓而不吹則非笙也許説文云隨作笙女媧作簧明為二物仙傳王遥有五舌竹簧漢武内傳鼓振靈之簧説者皆為笙中之簧非也蓋筝筑之類命娥陵氏制都良之筦以一天下之音命聖氏制頒筦以合日月星辰以易兆之晨作充樂帝系譜以都良管班管名曰充樂樂成天下幽微無不得其理也用五絃之瑟于澤丘動隂聲極其數而為五十絃以交天侑神聽之悲不能克乃破為二十五絃以仰其情具二均聲樂成而天下幽微亡不得其理傳言帝女鼓瑟而云泰帝謂伏羲女媧也故何妥謂伏羲減瑟而補史記言伏羲之瑟二十五絃也五絃乃朱襄氏之瑟女媧用之非伏羲也世本云庖羲五十絃黄帝使素女鼓之哀不自勝乃破為二十五絃具兩均聲而拾遺記亦謂黄帝使素女鼓庖羲氏之瑟滿席悲不已後破為二十五絃長七尺二寸則以為黄帝減之故宋世本注女媧笙簧為黄帝臣謬矣總紒而笄加之帶而頭飾用帶絡頭繻也二儀寔録云燧人時為髻但以髪相乗而無繫女媧之女以羊毛為繩向後繫之後世名之頭􅔮又云以荆梭及竹為笄以貫髪至堯以銅為之横貫焉于是乗雷車鞲六蜚以御天山海經云女媧乗雷車服駕應龍淮南㝠覽云女媧功烈上際九天下契黄壚乗靁車服應龍驂青蚪援絶瑞席蘿圖雲黄璐前白螭後奔虵浮游逍遥道鬼神登九天朝帝于靈門宓穆乎太祖之下以此申祠祝而枚占之曰吉詞曰昭昭九州日月代極平均土地合和萬國乃設雲幄而致神明道標萬物神化七十淮南子等以摶土為人之類為七十化且有鍊五石以補蒼天㫁鼇足以立四極積蘆灰以止淫水等事世遂有鍊石成霞地勢北高南下之説按易内篇云福萬民壽九州莫大乎真氣鍊五石立四極莫大乎神明而麻姑仙人紫壇歌云女媧鍊得五方氣變化成形補天地三十六變世應知七十二化處其位王逸楚辭注亦謂一日七十化其體則特軀中之事爾故安期生尚鍊五石踐脩者宜知之有補天别説見發揮􅯐車出澤馬來川嶽效靈􅪌緯應理是故馨烈彌㮘不設法度而以至徳遺後世鴻烈解治百有三十載而落見真源賦元年中元甲子其腸爰化而神居于栗廣之野横道而處坫王裕于堇龍古塞洪河之流是為風陵堆也墓今在潼關口河潭上圪然分河有木數株雖瀑漲不漂没今屬陜之閿鄉縣按元和郡縣志風陵堆在河東縣南五十與潼關對寰宇記風陵城在其下閿鄉津去縣三里即風陵故關也女媧之墓秦漢以下俱係祀典然九域寰宇濟之任城東南三十九里又有女媧陵成冢記云女娃墓有五其一在趙簡子城東今在晉之趙城東南五里高三丈九域志晉州有帝女媧廟寰宇記在趙城故皇朝列祀亦在趙城唐文武皇帝江都之役夜徑其處風雨中有女人鱗身騶倡而前餫生魚一匪帝後果靖中華段成式以為徳宗于靈武遇之宜後再見一云至徳之際神嘗降之晉破苻堅八公草木皆為人馬唐得王君奐助討賊張永通得周公助平李密開元之天王助兵至徳之女媧神降此皆佑順可得信之後乾元中失之刺史奏閺鄉墳天寶十三載天雨晦㝠俄失所在至是河房風雷夜聲黎明視之其墳涌復夾之兩栁肅宗命祝史祠焉唐厯云十三載五月失之乾元元年六月一日復出刺史乃王晉光一作奇光以其載媒是以後世有國是祀為臯禖之神古高媒祀女娃後世不攷有説别見因典祠焉董仲舒法攻社不齊則祀女媧王充云仲舒迨以女媧婦人帝王者也男陽而女隂故祭之又曰皇母水經注云顕親縣北山宕水源有女媧祠按太行一曰皇母山亦曰女媧山崔伯易云一曰皇母云女媧于此鍊石補天按今濟源縣之女媧山上有祠廟一曰母山古老言為皇母山山近復有陵山皆云遺迹寰宇記云孤絶似陵皇母山起邑界其祠嵗禱又今蛾眉亦有女媧洞常璩華陽志等謂伏羲女媧之所常游此類猶多乾徳四年詔置守陵五戸春穛少牢應先代陵寢每下詔申樵採禁至再三置守陵戸委逐處長史常切檢校罷任上厯太昊宛丘在陳炎帝長沙在潭黄帝橋山在上郡今坊州界高陽臨河縣故城東高辛頓丘城南臺隂城堯城陽穀林今鄆界舜九疑今永州界禹會稽今越縣女媧華州界各五戸春秋大牢諸處舊有祠廟者别祭享陵戸並近陵小戸除二税外免雜徭隆平集云少牢或云三皇之一也見洞神部鄭𤣥注中候敕省圖以伏羲女媧神農為三皇云女媧脩伏羲之道無所改作故孔頴達謂大易興佔之條不見有女媧難信贊曰制度承庖􅀈彼女希迪主東方前虵後螭􅀢穆靈門爰瑞席圖上際九天下契黄壚川嶽效奇馨烈宏集道標萬物神化七十㫁鼇立極地平天成笙簧汔今載祀風陵女皇氏題甚矣天下之不可一日無王也太史公作史記世家侯室而紀皇王然而吕后項籍俱列本紀人皆疑之且以為太史公壊編年之法以立紀傳予有以見太史公為得聖人之意也夫春秋編年以王次春示天下不可一日無王也太史公不敢擬聖人而作經于是法外傳之體以為紀表世家焉是編年之法也惠帝死孝文未立吕后為政者八年今不紀則將屹然中絶其統邪知此則知太史公紀吕后之意矣班固作書吾不知其知是否也然亦紀吕后而不敢絀唐之舊史因之列武后于本紀歐陽子不知出此乃以為春秋之法所以著其大惡而不隠此歐陽子之失言也聖人之作經隨事舉寔非以意而遇事是故五剛在御而一隂得位則折以大有天地之義事則逆爾統在惠則紀惠統在吕則紀吕豈固曰婦人不得為君吾不紀邪惠帝立七年而史不紀政寔出于后也固乃立惠紀于吕后之前唐高宗崩中宗即位武后廢之及其反正史遂紀之武后之下范祖禹以為春秋不王吳楚以存周室唐有天下武后烏得間之遂復中宗之年絀武氏之號此尤倍理不知周既革號而易祚矣范􅋫華嶠之徒乃以謂后者配天作合前史録外戚于末編非其義乃盡取諸后紀之斯無識矣不知何所見而紀耶夷王崩厲王立無道三十有七年王流于彘宣王未立有共伯和者釋位以間王政蓋十有四年矣宣王有志而後效官共伯歸國故當時史氏以是十四年者繫之號共和焉知此則知予紀女皇氏之意矣有共和辨見發揮嗟乎君子之制行至其窮則皆道之廢也后妃之賢不過俌佐君子求賢審官以贊其外而已成王幼不能踐阼周公相葆之以踐阼三母之賢不敢干也自宣太后臨朝稱制而牝晨時播姁媮嬿婉違夫子者莫不以荐其口故宜都内人云古有女媧者亦不正是天子也特佐伏羲以定九州而已爾後世孃媪越出房闥㫁天下事者皆不得其正非俌昬主則抱持小兒以求肆豈知天地之義女卑于男也邪而學士之論不知出此亦難乎為頌矣武后時宫人李義山紀其事或曰項籍與高帝同時而王胡為而著之紀曰是又所以為編年也方秦之亡也籍既自立割漢中以王高祖而又挾義帝以令諸侯漢中之地非惟偏也而高祖之王又出于籍籍方分王諸侯而高祖固出其下是天下之勢在于籍也烏乎而不紀之故必待天下之一而後紀還于漢是編年之法也揚雄云秦十五載而楚楚五載而漢五十載之際而天下三禪又曰秦楚為天典命馬遷作史以楚繼秦列項于本紀是以有天下待之矣班固降之于傳蓋以其書主漢作爾而歐陽子論正統遂以其説為非謂列羽為紀此豈可法且以為厲王後無君周公邵公為政十四年而宣王立是周統嘗絶十四年而續故周史紀年謂之共和漢中衰莽簒立十五年而敗是漢統嘗絶十五年而續故漢史以其事作傳則統之絶何害誤矣夫統者謂天下不可一日無主也秦失其鹿勢已歸楚沛公以降悉聽命沛公雖先入關而不能有未幾羽屠咸陽殺子嬰是楚當紹秦矣固之傳羽固非史記之例若張衡劉知㡬謂後漢書宜為更始立紀不知此總史之例二漢書却不然也雖然項籍實起群盜其自為稱曰西楚霸王而已列之本紀則誠過矣義帝從牧羊為羽所立遣將救趙滅秦首尾三年太史公宜為之紀以繼秦而不紀者以羽實為之而義帝之後無繼爾劉歆葛洪謂遷發憤著書列項羽于本紀以見居高位者非關有徳則非矣昌邑王在位二十七日以過惡廢固無可言者然已為君踐帝位而乃絀之與宗室同傳豈非以是為貶而不知列之紀乃所以暴其過也厥後魏齊王芳廢歸藩中東昬廢帝奕宋前廢帝子業後廢帝昱齊帝鬱林王海陵恭王東昬侯陳廢帝伯宗元魏廢帝即西魏廢帝欽北齊廢帝因後唐廢帝從珂並以過惡廢皆列之紀蓋以其常踐位豈以久近論哉予既紀太昊與女媧見共工氏之為以水紀事則既改正朔革制度矣固不可没也因更傳共工以贅于太昊紀之末共工氏傳共工氏羲氏之代侯者也世紀云女媧末有諸侯共工氏任智刑以强霸而不王非也于時已有侯國是曰康回屈原云康回憑怒地東南傾王逸曰康回共工氏之名蓋康其國姓回其名爾髦身朱髮歸藏啓筮云共工人面虵身朱髪㿮狠明徳任智自神太昊氏没俶亂天常竊保冀方按淮南子覽㝠言伏羲之道但言往古之時四極廢九州裂天不兼覆地不周載云云于是女媧鍊五色石以補蒼天㫁鼇足以立四極殺黒龍以濟冀州積蘆灰以止淫水蒼天補四極正淫水涸冀州平唐表言共工氏有地在𢎞農之間是矣然以為炎帝後則非也據古列子尹子皆先叙共工而及女媧至淮南本經乃以為舜時共工振滔洪水薄空桑謬矣攷共工有三詳發揮補天辨搶攘為傑于是左概介丘右矕終隆振滔洪水以薄空桑空桑莘陜之間于女媧之都為近故共工決水灌之欲以止之猶後世智伯梁武所為者智伯曰吾乃今知水可以亡人之國不知共工氏之所為也寇劇于諸侯虐弱以逞爰以浮游為卿瑣語云晉平公夢朱熊窺其屏惡之而疾問于子産對曰昔共工之卿曰浮游敗于顓頊自沈于淮其色赤其言善笑其行善顧其狀如熊為天王祟見之堂上則正天下者死見之堂下則邦人駭見之門則近臣憂見之庭則無傷今窺君之屏病而無傷其祭顓頊共工乎從其言而病間自謂水徳故為水紀官師制度皆以水名蓋乗時䧿起而失其紀是以後世不得議其世也荀悦漢紀引劉子政父子之言謂五行之運以子承母伏羲氏木徳共工氏承之以水居于木火之間伯而不王公孫𢎞賈誼兒寛馬遷皆以秦在水徳漢據火以克之非也方其君國也専以財利貿興有亡其取之也水處十七而陸處十三乗天勢以隘制天下而用不匱見管子澤課倍差于陸産迨其跋戸更復虐取任刑以逞人不堪命于是立兵仗聚亡義以奸天憲韓子云共工之戰鐵銛矩者及乎敵鎧不堅者傷乎體兵仗鎧㦸已大備矣専任浮游自聖其智以為亡可臣者故官壙而國日亂民亡所附賢亡所從見汲冢書及六韜尚虞湛樂淫失其身猶欲憑怒傃其悍塞㙲防百川隳高闉卑率方輿而潮陷之天地成而聚于高歸物于下子晉曰古之長民者不隳山不崇藪不防川不竇澤共工氏棄此道也云云見周語行違皇乾諸福弗畀疾薦作而菑屢臻女媧氏戮之共工氏以亡共工氏無霸名有辨見發揮祭法曰共工氏之霸九州也陸農師云皇而霸者也謂之霸入于器故也所謂共工氏者如此若伏羲氏襲氣毋則全粹矣凡四十有五載落有子不才終死為厲禮傳嵗時記等共工氏有不才子以冬至日死為厲畏赤豆故作赤豆粥以禳之紀為君傳為臣路史之書豈故為是㵒滕哉紀皇王所以尊天子也傳僭偽所以懲霸據也尊天子所以壹天下之統懲霸據所以著叛竊之罪統既壹罪既著則亂常犯上盜國賊民者不能一日遁形于地上矣齊桓晉文衆所共徳也孔子作春秋蓋甚貶之勤王而請隧則併没其功爭入而無親書齊小白曽何間于州吁與無知乎狄泉盟王人河陽朝襄王㑹宰周公王世子豈徒載之空言哉亦竊取其義以為人道之大經而已矣百嵗之後有孟軻氏者蓋知其統矣故曰孔子作春秋而亂臣賊子懼又曰仲尼之徒無道桓文之事予之路史宜有合于此者不可以弗察也元經何為哉彼將以進退南北也而自拂其統也乃自比于春秋曰春秋元經于王道是輕重之權衡夫春秋所書彼善于此則有之矣而正統常在周也帝魏于太和之元則不知所以為始絶宋于元徽之五則不得所以為終是則宋魏之間正未嘗分也正未嘗分則統未嘗壹也乃自比于春秋邪吳楚僭王春秋屢抑以夷狄而有中國雖有大功必如桓文之予而實不予可也何至抗而帝之邪是故未覿先王之大道也未覿先王之大道而獨猥經百世區區于麟止獨何歟嗟乎法春秋而不知春秋豈惟王通哉使後世黖黖于正統之論而不得其正者皆通之咎也路史卷十一

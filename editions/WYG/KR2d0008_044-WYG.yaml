body:
  text: 路史卷四十四宋羅泌撰餘論七蓂莢朱草蓂莢歴莢也世紀云尭時蓂莢夾階而生每月朔則生一莢至月半而十五莢十六日後日落一莢至晦而盡若月小盡則餘一莢厭而不落王者以之占歴應和氣而生舜亦如之一名仙茅故田俅子云尭為天子蓂生於庭為帝成歴瑞圖云葉圓而五色日生一莢至十六則落一莢及晦而盡白虎通義云考厯得度則生書中候摘落戒云尭舜時皆有之周公攝政七年又生亦見伏書大傳或云朱草大戴禮云朱草日生一莢至十五日後日落一葉周而復始按孝經援神契云朱草生蓂莢孳則二物也注朱草者百草之精状如小桑栽子長三四尺枝莖如珊瑚生名山石岩之下刺之如血其葉生落隨月晦朔亦如蓂莢則蓂莢之類爾三禮義宗云朱草赤草也可以染絳為服以别尊卑王者施徳有常則應徳而生光武中元年羣臣奏言地秪應靈而朱草萌生又有赤草生於水涯則非蓂莢矣云仙茅者誕矣五老人酈元水經注云尭帝修壇河洛擇良議沈率舜等升首山道河渚有五老㳺焉相謂河圖將來告帝以期知我者重童也言訖五老乃翻為流星以入􅄧事見論語比考云仲尼曰吾聞帝尭率舜等㳺首山觀河渚有五老㳺河渚一曰河圖將來告帝期二曰河圖將來告帝謀三曰河圖將來告帝書四曰河圖將來告帝圖五曰河圖將來告帝符有頃赤龍銜玉苞舒圖刻版題命可卷金泥玉檢封盛書威曰知我者重童也五老乃為流星上入昴黄姚視之龍沒圖在尭等共發曰帝當樞百則禪於虞尭喟然曰咨汝舜天之厯數在汝躬允執其中四海困窮天禄永終乃以禪舜故任彦升宣還皇后令云尭見五老入於河一老人曰河圖將來告帝期又一曰河圖推龜告帝謀又一曰山川魚鼈荷聖恩又一曰河圖推龍銜玉繩歌訖五老飛於天入昴寰宇記今河東縣故永樂東兆三十里有五老山尭升首山觀河渚五老人為流星上入􅄧今河西縣西十七五老仙人祠也夫古之事亦有原矣今道之營道北五里有五老人祠昔唐國子司業為道至襄陽遇五老人來迎自云舂陵人與之帛與幞問所居州城西北五里至訪之則無有惟五龍井遺縑在焉乃立祠即曰五龍祠貞元十九年也大觀四年二月賜號崇應政和侯封曰夀聖夀通夀寧壽成壽應云陵臺説大荒南經帝尭帝嚳帝舜皆塟岳山而海内北經有帝尭臺帝嚳臺帝舜臺之類非一夫帝王之冡曰陵亦謂之臺傳言禹殺相桞其血腥不可以植乃以為衆帝之臺故帝嚳冡曰頓丘臺尭母冡曰靈臺鄴有魏文武甄后三陵臺張賔進所言三臺險固者也即在上世亦謂之山黄帝塟南甲山曰橋陵亦曰橋山是矣葢山者取其如山陵者取其如陵因謂之山陵爾風俗通云陵者天生自然故王公冡稱陵或云秦曰山漢始曰陵殽有二陵豈漢始哉若臺者猶夷俗之言路繇余氏墓陶臣氏烏陀氏蘓州節度使錢元鐐之猶子文炳為元帥府判官檢校禮部尚書顯徳中入京供奉飽文學善應對尤精青鳥之術開寳五年妻丘奄化訪吉兆於報恩襌宅之側古松區中僧常泰者共疑叢薄据岡當必昔賢墳竁不可重營炳執不從董役發之果古墓道版石數重梓廬灰盡惟一骸亞石間長逾丈所脛且二尺明比南金東一銅鐺傍縷青花西璧劔器亦且敗毁惟環在靶佳玉所成合抱芙蓉瑩然精白炳心尤愛不聽役入因酹而下將攬其環忽一黒蜂狀如毬丸從劍下螫炳右眉間尋見悶絶輿還乃卒泰具掩之翌朝炳之丕子知𤣥方伸號躃遽亦冥然見一丈夫道貎古野身度丈餘魚鱗之甲足色如金徒跣挺劍前語𤣥曰我帝堯之臣繇余氏也與陶臣氏烏陀氏佐禹理水以功封呉獲塟於兹當時此地乃海東漸之山也宅兆誠吉居之且安奈何而父剛愎發吾版石顧已非義而乃更欲奪吾玉櫑罪孰甚焉雖今擊死然方𨽻吾籍吾於𡨕間大有主治而父且無苦宜勿念悼知𤣥始甦錢公希白特為之紀以知宅墓凶吉始諸太古而冡訟之説為不可掩尭帝而來迄於開寳數百千載而精爽猶在足信定分之不可逾而直諒忠忱之不冺也去凶年四凶之去熈朝以來明經之士間有能知而先後之際猶不能究卒亦同乎為妄舜攝之初即分十有二州既而流四凶族命禹平水水土平而後復為九州故得共工流於幽州四凶之去在十二州分後明矣在舜典自可見説者乃以為舜十二州在禹平水别九州之後顛倒失統程頥之徒咸謂殛鯀在説明刑之中非先分州而後殛胡益之之徒至謂幽州崇山三危為共驩三苗先封之地而今乃流放而竄之鯀治水無狀嘗竄羽山今出怨故更殛死俱為碍理夫四凶皆當時世家公卿巨室用事之臣也莊子之言共驩苗民之罪皆在尭時陸徳明云尭六十年放驩兠六十四年流共工六十六年竄三苗未知其所據雖頗不合然尭遜禪之意固在六十載後大戴記孔子之言四凶之去亦皆尭世而荀子國事淮南鴻烈皆言尭伐驩兠國事荀子亦言尭伐共工周語言尭殛鯀則鯀之殛非舜明矣按舜紀云舜歸言於帝乃流共工周書則云共工乆居重位而唐伐之是説學者往徃以為非經有不之信然吕刑言遏絶苗民安國亦顯之為尭矣鯀與共工詳之正以誹禪見竄而世猶謂鯀以治水無功殛果足信歟夫有勞於民者先王一皆祀之鯀縱治水無成而仂作九載亦勤於民事者矣孰有至殛死者向使鯀不能啟其功於前則禹亦未能速収勤於後祭法之言鯀障洪水禹能修鯀之功則鯀非無功也果無功殛則何得見於夏郊蘓子瞻云四凶之罪莫得其詳忽諸吕梁碑吕梁碑劉耽作字為小鈎畫訛泐間可認者僅六十言耽於傳無聞矣據碑之言皇帝登封之嵗則葢秦漢間人也碑中叙紀虞帝之世云舜祖幕幕生窮蟬窮蟬生敬康敬康生喬牛喬牛生瞽叟瞽叟産舜命禹行水道吕梁特此節完備為可考質之於傳惟無句望且不言出自黄帝諒得其正甲申秋七月觀於内相郭知章明叔家公異時亦常集録古刻多六一先生之未見者二百斯其一也字勢權竒葢莫之辨嗚呼有虞氏之明徳千古被之而無斁者孰有世祀之不明者乎繇數千嵗之後予得論而次之天未喪斯文哉吕梁者龍門也而彭城之東一亭亦有所謂吕梁葢猶夷陵陸渾交趾等處之龍門云厯山厯山今河東縣之雷首山也其山九名一曰首陽臨河與大華對峙即謂歴觀揚雄所云登歴觀以逕望者樂史謂在偃師西北二十五里有舜廟舜井媯水汭水媯南汭北媯一作溈溈汭舜廟後周宇文䕶造地記云二泉在首山北山中皆逕山下而入河然孔安國馬融王肅杜預皇甫謐皆以為汭為媯水之曲云然後魏輿地圖上谷記下洛城西南四十有潘城城西北三里亦有歴山形如覆釡下有舜瞽二祠云是舜居帝之蹤迹何聞至是而齊之歴城南五里又有歴山水經注云上有舜祠縣東復有舜井亦云耕處寰宇記在縣東百歩云舜之所穿又有華水與厯山井通曽子固言舜耕厯山漁雷澤陶河濵作什器於夀丘就時於負夏康成謂歴山在河東雷澤在濟隂而負夏則衛地皇甫謐乃謂夀丘在魯東門之北河濵為即陶丘乃定陶西南之陶丘亭耕稼陶漁皆舜之初年其地必不大相逺今皆在魯衛間則厯山不得獨在河東遂以為娶後所居後世因有媯水而遷就之齊州二堂記夫河中乃帝所生若所都而厯城古厯下也其相去也逺矣耕漁之時徒以瞽叟不順暫即荒野顧非日後就販之比其初未必逺去父母之側河濵雷澤其説未悉按九域志濟南濮陽河中皆有厯山俱存祠廟而今秦地池陽澧陽始寧河縣上虞無錫亦皆有之子列子云舜耕河陽書大傳云舜陶河濵按元和志乃河東縣北四十之故陶城蘓氏演義云厯山有四一河中二齊之厯陽縣三冀州四濮之雷澤雷澤不聞有二耕漁必不相逺即此為是今曹濮間有舜豢龍井定陶城皆其蹤也然厯山何止四哉信都之歴山樂史亦以為舜耕在是援神契云舜生姚墟應邵謂與雷澤相近寰宇記在雷澤縣東十三里厯山在縣西北十六今濮之雷澤西北六十有小山孤立謂之厯山山北有小阜屬池目之姚墟邵謐縁之皆記舜耕之所而池之建徳東十里更有尭城山縣南三十有尭城尭祠云尭巡所至梁武於此立太原府縣北二十為舜城城有舜井有􅌴山上有尭舜二祠元和郡志謂是兩帝南巡所至􅇫山隅井曰舜井秋甫志歴山在東流縣東三十里髙八十丈上有尭舜二祠南巡所至本屬祈門新安志在祈門西八十五里寰宇記石埭西百六十有櫟山髙五里上有澄水大抵古迹傳聞多謬如今太湖縣北七里龍山亦有尭舜廟説亦以為放勲乃唐之神尭也而周處記始寧界復有舜所耕田一山多柞因謂􅌴山而以具區為之雷澤以其中有大小雷山也王介甫從之妄矣夫使帝果南巡至是亦何豫耕漁之日邪風土記云太湖中有大小二雷山相距六十大雷髙百二十丈長興東北六十其間曰雷澤即舜漁處故浙東有餘姚上虞江為舜本土且以姚媯之名在在而是金之西城故有姚方媯墟杜佑謂舜生此而世本亦謂媯墟舜所都在西城今長沙縣有溈水云舜所都而上虞之損石號蒍公嶄㑹稽又有媯水三撫之泉經之東入海圖經亦以為釐降之地祝阿故縣又有濼水俗呼娥姜水原有娥英之廟水原山上有帝舜祠下開大穴為之舜井寰宇記羅姜水兖之泗源又有陶墟亦有舜井其西阜號媯亭山下之一漏澤方十五里指為帝之所漁不知此自桃墟謝息之所遷者又水經注上虞一曰虞賔太康地記為避丹朱之所而雷澤亦非一周處謂是太湖故寰宇引尚書釋言謂在震澤若陽城漢濩澤縣墨子則言舜漁在此澤今在陽城西北十二寰宇記為烏號切矣郡國志言邑西今有地名舜田然今潭之益陽岳之沅江故梁之重華縣有虞帝城記亦謂是所都而述異記去湘水岸三十有相思宫望帝臺志為二妃之迹冷道臨武桂陽藍山等處悉有帝舜之祠藍山更有舜水舜鄉縣西十五與永明西十五皆有娥皇女英之廟江華太平鄉有舜女寺即按厯城東南十里之廟山晏氏三齊記在縣東南後人思舜而置廟也湘中記云地有舜之遺風人民純樸故老猶彈五絃之琴為漁父辭莫不以為虞帝之居豈盡信邪太尉尚書中候握河紀云舜為太尉故帝王世紀云命為司徒太尉正月以太尉行事按月令命太尉贊桀俊鄭注太尉秦官漢志亦云獨應氏官儀以為周官而康成中候注首從其説與禮注相異故束晳據中候以追難之正義且因中候之言謂三王有司馬無太尉以為尭置之而三王不置予考春秋元命苞云尭㳺於河赤龍負圖與太尉舜等百二十人發視之而合誠圖言尭坐舟中與太尉舜等臨觀鳯凰負圖授於尭赤玉為匣長三尺廣八寸厚寸黄玉檢白玉繩封兩端章曰天赤帝符璽而春秋運斗樞亦云舜以太尉之號即天子五年二月東巡狩中舟與三公諸侯臨觀河黄龍五采負圖出置舜前䠠入水而前去黄玉為匣長三尺廣八寸有户白玉檢黄金繩芝泥封兩端章曰天黄帝符璽鳥文舜與大司空禹臨侯愽望等三十人集發圖𤣥色綈長三十二尺中有七十二帝地形之制天文位度之差蔵之大麓而河圖所云與此畧同則其為説乆矣然吕氏書孟夏命太封贊傑不云太尉黄帝時太封為司馬是太尉也周之大司馬至秦而為太尉漢武復為大司馬東漢復為太尉尉者自上安下之辭周官大司馬職進賢興功以作邦國王制司馬辨論官材皆贊傑遂良之事劉昭以為緯候之書貴尚神鬼動挾怪誕太尉官實司天虞舜作宰璿衡賦政當是據位以書前職非虞氏之寔號葢太尉之職寔舜所掌遂以職同而追稱之非官之謬康成自注中候至於禮學豈遽忘帝之職位哉葢亦知之不發之中候而發之月令也小人之過必文劉嘏同人於宗式吝之道而男女以同姓則其生不蕃故子産曰内官不及同姓則生不殖内有四姬而晉侯之疾不差婚姻禍福之階也是以君子不娶同姓買妾不知其姓則卜之所以附逺厚别知自别於禽獸也胥季曰異姓則異徳異徳則異數異數雖近男女相及以生民也同姓則同徳同徳則同志同志雖逺男女不相及異黷敬也黷則生怨怨亂毓灾毓灾滅姓是故娶避同姓畏亂灾也昭公娶呉死不書姓若盧蒲癸娶慶氏而云宗不避予吕后之妹歸於吕平兹何可據王莽嘗言姚媯陳田王五姓予同族皆以為宗然至宜春侯女則遂以為姓出各别納之稱之曰宜春氏豈知訢亦齊之王邪臨淮陳矯劉頌近親養於姑陳而冐其姓及納頌女則亦以為姚虞陳田同出於舜而世皆為婚禮律不禁劉嘏既婚劉疇太常非之則更以為鍾出鍾離胡同胡母單複相婚不以共本為悔於是貽書卞壼以謂尭舜之婚正姓分絶於上應韓之通庶姓異終於下而荀崧遽以為可吾乃不知尭舜大聖反為後世變情敗俗亂倫無禮之魁也邪而禮傳遽有上古五世通婚與商人六世相婚之説豈非小人冐禮者之自為地乎夫小人之犯義曷嘗不假聖人以藉口哉禮聖人之所性而聖人禮之所自出也狂者嗜膚指醉者嘬土糞顧謂醒者亦為之乎庾蔚之云同姓之婚易置矣而小人情巧又益嘏在邊地無他與婚如可恕者假使又無與婚則將遂與豕交之邪春官小史掌奠系世辨昭穆繫之以姓而弗别綴之以食而弗殊百世而婚姻不通後世士大夫譜系不著族無綴食之義而下失事宗之禮氏姓莫别故王通曰任薛王劉崔盧之婚非古也何以視譜魏氏春秋司空王基當世大儒而納司空忱女以為姓同源異周室之後昌黎張仲娶范陽張璉女弟猶諮張卓而後婚王伯璵鄭康成髙雋弟子而亦為子稚賔納王處道之子於時清議盡無譏誚則知禮傳之妄有自來矣而杜佑儒宗恢愽冠代而乃亦有商以上婚不隔同姓之説豈習見之稔而莫覺邪江南陶穀唐氏子也後納唐女士有致議則更以為正自殊出以知非禮之人大率一律故予嘗謂後世教失其本讀經史者恣為濫説徒以資其所欲為爾讀書者之為多市井之不為渠不信矣瞽叟殺人桃應問曰舜為天子臯陶為士瞽叟殺人則如之何孟子曰執之而已然則舜不禁歟曰夫舜惡得而禁之以有所受之也然則舜如之何曰竊負而逃遵海濵而處終身訢然樂而忘天下孟子之言葢以為受法者設也而劉敞明舜以為凡聴五刑必原父子之親立君臣之義以權之商鞅作法可謂慘刻猶以太子為君之貳不可刑乃刑其傅豈有皋陶為士而瞽叟執者五臣范以為非孟子之言書言舜克諧瞽允若而不格姦孟子亦言瞽底豫矣豈有殺人之事不得乎親不可以為人不順乎親不可以為子舜視天下歸已猶草芥惟不得乎親則不可為人豈有不禁之事皋陶無執瞽之理舜亦無棄天下而逃之事葉夢得輩云軻之過説瞽叟未嘗殺人臯陶何嘗執瞽叟舜未嘗竊之而逃以為瞽叟真殺人而臯陶真執之舜真竊負而逃之失之逺矣夫春秋之書殺大夫或曰公子或曰世子或曰兄弟公子未命大夫者其重視大夫世子君之世嫡而兄弟母之昆弟其見殺不以有罪無罪皆斥其君以明親親之道周制同姓有罪不即市必致刑於甸師不與國人慮之也公卿士庶則有議親公族有罪雖親不以犯有司正術也所以體百姓也為人君而自賊其類不祥莫大焉宣帝之詔父子之官夫婦之道天性也雖有禍患猶䝉庇而存之誠愛結於心忠厚之至豈能違之自今子匿父妻匿夫孫匿祖妾匿其父母皆勿坐惟父母匿子夫匿妻大父母匿孫誅仍請廷尉以聞豈有為天子父殺人而廷尉得執乎曹操馬騰入麥主簿議罪而自刑割髪太子馬蹄踐霤廷理依法而斬輈戮御唐黨仁洪坐贓百萬當死五奏太宗閔其自首就戮方食徹案將法出之召五品以上曰人君所受於天不可以私失信今朕私黨仁洪是自亂其法上負於天命有司設草南郊進蔬飯將請罪三日羣臣前後固請乃止夫唐臣猶不聴太宗請罪南郊舜之諸臣豈聴其竊負而濵海哉晉國有訟士匃聴之士匃不明曲直要辭未合而曰天子所右右之所左左之是知尊天子而未知决獄守法之道也法者天下之法而天子特司之爾其權固不在天子而在於士師成王命君陳曰商民在辟予曰辟汝惟勿辟予曰宥汝惟勿宥惟厥中是則縱舍輕重惟法是視天子固不得而豫然惟厥中則固有其權矣直躬證父攘羊孔子惡之曰直躬一父而再取名焉石奢之父殺人楚昭理而縱之奢刎而死而孔子曰父為子隠直在其中矣孰有瞽殺人而陶真得而執之者然則如之何而可曰舜不難於隠法陶不難於棄士而已矣隠法不過失位而天下之父子恱棄士不過失職而天下之君臣定舜豈得為不君而陶豈得為不臣哉路史卷四十四

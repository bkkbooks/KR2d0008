body:
  text: 路史卷四十宋羅泌撰餘論三許繇莊周書言堯遜天下于許繇許繇不受耻之而逃于箕隂且以為繇師齧缺缺師王倪與被衣而意而子與巢父嚴僖方回皆許繇之友凡数人者迹不見于他傳故説者類以周為寓言靡事實太史公且疑之謂其不有遜禪之事而乃特稱箕山許繇之冡今據在登封東南三十里為髙三丈則不得謂無其人也吕氏春秋言堯朝繇于沛澤請屬天下朝者亦上見下之稱昔周公朝于窮巷之中甕牖之下者而七十人是也而傳謂繇隠沛澤之黄城耕于箕山之下沛澤即今之沛而黄城則今登封西南之負黍亭也馮衍顯志賦所謂求善卷之所在遇許繇于負黍者京相璠云成陽西南二十七里世謂黄城而西征記許昌城者為許繇之所居大城東北九里而近猶有臺曰許繇臺其崇六丈廣三十步許由之所嘗登故譙史云由居箕山恬泊無欲尭聘不就人咸髙之因曰堯以天下屬之繇切恥之夫周之言固有或寓然齧缺王倪豈類如䟽者云哉益部傳云尭傳許繇非不𢎞也洗其兩耳世何徽焉魏子且曰許繇立身守志存已不甘禄位于是洗耳不受尭遜此謙退之至也而樂録等直謂堯以符璽禪為天子説者過之夫繇之避尭寵也退處箕山故其卒塟在是所謂箕公之神配五岳者許四岳之祚也尭之遜于四岳則由既在舉矣豈得謂無此人耶王倪齧缺其説如彼而洪慶善言長沮桀溺為沮如淖溺示混兮若濁無涉川濟難意紆夫堯之遜天下非遺天下託天下也繇之辭天下非輕天下重天下也程晏亦言尭勞于民求以託其民以繇能重天下之民故此託之而且以天下之民為重故不敢以輕受斯得繇之心矣是何魏惠將授國于惠施惠施不聽謂惠子曰古之有國必賢者也故受而賢者舜也是欲子之舜也傳而賢者尭辭而賢者繇是欲主之堯而子之繇也尭舜許繇之作非獨傳舜辭也他行稱是今無他行而欲為尭舜許繇故惠主首布冠而拘于鄄齊饑弗受惠子易衣變冠而走幾不出境故自行不可以幸必成史舉非犀首于王也犀首頋欲窮之謂張儀曰請王遜先生國而先生為弗受則王堯舜而先生許繇矣衍因請王致萬户儀因令舉比数見衍王聞而弗使也不辭而去由此語之由豈從為妄者資哉論髙而過實弊之至也故君子之為遜頋時而已矣無故而為遜何取焉夷齊首山夷齊冡廟在蒲之蒲阪首陽山之南馬融顔師古之説同而髙誘乃以為洛東北去二十里之首陽山杜預阮籍之徒咸以為然更謂二子餓死在是即今二山皆有夷齊冡廟九域志兩從之戴延之竊以為疑按夷齊之蹤當在河東首山者雷首也是為中條一曰薄山一山九名即萯山也據河南郡境界薄云城東北十里首陽山上有首陽祠夷齊所居而黄太史猶以或者指武師度孟津二子叩馬而諫當以洛陽為是夫首山之名所在固不一曹大家云在隴西而今隴西有地曰首陽東有鳥䑕山謂之首陽而許叔重言首陽則正在遼西今遼之和順東實有山曰首陽俱有祠廟其在吴郡亦有首山豈得偏為據邪子曰伯夷叔齊餓于首陽之下又曰不降其志不辱其身伯夷叔齊歟注家亦云蒲阪陽區山者俗號首陽而黄子且以為無餓死事按吕氏書夷齊如周至岐陽而文王已歿武王即位使叔旦説膠革于次四内盟曰加冨三等就官一列又使召公就微子啟于共頭之下盟曰世為長侯守商之祀相奉桑林宜私孟諸各為三書同辭血之以牲埋其一以其一歸夷齊聞之相視而笑曰嘻異哉非吾所謂道也昔神農氏時祀盡敬而不祈喜云云卑自髙也今周見商之僻而遽為之其治尚謀而行貨阻兵而保威割牲而盟以為信揚夢以説衆殺伐以要利以此治商是以亂易暴也今天下聞周徳衰與其並乎周以漫吾身不若避之以結吾行二子乃北行至首陽餓焉石曼卿云死蒲阪者恥周之事而死于尭舜之區庶幾見揖㢲之風焉則亦非洛陽矣又孰有叩馬之事哉三秦記謂夷齊食薇三年顔色不變武王戒之不食而死而爾雅云芑白苖犍為舍人以為伯夷所食首陽之草也程晏以不食為飽以失仁為餒餓乃其飽死乃其生而李徳裕且以聞媛不薇為不智不義棄兄之禄不仁伊川程氏則謂止是不食其禄非餓不食聖言皦日而衆言猶不一惜哉五旗五麾風后曰予告汝帝之五旗東方法青龍曰旗南方法赤鳥曰䑕西法白虎曰典北法黒蛇曰旂中央法黄龍常見河圗書五麾五牙旗也為五色見青則舉青牙見白則舉白牙餘隨所見舉之以牙為餙見出軍訣𤣥女兵法云伍胥請以朱雀之日日正中時立赤色徵音絳衣之軍于南方以輔角軍以青龍日平旦立青色角音青衣之軍于東方以輔羽軍以𤣥武日人定時立黒色羽音黒衣之軍于北方以輔商軍以白虎日日入時立白包商音白衣之將于西以輔宫軍以黄龍之日日中建黄旗于中央以制四方五軍具四面攻之三日城果下爰制其陣而黄帝八陣之法車箱洞當金也車工中黄土也鳥雲鳥翔火也折衝木也龍騰却月水也雁行鵞鸛天也車輪地也飛翼浮蛆㢲也在通俗文車當謂箳皇林宗别傳部從事宿仲琰柴車編荆為當是也納音五行説婚厯妄甲乙木丑未土子水而午火六者無一金而風后妃合乃以甲子乙丑甲午乙未為之金此出乎數者然也數之所合變之所由出也乾為天坤為地乾坤合而為泰徳為父紅為母徳紅合而為東干為君支為臣支干合而納音生是故甲乙為君子丑為臣子丑甲乙合而為金盖五行之在天下各有氣性有材位或相濟或相克若成器未成器旺在受絶絶中受氣惟相妃而取之為不同爾此金數之所以雖同而又有海中沙中之異或曰甲乙以相克取甲嫁庚乙嫁辛而甲乙遂有金氣故凡木必受金胎陽生于子水王之地故甲子乙丑為海中之陽金隂生于午火王之地故甲午乙未為沙中之隂金子陽之始午隂之始以甲加子乙加丑數之至午得庚至未得辛為陽索隂以甲加午乙加未數至子丑亦得庚辛為隂匹陽納于數也從甲至庚得七七為西方西方素皇之氣故甲子乙丑皆為金三為火九為木一為土五為水數其干不數其支此謂納音盖亦旋宫之法夫妻子母相濟相克相上相下而吉凶之兆著矣草有莘與藟獨食之殺人合而食之則壽金錫兩柔合而煉之為剛理固如是然嘗怪代有所謂勘婚歴者以某命合某命則不利以某命合某命則大利或以生或以死未嘗不切笑之夫天地之間固有是理矣而決非此軰所能知者是書之所言決不䆒是理之所在父病推其子禄妻災課以夫年理固不易消而息之則思過半矣鼓吹蔡邕禮樂志云鼓吹岐伯所以揚武徳也而劉巘定軍禮以為鼓吹不知誰造漢氏以雄朔野短簫鐃歌岐伯所造故陸機鼓吹賦云原鼓吹之所始盖禀命于軒皇徐廣車服儀制云角前世書記所不載而帝内傳云元女請制角二十四説文及晉書志通禮義纂亦云然又云請制旗幟以象雲物鑄鉦鐃以擬雹聲鼓鼙以當雷霆皆元女之所請而徐儉角賦以為帝㑹羣臣所作清角者非也按周禮以鼖鼓大鼓謂之鼖小者謂之應鼓軍事六典樂録説者云蚩尤帥魑魅與黄帝戰于􅃰鹿之野帝命吹角為龍吟御之魏武北征烏丸越沙漠軍士多思歸于是减為中鳴尤更悲切故有長鳴中鳴吹角三部云神荼欝壘儺穰架之事從古而有今人家正旦門設神荼欝壘為説漫汗按風俗通引黄帝稱上古有兄弟二人曰荼曰欝律在度朔山桃下簡百鬼妄滑人者援葦索執以食虎而漢舊儀乃引山海經云神荼欝壘二神人主執惡害之鬼黄帝乃立桃人于門户畫荼壘與虎索以禦鬼其為説盖如此獨風俗通作欝律戰國策又作余與欝壘厥義同也故集韻中壘音為律盖神荼者伸舒也而欝律者苑結之謂也周代多以荼為舒如公子荼夏后荼是也西京賦云靁欝律于岩突聲欝屈也沈伴文云欝律構丹巘形欝屈也而黒深又為􅀈􅀈王充亦云禮刻尊為雷形一出一入為相較之狀盖欝律者㟪㠥之類也相較則鳴分裂魄然若敝裂者氣射之聲也欝律忽發中人則死其引山海經欝壘與舊儀同惟括地圗言二神曰欝曰律則失之矣且黄帝内傳云黄帝始儺而莊子有游島問于䧺黄逐疫出魅擊鼓呼噪與黄帝立巫咸之事則神荼欝壘爆竹之事可知矣舉世多説故發之鸞翳山海經云女牀之山有鳥焉其狀如翟而五彩以文名曰鸞鳥見則天下安寜軒轅之丘沃旻之國鳯鳥自歌鸞鳥自舞元命苞云火離鸞鸞運斗樞言天樞得則鸞集演孔圖謂官以賢舉則在野帝軒題象鸞鳥來儀周公歸政制禮而鸞復見説文以為神靈之精雞形赤色五彩鳴中五音頌聲作則至而孫氏瑞書謂是赤神之精鳯凰之佐狀類翟而五色鳴中五音肅肅雝雝喜則鳴舞人君行步有容進退有度祭祀宰人咸有敬讓禮節親踈有序鍾律調恊則至亦山窟氏之國標山之所廣都之野而南禺之山乃多鳳凰鵷鶵鸞鳥張華云鸞者鳳之亞也似鳳而白鸎初生類鳳久復五彩變易禮斗威儀云其音如鈴巒巒然也周成王時氐羌獻鸞鳥于是法駕上綴以大鈴如鸞之聲逌抱璞子云聞樂而舞至則國安樂其雌曰和而禽經亦謂雌和雄鸞爾雅注曰雞趣郭氏按亦名翳屈原云駟玉虬而乗翳是也山海經蛇山有鳥五色其飛蔽日名曰鷖九疑之山五彩之鳥飛蔽一鄉盖即翳也昔華隂辛繕連辟不至鸞集其槐雞首燕頷蛇頸魚尾五色而青多其髙五尺光武詔問羣臣俱以鳳對太史令蔡衡曰凡象鳳者五五色而赤多者鳳黄多者鵷鶵紫多者鸑鷟青多者鸞白多者鵠是鸞也非鳳也于是三公避位五鳳三年鸞鳳集長樂木上文章五色王阜世公為重泉令吏民向化鸞止學館阜使授官椽公沙疊為張雅樂擊磬鸞乃舉足垂翅應聲而舞棲止縣屋旬餘而去大抵鸞鳳多應仁孝嘉音聲而鸞尤識鍾律鍾律調則和鳴蹈節而舞謝丞書方儲母死負土成墳種棃株鸞鳥棲上􅄢賔王結罝峻祈之山獲一鸞鳥甚愛之欲其鳴不能乃餙以金籠享以珍羞而鸞愈蹙三年王妃乃言聞之鸞鳥見類而鳴懸其鏡以映之鸞覩影感契慨焉悲呃哀饗中宵一奮而絶范泰因作鸞鳥詩序敬叔異苑從而記之亦可見禽鳥之仁義矣拓䟦氏十姓後魏之先為拓䟦氏至道武都洛陽乃為元氏魏法七分其國以兄弟分統之沙漠雄為南部大人為拓䟦氏生嵩北平宣王道武以其宗室之長改為長孫氏至孝文以獻帝長兄為紇骨氏次兄普氏為周氏次依樓氏為婁氏立敦氏為丘氏俟氏為萬俟氏叔父乙旃氏為叔孫氏䟽屬車輥氏為車氏凡十姓又有八氏按庾信季敦傳云道武兄弟七人分為十姓丘其一也元氏之所出書傳最雜宋齊二史則以為降將李陵之後魏書序紀則以為后稷始均之後其説皆非據北俗謂土為托后為䟦拓䟦者以黄帝土王為言而宋書乃云索頭虜其先李陵降匃奴單于妻以女字曰拓䟦因氏焉盖出崔浩之說當時衆議已相斥不行或竊以渡江約遂仍之乃若魏書序紀則因山海經始均生北狄而妄謂為拓䟦之先又誤以始均為叔均而遂以為稷後其言始均事尭則是以為叔均矣俱妄也又按黨項自有拓䟦等氏盖其後盛于北土故唐表謂􅀈後為鮮卑君而通典謂之東胡之别是殆又以拓䟦為帝嚳厭越後矣愈非鍾鼎鼎者所以起樂者也可以正律吕可以調氣節可以恊風聲可以和滋味可以抑虚浮垂則為鍾仰則為鼎故為國之重噐黄帝之鑄一禹之鑄九其實一也若昔黄帝命榮㣪鑄十二鍾以恊月筩以詔英韶而調政之緩急分五聲以正五鍾命其五鍾一曰青鍾大音二曰赤鍾重心三曰黄鍾洗光四曰景鍾昧其明五曰黑鍾引其常則固以起樂調政術也景當西方則白也故陳祥道云景白也而康成云景明也士昏禮景為明衣則白可知矣然五鍾在太晟景鍾第一于時即命張康伯為之序固以為景者大也夫黄鍾者樂之所自出而景鍾者又黄鍾之自出黄鍾者樂之祖也九寸之律天之數也極其數而為八十一故景鍾之受八斛一斗以應乎天惟親祀則用之宫架之中以為宫圍然則鼎者非必傳國之具也自左氏有楚子問鼎輕重之說且以為武王克商遷九鼎于洛邑太史公因言武王營洛周公使召公卜居之安九鼎至秦昭時周噐九鼎入秦而周遂滅周志九鼎沒于泗水彭城下始皇過彭城禱祠使千人沒水求之不得故國事有武王謀遷九鼎每鼎用九萬人之說洎漢武猶欲省方出鼎而歴代每有冶鑄之議至萬歳通天之元遂鑄九鼎既成置之明堂之庭依方列之蔡州之鼎名曰永昌髙一丈有八尺受一千八百斛冀兖青徐揚荆梁雍八鼎各有其名髙一丈二尺受千二百斛各冩其州山川物象為銅五十六萬七百二十一斤鍾紹京等分題之終亦無補于亂夫天下大器無可譬也惟譬之于鼎爾禹之九鼎不過圗九州之神姦使民知避入川澤而不迷不逢不若而已夏有亂政鼎遷于商商有亂政鼎遷于周武王克商定鼎郟鄏卜世卜年天所命也而洛誥周公之作當時曽不之及抑亦不知左氏之說常切不信夫楚莊者春秋之賢君而輔之以孫叔敖頋非前日之夷蠻頑俗也如其滅陳感申叔時之一言而復之其入鄭也則又哀鄭伯之自卑而許之平比其勝晉乃至不喜而懼則誦武之詩曰所違民欲猶多民何安焉無徳而爭諸侯何以和衆夫無徳而爭諸侯且猶不肯况逼周而取之鼎乎包茅不入齊且致伐而況欲遷周鼎諸侯能舍之乎吾固曰問鼎之事左氏之罔無信可也隠訣之說黄帝火九鼎于荆山說者頋謂黄帝之鼎有九太清中經又有九鼎丹法則黄帝之鼎乃丹釡之名爾故荆山經龍首記謂黄帝服神丹或曰三或曰九九即三三即一故鼎書曰以三為十五河圗數也九鼎之所得焉以兩為十五乾坤數也十二律之所合焉積九鼎之所鍾引而伸之九州之所崇也五運之所建也十二律之所由生也是故起樂之具非傳國之用也井田之法黄帝制井以塞爭端八家為井旁開四道乃井其中而收之邑井一為鄰鄰三為朋朋三為里里五為邑十邑為都十都為師十師為州因所利而勸之是以地著而數詳諸葛武侯因黄帝丘井開方有九之制而為營陣大陣包小陣大營包小營隅落相連曲折相對合而為一則天地風雲龍虎鳥蛇各見其形于所居之方為之八陣至李衛公又因武侯出軍斜谷之隘損八為六乃以一為營法五為方圎曲直鋭之形地平而中窪則為圎地歴山脚則為曲地正出入則為直前陿後廣則為銳故其對太宗曰臣按黄帝始立丘井之法因以制兵故井分四道八家處之其形井字開方而為九五為陣法四為正地所謂數起于五而虗其中大將居之環其四面諸部連繞是所謂終于八則黄帝之法也井田之義居則為鄰出則為伍墾其地可以足食聮其民可以足兵辨其疆理可以習軍禮治其溝洫可以修阻固九軍之制井之夫也五軍之制井之方也四頭八尾井之啚也田廬在内溝洫在外井之固也安存同福危亡同憂井之義也耒耜服勤戈㦸之象服牛乘馬車騎之象合耦于鋤用衆之象凡此皆五帝三王之制寓于夫井之間使民身服其業心知其義者也一有不庭不虞之戒猶將不費一財不擾一民而惟樂事勸功尊君親上之人以為扞禦腹心殺敵致果之卒政刑修于閒暇蓄積備于州閭故得錢榖甲兵之問不至于廟堂祭祀賔客之禮不徹于爼豆而其効乃至于威加四夷莫不來享惟井法也後之人能修其政則雖以區區侯伯一國之師猶足坐制敵國無敢旅拒為疆埸患得其道也自商鞅開阡陌張說變彍騎為國家者不復知體國經野之為政為州縣者不復以土地人民為政事官司者不復以經綸紀綱為法其所汲汲不過率歛百姓無名之入以養游惰不根之軰以當古人軍旅之任其弊乃至卒亂于官民殍于野而不暇給于是敵國盜賊起而乗之而向之所斂曽不足以給其餉向之所養曽不足以應于用于是内外蒿目而憂甲兵財用之不繼則復欲率凋瘵之户調罷困之民禆補之此之謂水濟水名之曰益多如此而欲上下之洪寜未之有也路史卷四十

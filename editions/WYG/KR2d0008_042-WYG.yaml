body:
  text: 路史卷四十二宋羅泌撰餘論五上帝上帝之號曷為而不正葢亦嘗求諸經乎有所謂天有所謂帝周禮或言天或言帝或曰上帝曰五帝曰昊天上帝大宗伯以禋祀昊天上帝以蒼璧禮天有大故則旅上帝及四望典瑞四圭有邸以祀天旅上帝上帝非天而天非昊天上帝矣掌次大旅上帝張氊案設皇邸朝日祀五帝則張大次小次而司服祀昊天上帝大裘而冕五帝如之則五帝非上帝而昊天上帝非五帝矣然則天帝果不同歟帝即天天即帝奚不同也天者元氣之統稱而帝者徳之見乎用者也以形體言則謂之天以主宰言則謂之帝及因其氣之灝淑髙廣而言則又謂之昊天上帝而水火木金土之帝居於五方位而迭王者則謂之五帝以皆分統别號而言之者至於合昊天若五帝羣然而祀列位乎上而非可一名者夫然後總而稱之曰上帝是三皇之數制叵不知也若昔虞帝肆類上帝而大師亦類上帝肆師類造上帝曰類曰旅則上帝果非一帝矣然司裘為大裘以共王祀天之服而司服主祀昊天上帝大裘而冕則天宜為昊天上帝昊天上帝為天之見乎用者審也夫以司服昊天上帝與五帝之祀服有所不殊則五帝於昊天疑不降矣然以掌次祀旅所張之次乃不同焉則五帝於上帝為有降者有所降顧得合乎昊帝而同稱乎祀帝圓丘牲玉以蒼兆五帝於四郊玉以珪璋琥璜琮牲幣色從其方而迎之各以其氣至之日則五帝豈得同帝哉雖然昊帝統五精而運化五帝佐昊帝而毓物猶之子父非可離也是故昊帝五帝六神之辨俱以禋祀同服大裘而皆用圭邸則知有所分而又有所合矣類而稱之上帝孰不可哉經曰昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝惟稷配天則有思文之頌惟文王明堂則有我將之頌郊一明堂六尊祖而親考也豫之象曰先王以作樂崇徳殷薦之上帝以配祖考以配祖者天而以配考者五帝也夫以大旅昊帝在焉則上帝合而稱之為可訊矣明堂五室以配五帝其説古矣易孝經周禮之義何有殊耶至鄭康成傅以緯文乃以昊天上帝為冬至圓丘所祀之天皇大帝而且以為曜魄寳既復以為紫㣲宫中大帝又以為中宫天極天帝太一其惑繆葢如此是以漢魏而來祀號莫適漢既曰上帝又曰太一曰天皇大帝魏曰皇皇帝天梁曰天皇大帝隋唐又曰皇天上帝紛紛率爾顧不可懼乎夫天皇大帝星中之一而紫㣲太帝乃北極之號曜魄寶者北辰之神而太一則中宫天極勾陳口中之一明者也其於天帝上帝昊天上帝皇天上帝亦已别矣何得遽同稱哉嗟乎古人勤勤於禮意者常多而拘拘於禮文者常少祖之配天考之配上帝豈茍然邪康成以上帝為五帝而不及天王肅以上帝為天而不及五帝抑未之悉爾唐書新志天皇大帝為曜魄寶可矣乃復以為昊帝可乎今之郊祀昊天上帝既正上位而天皇大帝則位下方斯合則矣而或且疑之亦不知變矣六宗論招虞以旌虞人不至召嬪亡符楚嬪守死况非類之祀豈聰明正直者之所歆哉虞帝之初肆類上帝禋於六宗於是望於山川徧於羣神葢由尊而之卑先後之禮固有序矣六宗之神亞於上帝而世緜𦕈莫有能明之者諸儒之説既垂厯代之祀亦異泌不知其果足以致夫神之歆乎否也雖然請試為若謾言之夫自漢而來諸儒之説無慮數十百家而其説有十四以為寒暑日月星水旱者安國也以為星辰司中司命風師雨師者康成也以為天地四時者伏生馬融也以為天地四方者夏侯建歐陽和伯也以為乾坤六子者劉歆晁錯孔光王莽王肅顔師古也其純於天者後魏之孝文則杜佑李翰取之太常三年立六宗祀皆别兆有常日牲用少牢孝文太和十三年大議禋祀髙閭舉十一不同之説莫能詳究帝曰書言上帝六宗其文相屬上帝稱肆而不禋六宗言禋而不别其名理是一事六宗非别祭之名肆類非獨祭之目且禋非祀地之用是祭帝之事故稱禋以别之葢六宗一祭也而今圓丘五帝在焉乃詔祭天皇大帝及五帝於郊壇總為一位其純於地者晉之虞喜則劉昭以之虞别論謂地有五色本社象之總五為一以成六宗六為地數是祭地也故經無祭地之文昭既從之然疑禋非地祭遂以為禋理之名謂天宗地宗則許叔仲是矣五經異義云古尚書言六宗者天地屬神之尊也天宗三地宗三天宗日月北辰地宗河海岱日為陽宗月為隂宗北辰為星宗岱為山宗河為水宗海為澤宗祭天則天文從祀地則地理從謂天宗地宗四方宗則司馬彪是矣彪表難諸家天宗日月星辰寒暑之屬地宗社稷五祀之屬四方之宗四時五帝之屬晉初遂廢之至季命則以為不在天地四旁而在乎六合之間劉邵則以為太極冲和之氣為六氣之宗者孟康則以為天地間之逰神張迪則以為六代帝王張髦則又以為三昭三穆各憑私臆不可典要嗚呼秦為不道崇非類廢典祀焚滅詩書禮制於是乎失墜漢室隆興草創取具自文帝甘泉汾隂祠祭天地而孝成定南北郊具列六宗惟壇五帝至於平帝始建日月雷風山澤而屬以星辰水火溝瀆此則本乎王莽元始中安帝立天地四方之中於洛陽戍亥地比太社此則本兩夏侯元始六年魏明帝則因王肅之言而從莽司馬氏則以摰虞之請而從魏然俱不離孔晁之説而景初之復則亦劉邵之説也二年乃若張迪虞喜一無所據而孟康李邵又皆繆本𤣥文曽何取哉大𤣥曰神遊乎六宗葢指六合非主於祭而言二子葢因此夫從六氣之説乎則氣從天地烏乎而祀之從六子之説乎則卦乃象物烏乎而祀之將從彪之説則宗止乎三從許之言則宗不過二賈逵之説本許則鄭駁之矣馬融之説本伏則杜非之矣俱不得其當也三昭三穆前人如程顥王安石輩多取以為祭人鬼然穆非宗也夫祭有其舉之莫敢廢也三昭三穆世何嘗廢祀此固不必議者且七政既齊之後則惟及天神又曷有文祖有事於在璣衡之前而後於餘時哉惟康成安國比諸家言最能近而代莫之行者雖然宗之為言總也司中司命實係文昌而好雨好風乃是箕畢以總而言是特一宗爾豈得有實柴而復槱燎哉此鄭之失也郊之祭也大報天而主日配以月則日月在郊而不在宗矣冬享司寒而四立各自迎氣則四時寒暑不在宗矣此孔之失也然則佑之取魏亦有矣夫六天之説本出漢世源於緯候而成於康成然魏氏以昊天上帝為首則又非矣佑之所以取之葢以昊天上帝周用禋祀而祀昊天上帝大裘而冕五帝如之則禋不屬於别祀不知先王禮典莫有重舉上帝既已肆類豈復禋乎佑抑不知漢之所祀自是泰乙故曰泰乙者天神之最貴其佐為五帝是則非昊帝矣然亦未敢謂安國是也繄復語之宗亦祀之尊也伯夷典天地人之三禮而曰秩宗周官主祀大神祗而曰伯宗大宗小宗族之尊也老子曰萬物之宗言萬物莫不尊也莊周曰天地為宗故禮有天宗則亦有地宗矣天宗者萬象之宗雲漢虹蜺雷電雪霜風雨氛祲之屬非必日月星辰而地宗者萬類之宗也土石金穀草木毛羽鱗介之屬非必主於山川求之於傳又有河岱之宗河宗則萬水之宗謂淵泉溪沼藪岸灘濤之屬非主於山川四瀆而岱宗則萬山之宗也謂岡巒陵谷阿隴原隰之屬非主於五岳九山也凡此皆㣲小族類祀所不該故以火為宗而總祭之如夷蠻戎狄之總名曰人爾王者事天明事地察故於地而加詳是四宗者所以及乎其不及而已矣然則幽宗雩宗其不在六宗乎日月既主於郊四時寒暑復各屬於嵗惟星一類實繁猶之在地之山而水旱者隂陽之極數民事之尤切故二者自為宗或曰六宗云禋山川云望則山川在望不在禋矣是故禮無禋地之文是不然禋者蠲精之名爾大傳作煙則事止燔燎然劉昭曰堙則及於瘞埋矣且古書曰六宗者天地屬神之尊也奚為而不併地如曰不然則安國之説庶乎其次矣他不足稽也安國之説出於祭法而附於孔叢子家語因之葢孔氏之家世有是説故王充蘓軾一皆從之亦未敢以為安也且將從孔説則必上自類帝至於羣神合以為一而又升五帝於肆類而不禋於六宗禋日月於六宗而不與於郊類斯可矣何則郊祀而及於天地間之神古葢有矣燔泰壇瘞泰折此則似乎類帝而合食矣泰昭祭時坎壇祭寒暑王宫祭日夜明祭月幽宗祭星雩宗祭水旱此則似乎六宗矣四時寒暑雖别有祭於此又合而享之未大害郊既主日則日月决不可下齊乎六宗星為幽宗水旱為雩宗此自二類鄭改宗為禜踈矣坎壇以祭四方而又徧祭於百神山林川谷丘陵能出雲為風雨見怪物者此則合乎山川與羣神矣四方非山川林谷丘陵又未盡於百神此漢儒以意求之是以漢世泰壇其中而五帝環壇其下以求當乎六宗而復壇設羣神以求合乎書之文是則禋類百神合之以為一也山川惟不望知徧走其地矣望者遙祭爾以山髙可望而祭之川曰望者本山而言之漢岳瀆各祠其處然不望則非也王肅治家語而輒自異之必有其説矣噫多言奚為後世必有尭舜文王周孔者出不由羣惑一㫁以義則六宗之秩正矣於予與何有魯郊覈曷不幸而生於後世也天子祭天地諸侯祭社稷魯之郊禘抑可知矣自王安石以周公有人臣不能為之功而成王報之以人臣不得用之禮告於神考説者於經不得其證則又牽引司約所謂治神之約為所主非常之禮賞非常之功者以扇之而聖人之意以益繆夫魯之郊禘其非禮亦明矣當僖公三十有一年春秋始書郊而詩且著僖公之頌聖人之意不難見也是何説者猶以為未失郊禘豈諸侯之得用哉今也郊禘之名既同而汲汲然取其禮之小異者以為可抑何瞀邪周郊昊帝魯郊五帝周禘帝嚳魯禘文王周郊日至而魯之郊孟春周牛以騂而魯之牛白牡此果魯之疑其僣而自為之制也周祖后稷故禘帝嚳魯祖周公故以為禘文王日至天帝用事之始故事天帝孟春五帝用事之始故以為祀五帝豈以無書三月郊若卜郊祀五帝之為得正無譏書用禘為禘文王之得宜邪享以言帝祀以言廟不忒則無爽矣四卜不從鼠食牛死有天道矣何謂春秋不懈而享祀之不忒乎皇皇后帝后帝非威仰矣享以騂犧騂犧非白牡矣騂犅赤􅆃公羊明文文十三而禘周公以白牡固明堂位之説也豈祭周公以白牡而魯公反騂犅乎日月之常有交龍衮龍之旂無日月周禮王建太常十有二斿而覲禮天子載大旂以象日月升龍降龍考工記弧旌枉矢以象弧葢張旗以弧韜弧以韣而魯以龍旂承祀載弧韣十有二旒日月之章是名旂而實常魯之為制固已無毫末顧矣周禮在魯果何信乎立五門設六官此春秋所為作予既論之而世未之明也孟獻子曰啟蟄而郊郊而後耕是月以寅矣而穀梁子猶以為自正月至三月皆郊之時此經所以無書三月之郊宣三年之正月特書牛死乃不郊則他嵗牛不死正月郊矣正月之郊乃建子之月也子服景伯謂呉人曰魯以十月上辛有事上帝先王季辛而畢自襄公來未之有改則魯固十月郊矣畢乎季辛則十一月矣故雜記曰正月日至有事於上帝七月日至有事於祖此記禮之失自獻子也魯僣天子禮故正月日至郊天而配以稷比其祭祖則固用夏之孟故明堂位以六月祀周公於太廟今孟夏也獻子葢將以尊其祖而以夏五有事此亦徒以二至為重也彼見魯郊不過三月則以為啟蟄而郊見其及稷則以為祈農事一何鄙邪雖然定哀以來郊皆正月又未嘗以十月郊禘之僣明自後世非成王與周公㫁可識也魯用王者禮樂予既言矣今得而卒其説麟木説絶筆獲麟二論見發揮矣夫哀公之十四年至秦滅周凡三百二十有四年予敢謂孔子之知秦哉予謂昔魯端門有血書云趣作法聖人沒姬周亡彗東出秦正起胡破術書記散孔不絶明日子夏往視之血書蜚為赤鳥化為帛鳥消書出署曰演孔圖中有制作之状言孛鳥之出周室遂㣲秦政滅周滅諸侯及子秀書亦甲乎孛胡亥破先王之道也端門今在孔廟東南十一里春秋説題辭言孔子謂子夏獲麟之月天當有血書魯端門子夏録之者此也故演孔圖云孔論經有鳥化為書奉以告天赤爵集之化為黄玉刻曰孔提命仰應法是為赤制又云麟木之精蒼之滅也麟不榮也注謂見拽柴者觀此然後知予言之有由昔王通氏謂春秋以天道終而孔頴達云彗星東出之際憲章遂冺言必及彗其亦有所承乎緯候之書吾不敢廢顧豈茍然已哉按孝經中契云丘見孝經文成而天道立乃齋以白之天𤣥霜涌北極紫宫開北門召亢星比落司命天使書題號云孝經篇目𤣥神辰裔孔丘知元命使陽衢乗紫麟下告地主要道之君後年麟至口吐圖文北落郎服書魯端門隠形不見子夏往觀冩之得十七字餘文二十消滅飛為赤鳥翔摩青雲解疑論云聖人不空生不受命而制作所以覺斯民覺後生也西狩獲麟知天命之去周赤帝之方起為周亡之異漢興之瑞及聞端門之命有制作之状乃遣子夏等一十四人求周史記得百二十國寶書修為春秋故春秋説丘覽史記援引古圖推集天變為漢制法陳序圖録又云丘水之精治法為赤制功西狩獲麟言赤受命蒼失權周滅火起采薪得麟也而何休乃謂孔子按録知劉季當代周見薪者獲麟知為之出謂采薪有庶人然火之意明赤帝將代周西狩獲者從東而王西東夘西金明夘金之得天下又不書下三時者水絶火王漢興之應此過鑿也然家語亦云子與子貢講道徳有赤氣起貫於天子曰魯端門當有血書西飛為烏則非特緯書也書林作鳥拾遺記云夫子生時麟吐玉書故以為聖人之應也麟難麟果何物邪孔子曰麟以為畜故獸不狘刳胎殺夭則麟不至如此而已越自西狩筆絶而世之學士弗復知麟之為物於是羣起而要為之説曰瑞獸也曰仁獸也曰土畜也或曰木之精詩含神霧曰北方元枵之獸鶡冠子曰西方之毛蟲陳欽曰中央軒轅大角之信蔡邕若是其不一也底言其状則曰麕身牛尾曰狼項馬蹄曰黄色圓蹄曰狼額赤目而五蹄髙丈二尺身備五色腹下茹黄角端帶肉含仁懐義居不羣行不侣音中宫羽步中規矩不踐生蟲不折生莽不犯陷擭不罹網罟飲清池而逰樂土牡鳴逰聖牝鳴歸和春鳴扶㓜夏鳴養綏秋鳴藏嘉冬鳴思邊食嘉禾飲玉英彬彬乎有文藻申申乎有樂章京房葛洪鶡冠廣雅與孫氏瑞應之書其説固多不離乎此矣歸和一作歸昌扶㓜一作使劣養綏一作養耋若語其夀則或一千廣雅或三千抱樸子或云水土搆精公羊傳或云陽氣所孕又云純隂之精鶡冠子云嵗星之散保乾圖云機星得則生運斗樞何其紛紛邪按孝經右契春秋感精符麒麟一角明海内之共一也不刳胎剖卵則在郊矣自漢而來為祥説者咸謂麟生於火而㳺於土王者視明禮修好生惡殺動有儀容賢者在位不肖者退則見郊野禮斗威儀云君垂金而正政太平則在郊而春秋考異郵以為王者功平則至孝經緯亦言徳至鳥獸則鳯凰翔麒麟臻故劉向謂帝王之著莫不先致四靈是以治平則至徳盛則以為畜而三五厯紀遂記黄帝之世以麟為畜尚書中候亦謂黄帝時常在園囿而傳且記尭時毎在郊棷虞世來逰於田遂使庸君想致學士妄談於是指鳥為鸞證鶡作鳯讐真假偽漫不可考嗟乎鉏商一獲而周室衰孝武一獲而漢祚㣲章帝何人而元和二三年間郊國上麟者五十一安帝延光亦且三見孝獻延康之元一年之中至十見於郡國石季龍開華林郡國上送蒼麟二八爰俾張司虞調之以駕芝葢晉宋以降無代無有而孟蜀之邦乃至多於犬彘不知果何物邪公羊氏云麟非中國之獸也而瑞中國中國有王則至今并州有野麟其大如鹿則又非瑞物矣予聞唐文皇時龍支來貢天馬堕地無毛鱗生於肉目若黄金項若雞延股裏旋毛光成日月在處大鮮雲周覆之予以是真麟也餘子之言其亦出於想像而不足徴者載質之傳牡麒牝麟而書中候則云麒似大䴢一角麟似馬而無角赤目斯迨得之釋獸亦謂麟如馬而一角不角者麒此雌雄之辨也終軍所獲一角五蹄葢若麃者果又何物耶然詩義疏中興徴祥書又謂麕身牛尾狼頭一角馬足而黄劉向謂其麕身牛尾圜頭一角含仁懐義擇土而踐則又繆矣嘉祐二年六月交趾貢二獸狀如水牛身被肉甲鼻端有角食生芻𤓰果必先以杖擊之然後食時以為麟田况云其與書史所載不同恐為夷人所詐而杜植亦奏其不似麕而有甲此必非麟畨商有辨之者特山犀也宋太始末武威進獸一角羊頭龍翌馬足父老亦莫之識按爾雅麕􅀈麐兕皆一角然不言有鱗甲惟廣志言符枝謂其状如麟皮有鱗甲此迨近之而形乃如牛遂宣詔答為異獸斯為體矣方吕光入姑臧有麟正見百獸從之光遂僣即三河然則斯麟也其果祥邪果不祥邪鄒虞續古琴操云鄒虞者邵國女之所作也古者役不逾時不失嘉㑹邵國之大夫乆於行役故作是詩也鄒者天子之囿虞者掌囿之官東都賦云制同乎梁鄒韓詩云梁鄒者天子之田也故九成宫頌云司馬奉梁騶之典虞之時益為朕虞故詩韓魯説鄒虞為天子掌鳥獸之官周南補亡召風鄒虞皆以吁嗟稱之穆天子傳七萃之士髙奔戎擒獸以獻王命畜之東虞則今之虎牢矣自書大傳言散宜生等之於陵氏取怪獸白虎以獻紂尾倍其身大宗伯以白琥禱禮西方而孫炎以為白虎西方之義獸白質黒文一曰鄒虞劉義方詩疏作騶呉異義陸機遂謂騶虞白虎黒文尾長於身不食生物不踐生草人君有至信之徳則應葢取應信厚之説爾然山海經言林氏所出騶虞其説如枝相如所謂囿騶虞者今西河有騶虞縣則或自一物也歐陽公論蜀多端其説甚美然亦未可概語商周之際式稽書傳必不得於予衷則疑疑則求求而未嘗不得堯之於舜必有美祥武之於紂必有殰怨始嘗語矣然不敢按鄙臆及得後魏書張淵傳若四明山記乃得虞帝之事而商周之交猶昧也於是摭國事見希舄之言謂文王拘羑里武王羈玉門卒㫁紂頭與韓非武身受詈湯身易名之説以知文武王嘗辱於紂三十九而未得其始末也暨稽吕氏首時乃云季厯困死文王苦之有不忘羑里之醜者時未可也至武王而事之夙夜不懈亦不忘玉門之辱立十二年而成甲子之事則知周之辱累世矣故非之喻者以勾踐之官於呉身執干戈為呉王洗馬而殺夫差於姑蘓文王見詈玉門顔色不變而武王擒紂於牧野故曰守柔曰強二十一又云越王之霸也不病官武王之王也不病詈聖人之不病以其不病則是武王也而陽經且云食子羮於牖里莫自悔也至此而後南單之事見矣嗟乎商周之載一何惑邪釋諒闇而即戎載木主而示述伐君之利歸於已而伐君之名施於父此昔人所以謂二子恥食其薇者也即按難二之言昔文王侵盂克莒舉酆三舉事而紂兵之文王懼請入洛西地赤壤之國方千里以贖炮烙之刑仲尼曰仁哉文王輕千里之國而請炮烙之刑智哉文王出千里之地而得天下之心鄭長者言體道者無為也無見也此最宜文王矣仲尼以文王為智未及此也義則然矣然文王胡得千里之地哉載觀吕氏順民之説則知文王之處岐而事紂者寃侮雅遜朝夕必時上貢必適祭祀必嚴於是紂喜命稱西伯賜之千里之地文王再拜辭地願為民請炮烙之刑文王非惡千里之地也得民心賢千里也文北面而躬事之武南面而三斬之敏而求諸何求而不得故凡事必有釁審其源循其委則千嵗之至皆可知矣何至盡百里之外意他山之草木哉春秋用周正烝冬祭也故周禮大司馬烝以仲冬而魯烝以正月是時王之正也春秋所紀抑不知魯史之舊歟夫子之革之歟商正建丑而伊尹奉嗣王歸亳若見厥祖若即位若朝廟若復辟在嵗首者商書皆以十二月紀是建不同而書不改夏之月也按在周書作周月也若以夏正紀則當云元年冬十有一月矣今不然而謂之王正月是以周王之正紀而夫子因之矣雖然以周正紀而猶冠以春者時王之四時也定之方中夏之十月周之十二月而城楚丘乃見於次年之正月紀其成也去年閏在戍則定中在十月不在十一月故説者謂衛以十月城魯以十一月會之亦妄或曰春秋用夏正故四月鄭祭足取温麥秋又取周之禾則春秋果用夏矣是不然經紀以周而傳則亂以夏也榖鄧之來朝經書在夏而傳謂之春經以周而傳固以為夏此預所以又謂春來而夏行禮僖之五年正月朔日南至傳顧以周正説傳亦何常之有預特因其繆爾使春秋以夏正則二月無氷十月大雪皆不得為異者何事乎書且在周禮有正嵗有正月正嵗為寅而正月則為子經書周時然子丑不得四年之正者固自若周以子正而周之書授民修祭猶切用夏時不易也郊以孟春建寅月也禘以季夏建未月也而康成謂孟春子之月季夏巳之月而左氏則謂啟蟄而郊郊而後耕故説者謂魯無冬至之郊葢欲見魯非僣宣之八年六月有事太廟固云巳月而明堂位以季夏六月禘周公有非建巳之月矣正在人時在天先王有改正之文而無改時之實是故周官凡言正嵗與田狩郊祀春夏秋冬皆本夏時四月維夏夏之初夏也六月徂暑夏之末夏也春秋之書舉二中以見四時則王正月當為夏之正矣而且不然豈天之冬而周謂之春天之夏而周謂之秋乎此穀梁所以謂正月烝為冬祭之時正月狩非春田之禮四月郊為夏之始九月郊為秋之終則亦以春秋為夏正與二傳之説異葢不知周之四時固不是律也路史卷四十二

body:
  text: 路史卷四十六宋羅泌撰餘論九西王母玉環玉琯西王母西方昬荒之國也在爾雅為四荒之名据大戴禮三朝記孔子之言昔西王母獻舜白玉琯及益地圖注言神也亦見書帝驗期及世紀世本乃云獻白玉環及玉佩禮斗威儀云獻地圖及玉玦集仙錄又言黄帝在位西王母使乘白鹿授地圖舜帝在位復獻白玉環及益地圖舜遂廣九州為十二復獻白玉之琯以和八風故章帝時零陵文學奚景於中道舜祠下得笙白玉之琯風俗通漢晉諸史吕覽樂書皆備言之説文堯舜祠下得笙玉琯蓋皆以玉作琯故能使神人和鳳來儀也竊按諸書言舜時瑞事尤多如金樓子言舜攝時有緩耳貫胸民獻珠鰕拾遺記言羽民等獻黄布火浣之類多不足質按竹書穆王七年西王母來賓特不過西戎爾大歴六年試西戎獻白環詩指此黄陵湘妃岳之黄陵癸北氏之墓也湘之二女虞帝子也歴世以為堯女舜妃者由秦博士之妄對始癸北氏虞帝之第三妃而二女者癸北氏之出也一曰宵明一曰燭光見諸汲簡皇甫氏之世紀山海經言洞庭之山帝之二女居之者也若九歌之湘君湘夫人則又洞庭山之神爾而羅含度尚之徒遽斷以為堯之二女舜之二妃而以黄陵為二妃之墓鄭𤣥張華酈道元輩且謂大舜南巡二妃從征溺死湘江神游洞庭之山而出入乎瀟湘之浦為是說者徒見堯典有二女之文即以為堯之女而舜之妃不復致考厥妄甚矣郭景純云堯之二女舜之二妃豈應降小水而為夫人當為天帝之女斯亦繆者夫使天帝之女尤不應降小水而為夫人王逸韓愈從而辨之得其情矣且虞帝晚年亦既退聽而禪禹矣南狩之舉摠之伯禹而二妃者俱過期頥孰有從狩之事哉今攷皇英之冢既各它見則此黄陵顯非二妃之窆而湘祠決匪堯女之靈皆昔人之罔說知矣山海經云舜之二女處河大澤光照百里夫大澤者洞庭之謂而光照者威靈之所暨也訖今湘神所保靈正百里所謂分風送客者乃正囿一同之間然則湘靈為虞帝之二女復何疑耶沈存中云陟方之時二妃皆百餘歲豈得俱存而且謂之二女乃復不知位既久禪匪復陟方之事耶黄伯思輩雖能以退之之辨為非然猶以為天帝之女與翁養源於湘江圖志述之斯亦惑矣紛紛失据以為舜女蓋自今始女英冢唐世記錄張尚書牧𢎞農鞫盜有嘗發商州堯女墓者多得大珠鏐金寶器玉􅀢厥事甚顯公獨怪其史傳蔑記又謂堯女舜妃從死湘嶺不得在是且以玉􅀢寳珠非協茅茨之事一時名流劉禹錫輩亦舉為疑微達識之義矣予竊攷之舜子商均本曰義均見於山海經以其封商而謂商均商正今之商州按帝王世紀云虞帝三妃娥皇無子女英生商均今女英之冢在商則特舜崩之後隨其子均徙於封所故其卒葬在焉事允恊矣又奚史傳之記不記哉彼亦豈知虞帝未始南巡與二妃初無從巡溺死之事皆記禮者之妄爾夫以帝果南巡二妃於時皆逾百歲豈得謂女而復此俱存哉尭舜固儉也然寳玉之類亦非必為深怪南陽張澹墓碑陰刻白楸之棺易毁之裳銅鐵不入瓦器不藏嗟爾後人幸勿我傷元嘉既發甚多金器垂簾一皆金釘飾之先漢文帝勅治霸陵一皆瓦器不得以金銀銅鐵為飾故魏晉羣盜發掘陵堬而霸陵獨得不抇至元康間三秦人尹桓解武始發霸杜二陵潛闥之中金玉燦陳由此觀之則商墓之藏可理知矣况尭舜之儉朱均固未守也式求劉向當時對成帝者則霸陵之事固不得甚薄也况商均乎鄧至爰劍後秦後魏書鄧至傳像舒治者普水𦍑也自稱鄧至王舒彭内附拜龍驤將軍益州刺史甘松縣子王請以封授子彭奮髙祖乃拜奮建中將軍甘松子寰宇松州引舒彭者舒治之後也通典云自治至十代孫附於後魏故寰宇記鄧至𦍑敘云自舒治至十世孫舒彭附於後魏孝文封甘松縣子然至嘉城縣敘乃以彭為治之子按後魏紀太和十七年鄧至王像舒彭遣其子舊朝貢以位授舊當是奮字及鄧至傳則云其王像舒治遣使内附髙祖拜龍驤將軍不云遣治髙祖即孝文而紀傳所載曰彭曰治曰使為名不同在元和郡縣志則云像舒治子孫舒彭内附拜將軍開國以彭為治之子未詳何据恭帝初其主擔因亂來奔始有其地爰劍者伯禹之初分帝之少子於西戎為𦍑酋秦厲公時有無戈爰劍爰劍為秦執歸南山賜支河子孫分種有氂牛種白馬種參狼種氂牛種越嶲羌也白馬種廣羌也參狼種武都羌也與苗後異或以爰劍燒當出三苗非也景帝時研種畱何等求守隴西塞徙之狄道故安武帝西逐諸羌乃渡湟築令居塞始置䕶羌校尉於涼州部牛邯為之曽孫忍舞子十七人為十七種忍九子研號研種十三世有燒當代雄姚罕之間居河北大允谷四世孫填良益貧收先零良良卑湳侵甚為所敗良益盛奪榆中居復彊生岸滇虞即滇吾生東吳迷吾號吾後益困依發羌吾曽孫麻奴收怨羌復振滇零大捷漢號天子遷那内附漢中元間冦西郡馬武有弋仲襄長是為後漢云黄熊化昭七年傳子産云􅕐殛羽山其神化為黄熊入于羽淵梁武帝謂熊不入水當是能鼈孔穎達云神化不可以常言若云能鼈何由入寢若以夢化為不可常則可至矣以今東海祭􅕐廟者不用鼈與熊白豈化為二物耶人自為爾竊按能亦熊屬非指熊鼈而熊能亦並音𢎞又切之以奴來語云欲得不能光禄茂才是也故程晏化黄熊評謂晉侯之祀有五不可而栁子厚非國語謂好事者之為之凡有為也然於雜記更謂化為𤣥魚其大千尺故鮌之字從𤣥從魚不知􅕐􅦡禹父而鯀鮌乃魚名王嘉云舜命禹疏川道岳遍日月之下惟不踐羽山之地濟巨海則黿龜為梁逾峻嶺則神龍為負聖德所感而神化之事互説不同𤣥魚黄熊四音相亂蓋疑於此也王充亦云逺殛羽山又化而入羽淵非人之所得知而為鯀之初斯未可審且晉侯之夢象熊羆之占自有所謂侯疾偶當自衰故子産因以言之後遂以為信爾又按瑣語晉春秋篇云平公疾夢朱熊窺屏與傳又不侔矣大抵左氏多誣劉子𤣥復引之以為黄龍入門益為昬聽啓母石夏后氏生而母化為石此事之異聞者說見世紀蓋原禹母獲月精石如薏苡吞之而生禹也淮南子修務云禹生於石注謂修已感石坼胸而生故說者以為夏后生而母復為石今登封東北十里有廟廟有一石號啓母石應劭劉安郭璞李彤隨巢王炯王韶竇苹等皆云啟母歴代崇祀亦以為之啟母按元封元年武帝幸緱氏制曰朕用事華山至中岳見夏后啟母石伏云啓母化為石啟生其中地在嵩北有少室姨神廟登封北十二里云啟母之姨而偃師西二十五復有啟母小姨行廟淮南子禹通轘轅塗山欲餉聞鼓乃來禹跳石誤中鼓塗山忽至見禹為熊慙而去至嵩山下化為石禹曰歸我子石破北方而生啟蓋本乎此事正與廣德所祠烏程張渤疏聖河夫人李餉至鳴鼓事正同見事實乃桐汭志謾錄等故記以為大禹之化厥有由矣雖然啟母之廟顧野王盧元明等又以為之陽翟婦人嵩髙記云陽翟婦妊三十月子從背出五歲入山學道為母立祠曰開母祠則又疑后母矣歴載傳訛故得而為之説無支祁集仙錄云雲華告禹曰太上愍汝之志將授靈寳之文陸策虎豹水制蛟龍馘邪檢兇以成汝功因授上清寶文又得庚辰虞余之助遂導波決川奠五岳别九州天錫𤣥圭以為紫庭真人虞余庚辰按楚詞乃益稷之字雲華者云王母之女巫山神女也昔李公佐至永和九年從元公錫泛洞庭登包山入靈洞得古岳瀆經第八卷竒字蠧毁不能解其後周焦君詳之云禹治淮水三至桐柏山驚風迅雷石號木鳴土伯擁川天老肅兵功不能興禹怒召百靈搜命䕫龍桐柏等於君長稽首請命禹因囚鴻䝉氏彰商氏兜氏盧氏犁婁氏乃獲淮渦水神名無支祁善應對言語辨江淮之淺深原隰之逺近形若猨猱縮鼻髙額青軀白首金目䨮牙頸伸百尺力逾九象摶撃騰趠疾利倐忽視不可久禹授之童律童律不能制授之烏木田烏木田不能制授之庚辰庚辰能制鴟脾桓胡木鬽水靈山妖石怪奔號叢繞者以千數庚辰以戰遂去頸瑣大械鼻穿金鈴徙之淮隂龜山之足俾淮水永安而釋氏乃以為泗州僧伽之所降水母者惟僧伽以觀音大士應化於過去阿僧祗刦值如來三慧門入道以音聲而為佛事現化此土如李邕之三碑蔣之竒所傳三十六化近是而水母之事非也方永泰初李湯知山陽物嘗出焉詳予福地記四載淮南子云物無貴賤因其所貴舟車楯肆窮廬固有所宜也許氏以為水宜舟陸宜車沙地宜肆坭地宜楯草野宜窮廬書言四載孔安國謂水舟陸車泥楯山樏而夏本紀乃言泥乘橇山乘檋橇尸子作蕝集韻同為祖芮切舊亦音蕝而檋乃音鞠故河渠書溝洫志皆云泥蹈毳書言山即橋而志言山即梮諸儒皆以檋為丘遙切此以意言之音橇為蕝爾按許說文四載水舟陸車無可異者惟山乘樏澤乘䡅為不同尸子云行塗以楯行險以撮行山乘樏行沙乘軌樏與欙同力追切䡅與楯輴同敕倫切尸子之說蓋得其傳橇非輴也字宜音撮險所乗者書志作毳特省文借字代弗察爾􅀈與梮同蓋即樏也當讀如濟漯蓋亦諸儒意㑹而音為纍其作橋者殆梮之轉然禮韻直收橇於平聲云丘妖切字亦作鞽則又合橇檋為一矣集韻作鞽而以梮同之􅀢􅀢固舉食之具爾如淳云橇以板置泥上通行檋以鐵如錐頭長半寸施之履下以上山使不跌字亦作梮二物蓋皆車類竊詳其制橇當如蘇公􅀢馬之法而樏則輁之制爾周禮軍旅㑹同鄉師治其輂輦輦人輂車駕輂上為藩藩營輓之以載任器然說文以輂為大車駕馬則又非山乗者矣按禮士載柩以輁軸大夫以上以輴輁狀如長牀穿桯前後著金而關軸焉輴車庳下而寛廣自諸侯上有四周即其制也孟服謂木橇形如箕摘行泥上徐廣以橋為直轅車一作輂而應謂梮或作樏人所引者如說非矣夫曰載曰乘則不應為履與板矣楯軌樏撮是為四載舟車常所乘宜不在四載内然在文子又言渉用髵髵於説者為乃鳥反兹又異矣九藪周語云豐殖九藪其在職方揚有具區荆有雲夢豫有圃田青有孟諸兖有大野雝有弦蒲幽有貕養冀有陽紆而并有昭餘祁然爾雅書乃有十藪魯曰大野宋曰孟諸楚曰雲夢燕曰昭餘祁鄭則圃田而吳越間則有具區齊有海隅周有焦䕶晉有大陸而陽陓乃為秦藪海隅大陸焦䕶既異且無弦蒲夫大陸晉地而焦䕶陽陓皆在扶風方周公時秦未分地豈得與周並舉周亦何由自謂之周而與秦並言哉且以海隅何得為藪而獨屬之齊耶傳云鄭之有原圃猶秦之有具囿也今乃以陽紆屬冀圃田屬豫地理殊矣以鴻烈之九藪若從爾雅既無周魯而益以趙之鉅鹿則是與晉大陸為二也說文用職方說以圃田為甫田貕養為奚則自異爾奠髙山大川王制曰廣谷大川異制民生其間者異俗先王修其教不異其俗齊其政不易其宜夫風俗之所以異由廣谷大川之異制也是故鴻水平九州之地失疆理伯禹定之必以髙山大川為之凖者本風俗之異也濟河為兖州則專以大川為之界荆衡為荆州則專以髙山為之界荆河為豫華黒為梁則兼以髙山大川為之界也兖州東南据濟西北距河青州東北据海西南距岱豫州西南荆山北距河水雝州西距黒水東据西河荆州北据荆山南及衡山之陽梁州西距黑水東据華山之陽維揚東海而北淮徐東海而北岱南及于淮此所謂奠髙山大川也蓋以其地命州而不以其州分地有如兖濟皆當時所命之名後世安知其在北與在南哉云濟河為兖州荆及衡陽為荆州則以濟水河水之間為兖而荆山衡山之陽為荆矣蓋荆衡者萬古不徙之山而河濟者萬古不泯之水也以故荆兖之名得附河濟荆衡而不滅萬世而下求禹貢九州之分域者皆可得而攷矣九州惟冀無所至者舉八州而界自見亦所以别帝都而大一統也九界别山川定于以及夫治水之曲折與夫田賦髙下貢篚多寡以詔來世蓋前目而後凡者體如是也雖然言某山某水者非必止乎此而言及者亦未必至乎此揚不言南青雝之不言北則以其境接蠻狄提封有所不常故也路史卷四十六

body:
  text: 路史卷二十二宋羅泌撰後紀十三䟽仡紀夏后氏帝禹齊鎛古書㠳雲臺􅀢嘯堂集古有夏禹印正夏后氏夏籍文􅀢夏書夏盄鍾夏𨽻􅀢夏后用之姒姓名禹按禹廟謚議云或曰禹桀皆易名周人革民視聽故以行為謚追夏始祖與末王而加之夏商之世諱忌未行臣子呼君父名無嫌猶朕尊卑得共稱之大禹之名飛在金烏前懸于玉光上大荒咅而必作億載聞而亦新而開元禮祭夏王云敢昭告于夏王禹瀆矣一曰伯禹按禹一曰伯禹亦曰大禹者尊其爵為稱也羅疇老云禹之功至水平而後大故於禹成厥功之後始稱大禹湯之功至克夏而後成故于湯歸自夏之後始稱成湯然則果謚乎抑字號也是為文命孟子曰放勲乃徂落知放勲者號也王安石曰放勲堯號見之孟子則重華文命為舜禹之號明矣梁武祠像碑堯曰放勲舜曰重華而禹不著故文命之説為迂詳發揮非謚辨其先出于髙陽髙陽生駱明駱明生白馬生海内朝鮮記是為伯􅕐傳記􅕐為髙陽𤣥孫故世族譜譏之按漢律志及帝系三統歴皆謂為髙陽五世孫世本等以為髙陽生􅕐失其世矣字熈汶山廣柔人也見子雲蜀記今之茂洲後周汶山郡汶川縣漢廣柔也故縣城在其西姱直敗數帝使治水稱遂共工之過廢帝之庸九載亡功墨云伯􅕐帝之元子廢帝之徳庸既乃剕之羽之郊此親而不善者楚辭云鯀婞直以亡身蘇軾云盖剛而犯上者若小人也安能以變四夷哉左氏之言後世流傳之過逮帝禪舜熈怒于帝曰得天之道者帝得地之道者王公胡為論意欲自以為公彷徨于野以患帝乃遏之羽山書殛于羽山殛者致之死地而不返云爾經云鯀竊息壤以垔洪水帝怒命祝融殺之羽郊故天問云永遏羽山歐文忠云鯀殛羽山慙而斃羽山海之羽山縣獨㞐山也元和志縣西北百二十寰宇九十臨沂東南百十髙四里周公里蓬萊南十五俗呼懲父山南百步外有淵水常清牛羊不敢飲曰羽淵淵上多細柳鳥獸不敢踐有羽潭羽朐音同三年而死是為羽淵之神山海經云南望禪渚禹父之所化今陸渾東有禪渚即鯀化之所河南宻亦有羽山鯀化羽淵一或在此神則無不在也子産云其神化為黄熊事詳晉語或云黄龍或云𤣥魚云能鼈有説别見寔為郊三代舉之見晉語按鯀以殛死墓今在臨沂東百里惟神化爾歸藏啓筮云殛死三嵗不腐副之以吳刀是用出啓寓㖖也初鯀納有莘氏曰志帝系有莘氏之子謂之女志傳有㜪女娡故記多女嬉失之是為修已一作紀年壯不字獲若后于石紐秦宓云禹生石紐今之汶山郡乃今茂之汶川縣石紐山也在西蕃界龍冡山之原青城記㖖生于石紐起于龍冡者世紀石㘭雒書云有人出石夷随巢子謂禹生崑石皆指此也越春秋云女嬉于岷山得薏苡盖石苡薏流星之為盖桓𤣥母馬氏之類故禮緯云祖以感薏生按書帝命驗云白帝以星感修紀山行見流星貫昻感生姒戎文命禹注星金精姒禹氏成生戎地名文命也又孝經鈎􅒛訣云命星貫􅄧脩紀夢接生禹注命使之星故世紀云脩已山行見流星貫昻夢接意感生禹于石紐服媚之而遂孕嵗有二月遁甲開山圗榮氏注云女狄莫及石紐山下泉中得月精如雞子愛而吞之遂孕十四月生夏禹以六月六日今淮南俗尚以六月六日為禹王生日蘇軾㳺塗山廟詩自注云是日數萬人屠疈而生禹蜀本紀云禹生石紐禹母吞珠孕之折副而生世紀云吞神珠折胷而生故仲舒繁露云禹生發於背契生發于胷屈原云勤子屠母于僰道之石紐鄉所謂刳兒坪者孟子云禹生石紐華陽志郡國志生于石紐村寰宇記今在茂之汶川縣北四十任豫益州記廣平之石紐林者今其地名刳兒坪蜀本記作痢兒畔夷人共营其地方百里不敢處及畜牧有罪者逃之捕者不逼三年則原之畏禹之神亦猶窮山不敢西畏軒轅之丘也十道記紐為秦州地名随巢㖖禹生碣石之東斯繆矣禹生在􅕐未出用之前十數載則其在􅈎道矣長於西羗西夷之人也青城記云禹生于石紐起于龍冡龍冡江源岷山也有禹廟填許山上廟平八十畆每朔望池自漏繼有水給千口身長九尺有只虎鼻河目􅀈齒烏喙耳三屚世紀長九尺二寸耳參鏤本作漏一云九尺九寸載成鈐㐮玉斗鄭注雒書靈凖聽云有人出石夷掘地代戴成鈐懐玉斗注姚氏云禹胸有墨如北牛鄭謂懐璇璣玉衡之道戴鈐謂有骨表如鈎鈐星也玉骭履已世紀云鈐胸有玉斗首戴鈐虎􅀈大口足文復已董繁露云足昕疾行先左隨以右聲為律身為度稱以出司馬索隱云聲與身為律度則權衡亦自身出故云稱以出非也盖稱量而出之用權之道如巽卦以㢲竹權而云巽稱而隠隠微也其次為天秤本此亹亹穆穆為綱為紀家語支子云每子云為綱為紀敏給克勤其徳不違其仁可親大戴禮師于大成摯作覽作摯新序作執暨墨如子髙百成子髙學於西王悝西王􅀈也新序作西王國白虎通義曰國先生繆也實懋聖徳夢自湔于河西四岳舉之舜進之拜治水土爵司空易林云舜生大禹石夷之野進詣王庭拜治水土傅子云荀仲豫稱禹十二為司空按舜攝時􅕐殛既死而禹用攝時盖年十四後代守中多矣傳云大司空按建武詔契為司徒禹為司空皆無大名乃握括命書中侯云伯禹在庶師舉荐之帝堯握括命不試爵授司空暨虞余度人徒以傅土傅敷布之謂畧分布之定州土之形然後施工天問云降省下土四方即荀作􅄎即云治非也悼前人之非度乃勞身焦思輕尺璧而憐寸隂志勤天下左凖繩右規矩纚長風沭甚雨攝從三子履四時乗四載四載多説書注說文准南注皆以舟車獨克獨尸子塗以楯險以攆山樏沙軌冝是有説别見行山表木斬髙喬下管刑勢云禹斬髙喬下以致民力定髙山大川廣谷大川風俗之所以異九州之所以分故推其髙大者先正之然後九州可别如大山定而山之西為兖大河定而河之南為豫此分畫之要也孔云岳瀆差秩失之疏停道滯鍾水豐物身􅀢芨以為人先禹功記云禹治水其功暨成今江河淮海之神曰魚鼈盛衰随世安危自是之後年必小减其物逓增其價以食晚末之民應天意也堯之水河之患為甚泲次之淮次之江漢次之濁河所被冀兖重而雝輕泲之所被則徐輕而兖青冀重兖之流皆自其東北􅋅海而冀又上京故治水之急先於河自上而下有治水先後説見發揮舊說自下而治上非是于是發迹壺口治梁及岐吕覽淮南子禹時龍門未闢吕梁未鑿河出孟門之上大溢逆流無有丘陵髙阜㓕之曰洪水禹道之為孟門水尸子云吕梁未闢河出孟門為二寰宇記吕梁在離石北以東可三百餘里今石之定胡龍門在壺西南梁山在馮翊則龍門之南岐山在扶風夏陽則在其西差逺水溢孟門時皆墊溺故始于壺口乃治梁山方及岐所謂既載壺口猶俶載也南至于華隂東至底柱孟津梳三門以奠西河既修太原至于岳陽覃懐底績孟門既開二地出于水從而治之漢志以為二山蘇軾以為河患上及之水經禹鑿砥柱以通河水謂之三門今在陕一曰閼流地記河水東流貫柱触于流者在南河水峻害舟一十九灘勢三陿所言龍門下駃如竹箭者鴻嘉中楊焉言底柱於逺成帝使鎸沒水鑿之不能去水益怒至今伯禹為萬世慮豈有可鑿留以俟焉者西河觸華山之北故妄者遂謂巨靈分山遂有二華之説斯二渠史記斯留二渠而北載之髙地二渠謂濟漯漯川出貝丘今大河之所流周漢移改非古河也舊謂今河與北瀆亦非漯川王莽所塞書無二渠之説太史公易禹北山川言水行地中禹無載之髙地事過洚水至大陸􅀈為九河合為逆河以入海九河始元城今大名縣西三里故瀆也新論王平仲云西南河間涇渭漆沮伊洛瀍澗衆流輻凑昬墊常先聖人故于冀兖間逆設為河以防暴至之患未至則不妨于民耕既至則不隳民舍周譜定王五年河徙故道今禹穿猶未暇積石也自壺口至積石三千里水無甚害始壺口者以水患極于冀冀之水患在壺口也其功之所施見下石曺說冀州既乂於是凖地之勢自北而南兖青徐為東偏雝髙於豫豫髙于青徐雝豫餘流由鞏洛而入河揚下于荆荆下于梁梁荆之水東自揚而入海故東南次兖青又南次徐四州治而河患息又南沉於揚又西次于荆以放江淮江淮乂而洪水定瀹泲漯决汝漢引南河以通淮泗排淮泗而注之海南河汴也道元云大禹塞滎澤開汴以通淮泗有汴說别見沂從下邳入泗泗至淮隂入淮書云東㑹于泗沂入于海孟子言排淮泗注之江非也故李翺来南錄云自淮㳂流至髙郵乃沂至于江併引孟子謂淮泗嘗入江禹之舊迹也熈寜中遣使按圗求之見故道宛然但江淮已深無復能至髙郵所謂故道者果耶傳云雝豫洪流由青徐而入海尤妄于是由荆而北次于豫由豫而西次于梁由梁而北次于雝以奠江河之上流謂道積石此治九州餘浸者舊云水自下而治上魏幾道論禹貢豫㞐九州之中與兖徐接境何自徐之揚頋以豫為後乎盖順五行而治之冀為帝都在所先而地㞐東北于五行為水水生木木東方故次之兖青徐木生火火南方故次之揚荆火生土土中央故次之豫土生金金西方故終之梁雝所謂彛倫攸敘盖本于王安石冀地下而在北方水所始之言洪紫微愛之非也冀由有治水先後說見發揮櫛泉瀪以汳諸術濬畎澮以距諸川汨九川以距諸海九州滌厡九山封崇九澤始陂子晋云封崇九山决汨九川陂障九澤豐植九藪汨越九原宅㞐九隩合通四海太史公云禹漸九川國語云曲九防謂陂障也澤如靁夏既澤大野既瀦之類川如恒衛既從濰淄其道之類山如䝉羽其乂蔡䝉旅平之類川不可使之堙澤不可使其散故或導之使行或鎮之使止順其自然暨伊益奏庻鮮食暨伊稷播庶艱食奏庻鮮食阜通有亡化居蒸民乃粒萬邦作乂上鮮食肉食鳥獸也下鮮食魚鼈也山林與益同之行川澤與稷同之水功方興必先圗食于時五榖不殖食鮮而已黍稷之類水時施功尤難得以播之化居者懋遷阜通貨賄之謂有則懋使之遷以濟無無則懋使之遷以從有故士農不斵削而械用足工商不耕稼而榖粟充物不可積故使之化化之所以為貨可積以待財使之居居之所以為賄此有無化㞐之利也始禹之治水七年矣傷功未就愁然沈思于是上觀于河河精授圗書中候云伯禹曰臣觀于河伯人首魚身出曰吾河精也授臣河圗􅀢入淵伯禹拜辭注即括地象也􅀢去也今孟津淘河乃北見六子獲玉匱之書以從亊所謂鳴天下經詳予福地記受黒書于臨洮得緑字于濁水乃駐江山棲桐柏受䇿鬼神之書乃得童律狂章鴻䝉之徒制其水怪水怪無攴祈事詳岳瀆經集仙録晋天志云昔大禹觀濁河而受緑字寰瀛之内可得而言也有支祈説别見乗龍降之乃命范成光國哀御以通原天問云鴟龜曵銜􅕐何聽焉順欲成功帝何刑焉王逸以為􅕐殺羽山飛鳥水蟲曵銜而食之柳子爰有鴟龜肆喙之語洪注不能正有應龍說别見聞宛委黄帝書乃吉䄢刲白馬三月庚子登覆鬴探穴獲五符知治水要仙靈符㑹稽紀㑹稽委宛曰石簣昔禹治水功未就發石簣得金簡玉字以知三河體勢于是疏導百川各盡其宜大霄琅書及四極明科云夏禹于陽明洞天感太上命繡衣使者降授五符以治水檄召萬神後為紫庭真人陽命洞㑹稽也餘詳福地記於是復岳下龍門受玉簡以揆地拾遺記禹鑿龍門至空巖得伏羲玉簡長尺有二寸及八卦圗開山圗又云㳺龍門八神採玉簡授之長尺二寸禹執簡平定水土開山圗云禹㳺東海得玉圭碧色長尺二寸光如日月禹以自照洞達幽明按張衡傳即洞視玉版也遂周行天下主名山川以利于民張揖云禹為堯司空辨九州名山别草木禮云夏禹主名山川也山川理脉土地所宜風炁所生畢究其政草木企走蜚動蟲魚俾益疏之以為岳瀆山海二經越春秋云禹按黄帝經見聖賢所記在九疑東南天柱號曰宛委承以文玉覆以盤石其書金簡青玉為字編以白銀瑑其文禹乃東廵登衡山求之赤綉文衣男子自稱𤣥夷蒼水使者来候令齋三日受求禹乃齋三日登宛委得金簡通治水之理遂廵周行天下四瀆所至名山大川召問其神使益疏之為山海經王充别通云禹治水益主記異物海外山表無逺不至以所聞見傳山海經非禹行逺山海經不造仲舒觀重常之鳥子政識二負之尸以見經也東造絶跡西延積石南逾赤岸北過寒谷而裴囬乎昆侖察六扈青泉赤淵分八洞穴金匱玉符以鎮川瀆禹功記云道河之際沉秘景符以鎮五方水患後人頼焉昔王原引杜暹下浙江觀禹玉匱事見紀聞當是時也晝不暇食夜不獲寢以與萬民同務焼不及撌濡不給扢冠罣而弗顧屐税而弗納淮南子禹身執虆臿以為民先剔九河而道九岐鑿江而通九路辟五湖定東海當此時焼不暇撌濡不給扢死陵者葬於陵死澤者葬于澤故節財薄葬簡服生焉韓子云身執耒臿充云禹决江河不鍤東鑃異矣躬操橐㭒而九雜天下之川見荘子御覽作九滌集韻作鳩籴非也居外三十年三過門而不入東至榑木日出九津青羗之野攅樹之所㨉天之山鳥谷青山之鄉窮髪帶方之地南至交趾孫濮續樠之􅰰丹栗沸水之際南娭黃支之堵不死之望西過三危之阨巫山之下飲露之民竒肱三面北至太正之谷夏海之窮祝栗之界禺強之里積氷積石之山未嘗暇息勤考之勲憂其黔首身解陓之河即陽紆經所言縱極之淵也括地圗咅河水乂出于陽紆陵門之山者穆王之所至然爾雅云秦有陽紆在今扶風汧縣之西周書周禮以為冀州妄外鑿二十䖟十七湛䟽三江道四涇通十有二渚並管開峽口川陕璞江賦云巴東之陕夏禹所鑿故杜甫云早知乗四載䟽鑿控三巴唐闢伊闕鑿轘轅破碣石伊闕即今龍門在伊陽縣是為河津巨靈之迹水經云禹决梁山所謂龍門孟津河口廣八十步岩際鐫迹遺功尚存又云風山西四十里河水南出孟門山與龍門對即龍門之上口黄河之巨厄此經禹鑿廣岸深崖穆王西出孟門九州之澄者河出两山之門最湍悍故鑿之今韓城有禹廟寰宇記云禹治水至龍門今夏陽縣是禹廵遶至遶山即此龍門山即龍門關極險司馬彪云吕梁即龍門又鄉寜西南北五礨石城據嶺臨谷西南俯河龍門之上口號倚梯中有禹廟魏孝文至立碑伐山封仂以載厥功王子年云禹治水所穿鑿皆以青泥封記之龜印其上十洲記禹至鍾南山經諸五岳使工刻其石識其里數髙下其字科斗文載厥里數皆禹明書也不但刻劘五岳諸名山亦皆有之亦見雲笈二十六而矩數行矣周脾經商髙語周公積矩之法禹所以治天下者也數之所生也趙語云禹治洪水决流江河望山川之形定髙下之勢除滔天之災使東注海無浸溺之患此句股之所由生也泄流沙于西隅决弱水于北漢青流沇之下地下而上䟽故鬟九河于緡􅘢道五水于東北爰虚其處及時水至而得以縱逸濟口碑云姫氏之所常蹙崇􅕐之所不能治漢長水校尉髙並言河决率于平原東郡左右其地形下而上疏惡也聞禹治水本空此地以為水隈盛則放溢少損自索察秦漢河决曺衛之域不過百八十里可空此地勿以為民室漢古河决瓠子云熈寜十年秋大决曺村下埽及澶後派為一一會南清河入淮一合北清入海乃故瓠子地上詔築堤石十四里孫洙作記皆九河故道所致功之所施名川三百支流三千而弗自功惟心劋形瘵以趣事手不𤓰腓亡然儀色黴支不遂跳不相及竅息不通勞而不居以勤于民而中帝心古人云明徳逺矣微禹之功吾其魚乎其功之施于下世者如此其深且著也年三十娶于塗山氏舜攝之十五年吕春秋云禹年三十未娶行塗山恐時莫失制曰娶必有應乃有白狐九尾造焉禹曰白者五服也九尾者陽數也于是娶于塗而天問曰焉得彼塗山女而通之于台枽世紀云塗山氏合昬于台枽之地塗山鍾離西七十里五塗山也即平河之當塗縣太康地記云古當塗國也漢當塗縣随為塗山縣曰趫世本廣雅作嬌繆是為攸女連山云禹娶塗山之子名曰攸女生啓故世本禹納塗山氏是為攸女也辛壬癸甲行十月而生啓啓見其父呱呱而泣而弗皇子也劉向説苑及孔晁云出先人書家語國語同吕氏云禹娶于塗不以私害公自辛至甲越四辰而復徃治水或謂辛壬癸甲為四年然後有啓太史公言辛壬娶癸甲生啓繆矣或云癸甲下缺文俱妄夫娶與生子乃自二事其娶止以辛壬癸甲四日一也子生啼而不暇子之二也吳越春秋云娶于塗山辛壬癸甲禹行十月而生子是啓十月而生也列女傳言娶四日而去治水啓既生􅈱􅈱是矣王逸言辛酉日娶甲子日去而有啓故說文云九江當塗氏以辛壬癸甲之日嫁娶而水經亦言汝淮之俗至今以辛壬癸申為嫁娶日也稱􅀢築賦蘧程土后吕氏云禹之决水也令民埾瓦礫事已成功已立為萬世利者禹之所見逺而民莫之知也淮南齊俗云禹時天下大雨令民埾土積薪擇丘陵處之畧兹基平版榦坯城郭謹關遂以御㓂攘使民知閭􅣃屋室之築城池古有禹作郭爾傳云處士東里槐禹亂天下禹乃退而作三章強者攻弱者守敵者戰故城郭由禹始而淮南子言􅕐作三勺之城諸侯背之禹乃壊城平地散財物禁甲兵施之以徳海外賔服會諸侯于塗山執玉帛者列萬國故機械之心藏于胸中則純白不粹在身不知何逺之能懐其為說之為異如此謂人亡食則不能使也不利於人則不能勸也故鬟河而定之九牧鑿江而㳙之九路疏五湖而定東海民勞矣而不怨利于民也故不自言其信而信諭矣外紀云通九派疏五湖鴻水漏中州乾率然語也三江九江四瀆沇濟並詳于福地記人阻饑而儥子者取歴山之金制幣賣之羡餘胥給以均諸侯髙道穆表禹遭大水以厯山之金鑄錢救人之困湯遭大旱以荘山之金鑄錢贖人之子事本管子傳言夏以貝乃商九州之髙下相其原隰及山川之便利任其􅀈膌格肕胗其殖剽怸沙桀作其畦畛正其疆界以杜争奪傳言禹經啓九道畫為九州禹貢九州之畫寔在治水之後盖因治水悉地勢之分斷皆出自然不可十二乃復為九爾九州之土有常而物有次五沃之土五粟為長五臭所毓凡彼草木有十二襄此以壤邑辨盖如周施草人糞種之法劉氏以大司徒十二土為十二州之土如職方所掌職方從時王大司徒因上古如十二壤毎上有十二之别若草人醉剛之九土而益以青黎塗泥其說非是上土廣舄黄壌赤䐈中土黒墳白壤墳壚下土青驪塗泥品居庻彚而正九賦随食志云禹制九等而康歌興九州以土色定田皆有定賦惟冀豫梁揚錯出冀豫荆青徐雍兖揚梁為次然雍兖皆六六而無九一夫履地五十而貢井田古法孫毓以為井邑丘甸為周制禹治水未暇及丘甸妄也語云盡力溝洫書云濬畎澮此井制也詩亦有云惟禹甸之何云未暇乃復定其九貢沇之漆絲織文青之鹽絺海物惟錯岱畎絲枲鉛松怪石萊夷厭絲徐之色土羽畎夏翟泗濵浮磬繹陽孤桐淮夷之𤣥纎縞班珠及魚禹貢之匪三出于夷傳不之别𤣥纎縞三物古今訓纎物為細亦非揚荆三金齒革羽毛惟木揚之摇關筱蕩島夷卉服織貝橘櫾錫貢卉今之黄草具今之吉草代亦弗知說文班夏書從賔從虫宋𢎞云淮水出班珠珠之有聲者荆之杶幹栝栢厲底砮丹及􅙪簬楛𤣥纁璣組包軌菁茅茅生巴陵祥符東荆惟一老人識之豫之漆枲絺紵纎纊磬錯梁之熊羆狐猍璆鐡銀鏤砮磬雝之球琳琅干東海魚湏魚目南海魚革璣珠大貝西海骨幹脇北海魚石魚劒出瑱擊閭古貢必以用物如怪石微物亦適用然後貢魚石魚頭石魚刀魚劒魚兵如刀劒者與魚革脇皆以餙小東纒兵室羽葆者旄牛尾樂舞用非甚切故禹貢不著出瑱如凝膏浮水上擊閭如鮐大五六尺可治劒周書言閭似隃冠隃冠竒魚出揚州注射禮以閭為射器鄉射注以為獸謂似驢妄大都魚魚刀河蚖江蟬五湖元唐鉅野之芰鉅定之嬴治中膽諸孟諸九江大龜隆谷𤣥玉嵗咸㑹于尚方以俟其工之需上農捇土出金上工䃣石出玉各以土産任土作貢貢者夏賦之縂名别九州賦九等貢九等聖人敘之云任土作貢不云賦者九州之物惟貢入于王賦歸諸侯也任土者随土所出不以所無若所難得者也鄭志云凡所貢匪皆以税物随時價市之其地之所有以當邦賦盖圻外侯不以致逺故也龍子曰莫不善于貢然則貢非禹之法乎此禹之後世禹之時法已有助安有不善後乃知其有不善爾畿不貢榖米兵車是之取百里賦納縂二百里納銍三百里鞂服四百里粟五百里米邇重而逺輕凡五里為甸服甸佃也縂當是薪芻成束者銍是所刈至即納之戞服槀蒙之属如云寝衣之縂為槀穟銍所刈穟秸為槀非惟顛倒是内反輕矣冀不貢者以其入榖而入州地逺榖重難致故先王制為之貢此仁政也是則貢者在九等田賦之内以其多寡為賦之常非九等賦之外有貢也經文納銍而上特加一賦字則貢賦出于田可知矣侯服以下不及所輸物惟可見也甸外率五百而為侯綏要荒侯服之内采男諸侯𨽻焉卿大夫衆在六百里内男小國七百里内侯大國在千里内不言四百五百里皆侯也以大庇小故在外懼小陵大故在内綏服之内以揆文教以奮武衛此外諸侯綏之而已千三百里之内使揆文以教千五百内使􅁬武以衛武衛如今邊地右軍武畧文藝要服之内夷蔡屬焉荒服之内蠻流屬焉示其逺為之紀蠻夷三百里流蔡二百里此之里州長短與畿内侯甸殊夷蔡在要服蠻流在荒服夷性近人蠻逺人也古者流蔡以王圻定逺近今以逐處論異矣流共工蔡蔡叔此五宅三居之二視數嵗之豐約酌以為常上下足以相輔然後禮成而教行取之有制而其所以垂法也九州攸同九隩咸宅四海㑹同六府孔修庻土交正致重財賦咸則三壌成賦中邦九州二千四百三十萬八千二十四頃定賦九百一十萬八千二十四頃不墾者千五百萬有二千頃冀流廣而河濟盛水既退而民作多故作十有三載而後同十三載止為冀兖二州舊說天下共十三載或止以為兖州馬融康成頴達更以為併禹􅕐之九年舜攝元年九州始畢繆也按洪範􅕐殛死禹乃與􅕐䘮三年禹乃娶今云禹治三年八州平故堯以為功而禅舜是十二年八州平十三年而兖州平在舜受終之年頴逹因之誤矣髙唐隆云治洪水前後二十二載以􅕐之至禹言之也然水未平豈得行廵狩哉八年之外特記過門不入之年而已乃命豎􅀈歩經大章行緯暢於八極方以為國十國而有長長有師五長而一師師五十國州十有二師州有牧牧禀命于上京州十二師百二十長孔氏謂州十二師為三萬人非也豈州等三萬庸哉此不過所謂承以大夫師長者商周之連帥卒正也薛氏以為兵制或然􅆁成五服至于五千兵民之法皆自此始故有比卦漢八月按比是也伏生以入聲讀爾外迫四海咸建五長小比大卑承尊故入趍事而赴功小大之國内外之侯三正之所用者盖七千矣綏服内三千里九州舊說州十二師為六百國十二州為七千二百國詩箋謂禹弼成五服方萬里以七千里為九州方千里者四十九八州各得千里者六百國一師州十二師八州計九千六百國圻内以子男僃數為萬國之號康成謂夏縣内四百國然在王制又以縣内九十三國為夏制俱繆百國一師不出典記益難取信且禹之功在于平水土不在于拓疆境豈有土地三倍于二帝而傳無聞者無信可也淮南子云定千七百國亦妄盖因商家有千七百七十三國之說得齒千百五十五萬四千三千九百二十三男耕女織不奪其時釐改制量象物天地比䫫百則義之民而度之羣生故天亡伏隂地亡散陽水亡沈氣火亡灾燀神亡間行時亡逆數民亡濫心物亡害生率帝之功而度之儀軌近逺通其明以佑不逮東漸于海西被于流沙北逾碣石南越衡山咸暨聲教汔于四海浸而入之者漸加而覆之者被暨言及之逺汔言至之盡南亦海不言漸北亦沙不言被有不盡矣聲教及之而已治水定力堯舜世事著之此見禹所以得天下而謂之夏書也禹錫𤣥圭告厥成功夏后氏尚黒職由此始𤣥者水之徳圭者君之瑞嘗意治水之時從禹于外堯以是假之俾之便宜馭衆而不由中履介令功既畢則前之所假當以歸之君而告其成錫如納錫錫帝之錫而記皆以為天錫若堯錫之是錫亦非禹錫也封之髙宻以處于擽是為有夏曰夏伯宻今宻之髙宻禹之初封故世本云鯀生髙宻是為禹宋云禹之封國櫟今之許昌陽翟漢属潁川唐𨽻河南有禹山禹故城及鄭之櫟邑昔武王至周曰吾其為有夏之居乎遂營洛邑謂櫟也世紀云夏今陽翟即此地志云陽翟夏禹國或云都之非也故汲古文云聞不居陽翟寰宇記鄧州引漢志穎川南陽本夏禹國周為申國按志潁川陽翟夏禹國南陽故苑今南陽為申錯陽翟言之兩誤王充云堯以唐侯嗣位舜以虞地得逹禹由夏而起湯自商而興皆本興昌之地為號重本不忘始也或云封在虹虹今宿丘縣輿地志云堯封夏禹為伯邑于此即位徙都陽于翟漢為夏丘縣北齊為夏丘郡世紀又以髙宻為禹字益繆初􅕐以崇伯事帝連山易云鯀封于崇故國語言崇伯今在鄂東熈寜五年議廟事王安石以為禹非因􅕐受封故揚雄云禹以舜作土謂前代固有不待有國王天下者禹是也上曰􅕐治水或有封不可知安石曰据書傳封于有夏曰有夏曰有姒者禹也無豫于􅕐妄矣帝為洚水之患訪于四岳求能治之者四岳稱􅕐帝曰方命圯族岳曰舉哉試之不可乃已乃以命鯀鯀筮之於歸藏得其大明曰不吉有初亡後􅕐障水汨陳其五行水不閠下上帝震怒不畀洪範九疇彛倫攸斁􅕐障水故有鯀隄在相之安陽鯀築以捍孟門今謂三两城又歴髙東三十五又清河西三十自宗城界來而澶之臨河西十五􅕐隄自黎陽界入堯命鯀治水築之以障故無功又澶瀤清軍城東南五十有堯隄過飛狐界古長城即堯遭洪水命鯀築之者經云洪水滔天􅕐竊帝之息壌以闉洪水帝令祝融殺之羽淵淮南之說本此息壌生息之壌也有息壤說見餘篇逮帝授厯􅕐則殛死禹乃嗣興從而道之百川順流天乃錫以洪範九疇彛倫攸敘所謂洛書者也九疇即臯陶所陳者言鯀逆之所以凶禹順之所以吉帝怒不畀如云天誘其衷若鬼神予奪之者潤下者水之性而鯀垔之以拂其性此五行所以亂彛倫所以敗禹能修之得其性故五行攸敘自漢儒泥河圗洛書之說以天錫禹者其文自洛出禹因次之自初一曰六十五字皆龜背所負者或云三十八字或云二十七字怪哉事出于理之自然非人力私智所致者古人必重而歸之天洪範概發明彛倫敘非由數起帝崩舜為天子命為司徒代典百揆内輔虞位外行九伯百揆衆職之尊禹以功徳盛極岳薦乃授雖未禅而意己見蘇軾以為司空之異名盖以左氏使主后土揆百事與四岳薦語誤之不知熈帝載非司空之事而周官水土乃司徒職且禹為司空在舜攝初至是已六十載岳薦之語殆今如制首敘功勤爾或以為若魏晉之相國有禅之漸則除者無是三十有三載帝以教期劵劇時帝年九十三期如字受命以位堯将用舜以試之娶二女矣又歴試諸難舜禅禹不加試者六府三事之治已效也曰汝惟弗倦縂朕師遜于伯益臯陶不可則拜稽首固辭重弗獲命正月朔旦受命于神宗堯授舜告于祖舜授禹告于宗一云神宗堯也率百工如帝之朔如虞故事璿璣齊七政􅁼帝禋宗巡狩之類皆行之帝告禹曰予告汝九術五勝之常可以克之汝能從之師徒其興見河圗握矩紀乃治六師以征不序始嵗三驅以柬車徒三載有苗弗共奉辭誓伐三旬而苖逆命益賛于禹乃班師而苗格詳虞紀及帝鴻紀禹治水汔四海各迪有功苖獨頑不肯即功故禹勸帝念哉欲帝念其事備伐之三旬逆命乃賛帝修徳班師于此見禹于兵弛張之道一月已乆何八月而師還哉随巢子云昔三苗大亂天命禹于𤣥宫有神大面烏身降而輔之司禄益食而人不飢司金益富而國家寔司命益年而民不夭四方歸禹乃克三苗而神人不違墨子云三苗大亂天命殛之雨血三朝龍生于廣天哭于市金匱言三苗之時三月不見日論衡言三苖之亡五穀變種鬼哭于郊紀年墨子言龍生廣夏水雨血地圻及日夜出晝不見皆異說也于是四海之内咸戴帝舜禹駢三聖乃興九招命臯陶為夏龠足鼔龍簨􅙇八佾六列皮弁素積九成而功昭曰大夏使四海之内咸戴帝舜之功于是禹興九韶之樂致異物鳯凰來翔故孔融傳言禹興九韶之樂致異物淮南子云禹樂夏龠九成六佾六列六英九成九變也明堂位云皮弁積裼而舞大夏祭統云八佾以舞大夏天子之文舞也内則傳云在干戈既文武俱備春秋元命苞云禹之時民大樂其駢三聖相繼故名大夏大司樂注謂徳能大中國非也十有五載帝將陶真冷禹曰戒之哉形莫若縁徳莫若率縁則不離率則不勞不離不勞則不求文以待形不求文以待形固不待物欽哉慎乃有位敬修其可願四海困窮天禄永終惟口出好興戎朕言不再冷曉也言用此真教命大禹也夫堯命舜不戒而舜命禹丁寜戒之如此恐其矜功矣帝崩禹即真越春秋云堯崩禹服三年氣不屬聲舜崩又服三年朝夕旒位形體枯槁盖因孟氏之妄王以金成都陽城瓉云世本禹都陽城在大梁之南今陳留俊儀故寰宇記登封古郜城引地理志穎川陽城為禹都非也乃澤之陽城堯舜皆都河東北不居河南故說者又謂禹避商均于此皆非夫堯不聽舜譲受終二十八載舜不聽禹辭受命已十七年歴數已决豈復方為區區匹夫之遜避哉此孟氏之妄太原即晉陽世紀云禹自安邑徙晋陽漢志自平陽遷安邑後徙晋陽通典并州太原禹所都注云禹都或為今太原或為今平陽或為河東安邑或云今河南陽翟不一也安邑世紀云或居安邑今陕之夏縣魏太和元析安邑置以禹都名北十五有夏宫夏故城夏禹臺十道志云縣有夏禹宫夏静與洛下書云安邑禹舊宫有石殿隂户丹庭紫房俗名驪姫故房臺在縣西北十五十三州志云塗山氏思本國築以望之基猶在夏城南安邑塗山臺俗謂青臺上有禹祠縣東南五十五中條山有望川夏后避夏離宫之所地形志河北有北安邑縣漢晉属河東又有南安邑注太和十一置元和志今安邑地太和十一别置十八年為夏縣寰宇記置胱誤革正朔奠服色以日至六十日為正色尚黒樂稽躍嘉及元命苞云夏以十三月為正息卦受泰注云物之始其色黒以寅為朔商以十二月周以十一月所謂三統淮南云服尚青非其祀户祭先心社用松牲用黝大事斂用昏戎事乗雒驪雒為黒鬛尚明水而旂緌明堂位有虞氏之旂夏后氏之緌山罍揭豆琖斚四槤以施之宗廟孔氏夏四璉殷六瑚山罍夏后之尊也哀十一年瑚簋注夏曰瑚商曰簋虞祭尚陶夏尚匠盖虞以陶得人心故尚之周禮云夏后氏尚匠所謂反其所自生虞氏尚陶泰尊以瓦則山罍亦瓦矣𤣥堂世室九階三階厥用亡文𤣥堂夏之明堂夏尚黒也猶周尚赤而曰明堂說苑墨子曰古之無用文者禹是也土階三等衣裳細布當此之時黼黻無所用也黄圗義云明堂夏后益之為世室堂之大百四十有四尺坤之䇿屋圎徑三百一十六尺乾之䇿九階者周禮注南三東西北各二賈馬等以為九等非也禮傳周堂九尺商三尺夏一尺相三數也佑云禹卑宫室為一尺衣裳細布牟追𤣥冕記毋追夏后氏之道白虎通追大也其體最大輿服志夏毋追長七寸髙四寸廣五寸後廣二寸制如覆桮前髙廣後卑鋭商章甫即牟追今之委貎委以緌言追以笄言周禮言追笄是矣其制相比漆布為殻緇縫其上前廣四寸髙五寸後髙二寸五經通義云夏冕黒白赤組旒獨斷云明帝來尚書臯陶及周禮以定冕皆廣七寸長尺二寸緌白玉珠其端凡十二旒郊特牲言商冔夏收故夏收而祭三王共皮弁素積為弁不易也然堯黄收夏后因之爾雅云收言收歛髪純黒前小後大商因曰冔黒而微白前大後小衮衣而山􅀈環濟要畧云夏后氏山􅀈取其仁也立尸而卒祭有事則坐祭以其闇明日而復祚復祚繹祭商曰融盖貴爵而尚齒七十者皆引年養國老于東序養庻老于西序燕衣而以饗禮以教民之孝弟卒食燕衣𤣥端𤣥端注黒衣裳襲堯爵行堯道脩五等以賞諸侯舜之禅集五瑞禹政由舊列爵為五自唐至周五等一也鄭釋王制謂商殷夏三等無子男追􅕐父國語禹云豈伊多寵也云三王之後注禹郊􅕐而追王之褅黄帝而封丹朱唐商均之子于虞作賔王家天子弗臣謂不以臣禮責君臣之義固定故云作賔者異于諸臣矣而議者或異亦闇于大義哉立三公九卿百二十官三公此在九卿外佑云三公以下百二十此夏時也記云官倍則宜二百四十不然者唐虞清要三代不變其餘稱事為之爾三妃九嬪以為内治春秋說天子娶十二佑云夏時制三嵗而攷績五嵗而定政惡㫖酒好善言好予而不取好縁而惡駔亦上信而賤文必度其正為政先禄而後威先賞而後罰故能敬徳面稽天若召誥言面攷天心而順之承安繼治任賢使能充云禹引失承安繼治任賢使能共已無為而天下治繕賞不罰而民不負言慎子云有虞氏不賞不罰夏后賞而不罰商罰而不賞周賞且罰亡廢功亡蔽財自眡觔如淮南王術愉易平静以待之使夫自得之因然而然之使夫自寜之不求葡不大望于民是故剴精神明耳目龥俊尊帝以故黒風㑹紀而明明在朝詩舎神霧云大禹之興黒風㑹紀注黒力墨風風后皆黄帝臣禹伯禹當其至也勞身以治天下迪知恂于九徳之行故民承寛厚而亡懐薄立三年而百姓以遂焉勤求賢士以及方外見山仰之見谷俯之以䓒道秉徳之士存焉董子適于郊芴焉遇其縳于路謖降拊而泣之左右曰彼則不刑于王何痛焉曰天下有道民不離幸天下亡道罪及善人堯舜之民以堯舜為心朕為民辟百姓各以其心是用矜之吳越春秋云計于蒼梧而見縳人陳蕃傳云禹廵蒼梧見市殺人下車而哭曰萬方有罪在予一人故其興也勃然淳化四年閏十月上謂輔臣曰孟昶于刑獄優㳺不斷以為夏禹泣辜竊效之不明古聖之㫖朕深味其理盖大禹止能行王道自悲不及堯舜致人死法所以下車而哭之今犯罪之人情理難恕朕固不容可謂異世而同仁矣立諫幡陣建皷太公金匱云禹居人上慄慄如不滿日乃立建鼓管子云舜有告善之旌而主不蔽禹立建鼔于朝而備辭訟何敞傳云禹致敢諫之幡故光武詔云舜居人上兢兢如履薄氷禹居人上慄慄如不滿日敬勝怠則吉義勝欲則昌日謹一日夀終無殃也不矜不伐不自滿假投一饋而七起一沭而三捉髪曰予惟四海之士須于門而四方之民弗至也諸侯朝覲而親報之士月見而躬接之曰諸侯能亡以予為驕乎諸大夫能亡以予為汰乎其驕若汰而不予榖是逢君之惡而教寡人之殘也是以天下大治諸侯萬人而一知其體則能以愿為之也故未施于民而民敬之賈誼新書云禹猶大恐諸侯朝則問于諸侯云云朔日士見則問于士云云敬者禮之本禮者忠信之薄老氏言道其中有信有虞時大道未隱故未施信而民信之夏后時道隱而未䘮故未施敬而民敬之此哀公所以問新書作民信之誤命伯封叔及昭明作衍歴嵗紀甲寅鈐天行施敬授人時人事是重故建首寅而後冬夏正春斤不升山夏罟不趣淵以宛生長而專民力乃布令曰九月除道十月成梁故其時儆曰收而場功偫乃畚梮營室之中土工其始火之初見其于司里速畦堘之就而執成男女之功故生不失宜而物不失性人不失事天得時而萬財成焉昔孔子觀夏道得其四時之書者是矣歴象堯舜之法三代以來未始可廢而書不著者法已成于堯舜後王守而用之故不之復錄大聚云禹之禁春三月山林不登斧斤以成草木之長夏三月川澤不入網罟以成魚鱉之長禮云夏不田以生長之時也鄭謂夏禹以仁讓得天下觸其夏名故不田此運斗樞之文謂土少則民失業土多則内亡守于是有不稱之災故其箴曰中不容利民乃外次又曰小人亡兼年之食遇天饑妻子非其有也大夫亡兼年之食遇天饑臣妾輿馬非其有也國亡兼年之食遇天饑百姓非其有也故諸橫生盡以養從生盡以養一人不殺胎不夭奥不隳時十年而王道固乃立祈祥以固山澤立器械以使四國破増藪楚沛澤以立三幣而撡其重䇿以守國榖存􅀢丘立駢守以為民饒以人御人逃戈刄而髙仁義乗天固以安已而民心一政徳既成而聽于人矇誦于朝史箴于位官獻使勿兠采臚言于市攷百事于廷耆艾脩之以聞其缺而斟酌之行善而備敗是以事行而不悖天下復璞文中子舜禹繼軌而天下璞桀承之而天下詐有君民之大徳有事君之小心禮記是以神勞五岳形瘦九州而不以為苦攝位行政攷之于天是以克勤于家克儉于邦而盡敬于神故孔子曰禹吾無間然矣菲飲食而致孝鬼神惡衣服而致美黻冕卑宫室而垂意溝洫禹吾無間然矣諸侯王表云舜禹受禅積徳累仁功洽于百姓攝位行政攷之于天下數十年然後在位越在先時閼伯火正實事唐虞及是更以相土居之商虚入為王官出長諸侯有勤于民以食于味裏云相土就契封商妄命任奚為車正文子堯以奚仲為工師淮南子堯治天下以后稷為大匠任奚為工子吉光暨相土佐之昇物以時五財皆良乃剙鉤車記云鈎車夏后氏之路作勾輅同今戎車也商曰寅車周曰元戎元良也儒者因謂典興傳𤣥子云夏后輦曰余車故通典云夏末代制輦人所輦晉志商曰胡奴周曰輜車司馬法夏后余車二十人輦商胡奴十八人周輜輦十五人建綏斾明堂位夏后之綏綏最短亦曰旐又云有虞之綏夏后氏之綢練檀弓亦云綢設旐夏記旐謂之綏也曲禮武車綏旌注綏無旄所謂大麾周禮王建斗尾于袵首大麾以田者也相土始乗肇用六馬于是登降有數五子歌言六馬天子用六乆矣記言禹駕四妄乃封奚仲于薛今徐之薛城南二十五有奚公山奚仲冡楊􅁮徐州記云仲造車處謂政衰于唐虞而民于昔始政肉刑梁武祠堂畫賛云夏禹退為肉刑應氏云三皇結繩五帝畫像三王肉刑非也肉刑蚩尤之法穆王曰苖民作五虐之刑爰始滛為劓刖掾黥亦未原其始也嗟夫肉刑政之本也後世以為不忍而去之者誠不仁矣君子曰小仁者大仁之賊也以肉刑為當除是亦志于仁而未知仁之術也故荀卿班固曺操鍾繇陸紀諸葛曺彦之徒皆欲復之而祖訥以漢文為非聖誠有見矣彼孔融王朗之論亦已淺哉論見國名記謀面用丕訓徳則乃宅人乃三宅亡義之民大罪宥之四裔次九州外次中國之外罪疑從輕死者千鐉中罪五百下鐉二百罰有罪而民不輕罰輕而貧者不致于散故不殺不刑罰弗及彊而天下治大傳甫刑傳云禹之君民也罰弗及強而天下治一鐉六两鄭云所出金鐡也死罪出三百七十五斤用財少爾命孟涂為理刑正訟從以為神主經云夏后啓之臣孟涂是司神于邑巴人訟于孟涂之所其衣有血者軌之是為主乃備祭用簠簋嶡爼雞彛龍勺賀云直有脚曰梡脚中央横木曰嶡有虞上質未有􅀈飾始有四足夏漸文横木為矩于足中也雕勒粉澤流髹其上蔣席袡鞇頗縁觴酌有采籩豆有踐而當時之不内者三十有三國韓子云禹作食器墨染其外朱畫其内縵帛為䄄蒋席頗縁觴酌有采尊爼有飾康成云赤多黑少為髹韋云刷漆為髹墨子云禹造粉繆也唐虞已有粉未矣為䘮灋曰死于陵者葬于陵死于澤者葬于澤桐棺三寸制䘮三日亡得而逾見尸子淮南子云禹之時天下大水死陵者㘸陵死澤者葬澤節財也故節財薄葬簡服生焉又云以洪水之患陂塘之事故朝死暮葬所以因時偶變見形施宜也祝餘鬻以生事親祝徹鬻餘飯飯九具作葦茭通典夏后氏金行初作葦茭言氣所交也商人水徳以螺首謹閉塞也周木徳以桃為梗風俗通萑葦有叢吕春秋言湯祓伊尹以萑葦欲子孫蕃不失類也而牆置翣綢練設旐立凶門用明器有金革則殯而致事而人于死者益以致王肅要記云魯哀公葬其父孔子問曰設表門乎公曰夫表門起于禹禹治洪水故表其門以紀其功吾父無功何用焉孔琳之議曰凶門杓装不起自末代冝罷故禮論云改葬立凶門不蔡謨曰改葬若停䘮有凶門是惟䘮事用之故韋𢎞與蔡謨牋問父在母䘮及與父别止立凶門不曰禮命士以上父子異宫故卑私之䘮皆别凶門范堅答問謂凶門薄帳不出禮文有懸重于庭以席覆之形似于此後世于門外表䘮由是命扶登氏為承夏之樂歌九敘以樂其成是謂九夏六府三事所謂九功九功惟敘九敘惟歌此禹之九夏也鐘師以鐘鼓奏九夏即大夏也大宗伯奏九徳之歌九韶之舞瞽師掌九徳之歌以娛太師故左氏曰九功之徳皆可歌也謂之九歌猶言舜之韶謂之九韶爾烝民以王者為君九夏以王夏為首豈偶然設五器于庭一作門而詔于􅙇曰有以道憲我者聲鼔以義告我者鳴鐘以事詔者振鐸以憂聞者發磬以獄復者揮鞀政天下于五聲後世寳用至于追蠡鬻子禹治天下以五聲聴治門懸鐘鼓磬鐸而置鞀以得四海之士為銘于筍􅙇云云淮南汎論注五聲宫商之属妄矣作棧鐘于㑹稽以定奏王澄云夏商之政九州貢金以定奏晉世剡縣民于田得鐘長七寸口徑四寸銘曰棧小案爾雅鐘之小者棧音盞逺方圗物貢金九牧鑄九鼎于紫金條荆之山鼎之為物左氏嘗言之人得藉口舊云九鼎者所謂九州鼎寔則一鼎又别有九鼎圗九州之方物也使人知神姦入川澤而不逢不若魑魅罔閬莫能逢之鼎成而太白見者九日瑞圗云金銅之精知吉凶存亡不㸑自沸不汲自盈不舉自藏不遷自行日移五步自郏鄏來日東南移今不知所孫暢之述書云道人商行傳云今在剡賔神怪之說然今深山大澤徃徃有之晉陽秋咸康囬榖城門外有光取得九鼎一湘潭縣興唐寺在磯上泉流莫測石嵌旁入及法堂下有大鼎南遷錄以為禹迹帝女儀翟醖醸稷麥以為酒醴醪變五味進之帝飲而甘之折額而嘆後世必有以酒亡國者遂䟽儀翟戰國䇿云魯君語梁王昔帝女令儀狄作酒而美進之禹飲甘之䟽儀狄絶㫖酒或云初作酒非虞酒養老而岐雷有醪醴黄帝内傳王母之酒而神農為醴酪其來尚矣本草夏禹仙經取昌蒲𤣥酒封百日緑葉色投黍米十四日出飲之去三十六種風不自後世于是舉臯陶而薦之將畀之政辭乃封之六其仲子克世使襲六奉其祀文王之使編云編之太祖疇為禹占得臯陶繇比于此見六韜宅立一十有五嵗七表承風化制殊類青縈九陽竒怪之所際莫不内拱八風循通而百榖用成木榮冬敷天雨稻蜚莵應瑞圗云蜚莵日行三萬里禹治水土勤勞歴年天應其徳而至駃蹄者后土之獸自能語言王者仁孝于民則出禹治水有功而來騊駼出即駃蹄見孫氏瑞應圗方澤出馬随巢子禹方興時靈龜穴庭宋書志𤣥龜者天符也徳至淵泉洛出龜書𤣥龍御雲孔演圗云天命之見候期門靈龜穴庭𤣥龍御雲注靈龜虗虎也穴庭者星入太微故孔子曰巍巍乎舜禹之有天下也而不與焉于是大宣教化省方宣教化制殊類𤣥云五年一巡者虞夏之制虞五載一巡狩夏后因之歸元勲祠上帝河圗云禹治水功大天帝以贅文火字賜禹佩免北海溺水之難故方朔十州記云禹治洪畢乗蹻度弱東至鐘山祠上帝于北阿歸功九天乃大計治道外美州靡息慎之功内演龍徳以當天心撰𤣥要集天書道學傳云夏禹撰真靈之𤣥要集天官之寳書以南和繪封以金英涵檢以元都印原禹之先得𤣥女之法標其二五九跡之術承舜命鑿龍門開九江遇巨石則施之一鳴其術石立銷金呼禹步修神仙之術開鑿洞天盡立五岳名山形撰靈寳文以藏南浮之洞即宛委衡山也詳于福地記禹功記云渡江河者以朱書禹字佩之免風濤保安吉遂致羣臣于鍾山即會稽前山一曰揀山越絶書云揀猶鎮也中茅傳云禹詣鍾山行九真此也亦曰茅山晉灼言㑹稽茅山是矣故越絶書越春秋皆言禹登茅山朝羣臣乃更名曰㑹稽即苖山矣今㑹稽有禹村禹虚然九江當塗界當塗故城云禹㑹處故塗山亦有會稽之名宋之問云朝王泉兮何地聲存而處亡杜預以為㑹在夀春之塗妄矣以觀其用執玉帛且萬數執玉諸侯帛者小國之君禹之初進而受命者七千國左云萬國者號数爾齊王斶云大禹之時諸侯萬國非安石云不遇東方諸侯有天下皆㑹非也防風氏後至戮之以徇于諸侯伐屈驁攻曺魏而萬國定舜之初正四罪末年分三苖禹初治水誅相繇至是四十年戳一防風天下可大治盖始之刑以立我之綱後之誅以立後世之紀後代聖王不可不知也初來南塗山之女作歌以候其伯姬曰候人兮猗而南言自此始至周之君臣取風焉寔為周南召南正始之道王化之基也南樂名胥鼓南以雅以南若象箾南籥是也豈得謂之風有樂有舞故曰人而不為周南召南其猶正牆面而立也未至于舞大夏知不特誦其詩而已周南天子之事故繫之周周王室也召南諸侯之事故繫之召召諸侯之伯也豈周公召公哉周自太王爰及姜女王季太任思媚周姜太姒嗣徽音世有賢妃之助文王刑于寡妻以御于家邦故詩以后妃夫人之徳為二南之首寔取效于塗山自塗山南省南南今之江陵秦昭㐮二十九年使白起抜鄢郢以漢南置南郡周書云南國名是也非南方舟濟于江黃龍負舟人甚恐帝清議亡易龍顧弭鱗而逝事見吕春秋淮南子水經地記等誠有兹事矣說詳餘論中乃巡大越見耆老納詩書審銓衡平斗斛立典則以貽子孫見越絶書禹救水至大越上茅山大㑹計及其王乃狩大越云云所謂關石和鈞者焚戈甲而夷人附崔融四鎮議神農修徳而夙沙至夏禹焚戈甲而夷人附舜舞干戚而苖民舉追思覆鬴之書復㑹諸侯于江南盖九江浙江今所在古迹如杭之餘杭即秦故謙之之吳興記始皇二十七年上㑹稽塗山此因立縣杭即航也史記亦明圗經不之知然郡國志以為夏禹東行舍舟航登陸于此盖乗海舎航皆在是董遒不知以為杭州當用所部属潁川音抗作刀劍刀劍錄云髙宻在位十年以庚戌八月鑄一劍藏之秦望山腹上面刻二十八宿比記山水日月伐靡山而邑之塗山之㑹禹志也非常之㑹傳謂禹望九山之南苑宛中者則意在此乆矣故特為是㑹尋崩因葬之只即㑹稽山詳予福地說天問何勤予屠毋而死分竟地補注云折副而産有之死分竟地未必然竟地猶言竟天今叚成式言從分竞地用此語絞衾堲周葛以繃之其坎深不邸水上不通臭收壌為墳廣終畆木不改列畬不易畆世紀云衣衾三領桐棺三寸墨子云桐棺三寸絞衾三通其言大率如墨之儉本于大禹之致孝鬼神美黻冕故荘周曰禹堙洪水親􅋵裳耜沐甚雨櫛疾風置萬國禹大聖也而形勞天下如此後世墨者多以裘褐為衣履蹻為服日夜不休以自為極曰不如此非禹道也不足為墨年百有六實祀于社淮南子禹勞天下而死為社漢興立官仕復立官稷以禹配社以稷配稷亦謂白帝王符五徳云少昊其後白帝見流星意感生白帝文命后趫生啓及均塗山于是獨明教訓而致其化乃立庻子之官嗟乎天下之命懸太子若塗山可謂知所本矣趫世本世紀廣雍列女傳皆作嬌帝係作文憍属本紀云禹母坼疈生禹後于塗山娶妻生子名啓于塗山有禹廟亦為其母立廟寰宇記塗山在渝州巴縣東南八里冺江南岸華陽國志以娶塗山為江州塗山皆非后趫死塟陽城倦㳺錄三門禹廟神儀侍衞極嚴肅後殿為一胡人氊冠夷服侍衞皆胡人云禹婦翁俗有此均生固固生伎來伎來生循鞈是殺綽大帝念之大荒經固作國伎或作役其裔居兠牟山北人號突厥寳匃奴别種代居金山城状如兠鍪兠鍪俗呼突厥因號之先狼種也故施金狼頭于纛衞上曰附離夏言狼也歴魏晉十代而属蠕蠕是為阿史那徳那最為長宇文末滅蠕蠕百餘年暨處羅蘇尼先始歸北號阿史那至開元為史氏帝之支子或封于辛辛甲事紂七十五諫不從文王以為史封之長子見劉向别錄昭王南征辛繇靡為御右拯王而俱溺封其子西翟有辛氏計氏司空氏宇文氏周賜辛弁普屯氏魏賜辛威随皆復崇後滅于周文王有崇危虎崇危帝崩而啓立賛曰相彼夏后天地功深纂脩前緒載惜分隂斬髙喬下纚風沐雨身解揚口為百神主克勤克儉菲食惡衣奏􅀈艱鮮手足胼胝捉髪投饋為綱為紀河洛興思明徳逺矣天下公器不可得而私也主之必有道而處之也必有義主之不以其道則亂處之不合于義則争是故君天下為甚易而授天下為甚難丹朱商均不足以託天下而舜禹者可以託天下于從而授之時無舜禹之有可傳而啓可傳則從而授之啓是聖人之意矣戰國之士不知乎此乃謂禹不勝其私而傳子知啓之不足以任天下而私意勝陽以天下授益而盡以啓人為吏禹崩啓連黨而攻益取之此鹿毛夀等為蘇代設辭以喻子噲使巽之子之者韓子外傳亦有此說故子車曰禹崩益避啓于箕隂而益佐帝之日淺澤未洽于天下天下之人不歸益而歸啓矣益暨禹同事唐虞而同功于水佐帝之日不為淺矣功施于人者不為不乆矣且啓之徳固無以尚于益而謂天下不歸益而歸啓其然乎符子云禹遜天下于竒子竒子曰君之佐舜勞矣鑿山川通河濟首無髪股無毛故舜也以勞報子我生而逸不能為子之勞矣乃從去之而墨子云禹舉益于隂方之中授之以政而九州成夫益雖壽年亦有禹死矣無從避啓辨見發揮六經之存聖人固不以纎芥疑後世也堯受終舜受命一于文祖一于神宗而禹之末無是舉也堯曰汝陟帝舜曰汝陟后而益之初無是語也禹之傳盖天下之不復昔也王充問孔云書言無若丹朱傲惟慢㳺是好故帝舜勑禹無與不肖子也舜重天命恐禹私其子故引丹朱以刺戒之禹曰予娶若時辛壬癸甲啓􅈱􅈱而泣予弗子此陳己行之事以推來見己之不私不肖子也夫若是則舜逆禹之将傳子故諗之而禹之卒傳子也有是哉毋若丹朱乃禹之誥誡舜語始堯為世使民心親民有為其親殺其殺而民不非也舜之為世使民心競故子生三月而言不至于孩而時誰而人始天也及禹治天下使人心變人有心而兵有順殺盗非殺而人自為釋矣盖三聖之季功美漸去而其世且然爾禹初嘗以天下巺於竒子伯益竒子伯益辭焉而死矣啓可傳而傳之顧可以私召亂名啓争哉子不可傳乃蔽於親愛之私而必傳子可傳或貪於巽禅之名而不傳均非天下之公行也方帝之授禹也柏成子臯擿語禹曰堯舜之治天下舉天下傳它人至無欲也擇賢而與之其位至公也以至公至無欲之行示天下是以不賞而勸不罰而畏今君賞罰而民欲且多百姓知之徳自此衰貪争之端自此始矣然則啓之傳禹顧任其私哉承百代之流而㑹其變不得而不然也子可傳而傳不失于公人不可傳而必傳不免於私聖人者知可不可傳而已何計夫私若公與子之有天下末之思爾子孫雖不肖猶以必傳為有後且人心天命既已俱去而且展轉惴息而不肯瞑茍不以祸敗奪則不止顧不謂大哀乎孔子曰巍巍乎舜禹之有天下而不與焉匹夫而有天下真可謂大異事矣然以道觀之舜自舜禹自禹天下自天下果何與天與賢則與賢天與子則與子吾固因天而已與賢與子子車顧知之矣避啓之言殆為辯士設也路史卷二十二

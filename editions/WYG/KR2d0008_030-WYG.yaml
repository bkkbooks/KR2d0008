時豈得尾大患哉成康諸侯而强平桓諸侯而弱果侯罪耶吳楚齊晉固曰强大然猶迭主夏盟崇奨夹輔而不抵於速亾及漢之興急於矯枉不思經久之計於是大封同姓周匝三垂而天子之所有纔十五郡列侯公主頗食其中故韓黥彭豨相繼叛逆蓋其始者既不善矣及夫主偃䇿行而諸侯已亾政有茅土者特亦不過食租税是以哀成之際宗室弱極而新莽得以髙歩雍容坐移鼎祚故予嘗謂周得之始而不制於終漢則首尾兩皆失之若光武者雖亾侯王彊大之禍而本枝之緩終以少固此董卓之徒之所以得肆行亾忌而漢遂亾也然則劉昭致論謂聖帝英君欲返斯敗必當更開同姓之國置不増之約然後可以還墜路而反全安之轍信非讕説異姓侯光武一百七十四明帝二十七章帝二十一和帝二十七安帝五十一順帝三十二冲帝三桓帝四十五靈帝四十七右見熊方表按光武十三年三月功臣増邑更封三百六十有五其外戚恩澤封者四十五不得盡見矣續志明章至順凡郡國一百五為十三郡光武併省郡國十凡縣道侯國四百餘為十三州理至於末加置郡國一百五凡縣道侯千一百八十方桓帝時封賞逾制内寵猥盛於是陳蕃亢䟽謂古諸侯上象四七所以藩屏上國也髙祖之約非有功不侯而近習以非義授邑左右以亾功傳賞一門之内侯至數人是以緯象失度隂陽繆序則封賞之失當其禍乃如此也迨獻帝時政歸曹氏然猶名在漢室所封之侯於􅋫書夀志可見者百五十有一名存實亡兹用不録䟦天下之事欲其成也嘗費辭而其壊也一言而已事固不可以言句索也固有言之甚美而妎於理者小人之言未嘗不美於君子之言也未嘗不宜聽於君子之言也然而妎於理也将欲取之必固予之斯言信美矣然未小信而天下服其禍不㡬乎一言而䘮邦乎是以聖明達識之主必廣受謀謨而嘗索其利妎於言句之外盖智以言昏而事因説惑也久矣封建之事有國之大利三皇五帝之所以法上象而為天下後世立簡易可久之法者也秦漢而下惟憂不得行之一有行之而以一言廢之固将不勝也栁子之論吾固不患焉屬者披蘇文忠海外之篇有曰聖人不能為時亦不失時三代非不欲罷侯置守而亾罪不可削也始皇立守宰若冬裘而夏葛此不失時也是固栁子之説也又曰自書契以來臣弑君子弑父無不出於襲封而争位者至漢而來君臣父子相賊弑者皆諸侯王子孫其卿大夫不世襲者未嘗有也讀之至此駴然寒而復汗曰東坡先生而為是説也牢其可摇乎封建之論其閣矣因竊稽之禽獸奸義蓋皆出於衰周之世而諸侯之罹故者一皆有亾道之資其争襲者蓋無㡬也傳可攷焉漢諸王國七十有二其世百八十有六以罪除者二十七以法死者二十二如上所説者亾有焉諸王子侯為國二百八十有五其世七百八十有二其王者十有八以罪除者百四十六以誅盡者三十二而惟二死於奴如上所説者亾有焉髙帝功臣之國百四十有三恵帝之世又倍於此者百國凡世九百七十有七以罪除者二百一十有一不令終者百二十有八而惟二死於賊其餘皆以武帝淫刑自盡或誅殺若棄狗者而如上所説者亾有焉元成而下王子之國隨啟隨滅莽簒而絶者百八十有一國而如上所説者尤亾矣東漢之侯可見者六百餘世其國除者纔二十數其誅其賊死若其建安之死者蓋八十而惟一死於奴如上所説者尤亾矣先生之言豈非過論乎故君子言不可以若是其㡬也今夫世禄之家不無此禍余嘗聞之矣特事不聲於吏名不上於大夫有不得而云爾是豈繇於世襲乎藉令實爾而其制利於君便於民而恵於後猶當右顧而行矧無是耶而曰李斯之言栁宗元之論當為萬世法泌是以為之解壬辰八朔書路史卷三十

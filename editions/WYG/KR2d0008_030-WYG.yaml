body:
  text: 路史卷三十宋羅泌撰國名紀雜國上貫􅀈也貫鼎貫所重齊宋盟處預云䝉縣西北有貫城水經注俗曰薄城按定陶有貫城今在濟隂名䝉澤城即古貫國有貫氏國事齊有貫珠鄵盟㑹圖䟽云鄵侯國在慈州鄭伯卒處襄七鄭地杜闕音躁集音􅆖非炎兩制擬封皆用古國有炎見金坡遺事桑秦昭襄二年桑君為亂誅藍梁恵王三年秦子向命為藍君紀年今之藍田襄今襄陽古襄國黄帝時襄城小童者代為重鎮非襄邑在汴乃春秋襄牛地棘陽翟有上棘城虢燕地與齊境昭七年沙魏之黎陽有牽城是相臺志云古沙侯國一音𤨏今元城西南有沙亭𤨏䣔也開封宛陵西北有𤨏侯亭記河南䣔亭也一云𤨏澤成十二鄭地與璅異昭五楚地有𤨏氏奚傳有𤨏髙唐書厥班志云無塩東平陸古厥國玉篇㵐國名後月切隨之唐城魏為㵐西志一作厥孔子所宰今鄆之中都有厥亭有厥氏棣伯也為棣氏鄭城棣酸棗西南有𨽻城非𨽻州又有南𨽻城北𨽻城寰宇記陽武縣北十里曠鄺是字書鄺古國有鄺氏音荒又有荒氏見姓苑鄺廬江人千姓編臨淮人湛河陽軹有湛水傍有湛城襄十六年有湛阪以為襄城之昆陽北有湛水後有湛氏隄玉篇國名諧眼切􅀈玉篇國名阻生切䣅國名見玉篇䣅古國宛丘西南四十有䣅亭是宣十一辰陵杜云長平東南有屈亭陳州地後有䣅氏姓苑鄙古國後有鄙氏亦見左傳鄚莫也鄚州文安郡漢河間鄭縣開元十三改州有鄚故城在鄚縣東北三里郱子顒三郡記云顓頊造者景雲二鄚始去邑有莫氏河南莫氏出代北姓書云出莫敖非郠景王十三年魯伐莒取郠在琅邪梗音然晉自有梗陽璠云晉陽西南十榆次界入陽臨趙稷奔臨弦陁隳之晉邑有臨氏姓書大臨後非牆廧也昭二十三有廧人直人周地眭竺故國今沛之竹梧故國本鄭地襄十晉取之漢陽成延為梧侯者今彭城騏古國漢有騏侯國在河東衛預云奉髙西北有衛亭昭八年商衛者閺陕之閿鄉有閺亭今汝南西平安一作䢿當陽里也或云即六安國非維東莱之邑晏嬰莱夷維人漢為夷安今髙宻安夷城有維水今作濰延郔鄭地與楚郔二宣十二楚伐鄭師次于郔貞􅬬也貞氏宜出此著在濟南與晉著二襄二十二盻楚世家云盻子必用矣亦見國事郫晉地盾殺公子樂處有郫氏䣚力朱切南陽穰有䣚鄉賈鄮也今明之鄮縣有賈氏􅀈氏𨽻為貿鄳漢鄧邯為鄳侯即此茌泰山茌縣即地志東郡茌平也有茌氏杜疑切蒍東周大夫子因食邑蒍謂之蒍因斯後有斯氏麥麥丘也昔麥丘人年八十三祝齊桓公公封之麥丘漢有麥侯即此有麥氏麥丘氏尸召伯逆王于尸周邑也在鞏西南故偃師之尸鄉即尸氏齊桓尸臣晉有尸侯為商君師著尸子靳楚地靳尚先封毗魯邑哀五年城毗者菑䣎也漢濟南郡隨為淄州鹹文十一澶之濮陽西南有鹹城杜云濮陽東僖十三續志云古鹹國也苗晉地今垣縣軹闗南逕苗亭西亭本周之苗邑賁皇采均均國近庸盖州均也池後有池氏池仲魚眭後有眭氏漢眭孟許遜師眭子烈郕隰郕之郕今懐之武渉稅蜀王以稅氏五十遺廪君者盛荆州記云建平信陵今有稅氏良二幽之良鄉漢之良縣又鄆之夀張宋之良邑漢初之夀良今下邳北六十古良城晉吳㑹處宋地淯育也今之洵陽育淯故城漢育陽縣在育水之陽應云育水出𢎞農後入加水蘓秦云韓東有穰淯者今鄧之南陽亦漢育陽也有夀為淯州唐為縣有育氏集一作毓鄨鄨令國蜀王相本用鄨故牂柯鄨縣有鄨水娻見王篇云國名徳紅切韻無地理志東郡有舘宜是集並收東鄲在沛十三州志音多漢周應為鄲侯者佑云亳之鹿邑漢鄲也郥即郥氏定十三齊衛境􅀢葭也諸樊入郥取楚夫人昭二十二預云鉅野西有郥氏亭巨野今濟治若郥陽封人則蔡邑也昭十九有貝氏韻譜古賢貝獨坐今吳越多此姓右雜國上朱兒豐匽貞㑹云員婁童費古或從人以為侏倪僼偃偵儈伝傊僂僮􅀈亦猶優傿侁伾偊偝􅰊佶侏傽􅔸傗之類本不從邑其為鄾鄢䢾邳鄅鄁鄒郆邾鄣􅀈鄐者凡出後世邰􅀈郇邵䢼􅀈鄩鄎邗郜郕邴􅀈􅅠邡􅀈郲鄛邼郙郙鄃鄸鄹䣤􅀈郲䢿郥鄍鄚邻䣆鄡䣝郔鄤􅀈􅀈鄣􅌏古則單作邑管蔡魯衛晉楚秦齊騶驛駘雝毛韓絺紀梁蔣樊祭滕莒窮穰崔汲熊張詹祈薛謝州較燕宻何嘗必從邑耶即如國名姓氏􅟠嫣姺㚰妘㜏􅯭姑媰㜢􅀈㜅毎亦從女葢取生生繁衍祝爾以故親名女字姣嬥妖妙嫖姚婹􅀈嬋姢嫽嬈嫸㜣奵􅀈嬛嬗􅀈娩亦皆從人聖人之意惟可得矣郮郃酀郘􅀈䣐􅀈􅀈􅧬􅀈䣁􅀈郲䣇􅀈􅀈􅀈邒郂􅀈􅀈郁􅀈何等俗繆而顧不能削邪故必知其要而後天下之偽可息余顧漫勞心哉雜國下徴徴北徴廣韻􅀈古國漢徴縣属馮翊今同之澄城西南二十二故徴城地志馮翊徴韋音懲秦反晉北徴者文十八故元魏曰澄城牽衛地魏之四黄西南三十故牽城樵云十二里杜云在黎陽東北定十四年牽脾上梁之間者弁一作􅌏吕氏攷古圖有􅌏敦銘云王格于宣榭呼太史策命􅌏宣榭宣王之廟有􅌏氏劉曜太史弁廣明盍盍公先國王驩為大夫齊地在沂水西八十陳仲子兄戴盍注盖齊邑王信為盍侯即此音蛤景帝封后兄􅥇也記並作蓋􅀈乃音冠蓋蓋去聲盍入聲玉篇􅀈音閤􅥇丘蓋切集並音閤俱非陘三文十六年傳集云陘國名預云潁川召陵南陘亭今許之郾城又晋有陘庭翼南鄙邑今曲沃西北有陘古城又定有涇邑隰師叔曰合而後進先君所以服隰陘者二國近楚郪二梓之郪縣南八里臨江有郪王城址漢初郪縣寰宇故郪王城在飛烏縣北三十五里然潁自有郪有郪丘城魏安釐十一年秦㧞郪丘九域志云即此云齊地非劇遽也漢為遽侯國有遽鄉在常山邲管城東六里有邲故城韓厥敗此宣十二鄭地圁圁陽縣在西河音銀黨黨氏也莊二十四築臺臨黨氏說文䣊地袲宋地預在沛國相縣西南未詳宜即那楚有那處預云南郡沛縣東南那國南郡今江陵蟲邾地昭十九年後有蟲氏牢姓書古牢子國後有牢氏圉圉侯為衛邑成二十六今雝丘南五十有圉城杜闕鄭伯勞韓宣子于圉者昭五楚有圉陽圉公邑昭二十四而周地有東西圉東圉乃洛陽東南圉鄉西圉未證昭二十三薛淄州南四十謂之大薛非滕南之薛頯黄預云頯黄氏吳地見哀十六年􅈢駱魯地今徐之滕縣本𨽻邾侯麗晉人濟涇及侯麗秦地秣陽姓書云秣陽國後有秣氏末氏髙梁春秋髙梁之虚僖九又郡國志今臨汾東北三十有故城河北圖云三十七里有髙梁亭髙梁堰春秋屬晉杜云平陽楊縣西南有髙梁城楊縣今洪洞髙黎東陽有故髙黎城俗呼髙黎郭摯疇風俗通云古之諸侯後有摯疇氏摯氏疇氏或即任姓之摯以國為氏宻商楚邑有宻商氏或云宻商本鄀邑水經南陽丹水西南宻陽鄉亦謂之二户今在鄧之穰平都簡子立今遼之平城開皇于此城立縣烏程烏程氏國秦為縣今𨽻湖郡國志云古烏程氏善醖赤烏穆傳有赤烏氏在泰山西留昆穆傳留昆氏歸玉紀年云國名陵澤音俊致賂于王即陵子夀胡也郭云隗姓國石窌齊之長清地名預云濟北盧縣東濁繇穆傳四濁繇氏食滔水􅜑韓穆傳二􅜑韓氏有樂野剖閭穆傳剖閭氏音倚閼胡穆傳閼胡氏音遏諸飦衣被胥谷巨蒐巨蒐氏即夏貢之渠搜西夏西夏氏在河首至今為國珠余珠余氏去西夏千五百里又皆西征所次柏人趙郡柏人縣甲父傳有甲父之鼎預云古小國名昌邑東南有甲父亭今甲父城在單姓纂云古諸侯以國為氏竇苹云在濟州南黄父晉地一曰黒壤莒父武父二桓十二在河南預云陳留濟陽東北有武父亭今𨽻開封然定四年傳封畧武父以南則衛之北境非河南矣陭氏今晉之冀氏居義切泫氏紀年梁恵九年晉取泫氏即汲書趙獻子城泫氏者地在上黨澤之髙平漢之泫氏有泫谷水冠氏齊為衛伐冠氏春秋晉邑今為縣𨽻大名函氏許地襄十六年懿氏戚縣西北五十有懿氏城襄二十六壃戚田取衛西鄙懿氏六十與孫氏因姓也風俗通出齊懿公妄父桓公時已有懿氏云輔氏晉地秦師敗處宣十五凡地名帯人與氏者皆古國是年有黎氏乃黎侯國亦晉大夫采乗氏在兖州風俗記云濟隂乗氏故宋乗丘邑也元氏鎮之元氏趙孝成築元氏漢為縣云趙公子元邑明帝生于此寰宇記前元氏今巨野西南五十七元氏故城今真定輪氏故登封西南今洛之告成西南有輪氏城漢輪氏縣開皇十八曰輪氏寰宇記作綸誤寪氏魯大夫邑廣集二韻有䦱姓姓源引䦱大夫誤尉氏鄭大夫邑今開封尉氏或云古獄官莵和與隂戎境今上洛有莵和山或云莵氏今尉氏西北四十有莵氏城野莵陂南昭五鄭勞屈生處翟祖晉獻公田見翟祖之氛歸􅃦不寐卻叔虎朝公語之出遇士蒍曰翟祖之君好專利而不忌其臣競謟以求媚伐可亾也蒍以告公恱伐翟祖克之釐王十一年也休在潁川或云介休介在膠西㢘今京兆有故㢘城漢㢘縣􅀈秦虜負芻于􅀈今徐之􅀈縣周秦之故邑陳渉走􅀈今蘄州北有蘄水吳蘄秦郡有蘄氏姓苑云以國為氏從說文從艸誤鄸曹邑昭十二今濟隂乗氏西北大享城寰宇記古鄸城也冘所謂姑冘二水在即墨有冘氏代作姑尤姓苑有尤氏乃别出蜀一作􅧬成二預云泰山北平西北有蜀亭今兖之奉符故濟陽有蜀山賁今沂之臨沂南襄賁故城漢襄賁縣音肥漢賁赫亦音肥姓書有墳奔二音云懸賁父後妄蔽史伯云鄢蔽一作弊畫故畫城在西安城南有澅水耿弇進軍畫中者胡麥切或云臨淄晝邑水誤臨淄乃晝晝齊大夫之封見風俗通有晝氏孟子宿晝者郟鄭地鄭有郟張姓苑云所封邑今汝之襄城有故郟城亦楚邑今許之郟縣子瑕城郟者漢屬潁川魏龍見陕之摩陂改曰龍城鄗趙之髙邑有古柏鄉城故鄗也哀四齊伐晉取鄗光武即位改曰髙邑或云㑹齊侯之處非也桓六年㑹于文公羊作鄗榖梁作蒿啖氏不知時方定許何得在此瓠哀四壺也有壺氏瓠氏壺子壺丘子後有瓠巴籍上邽有籍水一曰洋水又哀十七年籍圃衛地穀隰州有穀城非姬姓榖商鄔紀年秦封衛鞅于鄔改曰商梁恵成三十年紀謂故下愽縣有商城今鉅鹿故城是然鞅封商於乃商洛九域志止洛商君之邑張儀以商於地賂秦者此也邮今髙陵有邮鄉許徒力切本屬扶風集音毒篇韻音攸失之垂引八宗衛遏處曹之濟隂北有垂亭即犬丘非上黨桀居之垂與垂隴郵棠垂隴在榮陽東鄭地襄十八郵棠齊地厝甘陵故厝也秦昔漢厝城七亦切桓帝曰甘陵今見之清陽東南三十有故厝城上人曰䧿城有厝氏燕有厝夀春秋後語潜灊楚邑在廬之廬江南二里有古潜城漢之灊吳伐夷侵潜六沈尹戍救潜遷潜于南岡者昭二十七吳使公子掩餘燭庸圍潜楚救潜注楚邑在廬江六縣西南盍閭四年伐楚圍灊者史記非魯盟戎處鄈葵葵也紀年梁恵成元年趙成侯偃韓懿侯若伐我鄈者郡國志山陽有鄈城京相璠云在山陽西北六十今河東臨汾充寰宇記充國故城在閬中西南九十四今在新井東北二十八又有西充今果州南充郡治西九十五唐西充縣武徳四有西充山大歴四為充州寰宇記以古充國為名有充氏孟子充虞常傳言郯常之境郯國在淮陽常在南陽田文之封瑕水經山乗縣有瑕城詹家之故邑山乗故亳之䝉城璠云解西南五里故瑕城酈云在故解城東北二十四猗氏故城西北俗名郇城預云猗氏東南僖三十文十二故酈視為孤證成十六楚地昭二十四周地右雜國下失之乎数求之乎信疑失之乎勢求之乎國危權鈞則不能相使勢等則不能相併治亂齊則不能以相正故小大輕重少多治亂不可不察此禍福之門也冠帯之國舟車所至不用象譯狄鞮而通者方三千里古之王者擇天下之中而立國擇國之中而立官擇官之中而立廟天下之地方千里以為國所以極治任也非不能大也其大不若小其多不若少衆封建非以私賢也所以便勢令威而愽義也義愽利則無敵無敵者安故嘗觀于上世矣其封建衆者其福長其名彰神農七十世有天下與天下同之也王者之封建也彌近彌大彌逺彌小海上有十里之侯以大使小以重使輕以衆使寡此王者所以家且室也故曰以滕費則勞以鄒魯則逸以宋鄭則倍日而馳以齊楚則舉如綱旃而已所用彌大所欲彌易湯無郼武無岐賢雖十不能成功以湯武之賢而猶藉之乎勢况不及湯武者乎故以大畜小吉以小畜大滅以重使輕從以輕使重凶今欲濟一世安黔首功名著于盤盂銘篆垂乎壼鍳其勢不厭尊其實不厭多水用舟陸用車泥用楯沙用鳩山用樏因其勢也因其勢者令行是故位尊而教受威立而姦止此畜人之道也故以萬乗令十乗易以千乗令一家易以一家令一人易嘗識及此雖堯舜不能諸侯非欲臣人而不得已其勢不便則奚以易臣權輕重審小大多封建所以便其勢也王也者勢無敵也勢有敵則王者廢矣故有知小之愈于大少之賢于多則知無敵矣知無敵則似類嫌疑之道逺矣故先王之法立天子不使諸侯疑焉立諸侯不使大夫疑焉立嫡子不使庶孽疑焉疑生争争生亂是故諸侯失位則天下亂大夫無等則朝廷亂妻妾不分則家室亂嫡孽無别則宗族亂彭䝉曰雉兎在野衆皆逐之積兎在市莫有志者尹文子慎子曰一兎走街百人逐之非一兎足為百人分也繇未定分分未定堯且屈力况衆人乎積兎在市過者不顧非不欲兎也分已定分已定雖鄙不争故治天下國家者定其分而已矣熊侣圍宋九月熊招圍宋五月熊當圍宋十月凡楚三圍宋矣而不能亡非不可亡也以宋攻楚無時止也故功之立也賢不肖彊治亂異也齊簡公有臣曰諸御鞅諫於簡公曰陳成常與宰予之二臣者甚相憎也臣恐其相攻也相攻則危上願君之去一人也公曰非若細人之所議也居無何陳常攻予于庭即公于廟公喟焉曰余不用鞅言以至此也失其数無其勢雖悔無聽鞅也奚益此不知恃可恃而不恃也漢國惡呼秦為不道䘮亂先王之法制隳封建廢井田凡先王之所以維持兹世立經常簡易之法者一切壊之矣漢室隆興四方旋定宜求遺書召故老講明王制取封建而首正之脩禮法立親賢使逺近小大咸適其宜而後廢阡陌還井田以恵其子孫天下後世推二帝三王所以公天下之心而廣之使子孫天下後世必來取法顧不偉歟當是時其去秦之世為未逺經界封畧必猶可攷城邑郊遂必有存者柰何髙帝不知稽古除嬴滅項而志願已滿故雖懲秦孤立分建同姓而割地亡制擇立亡法封三庶孽一日而􅆶天下之半茍且一時使子孫天下後世受其敝而不得見二帝三王所以公天下之心豈不惜哉雖然髙帝之智固不足以知此而子房之流亦樂因循亡有為之長慮者何邪豈非王跡當熄霸道當興天不啟其𠂻邪不然渠若是而止也漢之封列初亾足道比之晉唐則為近古因録之以偹采監鄼屬沛平陽河東宣平絳河南舞陽潁川曲周廣平魯魯國汝隂汝南潁隂潁川陽陵馮翊春秋作隂陵楚漢信武安國中山棘蒲清陽史記楚漢春秋同固作清和清河郡清陽縣也云郡非是廣平臨淮汾隂河東陽都地道記云屬臨淮曲成涿愽陽汝南梁鄒濟南剻薄梅反屬扶風楚漢春秋作城志闕地道記在北地索隱芳尤切都昌武陽厭次地道記屬平原後屬樂陵國成涿城父沛史故城阿陵涿固作河陵廣地道記廣縣屬東莞史漢表作廣嚴誤吕歐諡北壮為嚴爾河陽河内蓼六安費東海聊城位次聊城侯史漢並作平侯髙苑千乗四十史第一固第四十二隆慮河内臺臨災臺鄉縣貫鉅鹿海陽南越東茅固作東茆四十八史漢皆作柳丘渤海斥丘魏東武琅琊樂成宣曲闕云先封武侯隠索魏其琅琊昌武絳陽固作終陕闕曲逆如字在中山以水曲而西流為名章帝惡之改曰蒲隂五臣注陸機功臣頌音去遇非按别有曲遇在河南本音舉隅見髙紀明作遇菌求隕切固作卣闕按先得南陽侯則南陽地復陽南陽應邵云在桐柏山下復水之陽猗氏河東祁太原傿陵愽陽彭城平定故市河南髙梁闕史漢皆在六十六按肥如已六十六什邡廣漢柏至辟陽信都髙京涿宜是長沙安平惟宣封長沙孝王者屬涿留彭城南安犍為又𨽻建安平棘常山北平中山肥如遼西安丘北海襄平臨淮朝陽南陽彭東海清東郡彊寗陵陳留祝阿平原煑棗宛朐梧彭城堂陽鉅鹿寗濟南寗陽張廣平紀信棘陽南陽髙胡陽阿上黨龍盧江龍舒恐非當是大山龍也表龍陽下相臨淮堂邑臨淮新陽汝南固作信陽營陵北海廣阿鉅鹿戚地道記屬東海􅀢扶風固作栒磨固作歴非厯在信都武原吳房汝南故子房國繁魏郡繁陽固作平汾陽太原髙陵琅琊深澤中山宋子鉅鹿閼氏安定中水志屬涿應云易滱二水之中地道記屬河間杜衍南陽赤泉司馬正以為南陽丹水謬湼陽南陽穀陽史漢作穀陵甘泉固作景侯湏昌東郡長脩河東位次作平信侯昌琅琊成陽汝南平州地道記屬巴郡壮或作荘邔南郡按周成難字觧詁音跽恭河内開封河南臨轅禾成東陽臨淮陽羡丹陽軼江夏平臯河内土軍位次成信侯也包愷云西河土軍縣汲河内槀山陽中牟河南戴甾也章帝曰考城徳志闕表在濟南上邳王朱虚王瑯琊衍震陽汝南續漢書作滇陽期思汝南便桂陽音鞭義陵一作義陽義陽在汝南桃信都沅陵武陵陸量如淳以為江南陸梁地平都東海按永和中平都國乃安平也屬長沙漢表在百十史無次第䠶臨淮即貫陽陽夏淮陽淮隂臨淮􅉭沛任廣平棘丘江邑離鄧弱封史失其始末固去之􅅅頡音戞固作頡􅅅非詳史表世家合陽馮翊沛沛周吕應云周吕國索隠云周及吕非濟隂有吕都縣又封令建成沛平河南在費一有此次三十二之下髙皇帝五年滅項趣定功行封六年十二月甲申始剖符封列十八侯之位次訖十二年侯者百四十有三髙后二年詔丞相平盡差列侯之功録第下竟藏之宗廟副在有司今以其次録之史漢表傳互有不同其侯國本百三十有七又有周吕建城在外戚合陽􅅅頡沛徳四人在王子侯寔百四十有三然按平定梧􅋴上邳朱虛使沅陵平都八國非髙帝所封固表末云百四十七又云百五十三皆誤多十夫封功勞建賢徳所以崇國基勸天下也是故功必稱地位必稱徳然後庶人不議而天下定按留侯良曲逆侯平勛業之具在漢亾有出其右者乃不得豫于十八位之中張敖者何人而反危然顯據第三及后叙定良居六十二平次四十七而淮隂信且絀於列噫論功定封而以私意行之可乎唐之裴度平淮之功固非李愬下也韓愈氏評之得其槩矣而憲宗乃以愬妻皇族命叚文昌改立碑頌歸功於愬於是議者蠭午夫以度之公議固不可掩而一時所屈亦足以銷志士功名之念而沮忠臣事上之心憲宗可謂失君人之道矣抑嘗言之惟天下之亾私者可以為天下漢之封法既不善矣而又行之以私意欲不擾且亂顧可得乎筑陽武陽蕭鄉右三鄼之屬一更有紹陽南宫信平睢陽樂昌右四宣平之屬修史漢作餘音同平曲髙城絳之屬右二繆曲成之屬重平魯之屬臨汝潁隂之屬安陽汾隂之屬夜東萊垣河東曲成之屬右二塞臨洮之屬愽陽鄲沛十三州志音多䣙之屬池陽䣙之初封節氏右成之屬南河陵之屬巢費之屬發婁宣曲之屬䋲髙京之屬􅀈山河陽之屬江鄒汾陽之屬曳深澤之屬臨汝赤泉之屬陽平長修之屬㤗山徳之屬張芒之屬令濚陽見地道記舊云謚非􅃵頡之屬吳合陽之屬鄜一作􅀈屬周吕之胡陵建成之屬右百四十三國之後分封者惡呼漢之諸侯可謂真不幸矣方髙帝之封也其封劵之誓曰使河如帯泰山如礪國以永寧爰及苗裔申以丹書之信重之白馬之盟可謂恵矣柰何髙帝不學面墻不能講禮制度與為長久計上亾道揆下亾法守功臣子弟亦復不閑有家一旦得國正猶􅆵人之驟獲放意酒色而不知所興起迨文景時民歸户息富厚什伯於前矣為子孫者唯宜講禮脩樂以樂其生而乃驕㤀其先亾兢兢於苛世之禁隕命亾國匹匹相繼洎武後元異姓耗矣耗音毛無也或絶失姓或乏亡主朽骨孤於墓苗裔流於道生為愍𨽻而死為之傳尸傳音轉即是胗之豈惟在下之不教哉亦上之人不知所以恵之之道亾制以保之也唐有天下子孫蕃衍其初咸有封爵至世逺親盡亦隨賢愚與異姓雜仕或流困民間繇此而言開國之君其可不知所以恵之之道而為之善後者乎愽成扶栁信都中邑樂平山都松滋廬江固作祝兹非别有吕瑩八年為祝兹侯成陶固作成隂俞勝沛吕成作昌成祝兹瑯琊建陵東海醴陵長沙腄東萊史作錘東平東平洨沛不其漢陽信都樂昌右髙后封陽信勃海信陽在新野固作壮武膠東樊東平沶陵史作波陵南湞河南有湞亭音程黎東郡缾瑯琊弓髙營陵按道濟龍額後分按道又襄城魏一云潁川非故安涿清軹河内章武勃海南皮勃海鄡史作清都固作鄔鄔大原邑非也按史古本為靖郭則齊封田嬰者周陽上郡右文帝封俞江陽東海遽鄉名在常山新市鉅鹿商陵臨淮建陵東海建平沛平曲髙城山陽或作陽山安陵垣河東固作桓非遒涿容城涿易􅃰范陽涿翕内黄亞谷漢表在河内塞魏其瑯琊盖渤海隆慮河内武安魏周陽上郡右景帝封長平汝南平津髙城冠軍南陽漢表在東郡周長社樂通髙平一云臨淮牧平平原富民蘄南奅茂陵中書同此本字匹孝反衛青傳作窌說文栁宥反葛嶧龍額汝南非豫章者隂安魏發干東郡南陽樂平冠陽翕内黄特轅南陽史作特装親陽武陽若陽平氏平陵武當㟁頭皮氏渉安昌武舞陽襄武隴西襄垣樂安瑯琊漢表在昌縣合騎髙城渉軹齊漢表軹在西安從平昌邑隨成千乗愽望平陽衆利在陽城姑莫潦舞陽宜冠昌縣煇渠魯陽鄉名浞野下麾在猗氏固作摩漯隂平原順梁韋昭作渾渠云皆魯陽鄉名班固作煇渠然上三年僕多方侯故孔文祥以為一邑封二河綦濟南常樂濟南符離在沛朱虚固作邳離義陽平氏壮東平固作杜非衆利為諸縣湘成陽城㪚陽城臧馬朱虚膫南陽舞陽術陽下邳龍亢譙蕭該云廣徳所封止曰龍有亢者誤龍乃魯城成安陳㽞漢表在郏昆鉅鹿騏河東北屈梁期魏将梁安道南陽隨桃南陽相成堵陽海常瑯琊北石濟南固作外石下酈南陽固作鄜非繚嫈蓹兒越開陵臨淮臨蔡河内東成九江亾錫㑹稽渉都南陽平州梁父荻苴渤海音秋蛆澅清齊獲音且畫索隠音非騠兹瑯琊浩瓡讘河東即狐讘今隰之永和縣讘一作瓠徐作執俱非㡬河東湼陽南陽漢表作齊海西新畤齊承父東萊秺濟隂重合渤海徳濟南題鉅鹿邘河内轑陽清河當塗九江蒲琅琊富民蘄右武帝封愽陸漁陽文頴云無此縣失之安陽汝南桑樂千乗宜春汝南安平汝南志屬涿富平平原陽平東郡秺濟隂今成陽有秺亭建平濟陽宜城濟隂弋陽汝南商利徐成安穎川平陵武當義陽平氏右昭帝封營平濟南平丘陳留漢表在肥城昌水於陵陽城漢表在濟隂隂乃成陽陽城屬潁川汝南二郡爰氏單父扶陽在沛之蕭平恩魏髙平在臨淮平昌琅琊樂昌汝昌陽城汝南與潁川陽城别邛成濟隂本屬濟南安平長沙将陵平臺常山愽望平陽樂成平氏云南陽城愽陽汝南南頓建成沛西平臨淮長羅陳留爰戚山陽鄼河南何之𤣥孫封本紀名係愽成淮隂髙昌千乗平通愽陽都成潁川合陽平原安逺在慎縣歸徳汝南信成細陽義陽陽都樂平冠陽右宣帝封陽平東郡樂安僮義成安平見上右元帝封安昌汝南高陽東莞安陽平陽原成陽新息高陵琅琊定陵
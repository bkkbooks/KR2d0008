body:
  text: 路史卷二十八宋羅泌撰國名紀五周氏虢郭仲之封為西虢在岐今鳯翔虢縣通典云岐州虢縣西虢也東遷之際自此之上陽為南虢矣其處者為小虢秦滅之秦武公十一年魯荘七年亦俱曰郭公羊曰虞郭郭究碑言郭叔禮記注虢或為郭在武都南百里有虢城集韻引傳攻郭音虢東虢叔之封制也今鄭之滎陽有虢亭世紀以成臯為東虢叔之封故通典以洛之汜水為東虢國即制邑左傳云制巖邑也虢叔死焉制今在孟之汜水漢之成臯臺冡在焉水經濟水南厯虢公臺皇覽云基址及冡尚在或云仲封者非左疏亦云東虢制也賈逵虞翻等謂叔為西虢仲謂東虢誤南虢上陽是上陽城在陜縣之硤石鎮西三十六里常陽驛之東南下陽即今同之下陽服氏亦云在此下夏字通杜謂河東大陽亦非馬融云叔封上陽仲封下陽疏謂二地皆虢邑不得二人分封其處今虢之虢畧正曰南虢以其仲後所都故亦號西九域志周封虢仲非世紀三虢仲為西虢不在此春秋公子譜上陽虢叔之後亦非北虢男爵今陜理西四十五里故虢城是漢志𢎞農陜故虢世一以州治城為即古虢國是為大陽漢志北虢在大陽東虢在滎陽西虢在雝今按陜平陸皆漢之大陽地天寳元年守李齊物開漕得古鏵有平陸字改焉佑以此為仲邑仲後也盧氏地道記郡國志皆云西虢之别詳商世侯國夏陽序之封晉滅之僖二年今陜之平陸見歐志廣記漢夏陽城又在韓城東北百三十康公邑在緱氏杜云緱氏西北舊有亭緱氏西寧入偃師或云魯地非也襄公十五年盟于地不在周世作劉繆故説文惟有鎦然古亦無之詳字經岑渠之封文王異弟之子今梁國北岑亭風俗通云古岑子國右王季之穆齊桓公遊于郊見亡國之城焉訪諸野耋郭氏之虛也公曰曷其虛對曰善善惡惡公曰善善惡惡固政之媺也奚而虛曰惟善善而不用惡惡而不去也公歸告管仲仲曰若人者為誰惟弗知也曰然則君亦一郭矣公退招野耋而進之故春秋書郭亡猶梁亡者言其所取亡也夫亡國之亡也未嘗不以其取亡者也今郭之亡所善不善而所惡不惡也所善不善則無貴于知善所惡不惡則無貴于知惡矣奚其在始郭君之出也徑諸澤語馭者渇馭者進清酒語飢欲食馭者進梁肉脯糗君曰何給對曰臣昔儲之為君之将出亡道飢渇也曰然則若知吾且亡乎曰然然則孰不告對曰君喜道腴而難至言誠恐先君之亡也君怒馭者辭焉曰今天下之君無賢而吾君以獨賢泰賢此其所以不之存而之亡郭君於是伏軾而詰曰賢顧若是難邪舍車躇山中㞐飢力解枕馭者而寐馭者易之塊疎行而亡之郭君餒死中野詩云聴言則對誦言如醉郭君之謂也恵王七年詩外傳云為狼所食齊湣居衞謂公王丹曰吾之所以亡何也公王丹曰主之所以亡賢也天下之主不肖而惡主之賢也湣慨然曰賢固若是苦耶此亦不知其所以亡而亡者公王丹之所過也若宋昭之出也俯謂馭者吾今知所亡矣被服而立侍者無不曰吾君麗者發言舉事朝者無不曰吾君聖者内外不見其過兹吾所以至於此也宋公于是革心易行安㡬行道居二載宋人逆而復之死諡曰昭故君子莫大乎自克吴語云楚靈無道其民不忍飢勞之殃三軍叛之乾溪屏營山中見㳙人疇而呼之曰余不食三日矣疇進枕之股及寐易之以塊去之比覺無見入棘闈弗納乃入于申亥氏縊焉此事相似余稽四虢先後南北知郭公之非是而代莫之明也故并及按此郭乃荘二十四年之所書者賈誼書作虢君亦曰郭新序乃北燕之地寰宇記云聊城今有郭城博州圖經云亾國郭氏之虛是也管子亦言桓公之郭問郭父老何以亡春秋地名云虢北燕之地與齊接境與四虢不相及諸家皆不知郭公繆文魯鹵也曲阜少昊之虚曲阜小地名在魯城中委虵七八里古城十二門魯國記七門有鹿菜石稷上東子駒等大中祥符間曰仙源𨽻兖管今鄭治管城古中牟自漢為中牟開皇管州十六年即楚子次于管者大業三為鄭武徳三復為管貞觀元復為鄭蔡今蔡治上蔡漢縣迄今伯爵仲子蔡伯括地圖云豫州北七十里上蔡古蔡國縣西南十里有故蔡城蔡山岡故國也􅲀侯爵穆傳邢侯􅲀侯來吊絀為伯毛􅳙雝霍皆伯祝駝言文王子惟􅲀為伯左妄興仁之濟隂漢之定陶東北四十七濟隂界有定陶故城即古􅲀國南二十有􅲀城有􅲀南山周為􅲀州今興仁府成郕是也伯爵濮之雷澤北三十故城是漢屬濟北晉屬東平後遷其陽曰成陽漢𨽻濟隂京相璠云東即廪丘南故郕都故寰宇記雷澤古郕伯姬姓國縣北有郕都故城誤也按漢止有城都屬山陽非此之郕與成陽樂氏妄爾與周成十三年成乃周地層公圉郕魯邑蘓之郕異隰郕蘓忿生邑在河内霍伯爵􅔸也始亦侯穆天子傳霍侯薨今晉之霍邑有霍泰山霍水郭璞云平陽永安西南汾水之西有霍城非六安之霍夀之六安霍山天監貞觀為霍州衞侯爵故朝歌本衞州衞縣周為州隨為縣熙寧六年省為鎮入黎陽天聖四年以衞𨽻通利軍熙寧三年廢復𨽻衞州六年省為鎮毛伯爵原父得毛伯敦盖于扶風文稱伯河南籍水􅅖有毛泉近上邽􅀈伯爵􅀈也􅀈同本作肉􅀈龍字亦音染京兆今有􅀈亭世繆為􅀈僖二年鬬章囚鄭􅀈伯又異集韻􅀈那丹同音男益失􅀢子爵僖二十年來朝也今登封有廢城是為南與晉異太原今有城所謂箕者雝伯爵今懐之修武有故雝城范志云山陽有雝城杜云雍城在河内山陽西周􅯐有雝公緘鼎非秦之雝岐之雝縣今鳯翔之天興塦倉城秦之都縢侯爵僖十九年縢子在貶本徐屬縣詳黄帝後國後遷公丘而地為小邾故兖之龔丘有古縢城今縢縣西南十四里城在字一従水亦作畢周世居太王王季皆都今京兆咸陽有畢原畢陌闗中記云髙陵北有畢原畢陌南北數十里東西二三百里無山川陂池井深五十丈詹桓伯曰我自夏以魏駘芮岐畢吾西土也畢芮岐魏自昔為周邑矣原畢皆三公原伯爵今澤之沁水縣西北有故原城晉伐原者後趙同為原大夫即此或云忿生邑或云濟源水經云濟有二源東源出原城即晉伐者今孟州濟源西北九里有故原城豐侯爵初文王作邑以治南國今永興鄠北二十豐水之西有豐故城竇苹云在長安縣之靈臺鄉通典鄉在長安西北荀侯爵詩云荀伯謂諸侯伯珣郇也今猗氏西南古郇城是佑云猗氏古珣國元和志西南四里絳之正平西十五竹紀年次于郇者徐鉉云荀姓郇侯後宜用郇字世云今河東多此姓不作荀音或云邠之三水栒邑非也晉伐荀以賜原氏則河東矣汾水所經荀城也應以荀為伐晉之郇侯誤右文王之昭唐虞稽古列爵惟五分土惟三公侯百里伯七十里子男五十里由夏逹商未之有改至于武王雖曰反商政則由舊故班志云周爵五等其土三等弗可改也孟軻曰天子之制地方千里不千里不足以待諸侯公侯百里不百里不足守宗廟之典籍子恵子云天子封圻千里公侯百里伯七十里子男五十里虞夏殷周之常制也而子産亦謂天子一圻列國一同自是以衰古之言封建無以異者王制之書州建之國亦不過乎五十若七十與百里正有合乎子思孟子先王之制㫁可識矣獨周禮書諸公之地方五百里侯伯子男率百里而差之果周制乎夫以男國百里食四之一為五十里餘為所比之封附庸土也然子伯侯公地乃大異諸公之地乃至二千五百縦食其半猶當千二百有五十如千二百五十則以多如五十則以少其果然邪顧魯侯也而百伯之地豈治世法哉粤自周襄上失其御諸侯無政謖相侵併而後土宇逾越燕越之壃埓于王圻而齊耒耜所刺方二千有餘里秦地為方千里者五郢楚且以六千而為人役故子産曰今之大國兼數圻矣此諸侯所以惡其議己而圯其籍又従而羼之制曰上公之地方五百里且謂成王以周公為有勲勞故特加之四等之上使兼二十四附庸者益以㒺矣夫太公之封齊周公之封魯地非不足也而儉于百里此孟子為魯人言者于百里猶曰儉則周公太公何嘗越百里哉今魯為方百里者四十九有王者作則果在所損乎在所益乎徒取諸彼以與此然且仁者不為况殺人而求之乎形方氏制邦國正其封疆無有乖離之地正使小國事大大國比小是先王之意也公侯伯子誠使咸依司徒之數則職方所率千里惟可四公罄禹所正八州不過三十二公侯伯以降己不容厝設以盡為男邦亦不能八百國王制之千八百豈三千所容哉説者以周九州方七千里州得千里者六以千里封四公又以千里封六侯又以千里封十一伯一千里為二十五子一千里為百男凡百四十有六國不及二百一十之數猶一千里取之以封五十九男六侯之方餘二百里以封四男十一伯之方餘一方以封一男凡六十有四男合一百四十六為二百有一十儒之無特見至此且魯方七百里為公侯地百里者四十九為伯地七十里者百云十伯之地尤疎臧鄆秦乾時之戰有秦子荘公所臺處三十一年栁展禽邑地理風俗記髙城縣東北五十有栁亭故縣世謂辟亭成桓六年城預云泰山鉅平東南郈厚也厚成叔瘠鄆之湏城東三十六有郈城郈亭酈氏云闕其南面叔孫所隳也費二鄪也僖公以鄪賜季友季利涉編古命氏云費氏出魯桓少子季友有勛邑于費今沂之費西北二十有故城臨沂東三十六一作粊古文書粊讐或作粊誤粊音背惡米也非河南費顔郎預云髙平方輿東南郁郎城方輿今單之魚臺防臧氏邑魯東啚昭公五年莒牟夷以來以防兹來即齊魯㑹處今宻之安丘有莒城莒亭瑕丘二桓庶子萊漢𨽻泰山公叔文子升瑕丘項羽紀有瑕丘申陽申陽盖名孟康以為瑕丘人姓申名陽姓纂自為一姓因文頴之説今兖治瑕丘瑕丘在其西南與衞之瑕丘别衞瑕丘在今璞陽東南三十囚邾子負瑕也榖梁酈氏云博陵有榖梁城隂下隂襄之榖城東北有隂城師古云古隂國乃故鄼地又有下隂在隂城之西後之所遷昭十九年公子赤遷隂于下隂今光化乾徳漢隂縣隋隂城榖新蔡平侯都今蔡之屬志云平侯自上蔡徙都此或云黄梅開皇新蔡今黄梅有石蔡山出大龜在廣濟並蘄州來昭侯徙此號下蔡今夀治唐屬頴春秋時有蔡成公輿地記成公徙此樂史云下蔡有二處水經淮水東岸一城即下蔡新城二城對據是也卞季武子以自封者今兖之泗水開皇中以故卞城置十六年牟登之牟平在牟山陽而夷平開皇之牟州三年康姓書康叔故城在穎川孔安國宋𠂻以為畿内國漕本曰曹戴公居宋桓公立之廬于曹泉水載馳皆言衞地今􅉸之白馬衞之下邑西征記今白馬城古衞之曹邑戴公東渡河處此文公遷楚丘今衞南縣楚丘郡國志成武有楚丘亭城冢記齊桓公築衞文公居僖二年所城杜云在成武西南今澶之衞南西北四里楚丘城也非拱之楚丘今楚丘縣戎州之邑即戎伐凡伯處酈氏以為文公徙此九域志南京有楚丘晉文公作石碏邑周有石尚姓書云王父字為氏非厈文八年晉解揚歸厈戚之田于衞者儀裘仇也栁荘采裘氏地彌戚傶也衞附庸在河上文元年注相之臨河東有戚城世家以為宿如宿舍于宿左皆作戚河流北過元城而戚在河外故陽虎従晉伐戚曰右河而南必至焉襄二十六晉伐衞取戚今在衞縣之南預云戚頓丘衞縣西今戚城在枯河之東春秋之時河與晉異由晉而言河西為内東為外故云戚在河内春秋時在河東也集韻並音鏃元咺邑今大名之元城應云魏武侯公子元邑甯陽處父聘衞過甯者一作寜今拱之寧陵古信陵故魏安僖封弟於信陵號甯陵君然甯城在獲嘉而武陟亦故甯沈肉叔初封預云平輿有沈亭平輿城在今蔡之汝陽東汝水南通典云古沈子國北郜宋併之桓二年取郜鼎今曹之考城東南有北郜城鄭樵云南北二郜城在單之成武䥄滕叔初采今沛之公且潘番魏王地記云下洛城西南四十潘城是畢分十三州志潘在廣平城東北十里龎畢之分龎鄉越世家所謂讐龎長沙者馮唐韻􅀈姬姓國本説文今范陽李澤中有馮水即古馮池故馮夷國魏在安邑芮近寰宇記芮城北五有魏城即萬所封周八里樵云河中河西縣河西熙寧三省入河東縣大梁魏惠六年自安邑徙大梁遂曰梁孟子見梁恵者今開封祥符昔之浚儀而汴城西有故魏城魏惠所築九域志古梁城畢公髙築謬張儀所謂四平無名山大川之阻者東魏為梁州令狐魏顆邑晉恵公濟河圍令狐者僖二十四今猗氏西十五有故令狐城智懷寰宇記懐州云管蔡廢絀封康叔為懐侯于此即為衞後遷河内晉于是唘南陽狄伐晉圍懐者覃懐也宣六紀年秦伐鄭圍懐殷或云隤懐忿生之邑今懐之武陟西有故懐城恒康叔孫封楚有恒思公世本云後有恒氏右文昭之分周監二代封爵五列子弟勲賢必参封之秦除五等設爵二十身稱皇帝而子弟為匹夫徹侯闗内一至無廟可立二世國絶漢祖龍興創其孤立奮然封建然而襲秦戰國先王綱紀掃地之後莫究其事忽忽唘土設爵二等大王小侯張耳吴芮韓信彭越臧荼黥布韓信盧綰異姓之王者八盖時求安反仄不得不爾而王之號遂為臣下常稱二年立韓太尉信為韓王四年遣良操印立韓信為齊王高帝之約異姓非功不王至吕后遂破約王台禄産自兹不改洎建武初尚襲二等皇子為王而其餘以列侯及是朱佑峙議天無二日人臣之爵無過于公于是正為郡公十五年已復稱之識者蚩焉十七年曹氏始列郡王晉且封國皇子稱王而王之子為侯太始元年子弟王者二十餘人宋齊以降爰復列郡陳室即有郡嗣藩之三等逮乎元魏王公侯子分爵為四皇子若元功異姓稱王皇族若始藩為公王大郡公小郡于是王者七十旋為六等北齊因之大氐于晉宋若梁靡異開皇國郡王分九等煬帝謖以王公侯為三等李唐之起務廣宗藩自従昆弟郡王數十孩提並列及文皇塈封彛説疎悉降公時惟數有功王而止貞觀之十一年即詔前元景等二十一王督刺代襲後復制皇兄弟若皇子為王皆國親王太子男為郡王庶姓卿士功業特盛亦得郡王由是異姓畢王侵尋戰國五季之事至徳之元迄大厯三異姓王者至百一十有二不亦異乎比後之世更以王子兼師保官果何為邪夫以此號既立既久而不可易邪則世祖固嘗改文皇固嘗降矣以吾之子弟非王其號不足以貴之重之邪則文武成康之親子弟管蔡成霍孟晉之徒止于侯伯一適之外其子不過守其故土或食卿采公且無有未始不貴且重漢魏而下蠻酋冷伯王稱且不勝計其果重乎南粤尉陀若閩尉粤亾諸四夷酋長固不得同中國如韓賜之璽綬南粤元鼎即賜之相及内史中尉太傅印得自置賜非矣然漢王子曰諸侯王徒名王而其實則諸侯言之不順而有此目則名浮之無益辨矣聖人復起果将奚先亦惟名之必可言而已季札辭國胡翼之以為見父兄之王號難乎革也革而不用則左右國人習于僣擬之久有所不順因而不革則非季子之心自度有不足以辨此故辭之以全操使有伊周材具則不辭而為之矣水惟就下人惟従是安有習于僣擬之久而不順者晉唐故唐都鄂夏虛也世本云叔虞居鄂鄂今大夏故云唐本堯封在夏虛晉陽後曰晉以水名今并之陽曲故平晉西南十六有叔虞祠墓故詩止曰唐韓同之韓城南十八有故韓城韓原也秦晉戰處古今地名曰韓武子食采韓原一曰宗丘與臨晉近謂之少梁于邘也今懐治河内故邘縣有邘臺邘城京相云河内野山西北三十有古邘城邘亭邘臺水經云故邘國一云祁氏邑在陽曲東七十即為邘者周以與鄭後啚晉或作邗誤雁今作應古應侯今作雁侯爵韓詩應侯范雎増世為應侯盟㑹圖云汝之魯山有故應城今在葉𨽻汝有應鄉翟孝伯封狄城也續志臨濟本狄國唐韻云春秋時狄國也寒侯爵定公三年有寒氏晉地一曰五氏南宫中鼎云王在寒師即此字書􅀈以為邯右武王之穆武之穆四唐為長後曰晉次桓叔韓是也邘三雁四而狄寒亦其别者富辰曰邘晉雁韓吾知其説無推次也惡戲聖人之經畫大畧為世長慮豈後世腐爛之儒茍目前者之所知耶昔者周公弔二叔之不咸于是封文之昭武之穆者二十有餘國二叔不咸周公宜戒同姓彊大之禍而弱宗國矣乃復大封同姓焉此可與腐儒苟目前者言與先漢孝武懲七國彊大之禍于是務削宗支逮元成時宗國蔑矣而移漢者王家也孰為來哉孰為來哉凡四國之分封者今復條于下方曲沃成侯之居以封桓叔故地有晉先君之廟獻公城之居申生曰新城漢為曲沃今𨽻絳潘岳云陜之曲沃是也絳穆侯居見詩譜荘公二十六年士蒍城之二漢為縣今𨽻絳有絳山絳水有故絳城在翼城東南曲沃南二里元和志周勃邑今號絳邑故城景公遷新田又曰絳乃以翼為故絳二後魏北絳縣在翼城南絳在絳翼孝侯居因曰翼侯盖與絳近今翼城東十五有翼故城絳邑之東八十隠五年伐翼者集韻云國名云即絳改非鄂翼九宗嘉父逆晉侯于隨納之鄂曰鄂侯晉地隠六端氏澤之屬縣西北三十有端氏故城郤叔虎邑俗作郄絺郗也預云野王西南有絺城今在懐之河内隠十一年王以絺租攅茅等十二邑與鄭易鄔劉蒍邘田後復歸周以賜晉文公故又屬晉畜傗鄐也邢侯邑曲沃南二里有故鄐城雝子奔晉與之鄐者姓書有畜氏鄐氏云因非子畜養妄涉涉佗邑漢之涉今𨽻潞苦苦成也王符云郗犨采于苦曰苦成故城在鹽池東北後或為楛齊人改曰車成又作古城繆冀芮城西三里有郤芮墓芮死文公命闕下軍大夫復與之冀今晉之冀氏芮故邑張晉分漢張縣今邢之任是郡縣志縣西南二十七即濟陽城王符云河東解邑有張城西張城吕春秋云魏之分非解唐叔後今河中臨晉東南故解城在桑泉之南虞鄉東三十城猶屬解僖十五解梁以賂秦者非昭二十二之解後魏為二南解虞鄉北解臨晉以蚩尤體解名集韻音蟹繆揚一曰揚氏寰宇記趙氏之寧晉春秋楊氏説文揚舉也二漢揚縣今晉之洪洞南十八有故揚城地道記揚侯國云晉滅賜盻郡縣志同續狐鞠居采謂之續簡伯温叔虞後封在河内狄滅之僖十年温子奔衞襄王以賜晉郤至采焉曰温季狄臻陽處父亦采此祁太原祁縣有祁奚墓寰宇記在聞喜東二十二里介步郤步揚邑玉篇作􅀈云亭名盂盂内盂大夫祁氏漢縣𨽻太原唐邢今陽曲東北八十故盂城劉子伐盂定八續志云國非衞東盂也定十四年蒯聵獻齊者又哀四年盂周地若宋盂僖二十一公作霍穀作雩一作宇駒郤克采鄧名世姓辨誤與子錡皆謂駒伯原先縠封曰原縠後封彘彘霍汝之梁縣西南七十霍陽山漢為霍陽縣有霍故城一夕之期襲梁及霍在是哀四周地箕箕鄭采晉語鄭為箕大夫欒賔邑靖侯孫真定欒城漢為平棘開皇欒州十六年今趙之平棘西北十六有故欒城近栢鄉鎮及國夏取欒遂南徙曰南欒漢南欒故城在鉅鹿邢州屈夷邑采麗姬曰蒲屈君之壃也今隰州有故屈城南屈也翟章救鄭次南屈者汲古文北屈見後古國中犨臨汾有犨氏亭樂史云郤犨采非魯山之犨楚有中犨昭元年犨乃南陽之犨本鄭地入楚漢犨縣今汝之魯山南十九有古犨城荀逝遨采本鄭地重耳軍盧栁濕次于郇者晋語狐偃盟于郇韋云鄭地非河東郇銅鞮羊舌邑漢縣今𨽻威勝本屬路太平興國三置軍有銅鞮山銅鞮水南十五銅鞮故城宫址存焉子産云銅鞮之宫數里南六十有銅鞮伯華墓揚干戎氏唐叔後在狄者有大戎氏小戎氏桓按桓叔封韓盖初封桓竹紀年有桓侯非諡也漢梁孝子明封桓邑侯是也韓西王肅云涿郡方城縣有韓城是趙藺漢西河屬縣平代之雁門故平縣東漢之平城紀在晉烈公四年趙城平邑今魏之南樂縣圖云平邑在縣城東界右武穆之分虞虢焦􅉸霍揚韓魏姬姓也八國皆為晉所滅昔者晉假道于虞以伐虎宫之竒曰泰伯虞仲太王之昭也虢仲虢叔王季之穆也為文王卿士勛在王室藏在盟府将虢是滅何愛于虞且虞能親于桓荘乎桓荘之族何罪而且害之晉可謂不仁矣方文公滅曹也以其地賜宋人文公有疾曹伯之寺儒胥筮之史佚誨之以曹為解曰昔齊桓公為㑹而封異姓今君為㑹而滅同姓曹叔振鐸文之昭也先君唐叔武之穆也而君滅之能無及此乎且合諸侯而滅兄弟非禮也公悦復曹伯及霍之滅霍公求奔於齊晉國大旱卜之霍泰山之為也使趙夙召霍公而復之齊景公之伐宋過泰山夢二丈夫怒甚晏子曰湯伊尹也語其狀信公曰何如對曰夫湯太甲武丁祖乙天下之盛君也不可以無後今惟宋矣而君伐之請散師而平之公不従再舍鼓毀将殪公辭乎晏子乃散師商頌曰不僣不濫不敢怠皇命于下國封建厥福此湯之所以獲天福也襄二十六聲子云虞虢之滅惜乎無以三者之事沃晉侯者晉滅魏耿霍皆不見經當訂凡二􅀈伯爵衞之共城西南二十二凡故城也杜云共縣東南有凡城袁山松云西南郡國志共有汎亭詩凡伯國隠十年戎伐凡伯者又臨胊東陽城亦曰凡而益都有凡山並𨽻青蒋初伯後侯班志云汝南期思里蒋鄉古蒋國楚滅為期思今尉氏西五十故蒋城是新鄭界杜云在弋陽期思期思故城在固始西七十邢侯爵邢治龍岡城内西南隅小城也秦之信都莾之襄國隨為州漢項作為邢侯穆傳邢侯注廣平襄邑縣應形刑従井説文户經切乃作邢故字書妄以邢為井而邢􅀈為二玉篇邢輕干切韻邢在河内􅀈在鄭邢侯國夷儀范志東郡聊城有夷儀聚瓉云夷儀城在襄國西百劭云邢侯自襄國徙此曰邢丘通典龍岡北百四十有夷儀城西百五十七有夷儀嶺元和志龍岡西四十有故城俗呼随宜有邢夫人冡在河之臯曰平臯有平臯城狄國邢丘晉送女邢丘者紀年梁恵成三城邢彪後志云縣有邢丘故邢國周公子封非也平臯邢丘非始國也祭伯爵商代國後為周圻内樵云在河南傳云寰内諸侯穆傳正公􅀈父説文􅀈周公後城在開封長垣今管城東北十五有古祭城也胙今􅉸之胙城燕併之故曰南燕後漢燕縣属東郡本南燕國有胙城古胙國杜云城在西南本屬酸棗有胙亭然晉元東郡武徳胙州二年茅殖綽伐茅氏也襄二十六戚之東鄙本衞邑茅盈系云姬胄之分漢有東茅侯預云髙平昌邑西有茅鄉城今金鄉西北四十二有昌邑故城非修武之茅訾有二西訾在濰詳見前東訾在鞏西有故城屬周單子取之昭二十三年取訾姓苑云此本出祭氏周兊盟㑹圖云兖國周公後所封疑即魯之謂右周公之族本亦文之昭苐國多故别出亦以别其祖禰之所自出云伯邑考亾管叔誅周公為禰也惡戲人之可痛未有如族姓之不睦者也雖有兄弟不如友生豈惟後世之愚然哉晉文公之出亾也厯者七國齊桓女之楚成享之宋襄公贈之馬而秦穆公乗送之卒以得國此四國者皆異姓也而能繼之若此衞成公曹共公鄭文公皆同姓也而皆不禮焉是所謂不如我同姓邪昔者晏子患齊之公室卑子華子曰詩亦有云不如我同姓何以是踽踽臨于人上将卑是取何懼而不獲兄弟之不協焉能協諸侯之不睦邢與衞同姓之國也狄伐邢荘三十二齊救之閔元僖元暨遷夷儀乃従而為之城並僖元年狄入衞閔二則為之城楚丘僖二年正二國者俱齊侯所存之亾國其患難正相同也齊桓卒十七年眀年而宋衞遂伐齊狄救之故邢與狄冬伐衞又明年衞伐邢二十有五年遂滅邢一書狄救齊有以見諸侯之罪再書狄伐衞于有以見救齊之美也方狄人之迫黎侯黎侯寓衞衞不能脩其職及戎之伐凡伯衞且不救致王臣之無援逮為狄滅齊復為之城以居之衞人㤀亡可謂飲其徳矣今也卒再朔則遽起而伐之况王在難而乃稱兵滅人之國絶先祖之支體無人類矣故聖人書曰衞侯燬滅邢夫春秋國君未有生名之者今曰燬盖甚責其無人類也禮云諸侯不生名失地名滅同姓名此以一節而測經者其説未然書稱吕伋君奭詩言召虎生名也楚子滅䕫蔡滅沈晉滅下陽虞虢滅同姓也衞侯奔楚郕伯徠奔失地也而皆不名采地之大夫附庸之君未爵命于天子則不盈乎君道不盈乎君道而猶異乎列臣故平居則字有所降則名諸侯之大夫平居則族而名之有所降則舍族惟天子尹宰與公之孤特貴故又以官加之異列臣也姓有同異其所以滅之貪土地利人民上絶王命下絶人紀其惡一也楚子䖍誘殺蔡侯豈同姓哉杜諤黎錞更以燬字為因下文燬卒而誤増之不知文宣之前滅國皆人無稱爵者此将名之不可曰衞人燬故特加爵正如楚子䖍者豈二爵亦誤耶胡以名為常不名為變陋矣翟侯爵成王次子云翟今洛陽城中太倉西南池也世紀景王葬翟泉在今東陽門内大街北太倉中北眺翟泉戴延之云太子宫東今無水肜伯爵成王子唐韻作彤云成支庶單成王子單子國單襄單伯子也今單之單父非魯之單伯鄭伯爵厲王子初采咸林載言作棫林國語元和志通典寰宇記皆作咸襄六年棫林許地今華隂鄭縣西北三里古鄭城縣道記云古城連接今州城天保中官路其中東西連三小城宇文朝移于西南九里故鄭城開皇三又移里州北故鄭城屬京兆盖未為國國語桓公采地咸林乃初縣在鄭者秦武公十一年班志宣王弟桓公封劭云母弟友所封子與平王東遷更稱新鄭瓉云穆王以下都西鄭不得以封桓公公為周司徒王室将亂謀于史伯寄孥賄于虢鄶間幽王敗一年滅鄶四年滅虢居于鄭父之丘是以為鄭桓公無封京兆之文師古亦非之盖是采于彼今因其名以來此非至此始有鄭名京兆畿内自不妨于王都晉鄭焉依謂武公文侯爾固不為新鄭新鄭幽王敗武公徙河南併虢鄶十邑居之曰新鄭故荘公曰吾先君新邑於此若新豐者今鄭之新鄭祝庸之虛南鄭今興元耆舊傳云桓公死於犬戎其民南奔漢中為南鄭櫟鄭别都厲公居後屬楚王隠云翟也今許之陽翟荘公城櫟寘子元制此制虢東虢也本滎陽隠元年而北制虎牢乃成臯五年今孟之汜水有制氏成十六制田鄭地滎陽制澤今宛陵東共共叔邑杜云汲縣非京太叔封所謂京索鄭詩叔出于京者今滎陽東南二十有故京城故京漢後齊廢成楊侯也宣王子幽王封之曰楊侯其地平陽楊氏縣漢之河東楊縣也陸宣王支子陸氏譜云封陸鄉為陸侯謝宣王支子是為謝丘盟㑹圖云謝城兖之龔丘與姜任二謝異縦平王子精封英賢錄云因為精縦氏梁平王子唐封南梁也今汝治梁縣有梁山梁故城在承休西南四十哀四年梁云河南梁縣縣道記云梁縣西南十五古梁國城十三州志云周南鄙邑國事云南梁楚襲之安定梁氏出此周平王子秀封在汝川秦滅之為汝南郡光武封姬常為周承休公居麻城今在汝之梁縣甘惠王子叔帶封即昭公生成公成公生簡公及悼公過酈元云河南城西二十五有故甘城俗曰鑒城在甘水東十里洛陽南北對河南故城佑云城在頴之頴上陽樊景王後河陽濟源東南三十八皮子城是即皮氏城水經􅀈逕陽城即樊氏邑無終薊之玉田故無終縣陽氏譜云春秋之末爰宅無終仙傳拾遺陽翁伯適北燕葬父母無終山有天祚玉田事亦見于寳記范通燕書云後有雝于無終山獲玉是也鄄敬王子或作甄非劉子盟處周地與元和志云濮州理故鄄城中栢所封曹植汜襄王居鄭邑拾地象云汜城在許之襄城南韻云國云言凡有氾水在濟隂皇王猛居􅙉也今鞏西南有皇亭記多作黄非京相云訾城北三里有黄亭黄陌黄水訾城今𨽻鞏陽人中山東周分釋地云鮮虞地中山國治盧奴佑云常山靈夀中山國有故城在西北靈夀今𨽻真定張矅中山記云郡謂中人城城中有山故號中山其山仄而欽上若委粟漢中山靖始移郡出山居廬奴隋經云中山城在今唐昌東北三十中山故城是中山故宫在安喜釣臺戲馬膚施今𨽻延安即漢之靈夀世本中山武公居顧桓公徙靈夀右周氏世封可見者公侯百里伯七十里子男五十里百里大國七十里次國五十里小國此三土也唐虞三代以莫不然周官武成王制之言成王周公經世之制率此不越然在行人司儀儐禮皆以公為一等侯伯一等子男一等故世遂以公為上國侯伯中國子男為小典命注夏官序更以公侯伯為一子男為一則侯伯俱為大國子男小國徒二等矣公羊説者復以伯子男同稱子謂春秋書變周従商制皆従子此特國語師旅之説盖因子産一時自解之言尤無足據子産當時特以鄭伯班次許男有所不平而為之語故曰鄭伯男也而共公侯之貢正亦以是為辭且欲下其貢于諸男而已豈得視為品之成邪乃若白虎通義禮記外傳謂商爵三等而無子男武王増之始為五等董繁露言周爵五等土三品春秋三等合伯子男為一爵土二品康成定謂箕子微子為是畿内因乎夏制且謂質家爵用三等文家乃用五等微所取南宫武王時有南宫仲見宣和博古圖春秋時周大夫南宫極其裔也即冀之南宫縣盟㑹圖吕后封張偃為侯國宻盟㑹圖云周圻内國宣王滅之此河南宻齊桓公宻妃國然宻康公墓在靈臺故説者以為涇近也榮榮伯采榮叔也説為榮錡今河南鞏西之榮錡澗子朝之亂景王崩于榮錡氏大夫食其地者然榮城伯駕鵞魯出聲伯盻之后也萇瑕周之支酈氏云山桑縣有瑕城晋使詹瑕處瑕燭之武所言焦瑕即唐改蒙城今𨽻亳晉恵臣賂秦者各一國桃僖二十四年桃叔采尹子朝入尹周地昭二十三尹氏采杜謂鞏西南偃師今汾州有吉甫墓記即其邑鞏鞏伯國晉鞏朔亦曰鞏伯今河縣鞏縣西周故居酈氏云有鞏故城洛地圖云在洛之間四面山鞏固也康見前仍仍叔采暴暴新公采鄭邑也一曰隧世本云周圻内國文公八年㑹雒戎盟于暴鄭詩謂周圻内無暴邑失之箋云為卿士者皆食圻内故有周召毛原荘祭尹樊鄩成單甘劉南宫而無暴單巷巷伯采姓纂云巷伯後氏頽頽叔采為頽氏邵云姓解云頺人姓方方叔采許説文云邡廣漢縣乃什邡非此周書武王命伐方乃商圻内卭卭叔采山陽卭成縣富大夫富辰采鄩子朝之亂郊鄩皆為之邑故有上鄩下鄩北鄩南鄩之名今鞏西南有地名鄩中有鄩谷水故鄩城即大夫鄩盻采詹詹桓伯采昭九年大夫詹父後詹嘉為晉瑕大夫非楚詹尹家家伯采後有大夫家父幽王太宰右周氏族卿之采日為君月星為臣是故月近日則虧逺日而盈星近日則伏逺日而疾臣之于君則近厭而逺申是故外以邦國内以都鄙外侯射三内侯射二司裘外守節以玉内以角掌節外逹節以金内以管小行人外之城制以隅内以門阿外經途以環法内以野法匠人天之道也車攻之諸侯㑹王則赤芾而不以絑覲禮之侯氏朝王則墨車而不以輅㑹王畋獵則王者不合圍諸侯不掩羣在國畋獵則國君不合圍大夫不掩羣王賓射則公執璧卿執羔諸侯賔射則卿執羔大夫執鴈王視朝公卿特揖大夫旅揖諸侯視朝則大夫特士旅之盖諸侯之在國則南面制節以存君道而有以與王同徠朝則北面謹度以全臣道而必以與王異此禮之大辨也雖然公侯伯子男命數五七九而公卿大夫命數八六四或竒或偶説者以為在國陽爵居日下者隂爵則有不然五等之命非無六八公卿大夫非無五七九也特五等以尊言而公卿大夫以卑言尊言竒卑言偶従其辨順也三禮義宗雖云公卿大夫以四六八然亦有七命卿若五命之大夫如公作伯則亦九命故云元士三命則隂爵非特偶也四六八此而上爾公侯伯子男五等正矣故以附庸四命則陽爵非特竒也九七五此而下爾云公八命卿六命大夫四命此與内夫人嬪世婦相應言公侯伯子男五等而妻皆曰夫人則其命為可下上大夫卿中下大夫四等而妻皆曰世婦則其命為可上矣以四命大夫視伯六命之卿視侯則知侯八命矣周之諸侯實惟八命非王後不為公避九命也困之九二絑紱方來利用享祀九五赤紱利用祭祀赤紱為君絑紱為臣祭祀祭帝而享祀則人鬼矣是故絑紱為降漢代丞相東西曹掾比四百石餘掾比三百石屬比二百石故曰公府掾比古元士三命者其儀為可知矣正曰掾副曰屬漢舊儀注召邵也預云扶風雝東南有召亭雝今鳯翔天興東遷後采於垣則今縣東北六十召原也有康公廟廟在王屋西三十五原在縣西四十寰宇實為奭又記垣之古棠為公分陜之地非也説文邵晉邑謂郫邵齊師所戍皇興元置邵郡大統為邵州義寧元為邵陽郡然易縣故淶水縣城在州北四十二亦曰邵云周封邵公于此盖歸老之地興國六年併入易燕召公初封春秋之燕亳以其僻逺有寢丘留侯之意地逼山戎六國時寖大置漁陽上谷右北平遼東西郡地秦滅之為上谷郡漢立燕國昭帝為廣陽國廣陽郡武徳元年為燕州今幽治薊國史云今范陽縣北燕燕之分燕地廣矣北燕伯云亦姞姓者以燕而名予初謂爾按張采使遼錄云北中京牛山館北去羣燕飛翔大如鳩鴿其燕州乃隋遼西郡以處諸部内附事詳隋北蕃風俗記陽燕之分本曰唐併之大谷漢之陽邑今定之唐縣班志云燕之别邑昭十二髙偃納北燕伯齊人遷之閔二年盛盛伯國亦曰成續志云濟北成本國預謂東平剛父西南有盛鄉竇苹云鄉今在鄆即晉之剛父公羊云成者何盛也盛降于齊諱其滅同姓書曰成右燕召之屬治國之道牧民而已牧民猶牧馬必人安其馬馬習其人胡為而數易之嘗試語來建康一㑹府爾而史氏之所志自開寳八年盡乾道之三二百載中牧民之使已百二十有五易其罷去若祠去與夫致仕而去者咸六不禄若憂去者五不見其去之期者二十一召去者十有五而即除者五十有六其得滿而替者二十有一而已或一年或半年或一月或二三月若王益柔之至俯六日而迢迢應天府矣再任俯七而馬亮乃四受部然亦未嘗一因任者區區徠往俗安得不啙窳民安得不罷敝哉府之邑屬正可知矣府與邑屬宰牧若此天下又可知矣史正志書方太平興國之八年日本僧奝徠朝𠻳其國主相襲者六十有四世矣文武僚吏悉以世官上顧鼎臣喟然嘆曰是夷虜者而世嗣乃如此臣下世爵能有古道中國即自唐季海内分裂五代世數尤以淺促而大臣子孫亦鮮克繼父祖基業朕雖不逮往聖然孳孳願治未嘗自佚所冀運祚隆永諸臣世襲禄位㒺俾逺夷擅享斯美由此語之持久不動之為美可知矣句麗國主髙姓故漢書國志皆曰髙句麗隨始去句字然五代史同光元年韓申來其王尚姓髙則秦漢至是亦止傳一姓也孟軻曰所謂故國者有世臣之謂也武有天下卜年七百而魯衞燕宋皆垂千祀周召毛原尹劉榮單布滿朝著悉世其禄與周匹休有天下者固将君臣相與守其家法以保其禄于無窮焉而已矣海邦干數覉縻八百莫非世襲不可得易此有天地生民以來自然之道也何至朝恂莫縦一龔十寗為黔首尤哉嗟乎天語重開可謂百世幸矣而當時在廷莫有成其美者豈識學之未詣哉天時之未厭哉王嘉曰孝文帝時居官者長子孫以官為氏其二千石長吏亦皆安官樂職然後上下相望莫有苟且之意及孝宣親政以為太守吏民之本數變易則下不安民知其将久不可欺罔乃服従其教化故侍中尚書功勞當遷及有異善至于子孫終不改易黄霸亦云數易長吏送故迎新之費及姦吏緣絶簿書盜財物公私耗費甚多皆常出于民至和三年諫官范鎮言恩州自皇祐五年秋至去年冬知州事凡七換河北諸州類如此欲望兵馬練習固不可得伏見雄州馬懐徳恩州劉渙冀州王徳恭材勇智慮可責之以辨治乞令久任任之不久而欲其成事不可得也李牧為趙將功以久而成李勣守并州威以久而伸而晉人隂計中吴則使其将帥屢易議故渾濬得以收功盖責任之不久則不足以有為而卒功業也榖伯爵預在筑陽今襄陽榖城西北五里有故榖城有榖伯廟小榖齊魯城小榖以為管仲私邑荘三十二城中有夷吾井即管仲井本曰榖景公曰桓公以仲為有力邑狐與榖者乃姜㑹齊侯處後漢置榖城縣屬東郡晉廢入東阿故城在縣東小穀魯邑孫明復云曲阜西北有小榖城有榖城山張良得黄石處或曰陽榖僖三東阿南東四十二有陽榖亭息侯爵楚文滅之荘十四釐王一年今蔡之新息北三十有古息城孟康云後東徙加新字西十有息侯廟周息州也説文新鄎鄎姬姓按春秋别有鄎齊南鄙􅉸伯爵鄭入而秦滅之襄三十二年鄭入􅉸十三年伐之二十五滅于秦後晉取之今拱之襄邑西北有􅉸亭鄭地為周秦晉鄭更邑本水名宣八楚子及􅉸汭後遷于費曰費􅉸今偃師緱氏鎮有古􅉸城滑臺􅉸伯廟九域志在􅉸之白非􅉸州去州四百里養繇基先邑今汝之郟城有養水楚子逆吴公使居養在此極魯附庸無駭入之隠二年榖梁子云滅同姓也隨世本云姬姓楚滅之桓六年楚侵随八年伐之隨侯逸荘四又伐之僖二十年以漢東諸侯叛今隨之隨縣晉之隨郡有虵丘隨侯臺墓丹逢楚屬春秋時有逢伯或作逄誤􅒀涇之鶉觚鱗見潛夫論春秋時有鱗朱主頓子爵昭四楚滅之定十四今陳之南頓故頓縣有故頓城十三州志云南頓西三十故頓子城在頴水之南故號頴隂城劭云迫于陳後南徙曰南頓後魏為南頓郡鼓子爵白翟别鳶鞮國中行穆伯攻之經年不能下荀吴滅之傳昭十五圗鼔二十二滅之今祈之鼓城唐屬定有鼓聚在定之槀城漢下曲陽肥子爵本白翟地晉滅之傳昭十二八以肥子縣臯歸月真定之肥纍城也在槀城西南七里漢下曲陽後齊廢入槀城今屬真定肥子後歸燕封之肥如如歸也漢故縣今牟之盧龍或作邯鄲有故肥鄉縣城紀年梁恵王八年伐邯鄲取肥地道東太康八年立𨽻廣平宫之奇之先國玉篇􅀈國為徒冬切非㝠鄍也冀為不道伐鄍三門乃虞地僖二杜闕今陜之平陸東北二十有鄍城周四里又有上鄍成二年㑹晉師處説文晉邑麗麗姬家商時國盟㑹圖元和志一作驪男國也集韻作孋非秦曰驪邑今臨潼東二十四有故麗城道里記云髙一丈五尺盟㑹圖在雝之新豊漢之新豐唐之昭應祥符改曰臨潼元和志作驪戎故城在昭應東二十四里非驪戎之國載左傳有載國風俗通云姬姓後陳留外黄是韻作􅲍云古國紀今緱氏故紀縣胡子爵楚滅之昭二十三吴敗胡師胡子髠滅定十五楚方滅胡以胡子豹歸相去二十五年盖楚之所立姬國也哀六平王二十六年鄭伐胡武公曰胡兄弟之國也越世家云析酈宗胡索隠云宗胡邑為胡姓宗非乃宗姓胡爾今頴治汝隂西二里有胡故城范史云汝隂本胡國杜在汝隂西北盟㑹圖在豫州郾城故有胡隂胡陽胡隂本山陽胡陵章帝改之胡陽縣𨽻南陽與胡公之國異隗運冀冀子冀戎國今秦之清水故伏羗城秦漢之冀縣也秦武公十年伐冀戎為縣隗囂據此稱西伯賈伯爵華之蒲城西南十八有故城賈大夫冢非賈伯伐曲沃者左傳芮伯梁伯賈伯伐曲沃又臨汾有賈鄉芮伯爵今陜之芮城百二十有芮故城水經河水自河北城南東逕芮城芮君祠九域志商代國西伯初虞芮訟今平陸西六十閒原者所争田也東西七里南北二十周為司徒書注周同姓圻内國為大夫寰宇記周司徒封芮為附庸非杜云馮翊臨晉芮鄉臨晉城在朝邑西南二里秦滅梁芮繆公二年唐為芮州武徳二年集韻儒劣切非魏今陜治平陸有古魏城在河伯縣在河之東北南西去河各二十餘里北拒首山十里所故魏風著十畝之詩詩叙言魏君儉嗇褊急近秦晉日見侵削平桓之世變風始作事無所見此依詩以意為之言爾晉獻滅之以賜畢萬閔二芮萬奔魏故或以魏為萬邑紀年晉武公七年芮伯萬之母芮姜逐萬萬奔魏八年周師虢師圖魏取芮伯而東之九年戎人逆之郟又云桓王十二年秋秦侵芮冬王師秦師圍魏取芮伯而東之萬見左氏桓三年同姓也傳魏姬姓國郡國志陜州魏城昔芮伯萬毋惡子逐之于魏處非其國焦𢎞農陜是本北虢之上陽晉滅之恵公以賂秦紀年魏襄王六年秦取我焦其大城中小城故焦也云召公子譙侯之舊國樵云焦故城在陜州東北百步非亳之焦梁載言云姬姓與亳之姜姓焦别酈元以為神農之後歐志亦謂武封炎後在此非也按傳虞虢焦􅉸皆姬姓也晉是以大後十五年燭之武説秦亦以焦瑕巴巴姬之國楚靈妃晉文公西伐巴蜀此也吕氏春秋今果之南充預云巴之江州縣江州今恭之巴縣紀年桓王十七年楚及巴伐鄧項子爵齊滅之僖十七年左云魯滅之非也公穀以為齊得之此蒙上伐英氏文内不言滅漢之西華後曰項城今縣𨽻陳東北一里有故項城楚襄徙陳以項為别都楚考烈滅魯封其将于項為項氏晉諺堅不過項者史項梁父項燕世楚将封于項徐徐姬國齊桓妃穆王時滅偃以封姬姓鮮虞本子姓國詳見商後以處姬姓子爵翟也種地最廣白狄也晉語有蒲人翟人中行穆子伐翟乃鮮虞也春秋昭十二年晉伐鮮虞十五年荀吴又伐定四年士鞅哀九年趙鞅又伐之列子襄子攻翟取左人中人未嘗滅也應劭地理記中人城西北四十有左人城左人之故邑左人即今定之唐縣昔陽子爵本肥馬肥子後遷昔陽今平定之樂平東五十有昔陽故城杜云樂平治縣東有昔陽城是晉滅之昭十二年九域志趙鞅晉陽寰宇記荀吴假道于虞遂入昔陽鮮虞在北昔陽在南晉恐肥為備故従北偽東南行往㑹齊師乃先還假道鮮虞遂入昔陽也故鉅鹿境一曰夕陽開皇置昔陽于下曲陽置今祈之鼓城夏陽下陽也僖公二年虞師晉師滅下陽書滅國矣或曰虢邑非也滅國曰滅君死其位曰滅虞虢之亡不書五年而書下陽之滅于此罪虞也下陽虞虢之所恃下陽滅而虢去虢去而虞舉矣滅下陽者晉而以虞首兵賄也虞之賄孟子三傳詳矣右周之餘族可見者烏乎姬周之國楙矣方其晟時述職朝覲㑹于明堂日省月攷時享嵗貢來有湛露之燕去有彤弓之送怡怡偲偲以藩屏周及其衰也召穆公思周徳之不類故紏合宗族于成周而作文王之詩曰棠棣之華蕚不煒煒凡今之人莫如兄弟周之有懿徳也猶曰莫如兄弟故封建之其懐柔天下也猶懼有外侮故以親屏周是以楚子彊梁心張問鼎而猶畏迫宗周不敢竊發不幸後世上失其道宗國恣横諸侯相併王官不討陵􅜃至于三四然後枝葉相扶赧降為庶尚四十年而後秦得而挹之宣王以降世乏令王然如齊晉勤王世有能者故猶五百厯年數極徳盡而後位去則磐石之宗可賴也一自東遷宗國恣横謖相侵伐以至于滅禽父一國當春秋伐侵國者十入國者六圍者十三取者十四而伐人之國者四十九㑹伐十九及伐者三而公之伐者又十伐若以某師伐者咸一大夫伐九而㑹伐者又六公之伐十而邾居其六大夫伐九而邾居其七公㑹伐十有五而鄭居十二人之侵我五伐我者二十一而齊居十五追戰敗滅不與存焉其諸為可知矣鄉使宗國循良不躙外姓以穆諸姬則周室至今存可也詩云騂騂角弓扁其反矣兄弟婚姻無胥逺矣爾之逺矣民胥然矣魯棄同姓従而伐之其為反也不已甚乎齊之見伐其為然也不已洵乎或曰諸侯之吞威勢之必至楚荘滅陳而以為縣樂毅下城七十皆郡縣之是破滅諸侯不可復封建矣曰不然楚之不縣陳當時之論亦已明矣而燕之郡齊城亦孰見其安且利哉伊昔先王所以立之九伐之法者凡以禁其相吞景風至而利建建徳策勛存亡繼絶者所以為不滅之道而今諸姬恃親强恣陵蔑外姓循至尋鈇此秦楚所以自為計不然則亦俱把宋而弊矣嗟乎王法不行使秦得志盡絶先王之世豈惟秦之罪哉盖由諸姬自賊之所致也路史巻二十八

body:
  text: 路史卷四十五宋羅泌撰餘論八即位書元非春秋立法元年者史氏之本辭也君即位之一年稱元古之史皆然書云太甲元年維元祀而虞夏傳亦有舜元祀之文然則即位之年稱元其來久矣非春秋始為法也元者善之長聖人之所以見乎用者也大哉乾元萬物資始此天之所為用也至哉坤元萬物資生此地之所為用也體元者君之職而調元者相之事是故曰元后曰元聖曰元宰謂一為元者以其德於是乎始所以奉天地而為用爾古之君子必即位逾年而後改者將以重遽革必不敢以前之餘為今始也於其改也亦行告廟之禮而後行事此國史之記時政所以必書即位之年為始事或曰元善非也不有元惡何獨善然則稱元者直欲其奉元以養物而成德亦所以示正本謹始而已矣是故君子必能盡人物之性而後可以贊天地之化育能贊天地之化育則可以與天地參矣得丘民者顧可不自謹其所始與原尸于祭有尸見君子氤氳事神之盡也三代之時自天子至庶人祭皆立尸秦漢而來兹事廢矣故或者遂以是古重尸為執滯豈識聖人之意哉神依人而行者也宗廟有尸以盡孝也而自天地社禝山川羣小祀一皆有尸則亦以事父母之心事之也或曰今之像設方之于尸則尊且嚴矣得先王之意奚必古之拘哉曰不然尸與主二道古者尸主並用故祭五祀皆設主三祭而後迎尸祭五祀于廟皆席于奥户則設主戸内之西竈于門外之東中霤牖下門則于門左樞而軷禳在門外之西皆三祭既徹而後陳俎饌各于筵前迎尸始宗廟之禮中霤乃中庭檐溜今俗所謂檐神說為室神非也特牲有主有尸而在逸禮祫于太廟毁廟之主升合食而立二尸五廟七廟皆無虚立勝國之社有尸無主而邦國都鄙之社則有主無尸犯軷為壇菩芻棘柏為神主亦有尸焉故坊記曰祭祀之有尸宗廟之有主示民之有事也曽子問既殯而祭五祀尸入三飯則有尸可知矣一人發爵則七尸七廟矣發爵主尊故不酢酬譙周禮祭集諸侯之廟有木主在尸之南為在尸上今之象設特古之主而已君卒哭而祔祔而作主主立而埋重始用嗣尸虞而立尸其主以桑練而易之遂藏於廟以為祭主是未祔則有重無主既祔則有主而無尸必虞而後立之也少牢之祭有尸無主蓋祫則有主而不祫無主故自卿以下無主者依神以几筵大夫束帛依神士結茅為叢聖人之意豈兹俗之所知哉公羊云大夫聞君之䘮攝主而往則大夫有主矣昔衞孔悝反祏西圃故徐邈等以為有重則宜有主大夫士不見無主之義而魏清河王懌遂以為大夫士宜通立主豈識聖人之意嗟夫鬼神之事雖聖所不盡言然其制數亦有可以見其情者大氐神鬼陰屬非附陽體則不可以見是故尸以託之郊之祭也尸與王裘冕而士師逆尸者亦裘冕舜入唐郊丹朱為尸晉祀夏郊董伯為尸則祭天有尸矣周公之祭泰山召公為尸繹賓之尸髙子靈星而是三辰山川為有尸矣言登祗用一尸則祭統設同几筵者也其在魯郊亦以祝延帝尸稷尸從之而公羊氏白虎通五經異義俱以為祭天無尸則似失之祭天有尸則地可知星有尸則日月可知山有尸則川瀆又可知白虎通謂天無形不可象故宗廟有尸而天無尸非也聖人之制祭致敬而已豈係於有形無形哉鳧鷖美神祗祖考者也而五章俱有公尸訓者固以初章為宗廟二為四方百物三為天地四為社稷山川五為七祀則成周之世大小神祀皆有尸又可知矣推此而言則諸侯之境内山川大夫有采地之五祀皆有尸也特牲者士禮而少牢大夫禮也一皆有尸則諸侯有尸矣祭統君執主瓚祼尸諸侯之尸也守祧王祭祀各以其服授尸天子之尸也是自天子至庶人俱立尸矣始死無尸尚其生也成䘮必尸神始識也祭殤必厭示弗成也無後必厭為無人也男女異尸以厚别也同几二尸神所合也夫婦共尸貴同牢也宗廟異尸近必詳也毁廟同尸逺欲合也尸必以孫示成人也婦為尸坐不拜手不脫屢嫌燕媠也祔用嗣尸尚質也既封主人贈而祝宿虞尸以盡孝也為人子者不為他人尸厭也天子宗廟之祭以卿之孫行者為尸諸侯則求於大夫之孫行者皆以同姓之嫡昭穆同也成氏云未䘮之前形柩在殯以生事之故䘮奠無尸虞祭之日始立尸天子不以公諸侯不以卿大夫不以家臣以避君也天子不以子為己父之尸諸侯不以己嫡為尸卿大夫避上嗣舉奠亦不以己嫡為己父之尸是故子未立者小于同姓之嫡而無父者勝國之社稷小司冦為尸司冦士師以法殺也凡大禋祀肆享祭示則大祝執明水火而號祝隋釁逆尸令鐘鼔侑亦如之大䘮始崩以肆鬯溉尸小祝大祭祀則逆齊盛送迎尸沃尸盥贊隋贊徹大䘮則佐大祝贊渳以盤盛水共尸盥士師祀五帝則沃尸及王盥洎鑊水宗祝後尸大䘮則鬯人供鬯以釁尸郊祀則節服氏裘冕二執戈送逆之相尸者延其出入詔其坐作既䘮令徹大夫于尸再宿一戒士一宿不戒君前三日而宿戒之既得日乃宿戒尸明日朝服而筮之大夫前祭一日士二日吉乃宿尸祝儐明日而祭祥去要絰而筮尸練則繩屨大祥則吉服尸服卒者之上服其士𤣥端其妻宵衣不以賤父為士子為大夫葬以士祭之尸服以士父為大夫子為士葬以大夫祭之尸服以大夫父為士子為諸侯祭以諸侯尸服以士父為天子諸侯子為士祭以士其尸服以士罪也為君尸者弁冕而出乘之以几卿大夫見者下之君知所以為尸者則自下之掌次共張司樂奏夏出入廟蹕過者趨走以教敬也君與尸行接武大夫繼武士中武尸之為用重矣大夫為先君尸在廟門外則疑于臣子在廟中則全于君與父君在廟門外則疑于君父在廟中則全於臣與子是故君迎牲而不迎尸大夫士以祝迎尸天子諸侯則以士延尸于戸外尸入升筵東面坐視主人西南立拜妥尸尸答拜之遂坐按祭君獻尸尸祼之后酌璋瓚尸祭之啐之祭后朝踐既四獻而饋食於是薦熟乃變几王及尸有倚住引尸入室詔妥尸尸縮酒啐之既六獻而後朝獻畢而交酢及九獻賓也王與孤俱四獻諸侯為賓者一尸飲五君洗玉爵獻卿尸飲七以瑤爵獻大夫尸飲九以散爵獻士羣有司皆以齒示等也既酢諸臣遂降冕而總干舞大武以樂皇尸嗣子諸臣加爵三旅酬武算尸謖君與四卿餕之夫人薦豆執校執醴授之執鐙尸酢夫人執柄夫人受尸執足尸飲三衆賓飲一示民之有上下也尸出尸上嗣食之卒食告飽主人酳尸尸酢主人次主婦如之賓長亦如之利成祝入尸謖主人降祝先尸從遂出從尸者不出大門所以交神明而明君臣之義子事父之方也夏立尸而卒祭有事坐之殷坐尸無事亦然周因于殷尸故坐亦旅酬六尸惟稷之尸發爵而不受旅告尸行節勸尸飲食詔侑武方若孝子之就養其事然也始于神事故朝踐以腥坐尸于堂詔血于室終以人養故饋食以熟延尸主于室體饌而進主人獻尸賓長以肝從主婦獻尸賓長以膰從酌尸之僕猶君之僕象之也始作樂求之於天也既灌鬯求之于地也於祊於彼乎於此乎則又以求之人間世而吾之禮意殫矣是故樂合而先祖是聽灌降而神鬼來享蓋有以知其必臻必享也夫神猶火也火生無形因物顯照物盡而火熄神本無方因物顯用物盡而神藏是故火非可盡也而在物者為可盡神非可盡也以其在物者有可盡之理也古者于文火聿于皿為盡而火之盡者為燼凡以是也子曰鼓之舞之以盡神也三日齋七日戒凡以求合于氤氲縹渺間而已矣白虎義曰祭之所以尸以其虚無而寂寞也視之無形聽之無聲升自阼階仰視榱桷俯察几筵其器存而人亡思慕哀傷無所寫洩故坐尸而食之毁損其饌欣然若親之飽其醉若神之醉也詩云神具醉止皇尸載起鼓鐘送尸神保聿歸諸宰君婦廢徹不遲是故侑神尸入舉角妥尸食為之節及乎酌盎啐尸有至沽醉旅酬降冕則尸弁而舞之以盡神也後世禮闕尸不復見而夷蠻之中容或存者周隨蠻夷傳言巴梁間俗每秋祠祀則里之美鬚面者迭迎而尸祝之栁道之人祭亦取于同姓之丈夫婦人伴享此則尸之餘事而今巫童方士亦有憑身附體之法其所以交神明猶有聖人之遺意獨在國家宗廟山川寂然亡矣曽子問曰祭必有尸乎則固久疑之矣而魏髙允亢書文成乃以為祭尸久廢今俗或取貌之肖者為尸祭之為之宴好敬之如夫婦事之如父母損敗風化而杜佑更謂古人質樸華夷同俗故有人徇死祭立尸事非所宜用嗟乎彼亦豈知聖人之事親一毫髮之不盡則不足以致其孝而其所以交神明者有不可以盡言耶鸞車有虞氏之路大馭凡御路以鸞和為節鸞和君子之所以和心而養氣者也升車則馬動馬動則鸞鳴鸞鳴而和應其所以和心而養氣者步趨不廢也乗車鸞在衡兵車在鑣而遣車亦曰鸞車則凡車必有鸞矣春秋傳曰鍚鸞和鈴昭其聲也君子之行馬題有鍚旂首有鈴豈特鸞和然皆不若鸞和之鏘鳴也故前者命以鸞後者命以和特言鸞車有虞之路者豈其制若三代之車與明堂位曰鉤車夏后氏之路而司馬法夏后氏曰鈎車鈎車者先正也蓋曲其輿前謂之鉤命之所乘與兵之先正貴賤雖殊其致曲一也鄭康成以鉤鞶釋司馬之鉤車誤矣山車垂鉤伊古之瑞此鉤其轅非鉤車也舜帝無為為治有序為者敗矣而無為之說為世患尤不淺虞帝之初闢四門明四目在璇衡以齊七政類上帝禋六宗秩山川而覲羣后恊時同律修禮詢岳命揆攷績其為勤亦至矣而先聖以為無為而治代之說者遂以為放凖遺繩一無所事如道家者流所謂無為清虚放蕩汗漫而不可縶者於是滂洋恣肆禮法之外絀是非遺成敗聽其雜揉而任其所自為權柄綱條一切委置不之或省而天下始大亂矣虞帝之無為豈如是耶夫其言曰臣哉鄰哉鄰哉臣哉言臣則吾之鄰而鄰則吾之臣所相附者為相近也故其告諸臣曰臣作朕股肱耳目予欲左右有民汝翼予欲宣力四方汝為予欲觀象作服汝明予欲同律聲在治忽以出納五言汝聽是所謂股肱耳目者予違汝弼豈其不事事哉汝翼股也汝為肱也汝明目也汝聽耳也俾禹司空平水土棄后稷播百榖卨司徒敷五教陶為士理庶獄垂為工利器用益為虞若上下伯夷秩宗典三禮䕫典樂教胄子龍納言典出納各職其職然後内外之節得而帝方以優游巖廊之上本仁祖義總𢎞綱而莫敢佚其為治固有序矣方鴻水之未平天下之事固無以大于水故首命禹及水既乂大陸既作則惟食之為急故次命稷富斯可教故次命卨徒善不足以為政故次臯陶而其化以大行于是命垂以給其器用命益以遂其動植而後神人可得和故次伯夷成其典禮又次之䕫以興其樂而王道此成矣然而天下之事尤防乎壅上之不下宣下之不上達則政不可得而治故卒命龍為納言而後上下以無㙲一得禹而地平天成再得陶而民恊于中得稷而蒸民粒得卨而百姓親得益而庶物蕃得夷而上下讓得䕫而庶尹諧夫然故虞帝得以被袗鼓琴端拱一室之上而天下治豈其不有為哉不自為耳故曰無為而治者非無為也任得其人而無事于屑為也故用歌曰陟天之命股肱喜哉元首起哉百工熙哉蓋帝之所以無為而百工熈者凡以諸侯之汝為汝翼汝明汝聽也豈若是蔑禮節隳形體而自放于繩凖之外與昔者孔子嘗欲無言而曰天何言哉四時行焉百物生焉夫天地以生物為大功者也其所以行四時生百物固未嘗有為也四時自爾行萬物自爾生而已天下之人非皆不可有為亦非皆不可以無為也有為者商賈之事而無為者佛老之事也商賈佛老一身之外皆越人之肥瘠而代天地司牧者天下之人皆吾之人天下之事皆吾之事固可以商賈治佛老治哉賤商賈尊佛老固非至論用商賈與佛老治怨美雖殊其敗事一也故曰舜之無為六轡在手佛老之無為䘮其兩肘此其所以無用禹臯戒舜人之言曰為君難為臣不易子曰如知為君之難也不㡬乎一言而興邦乎方虞帝時臯陶矢謨曽微髙絶之訓而惟曰后克艱厥后臣克艱厥臣此興邦之言也政之乂黎民之所以敏德繇此而已此帝之所以俞之而曰允若兹者言君臣之艱信如此也夫君臣之所艱不過舉善進言而已世之庸君從邇之言有不察也而况于嘉言乎此罔攸伏之所以為艱也在廷之英有不舉也而况于在野乎此無遺賢之所以為艱也堂下逺于千里門庭之間有不及安况九洛乎此萬邦咸寜之所以為艱也忘賢自與而羣且不可虐况于無告此不虐無告之所以又艱也有能奮庸不能無廢况于不顯此不廢困窮之所以又艱也凡是數者君之所以有邦而臣之所以致君者也昔之人能是者欽明文思之后而已所謂惟帝時克者顧不謂克艱耶雖然帝之及此豈其不可能耶特亦撝謙而不自多爾有天下者非不知德業之為尚也然有其德者未必有其智有其智者未必有其才有其才者又未必有其時與位也今也其德廣運則既有其德矣乃聖乃神則復有其智矣乃武乃文則又有其才而奄有四海為天下君則又有其時與位矣復何艱耶而禹益之言猶若是者抑亦以敬其君勉其為君之難而已故方其志于治則戒之以惟艱及其以為艱則又勉之以可致禹益之忠于是至矣禹益之為臣于是盡矣帝德廣運云云此指舜言也孔氏以為益之美堯不然夫舜既立則羣臣之稱帝者皆指舜也如禹曰帝念哉帝光天之下皋曰帝德罔愆皆謂舜當舜之時舜謂堯為帝可也使益亦謂堯為帝則何以稱舜乎張子厚云此美舜也因舜歸美于堯故益亦歸美于舜其說為是賡歌治既定功既成此君臣賡歌詠太平之時也雖然聖賢之作豈徒然哉必有勸且戒也有不勸戒而徒為容恱之言是特中和樂職狎客之分韻者竟何補邪元首之歌此治定功成賡歌而不忘乎勸戒者也後世有如大風之歌謂之傑作可也然不過憶故鄉思壯士而已戒勸安在孝武而來芝房天馬之作為不少矣果何益也勑天之命惟時惟幾此安不忘危而有慮乎所忽之謂也股肱喜哉元首起哉百工熈哉此言股肱之臣樂于盡忠則元首有所興起而百工之職得其所也率作興事慎乃憲欽哉屢省乃成欽哉者言率人臣而造事在于循法度以責其成也元首明哉股肱良哉庶事康哉者言君明則臣良臣良而後衆事得而成也元首叢脞哉股肱惰哉萬事墮哉者言君煩苛則臣不作臣不作此萬事之所以墜落也蓋君明則小人去而英賢庀英賢庀故天下治君不明則英賢去而解謾職解謾職故天下亂其理然也雖然帝之歌先股肱而臯陶之歌則先元首何耶蓋有為之君常患不得其臣而有為之臣每憂不得其君患不得其臣故欲其臣之喜而後君有所起此僕臣正厥后以克聖也患不得其君故必其君之容而後臣有所作此后克聖臣不命其承也陳平有言上佐天子下使卿大夫得其職其亦體于斯乎唐虞之時主賢臣賢功成治定而歌詠之形一言之出不忘乎勸戒兹其所以萬世式胡益之堂上下樂說是非益稷之謨載后䕫之論樂胡益之始以為序有不倫傳者錯之而以䕫曰二字為疊出者夫八音與政通惟可以在治忽也是故無其德而作之則逆有其德而作之則和聲和則氣和氣和則人和人和則天地之和應此理之自然而無疑者夫一變而祖考格羣后遜再變而百獸舞庶尹諧此堂上之樂應也再變而鳥獸蹌蹌再變而鳯凰来儀此堂下之樂應也鳥獸率舞此近者聞而舞爾鳥獸蹌蹌則逺者且興起至於鳯凰来儀則非時出之物亦感之而来矣盖樂之入於物者其漸然也其文宜云䕫曰於予戛擊鳴球搏拊琴瑟以咏祖考来格虞賔在位羣后徳讓擊石拊石百獸率舞庶尹允諧下管鼗鼓合止柷鼔笙鏞以間鳥獸蹌蹌簫韶九成鳯凰来儀斯亦妄改聖人之經矣韶九變而鳯来儀豈一再變之功哉堂上樂舉其作而堂下之樂則舉其名豈非堂上之樂接物逺而堂下之樂接物近接之逺故惟聞其作之聲接之近則見其所陳之器歟詳近畧逺亦紀載之法然爾南風之詩步隲疏云舜命九官則無所用其心彈五弦之琴詠南風之詩不下廟堂而天下治南風之詩辭云南風之薫兮解吾民之愠兮南風之時兮阜吾民之財兮樂書所云南風之詩生長之音也舜好生與天地同意得萬國之懽心故天下治鄭氏謂南風者長養之風以言父母之長養於已也詩之南風亦言孝子歌之言已得父母之生長如萬物得南風而生者康成以為其辭未聞而聖證論引尸子家語以難之熊安乃以為凱風之詩其說異矣按纂異記有張生至蒲關夢舜召之問以何習對曰孔孟問孟何人及誦其書至徃于田號天怨慕之語帝曰蓋有不知而作之者朕舍天下二千八百年矣秦漢典籍泯其帝圖號天怨慕非朕之所行者莫之為而為者天也莫之致而至者命也朕之泣怨已之不合于父母何軻之不知答傳聖人之意顧如是乎吁而不已拊琴而歌之歌曰南風薫薫兮草芊芊妙有之音兮歸清絃蕩蕩之化兮由自然熈熈兮吾道全薫薫兮思可傳歌訖鼔琴為南風詠發聲稱妙故南風之德大矣琴書云舜鼓琴黄河清其亦見之聲乎舜為法于天下古今有異時無異理彼已有異迹無異心吾心之所存即天下之矜式而今日之所設即後世之視效也古之聖人所以獨立乎百世之上而天下後世有所不能遺者豈他術哉本乎心之一理而已聖人者知夫天下後世之有待于我也是故致察乎此心者有不得而盡蓋天下之理契于人心者即其所以形之吾心者也惟形之吾心者雖微而無媿則其所以契之人心者斯悠久而不渝茍在我者一毫不盡則推之于彼者斯厭棄而不繼矣音容之前有不約之妙形迹之表有不言之契有所待而後從固不若無所待而自化也約繩而信曷若相信於繩約之先告語而孚孰若相孚於告語之外邪古之明王為不少矣而舜為法于天下行乎千百世之上而清風之所存猶足以悚動乎千百世之下推之而不倦譽之而不厭愈久而愈不忘者惟其有以使民不忘之道而所以先施之者有由也仁義之精一之則舜之動無媿矣是故未施信于人而人信之法度彰禮樂著則舜之行無媿矣是故為法于天下可傳于後世是皆此理之契于人心者也人有是心吾有是理以是理觸是心兹其所以行之萬世而無弊與舜禹有天下而不與必不有天下者惟能有天下夫以一匹之夫而一旦與之天下正以君子處之恐未免入其心而舜視有天下與飯糗茹草時無以異禹視有天下與冠掛屐脫時無以異故曰舜禹之有天下而不與焉舜自舜禹自禹天下自天下果何與于我哉吾知修人紀立天極山龍璪冕柴立稱不榖而已矣漢滅諸吕召文帝于代而立文帝之初被詔也謀之羣臣又使宋昌觀變而後進西面而遜者三南面而遜者再是以一即大寶宇内平泰而幾致于刑措故曰惟無以天下者為可以託天下若昌邑賀日中逮晡馳百三十有五里從騎踵死於道烏足以有天下路史卷四十五

body:
  text: 路史卷三十九宋羅泌撰餘論二重卦伏羲子曰八卦成列象在其中矣因而重之爻在其中矣夫八卦成列斯小成也因而重之爻在其中則六十四矣小成者八卦自重者也是造六畫者伏羲而六十有四者亦伏羲也故世紀云炎帝䆒八八之體為六十四夫卦不六十四不可以筮天地定位山澤通氣雷風相薄水火不相射此伏羲之易也而曰八卦相錯盖一貞一悔必相錯而後見故劉安云八卦可以識吉凶知善惡矣而伏羲為之六十四變則輔嗣之言為得其本然而洛誦之流俱以為文王重卦因揚䧺之說而繆之也且昔聞之傅說之初赭衣而賃舂于巗既夢乘雲遶日而行于是筮之得利建侯是則前有豫矣滿招損謙受益謙與損益益稷之言不自後世畋漁之離謂之小成可也耒耜之益與交易之噬嗑此小成哉然則不自文王斷可識矣若古聖人立創一事則必周旋反覆極其至而後已固非若後世茍且依違稍可行而遂止者伏羲之時八卦自重亦自詳于施用特未見之文字至連山與歸藏反易上下則爻象已大備而世弗深究降及文王拘囚羑里用以卜筮加竄繇辭更改衍數以立大衍之策使之可衍而後文辭始詳遂名之以周易其所詳定固非為六十四實大衍之說也雖然衍數之立亦其本有文王者致其法爾七百六十八卦三千八百四十之變而後二百五十有六其本然也此歴法之所以歴代不能改豈後世邪鄭夫謂文王易八卦之方而次六十四卦其可知矣書契說書之叙曰伏羲氏王天下造書契以代結繩之政由是文籍生焉按書緯與孝經援神契則俱以為三皇無文故或者謂太昊結繩而治黄帝始有書契而班固鄭𤣥馬融王肅之徒更以為文籍起于五帝斯大繆也夫三墳八索不自後世而易卦本草本于羲炎豈五帝之為哉嘗竊稽之先天之書始乾終夬而書契之作實取夬象是則書契之興出于羲氏有不疑者子國之言初未必究乎此盖偶合爾而皇甫世紀遂爾從之善取㩀矣班馬之言頴逹既已辨之亦謂遂皇刻石已在伏羲前則文字宜與天地並興況史皇固已作書伏羲固已作易豈後世哉周外史掌三皇五帝之書而伏羲神農黄帝之書謂之三墳烏得云無文邪且洞神論三元八㑹為三皇之前鳥跡之始雖世無有然無懐氏固已封泰山昭姓紀號播之山石其書略已見于尉律則是伏羲之有書契為不迕也又況無懐之前昭姓之後已自不少俱有鑱勒見之封丘曷得謂至黄帝始有書契乎九井列山世言神農生而九井自出按九井在頼山荆州記云江夏隨縣北界厲鄉村南重山也井在山北重塹周之廣一頃一十畆内有地云神農宅神農生此神農既育九井自穿舊說汲一井則八井皆動寰宇記在縣北百里人不敢觸按今惟存一穴大木傍䕃人即其處為神農社年常祠之亦引荆州記所言厲鄉村厲山下之穴神農所生穴口方一步容數人上有神農廟即荆州圖永陽縣西北二百三十里厲鄉山東石穴也髙三十丈長二百尺謂之神農穴神農生于厲鄉者老子亦生于此故崔氏瀨鄉記以為老子教堂之故處秪今真源老子祠北三里有李母祠門内東院有九井述征記云汲一則八動然當塗南十里又有九井山伏滔記丹陽山南有九井五乾四通大江寰宇記穰之九井與江寜三井皆汲一則餘俱震而廣濟之靜林院亦有九井攷之院記乃開成中宗義所鑿為隂竇使相通引東巗水注之即今之九井寺固知巗井之相通附㑹者非一矣且若江寜三井在城南五里三井岡而縣復有烈山烈洲臨江中流上有神祠記或以為烈山氏之故跡乃伏滔記之栗洲也其上有小山如栗王敦舉兵所至者輿地志云吴之舊津是矣内有小水商客停舟以避烈風而名亦曰溧洲非古之烈山也事始傳曰深知器械舟車宫室之為則禮由己夫物之始或創或基或因或革皆有自來此禮之所由始也故能知之則知禮之所自起知禮之所自起則禮之為有不由己而由人乎哉是則器械舟車宫室之為用可重而其因變之始尤君子所當致意焉者也魯侯有云君為故事何禮之拘彼衆云者飲食日用終身由之而不知其道者也欲其動之恊禮難矣哉原智者之創物存乎記注曩之人裒之者亦已衆矣然而或猥或畧偽謬實繁稽之于事賢者為忸易曰斷木為杵掘地為臼臼杵之利萬民以濟此神農氏之事也而新論以為伏羲黄帝内傳以為黄帝謂伏羲者盖以吕覽赤糞杵臼為伏羲之臣謂黄帝者盖以世本雍父踐舂為黄帝之佐爾夫神農之耒耜亦見于易其為斧斤作鉏耨則見于周書而皇圖要覽若世本則以為垂作耒耨字林又以耒耜為臯陶所作是伏羲先耕而為杵臼神農不以耒耜而耕而易傳之言且不信矣古史攷云神農之時民始食榖釋米加燒石之上而食之黄帝始有釡鏳火食之道始成斯盖本之周書黄帝始鏳竈蒸榖為飯烹榖為麋燔肉為炙之說兹大繆也夫有火食則有烹蒸之事矣又孰有能定百藥之蒸炮不違一性而不能辨一榖之可蒸烹而有待于千百載之後人哉大抵始事之書最為無統紀原之作繆落尤繁彼琵琶觱篥胡笳𦍑笛羯鼓胡床兠綿狨錦鞾敦塔寺之類不窮異方而惟以見于中國者為始猶云可也有如堯之羮紂之箸稷之隘巷舜之廧里伊尹之屨吾丘子之鎌𦙍之舞衣公劉之槖囊秦穆公之沐浴不究在昔而惟以見于傳者為始豈盡見邪又至以秋千為千秋之倒語則尋語聲而不知其為迂以拓䟦為拓㧞之轉稱則認字形而不識其為妄指旃為氊認蘓為梳是亦升謝堂覔鳳毛責坊州貢杜若者豈特見笑于一時哉神農求雨書大旱雩祭而祈雨大水鳴鼓而攻社被雩以青衣繫社以朱索此隂陽之義也神農求雨書曰春夏雨日而不雨甲乙命為青龍又為火龍東方小童舞之丙丁不雨命為赤龍南方壯者舞之戊巳不雨命為黄龍壯者舞之庚辛不雨命為白龍又為火龍西方老人舞之壬癸不雨命為黑龍北方老人舞之如此不雨潛處闔城門置水其外開北門取人骨埋之如此不雨命巫祝而暴之如此不雨神仙積薪撃鼔而焚之漢董仲舒為請雨法春令縣以水日禱社稷山川家人祠户禁伐聚虵八日為壇東門植八蒼繒祠共工八生魚𤣥酒􅈩脯甲乙日共十一青龍東方東鄉八僮衣青舞之田嗇夫青衣立里社通溝池置五蝦蟆焚䧺雞老猳闔南門置水其外開里北門焚老猳埋骨開泉夏令縣邑以水日家人祀竈暴釡為壇南門外植十赤繒祠蚩尤十赤雞丙丁日共七赤龍南方南鄉七壯衣赤舞之赤衣而立通社燔雞猳如春祠季夏禱山陵無舉土令縣邑十日一徙市南門外五日家人祠中霤及稷以母􅀈五壇帝旁植五黄繒戊巳日為五黄龍中央南鄉五丈夫衣黄舞之老者黄衣立通社立秋暴兵尫巫無舉火煎金器家人祀門祠太昊以九桐魚植九白繒庚辛日為九白龍西方西鄉九鰥白衣舞之司馬白衣立冬舞龍六日禱名山以助之家人祠井無壅水祠𤣥冥以雛犬六壬癸日立六黑龍北方北鄰六老人衣黑舞之尉黑衣立他隨方色蝦蟆池皆如春儀雨至報以豚酒黍茅席無斷衣物鄉位各從方色四時皆以水日為龍開隂閉陽焚薪薶骨十日各異又奏江都王母收廣陵女子為人祝者視一月諸巫母聚郭門為壇以脯酒祭女擇寛便徙市毋納丈夫丈夫毋相從飲令吏妻各往視其夫到即起雨而止劉歆致雨其作土龍吹律諸方備具盖本諸此漢世旱則公卿官長以次雩禮士人舞僮七日一易如故事自立春盡立秋郡國上雨澤以為農也故尸子云神農之理天下欲雨則雨五日為行雨旬日為榖雨旬五日為時雨萬物咸利故曰神雨五日一風十日一雨豈非太平之應哉赤松石室予游炎陵過西陽之鄉值雲陽老期我于山中觀赤松軒轅之壇寺後山之頂為嵗祈所赤松子者炎帝之諸侯也既耄移老襄城家于石室故齊孔稚𤣥館碑云赤松家于石室之下神農行弟子之敬今襄陽之境也而說者乃以為東陽之石室山故東陽記北山去郡三十里有赤松廟赤松澗云昔徐公遇赤松于此而酈氏水經亦謂赤松子逰金華山自燒而化故今山上有赤松壇載稽非也乃黄初平爾初平亦赤松子也炎世赤松迹在襄陽不在于此按習鑿齒襄陽傳蔡陽界有赤松子亭下有神陂即南都賦所謂松子神陂者也神仙傳云赤松子者服水玉神農時為雨師教神農入火炎帝少女追言與之俱仙髙辛之時復為雨師而列仙傳有赤松子輿者在黄帝時啖百草華不榖至堯時為木工故傳謂帝俈師之又云堯師之而道亦有黄帝問赤松子中戒等經此張良所以願從之游非末代之数矣然今西蜀娥眉衡陽在在俱有赤松壇墺豈其所寓邪雲陽之迹邇于炎陵可得而詳也臯禖古祀女媧變媒言禖變稷言禝神之也臯禖之神女媧是饗末世已失其源謂為娥簡之所託者䟽矣昔者駘姜従嚳郊禖則郊禖之禮古先之世有之矣娀駘同列豈得為娀簡哉而五經異義乃以為簡狄吞鳦卵而生子後王以為媒官嘉祥從而祠之故王權為問謂舊注以言先商之時未有髙禖生民禋祀以祓無子而姜嫄禋祀上帝以生契則郊禖非立于生契之後鄭志譙喬答云先商之時自有禖氏祓除之祀位在南郊以𤣥鳥至之日祠之彼其所禋乃于上帝至娀簡吞乙之後後王乃復祀之以配帝若昔先禖則廢之矣斯說為覈然乃不知其為女皇至商而祠蕳狄迨周而祭姜嫄時各推其本而配之亦猶后稷之神古祠帝柱逮周而易以棄事資沿革隨世而有變易此蔡邕所以謂禖神髙辛以前之所舊有不由于髙辛也束晳云臯禖者人之先也盧植乃云𤣥鳥至時隂陽中而萬物生于是以三牲請于髙禖之神因其明顯故謂之髙因其求子故謂之禖而古有禖氏之官因以為之神斯得之矣秦廢典祀及漢武晚無子于是始立禖祠城南下洎北齊爰以太昊配之青帝壇之南郊旁隋唐因之及皇朝景祐四年乃以春分之日壇于南郊祠青帝而配伏羲與嚳猶不及女媧云蜡臘異蜡報田之祭嵗終合萬物而索饗者孔子曰一日之蜡百日之澤古之君子使之必報之春官宗伯以疈辜祭四方百物主日而配月百神從之致百物而用六樂籥章國祭蜡則龡􅃎頌擊土鼓以息老物伊耆氏掌共仗取其老物以佚蜡氏掌除骴取其老物以息盖有以勞之必有以佚之有以作之必有以息之故既蜡則飲酒于學黨正屬民飲酒于序令得極歡而大飲所以休息之也雖然蜡與臘異臘也者獵也獵取禽以祭祖故禮臘先祖五祀在蜡後黄衣黄冠而祭謂之息民而蜡則祭日月星辰祠門閭公社皮弁素服以送終葛帶榛杖以從喪殺所謂大蜡大蜡天子之禮也是以漢唐蜡祭遍及五祀蜡則于郊臘則于廟蜡祭宗而不及天祭社而不著地以異于郊也玉燭寳典云臘者祭先祖蜡者報百神同日而異祭盖亦以漢世季冬勞農大饗臘祭宗廟五祀同于一日爾按晉宋舊事魏帝遜位祖以酉而臘以丑髙堂隆議王者各以其行之盛者為祖而衰臘故木行之君子祖辰臘火以午戌木以夘未金以酉丑土以戌辰今魏土王宜以戌祖辰臘博士秦靜謂古禮嵗終祭蜡皆有常日而無正月祖祭之文漢以戌臘而以寅正午日祖盖非經義黄精之君盛徳在未而坤位于西南辰者嵗終日窮之辰不宜以為嵗功祖祭之行惟丑者土之終宜如前未祖而丑臘魏名臣奏司農董遇之議亦謂土行之君且以未祖丑臘而魏臺訪議臣崇所議月令左氏俱不著日師說惟以盛祖而終臘此即隆之說也厥後宋徳以水故子祖而辰臘周以十日祭神農伊耆下至毛介于五郊五方天地星宿四靈五帝五官嶽鎮下至原隰分方而合祭之故隋初因以孟冬丁亥蜡百神失厥所謂至開皇始以建丑用臘貞觀十一年房𤣥齡復按月令蜡法惟祭天宗其五天帝五人帝五地極俱非古典請除之而以季冬前寅蜡百神南郊以夘日祭社稷于社宫以辰臘饗宗廟五祀及開元定禮乃命三祭皆從臘辰以應土德益失之矣六典唐以季冬臘前寅蜡百神于南郊大明夜明神農后稷伊耆五官五星二十八宿十二辰岳鎮海瀆五田畯青龍朱雀麒麟騶虞𤣥武五方山川以至昆虫一百八十七座皇朝乾徳元年盖用戌臘而以前七日辛夘大蜡和峴以為蜡者臘之别名遂援開元之事而以今所行者為非于是三祭同用戌其合矣乎祭先飯老者多儇佛者多戅儇故敢為妄戅故敢為誕理勢然也禮食必祭祭先飯祭乎其始飯者也古者將田祭貉將射祭侯用火祭爟用師祭禡食必祭先倉㸑必祭先炊養老則祭先老不忘本也先衣先虞先蠶先卜先馬先牧先農先嗇先食先酒皆其類矣先王之制禮無非教也食祭祭所先進主人先進則先祭後進則後祭春官大祝辨其九祭一曰食祭而膳夫王食與肆師之饗食一皆授祭亦以報本反始也玉藻曰君賜之食而君客之則命之祭然後祭先飯徧嘗羞飯飲而俟命之品嘗然後惟所欲是故孔子侍食于君君祭先飯少施氏食子以禮而飽祭則作而辭䟽食不足祭也客若降等則主人延客祭而後祭客不降等則遂先祭𤓰尚環魚尚膴而殽之序則徧祭之其不祭者惟水漿魚腊湆醬若餕餘爾此叔孫穆子食慶封慶封泛祭而工所以賦茅鴟也子曰君子無終食之間違仁終食之仁吾于食祭見之矣孔頴逹謂君子不忘本有徳必酬之故得食必種種出少置籩豆間以報先代造食之人是以王渙每食必絃歌而薦之盖是意也今世固有當饋而祭者實本諸此其為佛者竊而倣之既乆而莫究其由則又引而入之佛鬼之說曰為鬼設也亦可喊矣㨿紀聞錄有謁薛相訥之子直者未食先祭直曰是奚為者客曰釋言壙野之鬼食人血肉而佛氏化之制為此戒且食而先施得其命壽延長直詰之曰若何妄邪何所有佛何者為鬼俗人相誑愚者雷同而子信之邪子俗人也若直亦可謂豪傑之士矣然錄所記乃謂于是空中有聲責者若云迨午且死及是果殞可謂大妄夫人之死生雖天地有不制佛鬼奚為哉使直之死為果然耶是亦適與死㑹而山鬼得以憑虚乗釁倡嚇而厭祟之爾奈何世俗更益崇信多見無識雖然世之誕妄豈惟二氏哉其在儒宗固有之矣謂寒食為介推謂五日為屈原與夫七夕牛女之類其與佛者中元目連等事何以異然而舉天之下奔走企羡至数十百年而不可止君子于此可不攷駁其流而微怪之是信耶㨿韓詩外傳云孔子侍坐哀公公賜之桃與黍孔子先飯黍而後噉桃公曰夫黍以雪桃也子曰丘聞之矣黍五榖之長而桃為下君子以賤雪貴不以貴雪賤則子之先飯特先飯爾而先飯之祭未可廢也善乎王符氏論隂陽巫祝之說曰賢人君子秉心正直可與言也世俗小人醜妾婢婦淺陋愚戅漸染既成又數揚精而破膽矣今不順其精誠所向而彊之以其所畏直亦増病爾是猶羸病之人且畏蝼螘而欲俾之觀虎其與怖而死者又速矣今畏佛者類此路史卷三十九

body:
  text: 路史卷三十五宋羅泌撰發揮四九合諸侯事不白則教不成齊侯之為會十有五云九合者在葵丘之會言之也􅀈淮之會固出其後而貫榖之舉又非其盛者乃若兵車之會則有之矣莊之十四年伐宋二十八年救鄭僖之元年救邢四年侵陳蔡六年伐鄭與十五年之救徐首止之役定王世子所謂一匡天下者也說春秋曰信其信仁其仁衣裳之會十有一而未始㰱盟兵車之會四而未嘗大戰是信厚而愛民也仁其仁者如其仁之謂言如其所成就是以仲之仁爾者晉平公問于叔向曰齊公九合諸侯一匡天下翳君之力乎臣之力邪對曰譬之衣然管仲制裁之隰朋削縫之賔胥無純緣之韓子曰賔胥無削縫隰朋純縁君舉而服之爾臣之力也師曠倚瑟笑之平公問焉一云齊景公對曰凡為人臣猶庖宰之于味也管仲斷割而隰朋熬煎之賔胥無齊和之爰進之君君不食誰其强之臣何力之有焉且君譬壤地臣草木也必壤地美而後草木碩是以君之力也九合諸侯齊桓之盛舉也而夫子以為仲之力者盖以為齊桓者正當上佐天子恢王綱纂舊服顧乃區區合諸侯以勤王是特小相一卿之事故也嗟夫詩于衛存木𤓰于秦取渭陽所以訓齊晉之美也而桓文不存焉管仲覇者之佐也匹之伊尹其器業正小矣而孔子猶曰微管仲吾其被髪左袵矣豈若匹夫匹婦之為諒哉當其解梏堂阜而致位乎上卿則綦之理舉賢能立四民而制軌里却子華之計信曹沬之盟幹山海責包茅安衛文而攘戎翟其功業固可尚矣佛者之事視管仲之功孰愈哉夫不試乎冬之寒者不知夫春之燠不睇夫本之正者不竟夫末之䨾揖遜救焚誦詩拯溺揖遜誦詩固雅事然亦何補于焚溺哉晨門荷蓧不無用于世顧亦奚用于世邪篤信明義崇徳報功吾固不以是責歸馬放牛囹圄空虚此軰之所能歟約法三章外户不閉此軰之所能歟拾桑麻衽氊毳棄五榖而嘬海錯語人曰彼以世間法我以出世間法吾見其大言之相愒也佛事太盛速天譴俗人不可以為大臣而俗士不可以為史把用夷禮春秋惡之謝靈運蕭瑀王縉之徒合𤓰殿庭膜拜廊廡此何為者耶夫為胡事乎朝著之間而羞惡之不知可謂大臣歟梁武不道捨身同泰寺為僧奴百官僚𨽻傾庫藏以贖歸之俄而閃電霹靂風雲冥晦焚毁其寺浮圖堂宇一夕蕩然及再捨身光嚴禪室而重雲殿浮仙花生忽皆震動三日時以為瑞而識者因以季龍之事方之同泰佛閣七層寶飾大同十載震火畧盡更造未半景亂尋起此則上天明譴顯戒可以見矣當時史氏雖能紀其捨身之謬至于天戒之事則黜不録豈非史官俗士怖于佛者一時妄福之說而没之邪唐武后為薛懐義起功徳之堂明堂比也其崇千尺佛像之隆度九百尺一準之偉逾于千斛之舟小指之間匿十數軰偽圖血像頭度二百尺所觀者溢郭士女争施俄而火起像室延于明堂以及寶庫飛烟突漢鐵律􅉼尺半夕之間不遺片拊風裂血像分飛數百然則非理之事豈釋迦本意哉在昔大順二年七月癸丑汴之相國寺火是夕大雨震電有物類毬塊而赤轉于門譙藤綱之間周而火作頃之赤塊北飛又宛轉于佛閣之藤綱之間亦既周而火作既乃大霔平地數尺而火勢益甚延及民三日不息而所謂日月隱檐檻者亦且燼矣詳觀厯代若此者殆不勝記是則佛者果不能違理為之福矣蕭倣嘗言佛者可以悟取非可迹求寳柱煥爛珠㡘的㿨此敬則所謂神怨人怒祻積患生者也奈何愚俗不知出此乃更崇侈至于菲塟薄養以争趨而佞奉之金碧翬飛過于玉闕鎔金銷翠单困民用由此語之免祻幸矣何福之為予憫夫世之士者為其誘惑流通而莫之止也故表而出之以為烱鑑梁武事或見之僉載隋志亦稍及之明堂大順之事亦㣲見唐志云益爲朕虞佛氏戒或曰墨氏兼愛何不思之甚也墨氏安能兼愛哉先王之時鴻水平矣民粒食矣又從而教之墨者能之乎蚩尤平矣管蔡定矣又從而冨之墨者能之乎夫害已去難已平其愛之亦至矣亦可已矣而又冨之又教之先王之心仁民而愛物者其有既乎吾知墨者之無是也非無是也實不能也非徒不能也實不知仁之方也不知其仁而徒曰吾能兼愛愛何從而兼之不能仁民而惟以戒雞犬䕶螻螘為之兼愛一何淺邪吁是特妾婢傳娼修小亷以惑衆者先王之戒殺不如是也夫畜者未有不殺而其所不殺者非畜也試以一劇之郡言之蠭屯螘聚户輙數萬孰不雞孰不狗而孰有不殺之雞狗哉彼墨氏者其亦果能戒之邪是以先王惟制禮以節之君子之于禽獸也見其生不忍見其死聞其聲不忍食其肉是故足迹不邇于庖厨而魚肉不及于廟閾豈其不之戒哉其所以戒之亦有道矣郊社特牲宗廟特牛而神得其饗矣七十二膳八十常珍而親得以養矣天子不合圍諸侯不掩羣大夫不取麛卵士不隱塞庶人不數罟諸侯無故不殺牛大夫無故不殺羊士無故不殺犬豕庶人無故不食珍而後天下之畜無妄殺也爰復設之虞衡之官按其生育之時行山林禁澤梁以及乎其可生者大寒降土蟄發水虞于是講罛罶取名魚登川禽而嘗之寢廟行諸國人助宣氣也鳥獸孕水蟲成獸虞于是禁罝羅矠魚鼈以為夏稿助生阜也鳥獸成水蟲孕水虞于是禁罣䍡設穽鄂以實廟庖畜功用也仲春之祀用犧牲而季春之月置罘羅網畢翳之具俱不得出于九門之外豺不祭獸不以畋獵獺不祭魚不設網罟鷹隼不摯不出畢羅昆蟲未蟄不以火畋不探鷇不射宿不濫淵不巢覆不成禽不獸不中殺不粥儥毋殺孩蟲毋食雛鼈鱗不尺不取彘不朞不殺不刳胎不髪􅀈不成毛不登庖毋麛毋麑不卵不䠣蚳蝝㝹䍻各有常禁而物不失其性矣時方長養則野虞禁止其斬伐未至黃落則斧斤不入乎山林毋槎毋蘖毋絶華蕚不風不暴不以行火而恩被于動植矣此則先王博愛之實也故曰虞氏之恩被于動植是真被于動植者也豈若彼之假仁義而繆設虚言也邪魏正光求帑藏空竭于是有司請損百官蕃客廩食肉之三一嵗終計省百五十有九萬九千八百五十六斤唐世正五九月格刑屠禁采捕月率十日斷宰割是不過緩死爾賣㹠售肉饟羜還筵兹固有善于彼假之不已烏知其非有哉雖然予之所以尤病焉者二喪壊先王之風俗其害固已急而靡兵之氣厥祻為尤大夫世不能無暴亂也是故立之兵以禁御之此天地之道聖人之所不能去也非惟聖人不能去之雖天亦不能去之惟不能去是故必立之威威立而暴亂止矣威之不立則將無以御暴而適求侮古者婦人不入軍中凡以其靡兵之氣而將無以示威也暾欲谷曰寺刹之法教人柔弱非用武之道不可衆置語毘伽曰突厥人寒而皆習武唐兵雖多無所施用凡以是也厥今佛者其靡兵之氣也甚矣士有壹為其說輙威索體解而不可用然則予之所以病焉者是非惜乎兵也惜其兵氣之靡而天下之祻起也昔者黃帝之初志于求仙愛民而不戰于是四帝共起而謀之然而黃帝克自悔祻擇兵稱旅以威不軌而後天下始復定夫以黃帝之明且聖猶幾不免而况于不黃帝者乎明皇之始賢人佐職事無不舉納姚崇之議削中宗之偽濫者萬二千數是以天下太平海内充富奈何帝以中人之性不能保之于是終天寳之末廣鑄金軀度僧造寺舍前日昭昭已效而甘心乎未來昏昏虛妄之說于是禄山之亂乘弊而起陵遲播蕩幾于不振黃金之像不可以助威福緇毳之流不足以應凶虜而生靈挺血之祻已徧于寰宇矣故凡言不殺者是必馴致于大殺而後已此齊梁之殺伐之祻所以尤毒于戰國者兵氣靡而威不立也吾不知齊梁君臣奉佛尊經與夫䕶戒禽蟲之惠可以贖其蔑威致㓂棄師衂國之寃也邪吾故曰使佛者能去其君臣而治絶其兵武而安則其教無不可立也予見學者不知先王之道大而受佛者之毆皆以為佛道廣大而能兼愛故因先王虞衡之意而備說之益將以廣其見辨四皓揚雄曰美行園公綺里季夏黃公甪里先生代之所謂四皓者園公一綺里季二夏黃公三甪里先生四也遭秦苛政避地商之藍田山中漢髙招之以皇帝善嫚士不至迨帝為戚姬故欲易太子髙后以留侯計致之太子以定四老人之力也既去弗復見後俱塟于安陵太白所謂蕪没四墳連者百姓義而祠之今京兆藍田軹及上落商東巔俱有祠廟或云為秦博士世亂乃隱故園稱陳留風俗傳云園公為秦博士避地南山漢祖之起禮聘不就惠帝立以為司徒圈公者園公也其本圈姓而崔其所賛亦謂四皓為秦博士然質之傳四皓當秦在時已入商洛深山不見其為博士且漢世無司徒元夀二年始置大司徒公亦何自為之此稱繆也雖然四皓之名言者不一如圈公在史記以來漢書法言諸所記載俱作園公洽聞記作郭園公賛與仙傳拾遺又以為東園公甪里先生在孔安國祕記及漢紀仙傳作角蠡而魏子作禄里是特音相假耳甪有音禄故禮大記録中康成謂當為禄頴達云聲相近顧野王切敇字為所甪翻知昔人直作彔音世不能明妄有從刀從人之分頃太祖皇帝問崔偓佺以李覺奏四皓一先生姓或云用加人或云加夕對曰臣聞刀用為角一夕一人俱不成字此亦据陳留志李匡文辨之偓佺誤也至綺里季之與夏黃公則畢文簡特以綺里季夏為一黃公為一盖以逸少淵明子美有黃綺之語非也按仙傳拾遺云綺里季東園公甪里先生夏黃公與張良為雲霞之友間二子而言之而夏黃公在崔氏譜老子中經皆謂之夏里黃公則不得云綺里季夏矣又元和姓纂亦有夏里綺里禄里三姓夏里云出四皓河内軹人則文簡之說正為失之徃嵗商於人有得四皓神胙機者乃有綺里季與甪里之神坐則夏黃公之自為名益可知也神胙刻更有圈公神坐及圈公神坐機字正作圈而顔師古正俗引圈稱之自叙亦云圈公之後則知圈之為正抑復攷之四皓姓諱有大異者在陳留志則圈公名庾而字宣明襄邑人始居園中因號園公或云姓國名秉與軹人甪里先生綺里季夏里黃公為友秉庾字轉是亦稱園公爾故風俗通云四皓園公本亦園者夏里黃公姓崔名廓字少通齊人隱居夏里爰號夏里黃公姓崔譜而甪里先生則係泰伯之後姓周名術字元道京師謂之覇上先生甪里亦其號爾淵明亦嘗引此則非不知黃綺之實者四皓之刻始見于黄伯思董逌繼見𨽻纂為不誤也三輔舊事𤣥惠帝為四皓作碑于隱所則知神胙機俱當時所刻者或云圈公姓韋韋口聲也國口意也殆廋辭云風俗通云圈援也從國袁聲今市語韋氏為園家稷契攷天下之同者不必異而異者不必同聖人之于人茍可以傳者不求同而矜異也堯契棄之為嚳子明矣而諸儒皆疑之以為契棄既皆堯弟堯在位百年則皆百餘嵗矣豈有堯在位如是之乆有賢弟不能用至舜且未死方舉而用之乎仁人君子固未有遺其昆弟而為國者是好異而求同之過也即按内傳史克之言髙辛氏有才子八人時謂八元舜舉而用之杜預謂為髙辛之裔稷契之倫而張融孔頴達等以為稷契皆在其中謂去聖逺信其言為髙辛之裔非髙辛之子且信緯書之次謂嚳傳十世堯及稷契皆不得為嚳子亦不得為兄弟譙氏亦疑契生堯代舜始舉之必非帝嚳之子因謂其父㣲故不著名且其母有娀簡逖與宗婦三人同浴于川𤣥鳥遺卵而孕之則非嚳之妃不知浴川之妄予觀堯之繼摯也契棄既皆已用之矣傳稱堯以契為司徒棄為農師及得舜為司徒然後以契為司馬則堯非不用之也王充每言稷仕堯為司馬而伏氏書及吕春秋皆云堯使棄為田按田乃古農淮南子云堯之治也舜為司徒契為司馬禹為司空稷為大田師乃大農師也按褚生叙孔子語曰昔者堯命契為子氏為有湯也命稷為姬氏為有文王也堯曷嘗不用之哉特至舜始大任焉故太史公以為堯皆舉用而未有分職傳記之說畧可見矣惟于書無聞爾夫書于堯最為粗畧官司制度禮樂刑賞咸無見焉在位百年所可得而知者惟分命羲和异鯀試舜數事而已及舜受禪則復以契為司徒棄為后稷又其官任皆出申命則是因乎堯之舊者况復推用皆在厯試之年則固堯為政也甫刑云三后䘏功兹正堯之所命然則稷契之仕堯朝端不疑矣或者又曰詩言蕳翟惟言從帝詩美后稷惟稱姜嫄曽不及嚳劉向叙列女傳履迹吞乙之事俱當堯代而傳記蕳翟乃謂有娀之佚女則姜嫄果為帝嚳後十世之妃吹求㣲纇以疑其所自者是不然世本大戴之書言昔帝嚳十四妃之子皆有天下而稷之後為周周人既上推后稷為嚳子矣何所疑邪曺植賛嫄狄云嚳有四妃子皆為王帝摯之崩堯承天綱鄭氏箋詩始疑于緯遂以姜嫄為嚳後十世之妃然注禮檀弓則又用帝系之文亦自異矣昔有娀氏有二女長曰東逖次曰建庇東逖為嚳次妃是為簡翟故屈原云蕳翟在臺嚳何宜乙鳥致貽女何喜又云髙辛之靈盛兮遭乙鳥而致貽夫古書之存者惟屈原莊周韓非管子山海經為可質其言簡翟未嘗不及于嚳何嘗有十世之說哉貽一作胎古胎貽亦通故用楊震碑貽我三魚嘻繇漢而來學者之談商頌鮮不謂是稷契無父而生先儒張夫子王逸之流且猶惑之鄉非褚先生孰能知其神不能成須人而生也邪夫以嫄翟信在堯朝則亦信似無歸之子果為佚女抑何從禋祀于禖宫哉佚閑美也與妋同纎緯之言信亦繆戾如言五帝三皇皆有感而生然非感于郊則遇于野甚者越在夷獠之鄉若數千里之外豈皇王之妃后而率彼曠野者又其所叙之迹皆有似淫奔之事斯所以為難信歟學者之學正不可爾僻又可貴詳于經乎彼其猜之予故辨之細周世攷禹為夏契之後為商而稷之後為周夏十七世商三十世盖四十有七世而後有周文王禹及稷契皆當唐堯之時稽之史載契十四世而至成湯厥次僅是然是叙棄后稷十有五世而至文王中間乃閲夏商二代所較者三十餘世踈脫甚矣夫由堯帝至周文王千一百有餘載而其世云十五豈人情也哉嘗竊攷之信書不窋實非后稷之子而公劉乃商世之諸侯盖當周家十葉之間故左氏云文武不先不窋而外傳乃謂夏氏之衰不窋始失官守婁敬亦言周自后稷封邰積徳累仁十有餘世而公劉避桀是公劉之去后稷已十餘世還當君桀之時盖所謂夏之衰者尤不當出乎履癸之前然而說者無謂太康之世曷不諦之如是邪凶奴傳云夏道衰公劉失其稷官變于西戎師古以為稷之曽孫而康成遂謂與太康並世妄矣傳云太王亶父去公劉二百餘嵗則其去文王才四百年盖當仲丁外壬之時云爰復詳之夏氏之書記帝王之世云帝俊生稷稷生台蠒台蠒生叔均叔均為田祖夫帝俊者帝嚳之名而台邰也后稷封台故其後有台蠒有叔均既有台蠒叔均則知稷之後世多矣不窋不得為稷子明矣苐恨其間世次乆逺有不得盡見者雖然單穆公言后稷勤周十五世而興是則世本史記所為信者夫亦知夫所謂興者有非文王而不正為公劉也邪即稽世本不窋而下至于季歴猶一十有七世矣一十五世而得遽而盡之哉甚矣系牒之難理也夢齡妄竹書六經之書惟禮記雜而多妄夢齡之事殆同䜟緯之言前哲多非之而心疑其說予嘗攷之信書武王之夀烏有所夀九十三邪且以武王少文王之四嵗文王崩服未終而伐紂克商二年天下未寜而崩相出入才七年是文王七嵗而生武王也况復武王乃文王之次子則伯邑考父之生也文王年才四五爾此其必不然一也外紀注文王十二而冠十三生伯邑考引左氏冠而生子之文大妄按文王九年大統未集武王欲繼志伐商故不改元十一年伐紂乃武之三年十三年乃武之五年也克商二年而崩世紀紹運圖云武王七年盖計大誓十三年之文自九年至十三年為五年也伯考乃文王之嫡孫也且以武王之崩成王方居襁褓豈有九十之年不見嗣息踰于衰耄而始生育者乎夫聖人之異于人者智識爾其精華數至則與衆無以異此其必不然二也按攷周公襁抱孺子以朝諸侯其事為核鄭𤣥乃謂武王崩三年周公始避居東時成王年已十三居東二年王年十五公乃反而居攝七年致政成王年已二十有一皆妄也夫襁者不過一二嵗子爾孰有年逾幼學而尚資褓者我公之歸成王年己志學豈復候公之攝七年哉真源賦云武王之崩太子始生是為成王周公攝七年王才七嵗夫武王克商二年天下猶未定而遘厲虐疾子少國危大臣未附公于此時正患天下之事有不可勝言者故為三壇乞以身代武王之死納策金縢以俟事變之定時王雖以少瘳然亦尋不起武王之崩成王才一二嵗是以周公攝政而四國流言理皆可以見者夫四國流言而公居東不知何載而去以為武後三年居東二年罪人既得于後不知幾年公乃為詩以貽王天大雷電王弁以啓金縢既執書以泣則亦既冠而達政理有不俟攝矣而反以為年十五而公始攝之首尾衡决其足信邪夫以金縢著少瘳之語者特以見公至誠之應而孔子存金縢之篇者所以表公之忠爾王充不信金縢之事而反信九齡之說亦可謂觀濁水而迷清淵矣是皆理之所可充不必旁搜逺摭而後可知者也男子十六天壬至始有生育之理八十而數絶矣錢公輔語王安石云武王聖人八十尚無太子益繆按竹書紀年武王年五十四罕得其實然則與汝三齡漢儒之妄斯可見矣雖然天下之事固有言之無質而必然者有聞之如實而必不然者矣故嘗言之武王之政皆非七八十翁之為然者意者文王之崩知武王位夀之不永而付之速集之託邪其云吾與汝三者豈非謂于吾没之後與汝三年而成之乎未可知也别有說徐鉉謂古無此齡字若有之武王不應不達而云西方有九國竹書乃晉太康二年魏人不準盜發魏安釐冡所得古書也綽有事實惟其舛駁不純世頗疑焉抑載攷其尚父致師周師自誓至于罷兵與武王徴九牧史佚典九鼎若度邑等事俱見史遷周紀美男破舌縵縵奈何等語明引于戰國短長太子晉等事見于王符著論而少昊之証備于張衡之集則知漢世其書猶在而人罕有傳者子華子曰吾之君歸采于周始有蒲璧以朝作程典而今程典猶見其書豈盡出後世哉班固志書古今書外有周書七十一篇劉向以為孔子所論百篇之餘文尤爾雅非漢人所為也魯用王者禮樂明堂位士之不學古我知之矣智者不屑于稽而昧者不知其所以稽也魯侯爵也而設兩觀作五門備六官而媵三國立太廟建明堂乘大輅載弧韣斾十有二旒日月之章季夏禘周公于太廟牲用白牡尊用犧象山罍俎用梡嶡鬰用黃目灌用玉瓚大圭薦用玉豆彫篹爵用玉琖仍彫加以璧散璧角升歌清廟下管象朱干玉戚冕而舞大武皮弁素積裼而舞大夏祀帝于郊配以后稷君衮冕立于阼夫人副褘立于房中君肉袒迎牲夫人薦籩豆大夫賛君命婦賛夫人大雩帝夏禴冬蒸春祠秋嘗而遂大蜡複廟重檐刮楹達鄉崇坫出尊康圭䟽屛木鐸振朝𤣥輿和表納四夷之樂于太廟此何為者邪求之先覺則皆曰武王崩成王幼周公保之以踐祚制禮作樂頒度量而天下服七年歸政成王尊周公故賜之以天子之禮樂以廣魯于天下有人臣不能為之功則賜以人臣不得用之禮明堂位之說曰昔者成王以周公為有勲勞于天下賜以上公七百里加之四等之上使兼十四附庸而用天子禮樂吁有是乎天下有達道不可得而易仁義禮信士之所當為孝者人子之所當為而忠者人臣之所當為也是故事親若曾子而事君若周公者可也臣為忠子為孝豈有過外而臣子所不能為之事哉世道衰教不明于天下而忠孝之等少是故一有獨行則指之為分外于是始有冐數濫典越禮樂而不知所為怪學士大夫習于亂說不果决擇則又從而申之豈識先王之意哉禮天子禘諸侯祫大夫享庶人薦天子祭天諸侯祭土諸侯而祭天惟王者後此不刋之典也非天子非王後雩帝郊天抑何典邪禘者帝之禋也是故不王不禘皇皇后帝皇祖后稷享以騂犧是享是宜則魯顧以享帝為宜而不知其非矣太廟天子之廟明堂王者之堂也而顧用之其合矣乎季路欲使門人為臣孔子以為欺天而曽子且不忍以季孫之簀斃公而以王禮塟于汝安乎管仲相桓公覇諸侯一匡天下管仲齊侯之周公也而塟之不以侯禮三歸反坫聖人猶切齚之以王者之制而魯用之然則三家以雍徹舞八佾旅泰山而禘僖祖厥有由矣傳曰學士大夫則知尊祖矣諸侯及其太祖天子及其始祖之所自出大夫有事省于其君而干祫及其髙祖諸侯有事省于天子而禘其祖之所自出此周之末造非太平制名器正上下之分也公侯之地百里伯七十里此周公之制也天下不敢不守而公十兼之是自為法而自棄之也孟子曰周公之封于魯為方百里地非不足也而儉于百里于百里猶曰儉則周公固未嘗越其制也董子之說曰成王之使魯郊盖報徳之禮也然則仲舒亦以為成王之與之矣是不然禮之有天子諸侯自伏羲以來未之改也成王周之顯王也盖亦謹于禮矣而且亂之則成王其惑矣此劉原父所以謂使魯郊者必周而必非成王盖平王以下固亦未之悉爾如魯恵公使宰讓請郊廟之禮于天子天子使角往惠公止之其後在魯於是有墨翟之學魯用之郊正亦始于此矣夫魯惠公之止之則是周不與之矣不與而魯用郊自用之也昔者荆人請大號者周人不許荆人稱之然則魯之郊禘可知矣兩觀大輅萬舞冕璪有不自于兹乎使成王已與魯則惠公不請矣惠公之請由平王世也孔子曰魯之郊禘非禮也周公其衰矣魯之郊豈所以尊公哉吕氏春秋以為桓王使史角往非也桓王立于隱公之四年盖平王云明堂位或者疑為戰國妄士僣君分謗之所為書其為言曰魯王禮也天下傳之乆矣君臣未嘗相弑也禮樂刑法政俗未嘗相變也天下以為有道之國夫桓公弑隱而自立矣共仲殺子般弑閔公而立僖公襄仲殺太子惡而立宣公則君臣嘗相殺矣躋僖公立焬宫從祀宣公丹楹刻桷而致夫人不告朔娶同姓而大夫宗婦覿用幣則禮嘗變矣萬仲子之宫繹襄仲之卒則樂嘗變矣伐莒獻俘用人亳社則刑又嘗變矣兵甲作田賦用則法非不變也初稅畆舍中軍則政非不變也祠爰居鼓大水矢魚而觀社則俗又非不變也未嘗之言殆誣魯者而予未嘗疑之矣飽思厭索然後知非夫子不能作夫魯之作無禮非一節矣顧未嘗不以成王周公為解當時之臣盖亦有知之矣是故書也設以明堂之位而繼之以其所僭中之以三代之服器官魯兼用之而後結之以未嘗相變相殺之語其貶薄之意亦深矣出㳺于觀固所以甚歎魯禮運禮器傳記之言豈蚩傖之囈語哉魚目猶疑宜攷信于大傳獲麟解魯哀公十三年冬春秋書有星孛于東方十四年春西狩獲麟春秋絶筆歸愚子曰盛哉聖人之言也古之人三月無君則弔春秋不作天下何由知有東周乎春秋之為書予既已知之矣始何為而書魯隱乎為東周而設也終何為而筆獲麟乎為東周而設也周自后稷公劉積功累仁八百年而王業成太王肇基王迹王季其勤王家其辛苦艱難可謂至矣文武不幸以幽繼厲顛覆宗周幾于不臘平王之立周室東遷是嵗秦始列為命侯受西周之故都方平王之東轂天下之人引領以期其中興至隱公之元年平王在位四十有九年矣論其數則過矣攷其時則乆矣而竟不能西歸諸侯僭大夫强禮樂刑政寖尋隳廢而不可復故孔子作春秋于是始之刪詩則次王國之風叙書則汔文侯之命著東周之不復興也夫雅者朝廷之樂而風者國土之音也文王之詩列于二雅其政惟可見矣黍稷流于國風仲尼何容心哉命者天子之所制者也成之于蔡康之于畢穆王之于君牙皆一出而下敬命至于平王制命于申天下莫知有周也當其䝉犯䟦坱一命文侯而遽有弓矢之貽由是征伐自諸侯出黍離欲復雅渠可得邪故曰王者之迹熄而詩亡詩亡然後春秋作隱公立三年而平王崩聖人之意不難見也自是以降生民卒癉童齓皆知無復春秋未作時矣下及正沔日以陵遲三十有八年有星孛于東方明年而西狩獲麟文之十四年有星孛入於北斗昭之十七年有星孛于大辰春秋之書孛皆辰次此何為而東之邪桓之四年公狩于郎莊之四年公狩于禚春秋之書狩皆地名此何為而西之邪且之二者繼書而終聖人之意我不敢知也昔者成王定鼎郟鄏以為東都至平王遂居之曰東周孝王封非子秦亭以為西垂大夫地故堯典之西也東遷之元年秦始强大逐犬戎祠西畤號曰西秦而東西自此分矣曰東曰西時之所知聖人之意我不敢知也春秋之為書法不諦瑞麟曷為而書哉以出非其時為聖人之應乎則聖人之著述豈自為邪聖人之意實不在于是邪夫麟王者之嘉瑞也孛彗所以除舊而布新者也除舊于東而西獲其麟此聖人所以反袂拭面泣涕沾袍遂放筆而稱吾道窮嗚呼其不然乎其不然乎奈何腐爛之儒為之說曰聖人之所以聖非淫巫瞽史若也何􅉸滑焉惟未來災異之推邪是不然夫推言禍福以揺人惑衆者類淫巫瞽史之為聖人固不為也至于感而遂通遂知來物是乃聖人之餘事而興亡治亂者聖人之至切者也奚為而不感邪若昔柱史儋之如秦也語獻公曰始秦與周合而别别五百嵗而復合合十四年而覇王出位出尾箕之際經大㣲掃東井大史張孟亦告苻堅謂不一紀燕其有秦後二十嵗代且滅燕是則先時之告也不然書者帝王之典而秦誓諸侯之書也書何為而終之悔過自誓我不敢知予述路史既及春秋之所以始終感麟出之非時作麟說或曰夫子之解獲麟辭則㣲矣而謂孔子知秦之必繼周者則似不然使孔子知繼周者在秦則於周身之防宜無不知者矣然一出而圍于匡㧞木于宋窮于陳蔡削迹于衛奔走乎一十二國役役以終其身是則今之不知命者然也命且弗知而尚奚秦之知曰不然惟其知之此其所以然也問者或曰是何夫子之紿誑我也世固未有知禍弗避而故即之者曰謂禍可避此中人以下者也聖人知禍之弗可違也故必身從艱棘以昞其致匪自已而猶或可溓也若以今之不知命者為之則必敗于匡必敝于宋不蹶于衛必勃繆于陳蔡矣代之人以顔淵陋巷自樂而無跌踣為勝于孔子正是見也昔唐鄭䖍之為學也有自滄州來師者曰鄭相如嘗謂䖍曰孔子稱繼周者雖百世可知也豈惟孔子僕亦知之因言天寳之末當有大亂而先生當汚于賊惟守節宜可免齊栁世隆一日目典籖季黨索髙齒屐筆于簾旌曰永明十一年因流涕曰永明之元年我亡後三年丘山崩齊亦于此既矣厥後皆如其言夫以相如世隆之說不謬則知孔子知秦之繼周也審矣唐盧齊卿之方幼也嘗訊來詳于孫思邈思邈告以後五十年位登方伯而吾孫為屬而張燝藏之告蕭儼亦謂繼此二載官掌武于東宫及免而厄于三尺土下六十一而刺蒲十月晦而禄竭厥後思邈之孫孫浦始生逮齊卿刺徐而浦丞于蕭儼後亦以失職埍于髙麗土窟者六年六十有一刺蒲而卒事之契言皆不違其畧夫以齊卿若儼一介人臣而猶災祥之不可移如此况國之大事乎夫書非始于堯始于舜不終于秦終于周世不知也方孔子之自齊反也攝魯相事齊景公患之于是内犁鉏之計歸女樂于季氏而孔子行始也適衛既而靈公並載南子招揺都市于是趣宋適鄭如陳會晉楚侵陳爰過于蒲蒲人止之乃復適衛將之于趙聞鳴犢殺届河而返遂復如陳及蔡楚昭將聘而封之子西沮之還復于衛亦有意于衛矣而靈公者老益荒怠也違夫子詭而問陣退命駕而行衛人止之會齊伐魯魯以冉有之言而迎請子于是自衛反魯盖春秋六十有八矣按左氏傳孔文子將攻大叔訪于仲尼曰簠簋之事則嘗學之矣甲兵之事未之聞也退命駕而行之子止之將止魯人以幣召之乃歸與論語所載盖一事也按子以敬王二十三年去魯時年五十六三十五年復自陳適衛居外凡十有三年哀公十一年季康子逐公華公賔公林以幣迎子乃歸魯凡兩至陳蔡五至衛世多失其經行之次故著之年運而往始傷卒老而不得載之行事乃刪詩定書正禮樂繫周易作春秋以為萬世之典法返魯盖六年而坐奠之祥作其慻慻于數篇之空言可知矣百篇之書皆帝王之大訓而特置秦誓于其末是誠何意哉藏之屋壁謂之不知秦禍不可也焚燎之酷雖知不免猶不敢廢人事焉爾是故畏匡厄蔡禍也乃不憂已之喪而憂文之喪然則匡蔡匪子之畏厄而秦燎為子之畏厄也審矣若以為重繆公之改過則彼時要服之荒君至死而猶用其良而何以為改過乎嗚呼小白一覇而陳完來魏丕受禪而仲達舉服卒之嵗劉季肇生齊滅之年侯景載孕而建成元吉遇害之際正武氏之首胎然則東遷之年西秦始命雖䝉且知之矣彼夏書之後繼之以湯征而商書之後繼之以西伯戡黎皆剥膚之漸也然則繆誓之接于周奚惑焉成湯西伯夏商之異姓而繆公周之異姓見㣲豈止于聖人哉如其不然則願有以詔我惟母曰所感而起故所以為終而已明㣲子賢者以一身為萬世法有不幸而遭世之亂其所以潔身而去之者亦已難矣而世之君子弗之或察又從而誣之遂使去就之義不明見于天下後世而姦人倍叛得以迹其誣而資口實真可謂不幸矣㣲子紂之庶兄也其去商也盖以紂錯天命蟄亡將至而將不免者于是不忍坐視其壓不得已而去之故孔子曰商有三仁㣲子去之初不明其何之而說者乃以為抱祭器以歸周吁有是哉按商本紀數諫不入乃與太師少師謀而去之及比干以諫死箕子奴而後商太師少師挾祭樂器以奔周武于是乘以東伐于商二師初不明誰何人至周本紀則以為太師庇少師强事本周書當時盖有挾器去者而非箕子㣲子也惟宋世家始言武之伐商㣲子自持祭器伏于軍門可謂擇焉而不精矣至蘇古史遂正以為商紂之亂㣲子即持祭器以降于周果可實乎夫㣲子之去也豈茍然哉其謀之箕比也熟矣故其言曰我其發出狂吾家耄遜于荒而父師之詔亦曰王子出迪則㣲子之去志决已乆矣其所以遲吾行者特欲二子之一言鍵其决爾所謂去之者特不在其朝而其所謂遜于荒者直亦盤庚之出遯荒野以自免于刑戮而已矣何至挾祭器降周哉抑嘗稽之箕比㣲子皆紂之懿親位尊地近而與紂同休戚者也紂之不道固不得而茍去今也即其自靖之語觀之則知三子固恐一旦溘先脩夜則無以榖先王而欲各盡其忠以自獻者顧忍以先王重器適他人乎紂雖暴虐吾之天屬宗國雖危猶未冺也孰有宗國未冺遽倍天屬挾彛器而屬之異姓之仇乎覬成敗賣宗戚此項伯之所以為利鄉里自好者有所不為而謂仁人為之乎且㣲子之辱身而急歸周將有益于國乎抑無益乎使周而成果行王政則成湯且不廢禹之祀武王其肯絶湯祀乎使其不有存繼之心而遽挾此危亂不祥之器以趣新造之邦祗以䝉詬而貽戮曷補于國辱其身無益宗國雖甚戇有不為而謂㣲子為之乎方商佔危㣲為重親使潔身以去之則為仁若棄商而歸周則為叛謂仁人者决不叛君親于危迫之際而叛君親于危迫之際者决非仁人二者甚氷炭也况以重器歸他人乎僖公之六年楚人克許許子面縛啣璧衰絰輿櫬見楚子楚子問焉逢伯對曰昔武王克商㣲子啟如是武王親釋其縛受其璧而祓之焚其櫬禮而命之使復其所是則㣲子之歸周在商之既滅而禄父已封之後其去商也盖當邦之未喪箕比無恙之時矣其遯去者特以跧伏隱晦以俟紂之改若宗國之復存爾及紂不悛箕奴比死武王舉而踣之當此之時㣲子在野俱無一毫豫于間也何以覸之㣲子武庚尊卑賢否正相邈也使商未亡㣲子先降于周則已在武王之側矣以武王之賢而吕望周公實相之二子在側詎肯捨長立幼棄賢而植不肖以遺後世之憂哉盖武克商急于大義未及下車而亟求商後故即武庚而立之未暇于㣲子也及夫武庚巳國㣲子始見王乃祓而復之㣲暨武王崩成王幼管蔡挾武庚以叛周周公誅之然後訪㣲子而立之其始終去就正如是也面縛啣璧曷嘗有祭器之抱持哉雖然史遷本紀以為㣲子去而後比干死比干死而後箕子奴于是太師少師始奔周世家則謂箕子不忍彰君之惡徉狂為奴比干見其奴乃諫而死于是太師少師乃諫㣲子乃去其先後正衡决與孔子之言學者固折𠂻于孔子然而賢者之去就有未大明則將有以資亂故并覈氏姓之牒古者有史官左史記言右史記事而氏族之牒别自一家也是故有内傳有外傳而又有世本之書不可節也太史公作史記乃以其族舊之逐國與人天下謂之紀傳于是事類始有棄大而録小太史公可也而自固以下不之能改是為得與歐陽子之紀唐氏也爰表世系盖欲景文之為臣而世不之知遂使宰相宗室至今異傳諒可歎也予述路史既歸天下之氏姓而特異髙辛氏族姓之多乃為之紀而復歎後世氏族之不講也夫氏姓之著人倫之所由叙風俗之所由篤亦政教之甚急也而世咸忽之使不明焉然則俗之澆惡豈惟民之罪哉古者司商以協民姓民庶之家無妄改也後世官厯之書反著天老乞姓之文此何為邪若是而欲氏族之不亂不可得矣武為蝮揚為梟蕭為蛸孫為厲此惡號也亦必有由焉王為可頻李為徒何楊為普陋如而蔡為大利稽此夷語也然而猶可稽也奈何氏姓之書不知其由乃復妄為之說如以雙姓為出䝉雙竒姓為出伯竒愚出愚公度出度支軍本冠軍皇本三皇兒因語兒終因六終春則自于春申有則自于有巢居本于先且居西本于西門豹謂為象麗之變謂冷為冷倫之訛芻因于牛哀之食芻兹因于才子之宣兹審出于面勢之審曲此何典故又若以童為出老童而洪出于共工箕出商紂伊由唐堯昌由昌意累出累祖𣆀出于𣆀叔季載而卑本于卑耳之國其妄繆何可槩邪上世書必同文而後世儒流視為小伎漫不之習無惑乎氏姓之失其統也且以名山非必從山名鳥非必從鳥草木之名豈皆傍施草木蟲魚之字奚必側設蟲魚是則國邑之名古之從邑者甚少今也不原其始而謂邾郳鄷􅌏䢾邳鄾鄐郾鄅􅥧鄶鄣􅀈邡􅀈䢵鄪邭卲鄖鄘邴鄎鄩􅀈􅀈鄃邘郜郕郲鄸􅀈邼郙之類皆因失國避難而去邑不知從邑者乃後世之俗制古希有也張納碑言張本張星栁敏碣言栁因栁宿果何據邪盧雷陳甄既云聲轉仇求棗棘則謂仇改惟不學之過哉亦不識字之所致也往予嘗謂王羲之弄筆寫林禽為來􅀢而世亦千年弗知反為說曰果孰􅀢來而以為名俗儒之可笑類如此東方生曰來來為棗而棗陽本棘陽也予以是知文士士棘祗棘據之改為棗非避仇也昔者魯之公索氏將祭而㤀其姓人以是龜其必亡而隨之文帝惡隨之從辵乃去其辵以為隋不知隋自音妥隋者尸祭鬼神之物也守裶既祭則藏其隋亦云釁殺裂落肉之名也卒之國以隋裂而終則書名之䜟其禍如是然則君子可不知所戒哉今夫百齡之木柯十而枝百條十同葉萬同一根抵也使盼其葉而曰是云本逺是不由于其幹可乎是故循其枝而求其本則易從其本而求其末則難三代之君獨商周為長世故其為氏姓也尤繁此不得不紀也予述路史又綴國名紀而後天下之氏姓始大定循而索之則民徳歸厚矣豈徒區區之虚文哉路史卷三十五

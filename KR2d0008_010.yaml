body:
  text: 路史卷十宋羅泌撰後紀一禪通紀太昊紀上太昊伏羲氏昊本作昦按太昊幣文作昊又作奭奭並太昊字方牙易通卦騐云伏羲方牙精作易無書以畫事謂以畫卦事為治也故論衡云伏羲以卦治天下鄭氏六藝論云易者隂陽之象天地之所變化政教之所生人皇初起鄭康成注以為伏羲世質作易以為政令而不書止畫其卦之形象非也一曰蒼牙通卦騐云遂皇出握機矩表計寘而其刻曰蒼牙通靈昌之成謂伏羲也説者以為文王非按雷吏有蒼牙所謂蒼牙利鋒者風姓孔演明道經云燧皇在伏羲前風姓始王天下是伏羲因燧皇之姓矣三墳書言因風而生為風姓鄧氏姓書云東方之帝木能生風故為姓豈其然哉予固謂上世嘗有風國因為姓爾故帝後有風后風國之后蓋久而後得之𤣥女經云禹問風后知其後云詳國名記是為春皇寶櫝記王子年云以木徳王故曰春皇太昊氏居東方叶于木徳故曰木皇包羲世多作庖犧轉矣亦號天皇帝王世紀人帝皇雄氏一作熊並音𢎞世紀云一作雄皇蒼精之君也見鄭禮記注梁武祠像碑云伏羲蒼精始造工業畫卦結繩以理母華胥居于華胥之渚記云所都國有華胥之淵蓋因華胥居之而名乃閬中俞水之地子年以華胥為九江神女誣嘗暨叔嫟翔于渚之汾巨跡出焉詩含神霧云巨跡出靁澤華胥履之河圖亦云孝經鉤命決云華胥履迹怪生皇羲注云靈威仰之迹世紀謂迹出于燧人之時又云燧人没伏羲代之妄也迹事詳高辛紀稷華胥決履以跧之意有所動虹且遶之因孕十有二嵗以十月四日降神帝系譜云人定時生孝經河圖云伏羲在亥得人定之應張説大衍文符厯序云謹以十六年八月端五赤光照室之夜皇雄成紀之辰是以為八月五日矣非也得亥之應故謂曰嵗或曰伏羲即木帝故曰嵗十有二年而生也木生于亥十月在亥復得亥時其符皆至寶櫝記云帝女遊于華胥之淵感地而孕十二年生庖羲長頭修目龜齒龍唇白髯委地或曰嵗嵗星十二年一周也説文云古之神聖人母必感天而生子故曰天子生于仇夷遁甲開山圖云仇夷山四面絶立太昊之治也即今仇池伏羲之生處地與彭池成紀皆西土知雷澤之説妄也長于起城今秦治成紀縣本秦之小山谷名開山圖云伏羲生成起徙治陳倉輿地廣記以成紀為伏羲生處起紀本通用詩有紀有堂作有起龍身牛首𤣥中記云伏羲龍身靈光賦乃云麟身文子云虵身麟首有聖徳故周燮𫝊注云麟身牛首非也補史記世紀帝繫皆云虵身牛首詳女媧紀渠肩達掖亦同臂也今作腋山準日角奯目珠駿毫翁巤龍唇龜齒孝經援神契云伏羲大目山準日角而連珠宋均注云木精之人日角額有骨表取象日所出房所立有星也珠衡中有骨表如連珠象玉衡星長九尺有一寸望之廣視之專春秋合誠圖繼天出震悤明睿智蓋承嵗而王以立治紀而萬世循用之本木徳建以王肇脩文教為百王典以其載徳自木木實麗東道不可尚同乎元氣是偁太昊亦作皥元氣皥皥之義詳少昊紀得乎中央别而能全宿而有成因號伏羲伏虙羲戲字義皆同史傳或謂服牛乗馬因號伏犧取犧牲以充庖因號庖犧最為鄙妄按莊周等古書皆作虙戲無作犧者且伏羲古或用羲而犧牛之字未有用戲者況伏豈得為服御字乎故世紀云後世音謬或謂伏犧或作虙犧皆失其㫖然史傳一書元有異辭予攷古書獨禮緯含文嘉云伏者别也羲者獻也斯為最近王莽傳立斗獻亦音為羲謂北斗之魁標若勺形然集韻亦同稀勺而禮器之羲尊乃周禮之獻尊則知羲獻在古同義而叔獻之為叔戲有以也羲有純之義獻有成之義然羲獻字雖通理且有異集韻定用虙戲非正書疏謂伏羲以聖徳代物亦未然自有句而應世故又曰有句氏句即庖乃國名蓋其始迹之地其後復封之故潛夫論太昊之後有庖國姒姓今庖水在山陽平樂而帝墓又在山陽則其故迹無疑也後世弗知謂為庖厨已失大妄而班志更以為炮鄙陋甚矣方是時也天下多嘼教人以獵尸子豢育犧牲服牛乗馬草鞮皮䝉引重致逺以利天下而下服度世所有因存之天出文章河出馬圖于是觀象于天效法于地近參乎身逺取諸物兆三畫著八卦以逆隂陽之微以順性命之理成神明之徳類萬物之情而君民事則隂陽家國之事始明焉禮含文嘉云伏羲徳洽上下天應以鳥獸文章地應以河圖洛書乃則象而作易故大傳云伏羲氏作八卦此即文王之所用者壺子云伏羲法八極作八卦黄帝體九竅以定九宫皆近取諸身逺取諸物作枝榦衍為甲子而魏博士淳于後乃以為伏羲因燧皇之圖以制卦故高貴鄉公以孔子不言燧人氏没伏羲氏作難之也三墳書云伏羲三十二易草木草生月雨降日河汎時龍馬負圖始畫卦也蓋以草木紀嵗也雨降或以雨水言然河汎時非所紀伏羲文成萬代貴八卦作而厯數興疑未然也微顯闡幽章往察來于是申六畫作十言以明隂陽之中以厚君民之徳于以洗心退藏于密管子輕重云伏羲造六畫以迎隂陽作九九之數而天下化之六藝論云伏羲作十之教以厚君民之别十言乾坤艮巽坎離震兌消息也消退而息進謂天地萬物之間無非易非可以文字見直在消息中爾或作不言之教㖖不立文字或作十二言皆非畫舊云古畫字蓋法字爾古之為畫亦為法法至是而乏故有用九用六或作畫非觀象之變爻之動于是窮天地之用極數之原參天兩地而倚數以成變化而行鬼神八卦而小成因而重之以盡生生之理而天地之藴盡矣所謂先天易也八卦小成即八卦自重者是造六畫矣因而重之則六十四矣揚雄以為文王六十四非有辨别見原始反終神明幽賛于是神蓍著地靈龜出洛乃窮天地之賾極天下之動以龜為䇿以蓍為筮獻南占之一十八變而成卦以㫁天下之吉凶説卦言昔者聖人作易幽賛于神明而生蓍故鄭魴記云黄帝受河圖而定玉籙伏羲得神箸而乗皇䇿易乾鑿度所謂乗皇䇿者羲也古史攷云伏羲作卦始有筮其後敫巫咸善占筮則筮自伏羲始矣聖人之智非不足以立事也而人之于事不容無心以故是非吉凶有時而謬爰取信于無心之物爾夫卦不六十四不可以筮今先天圖始乾而終夬豈止小成而已出言惟辭制器惟象動作惟變卜筮惟占三墳書四事皆云伏羲政治小大無非取于易者如罔罟取離離有麗之象又離中虛罔亦中虛然結繩以為罔罟以畋以漁所取乃重離也離為目巽為繩以巽變離結繩而為罔罟之象罟罔目也重目為罔離為雉巽為魚自二至四有巽體自三至五有兑體巽為風兑為澤以畋以漁之象也是六爻果自伏羲重又可見矣一十三卦皆取兩象學者宜即此思之爾紾離象法蝥狐作為罔罟以畋以魚世本伏義臣芒氏作羅或作句芒化蠶桑為繐帛皇圖要覽因罔罟以制都市白氏帖云伏羲作布是以神農有不織之令黄帝内傳云黄帝斬蚩尤蠶神獻絲乃稱織維之功因之廣織廣之爾而淮南子乃有黄帝指經縷挂之説妄也王逸機賦云機織功用大矣上自太始下迄羲皇帝軒龍躍庾業是創語彼織女始制布帛蓋始機織爾給其衣服古者衣被即服製也特衣裳未辨羲炎以來裳衣已分至黄帝而衮章等衰大立非謂始衣服也三禮義宗云靇龍時瑞因以龍紀官百師服皆以龍名文躍鉤云伏羲作易名官命厯叙云九頭紀時有臣無官但立尊卑之别故周禮疏序謂政教君臣起自人皇之世伏羲因之郯子以為龍紀而漢儒説左氏者乃出春官青龍之類杜君卿從之蓋臆説作為龍書以立制號而同文字源云龍書太平御覽作景龍書稽夬象肇書契以代結繩之政百官以治萬民以察而文籍由是興矣書契代繩取之夬百官以治豈自後世神農之法一君二臣三佐四使言有虞氏官五十者誣矣或謂太昊結繩而治黄帝始有書契尤非也有説别見于是盡地之制分壤時穀以利國用功業徳望皆在于此能者有餘拙者不足董逌以為伏羲之制必不自聖庸委師于宛華即鬱華子爰興神鼎封禪書云昔泰帝興神鼎一一統天地萬物所繫終也黄帝作寶鼎三象天地人禹鑄九鼎嘗鬺饗上帝鬼神漢志師古云泰帝伏羲也制郊禪即命臣芒庖犧登鼈使鬼物以致羣祠而升薦之見拾遺記尋攷古書取犧充庖之説不可解于後世崔氏正論更謂太昊設九庖之官甚妄學者所宜領會正姓􅀈通媒妁以重萬民之麗麗皮薦之以嚴其禮示合姓之難拼人情之不瀆麗鹿皮也古史攷云伏羲制嫁娶以儷皮為禮作琴瑟以為樂通典唐志等皆作儷白虎通義作離云雙皮也婚聘薦皮為可裘服不忘古也禮外傳云伏羲以儷皮為幣豈若漢武之皮幣以白鹿皮方尺緣以藻繢王侯朝以薦璧者何休云儷皮𤣥纁取其順天地也鹿皮所以重古也法乾坤以正君臣父子夫婦之義聚天下之銅仰視俯觀以為棘幣好員法天肉方法地以􅀢輕重以通有亡太昊幣謂之九棘詳見發揮昔寶鼎尉王鎛家有一布長寸六分肩廣八分首廣五分足間二分重六銖面文作行昊乃帝昊字幕文作引李彦美所謂了旁斜畫者蓋羲字也錢書目為異布又董令昇家有一種長寸八分額廣六分肩廣寸一分足間五分重十二銖面文作父旻幕文作奭皆太昊字也攷之盄鍾帝直作二則此立之為􅕶信為帝字又封禪文昊作炅可見按三五古幣皆員内而方外為睥睨之形垂則象天之示置則象地之勢北㑹而南分而坦之則人也蓋本三才之義取象如此豈若後世之苟簡也哉察六氣審隂陽以賚之身而四時水火陞降得以有象百病之理得以有類于是嘗草治砭以制民疾而人滋信世謂神農嘗百草而孔叢子世紀皆以為伏羲蓋不有其始曷善其終伯禹治水猶資􅕐九載之功黄帝制宫亦藉古茅簷之制羲炎二聖既盡其性而後世猶有攷嘗之患咀蟲蛆齧草木而宫嬪多致死者況不為之度邪世紀云太昊制九針以拯天柱而傳亦謂黄帝命岐伯為之按靈樞岐伯對黄帝以九針則亦古有之古者以砭後代以針高氏之山多砭此也乃因甲錄真原賦云廣成子以靈飛六甲籙八卦鎮方籙乃卜法授伏羲故或竊謂河圖亦人所授合五緯建五氣消息禍福以為之元為合其行以為法春秋内事以謂自開闢後五緯各居其方至伏羲乃消息禍福以制吉凶始合之以為元斯失類矣命潛龍氏筮之乃迎日推䇿相剛建造甲子以命嵗時配天為幹配地為枝枝幹配類以綱維乎四象故情偽相感而星辰以順則漢厯志伏羲有甲子元厯是太昊已有甲子故陳鳴厯書序云伏羲推䇿作甲子而世本等皆謂黄帝令大橈作甲子非也橈特配甲子作納音爾嵗日月時亡易于作旋蓋隋志云蓋天者周髀是也本庖犧氏立周天度其傳則周公受之于商周人制之謂之周髀言天如蓋笠地似覆盤皆中高而四下商者周大夫商高也按周髀算經商高答周公云古者包羲立周天厯度趙君卿云立周天厯度建章蔀之法後揚雄洛下閎張衡之流俱衍渾天之説而蓋遂廢世亦不知其為太昊之法與渾天之非也有排渾别見著躔舍天本無度聖人以日行天三百六十五度有畸而一周故分天周以為之數以記日之所行既分天度乃假物以誌之二十八宿列布四方故于是以為當度之星有算周天度説别見立九部而民易理易卦坤靈圖蓋九州之始也寶櫝記云伏羲審地勢定山川是矣于是紀陽氣之初以為律法續志云宓羲作易紀陽氣之初以為律法建日冬至之聲以黄鐘為宫大簇為商姑洗為角林鐘為徵南吕為羽應鐘為變宫㽔賓為變徵此聲氣之元五音之正也世言黄帝始作律吕者謬矣以驗其符班志云大簇為人統律長八寸象八卦伏羲氏所以類萬物之情樂建立基律吕備矣故太公龍韜云三皇之世虚無廷情以制剛强五行之道天地自然六甲之分微妙之神以天清靜夜半遣輕騎去敵九百步持律當耳大呼之有聲應管隨其音應之此五行之符佐勝之術也矢正爻以配氣春秋内事云伏羲推列三光建分八節以爻應氣凡二十四置重爻以抵日以作甲厯伏羲八卦卦本三畫以三乗八得二十四并其偶書為三十六以二十四并三十六得六十因而六之為三百六十三八二十四四六亦二十四是為坤一爻之䇿六六三十六四九亦三十六是為乾一爻之䇿數可合故為者三八重之得四十八加一而成衍四九乗之得七十二以應五日之候因而五之亦三百六十以應當期之日非為六十四卦之爻嵗建寅甲日寅辰三墳云伏羲三十易草木而立立三十二易草木而河圖出又三十二易草木而造天書後一易草木作甲厯嵗起甲寅是伏羲以庚寅嵗生庚申即位與周家啟運之年合斯萬載之一遇也是書人或疑之是説宜有自來木盛于夘以夘之辰陞敷教之臺聽八風民授始伏羲有敷教之臺見三墳拾遺記云伏羲方壇之上聽八風之氣以作八卦方壇蓋謂天地猶佛者之言須彌今晉之趙城南十五里有伏牛臺世紀謂伏羲常居然云居此臺伏牛乗馬而名其言不類謂君資于民民安子安民危子危三墳乃絀神明開肺意舉六佐以自䇿見陶潛二八目命金提􅀈俗指苫蓋謹窖臧視之未居者借力成之以靖敷民金國提民藝祖皇帝定太昊廟以金提句芒配命鳥明建方泭窽木絶港道以濟不通奠八方旌九位而分九土真源賦伏羲别九宫因此置九州法語云始定四海之廣作八卦分九州据共工氏霸九州則州之九分不自帝嚳若黄帝矣亦自然之勢也視地之壙物之夥其爭日大勢不可以偏制而獨任于是經國求賢以極治寄而閎灋制故不慮不圖而人正世謂黄帝始分土建國非也按神農以伐補遂攻夙沙伏羲時有紀侯陽侯而傳亦記神農有逺國近國之制矣非始于黄帝也論語摘輔象曰燧人之佐成博受古諸家衷以為受諸侯之事蓋土地壙絶非賢共理則雖聖人有所不徧從古然也命視冒為貹志災惡察虛實居百䞈以平民摘輔象曰鳥明主建福視墨主災惡命紀侗中職定于中邦二八目作紀通宋均云為田主主内職仲起司陸均云主平地一作司陽陽侯司海宋衷云陽侯伏羲之臣蓋大江之神者許叔重云陽侯陵陽國侯也國近江以溺死應劭謂以罪自沈二説不同宣和博古圖有陽侯彞字作陽六佐職而天地位隂陽得乃體春穛明刑政脩兵仗以威懷太白隂經云伏羲以木為兵神農以石為兵蚩尤以金為兵今藤州俗以金石為刀劒蹇修為士以之御敗而下情至楚辭所謂命蹇修以為理者王逸五臣洪慶善等皆云伏羲臣謂為媒理云時理官主婚姻蓋理士也士主萬民之判或以騷經復有簡吾法乎前修何博蹇而好修之語非必人也慶善以為宓妃伏羲之女故使臣以為理修修字異蓋異事五臣作謇于是龢率萬民平水土道泉原因水居方而置城邑見三墳書或以世本諸書皆言􅕐置城郭非也國土既分城池既立故史記言黄帝為五城軒轅本紀言黄帝築城邑而氾勝書記神農之教雖有石城湯池帶甲百萬然而無粟則不能守也是炎黄已城池矣石城之制既自神農則土城之作有不自伏羲乎往古之事固有可得言者黄得襄城小童不自後世世本蓋因吕春秋言􅕐以尾為城而誤之吕氏之説特狀􅕐之凶惡焉爾百令具舉乃命蜚龍氏職圖父因尊事以為禮儀而天下治三墳書長離徠翔三墳云因鳯來而作樂長離者鳯也爰作荒樂歌扶徠詠網罟辨樂論云昔伏羲氏因時興利教民畋漁天下歸之時則有網罟之歌神農繼之教民食穀時則有豐年之詠按扶来歌即鳯來之頌乃神農之扶犂也扶鳯來犂音相同爾是知神農因太昊之樂以鎮天下之人兔園䇿注引傳云伏羲之人靜故作樂以鎮之黄帝之人動故宣正聲以檢之命曰立其以立基為立本大淵為大泉皆唐人避國諱斵桐為七尺二寸之琴繩絲以為絃絃二十有七命之曰離琴撡云伏羲作琴以御邪辟防心淫舊琴譜伏羲之琴曰龍吟故盧仝云五音六律十二徽龍吟寉響思庖犧爾雅云大琴謂之離事源及太平御覽云傳此琴伏羲所制樂錄云大琴二十七絃中華古今注乃以為伏羲造二十五絃之琴而琴式謂琴二十絃郭璞又云十絃皆失之切攷伏羲以木王者三與八者木之數也故三其九為之絃八其九以為其長非苟然也廣雅云伏羲琴七尺二寸或云三尺六寸六分五絃蔡氏琴撡亦云伏羲作琴五絃非也徽天音撡駕辨以通神明之況以合天人之龢楚辭云伏羲駕辨吳通賦所謂超延露而駕辨者劉淵林云伏羲作琴制此曲絙桑為三十六絃之瑟以脩身理性反其天真灼土為塤而禮樂于是興焉文子世紀伏羲作瑟三十六絃蓋瑟屬隂故用十六之數世本云庖羲瑟五十絃後黄帝使素女鼓之哀不自勝破為二十五絃具二均聲故小司馬三皇紀及小史皆云伏羲所作之瑟二十五絃按揚雄主為論云夫心與治游乎太和惟唐虞能充其任神與化蕩乎無境惟伏羲能承其統故二十五絃之具非牙曠不能以為神弓矢質的之具非羿逢不能以為妙隋志又云二十七絃乃爾雅之所謂灑非此負方州抱員天體泰乙統乾元紹天體寂明一垂䇿寢方而枕繩蕩乎亡竟以因應而覺悟乎天地之間不是賢而非愚不沽巧而尚行去羨去慕惟以道化上亡求欲于下下亡干進于上是以百姓足而宇宙洪寧官亡共備之民而死不用郭鳥嘼蟲蛇懐于𤓰毒隂陽之所雝沈不通者竅理之逆氣之戾物傷民積者絶止之是以事簡民純亡言而化天下之人浮游罔養而莫知所如往臣子以順君親以尊故星宿温潤而鬼神受職功揆上下洞八方而後世不可及也乃封泰山禪云云以昭姓攷瑞而曽報攷瑞者輯羣玉如虞舜之輯瑞黄帝之合符爾非云符瑞字從玉可見在治百六十有四載落真源賦而女弟㚿媧立字與包同年百九十有四葬山陽世紀云葬南郡在襄陽按帝冢今在山陽高平西北高平襄陽之境然九域志兖單皆有伏羲陵又河中府有庖王廟引戴氏西征記云潼關直北隔河望層阜巋然獨秀謂之風陵伏羲氏風姓也此當是女媧墓然古帝王墓冢皆非一所宜必有説都于宛丘故陳為太昊之虛世紀天皇庖羲都陳留遁甲注云伏羲徙治陳倉地非陳國則不必宛邱矣然厯代以宛邱為太昊之虛今宛邱北一里有伏羲廟八卦壇寰宇記云伏羲于蔡水得龜因畫八卦之壇有長史張齊賢文李邑易之然九域志陳蔡俱有八卦壇此後人之附㑹按姚睦亦云黄帝都陳者則羲黄俱在西方矣豈其先後徙邪始其父沒黄囊經云伏羲父葬震山下作丙放巽或代王世言伏羲無父其母感迹而生者妄也華胥死之葬覆車之源即藍田山也長安志云冢在藍田縣西三十里寰宇同厥妃殞洛是為洛神代所謂伏妃者即虙妃漢書音義如淳以為伏羲之女溺洛而死為洛水之神非也明曰虙妃豈女哉伏羲生咸鳥咸鳥生乗釐是司水土生后炤后炤生顧相夅處于巴是生巴人郭氏云巴之始祖後武王封宗姬支庶于巴曰子循古之故古者逺國雖大爵不過子巴主乃其後僣號秦惠虜之有其地寰宇作后昭因唐人巴滅華陽志順王五年張儀司馬錯伐蜀因取巴地分為三十一縣巴子五季流于黔而君之生黒穴四姓辰酉巫武元是為五溪赤狄巴氏服四姓為廩君有巴氏務相氏世本云巴郡蠻本有五姓皆出武落鍾離山巴氏生黒宂樊瞫相鄭四姓之子俱事鬼神後巴氏臣四姓居夷城為廩君世尚秦女事詳蜀紀後漢書黄帝應代有風后為之相環濟要畧云侍中古官風后為黄帝侍中周曰常伯晉志亦云秦以古名漢因之或疑其非然既為相則侍于中矣故張果云堯時為侍中因八卦設九宫以安營壘次定萬民之竁出隂陽正訣黄帝滅蚩尤徽猷多本于后尤北復以其輕勦其餘于􅜁谷人賴其利遂世祀之是為金山之神山谷及祠今皆在長安藍田謖封其後于任錫之己姓黄帝之孫任已實歸是生帝魁其在唐虞俱有封土書缺不見周之任即其後夏后氏之初封之庖為姒姓杜預世族譜亦有庖國云夏同姓或作包一也詳國名記遾周之興武王復其後于宿後有密宿須句顓臾邑于泲上寔典太昊之祀以為東䝉主須句乃須朐即鄆也在今須城京相璠云須朐一國二城兩名餘詳國名記是以季氏將伐顓臾而孔子傷之説見國名記須句後為邾所併魯復取之僖公伐邾取須句須句蓋滅于邾久矣至是魯取之後復于邾迨文公七年魯復伐邾而取之春秋特譏無故勞民取而不守云須句者遂為邑猶冒昔名爾云滅須句須句子來奔且云反其君俱妄預云雖列國而削弱為魯私屬尤非詳國名記而宿之後則遷于宋俱不復見莊公十年也鄆自昭公元年取之為邑猶以鄆名故三年季武子伐邾取鄆後有風氏偑氏氏並纂文又有􅣃氏皆古文之變羲氏希氏戲氏包氏庖氏㚿氏鮑氏宋本包姓臾氏顓臾氏東氏世又以東方氏為出女媧謂其主東方而風俗通更以東方氏為伏羲後俱妄詳見黄帝紀東䝉氏朐氏須朐氏任氏姒氏宿氏罔氏伏氏虙氏宓氏密氏服氏服本服不氏後而密本作宓按黄帝後自有密而密不齊本作宓故密子賤碑止作用虙以為伏羲後顔之推嘗辨之然伏䖍傳亦用服謬也宓乃密字又後魏賜劉子文及宿六斤氏並為宿帝之弟郝骨氏為帝立制其裔孫子期帝乙封之太原之郝蓋商因郝骨氏國之後有郝氏郝骨氏元和姓纂作郭骨氏唐書系表又作郝省氏云太昊之佐戚佐也贊曰泰始云逺聖人成能出包應世書契代繩肇脩文教以立治紀經域奠部畋漁棘幣原始反終分躔畫卦消息甲乙以成變化陞降禮樂教而不殊道凝體寂雲自蒼梧負方抱員明一坐䇿不慮不圖鬼神受職爰興神鼎封岱禪云萬世允賴若稽三墳天下有大本三上處其二下亦處其二仁者上之命義者下之命而財者上下之所共者也三者之于人猶魚之有水不可頃刻少也仁義立人之道聖人之所以配天地者也未有上好仁而下不好義者也惟仁者以財發身不仁者以身發財是故君子見得思義非後財也予既紀伏羲因玩其畫與孔氏之所賛然后知財之不可以不議也遲雞聲撡什器䠞市朝而趨隴澤者無非從事于財也今而曰利非孔孟所言而財者士之不道不㡬乎又欲禍天下于財乎嗟乎喙則鉗矣出而用之則歛之也刻之也剥膚鎚髓百孔並作而長不足也何則人心則異而其情不大相逺也伊聖人之治天下豈他術哉亦原人情而已財者聚人之大本天地之所生人情之所不能免者也故雖羲炎之為世不能舍是以為治不過所欲與之聚之所惡勿施爾也蓋天地之生財也莫非養人而生也是故天地生財以養人聖人為天地生財以為治是非外生之也因其理以為之理爾又非以其所養者害人也上漏下溢割鼻飴口豈聖人之為也哉請毋議其它六十有四卦莫非財也而孔子賛之曰天地之大徳曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義而乃繼之以十三卦之象是理財之説也畋漁之離耒耨之益與交易之噬嗑必先于垂衣裳之乾坤者是主財為君之説也畋漁耒耨食貨之本也交易為市通財之術也市道興而無道以處焉則强陵弱衆暴寡爭鬭攘奪乎食貨之場而不可以一朝居矣于是變而通之以除其敝故能長有其天位而獲大有上九之吉垂衣無為此惟乾坤之所以能用九六也用則變變則通而不窮矣舟牛致逺是亦以通之也致之而猶有患也故又為之擊柝弧矢以守之然後有財者始獲其安而宫室棺椁可作矣宫室棺椁是使民養生送死無憾者也是王道之本也苟為不安奚暇治禮義哉此大過之棺椁大壯之棟宇所以特後于擊柝之豫弧矢之暌與舟牛之隨渙也雖然張官置吏莫非為財也不有以決之不可也此書契之夬治百官察萬民之所以不可後也是羲炎黄帝堯舜氏之所以為天下者也善乎漢文帝之推言之曰吾為天下守財爾為天下守財者亦致其順而已矣是故因其情而為之治則為力易而得其功以石投水夫又烏有不受者邪卻壺漿辭牛酒利之小也而民悦之王業以成是則所以使之悦者初不在與之之多也悦不在多則其所以使之怨者奚間于取之之少乎湯以七十里文王以百里為政于天下而齊宣以千里畏人由此故也今而曰我能為君闢土地充府庫君之所謂良臣古之所謂民賊也依勢作威倚法以削聖人之所甚疾是故與其有聚歛之臣寧有盜臣盜者不過于欲利而聚歛者離吾之赤子者也制其田産教之樹畜道其妻子使養其老施仁政省刑罰正經界薄税歛深耕易耨不違其時壯者以暇日修其孝弟忠信斯民親其上死其長矣食之以時用之以禮則財不可勝用矣信能行此則四海之民仰之如父母如此則無敵于天下矣無敵于天下者天吏也斯不亦為天地生財者乎今也撡譎詭飾纎詐一日百戰苟可以得之者萬方俱試而口不好焉曰士所不道吾不信也夫言者未必為而為者常不言王衍之清談吾知其不若魯褒之能廉也取之有道得之有義烏在其不言哉刮之盡錙銖用之如泥沙豈人也哉京師之朽􅀈太倉之塵腐適足重不肖子之過爾鹿臺鉅橋非無財也以多而害于厥躬也而昧者往往藏舟夜半之壑獨不聞白公之愛夫財乎是梟之愛其子之説也兹非不議之過歟是又烏足語易之道也紀傳設論非作史之法也左氏傳春秋每事之要時有所謂仲尼曰孔子曰君子曰者蓋將以發其緒啟其㫁也後世史者乃特立之贊既非體矣而末更為評為論又有所謂史臣曰臣某曰臣曰制曰之類則失之矣予起路史惟中三皇不可得而稱紀若三皇與五帝全徳具美勉為之贊其諸紀叙不敢有所論贊昔者子貢方人夫子以為我所不暇其作春秋特亦不過直書其事無評品也今之論辨蓋以事出緜古隠脱難白有所不獲己者始别為錄私竊自謂以為士子所玩在是若别之則兹史復為㫁爛邸報乃準厯代史例所無附之逐篇之末姑遂聽之宜其用字時有本書不同君子其必察焉其辨證非詳攷者存卷外路史卷十

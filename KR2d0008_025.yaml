body:
  text: 路史卷二十五宋羅泌撰國名紀帝鴻後釐姓國白民山海經云銷姓國而汲冡書言白民之國今之白州亦見博物志孔朝以為東南夷與白州接防風釐姓守封禺之間二山在今湖之武康吳興記云吳興西有風渚山一曰風山有風公廟古防風國也下有風渚今在武康東十八里天寶改曰防風山禺山在其東二百步説文作嵎寰宇記云以禁樵采曰封山山東南二十里有禺山禹十二代孫帝嵎所居皆妄今錢塘之金鵝山郡國志云防風氏封此山下有風渚然謂古鄋暪國者又謬汪芷即汪罔説苑云汪芷釐姓説文云封嵎山在吳楚間汪芒之國厯代故以為防風也縉雲今處州縉雲郡有縉雲山是為縉雲堂縉雲氏之虗也永初山川記永寧縣有縉雲堂是矣舊經圖記皆以為黃帝之號黃帝之蹤失之歡兜以嬖臣狐攻専權亡國荀卿云堯伐之今𢎞農有地名朝志為歡兜之都然意歡為國當如魯歡未必朝地其後竄之崇山則今灃之慈利也有歡朝墓然領外歡州圖經記以為其竄所樂史亦記歡州為所放處則去崇山逺矣歡隨為州是為歡朱國山海經云國人似仙人面鳥喙捕魚海島郭氏謂堯臣有罪放南海死帝矜之使其子居南海祠之而神異經言歡朝民鳥足仗翼而行食魚不畏風雨有所觸死乃已居南荒中尤異崇山在慈利詳上潞之涉東南亦有崇山非也歡朱今歡州詳上三苗三周景式云柴桑彭澤之間古三苗國左洞庭右彭蠡負固而亡者今衡嶽潭之境而南海亦有三苗國山海經三苗國在西北赤水之東南海三苗之國記云禹伐有苗其餘裔叛以入南海外國圖云去九疑三萬三千里神異經云苗民人形而腋翼不能飛為人叨餮淫佚而無度居西北荒三危今戎虜瓜沙等州是其處有三峯山俗曰升雨山在焞皇南三十里地道記云鳥鼠同穴西有三危山三苗所處是也重􅀈穆天子觴重􅀈氏地在長㻏近黑水其先三苗羌今河關西南皆羌地濱于賜支至于河首綿地千里大人見西北經釐姓久逺之事謂人似狗蓋有知之者矣四凶之姦曰倱伅曰窮竒曰檮杌叨餮而已倱伅侜張之譬窮竒離竒之謂檮杌幬􅀢之稱叨餮貪叨之號爾而言者率過實傳曰投之四裔以禦褵襪又曰堯竄之以變四夷計四凶之在堯朝則為凶族蓋有今之君子所不及者不然則亦安能禦褵襪變四夷哉我之下駟當彼上駟然則四夷之視中國豈不甚相遼邪先王於此蓋有以處之矣此氐羌戎蠻與夫白民歡朝防風三苗髦民狂犬鮮卑安息等之所以不去於國名記者豈惟先王之族哉亦欲世人知生華之為幸而不自棄于禽物之歸而已雖然山海經云歡兜苗民至有甚異而東方生神異經更以倱伅窮竒檮杌叨餮為之四獸人之于獸逺矣然檮杌之叨餮之不已則去華而夷化人而禽不希矣離仁義人雖名固二足無毛爾是以君子惡居下流人之為人豈惟衣食飽暖而已哉少昊青陽氏後清帝德考云少昊曰清清地也一曰青陽春秋圖清有二預謂榮陽中牟西青陽亭是中牟今𨽻開封然考清地非一一在鄆漢封宫中同者或謂少昊國衛地今鄆之東阿東北西十里有清亭隱公四年遇于清者哀十一年杜云亭在濟北盧縣東一在濮臨濮西三十五乃宣十二年晉宋盟清丘者其邱髙丈又昭十一年一清丘魯地一在并解本曰清源在解之聞喜今在安邑北五十宣十三年赤狄伐晉及清者而并又有青原亦狄伐晉之路一作故樂平成十七年國勝待命于清者雲陽今荼陵有雲陽山有青陽氏墳蓋即青陽今長沙皆是青陽今潭之長沙昔荆獻青陽以西于秦者然貝之青陽漢之舊縣故城在今縣東三十五貝今之恩而青陽熙寧四省入清河而歐公于役志辛亥次青陽乃宿泗間蓋子孫之散處者若池之青陽則特在青山之陽爾天聖元年置窮桑宜在梁雍之域詳紀中説咸以為魯詳前紀蓋以傳謂伯禽之封為少昊之虗或其後所徙非始國窮桑也兖今兖之仙源輿地廣記云少昊之裔凡人有子八嵗教讓十三出之俾就外傅居宿于外誠欲以尊德性而廣見聞歷艱難而知疾苦也國君有子獨不知誨之乎太子者天下之本也其善者非他在于早教諭而習人事爾子曰吾少也賤故多能鄙事夫世固未有不先賤而多能者昔文王之卦乾父西北坤母西南中男近父中女近母少女介乎父母之間而長男獨逺居乎父母之外逺乎父母惟以成其德多其能也是故一鼂出震向明取離而天下治矣雒陽年少蓋知其一而未悉其二也彼知自古聖君少庸君多故亂日長而治日短者在于人主教諭之不早而不知鼂夕閨闈耳目之所接者盡冨貴無非陷溺其良心正性者也而能保其終不流乎風雪之中有奈草蔭覆之下無美樅舟臒之垣豈固少經綸之材邪佚則生疾安則忘患是故洪舒蒲假從欲敗度而無不至夏之癸商之受周之幽厲秦之二世與夫漢桓靈晉惠懷東昏叔寶若夫後代之棄迷菽麥惑屯毛繆豬驢而疑鹿馬者皆是物也舜居深山之中與木石居與鹿豕遊及其得位則垂拱無為而天下治晉公子十九年在外險阻備嘗而楚君蓽路藍縷以起草莾俱霸諸侯夏之仲康少康商之盤庚祖甲漢高祖唐太宗與夫文帝光武之所以能恢復境土致太平者咸由長於民間知人疾苦而已矣德慧以疾疢存聖賢由忍性達是故愛子不可存之膝下孟侯元子生于深宫之中長于婦人之手暑至于溫寒至于涼而已未嘗知憂未嘗知懼何自而知稼穡之艱難哉畀以天下是何異于俾蟾執鼠鱉捕蚤其不失之者無矣豫繹絡史見伏羲之出于庖神農之出于耆黃帝之出于熊少昊之出于清與夫高陽之出若水帝嚳之出高辛俱自逺方以陟帝旋致昭泰然後知古之有道之君未有不養成于潛者易曰潛龍勿用陽在下也或躍在淵自試也飛龍在天上治也滄淵者神農養神之所而潛邸者聖人養德少昊後國倍倍伐倍冝國緡蔑姓夏滅之山陽東緡漢縣陳留風俗傳云東緡故陽武戶牖鄉今濟之金鄉有古緡城鄒衍云豫登緡城以望宋都后緡國也僖二十齊二十六年楚各圍緡同金鄉故昌邑賈逵以緡為有仍之姓妄蔑一曰姑蔑姑引語猶于越今兖之瑕丘有姑蔑故城預在卞縣邾魯盟處隱元年或云魯附庸嬴姓尹般之封今汾州鄭樵説故尹地及周為尹氏采有吉甫墓王符云慶姓蓋亦作允允格汾駘封汾川以處太原絳州正平之汾水也故曲沃有駘神通典絳州曲沃有臺駘神元和志臺駘祠在曲沃西南三十六里臺臺駘宜以國名或即汾川一曰臺駘障九城志祠障並太原沈故國在汾川晉滅之沈約説成八年無之當是文三年沈潰者然恐其不在此與汝南之沈别約自序失之姒鄧名世云姒乃國名非姓也姓氏辨誤蓐辱鄏也所謂郟鄏俱在河南有鄏山後蓋為蓐收國風俗通姓纂云蓐收後未然鄀子爵舊鄀本商密秦楚界上小國商密楚地在商之丹水水經云南鄉丹水縣西密陽鄉世本云允姓國秦入之文五年後遷南郡預之説按晉志云南郡鄀縣鄀子國輿地廣記云楚附庸楚滅之今襄之宜城西南有鄀亭山上有城險固鄀鄉鄀水鄉居水仄貞觀嘗為鄀州通典皆作鄀故諸地書多以為昌意所封失之戎州允姓古戎州己氏之邑今拱之楚丘己氏城漢隨之己氏縣詳紀少昊後偃姓國臯陶之封杜云偃姓當與咎同商有咎單讀為舊非偃匽郾也光武曰郾最大宛次之楚昭陽伐魏取郾者今許之郾城有故城而蔡之褒信故郾城乃漢之匽僖元年有偃云邾地盟會圖疏云偃城在豫州泛言之州今荆南監利故華容古州也昔隨絞州蓼伐楚敗鄖者皆近楚小國外紀以為薑姓州誤莊辛言州侯者非淳于之州預云華容縣東南地然謂淳于杞併州遷于此而名則非絞佼也楚伐取之桓十二年邾邑有絞在隨唐之南漢有佼強或云原伯佼後傳云佼小而輕是國也桓十二年又曰日虞四邑桓十一年顛倒如此二在隨州南昔屈瑕將盟二軫者軫左氏傳記軫國在楚東南鄭樵三國未詳姓苑黃帝造車軫後賜氏妄謡見潛夫論郅鄆傳有繇延音遙歐陽歙舉督郵繇延宜謡之訛臯繇名也睆伯爵漢為侯論衡云廬江故睆侯國續漢志云廬江自舒徙居睆舒之懷寧有睆故城睆公山諸葛恪所屯睆伯廟九域志宋州郡志云晉安于舊睆城置懷寧為晉熙郡治方輿記舊睆城武德五年王𢎞讓析置在古逢龍城內魏書臧霸討難當逆戰逢龍即此居睆水之北因號睆城史云夏姓非地記睆偃姓系臯陶後楚滅之佑作皖音患同參會阮文王侵阮是矣或云周中葉阮鄉侯晉伐秦圍邧新城蓋與元同文四年而切為願晚故説同阮然代之五阮關乃音通而地異也邧新城如言宋彭城爾説以邧為秦邑姓纂謂在岐渭之間説文云鄭邑蓋自别棐鄭地文公會鄭伯處十三年説即棐林宣元年襄三十一年今開封宛陵有棐林林鄉一作棐集韻棐漢侯國一作棐音肥在魏郡宜誤舒僖三年徐人取舒杜云廬江舒縣今廬之舒城也一作舒羣舒子爵文十二年羣舒叛楚夏子孔執舒子平止今首陽北故曰止陽舒庸楚滅之成十七年在舒城與庸别寰宇記舒庸城與舒鳩城相似預云東夷國繆舒鳩楚滅之襄二十五年襄公時吳子使舒鳩民誘楚民或作氏預云楚屬國故城在舒城內寰宇記離城襄二十五荒浦二十四傳鳩兹皆其地舒蓼鄝也集韻一作􅀈字當作􅀈楚滅之宣四年武德四為蓼州領霍丘七年廢入壽盟會圖云在光州杜以為二國既非而通典更以為湖陽湖陽乃廖因預之繆預云棘陽東南湖陽城是漢志從之舒龍預云六西南有舒城又西南有龍舒今舒城西有龍舒故城去州三百而舒城懷寧皆有龍舒鄉大小龍山曰龍以别羣舒然境以龍稱水城在龍舒水西南中有池深仭無耗舒鮑世本云小國寰宇記舒鮑城在舒城西北龍舒水南小於諸城晉悼公大夫舒鮑無終舒龔兖之龔丘東南二十有古龔丘城然與羣舒逺宜别國鬲郡國縣道記古鬲國郾姓臯陶後漢為縣齊天保七併入安德今𨽻德州西北有故鬲城酈今南陽屬縣右二十二國偃姓孔子作春秋凡并國邑在內皆曰取取田四取國邑十四是直書取小國限牟鄟邿鄶鄆郜防與闡也書伐某取之者本其附屬如伐邾取須句是也亦公孫惲父伐邾取鐸雖內臣曰取外而書取必其以計若本有者也莒伐把取牟婁宋伐鄭取長葛鄭伯取戴必其元屬者齊人取子紏魯為郜取西鼎皆元有者也僖三十一取濟西田濟曹田而我取之宣四年濟西田以賂齊故書齊取十年而歸于我如昭元春取鄆田秋疆鄆田見非我者十五年齊因公出取鄆以居公故書齊侯善之也哀八夏齊取歡及闡冬歸之定十歸鄆歡龜陰田此皆計取者徐人取舒何也僖三舒昔屬徐今屬魯而徐人取之也外取內邑不繫國故代以歡闡鄆為魯邑不知酄闡鄆亦皆昔不屬而今屬郜者文之昭也豈宋屬邪然罪之宋則見其今服宋故伐宋而取之知此則知舒之所屬矣據考其地宜居徐魯之間而非羣舒哀公十四年有舒州者正乃齊地據以舒為羣舒江淮雜夷而徐取之為夷蠻之自相并此尤繆矣預例以為勝國不用大師曰取用大師曰滅抑又大妄夫成國重于附庸附庸重于都邑春秋必謹于此惟其罪有輕重淺深也今顧不然而反為不道者記師行之難易邪衛侯滅邢可謂易矣而不書取公以楚師伐齊取穀用大師矣而不書滅不為難易書亦明矣蘇輒以徐稱人為羡尤疏雖然秦趙宫李黃徐􅘌費解梁諸國其後盛矣而臧文仲以為臯陶不祀此左氏之妄志也謡棐參會阮酈舒止皆偃姓也而王符以為優優姓商出于潛夫之失考且以舒庸舒龍舒鮑舒龔與舒五也而佑以為楚之五舒為一唐史遂謂羣舒一國五名勞乎今之記哉少昊後嬴姓國六中甄國壽之安豐南有故六城漢縣九江王都元狩二為六安國治六而以蓼為屬東漢並屬廬江晉省入安豐寰宇記蘄之廣濟為秦漢之六有臯陶冡在舒城東南六十陂中英楚與國魯僖十七年齊徐伐英氏者漢為黥布國嬴也翳能繁物而封漢縣𨽻泰山後魏復置于萊蕪唐入博城所謂嬴博今兖之萊蕪本齊邑公會齊侯處盈嬴之枝作雒云熊盈以略者與熊䣍皆為周公所郯一作􅱡姓也或云即嬴者非費翳之封音沸費仲費昌國費州費水之地與魯費河南費異河南滑費禹後扶未切魯之費音祕各見蕭孟虧封徐之蕭漢故縣屬沛北征記云城周十四里南臨沔水非蜚也蜚亷國龍門縣南七里有蜚亷故城非子祖也又絳之正平蜚亷城云事紂所居趙晉之趙城南三十五故趙城造父封史注趙城在河東永安隨義寧二置趙城寰宇記今趙州其地也趙郡北齊為州曲沃訾馭服趙奢馭服君封今海之永年有馭服岡邯鄲磁之屬縣唐𨽻洺風俗通云邯鄲氏以國為姓眭籛禾名𨽻省為秦非子初封秦亭今隴之汧原隴西鎮有秦亭秦城元和郡縣志城在州東南二十五世本云附庸然非子初封實秦谷在今秦州隴城漢隴縣襄公始侯有岐豐地莊居大丘今永興興平漢槐里文復汧渭德遷雍今鳳翔大興獻遷櫟陽孝徙咸陽並𨽻永興遂世處之伯爵針繞成六年晉楚遇于繞角徵北徵也今同之澄城梁伯爵本少梁夏陽也伐曲沃者秦德公三年梁伯來朝索隱云嬴姓是矣秦惠文公更名夏陽今韓城今同之韓城有少梁故城在韓城南二十三文十年晉伐秦取少梁者好戰而亡僖十九年梁亡今有新里城梁伯所築樂史云在澄城本華氏邑有梁山禹治梁及岐山梁餘遼山縣河東圖和順縣晉大夫梁餘子養邑云云將良本曰良今淮陽軍有古良城預云下邳良城縣哀十五年良地屬吳史作將良運京相璠云廩丘東八十有運城廩丘隨併入鄆城今𨽻濟晉人執季文子還待于鄆即此成十六年掩即奄䣍也兖之仙源故曲阜有奄城奄里古之弇中郡國志奄城古奄國茂先云史記出魯弇中自運遷掩故史有運掩氏魯近淮夷武王伐之唐韻䣍國名商奄也祝他云因商奄之民以命伯禽者按將蒲姑成王政俱云踐奄而周官言滅淮夷大誥言佳夷叛而多士乃言朕來自奄知為夷也襄二十五年弇中預疑為泰山萊蕪西甕口谷鍾離子爵世本云嬴姓國徐之别封上又九域志今沂之承有鍾離城乃晉吳會處成十五年預云淮南縣今屬濠州然時方謀伐楚豈得會其地預之誤也遂滅逼陽逼陽去鍾離城六十應劭云鍾離子國在九江蓋其後徙于此吳滅之昭二十四年傳吳滅巢及鍾離鍾離不書疑光武為侯國今濠之治東六里鍾離故城也而宜咎之所城則楚地矣今漢陽軍尋今尋陽字一從水衙漢馮翊屬縣今同之白水東北六十彭衙故城也文二年彭衙杜云郃陽西北有衙城馮翊故城亦在白水東北音魚如吾穆公子采一音牙或音語訝非汪秦邑同之白水有汪城在臨晉東後屬晉文二年晉伐秦取汪及彭衙索隱云不知處誤莵裘盟會圖云兖之泗水縣預謂莵裘在梁父縣南梁父唐入乾封今之奉符也不羮二春秋時二不羮襄城西不羮汝之襄城東南古不羮城在今龍興之南定陵為東不羮在定陵西北定陵今入穎川舞陽鄭樵以此為西不羮龍興為東不羮楚併之子革云四國皆足畏謂陳蔡二不羮也昭十一楚城之子晳曰三國賦皆千乘見非小邑東灌以有斟灌故此為東東閭修魚即蕭魚鄭地襄十一年杜闕樗里今謂南陽鄉有樗里密如預云費縣北有密如亭費𨽻沂一作􅀈高陵蓋秦昭弟高陵君封今屬京兆裴􅘌也河東聞喜􅘌鄉是解洛陽西南大解城也又有小解非河東之解昭二十二年周軍于解者周地徐趙孟曰周有徐奄括地象云泗州徐城縣北今徐城鎮在泗之臨淮鎮北三十有故徐城號大徐城周十一里中有偃王廟徐君墓去徐州僅五百郡國志曰薄薄城本下邳僮即今臨淮取慮徐之分漢屬臨淮故下邳西南有取慮故城在虹北百二十光武以益楚者以取慮益楚國十三州志讀如觜陬邾婁野王音秋閭淮夷世本云嬴姓蓋非一武王所伐其一也右三十九國皆嬴姓諸嬴為少昊後不待較矣由漢而來皆謂伯翳為伯益而後始有以諸嬴為高陽之後至有知伯翳為少昊之後者則不知伯益為高陽之子言氏族者襲偽躡訛莫知其繆文字滋多大率相紿求其為適不亦難哉豫亟矜之是以論其世也後有識者曷益損焉少昊後李姓國李徐廣云河內平臯有李城李阪今溫縣城是昔李同却秦兵死封其父李侯即其地史説平原君封苦碩宗封今亳之衛真漢苦縣𨽻淮陽國晉屬梁國後魏為谷陽唐為真源有渦水瀨鄉祠老子生處萊段干蹇叔處干干國也處干而干亡之秦而秦伯非愚于干智于秦也郡國志衛縣南有干城詩出宿于干者今開封有𨝍溝有段干木廟九域志而墓乃在汾之孝義東北二十五孝義乃漢兹氏右四國李姓段干李姓邑也初邑段後邑干因邑而氏魏世家有段干子田世家有段干朋而風俗通氏姓注乃以為姓段名干木蓋以吕氏春秋干木光于德與魏都賦干木之德之言誤之唐百官表遂以為封段而為干木大夫疏矣幽通賦云木偃息以藩魏干木豈其名哉姓書或更以為鄭共叔後抑又妄云江晉志汝南安陽江亭也預同按在信陽縣之東南新息之西有安陽故城寰宇記安陽故城江國之地黃子爵楚滅之僖十二年光之定城西十二有故城樂史云黃國故城十三州志云定城置在古黃子國南十二里少司馬云弋陽故黃國弋陽即今定城其去黃州四百五十先儒亦疑其相遼不知其異昔黃不事楚曰自郢及我九百里非齊安亦明矣耿伯爵河中龍門縣十二故耿城晉獻公滅以賜趙夙遂曰趙今晉之趙城閔二年都城記耿嬴氏國辨誤以為皮氏東南耿鄉弦子爵楚所滅僖五年杜云弋陽軼縣東南今光之仙居東十里弦亭也武德三為弦州軼故城在仙居北四十晉志弦在西陽西陽今光山縣故歐陽志以光山為故弦國兹二牟夷以防兹二邑奔魯預云姑幕有兹城姑幕後齊併入東莞今髙密有故城九域志姑幕城在密然太原亦有兹氏城晉志蒲晉志云隰之蒲子今隰川縣北四十五故蒲城晉重耳居通典云故蒲城縣長安志云蒲城縣同本之蒲城在縣東三十里與衛蒲别衛之蒲在開封長垣東北十里子路所宰時博昌有時水春秋之乾時元凱云旱則涸故曰乾時齊大夫時子白蔡之褎信西南白亭是楚平滅以封子建之子勝曰白公郯子爵故東海郯縣唐入下邳無壃云願齊試兵南陽莒地以聚常郯之境則齊莒之間也今淮陽軍治有古郯城在東北百五十沂沐二水間周十餘里有郯子廟漢志少昊後外紀與地記云己姓國秦為郯郡優今優州春秋以來楚地巴左氏傳巴師侵鄾今巴瀘二州境宜與太昊後異置史記作𡨕云嬴後有白冥氏則以白冥為一也冥在陜詳周後國穀詳周後國麋詳高陽後國鄖鄖子鄖夫人國也世族譜云嬴姓傳太叔會鄖乃衛地哀十二年非鄖姬二姓鄖葛魯附庸齊昭公母葛嬴在河內修武有葛伯城葛伯墓九域志湯始征者祁太原祁縣以祁藪名自漢不改其地甚廣金坡遺事係小國蓋以祁奚邑爾祁奚墓在安邑子爵齊桓二年滅之魯莊十年今齊之厯城武德中為談州東南十里有故城預云濟南東平陸西南有古談城竇蘋云今齊州東平陵鎮也輿地記平陸唐或作平陵一作與郯異齊世家作滅郯故世以談郯為一而鉉以作談為非皆誤右一十八國亦嬴姓魯宣公十三年齊師伐莒楚子伐宋二國之興兵皆以晉也莒從晉不事齊宋與晉不順楚強大之為虐春秋極矣方扈之會鄭會而陳不至故林父伐陳以即楚也楚子伐鄭以服晉也並宣九年夫為盟主不務德以聽諸侯之去來而每以力勝豈長久之道哉沈服楚晉伐沈江與晉楚圍江同文三年曾未幾何沈潰文三江滅文四雖晉楚亦末如之何者故君子務修德不修德而爭諸侯徒自悴爾此聖人所以皆人之歟莒紀姓輿期二世兹丕始封都計後徙莒外紀寰宇樂毅破齊城莒獨不下隨為莒州今密之莒縣理厥後徙鹽官故世謂南莒計計斤爾樂史云兹輿始都今高密東南四十箸丘渠丘二莒子朱居為渠丘公莒邑也寰宇楚子重伐莒圍渠丘者今莒縣有渠丘故城風俗通云晉有渠丘公乃莒也與齊邑異齊渠丘乃雍廪邑今臨淄西北西安故城也安丘漢縣𨽻北海今𨽻密有安丘亭西南十二有漢安丘城寰宇記云即渠丘邑安丘望之嵇康高士傳持老子不仕無婁即牟婁也本牟夷國後屬杞今密之諸城有婁鄉城字書無婁微視也音牟且于犂比林閭凡莒邑皆公稱右紀姓國密人不恭敢拒大邦侵阮徂共王赫斯怒爰整其旅以遏徂莒以篤周祜以對于天下此詩人所言王治天下弭祻御患而以膺夫天眷者也密密須也密須之人旅拒王命侵逼阮共之二小國王始以其不道赫然奮怒整治師旅以遏絶其徂莒者蓋將以除祻亂于下斯天之所為福也以篤周祜以對于天下斯人之所為悅者以故孟子援之為説而鄭氏乃以莒阮徂共為之四國蓋惑于前者四國之説不惟逺失詩人美王去亂之意而於詩文亦不亂維此二國其政不獲維此四國爰究爰度此言天之所以興周者也皇矣上帝臨下有赫則監觀而下語可知矣二國者密人崇侯也崇密為虐政可謂不獲矣而公乃以為之殷夏豈其然邪維此四國爰究爰度此言天以四方君侯付之周王而究度之故下又云乃眷西顧言其卒與周也何得以是充四國乎按馬遷言文王征伐之數甚備孰有所謂徂者顧亦何嘗伐阮共哉昔楚人之滅江秦伯為之降服出次大夫諌之秦伯曰同盟之滅雖不能救敢不矜乎吾自懼矣故君子曰詩云維此二國其政不獲維此四國爰究爰度其秦穆之謂乎文三年惟孟所言以遏徂莒而今乃云以按徂旅斯則秦之後出于民間定于講師之口者耳彼上方言爰整其旅而此遽云徂旅其不然昭矣春秋初年紀子莒子為盟于密莒杞密之近也王之伐密于此遏其往莒之師戡亂之祻理必從其亟宜莒之為正云路史卷二十五

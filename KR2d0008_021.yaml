body:
  text: 路史卷二十一宋羅泌撰後紀十二䟽仡紀有虞氏帝舜按舜本作􅀢古作􅀢從夾從舛汗簡􅕆集韻􅀢􅕆􅀢訛有虞氏姚姓見世本因生賜姓堯世風俗通按書舜生姚虚云在濟隂成陽非其先國于虞始為虞氏天子建德因生以賜姓祚之土而命之氏祚土謂封之虞命為虞氏因生謂生姚虚因賜姓姚此氏姓之别故世本皆上言姓下言氏虞氏亦見左傳正義書云有鰥在下曰虞舜虞舜側㣲則帝㣲時止姓虞而名舜可知王符志氏姓云舜姓虞而史伯亦稱虞幕則其上世為虞矣杜預云虞乃舜之先世數未聞瞽子兩目不見史云盲者子是也二孔以為有目但不分善惡者五帝之中獨不出于黄帝自敬康而下其祖也有辨見發揮敬康生于窮係史記曰窮蟬宋衷以係為諡非係出虞幕後之幕姓宗焉風俗通姓譜等幕姓皆云出幕是生喬牛喬牛生瞽叟瞽叟天瞢史云窮蟬以來㣲在匹庶謂庶士非庶民也曰嬪于虞虞乃小國即瞽所封是侯伯矣然王逸以舜為布衣而耕漁陶販皆庶人之事者盖以父母頑嚚去而耕野若伯竒重耳云幕能平聽恊風以成樂而生物有虞氏報焉報祭之孔晁云幕能修道功不及祖徳不及宗故每于歲之大蒸而報祭之左氏言舜祭幕而風俗通亦謂舜祖幕與吕梁碑合皆無句望而以幕為祖賈逵韋昭乃以幕為虞思盖因世本等序舜為高陽五世孫而所謂幕者無地以置之遂以為之後世爾按内傳國語俱云自幕至于瞽叟無違命然後言舜重之以明德豈得云舜後哉舜長九尺孔叢子云舜長八尺有竒靣頷無毛亦聖也世紀云六尺一寸非太上員首春秋繁露云舜形體太上而員首長于天文純于孝慈龍顔世紀日衡古謂眉衡故執天子之器上衡日衡者眉骨圓起也洛書靈凖聽云有人方靣日衡重華握石椎懷神珠注謂衡有骨表如日懷珠諭有明信椎讀如錘言能平輕重方庭甚口孝經援神契云舜手握褒龍顔大口靣顄亡髦懷珠握褒尚書帝命驗云虞舜聖在側陋光曜顯都握石椎懷神珠注謂懷珠以諭聖性援神契注握褒者手兆如褒字喻從勞苦受褒飾致大祥也洛書注握謂知旋璣之道形卷婁色黳露莊子云卷婁者舜也注謂背項傴凹向前也文子云堯瘦㿑舜徽墨尸子堯瘦舜墨言憂世念民至于此而鄧析子言堯舜至聖身如脯腊堯若腊舜若腒故王充言上帝引俛此謂舜也承安繼逸無為而治何為若腒哉目童重曜故曰舜而原曰重華世紀云因瞳子名重華真源云字仲華按荀子堯舜參眸子是堯亦重瞳然但一目重書大傳言舜四童子則兩目重矣故春秋演孔圖云舜目四童謂之重明承乾踵堯海内富昌元命苞云舜重童子是謂重原上應攝提下應三元尸子淮南子云舜兩童子是謂重明作事成法出言成章夫舜葍也蔓地蓮華之名有晱曜意故目好動而曰舜或作瞬書注云舜名也儀禮正義以為名號之名非也辨見發揮濬哲文明温恭通智敏敦好學而止至善寅畏天命而尤長于天文大戴禮云寛裕溫良敏敦知時而好學又云畏天愛民恤逺親近叡明通智為天下主初家于冀夙䘮其母世紀云母握登詩含神霧云握登見大虹意感而生舜于姚墟按書帝命驗云姚氏縱華感樞注縱生也舜母握登感樞星生舜重華樞如虹也河圖注命云握登見大虹意生黄帝謂舜蒙茨緼棘哀綿五至猶未歉者䘮期之有數盖有是顯三年問曰三年之䘮天下之達䘮也百王之所同古今之所一未有知其所由來者故傳以為三年之䘮雖貴遂服禮也而許氏注淮南子乃以為三月之服夏后之禮妄矣松冉斬衰投和截髪生韋百濟流思嚚三年通典以䘮期無數為黄帝時三年遏密為堯崩後斯得據矣瞽叟御而生象或云象隨母嫁者妄象得親乃咸惡舜御以不道舜于是往于田泣旻天號父母負罪隱慝大杖避小杖受子云舜于瞽瞍索而使之未嘗不在側索而殺之未嘗可得人窮則反本疾痛則呼天韓非以往田號泣為未盡命誣矣事親拊弟日以篤王充實知云虞舜大聖隱藏骨肉之過而尸子云事親養兄為天下法是則更有兄也象憂亦憂象喜亦喜惟恐不獲于象以貽父母戚道而不徑舟而不游凡所以動心忍性皆以増其所不能夫然故死生不入于心而能動人琴操舜耕厯山思慕父母見鳩與母俱飛相哺益以感思因而作歌夫虞帝之迹琴中尤多學者不省虞帝盖不幸而以孝名後世而說者率過實自萬章倡井廪之說而語益紛紛有論見發揮與木石俱而光曜顯都麗然汗著年二十而以孝友聞四海故天下大說而將歸焉方是時口不設言手不指麾執𤣥德而化馳若神莊子曰以此處上帝王天子之徳也以此處下𤣥聖素王之道也堯以帝王天子之德處上故曰駿德舜以𤣥聖素王之道處下故曰𤣥德老子曰𤣥德深矣盖堯以成德為行乾之九五是也舜則隱而未見乾之初九是也厯陽之耕侵畔乃往耕焉田父推畔爭以督亢授舜耕厯山在河東乃首陽山九域志云厯山有三濟南濮陽河中今秦地池陽澧陽潘城始寧等處皆有之有說見餘論濩澤之漁爭坻乃往漁焉䰻人巽長爭以深潭與淮南子云釣于河濱濩澤在今澤之陽城唐濩澤縣應邵云澤在縣西北沁水東逕濩縣故城南漢之澤氏縣魏土地記陽河有沁與濩澤水合者紀在梁惠王十九年晉取𤣥武濩澤墨子亦言舜漁在此故金鑰謂澤州為舜澤十道記云澤州以濩澤得名皆在河東或云漁于雷澤雷澤濟隂非也東夷之陶苦窳當讀如臯陶之陶故綿詩注云鑿池穴居如陶然陶于河濱期年而器以利見朝子淮南子河濱在蒲陶城北有故陶城南去厯山甚近故孟津有陶河之稱一云河濱在濟之鄆城盖以東夷之說也夫帝冀人而虞濱厯山陶城皆在冀盖初耕于野未必逺去父母也然夀丘在濟負夏在衞則商販觀風或往來于此不必限一所牧羊潢陽而獲玉厯于河巖所至嚮合公孫尼子云舜牧羊于潢陽堯舉之以為天子公孫𢎞云牧羊于黄河于寶云舜耕厯山獲玉厯于河際之巖知天命之在已體道不倦當其田也旱則為耕者鑿􅭖儉則為畋者表虎與四海俱利是故光如日月而天下歸之見尸子云舜之德無不該南靣而治天下燭息風食火飲于澧舜其猶江海乎千仞之溪滿之螻螘之穴亦滿之禹湯之功不足尚矣又云舜之陶也不能利其巷南靣而治天下則蠻夷䝉福淮南子用之父母之不我愛弟妹之不我親故雖躬稼陶漁惡悴勞苦燭息火食口腹不獲于美厚而諧和正救烝烝乂亡入而不自適世傳瞽瞍與象每欲殺舜其妹婐首每為之解許說文云或作畫婐一音畫也類林云瞍填井後兩目方瞽又云舜耕厯山歲不熟舜糶其母詣糴每還錢與米問之子也因相抱泣拭其父目尋自明堯聞而妻之真源亦云糶于平陽市父認之乃䑛其目目以光明又御覽八百十二卷引史記舜為父淘井取金銀安罐中與父母齊東之語也婐或作擊一作繫列女傳舜女弟繫與二嫂諧是矣灰于常羊什器于夀丘就時負夏未嘗暫息頓丘買貴于是販于頓丘傳虚賣賤于是債于傳虚以均救之故孔子曰耕漁陶販非舜事也而往為之以救敗也舜其仁也乎編蒲結罟躬耕處苦而民從之一徙成邑再徙成都三徙成國至鄧之虚而百千萬家世紀云遷于負黍每徙百姓從之按衞有負黍鄧今襄之南鳯林古之鄧林祈侯之國楚之北境小大說之秀士以從雄陶方囘續牙伯陽東不訿秦不宇靈甫不辟而至周旋厯濩之間為之七友迨既禪七人者始逃之王斶云堯有九佐舜有七友淵明亦云七友魯連子云舜耕厯山而交益陶河濱而交禹然後受禪時禹纔十歳或者疑之雄陶續牙人表作雒陶續身一作續耳𨽻轉失之吕本法云堯舜得伯陽續耳而後成又日舜染于許繇伯陽註為老子舜師之非也初堯在位七十載矣見丹朱之不肖不足以嗣天下乃求賢以巽于位至夢長人見而論治見書緯溫子昇舜廟碑所謂感夢長人者舜之濳德堯實知之于是疇咨于衆詢四岳明明揚仄陋得諸服澤之陽見墨子側陋言其在僻側㣲言不顯世紀云堯求賢四岳薦舜堯命之于順澤之陽或云即濩澤問以天下曰我欲致天下為之奈何對曰執一無失行㣲亡怠中信亡倦而天下自來荀子云執一如天地行㣲如日月誠盛于内賁于外形于四海天下其在一隅邪夫亦何足致也問以奚事對曰事天問之奚任對曰任地又問奚務對曰務人曰人之情奈何對曰妻子具而孝衰于親嗜欲得而信衰于友人之情乎人情大不美又奚問若夫從道則吉反道則凶猶影響也南靣而與之言席龍垤而䕃翳桑䕃不移而堯志得始尚見帝帝館之于貳室即貳宫世紀堯見舜處之貳宫又云貳女妻舜為築宫室封之虞亦享帝迭為賓主語禮樂詳而不孛語政治簡而易行論道廣大而亡窮論天下事貫昵條達咸叶于帝而咸可底績于是錫之絺衣雅琴命之姚姓尚書帝命驗云姚氏縱華感樞縱天縱華重華也論語撰考比云重童黄姚黄其德也世紀云賜之絺衣與琴為築宫室封之虞土然云舜上虞人本姚姓者妄妃以盲婭以罃盲即娥皇字娥娙皇盲聲相滋也罃即女英見世本故孝桓梁后名曰文罃一日匽見大戴禮承受大命依于倪皇帝系作女匽氏尸子云妻以娥媵以皇娥皇衆女之英妄以觀其内舊說堯舜同出則皇英為舜之髙祖姑故或者以為堯取天下民之女以妻之非堯之女及晉劉嘏欲婚同姓遂謂堯舜之婚正姓分絶于上斯妄矣夫惟西戎氏族無定或以母姓為種猶十二世乃相婚姻父没則妻後母兄亡則納嫠嫂此禽道也尹子乃云舜娶祖姑天下不論之無禮不學如此有說見餘論九子事之以觀其外見孟子伏氏世紀淮南子云屬之九子韓愈以為卿大夫族人之子亦非百官牛羊倉廪備以事之于畎畝之中堯百官已備傳奕乃云官貴簡約夏后官百不如虞之五十盖因記之妄舜乃飭正二女勝其胸中之情以應天地之理澹焉此未使為司徒時也曰往欽哉然後使宅百揆為司徒馮休以為豈有始得之遽使百官事之畎畝之中而不當天子之朝且復使誰事堯之朝是宅揆賓門皆在畎畝之中繆也二女嬪媯純篤盡道列女傳云元始二妃帝堯之女瞽瞍和寧卒享福祐九子尊虞服勤靡懈有人則作無人則輟可以侈塗人之耳目而不可以欺同室刑寡妻刑二女非動容周旋中禮疇克哉故能使嬪者舜之德刑也岳薦舜不言其他而言其烝烝乂堯試舜不觀諸他而觀其刑二女父子兄弟夫婦此人之至難者况以卑正尊獨正衆親正疎乎安國云堯以舜治家觀治國斯得之矣妻有桑田身有南畝尹子文瞽順象從而不至于姦于是帝將胥天下而遷之乃厯諸難使宅百揆靡不時叙書中候等皆云舜為太尉故世紀云命為司徒太尉正月以太尉從事束晳乃據中候追維康成劉昭云太尉實司天當是據位書前職爾有說見餘論屬之徽典亡或不從賓于四門諸侯穆穆五典世之父子兄弟百揆内之百官族姓四門外之諸侯賓客人從之百官從之賓客從之即傳所謂無違教無廢事無兇人無天怒者孟子曰使之主事而事治百姓安之是民受之也烈風雷雨納于大麓而弗能迷也大麓之納薦之天也漢儒以大麓為大録萬機之政于是太傅趙喜太尉牟融並録尚書事猶古冡宰位三公上薨則罷之遂以為常故沈約云堯納舜于尊顯之宫使大録萬機之政不知非也夫既有百揆矣豈復録尚書哉有說見發揮昔王介甫問吕晦叔舜納于大麓何義曰薦之於天故介甫云古者行爵出禄必告太廟軍出必載遷廟之主誅賞禀而後行示不敢専况以天下與人可不薦于天乎然以薦必因太山之麓為禪以告謂太山為易姓告代之所則非也方其納麓猶未受禪豈封禪之時耶盖使之主祭而百神享之風雨弗迷是天受之也胡益之以納麓為虞衡尤妄帝即致以昭華之玉曽而尚之三載程功亡乖疇䇿民安其為帝覆其聖謂以天下授舜則天下幸而朱福授朱則天下病而朱利曰予終不以天下之病利一人乃放朱于丹而卒禪舜舜讓于德弗嗣弗可遂致天下于大麓之野屬諸侯焉典辭不費舜遜于有德者弗肯嗣位堯弗許曲折亦必如禹遜臯陶之委曲記弗及爾崇􅕐非之曰不祥哉誰以天下予人哉帝乃殛之羽山共工又訕乃流之幽州必以禪舜而天下莫有非者史云堯治天下殺一人刑二人而天下治荀子云堯伐共工而周語亦謂堯殛鯀故曹植贊堯克流共工萬國同塵然程子以謂共驩無大姦知惡之不可行乃隱其惡以助治一旦舜以側陋顧居其上且將臣使之故不能堪而作惡淮南子亦謂北人無擇非舜自投清冷之淵是則舜德不足以厭衆乎故前說為近故仲尼曰堯知舜賢非難也不以所間敗所察其難也正月上日受終于天府天府文祖所在上日如上丁上辛者夫受終則堯不復有庶政矣然猶攝也孟子曰舜相堯又日堯老而舜攝而世猶曰舜南靣堯率諸侯北靣朝之齊東之語乃命羲和欽若昊天厯象日月星辰敬授人時在璿璣玉衡堯厯象立其數舜璣衡立其器璿生于淵月魄終焉隂精之純也玉生于山虹氣藏焉陽精之純也璣運于上以璿為之衡望乎下以玉為之取則乎隂陽之運也說苑璿璣謂北辰勾陳樞星以其魁杓所指二十八宿為吉凶禍福列含盈縮之占云孔子之厯日志北斗魁四星為璿璣杓三星為上衡本此以齊七政日月五緯也堯正經星舜齊緯星所以相濟器出于人故占之以齊七政于上數出于天故推之以授人時于下或以為斗七星者非肆類于上帝以下攝位吉祭也上帝者昊天及五帝故以四類小宗伯祀三帝四郊四類如之四類四方帝也太祝六祈一曰類而四師類造上帝則為位宗伯有故則類社稷皆宗廟之大祭也與類禡異禮書以類造為劣于正祭與旅失之云兆五帝四郊則上帝其南郊矣司服主祀昊天上帝則服大裘而冕祀五帝如之是昊天外更有五帝上帝可以兼之孔子以為告天及五帝是也鄭以昊天上帝為天皇大帝四類為日月星辰俱妄禋于六宗六宗者三昭三穆也與文祖而七禋者所謂肇禋是也非上帝上帝以及天神山川以及地示六宗以及人鬼取義為得百家之說不同凡有十四然祭有其舉之莫敢廢也有六宗說見餘論望于山川山林川澤有為民取材用者必載祀典以逺故望而祭之三正記云郊後必望徧于羣神有天下者祭百神皆有功于民者天神既類人鬼已禋而地示又望矣猶若未也至于薫蒿悽愴百物之精莫不至則聖人之至也夫既受終而主祭行廵狩則為天子事矣時以堯在未即真爾輯五瑞既月乃日遂覲四岳暨羣后班還其瑞収諸侯圭瑞于正府也岳牧來朝諸侯或不能皆至則附其所執以納于天府及新君已定受岳牧之朝乃以所輯之圭璧付之使各還其所涖之侯伯更代之禮如此且以俾諸侯知有所統安守而不自專又以齊其真偽信不信者大傳云瑞也者屬也無過行者得復其瑞以歸有過則留其圭能改者復之三年圭不復少黜以爵六年圭不復少黜以地九年不復而地畢頴達謂瑞本受之堯今歛而還之如舜親付之使之為臣示正始也以四仲廵四守歲二月者乃次一年二月也世不之究虞夏傳云惟元祀廵守四岳八伯馬融以為受終後五年非也鄭云建夘之月是矣注以為除堯䘮即真之年非至于方岳燔望告至秩山川至方岳必以仲者四岳四方之正四仲四時之巾以時之中祀方之正非故為是屑屑也所以交神明者然也其祀上帝神祗可知矣伏羲堯舜禮制大備所以為萬世法今疏出之不著中岳者在王畿内年時有祭覲四方羣后問百年而見之鄭云百年老成人見尊之至也定八伯之樂九州八伯畿内不置八伯樂名並見書大傳鄭氏書言堯末羲和之子皆死庶績皆闕故驩兠共工更相薦引四岳者四時之官主四岳之事始羲和為之謂之四伯至死分岳更置八伯以驩鯀共工放齊為四餘四人無文賈氏從之妄也元祀代泰山貢陽伯儀伯之樂陽伯春官秩宗伯夷為之儀伯羲仲之後陽伯之樂舞侏􅍣歌聲比余謡晳陽儀伯之樂舞鼚哉歌聲比大南陽鼚動貌哉始也南任也中祀大交霍山貢夏伯羲伯之樂夏伯夏官司馬棄為之羲伯羲叔之後夏伯之樂舞謾哉歌聲比中謡初慮羲伯之樂舞將陽歌聲比大謡朱子干大也秋祀栁穀華山貢秋伯和伯之樂秋伯秋官士也臯陶為之和伯秋叔之後秋伯之樂舞葵俶歌聲比小謡苓落和伯之樂舞𤣥鶴歌聲比中謡歸來蔡衰也俶始也幽都𢎞山祀𢎞山恒山貢冬伯和伯之樂冬伯冬官司空垂為之冬伯之樂舞濟落歌縵縵和伯樂闕并論八音四會貢正聲以聽天下之治而民無有不惠而從命太師陳詩以觀民風命市納賈以稽民之好惡命典禮恊時月正日同律度量衡禮樂制度衣服正之班固云惟聖人能同天下之志故帝舜欲同之今修明舊典同律審度嘉量平衡均權正凖直繩立于五則備數和聲以利兆民正海内于一同則海内歸之修五禮五玉三帛二生一死質之器卒則復圭璧在臣下謂之瑞在人君以為器及修之則曰玉三帛二生一死諸侯之壤奠所謂奉圭兼幣謂𤣥纁黄者繆世子孤臣豈當朝乎一死腒修之屬非必雉山川神祗有不舉者為不敬不敬者君削以地宗廟有不順者為不孝不孝者君絀以爵變禮易樂者為不從不從者君流革制度衣服者為叛叛者君討歸次外三日遂假于禰祖用特告至記禮也盖出告禰則歸必格于禰王制天子將出造乎禰又云造乎祖禰用特則出而告用特可知故曾子問凡吿必用牲幣反亦如之叔恬曰舜一歲而廵五岳國不匱而民不勞何也文中子曰儀衞少而徵求寡也此五年一行之禮而告廟止一特他可知矣茲萬世之禮經也或疑一歲不能周五岳萬五千里以為四年而鄭氏謂每一岳歸而更去是五載廵一岳皆妄元朔六年之事以八月而周萬一千里尊祀天地豈如是稽留哉卒歛幣玉藏諸兩階之間然後命徧告入聽朝大傳云古者廵狩以遷廟之主行出以幣帛皮圭告于祖遂奉以載于齋車每舍奠焉然後就舍反必告奠卒歛幣玉藏之兩階之間盖貴命也五載一廵守羣后四朝唐虞五服畿内甸服之君朝夕見不待修朝覲之禮至侯服則當朝一年綏服二年要服三年荒服四年四年則天下諸侯畢一朝一朝則天子廵狩盖五年則一同至京師所謂大朝㑹此唐虞之典周官六年五服一朝又六年王乃時廵故周十二年一修法六年者侯甸男采衞要六年一徧也五年者天道大備或云舜土德土數五故五載周家木德木星十二年一周故云十二不知五帝二代皆五載也賦奏以言明試以功言奏功試則輿服以庸之奏者下奏上納者上納下試者在我奏者在人故舜典與益稷異奏言以觀其志試功以察其事此黜陟之事也不言罰見黜非所先設三公四輔師保凝丞官不必備惟人也四輔三公何敞所謂聖王爭臣七人者建官惟百三公九卿備矣王吉書以舜湯為不用三公九卿之世妄也記曰虞夏商周有師保有凝丞所謂四鄰也大傳以為前凝後丞左輔右拂其爵視卿禄視次國之君此皆三公論道者故周六官無之非專職也莊子說苑有舜問乎丞之語師保即輔拂故後周因之肇十有二州封十有二山肇造始也古未有十二州舜盖以四岳統十二州在禹治水之前受禪之初封其山後禹治水見地之大勢止可以成九州故復為九說者謂因冀之北逺故分衞水以為并析燕以北以為幽以青越海乃判遼東以為營夫一州縱廣豈容析而為三宜合天下而均之而幽并之治適在冀境營之治適在青境爾鄭云為兆域以祭十二州之分星謀牧立岳以廣聰而燭隱東岳寓于兖牧青徐屬焉南岳寓于荆牧揚豫屬焉西岳寓于雍牧梁凉屬焉北岳寓于幽牧并冀屬焉帝覲四岳羣牧又使岳牧還諸侯之瑞則羣后𨽻十二牧十二牧𨽻四岳明矣然則山岳摠于百揆而非一人又可知也何武翟方進奏言古者選諸侯賢者以為州伯咨十二牧所以廣聰明燭幽隱也乞置州牧以應古制此固服之内六服之外揆牧不及則附縻而已于是沈菑未復民亡安止爰命伯禹繼平水土主名山川俾益掌火烈山澤而焚之禽獸逃匿然後人得平土而居乃商九州以正五服以定任賦表提類考疆域作十有三載而後同漢志云虞舜登庸厥功彌劭表提類而分區宇判山河而考疆域冀北創幽部之名燕齊起幽營之號所謂肇十二州封十二山也既釐下土方别居方别生分類錫土姓而下亡違者賜大賢壇四奥沉四海而函夏正沉祭水名水始平姦宄衆于是象以典刑典六典刑五刑象以示之所謂方施象刑如所垂治象蘇軾胡翼之謂其所犯為常法非也刑出不復流以宥之為被五刑為已重加鞭朴為已輕者官有慢事􅥺以訊之庶人之在官者教或不率朴以威之皆教也非止在學罪疑犯誤金以贖之以上典刑之目黄金古易得故大辟罰六鍰頴達謂古以銅器漢始以金少之令敵凶荒災𤯝赦以肆之肆赦𤯝災也春秋肆大眚甸師䘮事代王受𤯝災是也亦猶荒政者諸儒之說非惟怙終賊在所刑者刑故也恃詐力卒袵惡與賊害三罪律家之情重者康誥曰乃有大罪非終乃惟𤯝災適爾既道極厥辜時乃不可殺𤯝災肆赦之謂也人有小罪非𤯝乃惟終自作不典適爾不可不殺怙終賊刑之謂叔向曰昏黒賊殺臯陶之刑也欽哉欽哉惟刑之謐哉民可覿德不可覿刑方廵狩時以庸一言及賞而詳刑如是或曰德化不能以獨行此養苗去害之說非也盖時洪水方平不久無刑姦賊方張民無奠枕故水既平而刑首議爾韓子云昔舜使禹决洪水先令而有功者殺之舜法也欽哉之語非史所記乃戒臯陶語文有脫漏舉八凱使主后土以揆百事百事時叙地平天成舉八元使布五教五教克從内平外成十六相得而天地治事詳左傳文公十八年故晉華歆傳云帝舜以二八成功虞喜疏云二八舉而四門穆袁宏云二八升而唐朝盛皆指攝時流共工于幽州放驩兠于崇山竄三苗于三危殛鯀于羽山四罪而天下咸服共工静言用違故流驩兠黨敝共工故放苗頑不即功故竄鯀方命圯族故殛輕重之叙流者屏之逺地放者棄之不齒竄則編管之惟殛為重或云死非也安國以四罪為皆誅蘇軾以為皆不誅而為逺國君俱失之按四罪皆在堯世舜攝之初但史官于此摠舜之功德刑併及爾不然鯀殛豈在肇十二州之後哉知二典亦有不次處且治水時三苗已丕叙矣何舜晚年復分北哉孟以竄為殺莊以竄殛為俱殺且易其先後非義例二十有八載堯崩舜生三十而舉用厯試三載二十八載堯崩時年六十三年謖避帝子朱于南河之南天下之覲者不之朱而之舜歐歌者不之朱而之舜獄訟者不之朱而之舜夫然後之中國諸儒謂無三年之䘮孰有三年䘮畢寶籙未定方避堯之子者或曰二十八載丹朱為君之心固未忘也今而避之變生奈何曰一朱豈能變哉惟順事爾不然舜視棄天下猶敝屣也豈鄙夫之患失哉以此度舜宜萬章之徒猶惑月正元日月正猶詩言朔月語云吉月者元日甲子也故世紀以為仲冬甲子月次于畢而即位康成以為堯建丑舜建子妄矣王肅謂夏而上皆寅正得之王安石云曰月正者避堯子時國未有正如伐紂而稱一月非必然假于文祖太史公以文祖為堯之太祖或云藝祖文祖同義非也孔氏云堯文德之祖頴達謂其廟不知祭何人或以藝祖為堯之祖神宗為堯或然踐天子之位都于蒲今河東縣蒲津闗所謂蒲坂漢志之蒲阪縣本曰蒲或曰蒲隂今河中有舜泉坊二井相通祥符祠分隂臨觀賜名廣孝泉蒲頻河地鹵水鹹此獨甘美中山記蒲隂昌安郭東舜氏甘泉即此有舜與二妃祠西征記潼闗去蒲坂城六十城中有舜廟城外有舜宅并及二妃壇南去城二十舜所耕也宣室志開成中有盧嗣宗入蒲津娥英廟狎神悸死之事及安邑謐云舜所都或云蒲坂或云平陽及潘今城中有舜廟按潘在媯之懷戎西北三里亦有厯山上有舜祠考之帝迹未聞在此媯汭在河中不得遼隔如此以土承火色尚赤世紀淮南子云尚黄非改正易服明庭玉階見章華賦墨子明堂也立七廟家語廟制有虞七孔子曰天子七廟自有虞以至于周不變也晉太始三奏置七廟宜權立一廟羣議以為上古清廟一宫周置七廟舜承堯禪受終文祖則虞氏不改唐廟乞依有虞故事說見餘論祠中霤社用土封祭先首而尚氣血腥爓祭血隂而氣陽養生者欲血少而氣多禮云虞氏尚氣商尚聲周尚臭氣臭一也商不尚氣何以薦且人鬼之享不在九變之前摶拊琴瑟不居祖考來格之後虞夏未嘗不尚聲也冕䍿紱絑緇衣纁裳􅀈冕服之鞞也以韋為之舜始作以尊祭服見明堂位鄭注乾鑿度云古田漁而食因衣其皮先知蔽前未知蔽後後之易以布帛獨存其前重古道也要義謂古未知蔽後舜冕服既備故後作之非也深衣縕袍以視朝兩敦玉斚兩敦黍稷也杜甫云舜祠宗廟以玉斚泰尊即瓦甒梡爼義尊匭豆大路越席水陸修絜以致敬于鬼神日南至禘圜丘配以黄帝以夏正祭帝南郊配髙辛以北至祀神州于北郊五天佐五人神于明堂髙陽唐堯配焉乾鑿度云三王之郊一用夏正盖特尊也特尊者五帝中特祭感生一帝也周公郊祀后稷以配天是矣王者禘其祖所自出先儒謂是感生帝鄭謂圜丘祀昊天上帝南郊祭感生帝以建寅圜丘國南即為南郊雩祀祈穀皆謂郊也故曰南郊為大報而夏正郊亦曰大報祭則報也春礿夏禘秋嘗冬蒸所以報本反始也乃駕五龍列子舜駕五龍馬行康衢乗鑾輅載絜旌小綏大綏陸佃以鑾車為金輅鉤車為戎輅明堂位虞氏之旂又曰虞氏之綏以月令鑾輅青旂周官金路亦載旂也日三朝于瞽所䕫䕫齊栗惟盡子道順其性而得其情故瞽底豫瞽底豫而天下之為父子者定竭力耕田恭為子職庶人之孝也以天下養養之至天子之孝也舜為庶人則盡庶人之孝為天子則盡天子之孝知盡其心而已而記者曰舜見瞽瞍其容蹙焉咸丘䝉曰瞽瞍北靣而朝舜堯率諸侯亦北靣而朝之是無父無君也禮不迎尸為不敢為主而况敢臣父乎乃建百官唐虞稽古建官惟百明堂位云有虞氏官五十者妄主五等公侯伯子男親親任賢建弟象于有畀見鄒陽傳今道州昌邑王賀傳作鼻或作庳非有說見餘論封黄帝之孫子十有九人為侯伯都邑服色祀享封列禮之必至者故書自格文祖後即繼以咨四岳聽納為萬事本故先之其他常事不書韓詩云封黄帝子一十九人非法義也詢于四岳辟四門明四目達四聰咨四方之門以招來清四方之見以廣覽擴四方之耳以兼聽皆因四岳盖知四方無逾于四岳也故首以是詢之言四目則知聽之為耳言四聰則知目之為明猶言汝明汝聽皆體用也咨十有二牧曰食哉惟時柔逺能邇惇德允元而難任人蠻夷率服食民之命而蠻夷各隨邉土備禦故以咨之十二牧柔逺能邇必相為用逺者政教有不及而略故柔之邇者政教可以加而詳故善之舜戒諸侯柔逺能邇而蠻夷率服平王告文侯柔逺能邇而惠康小民説者以詩書言能邇必先柔逺明逺未允柔則邇惠有不可得善中庸言柔逺人而後懷諸侯元或以此為舜德俱非乃咨四岳有能奮庸光堯之緒使宅百揆亮采惠疇僉曰司空伯禹司空掌土地以居民百揆非司空之職舜為天子特使之代已事爾時禹遜于稷契臯陶帝不從爾雅亮左右也采如僚采言事各有其列疇如九疇言事各從其類仲舒云舜即天子位以禹因堯之輔佐繼其統業是以垂拱無為而天下治帝曰禹汝平水土嗣考之勛四海㑹同祗我德先時乃功惟叙祗台德先不距朕行非豫于治盖水未平四方諸侯㑹同之禮有不講而上之德或闕今能使之祗我德先而不距所謂廸朕德時乃功惟叙謂天下之人皆由我之德而行者是汝功之惟叙也禹曰俞小子敢悉考績以統天意禹功著天下此不必問而咨岳者宅揆大職亦不自用也曰汝注哉猶曰無如汝盖先定天降秠秬乃命稷築墻茨屋辟地蒔穀萬民乃足詩曰誕降嘉種孫氏瑞書云舜時后稷播種天降秠秬生民有荏菽禾黍麻麥𤓰瓞秬秠糜芑所謂百穀云播蒔百穀同命偰司徒别三族親百姓敬政率經毋亟五作十道孝力為右萬民以成𤣥云五作五教也十道者謂君令臣恭之類水土平而後衣食足教化興也孟子曰飽食暖衣逸居而無教則近禽獸聖人有憂之使契司徒教以人倫五品父子君臣夫婦長㓜朋友如父子主恩君臣主敬天之與我民彛者故謂之典其在人有秩序則謂之品及布之下乃曰教百姓百官族姓膏粱難化故憂其不親臯陶為士士理官也故史云為大理周官典刑謂之士師士者事人之謂事人則事事當察爾雅士察也刑官獨曰士見用刑尤當致察以五服三次五宅三居之法政五刑以消冦賊姦宄帝命臯陶蠻夷猾夏冦賊姦宄此司冦詰姦慝刑暴亂者夫二帝時民淳俗阜自無冦賊姦宄今因蠻夷猾夏而起故命士師治之說者乃以為唐虞士官兼司馬而王安石蘇軾等遂謂以五流三居治蠻夷踈矣刑有五必服其罪流有五必使有所宅所謂有服有宅三就三居王氏之說為近盖教之原情定罪不為執一之說或以五服為要荒三就為朝市原野原野之說盖本國語止是大辟一刑要荒亦惟流蔡豈墨劓亦流之哉孔又以三居為四夷與九州外千里外亦非密勿淑問制百姓于刑之中以教祗德惟明克允刑法也惟明足以察故易每以雷電為用刑之象凡以動而明也臯陶方施象刑惟明可見允信當也子曰舜選于衆舉臯陶不仁者逺矣昔揚賜稱尚書令數日出為廷尉自以世非法家固辭謂三后成功惟殷于民臯陶不預盖容之也帝曰臯陶惟茲臣庶罔或干予正汝明五刑以輔五教刑期于亡刑民恊于中是乃功以刑教中陶乃祗陳九德之序以刑俌僇是故畫衣異服而姦不犯其醇荀子云象刑非生于治古並起于亂今所謂象刑其說不一真子曰有虞氏之誅也以畫詭當㸃以草纓當劓以復􅀈當刖以艾畢當宫布衣無領以當大辟謂之戮上世用僇而民不犯故文帝治云有虞氏畫衣冠異章服以為戮而民不犯班固善荀卿說古無肉刑而有象刑此不然也謂象天道而作刑爾畫詭一作幪巾復􅀈一作菲履艾畢韠也草纓荀作掻黥墨刑也與甫刑傳之說不同詳堯紀布衣無領即頳衣不純垂為宗工辨材楉利器用宗工司空之職使之代禹垂有創物之巧舉極其精故竹矢猶為後世寶于是百用作削鐻修之迹流髹其上輸之宫寢而當時之諫進者十有三乃崇納諫之官文子云舜塗髹以自怵戒髹黄漆也繇余云舜作漆器諸侯以為益侈國之不服者十有三魏徵有進諫之說益為公虞若于上下草木鳥獸佑之朱虎熊羆而物蕃衍禹益垂伯夷四人新命皆四岳所舉四人皆辭而終命之舉可謂約周官大山澤虞中士四人下士皆八人與中山澤虞下山澤虞甚衆益之為虞豈一山一澤哉衆虞之伯也夷作秩宗孔注云宗廟之官宋百官春秋王莽以宗正為秩宗繆矣降典三禮舜時五禮具備云三禮者據事天地人為之其實事天地為吉禮餘四皆人事惟寅惟清以接幽𤣥以節天下哲民惟刑而上下讓史記伯夷主禮上下咸讓刑法也夷本典禮而以其法教民若享宗廟是降此典禮折斷于民以為法也或云堯先任臯陶後任伯夷故舜典先言之而吕刑次言之以刑輔禮非也后䕫典樂虞帝之世夷典禮䕫典樂分為二周大司樂屬于宗伯則為一知帝治于禮樂致詳也大晨書引傳舜五祀論鍾石定人聲此大傳語以樂德教胄子樂語興道其風頌語言直寛剛簡惟克有濟興于詩成于樂故典樂以教胄為先周官大司樂掌成均之法合國子弟詳略雖異而其教則同仲舒康成五帝之學周于成均教樂德樂舞樂器則習樂所也胄子元子以下及卿大夫子孫所養者厚所教者薄故于此而加詳由聲之入人深也以六律五聲八音七始在治忽以出納五言而賞諸侯漢志言以律吕和五聲施之八音合之成樂謂七始詠者天地人四時之始也故以歌詠五言聽之樂歌籥舞以和鐘鼓詩言志歌永言聲依詠律和聲八音克諧神人以和樂之所感幽明一也仲尼燕居謂䕫不達禮妄矣外紀重黎舉䕫典樂欲益求人事見孔叢子按八音克諧此帝之所以責䕫百獸率舞此䕫之所以許帝劉敞等以為脫簡非也論見發揮晏龍納言主賓客夙夜出納射侯書據以待庶頑讒說殄行格則承之庸之不者威之而逺人至納言者星也王聽下言納于上為名詩云出納王命王之喉舌故晉志云納言五星夙夜諮謀龍作納言此之象也帝曰咨汝二十有二人欽哉惟時亮天工王蘇等以四岳九官十二牧為之然四岳非一人也故胡益之以百揆易四岳不知百揆在九官中矣若合四岳則二十五矣故世紀云二十五人或在九官或在十二牧中一人兼兩職者若先為牧又兼四岳九官爾孔氏以為禹益垂伯夷䕫龍六人新命有職及四岳十二牧然其戒四岳以闢四門戒十二牧以民食蠻夷是岳牧之事已各戒之則此咨二十二人必不兼矣况亮天工者非岳牧之任而禹稷契臯陶有不應絀者元凱十六相與羲和之六卿歟九官在其中故各以事咨戒之又如羣臣受任而遜于人亦皆授職如殳戕伯與朱虎熊羆不見任用有舊職不移也三載一考績三考絀陟幽明于是俊又在官羣后德㢲三考九年周傳考績訓云三歲小考正職而行事九歲大考絀無職賞有功也一之三以至九年天數窮矣陽德終矣積不善至于幽六極以類降故黜之積善至于明五福以類升故陟之皆所自取聖無容心也廵州觀風習其情性因論十有二俗定以六律五聲八音七始著其素以為韶退其利欲返其仁義九奏具成而鳥獸之聲猶悉闗於律闗猶統也惟五祀定鍾石論人聲鳥獸咸變乃更著四時推律吕均十有二變而道𢎞廣于是勃然興韶于大麓之野執事還歸二年䜎然乃作大唐之歌以聲帝美聲成而絑鳯至故其樂曰舟張辟雝鶬鶬相從八風囘囘鳯皇喈喈言其和也書帝命驗云舜舞終而朱鳯來因農而擾兵因獮而蒐練寓之牧伯故干戈不試而人皆體之兵衞少而誅求寡故國不匱隂經云陶唐氏以人戒于國中欲人强其命也有虞氏以農教戰漁獵簡習故人皆體之夏后氏誓衆于軍中欲人先其慮盖有虞氏之兵寓于農也故劉勰云有虞始戒于國尚廣能賢以自輔愽學以成能師紀后紀國之君即冀后故粲云舜師冀后拜蒲衣即披衣髙士傳云披衣蒲衣之子尸子云八歲舜遜以天下妄矣親單卷即善卷善卷墓在今辰州大酉山學于務成軺問于務成軺曰天下未治何以使我對曰避天下之逆從天下之順天下不足治也避天下之順從天下之逆天下不足失也新序作務成子跗荀子作務成昭于是依乎中庸明庶物察人倫執兩端而用中於民作五葆扇立誹謗木善旌諫鼓以廣直言之路管子舜有告善之旌示不蔽也褚亮疏堯鼓納諫舜木求箴詳堯紀訪不逮于總章總章明堂一曰總期尸子云有虞曰總章商曰陽館王通牛洪杜佑亦云故陳子昇云黄帝合宫有虞總章皆所以調元氣治隂陽也然考月令南明堂北𤣥堂東陽館西總章三正所尚故夏商周以𤣥明陽為名惟虞非三正總章非西義宜吕氏之繆養國老于上庠養庶老于下庠憲其行止盖貴德而尚齒熊氏云國老卿大夫致仕者庶老謂士皇氏云庶人在官者其致仕之老大夫以上當養從國老之法士養從庶老之法故外饗云邦饗耆老掌其割烹周人養國老于東郊庶老于虞庠是也鄭云虞夏商質取貴成物故大學在西小學在東深衣燕禮脫屨陞堂袒割牲餽􅀈進爵公攝凡卿納舃祝鯁祝􅀈以養其氣體善則記之以為惇史崔云燕禮者殽有蒸于爼行一獻之禮坐而飲酒以至霑醉饗禮則體薦而不食爵盈而不飲依尊卑而為獻取數畢而已相尊敬也食禮則不飲酒享太牢以禮食之而已嘗讅于衆曰吾盡吾敬以事吾上而見者謂忠焉吾盡吾敬以接吾敵而見者謂信焉吾盡吾敬以致吾下而見者謂仁焉吾是以見愛親于天下之民而歸樂于天下之士又貴信于天下之君則取之以敬也所以明道而諭教惟以忠敬而時鄉之是以未施敬于民而敬時鄉順受之藏金巉巖之山捐珠五湖之淵而下服度不亊采鑿而藏之山捐于淵也抱樸子云虞舜承禪抵璧于谷陸賈新語云以杜淫邪絶覬媚之情也堀地財取水利股肱不居故祠于田曰荷此長耜耕彼南畝四海俱有志利民也乃作米廩以教于國以臧帝耤禮傳米廩虞氏之庠也虞氏出于畎畝故特作米廩藏粢盛之委焉盖御廩神倉所謂廩于籍東南者魯之米廩虞氏之庠耳曰庠者祥事也于此教孝或曰言祥事考禮也立兩學以教國士上庠大學下庠小學小學在東左學也大學在西右學也小學在國中王宫之東大學在西郊虞夏質而尚右周則改之庠于周為鄉學秋養耆老春食孤子大傳于是得策乗馬之數乃割髙􅀈倮太衍䡆羣害以作策馬貨當金貨一金二金二四金二五金策垂馬幣詳董氏譜其文當為尚策為乗馬為正按漢書天竺為乾篤而佛書篤皆作竺又爾雅竺厚也楚詞帝何竺之則竺之為篤不疑矣五二金者重貨也金一者輕貨也當金者當重金也考之管子可見又率百畝之夫而與之䇿率二十七日以為子之春事以資子之幣分國穀之重而足國用春秋子穀大登國穀之重去分謂農夫曰幣之在子者以為穀而禀之州里國穀之分在土國穀之重再十倍謂逺近之縣里邑百官皆當奉器械備曰國亡幣以穀准幣國穀之擴一切什九還穀而應穀國器皆資而亡藉于民不窮其力而巧于使之故民死而不怨飯糗茹葅􅀈盆亡膻而下不以餘獲罪瓦匭土型而工不以巧獲罪麑衣盩領而女不以侈獲罪法下易繇事寡易功而民不以政獲罪道大多容大德衆下寡為而用物常壯故天下之賢皆躍而歸之丈夫女子振振殷殷亡不載說乃為詩曰普天之下莫非王土率土之濱莫非王臣以言賢之不時也吕氏輙輙顧顧注顧顧欲動而喜貌爰省中河登南山觀河渚録皇圖壇沈稷下瑩光休至孝經鈎命决云舜即位廵省中河録圖受文稷讀為側地在洛水傍方堯禪舜沉書曰稷而赤光起舜禪禹沈璧堯壇赤光又起及湯觀洛沈璧三投光不起矣于是禹益進戒見大禹謨遂申錫羣后封棄百里之駘賜姓妘氏妘即姬也故堯本姬姓傳云妘姓封契七十里之商賜姓子氏中候契握湯云契賜子氏孝經援神契同遷伯禹夏賜姓姒氏皆益命以為公握河紀云堯即政七十年受河圖繼云堯曰嗟朕無德欽奉丕圖賜爾二三子斯封稷契臯陶皆賜姓號注稷契公也自商以上大國百里考河命曰舜褒賜羣臣爵賞有分稷契臯陶皆益土故康成云三人皆先封舜如其封地而周紀謂禹封棄于邰妄也臯陶能刑于封之臯而益滌鴻奏庶鮮食于封之梁伯夷次禹能禮于神爰封之吕商武正義云益其封昔不止于百里非于是繹承雲備咸池淮南子舜樂咸池承雲九韶注兼用黄帝樂也以六律五聲八音七始詠叶治忽以出納五言而賞諸侯命質作昭華之琯尺有二寸之箾世本舜造簫形參差象鳯翼其管長二尺髙誘以質為即䕫非䕫修大招六列五英以明帝德以降上神通八風而齊上下拮隔鳴球搏拊琴瑟以詠戞擊孔安國以為柷敔然搏拊如鼓以韋為之以作止樂則是與柷敔重設抑堂上設之堂下復設之乎盖搏拊非柷敔矣禮云搏拊玉磬指擊大琴大瑟中瑟小瑟荀子云懸一鐘而尚拊大戴懸一磬而尚拊拊設于鐘磬之東為衆樂之倡禮書云搏拊鼓類舜堂上有鼔堂下有鼗周官大師小師大祭祀登歌擊拊盖戞編磬擊編鐘搏小瑟拊中瑟之屬云拊瑟擊磬如搊筝摘阮爾沈括云鳴球非可以戞擊和之至有時而至于戞且擊琴瑟非可以搏拊和之至有時而至于搏且拊不知其然宜祖考之來格絑干玉戚冕而大舞下琯鼗鼓合止柷敔燕禮下管新宫禮下管象升歌象德下管象武事商詩先鼗後鏞鼓周詩先鼗後惟鏞天地之義鄭謂九夏先鐘非也笙庸以間笙震鏞兊隂陽之義笙至細鏞至大細大間作堂上以詠而不以間八音皆有過賴人聲而和儀禮大射樂人宿垂于阼階東笙磬西間而南笙鐘其南鑮西階之西庸磬其南鑮盖阼階東有笙磬笙鏞西階西有鏞鐘迭作之也堂上之樂祖考來格虞賓來助羣后德巽堂下之樂鳥獸瑲瑲擊石拊石百獸率舞庶尹允諧韶箾九變而帝道成鳯皇儀五帝之樂莫盛于此舜治至鳯來儀然後有簫韶九成以象之武治至復綴以崇而後有大武六戚象之韶文樂文為陽故韶九變而止武為隂故武樂六成一變為一成箾韶者舜樂總名舞者所執上取羽翟翛翛然之意豈止來鳯有苗之格實由乎此世以為簫舜樂固自有簫也康成以百獸為伏不氏之所養者然則鳯來其孟虧之所起乎有辨見發揮書中候考河命云舜曰朕惟不艾蓂莢孚著百獸率舞鳯司晨注如雞而司晨子曰鳯鳥不至别鳯而言表靈物也通云夫鳥鵲之巢可俯而窺鳯皇何為而藏乎故仲尼曰韶盡美矣又盡善也又曰韶者舜之遺音也溫潤以和如南風之至其為音如寒暑風雨之動物物之動人仁義之動君子財色之動小人是以聖人務其本乃封䕫于歸歸即䕫國語芉姓歸越是矣樂叶聲儀云昔歸典恊樂律書中候云禹拜稽首讓于益歸注歸堯臣讀為䕫宋忠云歸即䕫之歸鄉乃今之秭歸縣地有䕫鄉䕫封在此地理志云秭歸歸子國是也予謂古以秭歸鳥名史厯書秭雉先嘷盖俗作子規今秭歸縣東十里有䕫子城髙堂賦又作秭歸故袁山松等以為女嬃歸屈原喜而為名妄也自即位以來順堯考德欽翼皇象考河命云若稽古帝舜曰重華欽翼皇象注翼奉厯象也言欽奉皇天之厯數也天德出寧日月照而四時行積正合仁由仁義行是故好生之德洽于民心在位猶北極題期立象臨下以簡御衆以寛損益盡由堯道曹褒傳肅宗元守二年詔云帝命驗曰順堯考德題期立象注堯廵省河洛得龜之圖書舜禪習禮題五德之期立將起之象也宥過亡大刑故亡小任于人而不任於法故不賞不罰而民可用古司馬法注云故如故殺尊德義貴縕年損已以安百姓是故寡怨于人率天下以仁而人從之光天之下惟好問而察邇言隱惡而揚善善與人同舍己從人樂取諸人以為善言行一善從之若决自耕稼陶漁以至為帝亡非取于人者體仁孝之德盡事親之道五十而嬰兒慕承安引佚立義治律而萬物以皆作分均天財而萬物以熙熙游于巖廊之上左禹右臯不事詔而萬物成被袗衣鼓五絃詠南風之詩不降席而天下治琴書云舜鼓琴而黄河清南風詩說詳餘論功格亡臬恩被動植山川鬼神莫不咸若故曰受命于天惟舜也獨正幸能正生以正衆生君天下生無私死不厚其子有惻怛之愛無忠利之教親而尊安而敬威而愛富而有禮思而能教是以宗廟享之子孫保之故為法于天下可傳於後世天下之明德皆自帝始故仲尼曰亡為而治後世雖有作者虞帝不可及也夫何為哉恭已正南靣而已矣舜有天下何容心哉敬修其可願而已是故執中含和不下廟堂而行于四海尸子曰堯以天下與舜顔色不變舜受天下于堯亦顔色不變知天下無損益于己也夫何為哉董仲舒以為繼堯故無為誤矣是以教通四海之外北發肅慎晉灼疑北發為國名大戴禮孔子曰舜明民教通于四海之外北發肅慎大教鮮支渠搜氐羌南撫交趾按周書有發人乃東北夷則發與肅慎二國名南撫交趾東長隯夷史作島夷云長夷島夷也西渠賜支渠渠搜也今朔方渠搜縣賜音錫析支也今河闗西十里有河曲羌是大戴鮮支非出入日月罔不率俾大戴禮孔子之言大人反踵俱被其澤萬邦黎獻共為帝臣而粒食之民昭然明視屈軼産觀景星燿房古黄委轡山車垂綏洛書靈凖聽云舜受終鳯皇儀黄龍感朱草生蓂莢滋春秋佐助期云舜時景星出房瑞應圖云舜時有三足鳥金車見于庭即山車也蟠龍賁信于其臧魚鼈孚㳺于其穴長胡獻白狼之霜西母進益疆之版西王母西方昏荒之國說詳餘論十有二牧貢亡不時君子人來効龍求能食之髙陽之後有董父能求其欲使豢之賜之氏曰豢龍封于鬷川于是始有豢龍之官少昊氏有裔子曰孟虧能馴鳥獸而致鳯凰爰封之蕭故孔子曰舜其大智也與起布衣積德圅和而終以帝其政好生而惡殺其任授賢而替不肖徳若天地而静虚化若四時而變物是以四海承風暢于異類鳯翔麟感鳥獸被德亡他好生而已書大傳成王問周公舜何人也曰其政好生而惡殺尸子曰有虞之君使天下貢善其治天下見人有善若己有善見人有過如己有過此有虞氏盛德也宅立三十有三載咨禹而巽位焉詳見書乃更著四時張樂成于大麓大傳附于五祀鐘石渝笙管變未及終天大雷電烈風大木盡抜大屋盡發宫羽盡革二工伏柷以操雅帝乃雝而歌者重篇樂正重贊舞人復綴乃更容貳節備十有二變奏肆夏而納以孝成四岳三公暨百執事咸贊于帝曰尚稽㤗室唐為虞賓始而狂然汔茲羡于四極諴禹之命敷于四海韶為賓而雝為主人莫能遷矣于是命禹行天子事巽于臯陶弗可其辭見于書正月朔旦受命于神宗帥百官如帝之初于是八風循通卿雲叢叢俊乂百工胥和而歌曰慶雲爛兮糾縵縵兮日月光華旦復旦兮八伯拜手而進曰明明上天爛然星􅀈日月光華宏于一人帝乃擁旋持衡沉首而笑曰時乎日月有恒星辰有行四時順經萬物允成鼚乎鼓之軒乎舞之英華欲遂褰裳去之百工又歌而終焉維時洪祀六沴用咎于下乃令大禹歩于上帝而共禦之帝用不差神則不怒五福乃降用章于下禹乃共辟厥德用帝休令爰用五事建五極而共禦之共供也共禦之法備見大傳云王后元祀禹攝之元元年也知五行傳不自後世歆向以來訛而繆之爾大傳得正歩推也三載釐苗弗恭命禹征之三旬苗猶逆命益贊于禹曰惟德動天亡逺弗届帝之往于田也號天引慝瞽亦信順至誠感神矧茲苗乎言有証乎其人者雖詳必録此之類也苗竄三危而分北不在舜立之前此三苗竄後復有為三苗君者于是般師振旅帝乃誕敷文德舞干羽于廟階七旬而有苗格分北其民亡世在下人非禽獸俱有良心苗始逆命而終服何哉師旅之至不得自新故承命而逆自救之計也及益言而禹班師矣苗聞義而始服果如益言故善用兵者示之以生路故孔子曰通乎德之情則孟門太行不為險矣德之流行速於郵傳命用之明堂金在其後先德而後武也舜其由此乎韓詩說苑云禹請伐苗舜不許曰吾喻教猶未竭也久喻教而苗請服天下聞之皆薄禹之義而美舜之德初有苗負固弗用靈昏迷不恭侮慢自賢反道敗德君子在野小人在位斷制五虐之刑以亂亡辜爰始淫為劓刵㭬黥越茲麗刑併制罔差有辭練抑惟刑靡察于獄之麗罔擇吉人惟時庶威奪貨以是為法而民有惡德冺冺棼棼罔中于信及是亡辭于罰遂分北于既巽禹于洞庭張樂成于洞庭之野乃作大唐之樂以皈帝美作大化大訓六府九原之章以颺禹功而君臣之美盡矣十有七載天見妖孽黄星靡鋒帝乃死宋張謐觀象賦云嘉黄星之靡鋒明虞舜之不競也以瓦棺葬于紀是為鳴條紀即冀故紀后為冀后今河東皮氏東北有冀亭冀子國也鳴條在安邑西北其地相近記謂帝葬蒼梧皇覽在零陵營浦縣尤失有辨見發揮年百十有一世紀八十一即真八十三薦禹九十五使攝五年而苗叛南征而亡皆妄三妃娥肓亡子禮云蒼梧葬三妃未之從以證古無合葬先儒謂舜不告而娶不立正妃妄矣楚辭有湘君湘夫人世傳堯女故退之以娥皇為正而英為庶皇長故曰君次為夫人不知堯欽舜之德釐降二女方在妻列釐降以理下之也豈女媵哉但二女觀舜之德時以婦道嬪于虞氏舜即位乃擇立焉鄭云舜但二妃佃云三妃舉其貴耳女罃生義鈞及季釐季釐封緡為桀所克義鈞封于商是為商均是喜歌舞禹封均子于虞虞思妻少康厥後虞君惟專于樂臣争于權民盡于利而亡見周書以虞思為象孫妄次妃癸比氏生二女曰宵明曰燭光處河大澤靈照百里是為湘之神大澤謂洞庭言為神處此故靈光及于百里也以湘神黄陵為舜之二女非堯之女也唐屬岳司馬氏時屬長沙天祐中號懿節子嘗欲作黄陵碑言之詳見發揮辨舜冡中庶子七人皆釐降于齊人代宗詔云虞夏之制諸子疎封世紀云九人朝鮮記云舜有子八人始歌舞圭胡負遂廬蒲衞甄潘饒番傳鄒息有何母轅餘姚上虞濮陽餘虞西虞亡錫巴陵衡山長沙皆其裔也並詳國名記夏之世有箕伯直柄伯戲中衰成湯寘之于遂遂世守之後為齊所滅莊公十二年齊桓滅之左氏正義及風俗通云商封之于遂袁良碑云世本陳遂舜後宋虞思後箕伯直柄中衰湯封遂于陳以後舜箕伯之後箕子事紂仍諫不入陽狂為奴紂敗囚釋為武王陳洪範去之朝鮮以道義化其民蔚為君子之國宋世家云箕子紂之親戚盖外親也而鄭𤣥王肅馬融之徒以為紂之諸父伏䖍杜預以為紂之庶兄皆無正文以意言之大傳云箕子不忍為周之釋去之朝鮮武王因封之朝鮮遂有臣禮故十三祀乃來朝然叙云勝商殺紂以箕子歸是釋其囚即以歸因訪以伐紂之事假以天對陳洪範而去之盖遯去如夷齊之于首陽非就封也十三祀併文王之年後有箕氏鮮氏鮮于氏姓纂云其支子仲封鮮于為鮮于氏顔真卿鮮于少保碑云先太師武王封于鮮子仲食邑於于而受氏寰宇記潁川八姓有于鮮直伯之後有直氏圭衞蒲傳則商滅之胡潘則周滅之息負廬鄒則春秋時入于彊矣後各以國命氏郡國志云衞國姚姓亦見水經注有虞氏幕氏司徒氏申屠氏信都氏勝屠氏勝氏勝徒氏申屠見世紀湯時有申屠狄然衞文公子許宋邉公卭陳成公子後皆有此氏姓纂云申侯子居安定屠原而姓非舀氏咸氏遂氏須遂氏合愽氏李氏漢胡不害封合愽侯為氏唐定襄王李文恩本胡氏李叔明本鮮于氏賜胡有何皆歸姓王符云歸姓胡有何魯襄夫人胡女共少婦齊歸是胡公世不淫至虞閼父為周陶正武王妃其子胡公滿以太姬姓纂均後三十二世孫遏父袁孝政以太姬穆王女名胡姬妄錫之媯姓與肅慎之珤復之于陳大戴禮禹受命乃邑姚姓于陳則胡公乃繼封也以備三客三恪義取王尸所敬左氏傳以陳備三客徐錯云今俗作恪古讀客如恪即三恪也詩云有客者故陳王問太師周存二代又有三恪何也對曰封夏商之後為二代繼虞帝之後為三愙愙敬也言禮之如賓客非别有三恪也二十有五世而楚滅之後有陳氏遏氏轅氏榬氏袁氏爰氏慶氏衡氏栁氏鍼氏逄氏􅀈氏弱氏杵臼氏五父氏駟氏恩氏甄氏番氏鬬門氏壺丘氏偃師氏司甄氏儀氏昭公八年滅明年又書陳灾君存焉爾哀十年楚伐陳又十三年云退之云父子食采袁鄉為氏乃轅也甄本音堅陳留傳云舜陶甄河濱後氏按楚子縣陳通奔周王以為中將美其族命為甄氏云錫姓因生如堅之讀形聲轉注以真為音鎮林攄倡名呼堅于襟不知也見張說甄亶碑初齊桓公十四年陳宣公殺其太子御冦而敬仲奔齊致陳樂是以孔子在齊而聞韶敬仲有禮桓公說之以為工正為田氏世家云如齊以陳字為田氏然左氏云陳田知非仲所改應云采邑亦有七世成子弑簡公分齊國孔子沐浴而朝請討之哀公不悟故孔子曰以吾從大夫之後不敢不告也孔子請討陳常時已致仕其意本以明君臣之義于三家使知不為大夫討本為齊也公不知之反使之告三子宜三子之不可也然考左氏家語不可似在孔子不曽之三子自是二年孔子卒又十一年公孫于越前後學者不知聖人妄為之說故發之非敢異聖人也又三世而田和移齊又六世而齊滅之有敬氏皮氏車氏恪氏穰氏汲氏稑氏䅶氏辱氏廣信䅶氏本陸氏改薛氏法氏王氏文氏茍氏光氏紇于氏尉遲氏司馬氏王建子為王氏望陳留東海金城北海第五倫窮賜販塩曰王伯襄王法章後為法氏田文封薛後有薛綜穰本田氏范希文誌田氏云將有穰苴後魏賜大司空田宏固紇于氏許昌公陳忻尉遲氏隨並復其複氏則有少西子穆世本僖子子子穆安後子占子沮世本烈子後子與子獻本桓公孫子鞅子梧子坊子芒世本僖子子子芒後一作䒙子寤子尚世本僖子生廪子尚丘子石世本桓子生子石後子夏子宋子禽犨子子仲陳宣公子子仲詩子仲之子者惟書無子夏即宣庶子子西子禽者僖子後顓孫亡字五王安平廣武即墨於陵之氏無宇二子常書書字子占伐莒功景公賜姓孫采于樂安登其後覇先亡梁以為陳者五世而隨滅之凡三十三年覇先寔之十七世姓纂出武南東海者胡公後出武當者太邱長後出長城者晉中郎將逵十世為陳武帝齊宣王封母之弟于母鄉為胡母氏胡非氏威氏慈母氏慈氏漢初徙諸田闗中而遂有第三至第八氏沙鹿留占亶生元后是育孝成四世稱制僖公十四年沙鹿崩占曰隂為陽雄土火相承六百四十五祀有聖女興其齊田乎至漢王翁孺徙元城沙鹿也舜土漢火日月復當之及生政君入東宫生成帝四世稱制及崩揚雄諫之及沙鹿事漢求帝後得媯昌為始睦侯以奉其祀焉莽封之又封田封為世睦侯奉敬仲後後魏孝文詔訪舜後獲萊郡民媯茍之復其家始禹分帝之少子于西戎秦厲公世有無弋爰劔曾孫舞生子十七為十七種忍九子研號研種十三世燒當代雄洮罕之間居河北大允谷四世孫瑱良益貧良卑湳侵甚為所敗虞滇岸滇虞即吾嗔生東吳迷吾後益困依發羌吾曽孫麻奴收怨羌復振溟零大㨗漢遷那内附中元間冦西郡馬武有弋仲襄萇是為後秦云事詳餘論有無弋氏研氏滇氏東氏迷氏銚氏贊曰若昔善化臧用于民民由不知孰識其仁北靣朝堯君臣道盛齋栗見瞽父子以定二女嬪降夫婦以貞庳貢源源兄弟以成形端表正萬邦作孚能事畢矣夫何為乎予言其略經載其詳予言其詳經載其略虞䇿夏前不著于經予則詳之而略之于典謨故曰予言其略經載其詳四凶之去有堯去之者四凶當時世家巨室為政用事者按莊子音義堯六十年乃放驩兠六十四年流共工六十六年竄三苗按縣共工以誹禪竄逐今考此年載似不相合然大戴五帝徳紀云四凶之去皆堯也淮南子荀子戰國䇿亦言堯伐驩兠荀子國䇿言禹伐共工周語亦云堯殛􅕐是􅕐之殛非舜明矣世言􅕐以治水無功殛死尤妄夫治水縱無成而仂作九年亦勤於民事矣勤于民事者先王皆祀之豈有至于殛死者使􅕐不能啓其功于前則禹亦未能速収功于後故祭法云􅕐障洪水而殛死禹能修􅕐之功是􅕐非無功也不能成爾果以無功殛則何以見乎夏郊謂治水殛吾弗信也八元八凱之用有堯用之者而傳壹之于舜八元髙卒之子伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍也當是二母黨故皆以伯仲叔季為號書有朱虎熊羆說者以為二人予稽之四人也虎為伯虎熊為仲熊江東語豹為朱語者相傳是朱為叔豹也則熊為季貍必矣故人物表作季熊盖漢去焚書未久猶有傳習故尚存一二但熊當作羆傳寫誤也伯奮是棄契之倫而叔獻則叔戯也是堯多用之者若八凱則髙陽之子蒼舒隤􅢺𢷬戭大臨龎降庭堅仲容叔達也隤􅢺乃伯益之字為堯伊衡服䖍以八凱為垂益之屬杜以為垂益臯陶之倫正義乃謂垂臯陶皆顓頊之後妄也垂乃炎帝之後臯陶乃少昊之後也杜又以八元為契等八凱為禹等盖以書言契敷五教禹平水土而傳云舉八凱使主后土舉八元使布五教因謂禹契在其中盖八元八凱非主一事云主后土布五教以事之大者言爾五帝德云堯命伯夷䕫龍虞舜彭祖杜預謂史堯之言有過辭為稽庭堅班固杜預等以為臯陶字鄭注論語以為臯陶號曰庭堅非也文公五年蓼與六滅臧文仲曰臯陶庭堅不祀是二人也書傳本有兩舉人名與字者是堯多用之矣自有能庸命至乃命以位略是數十年事而書不過數語可謂略矣以天下予人異矣以為不可而諫者多矣豈直崇􅕐之與共工哉經亡見焉故曰予言其詳經載其略黄帝曰合宫有虞氏曰總章夏后氏世室殷人重屋周曰明堂大戴禮云明堂凡九室一室有四户八牖三十六户七十二牖以茅盖屋上圓下方茅取潔義路史卷二十一

body:
  text: 路史卷二十四宋羅泌撰國名紀太昊後風姓國風上世因國於風而為姓故帝之後有風后佐黃帝滅尤者蚩堯誅大風禹訪風后皆其祚云大風若大夏大封然地當汊水元和郡縣圖志云復州竟陵縣城本古風城古之風國即伏羲風姓也南臨汊水澨水也武德中置汊川縣𨽻沔顯德五年𨽻安本魏之汊川郡出郢州成紀今天水治漢屬大水東漢屬漢陽唐屬泰州州元治上邽而成紀本治小杭川開元二十二年地震州自上邽徙治治之敬視川縣亦移入新城天寶元年州還治上邽唐記云包羲于此生包帝之潛邦夏復封之為姒姓杜預世族譜有庖國云夏同姓王符云夏封伏羲之後地在襄陽漢之平樂也有包羲陵見水經世紀及庖水焉東北入泲亦作􅀈庖泡説文泡出山陽平樂東北入泗音脬集韻包􅀈同庖脬袍褒四音虙鄆之東一亭有致密鄉記為古密或者其虙邪其虙不齊世咸作密亦作宓故虙子賤碑以為虙羲之後音為伏謂傳誤作密黃帝後自有密陳今陳治宛丘考古字作陳𨽻繆為陳車列官傍所以為陳轉為平聲古無從東陳後世傳家繆車為東𨽻遂為東世不之知反以陳為正陳為俗今難頓革姑定為陳亦或用塦出説文石經及孝經車石碑傳云太昊之虗許氏謂從木申聲亦妄任伯爵本己姓帝魁母家逮黃帝以封幼子周之繼絶也以居風姓今濟陽之任城水經注云亢父故城西夏后氏之任國也亢父即今任城唐𨽻兖州或曰仍也故晉志以仍與有仍為二密男爵非密侯者今高密有密鄉本密水名漢高密國隨高密郡唐為密州春秋之萊夷維邑也預云淳于東北密鄉淳于後齊廢入高密宿男爵周武王封宋人遷之隱公元年及宋人盟于宿莊十年宋人遷宿不云宿遷于某亡之也杜預云東平亡鹽有故宿城亡鹽城在今鄆之須城東三十六里隨宿城縣也秦置須昌在須句城北開皇十六年改曰宿城于宿城西北三十二里别置須昌鄆一曰㣧今之須城秦須昌後唐以諱改即須句按太康地記有東西二鄆西鄆魯公所居今濟之鄆城鄆與魯境舊云莒附庸以昭元年傳言季武子伐莒取鄆誤之經二十五年齊人取鄆而居昭公不附莒也莒何得附庸亦非魯地東鄆即此文公十二年城鄆與成公九年楚人入鄆在今沂州沂水有員亭即鄆亭城寰宇以此為莒魯所爭亦非須句子爵成風國邾伐而魯取之詳記中或云魯私屬皆非經書伐成傳曰來奔列國也一作朐公羊地志朐城在壽昌西北今須城西北須胊故城者京相璠云須朐一國二城兩名非也蓋鄆歸須城而朐猶是故所顓臾子爵沂之費縣西北二旅有顓臾故城寰宇記沂水西北八十里今在費縣西故漢顓臾縣開皇十八年以南武陽為顓臾貞觀元年省入費巴海內南經有巴國所謂巴賓彭濮者伏羲後生巴人郭璞云三巴國今巴縣是也𨽻恭州秦漢之巴郡本𨽻渝有古巴城在泯江之北漢水之南蜀將李嚴修古巴城者三巴記云閬白二水東南曲折三回如巴字故名閬華陽志巴子後理閬中閬水紆回三面地在其中而名地形志云閬中居蜀漢之半東道要衝今郡城即古之閬中城通巴之邑郡巴皆子也古者逺國雖大爵不過子巴東至魚復西連𤏡道比接漢中南極牂柯皆其界春秋戰國不改郝辰巫武沅五州皆巴後分王黔中者今太原有郝鄉太昊弟郝骨氏後一云右扶風盩厔鄉也見長安等志集韻音尺帝乙時有子期因封之曰郝云舒石切又呼角切傳曰任宿須句顓臾風姓也邑于濟上實司太昊與有濟之祀風姓顓臾魯親之舊也故邾人滅須句成風請封之言于釐公曰崇明祀保小寡周禮也公聞之爰復須句惡戲以成風一婦人不出戶庭猶存繼絶之心豈惟先王之澤哉蓋人情所同然者不可易也且伏羲去周幾年矣而猶國焉欲世之不厚不可得矣此其可知者也襄王十三年左氏傳邾人滅須句須句子來奔十四年當僖公二十二年經書公伐邾取須句傳云反其君焉至文公七年當襄王之三十二年再書伐邾取須句傳乃以為置文公子劉氏權衡以為皆無其事謂其若來奔與反其君皆義事當褒置文公子封叛臣當貶而皆不書夫使邾不滅須句魯無緣取之取之而不復後無緣再伐邾取須句蓋邾嘗滅須句而邑之故魯取之取之矣而後復之故至是而冉取書再取則知嘗復邾須句矣不然何得二十年而後兩書伐取邾諸侯不得専封故復其君雖齊桓于衛有不書惟于日後有事則自見其雖滅而未滅矣若置文公子何足書哉詩序云攘戎狄而封之知其妄也炎帝後薑姓國伊蓋亦上世所國今洛之伊陽縣有伊水堯之母家伊侯國耆侯爵自伊徙耆爰曰伊耆猶陶唐殷商然一曰􅢿黎也故大傳作西伯戡耆史記言文王伐􅢿厲列賴帝之潛邦一曰列是曰列山亦曰麗山即厲山黎見商後國九域志厲鄉村有神農廟今隨縣之北厲鄉即賴鄉也有厲山在隨縣北百里神農是生郡國志云厲山神農所生荆州圖經云永陽縣西北有厲山神農所生處春秋之厲國僖十五年齊伐厲通為賴然厲賴異見周世國薑扶風薑陽有薑氏城南有薑水封封巨國黃帝封之是為封胡通典云封丘古封國也今𨽻開封有封父亭封丘臺即封父國魯國都記衛之延鄉高祖以為封丘封翟母逄龎伯爵伯陵之國黃帝所封夏有逄蒙一作蜂又作龎穆天子傳逄公其後也地今開封蓬池一曰逄澤縣東北十四里九域志逄陂忌澤汲冡紀年梁惠王發逢忌之藪以賜民者字當音龎秦孝公使公子少官會諸侯于蓬澤天寶初載更名福源北齊內傳齊之先有逄伯陵蓋伯陵前封逄後改于齊故山海經有北齊之國薑姓是兩齊云殳伯陵之子堯代有殳戕即齊地冒淳也一作朱故傳作朱戕江水祝庸之封地今朱提吕甫侯爵伯夷之封杜預謂在南陽宛西南陽今𨽻鄧宛後周併入南陽而太公乃出東吕吕莒也博物志曲海城有東吕鄉東吕里太公望所出也寰宇記密之莒縣東百六十漢曲海城霍邑亦曰吕武德初為吕州十七年廢圖經以新蔡為古吕國蓋後來之吕近申在周亦曰甫一作郙上蔡有郙亭申伯爵初為侯平王母申薑國楚靈遷之今信陽軍之方城內也唐申州之南陽漢之苑縣詩云王命召伯定申伯之宅徹申伯土田見嵩髙潛夫謂在南陽苑北序山之下所謂于邑于序者謝伯爵荆州記棘陽東北百里謝城是有謝水水經出謝城申伯之國黍苗箋云宣王使召伯營謝邑以定申伯之國棘陽城在唐之湖陽西北汲太公居今汲郡治汲縣有古汲城在故新鄉東北四十八里有太公泉及廟水經一云故居齊侯爵伯陵氏之故國以天齊淵名吕尚復封都營丘今青之臨淄也然營丘故城乃在濰之昌樂故萊侯與太公爭營丘齊地記丘下周三百步高九丈北廂下隆一丈五尺後胡公徙薄姑地志謂尚封薄姑非詳古國中許男爵太叔之封鄭滅之定六年王符云潁川許縣魏文曰許昌周靖帝始為州今治長社一作鄦説文作􅀈焦許靈公徙葉成十三年楚平立還葉至悼公遷城父今都亳曰焦夷昭九年遷于夷者典略作譙夷春秋時為陳邑楚併之襄王十五年楚伐陳取焦夷魏為譙郡後周為亳州今亳治譙縣有古焦城譙焦一也寰宇記古譙城下邑城北三十一里析地即白羽昭十八年今鄧之內鄉也鄭樵以為淅川本南陽析縣二名見魯僖二十五年傳斯蘧遷容城今華容內傳齊之先有逄伯陵而伯益書炎帝生器器生伯陵故周語謂天黿之分我之皇妣太薑之姪伯陵之後逄公之所憑神伯陵太薑之祖逄公伯陵之後為商侯伯封于齊地而伯益書更有北齊之國薑姓是知伯薑薑姓炎後前封于齊而太公其繼焉者也昔者帝嚳取于有駘氏曰薑嫄生后稷而后稷之封亦曰駘説者咸謂帝堯以其母國封之然及泰王復取于有駘氏曰泰薑是薑姓之駘至周猶在豈得云以是而封稷哉乃不知稷封之駘在于武功而薑姓之駘在于琅琊固不同也前事之缺失可勝悼哉艾隱公盟處六年今牟縣東南有艾山齊魯之境或曰艾陵九域志艾山在下邳杜預疑為臨沂東有艾亭隰犂也一曰犂丘預謂濟南隰陰縣或云隰郕在懷西南懷貞觀入武陟西有古懷城柯齊邑柯澤在鄆之東阿莊公會齊侯處東阿故城在須城東與鄭成公十七年柯陵鄭地衛之柯異襄公十九年豹會處杜云東北故柯城內黃今𨽻大名丙邴也宋之下邑晉大夫所封古邴炎國穆王北入于邴乃鄭邑祊也高高氏故高城在齊之禹城漢故縣棠大夫棠公邑襄六年晏弱圍棠預云國也今萊之即墨有棠鄉與魯棠異隱公矢魚處乃單唐之魚臺檀武王時有檀伯達地志瑖丘檀城古灌檀也瑖丘今𨽻兖有檀鄉輿地廣記或作壇若魯賢若士出于此漢河間王妻若齊地與蜀若苗意封吳興之若異吳興記長城下有若下美酒曰上若下苦井周有井伯廣韻云子牙後穆天子臣井利或云虞公族非字書作邢誤正邢字劇齊附庸今災川劇縣甗齊邑乃齊宋戰處僖公十八年崔丁公子采預云濟南東朝陽西北有崔氏城盧薑姓後封韻今齊之盧城漢縣𨽻濟北有盧水章鄣東平亡鹽東北有章城古章國齊人降之莊公三十年劉賈依公羊穀梁為紀遺邑預非之云附庸如邿鄟是也高堂風俗通云高徯采閭丘本屬莒後歸邾襄公二十一年邾庶其以閭丘來奔預云南陽縣北有顯閭亭廩丘世本齊大夫廩丘子邑今濟之鄆城北有廩丘故城漢廩丘縣屬東都晉𨽻濮隋併入鄆襄公二十六年傳齊烏餘以廩丘奔晉故城在濮之雷澤北梁丘齊宋遇處莊公三十二年穀梁謂曹邾之間去齊八百預云昌邑西南梁丘鄉今武成有梁丘山𨽻單昌邑今在濟之金鄉虞丘世本又有梁丘虞丘皆齊采地移風俗通齊公子雍采于移後為氏後漢移良右齊之分神農之為世謖甄四海紀地形經土分域以與賢者共理之其所以為制也近者地廣而逺彌小負海之邦多十里與二十里以大用小猶幹役指繇中下外若居高屋而建瓴水焉其制可謂得矣然考其強理逺國廣狹才俯後世一附庸爾斯萬國之制也十里一成外大夫士之采如郤張解楊之類亦可謂國渾瑊特奏置河東縣廣輪才一十有四里若今海洲堵嶼十里二十里亦有至宰世為業者不在大也雖然神農之國彌近彌大彌逺彌小而唐虞之制則近小而逺大甸服之外親賢所建百里之內為采二百里之內任邦而餘三百悉封諸侯必先小而後大神農之使大國處內則近大常稟京師之制而逺小自微雄大之陵唐虞必使小國居內則小國易獲神都之蔽而日圻亦蔑強摰之迫唐虞神農豈故為是擾擾殊哉晉志五百里侯服百里采二百里任三百里侯任即男也故有任氏為有男古今有異時亡異勢勢或變易而存亡安危之幾或不在乎此惟強大之處內則尾大之憂自去而上常愓強大處外則僭擬之心易釁而上常怠神農之制故可謂兩盡矣而况于德處者乎抑又求之先王之法亦固有微權其間而非為是固也周之五服男列侯外而晉鄭宋衛棋布近甸萊牟耿弦星分逺服固非小必近而大必逺也然則神農之國亦豈必近大而逺小哉大封建之君于此必有擇矣氐人山經云炎帝孫靈恝生氐人為氐國俗作互非狄厯後為敕勒通典鐡勒自西海東據山谷不絶骨僕同羅韋訖拔野古都波覆羅並號俟斤牆咎杜例云赤狄别種臯落杜例赤狄别種盟會圖疏云在潞州今絳之垣縣西北六十故臯落城是世曰倚薄玄氐乞姓羌也今文鳳二竟白馬氐者居仇池曰氐侯今興武成階四州地蓋岐隴而南漢川以西皆氐云楊匱泉臯伊雒陸渾九州之戎僖公十一年有楊匱泉臯伊雒之戎二十二年有陸渾九州之戎陸渾河南屬縣楊匱不見而泉乃洛陽西南之泉亭伊雒之間則洛陽縣西南之故戎城皆薑戎也三十三年薑戎在晉南鄙秦晉誘致而城于此或以為允姓戎者非赤狄隗姓赤狄潞氏皆隗姓故上黨地杜云有赤沙城今洺州地鄭譙地名露參盧之封荼陵露水鄉有露水山豫訪炎陵稽其始封字亦作露蓋商周間衍于河東北爾路參盧後春秋之潞子都曲梁即雞澤洺州雞澤縣周置潞州建德七年今之潞城漢故縣亦作路有潞水并之侵潞子廟隗氏山海經有貟神隗氏春秋隗氏之地僖二十四年潞齊邑昔鮑子及潞者哀公八年一云土軍縣今有地曰露漢之東露而幽之潞縣亦有潞水即潞河露河也知後代之承襲猶殷商楚郢所至以為名也甲氏潞氏屬晉滅之宣公十五年荀林父滅赤狄潞氏十六年滅赤狄甲氏及留吁皆潞之屬杜云上黨只潞城縣東有古城潞氏之國也留吁潞氏屬亦滅于晉屯留故城南即故留吁國也與潞俱附中國水經第十卷一名戎屯與潞俱附中國為赤部胡索隱春秋地名云潞氏今曰赤部胡舟秃姓亦有舟人明為國也古􅯐有舟薑敦博古圖讀為周敦矣按楚有息舟昭十三年傳齊地亦有舟道哀公二十一年傳駘后稷母有駘氏後泰王復取于駘盟會圖疏云邰炎帝之後周棄外家魯東鄙地今沂之費縣南故駘亭是地接齊邾亦作台故越使魯還邾田封境至于駘上哀十七年莒人伐我圍台襄十二年伐我東鄙圍台季孫宿救台遂入鄆洎哀公時齊亂景公子荼遷于駘則入齊矣非武功之駘淳是為淳于故城在高密之安丘東北故淳于縣屬北海酈元云本夏之斟灌國武王以封淳于公杞併之遂遷江南預云華容今監利也戲驪山之北水名今新豐有戲亭郡縣圖志昭應東北三十有古戲亭皇甫謐云新豐二十韋昭云有戲山幽王死焉章邯入門至戲蘇林云縣南四十里或云幽褒戲此而名妄也兩京道里記等正音希怡一曰默怡今營之栁城亦作台即墨台禹師墨如或云墨台孤竹今平之盧龍東有古孤竹城小白之所至地道記在肥如南十二里秦之離支縣漢今支也營州皆其地一作觚本以孤生之竹可管而名向向薑國今河陽西北三十五有向城酈元云軹南四十五向城軹故城在濟源地名向上寰宇記在懷之河內西北二十七璠預皆以河內軹西有向而無城疑為蘇田按紀年鄭侯使韓辰歸晉陽向二月城陽向更名陽為河雍向為高平故十三州志云軹縣南山西曲有故向城即周之向國然代以為承之向乃莒邑向城在承縣宣四年伐莒取向者今密之莒縣南七十二故向城乃莒邑非薑國蓋因傳薑不安莒而以為近莒爾州桓公五年州公如曹説者為即淳于輿地廣記高密夷安城淳于本春秋州國也今海之東海縣有大小州山本密州杞併之王之三公稱公云寰內侯者非也劉敝云寰內侯如祭公者蓋胡公之類或云懷之武德北武德漢故河內州縣忿生邑地近共有州氏晉有州綽水經漢有州苞金石録有州輔皆吉成侯薄今拱之考城東北有薄城漢縣屬山陽本宋地莊十二年盟薄者預云梁國蒙縣北薄城即此甘京兆鄠西南五里有甘亭郡縣志或云在鄠北甘盤之國啓扈戰于此馬融云甘鄠之南郊頴逵云啓西行甘當在戶東紀侯爵薑姓輿地廣記紀侯故城在壽光寰宇記紀城故紀侯國薑姓又濰之昌樂西六十有劇城內有紀臺高九尺紀侯所築蓋後遷于此世紀云周文妃國薑姓非也桓王后季薑也孫逖送紀參軍序云周公之祚紀為之首繆也隨隨侯炎裔得蛇珠者故李白云漢東之國神農之後季良為大賢送倩公序而世以為姫姓詳周後國酅紀要邑後為齊附莊公三年紀季納之齊預云故穀城西有地曰巂下濟北續述征記安平有酅亭安平齊廢今𨽻臨災記云齊國東安平乃災川國故之城在鄆今東阿東紀鄣杜例贛榆東北有紀城此紀鄣也唐併入東海今懷仁東北七十五有紀鄣城並海州莒子所奔近海周十里餘莊公之三十年齊人降鄣高赤俱云紀邑在密然時紀亡二十年矣故啖子攻之黑齒薑姓山海經黑齒之國帝俊生其中冝梁竟阪泉薑姓其後蚩尤強霸周書云阪泉氏用兵無已而亡僖二十五年傳云此黃帝戰阪泉之北指蚩尤今懷戎涿鹿城東一里阪泉是小皓參盧命蚩尤宇此今安邑有蚩尤城宜是春秋之世亡非亂春秋之法不亂魯宣公十五年書晉師滅赤狄潞氏以潞子嬰兒歸明年書晉人滅赤狄甲氏及留吁曰師曰人晉固罪矣然在春秋戎狄舉號君臣同辭固未得以名氏爵號書也今書其國又書其氏又列其名爵又别其種族經之文始異于是若三傳説為賢之者其果然也邪潞氏甲氏蓋亦先王之世漸流于狄而非狄之出也既有爵邑有名號則其為書固不得而略矣伐國者討其罪人斯已矣潞子之夫人晉景公之姊也據傳之説豐舒為政煞之則豐舒者罪矣晉之致伐則執豐舒僇之立黎侯安潞子紀其政而還則諸戎至矣而顧滅其國執其君哉踵是以降伐牆咎如敗狄于交剛于太原一皆晉人有以見晉之不能仁義禦于為奪易絶人之世也神農之垗在于茶陵而潞水之鄉潞水之山若諸露之名遍于茶陵攸邑潭衡之境益以是知諸露之始有在于此殷周之代衍出幽冀上黨之郊爾書其爵土又書其名氏又别其種族徒以見盛衰之不常其重絶先王之世也三五而來未聞有賢狄也黃帝後姬姓國少典有熊帝之開國今鄭之新鄭輿地廣記云古有熊國黃帝所都云都非壽丘在兖之曲阜東北六里高三丈今仙源廣記云黃帝所生之地此本史記素隱皇甫謐説在魯東門外陳今鳳翔寶雞故陳倉有陳山非宛丘詳紀注昌昌意後若水昌意國今越巂之臺登盟會圖疏以為鄀故世本云允姓國昌意降居為侯非也詳高陽紀安息安之後黨項悃之後江水玄囂國若之下流泜水也今蜀州卞卞明國湯伐有卞隨或云即辨以説文字林大小篆無卞非也卞和卞莊子自為姓尚書率循太卞與辨不同今泗水縣有卞故城漢屬魯國季武子以自封薑氏會齊侯處蠻人龍苗之裔今湖南北桂林等處皆是辰灃沅湘之間尤盛清少昊父封詳見後張揮之封然黃帝臣自有張若故河東解有張陽城漢之東張今邢之任縣是通典云漢張縣地紀年齊師逐鄭太子齒奔城張陽南鄭是也采紀姓夷彭子故左人地今中山之北平王符以采任姓非北狄始均之裔資陳留風俗傳云資姓黃帝後姓纂云益州資中今資州資陽有資川江然古資陽城在簡之陽安祁之無極有資河衛之北紏山而潭之益陽有資水出縣北流入資口即益水酈云即資水之殊目武岡又有資水出唐或其派裔郮潛夫論詹資郮翟黃帝後故玉篇云資郮故國黃帝後封在岐山之陽所謂周原膴膴者顧伯弼云昌意後止于夏商間虔風俗通虔氏出黃帝與陳留傳同今河東聞喜虔聚旻集韻􅀈音蹇非寇在鄭有寇水北行唐闕靈丘一作􅋤本出高氏山今莫之任丘西一里有寇水枯瀆陳留傳寇氏自黃帝出酈故南陽酈音尺今內鄉菊潭鎮也字一作􅀈翟北地古翟國後徙西河盟會圖云今慈州地道記伐衛懿公者賈逵云處北地後為晉所滅此春秋時隗姓翟炎帝後非此也詹周有詹父莊公十八年傳詹桓伯昭公九年圻內地與楚詹尹異葛郡國志高陽有葛城今鄭西北有葛鄉城一名依城漢高陽地然葛鄉故葛城乃在寧陵北十五郾城北三十周四里去亳城百里即葛伯國説文􅀈南陽陰鄉郾城𨽻許寧國本屬應天今𨽻拱應邵杜佑樂史等並云古葛伯國都非嬴姓之葛詳少昊後髦民依姓山海經髦民國近積石狂犬黃帝後任姓分見潛夫論􅠥葪也中絶武王復繼之記皆為祝祝堯後詳後橋僑即􅻬橋也葬于橋因食其地以世祀者篇韻􅻬國名皆為九小切非唐表橋姬後云周文帝命去木妄余披傳記見蠻夷之種多帝者之苗矣若巴人之出于伏戲玄氐羌九州戎之出于炎帝諸蠻髦民黨項安息之出黃帝白民防風歡兜三鱙之出帝鴻淮夷允戎鳩羣舒之出少昊昆吾滇濮甌閩駱越之出高陽東胡儋人暴輿吐渾之出高辛凶奴突厥沒鹿無餘之出夏后曰是固有矣縉雲之子黃帝之孫其始不肖以至不才幾何而不胥為夷也遼東存箕子之胄大夏有李陵之苗信矣然元魏自以出于蒼林慕容自以出于厭越赫連自以出于伯禹而祿山亦謂安息出於昌意之子安是果信邪余常言之夷蠻之醜雖有盛強苟非先王之後者皆不足以得志中國彼之所傳亦必有所本矣且時聞之春秋用夏變夷者夷之夷而進於中國則中國之彼以是心至斯受之矣不然則求之四夷而從鳳嬉何陋之有逸論語云子欲居九夷從鳯嬉黃帝之宗祈蘄也歐陽修祁公銘以祈為黃帝之子所封非也祁少昊後祈黃帝後酉即酉陽今黔之彭水漢酉陽也有酉水滕今徐之西南十四有故滕城古蕃縣小邾國開皇六年古以滕國為名一作勝紀年越王朱句二十年滅滕是也司馬貞云滕之祖閔二年共滕之民乃衛之下邑針衛有針成公六年卲氏姓解作針皆音針任禹陽國倉頡為任大夫晉邑今邢之任縣苟戰國有苟變子思薦之能將五百乘薦之衛侯程氏世譜以河內多杞氏焉妄也釐僖也齊國釐城為來音簡王十二年舒庸人道吳圍巢及釐虺郅佶是見詩風俗通云殷時侯國一作吉潛夫論云郅與姞同而字異周封女姞氏於南燕鄧名世以潛夫為誤非也説文佶為正儇與嬛同音􅀈輕也集韻音旋非依史伯説十邑有依疇厯莘皆鄶邑後屬鄭韋昭云國紀劇劇是今齊之臨朐東壽光西南故劇城漢之劇縣紀劇要為二國故寰宇記古紀城在壽光南又有劇南城云故紀國鄭樵云紀後遷劇所謂朐劇云紀劇聲訛非也胥臣曰同姓為兄弟黃帝之子二十五宗其得姓者十四為姓十二姬紀祈酉滕針任茍釐佶儇依蓋皆以國而為氏嘗考之古之得姓者末有不本乎始封者也其氏于事者蓋寡矣而姓書氏譜一每為之曲説至有棄其祖之所自出又牽異類而屬之豈不悲哉余述路史又起國名紀而後天下之氏姓始大定矣且以張王李趙易類是謀謂皆黃帝所賜姓而世莫詳焉姓書則謂王出靈王李因老子張趙始周之中世而乃不知商有李徵夏有趙隱王倪在唐堯之代而張若者黃帝之臣又黃帝子揮亦封于張西廣洞酋汔今惟此四姓為雄易傳之言未為無本而姓書之不足證類蓋若斯嗟乎萬姓同本而岐其枝百川派别而宗于海君子之欲求其祖之所自出舍路史國名記何以哉滑濟右二國針之分舜受禪水土平伯禹于是弼成五服至于五千四海會同爰申錫其土姓土以立其國姓而立其宗土姓錫而宗國定矣公侯百里伯七十里子男五十里所以立國也雍斷密雖滕針祈酉釐郅儇依此所以立宗也國立而後氓人有所依宗立而後族姓有所係人有所依斯有以君之族有所繫斯有以宗之是故公劉遷邠有為致力朝廷而君之者有為致力宗廟而宗之者本于土姓之有所錫也傳曰天子建德因生以賜姓胙之土而命之氏胙之土錫土也命之氏錫姓也契封之商稷與邰此錫土也賜之子與姬此錫姓也方水未平諸侯固各有國土百官亦各有族姓矣必九州攸同而後錫之者前乎此惟有所不普至是而後得以錫之遍爾滑濟二國名衆地博有不可而指云奚鄭樵云魯奚邑今徐之滕東南六十青丘村有奚家冡奚公山陽曄徐州記云仲造車轍存焉薛侯爵莊公三十二年伯者降吉光國今滕東南五十有故薛城故漢縣戰國屬齊為徐州秦為薛郡有仲祠後魏書薛縣有奚仲廟或曰大薛公孫𢎞生山今淄州南四十里伾邳也今淮陽治下邳城漢下邳國永平十五年梁下邳郡周邳州唐𨽻泗城三重處泗沂之會有仲虺祠寰宇記祠在徐之沛有仲虺城見九域志鄭樵云仲虺居在薛魯奚仲遷邳後以邳為薛妄摰祖己七世孫成封周文王母太任國今蔡之平輿有摰亭謝歐陽修謝絳銘云黃帝後昔周滅之以封申伯在南陽之宛見詩嵩高其地西甚廣鄭公友言謝西之九州者二千五百家者也章章與謝本皆任姓周始以封太公之支子舒春秋之留舒去穀七里亦曰栁舒故城在鄆之須城許氏作䣄䣄邾之下邑説文邾在薛縣集文音塗洛周書之有洛氏史伯云北有路洛泉徐蒲韋昭云皆赤狄宜與此異或作絡衛賢者絡疑雒廣漢屬縣昌黃臣有昌若宜昌邑其東昌故縣近滹沱河有昌亭西昌縣春秋昌間多在河東北葪縣今范陽治地多葪水經注葪城西北隅葪丘為名班志云葪故燕國名非今葪城南北九里東西十里慕容雋造終商有終古宜即佟後有佟氏見廣蒼北燕文人佟萬泈通今襄陽有泈水泉洛陽西五十故伊關縣北有泉亭周世狄居之俗呼前亭伊拒泉皋是也昭二十二年有前城卑宜晉郫邑一曰郫邵文元年絳之垣東九十有郫邵陒卑氏所出蔡雍胡太傅碑有卑整非越嶲有卑水遇禺也宜即畨禺魯襄公救成至遇十五年魯邑近成然非必禺成在泰山巨平南王符作卑過訛儋山海經儋人任姓今儋州周有儋翩牛黎經云牛黎之國儋人之子儋令有黎姥山畨禺賁隅也今清海之屬縣有禺山傳云禺號南海故豫謂此即禺經文有無腸繼無之國皆任姓右一十六國任之分周人之制內之天子三公外則二後之君曰公康誥之周公召公畢公三公也微子之之建上公二後之君也然考諸經五等之君通稱曰侯亦通謂之公康王之告羣公與儀禮同稱之公春秋之稱諸侯與餘經通稱之侯皆兼五等為言蓋公若侯爵之貴者代故以是為稱聖人亦因而不之奪乃若班爵則固自有差矣非可紊也春秋列君平居必正其爵至葬則從其稱從其稱所以副臣下之尊敬正其爵所以存王度于不凋也雖然正其爵矣而于會盟總稱惟曰諸侯世族所稱猶曰公子公孫魯君侯也卒以公稱至于盟會亦或侯之吳楚子也僭故不葬然至世族亦稱公子惟其爵之貴爾家國之稱抑又不一孟子言千乘之家而王制縣內之采一皆曰國周官朝大夫且稱每國是國亦謂之家而邑亦或稱國矣豈非公侯卿佐謹度以事其上則全于臣制節以御其下則正于君自臣道言之雖國亦家而自君道言則邑亦國邪采邑曰國則卿大夫固可謂諸侯矣所謂內諸侯也南燕伯爵伯倏國后稷妃南燕姞氏也石癸曰吾聞姞姓后稷元妃今滑之胙城東北漢南燕縣隨改曰胙桓王二年鄭敗燕師于北制桓公二年會燕人説為南燕亦嘗曰東燕云魯莊十九年衛師燕師伐周者史誤以之為北燕也密須子爵世本云商有密須文王伐之晉志曰商侯國魯有密須之鼓杜預謂姞姓國在安定陰密今涇之靈臺也十道志陰密屬鶉觚故括地象云鶉觚密氏姞姓今陰密城在涇之保定郡縣志在靈臺西寰宇記古密國地史索云是河南密九域志以為鄆之致密城皆非闞子爵今鄆之壽張有闞鄉而闞古城在中都桓十一年寰宇記云今屬齊之巨野闞亭又在須昌東南即昭公末年取闞者郡國志東平陸有闞亭今壽張也齊有闞止允高陽時有允格或云少昊後出黃帝蔡蘄春江中有蔡山在廣濟縣高崇文傳有蔡山竇蘋云蘄水縣北大龜納錫故曰蔡非姬姓蔡光春秋圖有光國今光州敦鉏任冷敦之田許地也鄭取之陳留風俗傳云敦氏姞姓後逼晉襄公母逼姞國即周之逼陽國扶日切詳高陽後國燕伯爵宜為東燕與南燕北昭三年北燕伯欵亦姞姓魯汝之魯山縣非兖地雍伯爵汴之雍丘鄭莊夫人雍姞國姓纂云宋之雍氏本姞姓寰宇記雍氏黃帝後姞姓是矣又兾之堂陽東北三十六亦有雍氏城寰宇之高城本于隴切自漢州名人姓皆于用切談苑云當作平聲昭十四年傳晉尸雍子杜云陽翟東北有雍氏城者非斷晉地有斷道即卷楚也世本作段寫誤密河南密縣東四十故密城是武德三為密州與須城比故説者謂即密須蓋亦號密須云史索云密須今河南密縣與安定姬姓密别雖開封長垣近須城是衛今在澶之衛南二十八里衛詩所謂思須與曹者由聲轉也右一十四國黃帝後結姓分結本姓今多用從女字黃帝之子二十五人為姓十二姬釐俱帝而任結二姓為此二十九國其他子姓固稱是也禮傳曰舜即位封黃帝之子孫十有九人為侯伯蓋不得考矣後有見者當併綴之路史卷二十四

body:
  text: 路史卷四十七宋羅泌撰餘論十雲夢二澤雲夢楚之二澤也江南為夢江北為雲以其跨江相比而謂雲夢爾雅十藪楚有雲夢後世以為一澤故杜預以雲夢藪為巴丘湖酈元謂自江陵東界為雲夢北為雲夢之藪誤矣按左氏春秋傳昭公三年鄭朝楚楚子田於江南之夢鄖子之女生子文棄之夢中則江南之夢澤定公之四年吳入楚楚子涉雎濟江寢於雲中即江北之雲澤也雲土夢作乂者雲在前為水所沒至是而始得為土夢在前雖土而未可作至是始可作而乂之蓋夢地差髙而雲下論者不知既以雲夢為一澤復謂古經乃雲夢土作乂者非也春秋文耀鉤云大别以東至富春九江衡山皆雲夢也而子虛賦云雲夢方九百里南有平原廣澤緣以大江而安陸有雲夢縣是合而為一矣沈立云雲即今之玉沙監利景陵等縣夢即今之公安石首建寧等縣自史漢亦然班生志地而華容枝江若江夏之安陸皆有雲夢學者遂莫知所適從宋山川記郭璞皆以夢為南郡華容巴丘湖則枝江也方楚子之涉濉濟江以避吳兵而華容在楚之南安陸在楚之東故或者謂避吳之行當不在此謂雲在江北而以濟江者為指漢言之益繆汴字本用汳煬帝惡其從反易之汴流舊矣世咸謂隋煬始創以幸維揚前此未有斯大妄也夫地之下沮水必趨之理勢然也使古無汴其地既髙且仰則雖神禹不能使之行于地上况乎煬汴也者魏大梁也故東魏為梁州後周曰汴即漢之漕渠一名莨菪其渠廞利自秦氏徙平隂以開灌注後以開空不填乃任水下扶溝入渦而通泗暨漢平帝時河汴久壞其後汴渠東浸兖豫百姓怨歎會伏宫以樂浪王景薦於是詔發卒數十萬從景修渠隄自滎陽東平千乘海口千餘里十餘里立一水門相洄注渠成河汴分流稍復舊迹故樂俊言汴渠東浸日月彌廣知汴流古久矣夫卒數十萬修渠隄則是起自兩岸而汴行其中矣立水門以節度其上流則與今汴不異也事亦見顯宗紀發卒乃謁者王吳魏太祖討董卓也從弟洪至滎陽為卓所敗太祖失馬步至汴水深不得渡循水得船共濟而晉祖逖之將衛茦亦破石勒别軍於汴水厥後桓溫將通之以北伐而不果義熙中劉毅通之以討秦始有湍流利漕及濬舟師伐吳杜預抵書勸之自江入淮逾於泗汴泝河而上振旅還都而濬亦謂將以成古今之絶倫而自汴河班師則汴之大小必不減於今也夫二帝之時都於中冀居河下流而八州貢賦必由河達帝所蓋堯舜在位重於用民故九州川瀆各有入河之道所以通朝貢來商旅而便轉輸也今之禹貢每州之末所紀是矣惟淮與河獨不相及而言浮於淮泗達于河者蓋由淮以入汴泝汴而入河也使其無汴淮泗奚自而達河哉此則伯禹之前有汴已見矣我宋都大梁貢輸之來必由四河自江淮荆湖者道汴河自陜西者道河三門白波沂汴陳許諸州道石塘惠民河而京東者道廣濟河蓋趨京都必以達河為至此唐虞建都之本意也國初未有定制太平興國六年始制汴河歲運江淮六百萬石豆百萬石大中祥符初七百萬石黃河米豆八十萬石惠民河米豆六十萬石廣濟河五百餘萬石此最登之數百貨十倍景德已減青揚二州不言達河已見於徐兖也兖言浮于濟漯達于河矣故于青直云達於濟徐言浮于淮泗達于河矣故於揚直云達于淮泗由淮濟以達于河也自大業初遣皇甫儀自苑曲引榖洛達河自汴渚引河通淮大發河南男女百餘萬濬開千里遊幸江都築堤蒔柳號通濟渠所謂隋河者特煬帝因舊而濬廣之百姓怨苦因而號之爾坤元録云宋武北征後復皆堙大業元年更令開道名通濟渠西通河洛南達江淮煬帝遊江淮於此泛龍舟至江都轉交廣荆揚益越等州運漕及開元時齊浣牧汴請開汴之下流自洪之隋河至淮陰北合為淮尋以河源勢急而塞則汴不起于隋益可知矣方楚漢之中分割界鴻溝文穎以為自滎陽下引河水東南為鴻溝以通宋鄭陳蔡曹衛與濟汝淮泗會于楚即今之官渡水魏武袁紹相持之處故蘇軾疑此為汴謂其後或為鴻溝或為官渡為汴上下百餘里間雖不可必而皆引河以達淮泗者至道中上問汴水疏鑿之由張洎對曰禹于滎澤下分大河為隂溝引注東南以通淮泗至大梁浚儀復為下渠一渠東經陽武中牟臺下為官渡水一渠始皇鑿川灌郡謂之鴻溝即出河之溝亦曰菪溝王吳所作浚儀渠東合濟至敖山北兼邲之名煬帝開汴自為通濟渠國家惠民金水五丈清汴四渠合會所以無遺乏也會要史謂渠隄自滎陽而東則上疑其為鴻溝下疑其為官渡有不然者今汴渠自西而東鴻溝乃橫亘南北而官渡直黃河爾故袁紹相拒沮授歎曰悠悠黃河吾其濟乎官渡匪汴亦明矣酈道元謂禹塞滎澤開渠以通淮泗豫固謂伯禹之前有汴不易之論敷淺原敷淺原蓋江鄂之間孔氏謂一名博陽山顔師古云博當為傅漢志豫章歷陵縣南有博陽山傅陽川在南古文以為敷淺原音為敷陽誤為博爾水經注云敷淺原地在豫章歷陵縣西南水經所載禹貢山水澤地凡六十山指名曰山水指名曰水而稱地者四流沙九江東陵敷淺原也孔顔以為山者異矣按通典云蒲塘驛漢歷陵縣有敷淺原西十里有博陽山以今縣南十三里有陽居山舊經依固以為敷淺原名博陽山然縣境惟有一水流入大江人謂傅陽川乃在此山東北與志不合杜佑復析敷淺原傅陽山為二蓋以敷淺原之水也十道四蕃志敷淺原博陽水俱載饒州九江新舊尋陽録記顔魯公過蒲瑭驛辨土俗所呼蒲淺水蒲敷音之轉南有博陽山土人呼濮陽山濮博亦音之訛則又以為博陽矣博陽之山不得而實爾按驛西數十里惟有一望夫山蓋望敷爾尋陽志博陽山在德安縣南十三里望夫山在德陽縣西北十五髙一百丈謂升此望敷陽也隨志云盆城望夫山或曰望君是也方輿志謂夫行役妻每登髙而望箱土積髙而為名然寰宇記巴陵當塗黎城德安皆有望夫之山俱以婦人為説繆矣志言邑人或謂縣古有敷淺原登此可以望之故名望敷以今山下近村猶以敷裏敷外為名斯得之矣蓋望都之類爾今崇陽之西二百二十有雲溪山峭峻清流界道如帶即所謂敷淺原也非博陽山三江詳證揚州文有三江而導水之文乃有中江北江釋者于是紛紛孔謂江自彭蠡分三以入震澤而鄭復以東迤為南江歷代不決不知所謂三江非中北之江中北之江初無三江之名而三江原不入震澤也職方三江揚州之川郡國志韋昭等以吳郡南松江浙江浦陽江為之按此皆自會稽入海者自班固冒以南中北之名遂與泯漢入滙之文相亂故或者疑南松等為是吳中小水不足名川于以泯漢充之故志林云江于彭蠡分為三以入海然江自夏口合漢以入彭蠡即合為一自蕪湖出由秣陵京口至崇明入海何嘗有三桑欽許慎謂江至彭蠡石城而分為二一為中江今大江一為北江浙江也然浙出于黟至餘姚定海而入海與長江正自隔絶故漢注又謂岷為大江至九江為中江至徐陵為北江是一源而三目豈其然耶夫贑源于西章本曰豫水豫章之名始此而西章明有江南之號則亦可謂三江特此一江禹所不至禹貢不見學者有不之知夫以震澤在吳彭蠡在楚略不相及今乃謂江自彭蠡分入震澤為北江是誤以揚州之文解之也三江既入震澤砥定者謂三江既入于海而震澤亦以致定此自二事非謂其入震澤此鄭所以謂三江分于彭蠡為三流東入海然謂分於三流則愈疏矣且雷夏既澤灉沮會同雷澤在兖灉沮在雍兖東雍西亦自二事而安國亦以為二水會同于此澤蓋不知地理之所至也然又考之海內東經會稽之山在大楚南三江之首大江出岷山海江出蔓山南江出髙山髙山在成都西皆入于海故郭景純以岷江易浦陽今人特不知其處爾學者又何可妄引淺證而罔之哉贑自豫章入彭蠡泯漢自漢陽合入彭蠡則合為一不為二矣然禹貢猶有中江北江之名者水性不同各自為道如涇渭之分流流雖合而水不混惟涇渭有色可見而此則不見故鄭漁仲執此以為水入水則合豈有流至九江猶可辨其為江為漢而林之奇遂謂在禹之時彭蠡而下有此中江北江而今為一孔蔽於所不見蘇蔽于所可見不知之奇之蔽又有甚者夫泯自夏口合漢入彭蠡使其復出分為二江亦不辨其孰為漢孰為泯矣况説二江去古未久其一遽失而徒不之知耶不知二江既入彭蠡雖合為一而自匯而下禹貢之文猶分江漢至于入海為説甚明初未嘗合則亦有其説矣蓋江漢既會則自東陵而略彭蠡之側東流復出蕪湖初不與彭澤之水混故云東滙澤滙澤之水在其東也今華容青草湖中有大江在縣東一百里屈而南與湘沅二水合春夏漲冬入零陵則大江見則依舊自為道也揚州言三江既入而于荆言江漢朝宗于海則同流而自為道可知矣唐許敬宗謂濟入河洑地南出亦以味别以今揚子江心有南零北零之異則知其入而不合正不疑也古有五行之官水官得職則能辨其性味潛而復出合而更分皆可辨之此陸羽所以于揚子江心候南零之水而張江州亦記嚴瀨揚子南零水之不同劉伯芻季季卿品天下水各有不同昔師曠易牙俞兒張華王劭皆能辨于淄澠自有此理蘇子瞻謂中江北江以味别之亦本乎是然以為江漢入澤而更分則又非矣入固未嘗合也九江詳證導山之文自岷山至衡山過九江至于敷淺源而導江自岷山至于澧過九江至于東陵東迤北會于滙東陵今之巴陵與夷陵相對出于東西以夷陵曰西陵則巴陵為東陵信矣故唐志以今鄂州巴陵為是九江蓋在東陵而上顧不在彭蠡下也按荆州文九江既殷鄭氏以為殷者多也謂九江從山溪所出其孔甚多以言治之之難九江各源其下流合于江而非大江孔安國言江于荆界分為九道應劭遂以為自尋陽分班氏之志則以為在尋陽縣南皆東合于大江而以東陵為在廬江金蘭水經亦云金菌西北以廬江郡有東陵鄉也不知金蘭乃在滙之下流非大江之所至許叔重云迤邪行也今江水過洞庭至于巴陵而後東北邪行入于彭澤所謂至于東陵東迤北也豈尋陽之區哉且以大水受小水謂之過二水相受大小均謂之會河水東過洛汭北過洚水洚洛之水入河河水過之而已漾過三澨渭過漆沮亦猶是也自江分為九道則經當云播為九江不云過矣九江舊説一畎二白蜆三嘉靡四烏土五􅑕六􅀢七麏八沙堤九廩為之或百里或五十里始于鄂陵而會于京口桑落洲三百餘里而張須元九江圖乃有三里五洲白􅑕菌州之名五洲即蜆而三里即畎也尋陽記則以為一烏二白􅑕三烏土四嘉靡五畎六源七廩八提九菌源或作浮烏土一作烏白水經書疏莊子義等往往皆引為正朝百揆以為方俗所名於經無當桑落洲今在宿松西南百餘里十道四番志云江自鄂陵分派為九于此合流謂之九江口又云尋陽江有八洲一沙二人三九江四葛五象六烏七感八􅑕曲折為九江洲與江州尋陽中流分界東武林洲洲之下尾故程大昌謂荆境至尋陽以東即為揚州孔應所以附會屬之别無古據安國言為九派未有其名至張僧鑒張須元賈耽名而不同蓋出俗傳江何嘗九分哉逮蔣之奇乃以九江為今洞庭宜亦有所見矣竊考漢志東陵之間自有沈漸元辰敘酉澧湘資九水皆合洞庭東入于江山海經云洞庭之山是在九江中而博物志君山為洞庭山故張勃吳録云嶽之洞庭荆之九江也若尋陽則為揚境非荆地矣水經注言九江在長沙國不雋縣西北楚地乃今嶽之巴陵洞庭在其西北則荆之九江為洞庭審矣雖然秦漢以夀春置九江郡殊失所謂及英布為九江王而王莽更以豫章為九江郡劉歆以為湖陵九江入彭澤禹貢為辭也太史公云豫登廬山觀禹迹九江口安得古之九江而觀之蓋自秦漢説者知尋陽為九江爾惠逺記廬山在尋陽南南濱宫亭北對九江而尋陽志九江在州西北二十五里皆率然之説爾太康地記以為湖漢元水入彭蠡者則又入贑之九水也益遼隔矣辨兖濟豫既證三江而兖濟截河之説古今未哲夏書兖水東流為濟入于河溢為滎又東出陶丘北此伯禹所知也歷古地書皆知濟自河北溫縣入河自河南滎陽而溢兖濟二郡正以是名濟源縣在河東濟南濟北濟陽濟陰皆在河南自杜預謂濟繇滎陽東過魯之西至樂安入海兖出王屋入河始釐為二而杜佑李吉甫樂史竇蘋鄭樵輩遽援後志謂濟自莽末旱塞不復截河南度而以水經依取禹貢為疏故唐髙宗問許敬宗禹浮濟漯達于河何今濟漯斷不相屬對曰兖濟自溫入河洑地南出為滎澤又洑而出曹濮之間汶水從南入之故書又言浮汶達濟不言合漯漯自東武陽至千乘入河也漯自濟派至東武陽入河今莘縣北此水此水非濟水入河也敬宗蓋亦本孔與河並驅而截河溢出之意不知其時無復滎水汨出滎口者滎陽水受河流石門謂之滎口滎澤在今滎澤縣北四十謂濟南諸名為出不審是一蔽也佑説河南之濟使禹所命或以性同或一時衆流湊泛濟適溢從河南以出而名又奚必洑流之説然禹必不以一時暫溢之名移疑後世夫水之所出自以不同固有入而不合行而復出者昔郭緣之于河上源遇書生問之何知濟與河上源通生曰洛水淬劍正與河水上源不異物之不同猶鉛錫也北濟既入于河性與河别不能合混滲漉入地洑行達滎陽而遂溢為滎爾今之歷下等處發地悉是流水濟所過也東阿之井正濟所溢故今阿膠止濁住吐下隔而疏痰以濟之性趨下清而下重故治淤濁逆上之痾以今油水固不同情九夏之辰冷熱之風亦各為隧豈謂必無水過水哉涇渭分曹南零會地此理不少鄭樵謂山過山則分水過水則合世無山過山水過水之理謂漢入于江其文止此下有脫文兖入于河其文亦止於此而溢為滎之上當更有導沇水數句説經不通不以為脫必以為誤此書生之笁疾也林之奇以為漢入江濟入河皆合而流大禹導水自此開以支引之故猶蒙上之名亦以淺鄙測聖人者庭州霸水金鐵皆漏庭州霸水滴滴以手及金鐵器承之皆漏然惟瓠葉則否拘夷山中有水流下如飴亦服之􅀢毛落而仙曰駝溺去屯煌二萬里道安西域記云石駝溺其國有婆羅門守視􅀈延之江日夜流脂􅀈延境內有石油舊説髙奴縣出脂水即此水際河石間與泉雜出以雉尾裛之乃采入缶似淳漆然之如麻煙甚濃重沈括取掃為墨松脂不及所謂延川石液者石炭煙亦大黑人衣延川詩所謂二郎山下雪紛紛石煙多似洛陽塵弱水溺毛黑溪玄臏悉唐制角西海島間出如脂而黑金鐵承皆滲去惟角可貯南人以塗木上象至輒不去昆崙以塗身即乘之如家畜畔怯腐手婆羅門有畔茶怯水出山石坎下七色或冷或熱能消金石草木手探亦腐取以駝骨石人守之蓋亦謂之無哉息壤洪水滔天􅕐竊帝之息壤以堙洪水山海經云帝怒令祝融殺之羽山息生之土長而不窮如出入息息肉息錢息婦云者故有息石髙子勉息石詩序在江陵莊嚴寺或云韞玉漢元帝時臨滁地涌六里崇二丈所哀帝之世無鹽危山土起覆章如馳道狀蓋息壤也江陵之壤鎖鎮水旱江陵圖經引别録云子城南門地隆起如伏牛馬去之一夕輒復如故在昔傳為息壤騰踐或死昔髙從誨鎮渚宫出經其處萬勝門外問書記孫光憲對以伯禹治水自岷至荆定彼泉原之穴慮萬世下有或泛溢爰以石屋鎮之蓋本之冥洪録裴相歐獻之事也元和初裴宙鎮荆掘之六尺得一石規模樓櫓悉倣荆城其中空徑六尺八寸甚工緻命徙之藩籬間是春淫雨四月不止潦漲莫遏人抱為魚之憂會歐獻乘居楚山馳問之對以事迫鑿石弗及令陶範為江陵城內廣六尺八寸樓堞門閾無少差于南門外八十步掘深六尺埋之當止宙始驚歎昔人所填從之既瘞祭之夕復隆起獻乃洛中道士博學多聞亦見江陵志王子融修臧丙之事雷雨驟集爰屋而記之貽救災者焉慶歷甲申尚書郎王子融蒞渚宫自春不雨遍走群祀五月壬申與郡僚及此以今地無復隆起而石屋詹且露請掘取驗雖致水沴亦足為快因具畚鍤置土數百擔以備俟旦從事是夕雷雨大至逺近沾洽亟以馨俎薦答醫博士張若水者年逾七十因言兒時見臧大諫丙嘗以久旱發之數尺巨石如屋四面為柱為牖其南隱出門闥之象百夫莫動乃縻以巨索率水見二百踏出之大雨而止未及窮其石城者因覆以屋後更加敞纍壇繪為風雷佛之像陳堯佐易以龍神皇祐二年子融致仕始為記俾漕吕刻石置之蘇軾言其屢應然矣息壤詩序云旁有石記謂不可犯畚鍤所及輒復如故又頗致雷兩歲旱屢發有應栁子所言龍興寺地天地之間自多有此記是永州云負甓而起者尺有五寸夷之復髙鍤者皆死云然􅕐以堙水殛禹復用之彼以障汨而此以填後禍也淮南子云禹以息壤堙洪水以生上封之意有後泄也龍負舟呂春秋云禹自塗山南省南濟江黃龍負舟舟人恐禹仰而笑曰受命于天竭力以濟生民生寄也死歸也奈何憂耶龍乃弭耳而逝淮南子云禹視龍猶蝘􅀈顔色不變龍弭耳掉尾而逝云南省方濟江而黃龍見文人啓表往往多用而不既其有無虛實按今江陵公安江有地名龍巢者乃龍負夏后舟處地常有龍即桑欽所謂龍穴水口者注云江浦右迤北對虎洲龍巢又在洲北其南有部駕口宋景平二年太祖入奉皇統至此有黑龍躍負帝舟左右失色帝謂王曇首曰此夏禹所以受天命我何德以堪之至都即位蓋興帝之祥也江陵志云龍穴水口在石首縣十道四番志云二龍掉尾而去禹使迹之入此穴寰宇記亦云巴陵夏口浦郡國志謂浦有龍魚昔禹南濟兩龍夾舟之所以知夏后實有是事十日古今通占鏡云衆日並出天下分裂百官名設政令不行三日並出諸侯爭洪水出晉建興二年正月辛未三日出西方而東行後江東改元劉聰李雄作亂四年三日復出其年帝蒙塵平陽五年五月庚子三日又見占曰三四五日見天下兵王者如其數建武元年亦嘗三日並矣見晉陽秋而太興三年五日並出後前秦後趙乘時並起貞觀之初突厥亦記五日並見乾符六年十一月朔兩日出鬭三日乃沒夫天有十日居于陽谷在黑齒之北一日居上枝九日居下枝次以甲乙迭運中土君有失道則兩日並鬭三日出爭以至十日並出大亂之道山海經云日浴溫原谷上扶桑一日方至一日方出皆戴於烏夏桀之亂兩日並出商紂之世兩日又見其一將殁一方出故考靈曜云黑帝之亡二日並照雖然興亡必並有德則興無德則喪此不易之道也顯德七年正月癸卯兩日固嘗見矣是時苗從訓從太祖出師見日上復有一日久相摩蕩曰天命也及夕六軍推戴由此觀之胤甲之事蓋有之矣歷代之書志更有多月者梁太清二年正月兩月相承見西方唐志貞觀初突厥言有三月連明考之乃是當時推為突厥頡利之應雖云分域然日月正為中國之占顧得云頡利哉天門桀遷于垂所謂天門在澤之晉城太行之上天井關也地志言在髙都通典云關南有大井泉三今謂之百巖可容百家關在井北故又曰百家戰國䇿謂桀之居左天門之險右天溪之厄是矣吳起曰夏后之居左河濟右太華伊闕在其南羊腸在其北修政不仁而湯伐之羊腸即五行山昔武王欲築居五行周公曰五行險固德能覆之則內貢回矣使吾暴亂則伐我難矣乃太行也是蓋戲而君子以為能持滿故袁子正書云桀有四嶽三塗之險京山中南之固及在鳴條一朝而失其天下故曰域民不以封疆之界固國不以山溪之險威天下不以兵革之利得道者多助失道者寡助豈固恃其險哉路史卷四十七

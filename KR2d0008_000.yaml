body:
  text: 路史别史類提要臣等謹案路史四十七卷宋羅泌撰泌字長源廬陵人是書成於乾道庚寅凡前紀九卷述初三皇至隂康無懷之事後紀十四卷述太昊至夏履癸之事國名紀八卷述上古至三代諸國姓氏地理下逮兩漢之末發揮六卷餘論十卷皆辨難考證之文其國名紀第八卷載封建後論一篇究言一篇必正劄子一篇案必正乃泌友人之名其姓今不可考謹仍原本書之國姓衍慶紀原一篇蓋以類相附惟歸愚子大衍數一篇大衍説一篇四象説一篇與封建渺無所涉考發揮第一卷之首有論太極一篇明易彖象一篇易之名一篇與大衍等三篇為類疑本發揮之文校刋者以卷帙相連誤竄入國名紀也泌自序謂皇甫謐之世紀譙周之史考張愔之系譜馬總之通厯諸葛耽之帝録姚恭年之厯帝紀小司馬之補史劉恕之通鑑外紀其學淺狹不足取信蘇轍古史第發明索隱之舊未為全書因著是編餘論之首釋名書之義引爾雅訓路為大所謂路史蓋曰大史也句下注文題其子蘋所撰核其詞義與泌書詳略相輔似出一手殆自著而嫁名於子歟皇古之事本為茫昧泌多採緯書頗不足據至於太平經洞神經丹壺記之類皆道家依托之言乃一一奉為典要殊不免龎雜之譏發揮餘論皆深斥佛教而説易數篇乃義取道家其青陽遺姝一條論大惑有九以貪仙為材者之惑諛佛為不材之惑尤為偏駁然引據浩博文采瑰麗劉協文心雕龍正緯篇曰羲農軒皥之源山瀆鍾律之要白魚赤鳥之符黃金紫玉之瑞事豐奇偉詞富膏腴無益於經典而有助於文章是以後來詞人採托英華泌之是書殆於此類至其國名紀發揮餘論考證辨難語皆精核亦多祛惑持正之論固未可盡以好異斥矣乾隆四十三年閏六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀

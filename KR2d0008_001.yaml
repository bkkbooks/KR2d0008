body:
  text: 路史卷一宋羅泌撰前紀一初三皇紀初天皇初地皇初人皇事有不可盡究物有不可臆言衆人疑之聖人之所稽也易有太極是生兩儀老氏謂有物混成先天地生而蕩者遂有天地權輿之説儀匹也不曰二儀者二有先後兩無彼此有相匹之意矣天一地二者此先後之言爾地亦惟一而云二者言下已落苐二也李明之衡山記云朱符謂火筯如兩儀成變化不可缺一當有識者辨之有太極説見發揮夫太極者太一也是為太易太初之始列圉冦曰有形生于無形無形天地之始有形萬物之母天地之初有太易有太初有太始有太素太易者未見氣太初者氣之始太始者形之始太素者質之始氣與形質具而未離曰渾淪混沌也河圖括地象云易有太極是生兩儀兩儀未分其氣混沌視之不見聽之不聞循之不得故曰易易內篇云日月相逐為易有易彖象及易之名二説見發揮易無形埒大衍之數五十其用四十有九則無其一矣以竒數倍之為五十而一無倍是之謂無形埒易變而為一北方先有一變而為七七變而為九七衍數九玄數此河洛自然之用世莫能名夫一至七返矣至九還矣還返變通之謂也是所謂易者豈牽合哉九者究也九變復而為一始則終終則始會九而復元變九而復貫易卦自一變至七為歸魂而本宫之氣革矣復二變而返乎本體是復變為一也九轉之道亦數之足爾一者形變之始也天以一而變四地以一而變四四有體而一無體是故天之體數四而用者三不用者一地之體數四而用者三不用者一一者數之始而非數也二二而四三三而九以至九九八十一皆可變以乘而一不變百則十也十則一也故亦不變去其一而極于九皆用其變者也清輕而騫者為天濁重而墜者為地沖粹而生者為人此上本易乾鑿度之文引見列子知此説則可以究天地之藴矣天地一縕萬物化醇男女會精萬物化生而庶彚繁矣天地交而萬物生也夫一氣之中五行並育而五行之生各一其性乾道成男坤道成女自是衍之則為十為百為千萬如果核既坼則根生幹幹生枝枝生葉斯謂三生萬物雖然治故荒忽井魚聽近非所詳言而往昔載諜又類不融正閏五德終始之傳乃謂天地之初有渾敦氏者出為之治即代所謂盤古氏者神靈一日九變蓋元混之初陶融造化之主也六韜大明云召公對文王曰天道淨清地德生成人事安寧戒之勿忘忘者不祥盤古之宗不可動也動者必凶今贑之會昌有盤古山本盤固名其湘鄉有盤古保而雩都有盤古祠盤固之謂也按地理坤鑑云龍首人身而今成都淮安京兆皆有廟祀事具徐整三五厯紀及丹壺記至唐袁天綱推言之真源賦謂元始應世萬八千年為一甲子荆湖南北今以十月十六日為盤古氏生日以候月之陰晴云其顯化之所宜有以也元豐九域志廣陵有盤古冢廟殆亦神假者録異記成都之廟有盤古三郎之目庸俗之妄餘詳發揮繼之以天皇氏地皇氏人皇氏下卷所紀三靈者在洞神部又有所謂初三皇君詳見發揮而以此為中三皇蓋難得而稽據然既揄之矣此豫之所以旁搜旅托紀三靈而復著夫三皇也諸書説三皇不同洞神既有初三皇君中三皇君而以伏羲女媧神農為後三皇周官大戴禮六韜三略文列莊子不韋春秋有三皇之説而劉恕以為孔門未有明文孔安國曰伏羲神農黃帝之書謂之三墳世遂以伏羲神農黃帝為之三皇斯得正矣至鄭康成注書中候敕省圖乃依春秋運斗樞絀黃帝而益以女媧與洞神之説合然白虎通義乃無女媧而有祝融甄曜度與梁武帝祠象碑則又易以遂人蓋出宗均援神契注與譙周之史考紛紜不一故王符云聞古有天皇地皇人皇以或及此亦不敢明至唐天寶七載始詔以時致祭天皇氏地皇氏人皇氏于京城內而王璵建言唐家仙系所宜崇表福區請度昭福作天華上宫及靈臺大地娑父祠於是立三皇道君太古天皇中古伏羲女媧等堂是則太古天皇外復别立三皇矣渾敦氏之世但聞罕漫而不昭晰有不得而云矣王充曰古之水火今之水火也今之聲色後之聲色也鳥獸草木人民好惡以今而見古由此而知來千世之前萬嵗之後無以異也事可知者聖賢所共知也不可知者雖聖人不能知也非學者之急今一切隔之路史卷一

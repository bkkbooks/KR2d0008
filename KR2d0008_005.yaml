body:
  text: 路史卷五宋羅泌撰前紀五因提紀吉夷氏吉夷氏後有吉氏見姓譜几蘧氏几蘧氏之在天下也不治而不亂狥耳目内通而外乎心知人間世云夫狥耳目内通而外于心知鬼神將來舎而况人乎是伏羲几蘧之所行終而况其散者成𤣥英云狥使也能令根竅内通不緣于物境精神安靜志外于心知則外遣于形内忘于知鬼神宜附而舎止矣几蘧者三皇以前無文字之君言伏羲几蘧行之以終其身也天下之人惟知其母不知其父鶉居鷇飲而不求不譽晝則旅行夜乃類處及其死也槀舁風化而已令之曰知生之民天下葢不足治也亦見亢倉子天下莫難于無事莫險于有為然為治者多幸有為之成而鮮知無事之為貴夫以一體諏之藥石具而無所用之曰安至于天下雖有聖智無所用之謂平及夫夐萬金之方著千人之能亦已幾矣故善攝生者無已急之功而善治世者無致平之效彼几蘧氏之治葢以無事治者也是以後世罕儷焉狶韋氏昔莊周訏道之大神鬼神帝生天生地可傳而不可受可得而不可見而首言狶韋氏得之以挈天地伏羲氏得之以襲氣母此所謂神帝也傳者謂是文字之前帝者之號得道以馭羣品提挈兩儀者也仲尼曰狶韋氏之囿黄帝氏之圃有虞氏之宫湯武之室曰囿曰圃曰宫曰室讁世薄也是則黄帝氏之前矣而或者疑即商之豕韋夫所謂挈天地者豈區區伯据之雄所能克哉且昔夫子嘗問于太史大弢栢常褰若狶韋矣豈亦商之豕韋哉集韻狶韋音絺李軌說太史官名音治今丹壺書繼諸几蘧氏之後四世則古固有同名而同氏者豈得謂其有一而廢一哉發揮有同名氏辨有巢氏太古之民穴居而野處搏生而咀華與物相友人無妎物之心而物亦無傷人之意逮乎後世人氓機智而物始為敵𤓰牙角毒槩不足以勝禽獸有聖者作楼木而巢教之巢居以避之號大巢氏韓子云上古之世人民少而禽獸衆人不勝禽獸蟲虵聖人有作構木為巢以之羣居天下號曰有巢氏人食果蓏􅀈􆂛腥臊臭惡聖人作鑽燧取火以化腥臊天下號曰燧人氏其為民也登巢㭬蠡東征賦云登巢而㭬蠡注謂上古無宫室不知教化之時也曹植遷都燧覽乾元之兆域本人物乎上世㭬蠡䖿而食疏摭毛皮以自蔽蠡與蠃同武戈切䖿力兮切㭬琢也惰食鳥獸之肉若不能䭋者飲其血嘬其臑茹其皮毛未有火化捆橡栗以為食草棲木末令之曰有巢氏之民禮存三古𤣥酒以祭薦其毛血之類是上古之禮醴醆以獻薦其燔炙之類是中古之禮退而合烹體其犬豕牛羊實其簠簋籩豆鉶羮則純乎後世先是時民稔血食而有爭心有剝林木而戰者矣吕春秋儀禮正義謂有巢氏時勝者以長長猶不足涖之則就其無欲者而聽令焉又不足以定之于是刻木結繩以為政髙氏小史謂刻木結繩以記事為燧人時非木皮未委于復塞其羽革紩衣攣領著兠冒以賁體見吕覽周公告成王云古人冒而旬領謂三皇時以冒覆頭旬領遶頸至黄帝作冕其制遂明故儀禮正義云皮弁以白鹿皮為之象上古也三皇前君以冒覆頭旬領遶頂至黄帝始制軒冕民之葬者猶未詳焉過者顙泚于是厚衣之薪而瘞之不封不植也掩覆而已喪期無數也哀除而已其政好生而惡殺節上而羨下故天下之人不歸其服而歸其義晏子云古者秩衣攣領而王天下其義好生而惡殺節上而羨下天下不朝其服而歸其義有處層巢窟穴而王天下其仁愛而不惡予而不取天下之人不朝其室而歸其仁治三百餘載外紀云百餘年或云百餘代萬八千年或云萬二千年妄栖于石婁之顔遁甲開山記云石樓山在琅琊昔有巢氏治此山南注城陽縣東北有婁鄉是然于琅琊逺矣而又汝之梁縣有石樓山按今隰州有石樓縣本曰土京隋又改曰石樓東南六十有石樓山此宜是天寳七載詔有司于肇迹之地置廟春秋二享與遂人氏同天下有自然之勢其未至也必至而其既至也不復輕清之必上重濁之必下此天地必至之勢也世之日偽俗之日澆此勢之必不復也彼有血氣者必有爭爭則鬭鬭而不勝必至于剝林木林木未利必至于造五兵五兵之作其可復乎有甚而已自剝林木而來何日而無戰大旱之難七十戰而後濟黄帝之難五十二戰而後濟少昊之難四十八戰而後濟昆吾之難五十戰而後濟牧野之師血流漂杵齊宋之戰龍門溺驂延于春秋以抵秦漢兵益以熾戰益以多而儒者之談必曰去兵謂仁義之君無事于兵而自治嗚呼是欲禍天下于兵戈者也夫國無大非兵必亡天下雖平忘戰必危是故古之聖王有義兵而無有偃兵昔者魏武侯欲為義而偃兵徐無鬼以為不可曰為義偃兵是造兵之始也君自此為之則治不成西夏非兵而廢祀于陶唐徐偃非兵而殄世于曼楚晉諱戰而國棄于劉聰梁諱戰而籙亡于侯景一夫作難萬衆潰弊天下無兵汔未見無禍者是可去邪傳曰天生五材民並用之廢一不可誰能去兵兵者先王之所以威不軌而昭文德也幾微之權死生之地而聖人之所謹焉者今而曰俎豆干戚可以為矣何事魚麗夫如是則消鋒鏑鑄金人足以為治而司馬炎不生事于晉蕭俛段文昌之儔不生事于唐矣作易者曰以此毒天下而人從之吉岐雷俞扁不惟葠苓之養性也而刼痼攻積巴菽殂葛猶不得而後之以毒攻毒有至仁焉是故善去兵者不去兵道德仁義素著于躬禮樂教化日漸于民其所以為萬世帝王之業者固自有然然一罅之或闕則固將有乗之者出此卒伍之法蒐閱之時擊刺之具侵伐之典所以必修明于閒暇之日謂之有政俎豆之中有軍之容固非徒俎豆也干戚之内有兵之僃固非徒干戚也有軍之容是故萊人不得以兵刼有兵之􅍯是故苗民不敢以勢抗今顧曰舜孔未學豈書生所知哉成安君號儒者稱義兵者無事詐謀竒計卒為韓信斬之泜水之上是以聖王以戰去戰非好兵也不得已而後動不敢為主而為客非去兵也不得已而後應而漢祖平成之困唐宗安市之屈失于黷也陸機河橋之敗房琯陳濤之奔失于易也惟非兵之咎也必也主以仁義擾以信禮不得已然後用如舜文之當然范蠡之審諦馬服之不敢易言王忠嗣之本不生事如是可矣又何必去之然後為仁義與若蚩尤之斬乂秦趙之阬夷曽不足為齊晉道又烏足以言兵邪彼光武之欲三十年不言蓋有為而發也遂人氏不周之巔有宜城焉日月之所不屆而無四時昏書之辨空同之北北極鍾火之山地數百里無日月之光猶蜀之陋天常雨少出日者王子年云去都萬里有申彌國近燧明之國地與西王母接以故燕昭王㳺于西王母燧林之下說燧皇鑽火之事西王母國名詳餘論有聖人者㳺于日月之都至于南垂有木焉鳥啄其枝則㷠然火出聖人感之廣土自有不見日月之處予嘗論深山四時早晚與平原之不同非若佛書所謂夜摩天之類拾遺記云燧明之國不識晝夜土有燧木後世聖人㳺于日月之外以食救物至于南垂觀此燧木有鳥類鶚啄其枝則火出取以鑽火號燧人氏在包羲氏之前蓋火山國也山海經言火山之國雖經霖雨其火常然即今武周連渾府之遥火山也故代割雄勇為火山軍亦猶梧州火山之火于是仰察辰心取以出火作鑽燧别五木以改火詳發揮上古之人茹毛而喢血食果蓏􅀈􆂛膻腐餿漫内傷榮衞殞其天年乃教民取火以灼以炳以熟臊胜以燔黍捭豚然後人無腥􅀈之疾祭禮作其祝號薦其血毛腥其俎熟其肴所以存法太古腥俎謂豚解俎之禮記正義云先燒其石令赤以黍與豚加于上而灼之或疑神農始藝五穀神農廣其事爾人民益夥羽皮之茹有不給于寒乃誨之蘇冬而煬之使人得遂其性號遂人氏或曰燧人以鑽燧故古史攷云鑄金為刄民大悅號曰燧人禮含文嘉云燧人氏鑽木取火炮生為熟令人無有腹疾遂天之意故曰遂人典畧云燧人鑽木取火免腥臊變熟食人事也白虎通義云取火教民熟食制養禮性避臭去毒謂之燧人順而不一于是窮火之用而為之政春季以出樵終以納異其時也以濟時疾鬱攸之司九變七化火為之紀謂木器液于是范金合土為釜重作烓髙甌瓿成物化物而火之功用洽矣季春心昏見于辰而出火季秋心昏見于戌而納火故尸子云遂人察辰心而出火亦見中論夫心見于辰則火大壯故季春禁火有辨見發揮當是時也天下多水教人以漁尸子雒出四佐以代天理物乃大臣職天皇輔有三名故皇帝象天文以制官賈公彦謂伏羲之前雖有三名未必其立官位至黄帝時名位乃具爾命明由政乎陞級宋均云辨等降政所見後畢旒辨乎方色分正方俗論語摘輔象云必有受稅俗注云受稅賦及徭役所宜必畢古通用史通莫不必賻成博受乎古諸都鄙之事摘輔象注云受古諸侯之事按孟諸志作明都知裏為有據云隕蓲錄乎延嬉延長嬉福也蓋謂祭祀崔沔議云祭祀之典肇于上古人所飲食必先嚴獻未有火化茹毛飲血則有血毛之薦未有麴蘖汙尊抔飲則有𤣥酒之奠施及後王禮物漸􅍯也蓲一作丘四后職而天道平人事理摘輔象云遂人出天四佐出洛言生知出于天而四佐洛産也龍圖呈瑞龜字効靈見畫錄于是占建而正方王希明太乙金鏡云燧人氏占斗極而定方名東西南北是也握幾矩表計寘圖矩也演命明道經注云矩燧皇謂人皇在伏羲前風姓始王天下者指天以布躔而齊七政康成云矩法也言燧皇持斗機運轉之法本天以施政教作其圖謂之計寘在伏羲前于時無書刻石而謂之爾刻言蒼精渠肩之人能通神靈之意也七政詳慮記主禮斗威儀以為五音二少主君臣父子夫婦政少宫主文少商主武法斗而為七政七政之禮立迹所興也始注物蟲鳥獸之名春秋命厯叙云伏羲燧人始名物蟲鳥獸夫物蟲之名必與物合如牛之曰牛魚之曰魚名之則必承之以至草木亦莫不然蓋聖人有以與物合一黄帝正名百物夏禹主名山川而此道後世不復有能知者非無其人世自隱也通國之輕重以轉民之貲管子云齊桓公問于管仲曰輕重安施對曰自理國伏羲以來未有不以輕重而成其至者曰燧人以來其大㑹可得而聞乎對曰燧人以來未有不以輕重而為天下者也故通典云自燧人逮三王皆通輕重之法以制國用是則制貨以權輕重生民以來燧人已通貨矣人滋反醇情欲蠢動好嗜外廹則冒禮而忘形以賤其神乃制男子三十而取女子二十而歸一云女二十五王充以為法制張設未必奉行陋也逸禮本命篇云太古男五十而娶女三十而嫁中古男三十而室女二十而嫁地官媒氏掌萬民之判男三十而娶女二十而嫁蓋本乎此書大傳孔子之說亦然白虎通謂男三十筋骨堅强任為人父女二十肌膚充盛任為人母合為五十應大衍之數以生萬物也陽竒而舒故三終隂偶而促故再終三天兩地之道以息其民為之進退以耻其凡是故父老而慈子壽而孝著之世姓而法自是作禮由此顯矣禮記疏云尊卑之禮起于遂皇氏云禮有三起禮事起于遂皇禮名起于黄帝通厯通典等皆謂燧皇始有夫婦之道蓋始著其禮爾孔演明通經注云燧皇謂人皇在伏羲前風姓始王天下者是燧人已著姓名治律嵩髙之石室以火著記古史攷云有聖人以火德王造作鑽燧出火教民熟食號曰遂人伏氏書以燧皇與羲農為三皇云遂人以火紀火為陽尊故託遂皇于天伏羲以人事紀故託羲皇于人神農以地力紀故託農皇于地天地人之道􅍯而三五之運興矣應氏之說亦然故康成六藝論以遂皇為人皇云易者隂陽之象天地之所變化政教之所生自人皇初起故頴達謂禮自人皇遂人梁主書起自軒轅而同以遂人為皇其叙五帝則自黄帝至堯而止舜弗預焉謂舜非三王亦非五帝特與三王通為四代斯亦妄矣二百有三十載六藝論云遂皇之後歴六紀凡十一代乃至伏羲始作十二言之教注言遂皇在九頭之前非也貞源賦云燧人子孫相承二萬一千年至伏羲而世紀燧人氏没包羲代之古史攷燧人次有二姓乃至伏羲與六藝論不同頴達疑是三姓而為九十一代俱妄贊曰粤有大聖㳺于南垂别火滲代違其羽皮以炮以燔與人遂性占建握機方㕓以正式通輕重逺近化居四佐授職小大以孚男娶女歸以息以耻父老子壽禮由顯矣顔子將之齊孔子有憂色子貢問焉子曰善哉問昔者管子有言丘甚善之禇小者不可以懐大綆短者不可以汲深故命有所成而形有所適者不可以損益也吾恐回與齊侯言黄帝堯舜之道而重之以遂人神農之言彼將内求諸已而不得則惑矣遂人之言久矣不得而聞矣舎者君君臣臣父父子子兄兄弟弟夫夫婦婦而已矣聖人之道造端乎夫婦夫婦正而天下定是故遂人之制男女必致其詳紆觀乎此然後知後世婚娶之道生也夫元氣之所孕始于子立于己子者字之始而已者包之始也自子推之男左行三十而立于己女右去積二十而合于已正陽也隂實從焉是故聖人因是而制禮三天兩地自然之數妃也自己而壬之男十月毓于寅女十月毓于申申為三隂寅為三陽故年運起焉日生于甲月生于庚日月西東夫婦之象也甲統于寅庚統于申是故隂陽之合必以正將以順性命之理爾男子陽火元氣起戊子三十丁巳十月至丙寅此火生木也女子隂水元氣起庚子二十辛巳十月至壬申是為金生水也嗟乎斧斤以時入山林則木得其性而材不可勝用矣先王之制得其時故人皆廸智而壽命長及下之世不知乎此動違其時是故殘其生賊其性而每至于夭折韓稚有言鑽火變胜之下父老而慈子壽而孝羲軒而降屠屠焉以相誅滅淫于禮亂于樂囂薄澆偽淳風礈矣而或者謂南地薄殘婚宦及早而王肅之徒遽取服經謂三十二十孔子以為禮之極豈聖人之制法哉雖然景公胡為而不足語邪彼受弑兄者之立也而遂相之愛荼之世也而遂立之君臣父子兄弟夫婦有一乎此其所以發為政之問而孔子告之以君君臣臣父父子子者誠以景公于此有所不至故也然則景公果足以遂人之道告乎至彼妄士不知其君而夸焉者又多矣孟軻氏之欲齊王湯武宜也而公孫鞅遽以帝道說秦孝公何邪抑不知孝公之不足以帝道說邪亦鞅之所說之帝道贗邪握鉅而兼金售皆穿窬之盗也若人者非惟不足以知顔子亦不足以知孟子庸成氏庸成氏庸成者垣墉城郭也庸以兵城從戍古墉城字只此作羣玉之山平阿無隘四徹中繩庸成氏之所守先王之册府也穆天子𫝊阿城阿隘阨也四徹猶四境一作徼册府所在庸成是立故號曰庸成氏云容成者非也杜甫云容成氏中央氏尊盧氏軰結繩而已百姓至死不相徃來或作容成蓋以黄帝臣有容成疑其為一而繆方是時人結繩而用之子夏易傳曰上古官職未設人自為治記其事將其命而已故可以結繩為九家易云古無文字其有約誓之事事大大其繩事小小其繩結之多少隨物衆寡執以相攷鄭云事大大其結事小小其結亦意逆之說爾今吐畨犬羊同猶以刻木結事可知繩也其民僮䝉莫知西東摩唇蓐食而莫知其止息託嬰巢中棲粮隴首虎豹可尾虺虵可蹍而人無有相媚之心淮南本經實有季子其性喜淫晝淫于市帝怒放之于西南季子儀馬而産子身人也而尾蹏馬是為三身之國市特貿易衆聚之處張華所記本出括地圖季子乃其名爾子思子言東户季子是也說苑云翟馬生牛牛生馬封荼曰是雜牧也按秦本紀孝公二年翟馬生人唐乾符二年河北中和元年長安亦嘗有此庸成季子之事何其怪邪商書曰五世之廟可以觀德凡事在大故地大則有堂祥岐母羣怪大翟不周山大則有虎豹熊羆螇蛆而况又有大者乎無物不有而後為天地無事不具而後成世道由是而究之則非常之故不慮之變皆適然而已矣是以太公有云天之為逺矣地之為垕矣人生其間各自利也何莫之有乎夫使世俗而能常有其有是乃溟涬鴻濛世以為主莫之有七十六聖矣嗚呼天地之間信何莫之有乎奚物而為常奚物而為怪通之則物我一也不然吾值我非怪邪天下之物固不以自怪也必值我而後怪始未常識遇之皆可為駭惑怪固在我不在物也昔叔山無知且以孔丘為梏于淑詭眩怪者而况于凡乎凡人之情易放而難求子不語怪豈不言邪正自難言之爾有挾怪而問者皆不之告慮其惑也讀如吾語汝之語申生之託狐突彭生之蠱齊侯與夫秦諜七日而蘇荀偃視不受含晉柩牛吼伯有介馳先民紀載良不少矣四海之下兩頭四臂九首六足兩口獨目三身二體旁口反唇交脛反踵馬首狗蹏三瞳四舌四耳三角結匈岐踵半體聶耳毛身𤣥髕貫匈離耳無腸蜚頸羽民尾濮豕啄狗頭厭火流鬼野义落刹充牣其間北方有不釋之氷南方有不死之草東方有君子之域西方有殘刑之尸寢居直夢人死為鬼豈得謂之無邪落刹羅刹也國在婆利東與林邑為市說見餘論聖人慮天下之狃于惑也是故窮天下之故賾事物之變推至道開逕庭以引之正然而祥桑蜚雉有蜮載鬼之類尚筆于經是豈以夸世哉此其有以見天下之賾知鬼神之情狀者也而世之人以其惛惛乃復邈邈務怪不已殆乎夫不極其變則常固不可名不盡其故則心固不可保極天下之異而歸之正則正者不能以復異矣伯益之所記齊諧之所識予正恐其未廣也使世人知物我之不殊同異之一貫則怪亦常矣又奚俟于覩流屨而大息哉荀卿子曰可怪矣而未可畏也聖人以為常而衆人以為怪是不可不諫也未信而諫則人不與兹故因之以怪焉右因提紀凡六十有六世路史卷五

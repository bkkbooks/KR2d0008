body:
  text: 路史卷三十一宋羅泌撰國名紀八封建後論惡呼治古不可見矣予嘗稽古之所以為治之具見其不可得而跂及其為後世之所輕毁而至於慟矣若古聖王思建一事立一法必為萬世不可易之計其所周旋必有不可容啄之處逮為之也不惜一身之勞不憚百年之乆而必為之長慮盡䇿持之以定期於成而後已故或有跨數世而後始克有立焉者逮其立也靡愆於素自然藴利而足世守蓋以一勞永佚豈使朝庚而夕改哉雖其中間或有損益亦其小者而其大者終不可以少指也故孔子曰殷因於夏周因於殷因之而已未聞有改其所損益固可知也往者然矣來者其有異乎大者已足因而不改小有損益救弊時生豈難知哉又曰其或繼周者所損益雖百世可知也何特百世千世之至可坐而知也豈唯孔子知之如泌之愚亦可以豫知之也奈何後世不求其故不知千世之利百聖之勞而見其一朝之害則軒然肆毁曾不遺疑遂使萬世莫良之法一朝而歸於亟壊豈不哀哉原昔先王之立法也正朔服色之外自伏羲神農黄帝堯舜厯夏商周世世守之未之有改至於秦氏世尚權謀以變詐有為富國强兵而有天下狃於故習遂取先王之法一切變革而不之顧其繼秦者覩其有為近利而不知利近者禍急若長慮者之可以乆安也更以有為為能而以守常為齷􅐅循之為常争事改作罷封建廢井田隳里選除肉刑先王良法掃地就盡而為治者猶曰復古交曰追治殊不知本既抜矣而切切焉溉罋欲以青其柯而揠其枝後難繼矣顧常言之萬事失理皆繇封建之法弛也封建之事自三皇建之於前五帝承之於後而其制始備厯夏達商爰周郅隆而後其法始密可謂勞矣不幸後世上失其制諸侯僭天子大夫僭諸侯禮樂征伐侵㝷四潰而王官方伯相與黷貨莫之或討浸淫浸泆以至亡而後已故人皆曰周以弱亡論者徒見周之弱亡則以為建侯之罪而不知其所以長者正以國存也鄉使上之人稍失制於郡縣之前則夷厲已失之矣夷厲不失此封建之得也秦以險資濫居天位見周之亡以弱而已之得以侯又􅀈前日取之之難而用力之多者以六國也於是罷侯置守功臣宗室尺地蔑有當是時秦固謂得計矣然而未幾劉項興於龍斷惡在得土乃王哉賈生之計諸侯不過欲衆建而少其力而栁子乃以為郡縣之利朝拜而不道則夕絀之夕授而不法則朝斥之是不以諸侯為難制而郡縣為易支歟是何三代建國無匹夫横行之禍秦漢置守羣盜並起而州郡莫有制者東周雖萎然猶侯伯相維而未遽亡莽卓盜漢天下郡縣無一人敢議者部刺史以六條問事五為二千石不法而部刺史或不循守與郡相迫促則匹夫呌呼不數十輩厯數十郡莫誰何者斗筲穿窬移國梐枑之間莫之或阻雖南郡一太守慷慨奮事亦不旋踵而就夷滅則郡縣之權素奪陵遲至此而不足恃也以唐明皇號能優假守刺躬加勴擇至於以侍從選可謂重矣而一禄山變起河北二十四州靡然胥應建國立郡其事概可見矣方漢之初首鑒秦轍革土宇建諸侯計非不韙也惟其法制不立以故中有不掉之憂漢之君臣不知乎此而乃專專歸咎强大於是極意以謀弱之逮元成時宗國弱盡而王氏之子孫已滿朝宁王侯宗室厥角稽首至陳符命上璽書無一人焉為之禦其禍福亦明矣世祖隆興仂鑒時弊然而不原其本元功碩徳一茅不建故當靈獻奇禍迭作而内外無援曹氏懲之宗賢雜置而亦夐隔千里第存名號是以元首致論而爽弗知思及乎一旦浮梁奏泥至求死而不得魏之封圉亦自是不復國晉復懲魏倍開同姓然而矯枉過正置軍授職卒致八王禍不還踵則制之失其道也宋齊之間爰以晉戒諸王宗國䕶以典籖而諸王之誅悉以典籖宇文懲之復失孤弱及隋文之混一申鑒其事夫何討究莫及壤子介宗悉援大鎮即致驕奢不度權侔帝室而不得以令終嗟乎天下果難制哉繇秦汔魏五百年間下之所以􅀈􅀈而議上之所以擾擾而治惛呶斐亹之不一者惟封建之不决也繇晉汔隋五百年間下之所以􅀈􅀈而議上之所以擾擾而治惛呶斐亹之不一者惟郡縣之不専也時人失之東後必西鄉者誤之白今必黒此厯世寶臣􅀈議建國立郡之大較也胸中憒憒曷嘗只尺之或見哉有唐大宗亦可謂英明不世出之主矣方其有天下感周官惟王建國辨方正位體國經野設官分職以為民極之語慨然以為不封建不井田而欲復周公之治不可得於是奮然講封建事而以陳就之事望之魏徵可謂得獨見之髙矣惜乎明之不至不能斷之於已其㑹直中書徵不能定而設爵之制遂興封建國論汔不行於天下而禮樂􅀈壊之象帝尚憫焉是以當時雖號大定府兵方靖然而武氏一亂幾以不唐改彉騎變藩鎮炰烋蓼擾而卒以亡唐則天下之勢不立其禍正如此也即此語之封建二字千五六百年而議未定也而暇大脩政事邪故曰天下之枉未足以害理而矯枉之枉常深天下之弊未足以害事而救弊之弊常大是皆率作興事致慮不熟之所至也方至和之二年范蜀公為諫院建言恩州自皇祐五年秋至去年冬知州者凡七換河北諸州大率如是欲望兵馬練習渠可得也伏見雄州馬懐徳恩州劉渙冀州王徳恭皆材勇智慮可責辨治乞令乆任然事勢非昔今不從其大而徒舉二三州為之以一簣障江河徒無益也名臣傳請以誰昔河東之折靈武之李與夫馮暉楊重勛之事言之馮暉節度靈武而重勛世有新秦藩屏西北它日暉卒太祖武皇爰徙其子馮翊而以近鎮付重勛於是二方始費朝廷經略折李二姓自五代來世有其地敵人滅之武皇於是俾其世襲每謂外㓂内入非世襲有不守世襲則其子孫久逺家物勢必愛吝分外為防設或叛換自可理討縱其反噬原陜一帥禦之足矣况復朝廷恩信不爽奚自而它斯則聖人之深謀有國之極算固非末垂窮谷流俗淺近者之所知也厥後議臣遽以世襲不便折氏則以河東之功姑令仍世而李氏遂移陜西兩鎮因兹遂失靈夏國之與郡其事固相遼矣髙宗在御范宗尹等㑹議將以京畿東西湖北淮南並分為鎮以鎮撫使為名除茶鹽之利國計所繫歸之朝廷依舊置提督官其餘監司悉罷財賦除上供外並聽帥臣移用州縣官許辟置惟知通須奏朝廷審授運興許以便宜從事帥臣非召擢不除代捍冦有功則許世襲上詔從之既擬世襲上曰若使世襲恐事太重當俟保守無虞然後許之於是詔以河南河陽唐汝授河南翟興以楚泗連水授楚州趙立以滁濠授滁州劉立以光黄授光州呉翊以舒蘄授舒州李成海及淮陽授海州李彦先承及天長授承州薛慶和與無為授和州趙霖並為鎮撫使既而成以舒蘄叛擾江西此失於議臣輕舉而不知政也李牧為趙將功以久而成李勣守太原威以乆而立將帥屢易是乃昔人隂計中呉使渾濬成功者責任不專與雖專而不乆欲其有成那可得也使數子者一時反噬禦之原陜一帥誠是何世襲不便之有論者乃以武皇之懲唐末五季之事而以鎮兵歸朝廷為不可復封建愚竊以為不然夫武皇之不封建特不隆封建之名而封建之實固已黙圗而隂用之矣李漢超齊州防禦監關南兵馬凡十七年敵人不敢窺邉郭進以洺州防禦守西山巡檢累二十年賀惟忠守易李謙溥刺隰姚内斌知慶皆十餘載韓令坤鎮常山馬仁珪守瀛王彦昇居原趙贊處延董遵誨屯環武守琦戍晉何繼筠牧棣若張美之守滄景咸累其任管𣙜之利賈易之權悉以畀之又使得自誘募驍勇以為爪牙軍中之政俱以便宜從事是以二十年間少無西北之虞深機密䇿蓋使人繇之而不知爾胡為議者不原其故遂以兵為天子之兵郡不得而有之故自寶元康定以中國勢力而不能亢一偏方之元昊靖康醜虜長驅百舍直𢷬梁師蕩然無有藩籬之限卒之横潰莫或支持繇今日言之奚啻冬氷之氷齒惡呼欲治之君不世出而大臣者每病本務之不知此予所以每咎徵普以為唐室我朝之不封建皆鄭公韓王之不知以帝王之道責難其主而為是尋常茍且之治也式觀昔之譔著欲論定者衆矣揚雄王通固無尤也陸平原之論所論據古驗今而反覆者自時無或肥之至李百藥始建立祚不緣封建之說而後好新奇者作宗元於是孽孽文之可謂不達國體者矣下逮宋祚惑於其說而誤於杜佑之言遂遽以為建侯置守當如質文之遞救夫朝庚夕改者乃小家之錡釡老婦之缾盆且猶不可而兹何事邪予為國名記愴先王之事時而暢之不能自已因併著異時之肤論於後以俟他日必有能熟其制詳其禮濟之以必而持之以乆容易行之如主父者熟其制則無嘗試之為詳其禮則有可遵之法濟之以必則事無不成持之以久則事無不定矣尸臣人牧又奚患於作舍不成與尾大不掉之咎邪究言庚申歸自誠齋作天下萬事必有其綱一綱舉而衆目從矣今夫一家之事巨細百出必大綱之正而後事可為一郡之事巨細千出必大綱之正而後事可理况天下之大萬務之繁而可隨事帥意嘗試而為者乎封建者天下之大綱也始予論封建有大利十郡縣有大害十再十年後論封建則事蔑其非郡縣則事無其是然前之論知古之為利而未及乎今之利知封建之未弊而未明郡縣之終非大抵封建郡縣正猶愚智千慮之失得侯伯百十豈無酷惡守令百十亦豈無令徳哉說者徒見陳靈衛宣魯桓齊穆則以為諸侯之失見卓魯龔黄召杜則以為守令之得而乃不知漢四百載守令數萬循吏不數十春秋二百四十二年侯伯千輩其不道亦正可數緇徒億萬豈無逺肇奘澄而餘何不稱賓進百千豈無韓范文富而餘何不算三數百郡縣邑千百百年之中宰牧萬計三年大比廷對千百百年之中登拔數萬豈不各有數百翹拔為推首者而稀疎寥落之若此何其不知權輕重之如是邪大率人情習於目前而昧於目之所不及故為人臣貪爵位喪亷恥特不過冀尊顯以為身榮圖世賞陷贓墨特亦不過為私計以貽子孫爾顧所以為身榮貽子孫者豈必官髙而地大哉小國寡民徒亦欲其乆欲其傳欲其為已物而已今士大夫急資轉事奔競將以及子孫也然不一再而㣲子孫汔不承廣田宅事兼并將以貽子孫也然不一再而窶子孫汔不保則亦不知所以長乆者而已崇教化而教化汔不行興禮樂而禮樂汔不立却夷狄而夷狄汔不享振風俗而風俗汔不厚禁兼并抑奔兢而兼并奔競汔不止百千年間論議洋溢朝野紛糾亦可謂劬勩矣然說里選而不知里選之不可施說宗法而不知宗法之不可設語民兵而不知民兵之不可復䇿井田而不知井田之不可行省刑獄而刑獄汔不省立家廟而家廟汔不立以至劭農馭吏澄冗清流若清賦而裁俸者爭談競議動盈匧匱而汔不見一說之得以通行其或論建詳至令布嚴肅能遵而行之者亦不過數十百郡邑中而五七遇五七之中又不過一二載而逌去政亦何補於君民哉抑乃不知不封建則其勢不可得而行而一封建則其事不言而自復大綱不是區區講發正亦擾擾徒勞頰舌而耗煤楮爾請試以百里之縣言之東西南北不過五十吾之家也游處朝夕奚事不及耳目所接奚物不知耆賢碩徳不過百輩何得不審官師卿士不過百數何得不精胥吏吾民之蠧何得不嚴獄城吾民之命何得不詳田萊不過百里何得不闢賦用不過一國何得而不清哉書大傳云圻者天子之境也諸侯曰境天子游不出封圻諸侯非朝聘不出境齊桓公伐山戎過燕燕君送之出境公問管仲對曰非天子不出境燕以畏失禮也公乃割燕君所至地以與燕諸侯聞之皆朝於齊漢之諸侯擅出國界者皆削為司冦如楊丘侯終陵侯之類是也百里之内得備游觀乃無所限故得熟其風俗人事爾燕之畏齊之割近義矣然亦戰國之事所貴者猶知越境之非周禮也國邑備故生産絀生産絀故兼并絶卿大夫既有家各有采地自無與民争奪田産之弊宫居具故第宅省第宅省故民居寛𪠘舍各具即為私家儀式具備今士大夫罷官乃營私第掩奪閭巷故茍貪財物無有休歇疆境定故逺戍罷逺戍罷故民兵成一國之内民自為守如今土豪四隣援助亦不過數百里内無復絶漢逺征離鄉失井生離死别之患故人以樂為也兵民擾故戎狄畏戎狄畏故外侮却藩離勢成重重拱衛内外隔限故有封建則無戎狄土宇辨故賢否見賢否見故鄉舉復百里之間百年鄉社不待鄉里舉選朝廷皆自可知則不言可自復今合天下而欲行鄉舉里選是不通世務鄊舉復故士清脩士清脩故俗學止必㧞其材賢而後試其實能則無泛濫猥進無用之學古選而後試故精今試而後選故濫自然之理官職稱故仕路澄仕路澄故奔競息選而試之以是能居是官以是材居是職材實兼副自無僥倖之舉今無賢否惟資格舉主是視而欲不奔競是不知人事俸給散故貢賦清貢賦清故鞭朴省甸方八里丘方四里邑方二里三公五甸得三萬二千畝至下士一丘一邑得二千畝私田不預國邑采地各足其禄在王朝無復俸給胥吏恒故設心厚設心厚故法令守胥吏亦有禄田有常産而不數易則自愛而守法令枉濫自少亦所以全其臀脊四民安故田野闢田野闢故賦稅足田歸於民而賦入於卿大夫無勢力兼并之患田里旣寛而上又有常勸則逐未者自少宗廟立故兄弟親兄弟親故風俗厚有國斯有宗宗廟立故子孫孝子孫孝故宗族睦有邑斯有廟姦兇盜蠧弱强難易隨地區處必獲其施醝茗竹漆有無多寡任土増損必得其宜夫然故逺近利害少多治亂各自為政有不煩於上之屑屑京都内史特亦不過勤䘏畿甸脩其禮樂謹方伯慮刑政以畏懐督勸之而天下治矣故予嘗謂不封建則鄉舉里選决不可行均田井地决不可措兼并决不可息奔競决不可抑官職决不可澄胥吏决不可繩姦宄决不可懲士卒决不可精教化决不可興財賦决不可省人無常主刑無常辟官無常事吏無常畏士無常守民無常業凡百有為特亦不過茍且之中求少優異於行間則已矣云為注措每每失議是豈茍且然哉蓋亦不知今古末弊與夫利之不利郡縣之勢正如此也是故必封建而後宗法民兵可以行之於天下必諸侯而後鄉舉里選可以施之於列國誠使封建朝復及莫便無奔競詐譎寡亷鮮恥之為爭奪自植乾沒兼并之患而迎送道途奔走費􅲍之勞試院攷官浮末濫號之弊一皆可以隨去至於劭農馭吏澄冗清流若清賦而裁俸者但不言而自正矣下有貢而無賦上有賜而無俸事百循理又孰有朝更夕改而不可為者輿服成妃子備倉廩實而禮義興姻好結朝聘講刑罰省而盜賊息則榮願亦滿矣宗廟之美百官之富既得自足其樂而付子傳孫榮世顯族亦已各足其欲則亦惟時脩其禮法以示後世選其賢者能者而共理之抑何至憧憧役役相欺詐互稽薄胥洶湧而事剝取以貽司敗之誅哉河北州郡古之畿服定逺東西八十南北七十二里寧邊東西八十二里南北七十文安東西八十南北六十破虜經緯皆止三十靖戎經緯皆止四十五里雖曰險劇而得之者目前時暫咸以為榮一何至望望迷惑而烘談四五百里邪一國不道自取其滅一帥不道自速其絶則亦奚至絃絃出出疑其不可圖哉是故立國之道惟在乎勢秦楚之强大特强大之弊爾而天下之勢民俗之病有不在乎此世徒見晚周諸侯之强而不知天下之勢合見後世守令之弱而不知天下之勢散故論封建失之弱而實以强郡縣失之强而實以弱皆率然之對也夏商之世衆建諸侯固非有兼并之弊也禹初七千至商三千至周而千八百特其子孫不一二世輙不自振廢退厭絶以歸於滅息者朝廷不修封君上不留意而致之於是爾竊又諗之國壊之廢必有餘貢餘貢之始其勢必至於附近附近歲久廢積日多而㑹不能稽則鄰封之接者因以認而有之逮其强也適周之亂謖相侵據而遂不可正爾曰公子張告楚䖍曰齊桓晉文其始入也四封之内不備一同而今至有畿田屬諸侯句踐之地南至句呉北至禦兒東至鄞溪西至姑蔑其廣運才百里故曰郼岐之廣也萬國之順也顧豈其本爾邪今而曰建國利一宗列郡利百姓豈知言邪東遷之前二代之際建國何嘗不利百姓桓靈恵懐肅代徳憲之世列郡百姓泥沙塵土亦曷見其安且利哉吾故曰建國利一宗復利百姓列郡不利百姓復不利一宗封建之時一人縱以失徳於上而萬國之中各有政化聞者得以興起郡縣之世一人失徳則波頺瓦解而四海共罹其禍事固不可同日語而說者猶以為公天下之端自秦始其亦目熟遽盧偋匽而不知秦帝清都琳宇之邃謐者乎雖然事亦難乎言矣世之主計議及清賦則曰未可輕議姑循其舊有及澄冗則又曰幾茍安爾毋庸生事如此而欲以其封建之說進不幾乎見㾹㿋之尫而强之烏獲之任其不折而死者無矣辛寛有言吾乃今知先君周公不若太公望封之知也朱晦翁歎天下之事皆不是未窮天下之大綱也吕東萊憡天下之事不可為不明天下之大綱也李泰伯刺萬事之不一行而知邦國之不興兩程子知百事之無一是而不知封建之不置惟失制也先達賢徳封建之說大率不過率然為之魏徵馬周李百藥輩猶不過習紙上至於侯守實利實害何嘗少究其略而况栁蘇文士爭衡冊府務為新特之說者乎兹予所以不憚耄志喋喋疏寫顧豈祈為舉子誇哉直欲謄申朝野人人傳而户議之年深嵗久熟其利害之鄉而博大髙明者攸然中作一舉而施之天下則豈惟區區之願得以少副實天下之休而萬世之幸也必正劄子五月日必正久不獲面每切傾馳但時從仲威詢問行李備聞盡屏外事専意家學神宇既定氣貌益昌聞之矍然喜而不寐過辱厚意不棄其荒落隳廢之乆猶欲以著述開其茅塞病中展省過於昔聞蓋愚意病此乆矣古者以四海不可以一人專之故分封藩屏與之共治使人人各愛其民以為永乆不廢之業其為之慮也長為之法也信為之恵也廣為之治也精不復有後世茍且之弊而復上古淳篤之風民既信之吏固畏之無朝夕紛更之心而有因續成功之利為之主者亦不至信任之非人而使天下嗷嗷然失其所守俾四方萬里朝令夕改以狙狂失守而在上者偃然各行其心栁子厚所謂公天下之端自秦始而不知私天下之端自秦始也今天下梯山航海以奉一人改心易面以奉一吏是豈聖人之心哉大利有十大害有十二了然明白不可枚數姑以大綱言之則振領而裘整矣然此事誠難為言人亦不信正由私天下之心在昔則在下者安得舉而正之姑以俟後人之不惑可也倦甚未能接論草草姑此以復來命崕略皇恐國姓衍慶紀原氏族之興所繇來逺矣自一姓以上推而至於有國有家者均不可不原所自來也不原所自來而區區於五廟七廟目前之奇偶昭穆是講是究則先公風化之所繇前代甄陶之所致者豈不因是泯沒而後代之雲礽更相承繼將欲追尋族系於數千百年之上者不知何所考信哉况國姓之淺深尤有係於國脈之修短世運之盛衰天命人心之去留者而可以置而不論歟昔秦皇燔簡編薄姓系君子竊嘆其斁倫魏帝捨托跋紀元氏君子深責其背祖太史公作堯舜本紀謂其源皆出於黄帝後世目以為良史唐史臣作世系表先宗室而後宰相後世指為全書蓋祖宗積累之源流千萬世享國之明騐倘録其小而遺其大詳於臣而略於君豈不為一代紀録之闕文耶恭惟國家列聖相承太祖太宗以英睿定大業真宗仁宗以忠厚守成憲髙宗孝宗以謨斷成中興之功自開基至今日甲子逾四周繼今日以往固將傳之無窮而趙氏得姓之因厯諸儒討論猶莫之核議者徒見史記所載程嬰杵臼之事遂以為趙氏得姓為始於此而不知其不止此也又徒見左氏所記趙朔趙武之事遂以為趙氏得姓或由於是而不知其不止是也抑徒見史記所謂造父以徐方功封於趙城為趙氏及張說氏族對以韓陳魯衛許鄭若魏與趙氏並言遂又以為趙氏得姓以國而不知其亦不止於國也嗟乎處劉漢之朝而不知劉氏之為堯後居李唐之世而不知李氏之為少昊裔者皆考訂有所未到况居堂堂天朝而不知天派之所自來可乎我國家之有天下也詔有司講求趙氏得姓之由大中祥符間作玉清昭應宫復詔儒臣講求趙氏得姓以來有名可知者三十六人繪祠兩廡元豐間郎臣又以前星不曜乞訪程嬰杵臼墓而廟之其於氏族非不以為重也而副墨之子不能將明聖意推而上之徳厚功積源深流逺之效而獨安於淺見溺於成說例推援造父之後抑不知夏氏之季已有諱梁字者見於正史則趙氏得姓其不止於造父也明矣商氏之初亦有諱隱字者官為牧師則趙氏得姓其不止於造父也審矣戰國中衛平嘗以名梁者言於宋元王後魏中李譜亦以諱隱者言於冦謙之曰三六之上有𢎞真正尊者姓趙名道隱得道於商初及百家諜風俗傳易是類謀俱言張王李趙皆黄帝之所賜姓抑又知趙氏得姓其不止於造父也亦校然矣竊况程嬰杵臼之事俱為無有同括屠岸事乂皆不得其實是尚得為至論乎大抵百尋之木生於千仭之崗其根之蟠於下者與枝幹嘗相等百川之水朝於衆宗之海决亦不自潢潦無根源者起商有天下六百餘載蓋孕育於六百餘年之契周有天下卜年八百亦固自夫八百餘年之后稷有以肧胎於其先也趙氏得姓於今蓋厯四千餘嵗而後太祖武皇始為天下根可謂深源可謂逺重之以明徳厚之以仁政享年有永奚必智者而後知之歟家國之夀何以異於人惟善攝者䕶嗇元氣必長演而過之道徳以繕俗仁義以膏本則膺期過厯固非客龜短筮之所能知也仙源積慶臣嘗於所述路史辨之詳矣庸復纂載以備史官之採擇路史卷三十一

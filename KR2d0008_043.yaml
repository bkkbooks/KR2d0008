body:
  text: 路史卷四十三宋羅泌撰餘論六孔子生日何惑乎儒學之衰乎皆儒者之不自尊其道之所致也夫聖人之禮法行乎天地之間萬物賴之而相生養者也一日或息則日月為之孛蝕隂陽為之錯繆山川企走咸失其所豈止臣賊其君子賊其父而已哉顧佛何為而且與之分曹而抗衡邪今夫峩進賢曵珩玉享太牢而踞􅕆屋者其貴大亦極矣孰非先聖人之賜哉奈何乘高驤道廟闕則枵然不之顧覩籩豆仆溝塉則恝然不之省而崇佛教奉緇侣則至於麋捐局蹐日虔禱月施給猶以未愜是何耶惟其學識不至衷無所見而將以圖荒唐之妄福也夫釋氏果能以福人邪則王公大人今日貴大不由佛教而顧以進其身潤其家者一本先聖人而取之亦不知義命矣異時有假守古上饒欵孔廟者目老桑門舞肘而過執而訪之曰吾由佛剎未始不肅而得無狀則對曰儒自敬我教而不自知其所以敬我有佛書未始漫泄方其暇時珍藏什襲皈之敬之及其出也又非盛服焚禮則弗敢以誦而今橫舍經籍取具汚毁狼籍靡所不至齋閣為聚訟之宮庭廡乃博塞之閾何由興起守聞而忸之從而謝焉以今都邑橫舍實為無統所謂養士一皆無賴莫適者竊食其間而所藉生徒則皆先進之徒多方占寄以為他日罹憲免責計成才烏乎出哉嘗試語喪釋氏有所謂四月八日固非其實而走天下之人沈道虔輩纍世奉事至推宅以為寺四月八日廣設圓像舉室慟哭流風如此而孔氏有一初度之辰曽無記者非惟無記正亦自不之知夫孔子之道固不俟此以輕重逢掖之徒亦豈以斯而較彼然道尊在於師嚴而禮義存乎愛敬誠使天下橫舍能因夫子初度之辰略為之識庸何傷四月八日亦非實定之日詳發揮恆星説豫曩繹齊書見臧榮緒以宣尼庚子日生每以是日陳五經而拜之未嘗不仰之也奈何夫子一誕生之日史傳紀載靡有定恪珞琭子云宣父畏以元辰而五行書論孔子以庚戍年二月二十三日庚子甲申時生按庚戍乃魯襄公之二十二年是嵗周靈王之二十一年而長歷其年二月二十三日實為庚子以哀公之十六年壬戍嵗四月己丑卒乃敬王之四十三年享七十有三齡然公羊傳乃於襄公二十一年書十一月庚子孔子生榖梁傳則繫於十月之後蓋十二月二十二日之庚子也是嵗閏申以元術論節過在子可以庚戍語然或以為十月庚子則是今之八月乃襄公之二十一年而靈王之二十年也然嵗在己酉則為年七十有四不得為之庚戍故劉外紀謂孔子年七十四雖然公羊子言十一月是月固無庚子以孔氏家譜及祖庭記等所以俱云二十二年十月庚子乃二十有七日故林開以為庚子之月節雖已過不知周正乃今之八月亦非得云二月矣今定著八月二十七日為先聖人孔子生日鮮卑烏丸鮮卑者東胡也漢初敗於丐奴退保鮮卑烏丸之山曰鮮卑亦曰烏丸隋圖經云卑在桞州東南二百里又棘城東塞外及遼西北百里亦有鮮卑山露宿莽飲桓靈之際盡并北丐奴地光和中亂檀石槐種為小種鮮卑破之魏初莫護跋部入遼西從討公孫淵封國於大棘城之北曰步搖子本延為左賢王孫徒河涉歸漸華風進拜單于二子長曰吐谷渾以馬致國甘松之南孫葉延為吐渾氏官俗頗同中國及卒兄弟繼立至夸吕號可汗百餘年還為慕容氏慕容鍾都督録尚書事奔姚興興拜始平太守歸義侯自永嘉建國為吐谷渾隨有伏允死順為可汗順子諾曷鉢立封青海國王死子忠立忠死子宣超立襲可汗號生曦皓卒子非嗣龍朔三年土番并其地散徙朔方河東境俗謂退渾凡三百五十年國絶次若莫瘣遷徒河之青山以大棘城帝顓頊之虗徙焉元康四年教農桑修政令徴儒生撫華裔四逺歸之乃立四郡統焉子皓遂王燕前燕後燕南燕皆其别也唐國望都堯山唐今中山之唐縣也按輿地廣記堯為唐侯於此漢屬中山國今中山之新樂皆故漢之唐也有堯山唐水南有望都城望都里東北有中山故城一曰廣唐城張曜中山記之中人城也望都城東有堯故城俗呼為堯姑城世紀以為慶都山在望都南張晏皇父謐皆謂以升堯山南望都山因曰望都相去為五十里今在唐縣東北五十四里俗呼孤山一曰豆山而十三州志唐故城在盧奴北七十五盧奴今之唐也酈元云城去望都城八十去中山城七十推驗宜為唐城北去堯山五里與七十五里之説合然城南無山以擬都山於是欲以唐城為望都城而北又無城以應唐城乃以唐城東南十五髙昌城為望都城蓋不知道里之誤也雖然唐之為名在在有之而平陽安邑亦皆曰唐平陽即晉之臨汾正乃詩之唐國有姑射山按九域志唐水之上地正名翼一曰絳而總曰平陽成王滅之以封叔虞後更曰唐安邑今𨽻解故絳之翼城城西二十有唐城又并之平晉北二里有故唐城寰宇記為唐堯所築夫平陽乃丹朱之封也徐才國都城記及元和郡縣志皆云翼城唐國帝堯裔子所封而晉陽縣北二里亦有故唐城云堯所築即燮父之所徙而河北縣南百二十八又有故堯城九域志威勝軍之臨漳城風土記亦云堯築而邢之堯山縣漢之柏人西十二有南蠻古城今相有古柏人城九域記引世紀為堯都縣東北二十二有柏鄉城故與趙都柏鄉縣東西中分城冡記言堯所置有堯廟謂堯登此覽洪水訪賢人者又河東之南二十八亦有堯山上有堯城水經以為唐堯所理而雷首亦謂之堯山有堯祠唐之堯山亦有堯祠張朏齊地記以為巡狩所登而河清西南八十五瑕丘東南七里洙西與滑之靈祠皆有堯祠上黨長子亦有堯水堯祠集古録記堯祠碑二皆在濟隂九域志濟隂乃今有堯溝而九州志曹為堯廟堯之所開而名若寰宇所記堯迹尤多堯舜之祠天下不勝多矣張朏皆以為巡狩之所記有所不得盡有如東海縣西北三里謝祿山上堯廟乃太始七年刺史劉崇之所立自以為堯後為之此類尤多今荆湖南北江西兩浙桂陽永明二水以來祠場不可勝紀廣記皆不能録克明峻德至時雍聖人之德固無待而自明堯帝峻德所以克明者德性之明足以勝己之私而已大學説曰克明峻德自明也不明爾德時無倍無側爾德不明以無倍無卿此所以為幽也惟峻德之克明故於是可以親九族惟九族之既睦故於是可以平章乎百姓九族王之親族而百姓者百官之族姓也聖人之治必自近以及逺由親而之踈是故治國者必先家齊家者必先身此平章百姓之所以必先於親九族親九族者所以必自於明峻德而萬邦之協和黎民之於變又有待於百姓之昭明也九族惟患其不睦故必使之既睦百姓惟患其不明故必使之昭明親親以睦友賢不棄使既睦也以其昭昭使人昭昭使昭明也春秋傳曰克明峻德自修也以親九族親親也平章百姓體羣臣也協和萬邦懷諸侯也黎民於變時雍子庶民也天下歸之此明德之效也大抵天下之不治常由逺人之不安逺人之不安常由諸侯之不度不能修身九族何自而親不能親親百官何自而辨故必正身而後內外順必親親而後職任當方晉季世宗賢摧落姦佞在朝悼子父子既非親賢國寶之徒又皆讒佞是故一時嶽牧如囗泰輩曽無畏忌而晉陽之甲興其為不睦也甚矣迹其禍兆豈不由於峻德之不明乎此於變黎民所以必俟諸侯之協和而協和萬邦所以必俟百姓之昭明也典於親九族言以而下不言以於睦九族言既而下不言既蒙上辭也程子以百姓為庶民孔氏以峻德為賢士未諳九族三族非異姓親親治之始也禮小記曰親親者以三為五以五為九上殺下殺旁殺而親畢矣是所謂九族者夫人生則有父壯則有子父子與已此小宗伯三族之别也父者子之祖因上推之以及於己之祖子者父之孫因下推之以及於己之孫此禮傳之以三為五也己之祖自己子視之則為曽祖王父自己孫視之則為髙祖王父己之孫自己父視之則為曽孫自己祖視之則為玄孫故又上推以及己之曽髙下推以及己之曽玄是所謂以五為九也五衰之等惟父與長子三年族莫重也以三為五則祖與嫡孫皆期以五為九則髙曽曽玄為三月矣所謂三月殺也昆弟為期而從父之昆九月從祖之昆五月族昆三月所謂旁殺也詳禮書六十其不曰五為七者服數盡於五也雖然髙為三月則曽宜小功祖為期則曽宜大功以祖期言之則曽大功矣而為齊三月不以旁服加乎尊也禮齊三月而章以為曽祖是曽亦齊三月矣重其衰麻尊之也減其時日恩殺也此之謂上殺髙曽曽玄同為三月所以報也然曽服同齊而曽玄緦卑也此之謂下殺是以五為九也記曰閨門有禮則三族和矣詩書言九族而小宗伯士昏禮仲尼燕居惟言三族蓋五衰之所止以上下言之則九而以等衰言之則衰以袒免所及自旁言之則又謂之六親一也三族親之本九族親之盡舉三則九見矣孔安國云上至髙祖下至玄孫小記之言亦昭明矣而或者謂髙非己之所逮事玄非己之所及見且出一族則其所睦為不廣於是執為異姓之説此何琦所以謂若但內宗有不足以贊帝堯之美徒亦不知所謂上下及者非及髙玄之身其同出乎髙祖旁殺服屬之內者皆是也夫亦豈知世之難睦者惟在內族曽髙外屬世曠事希簡薄有甚於外人者然竊疑之桓公六年傳以外祖父母子及妻之父母姑之子姊妹之子女子之子若己之同族為九族而禮傳遂謂緦以上恩所及妻之父與舅有服明在族也女適人而係姓為不異族故禮之戴書之歐陽夏侯白虎通議如淳之徒皆以為父母妻之族合則為三别則為九父之族别而四父五屬之內父之女昆弟適人者子己女昆弟適人者子己女之子適人者子母之族别而三母之父母母之女昆弟母之女昆弟與其子妻之族别而二妻之父姓妻之母姓至引伐木諸父諸舅角弓之兄弟婚姻與頍辨之父弟甥舅以為實謂諸父兄弟者父之族諸舅諸甥者母之族而婚姻者妻之族也是不然伐木詩言親親以睦非九族也角弓父兄刺幽之詩頍辨諸公刺幽之詩傳者以為不親九族非本指也葛藟王族刺平之詩而以為棄其九族行葦美周忠厚之詩而以為能睦九族豈其然乎終逺兄弟謂他人父謂他人昆此譬逺棄親族而謂他人為父母昆弟爾戚戚兄弟莫逺具爾非他人也協比其鄰豈其鄰在族哉况在爾雅內宗曰族母妻之族曰黨父可以為黨而妻與母不得謂之族也白虎議云族者湊也聚也上湊髙祖下至玄孫一家有吉百家聚合生相愛死相哀故謂九族斯亦悉其由矣嗟乎罪人以族此虐王之末政也堯親舜敘惟病施之不博然亦有畔止矣是故桀紂雖苛族止一宗秦襄以來立三族法張晏之徒猶以為父母兄弟妻子若莊子之言五紀袁紹之言五宗匡衡玄成所言五屬不過父祖已與子孫莊子言六位老氏班志賈誼言六親不韋言六戚亦不過父母兄弟夫婦故貫髙曰人豈不容愛其父母妻子哉今吾三族皆以論死則非異姓斷可識矣奈何刻者濫誅無藝一人犯罪禁至三屬此章帝之所為惜而如淳者猶以為父母妻之族亦大妄矣漢誅黥布不及蚡也玄之駁之亦可謂明也矣異姓之服不過於緦緦不廢昏而士昏禮言惟是三族之不虞恐其廢昏則亦父己子之昆弟而已大功惟不嫁娶妻黨豈妨於婚送哉七廟天子七廟三昭三穆與太祖之廟而七七廟之中必有功者為太祖有德者為太宗此百世不遷者也後繼之君昭穆序位至其親盡則以祧去祧去之宗為毁廟之主四時祭之至祫而後得合食於太祖之廟祧廟無數若周家惟后稷為始祖文武二主有功德於民者為不遷之宗此一祖二宗也漢儒滋蔓遂以謂逺廟為祧有二桃焉享嘗乃止去祧為壇去壇為墠墠壇有禱焉祭之無禱乃止去墠為鬼蓋以壇墠二祧足其為七斯亦罔矣夫宗廟之制雖親盡之主猶當藏之於祧何以壇墠為是暴之也此蓋因於金縢周公為三壇同墠為禱之文而以為祧廟皆當然爾或曰周之文武為不祧之廟自是以下皆迭毁降去之此亦非也廟者親事之主也祧者親盡别藏之主也入廟者為祔於出廟者為祧有祔者必有祧言祧則非廟言廟則非祧矣今乃以二祧足之為七豈理哉且既曰不毁又豈可名之曰祧廟邪堯水不禱宋大水鼓用牲於社湯大旱禱桑林大水用牲是水有禳事矣水有禱禳堯胡為而不禳大旱致禱是旱有禱賽矣旱有禱水胡為而不禱曰水之有潦猶人之有水蠱也嵗之有旱猶人之有疸疾也疸疾水蠱人之奇疹潦災旱熯亦天地之大疹也疸疾水蠱非善誦之可蠲非禳禱之可免大水大旱豈善誦善禱之可移哉堯舜神聖委其然也是故不易政不致禱惟命伯禹益稷治之而已是蠱之必用醫疸之必以藥也伯禹益稷從而治之百川順流此亦天地之蠱疸而獲夫良工之起之也然則湯之致禱豈知不足於聖人歟亦示教也身有疾有不可不為善親有疾有不可不盡誠赤子冒疾藥之弗至抑坐視而弗軫乎抑將走羣祀而幸其功之一見乎然則湯之禱宋之鼓亦所以盡其誠而已矣故湯宋之致禱以示教也堯舜之不禱而命禹以任正也榮社伐鼓其亦果能益乎桑林者社也社為隂鼓用聲也聲為陽伐鼓於社以陽而起隂有是言也雖然桑林之舉將七年而後禱乎禱七年而後應乎七年而後禱民事不已緩乎禱七年而後應其報不亦晚乎吾固曰湯宋之禱以示教也堯任正也由智者觀之思過半矣星次説費直書十二篇以易卦配地域蔡雍月令章句以節氣當國分及皇甫謐作帝王紀復以月律配入辰次言之而事益支矣按蔡雍之説豕韋之次立春驚蟄居之衛之分野以至元枵小寒大寒居之為齊之分若謐之説星紀之次於辰為申謂之赤奮若於律黃鍾斗建在子吳越分野以至析木於辰為寅謂之攝提格於律應鍾斗建在亥燕之分野此班鄭之説也鄭氏律説黃鍾子之氣十一月建而辰在星紀應鍾亥之氣十月所建而辰在析木班固歷志娵訾之初危十六度為立春中營室十四度為驚蟄元枵之初婺女八度小寒中而危初為大寒二子蓋原乎此夫星紀東北而吳越實東南降婁娵訾戍亥之位而魯位實在東北齊表東海而星且北秦處西垂而次乃南故或以古受封之日嵗星所在為説武王克商嵗在鶉火伶州鳩云嵗之所在我周之分野則周屬鶉火故自栁九度至張十二度鶉火之次為周之分晉文即位嵗受實沈董因所云實沈之虛晉人是君則晉屬實沈故自畢十二度至井十五度實沈之次當晉之分自張十七至軫十一鶉尾楚分故魯襄二十八年嵗淫元枵禆竈知楚子之死謂嵗棄其次以害鳥帑周楚惡之則鳥尾為楚矣自氐五至虛九大火宋分故魯昭十七年星見火辰􅎚慎知宋鄭之火謂宋大辰之虛皆火房也則大火為宋矣然春秋戰國地每遷變三晉未分晉果何分秦拔西河魏當何屬周既東西何都而直鶉火陳滅於楚何自而入韓分前封後據又豈得如康成之所謂同時而當星次哉况乃中邦幾何三千以去夷蠻戎狄外更綿邈詳觀諸書蓋亦支離而未嘗究也按甄曜書次三十度度三千里以古九州方三千里果如所説九州才當天分一度之廣九夷八蠻五戎六狄豈日星不臨哉古之國邑不過百里何常而得專次况古萬國周千八百又豈皆無受封之日而獨此十二國得當之乎七國之初天下雌燕雄魏韓魏趙地動亘數郡厥後魏徙大梁則西河合於東井秦拔宜陽而上黨入於輿鬼豈趙魏之地歸秦而遂屬秦之星乎秦乃周也不曰周而以東洛為周唐都京兆二郡既入畿內而説者尚謂秦分則是國易而地不易也吳楚齊晉春秋之末廣土所至一時配入而不知疆域雜亂之不可要也夫風俗之所以異以廣谷大川之異制也州郡雖改山川不移閩浙五嶺本自兩越荆揚徐梁正爾三楚亦何得以是制哉此一行所以惟取七宿之中唐僧一行認山河脈絡於兩界識雲漢升沈於四維分四象之中位自上元之首以度為紀據山河以分其野然亦未之盡也茍以封日則有絶而復續者或以姬而繼子封日既異前人又非而前星且不變邪禹貢無言保章之説惟不得而執也雖然豕韋禍蔡大梁凶楚元枵見飢乎宋鄭星紀定占于吳越永嘉中嵗白熒惑聚牛女間時謂吳越當有興王未幾是嵗元帝登極故史臣謂星斗是祥苻堅會謀南冦石越對以嵗鎮斗牛福德所在而苻融亦以吳越為不可伐蓋有不可誣者嵗之所在為福所衝為災故師曠梓慎禆竈有得而言天道在西北而晉不害在越而吳不利皆以嵗言之也龍宋鄭之星宋大辰之次陳太昊之虛鄭祝融之虛皆火屬也然衛顓頊之居則水屬矣吳越同分而史墨以為越得嵗吳不應伐是又不可曉者昭公七年四月日食説者以為魯衛之惡春分之日在魯衛也十年嵗在顓頊之虛薑氏任氏實守其地則齊薛之分矣前哲之言蓋亦自有所見要不必牽乎此餘如未然要以九州之分為正唐書月令敬授人時此帝堯之急政聖人以之首書民事之為重可知矣禮有月令世皆以為出於管子不韋之書故傅子云月令取吕氏春秋至杜君卿乃以為出於管子不韋編之以為十二紀之首漢世戴聖始取以入禮記蓋以管子有幼官四時之篇然亦不知周公已有時訓而時令解見之周書此蔡氏所以謂為周公之作孟冬祈來牟則建用子矣是周正也正嵗合諸侯若諸侯之所稅非秦事也而或者猶謂周以六冕郊天以大裘玉輅大常迎氣而月令車服並依時色况乃太尉秦有則非出於周代是亦不知劉安時則之訓本之月令而亦時有增損顧得謂漢時乎常切考之特亦本之夏小正爾小正之書顧亦本之前代炎黃顓嚳一代之治斯有一代之時惟其來者甚逺是故歷代傳寶以為大訓故雖有變易而其大者猶不得而易也頃見郭京易舉正序言我唐御注孝經刪定月令以知唐室嘗改古之月令矣中見斗南於世家獲唐板五經首帙為貺其本既禮記以為先而以月令冠篇曲禮次之月令之篇則於每月分節與中氣而異言之謂吕氏定以孟春日在營室無適變通不知氣逐閏移節隨斗建洎乎月朔差異中星見殊乃令雩祀愆期水旱作沴事資革弊於是定以杓建凖攝提而刪之命集賢殿學士尚書左僕射兼右相吏部尚書李林甫門下侍郎陳希烈等為之注此即唐志御定禮記月令一卷者爰表出之以見唐世猶以民事為重云淳熙新元四之日墨莊藏書沈璧書中候握河紀云堯即政十七年仲月甲日至於稷沈璧於河青雲起回風搖落龍馬銜甲赤文緑色自河而出臨壇而止吐甲回遰甲似龜廣九尺有文言虞夏商周秦漢之事帝乃寫其文藏之東序而世紀言堯與羣臣沈璧於河乃為握河紀今中候是也王元長云握河沈璧孫氏瑞圖云帝堯即位坐河渚神龍赤色負圖而至備載山澤河海之形國土之分域玄雲篇云龍飛何婉婉鳯翔何噦噦昔在唐與虞時見青雲際此也帝舜祗德欽象有光玄云象天也治象位者也至於稷興榮光迭至黃龍負圖卷舒至水畔置舜前舜與三公大司空禹等三十人集發圖周公踐阼理政與天合志萬序咸得休氣充塞見孝經援神契藩侯陪位羣公皆就立如舜周公差應差應邪錯在後聖當受神位故近之至於日昃榮光汨河青雲浮至青龍仰玄甲臨壇止濟止圖滯青龍靈仰之使玄甲所以裹圖周公視王公視聖人精明故先視其文言周世之事五百之戒與秦漢事中候摘洛戒云若稽古周公旦欽惟皇天順踐阼即欇七年鸞鳯見蓂莢生青龍銜甲玄龍背書以上野王符瑞圗故中候又云周成王舉堯舜之禮沈璧於河白雲起而青雲浮乃有蒼龍負圖臨河然據考之亦黃帝之事爾以按野王符瑞圖云黃帝軒轅氏東巡省河過洛又沈握視將加沈璧沈握沈圭集歷並臻皆臨諸壇河龍負圖出赤文象文以授命象字象時代出握河記龍魚河圖云天授帝號黃龍負圖鱗甲光耀從河出黃帝命侍臣寫以示天下河圖又言黃帝云豫夢兩龍授圖乃齋往河洛求之有大魚泝流而至泛白圖帝跪受之而河圖挺輔佐曰黃帝持齋七日七夜天老偕從以遊河洛之書至翠媯之泉大鱸泝流而至問五聖莫見獨與天老迎之蘭葉朱文五色畢見沈白圖以授帝見兔園策又云黃帝遊於河洛之間至澤鴻之泉鱸魚負圖以授帝蘭葉朱文名曰録圖前河圖亦云黃帝遊洛水有鯉長三丈身青無鱗赤文成字故世紀言黃帝時大震三日帝遊洛水上見大魚三牲醮之天甚雨七日河流而得圖書則非止握河之説也路史卷四十三

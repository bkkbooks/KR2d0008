body:
  text: 路史卷三十三宋羅泌撰發揮二共和辨嗟乎後世之士何其不能得古人之意而惟敏於為妄邪夷王崩厲王立無道三十有七年王流於彘共和十四年宣王立右鼓作於是年司馬溫公厯年始於是歲説者曰周室無君周公召公共和王政故號之曰共和自史遷至溫公無異議也敢問所安曰豫不敢以為然也夫厲王之時周公召公非昔日之周召也周召二公時皆痿弱不足有為至宣王時始有召穆公虎而周公則無聞焉蒸民詩言仲山甫保宣王而立之説者遂執之以為周公妄矣夫仲山甫乃史記之樊穆仲春秋之樊侯國語之樊仲山甫也後屬于齊樊之與周異采各邑奚可牽合漢杜欽云仲山甫異姓之臣也無親于宣就封于齊其言明甚即非周公之後豫聞厲王之後有共伯和者修行而好賢以德和民諸侯賢之入為王官十有四年天旱廬火歸還于宗逍遙共山之首宣王乃立魯連子云共伯名和好行仁義諸侯賢之請立焉後歸於國得意共山之首莊子及呂春秋言共伯得志于共首即其人也共國伯爵和其名爾司馬彪云共伯和修行而好賢厲王之難天子曠絶諸侯知共伯賢請立為天子共伯不聽弗獲免遂即王位一十四年天下大旱舍屋焚卜于太陽兆曰厲王為祟召公乃立宣王共伯歸還于宗逍遙得意于共丘山之首故汲冢紀年及世紀云共伯和即于王位而史記亦謂共和十四年大旱火焚其屋伯和篡立故有大旱考之諸書其事章著篡立者篡繼而立後世以竊奪為篡者非矣按人表厲王後有共伯和孟康謂其入為三公蓋周室無君和以三公攝政唯其日久故有火旱之變爾十三州志云共伯後歸國逍遙得意于共山之首使其竊篡則宣王之立可能得志于共首哉共今衛之共城故漢之共縣隋曰共城有故共城在東北百步有共山傳謂至共頭者字一作䢼乃漢高帝八年封盧龍師為共侯國又非詩之恭國與叔假邑也按寰宇記云厲王流彘諸侯請奉和行天子事十四年厲王崩共伯使諸侯奉王子靖立為宣王共伯復歸于國共山在縣北十里其事益明水經注云即共和之故國共伯既歸帝政逍遙共山之上山在國北故又曰共北山是以王子朝告于諸侯猶曰厲王戾虐萬民弗忍流王于彘諸侯釋位以間王政宣王有志而後效官是宣王之前諸侯有釋位間于天子之事者矣然則所謂共和者吾以為政自共伯爾若曰周召共和吾弗信也設以二公為政謂之和可曰共和者不成語古無事亦書年無此法雖然蒸民有言天監有周生仲山甫王躬是保是必朝廷有故而後天子始保佑于山甫也由此語之和之即王位果其篡者邪曰不然也臣之保君臣之常也襄王之出子虎居守亦豈其篡也哉王子虎周之居守者事正此類詳炎帝紀下篡者後世小人下輩豺狼梟獍反道敗德者事也和之賢也蓋干王政而非其得已者也向秀郭象援古之説以為共和者周王之孫也懷道抱德食封于共厲王之難諸侯立之宣王立乃廢立之不喜廢之不怒斯則得其情矣歐陽子論曰伊尹周公共和之臣攝矣不聞商周之人謂之王此歐陽子之説也和之非篡顧亦有知之者厲王之後式朝廷之故哉吾觀聖人之書王子虎卒而益知共和之不易也或曰夫子曷不發之曰是不揄伊尹之意爾見俑而知後世之有徇覩攝而知後世之有篡聖人之特見豈俟于著而後知邪是故不語力亂懼後世見者之不一也抑嘗語之力亂不語此古者史氏之成法也下世之史不明乎聖人之意于履常蹈正者率致其略而于淫亂之等必廣記而備言之若張騫之遠使衛霍之鏖兵石虎齊昏隋煬之奢靡幽靈呂武羣后之汚穢石顯楊素李林甫之姦回卓布巢泚安祿山之階禍與夫莽丕懿裕梁全忠之漸逼每切諄復唯恐或逸蓋以淫亂之事利于騁辭而不知中人以下實衆而聞見之易于溺人也夫又安知聖人之所慮哉共工水害禹治黑弱聖人有一視同仁之心是故有兼濟夷夏之事關于之洞極曰凡命于兩間者謂之人靈蠢不齊皆人也是故聖人一視而同仁篤近而舉遠天下之大一人之身也一身之間皮毛髮爪皆吾愛也攝之不至而一手足有或偏而不舉則君子謂之不仁至于半身不遂此可謂之仁乎仁字詳首卷論太極易曰顯諸仁藏諸用鼓萬物而不與聖人同憂天地之間孰非吾物邪一人民之失其所一蟲鳥之失其情與夫一草木之遏而不遂皆吾仁之不至者也聖人莫不憂之而萬物者果能與聖人同憂哉是聖人以一心為天下而天下之物不能以其心體聖人豈不悖歟嗟乎私于己者形骸有爾汝之分私於家者樊落有比鄰之異厥裁不廣邑屋皆然一視同仁吾於禹功見之矣夫以九州攸同四隩既宅斯足以為仁矣然足以見其仁而未足以見其仁之至至於導黑弱而西戎即敘然後有以見其仁之至焉方九州之既滌九澤之既陂而九州同四隩宅則凡江河淮濟之瀰漫泛濫乎中國者舉順下流之勢而九州之赤子免於魚矣民免於魚禹之功可以已矣而又導黑又導弱禹之仁其有既乎黑弱二水塞外之橫流失其故道而為邊民之患者也今也為中國治之則決其奔突而注之塞外使不為吾民之害則已矣又奚必因塞外而決之以入於流沙南海而後已哉計弱之距流沙與夫黑之距南海皆數千里而遙然導弱必至于合黎而納餘波於流沙導黑必至于三危而入其流于南海者凡以塞外之民猶之吾民而裔國之患等夫中國之患詎可以吾民之欲安而致塞外之民于不安之域哉湯湯之患天實為此而禹見天下之溺猶已溺之是則禹之心一視夷夏不惟不以洪水之患病吾民亦不以病乎塞外之民篤近舉遠又詎肻以吾民之利而遺其害于塞外之民哉大抵蔑其私者無時不仁而私其私者無時而仁一饞而丹溪流一怒而赤原谷知有我者一毫我也又孰能仁其人而以天下為公哉漢光武在邯鄲趙璆王子林輩請決河流則赤睂之百萬衆為魚矣而光武且不答伯禹之心可得而知矣聖人之愛人何此疆爾界之殊哉禹視西戎無以異梁州之民光武視睂衆無以異漢家之衆此天地之為大也戰國之時齊趙魏皆以河為界趙魏頻山而齊卑下齊人作隄去河二十五里河水東抵齊隄則西播于趙魏于是趙魏亦為隄于河二十五里使其水東泆于齊夫為齊利則趙魏蒙其害為趙魏之利則齊蒙害違天害物真所謂以鄰為壑者也智伯曰吾乃今知水可以亡人之國觀其決汾以灌晉陽其不沒者三板厥後或決綘以灌安邑或堰肥以灌合肥咸祖其事及梁武帝作浮山堰堰淮以灌壽陽壽陽之都一皆為魚共工氏之事不過於此矣由此觀之共工之水害從可知矣隳高堙埤以亂天下其欲不亡得乎抑嘗即武帝所泥報讖之説言之囚餓臺城欲一盂蜜水不得而死此宗廟麵牲而不血食之報侯景之兵梁之宗室戕殺殆盡此堰淮以灌壽陽之報也夫能堰淮以灌井邑而乃區區以麵為牲能絶人親殺人子而獨屑屑于不籛羅綺人之不靈一至于此夫亦豈知伯禹之以四海為壑一視夷夏而不見彼此內外之分哉然則人之為仁而至於一視皆同以成兼濟夷夏之事微伯禹吾誰與歸雨粟説地獄之説無稽莊周曰六合之外聖人存而不論六合之內聖人論而不議春秋經世先王之志聖人議而不辨若子休可謂知春秋矣惟天下之變故不勝窮也天人之相與不勝變也然求其所以然者則有時而不得言或言之有時而不得信此説者之所以類推而歸之不可致詰之域而世遂以天人為相逺而不相及且以為變異之事聖所不言循致君人漫然不見所畏恣為非理而忘國恤夫亦豈知天人之相與甚密而可畏邪太虛之內大而天地細而昆蟲明而日月幽而鬼神金石沙礫人氓草木孰非一氣之形哉五藏象天六府象地是故藏病則氣色發于靣府病則欠申動于貌眼瞤有酒食燈華得錢財烏鵲噪行人至蜘蛛集而百事喜况家國之間乎逆氣成象而凶慝生順氣成象而吉祥止亦天地一指爾翼奉之言人氣內逆則感動于天地殺一孝婦何預于陰陽而天為之旱烹一虐吏何預于陰陽而天為之雨春秋之世災異變見何日無有變異之來顧若非涉于人事而人事之萌兆朕未嘗不先見於天地之間唯其德有小大而應有遠近是故或不旋踵或五六年或數十厯年而始驗聖人經世蓋難言之是以螽螟蜚􅈮麋蝝鴝鷁日食星隕星孛水冰無冰不雨雨雹霖震山崩地震廪災屋壞之類春秋悉與人事雜而志之存而不論將使智者雜而觀之則知其所自矣知其所自則凡遇變故皆得以恐懼修省期於消去斯聖人警世之大訓也比歲甲午二月二十四日晏食環城百里悉雨木實如沐莢子紅黑黃緑鮮明異色種之乃條先是二年三月雨蛤如桃梅人犁塊之間舀之滿盞盆坳所貯際曉皆亡由此觀之神農后稷之事為不誣矣况復後世五榖天降良亦不少后稷嘉榖周氏以興中山雨榖姬人以亡榖粟之零盛世常有而興亡固繫乎人故京房易逆刺謂天雨榖歲大熟而王充以為論説之家雨榖為凶在昔史皇作書固嘗雨粟而伯禹播殖嘗雨稻矣燕丹留秦天亦雨粟而光武之末還見陳留梁惠成之八年雨黍於齊而梁嗅之八年復雨於薛元康四祀玄稷降於郡國而五代之際閩天又嘗雨豆邇歲舒城且雨米矣獨神農后稷而疑之哉述異記漢宣帝時江淮飢饉雨榖三日秦魏地雨榖二千頃其桓王時金陵雨五榖民家建武三十一年陳留雨榖蔽地深黑如稗實或疑夷狄間所生棄而不食疾風飄之墜于中國故封荼語趙簡子曰翟雨穀三日虻風所飄也雨血三日鷙鳥擊于上也然變不窮固有非飄至者厯觀前載天雨之事蓋非一矣如螽宋文公三年秋雨于宋魯襄公二年雨于江明年楚滅江雨螽之説或以為飛而雨濡之或不為害自上而墜或以為飛蟲之合如雨之多又或以為雨之變四者儒之鑿也自上而下曰雨此自空降異之大者所以書如魚漢成鴻嘉四年秋信都雨魚皆長五寸李期時雨大魚于空中皆黃色又赫連鳯朔元年唐光啓二年元和十四年皆嘗雨如蝦蛤廣中雍容道常有隨雨至謂之天蝦天蛤人取鹵之不取亦化蓋亦有海中攝至者見番禺記螺蟹同上蠪科斗蟇屬鱉古云雨鱉兵喪灰紂末年六韜云紂時雨肉血灰石沙塵又梁武大同三年正月雨黃灰沙紂又簡文大寶元年雨黃沙侯景亂唐以來更多有塵紂又梁武大同元年二年雨黃塵如雪攬之盈掬土紂時墨子云雨土十日于亳又古今注元鳯三年伏候占元朔四年昭帝始元元年二年魏景明四年梁大同元年周太象二年涼州隋開皇二年京師皆有此變唐世尤多其十二見志又乾符二年雨于宣武金夏禹秦穆時皆雨于櫟陽又成王時雨咸陽襄王三年雨于晉晉惠公二年唐垂拱三年五月雨于廣州內記云天雨金鐵是謂刑餘人君殘酷好殺無辜不出一年兵起于朝碧惠成七年雨于郢見紀年鉛述異記咸陽雨金河間雨鉛故名金城漢惠世宮中雨黃金黑錫鐵此亦有然結骨國每雨收為刀劎極銛利見王會圖嘗問使者隱而不答蓋地産因暴雨淙出精利爾賈耽云國出好鐵曰迦沙輸突厥兹實也刃劒法范珠林言阿修羅雨兵仗此蓋妄説然河圖云怪目勇敢兩童天雨刀于楚之邦謂項羽春秋演孔云八政不中則天雨刀錢近世嘗有多五銖赤仄述異記王莽時宮中雨五銖錢至地為龜石紂末年雨石皆大如䗸按魯僖公十六年霣于宋五左氏以為星漢自惠盡平凡十一魏武末年鄴中雨五色石唐永徽八霣于馮翊者十八皆耀甘氏云雨石名曰天鼓所下之邦大戰華銀內記云天雨水銀是謂荆祖不出三年兵喪並起亡國失王仁壽二年宮中雨水銀花四年陜雨金銀花四十里非祥也珠玉大同中雨雜色寶珠虞寄上瑞雨頌法苑云兜率天雨摩尼珠大率成式多誕使兜率天能變化則何雨而不可者大同之間灰沙之類大似紂時使雨珠寶豈不見史然或有者理不足怪華記録瞿曇説法而天雨華占鏡言仁壽間宮中雨花如榆莢或即上金銀花果如魏武世河內雨粟述異記呂后時雨粟周秦間河南雨酸棗故以名縣草漢元時雨草葉相繆又平帝時皆為外氏擅權宋明大始四雨于行宮木唐貞元四年陳留雨十里大如指中通皆植立桂子唐垂拱四年三月天台雨桂子旬餘司馬孟詵冬官侍郎狄仁傑以聞竹蘖占鏡云雨木多風雨蘗君有咎大抵雨草木等多病死筋占云雨筋大飢骨梁惠成八年雨于赤鞞後國飢兵疫內記云是謂陽消羽毛易祅云天雨毛羽貴人出走京氏云邪人進賢人退天雨毛前樂後憂天雨羽漢武時連見之晉大始八雨于蜀皆白隋開皇六雨于京如馬尾至三尺唐神龍二年四月雨于鄮臭熙寧戊申王得臣為巴陵忽雨白毛長二三尺焚之如馬尾三管輅云天雨毛賢人逃漢志天漢大雨白氂大率多為兵役膏占鏡云雨血君殺雨膏忠輔多貪內記云天雨膏師敗雨肉將易君血晉傳云侫人祿功臣戮天雨血故紂世雨血永康元年三月雨于尉氏有聲如牛唐武德初突厥雨之三日此與三苗亂時同宋志大康七河陰雨赤雪晉雜事云二頃血之類又貞元二十一京師雨之又後齊河清二年十二月霜晝下雨血于太原易曰歸獄不解兹謂追非厥咎天雨血兹謂不親不出三年無其宗人故帝王不可以興獄膳法苑云護世城雨美膳世亦宜有肉紂滅年及漢桓晉愍時又魏世鄴地墜肉其大數丈數日臭連村邑始聞有哭聲爵錫內記雨爵錫為飢荒狀如甘露而黃絲絮內記雨絲綿絮皆兵喪績宋大明七年帛傳録絳羅宋書張仲舒在廣陵元嘉七年七月天雨絳羅箋異苑云仲舒晨起側有赤氣後雨絳羅于庭紛紛皆七八寸如箋經宿暴死杵臼釜􅀈占鏡云雨杵臼飢釜􅀈穰人龍鳥獸之類莫可殫紀董氏繁露謂聖人在上羣龍為之朝臣按靈臺祕苑云王者失道下將畔去則星畔天而隕以見其象將有兵凶則墜為鳥獸天下將亡則墜為飛蟲將大兵則墜為金鐵將水則墜為土主亡有兵則墜為草木兵起主亡則墜為沙有大喪則為龍又為人而言者善惡如其言其説則異如漢成時宮中雨蒼鹿魏世河間雨小兒九域亦云風所飄甚者至有土山武后時慶山自雨而下冰牌京房云雨冰大疫桀末年冰生于朝梁嗅王十一年齊地雨冰廣者六尺漢桓時京師雨冰張駿二年二月雨冰片如纊熱湯唐咸通八年七月下邳雨湯殺鳥獸此皆耳目之所接焉者也嗟夫先王之設教必本可信曷嘗以人之不聞不見者驅哉日月星辰昭布乎其上風火雷電交蕩乎其下此皆世之同聞而共見者也凡若是者亦有持其權者矣雖然在上者皆有常而在下者常不測蓋有常者以覺君子而不測者以涖小人兹天地之至權也雖其世有治亂而無代無小人是故平治之世變故常微衰亂之期星宿常怒而風雷之戒常不廢所以為相濟也天地聖人何嘗不以信哉今夫雷之行也必先諦覆而後仆之又必篆其事以示之其所以詔之於世者昭昭矣夫然故愚智自守而不煩於政是天之所以濟王政之不及者然也三五以還世衰道降信不足以一澆偽而機變用於是盟誓興秦漢而下盟誓又熄而後佛之教始得入於中國天下之士搰於妄福不知先王之大道與夫天人相與之意于是盡摍其藩而撤其戒曰天變不足信聖人不之言也昧昧相師遂使天地變異昭昭之理散而釋之徒得以闖其堂閫而以其耳目之所無有阿比地獄無稽之説創而入之以毆一世之人於杳杳昏昏之地而世莫之寤也豫嘗作原化傍甄地獄之詭雖同門之哲弗豫諒也於是為之究解而後信之者始一二見猶曰所患子為必然之説爾曰世之惑不解正患無必然之説也變異聖人不言春秋胡為而書之哉嗚呼亦曷不幸而弗及赤子之未病邪藥之不至達之而弗及矣雖然尚來者之可追也詩云心之憂矣其誰知之神農琴説朱襄氏之瑟伏羲氏之琴其來尚矣後世雖有作者特修而用之非有改也而三都賦補史記以為神農制瑟説文世紀隋志小史則以為神農造琴蓋修之也揚雄琴清英云昔者神農造琴以定神禁淫僻去邪欲反其天真新論琴道云其琴七絃而鄭遂洽聞記乃以為神農之琴二十五絃夫二十五絃在所未聞而七絃則世皆以為起於後世或謂周代之所增黈亦嘗發之琴書矣若古聖人凡創一事立一制必有不可易之法是故窮思極致無遠近無小大必致其三而後已固非若後世之士率意而作之者也既討于傳黃帝虞舜琴皆五絃而神農唐堯之琴其絃皆七斯其信者然則聖人之制果無意乎黃帝虞舜土紀者也土之數五故其絃皆五神農唐堯俱以火紀火之數七故其絃皆七是皆可得而稽者也五絃者琴之本制也蓋以當乎五音大絃為君小絃為臣而六七兩絃實為少宮少商故禮斗威儀云少宮主政少商主事宋衷以為聲五而已必加少宮少商者君臣任重為之設副者也二少之絃時謂文絃武絃一弛一張文武之道而世遂以二絃為文武王之所加斯大妄矣夫世固有見湘溪二女而以為娥皇女英乃舜女見别論聞周室三后而以為禹伯后稷周公君陳畢公亦稱三后謂梳起于赫胥氏蠶始于蠶叢氏蓋以胥梳聲同而蠶蟲也因妄言之二事前後事始若掀子胥之髯而續西門豹之尾者矣唐人至吳子胥廟見其像五髯長鬚為奪朱之色及鄴城西門豹祠絳袍之下垂一豹尾以二絃為文武王之所加是則方書有所謂文武火者是必以周王執㸑而後可也庸生之汲為妄如此哉鄭氏以過作則暴為失文武之意是矣嗟乎以其小者見其大者此先王觀政術也五絃七絃雖或增或損而七絃之為用詳而有本知其神農法也然則先王之矩度從可知矣兹豫所以每贊古人之制而每嘆後世之不如歟論太公正道之不明自戰國之急於功利者滑之而漢儒不能明後世不能討也太公亞聖之大賢也其仕于周也亦不茍矣孟子曰太公避紂居東海之濱聞文王作興曰盍歸乎來吾聞西伯善養老者賢者之去就可知矣而大史公乃以為漁隱于渭文王卜畋于渭之陽載與俱歸爰立為師且以為西伯昌囚羑里尚隱兹泉其臣閎夭散宜生南宮括者相與學訟于公四子于是見西伯于羑里而復相與求美女文馬白狐奇物以獻紂而脫其囚歸而與之陰謀修德以傾商政其然乎夫太公之為人果如是何耶其出處之際必有義而其致君也亦有道矣何至操切譎詭為憸人之舉哉鬼谷之午合曰昔者伊尹五就桀五就湯然後合呂尚三入商朝三就文王然後合聖賢之出處惟可知也今夫閭閻小子之愛其君必有道矣公之所學者王術而其所事者聖人也顧不若閭閻小子之愛其君者乎方紂在上播棄黎老而文王思皇多士欲盡得天下英材而用之而天下之英材亦莫不心而願為之用矣故其詩有疏附有先後而又有奔走禦侮之臣孰有天下之士歸之如此有如太公而猶伏于漁者耶且太公之漁也有意于天下乎抑無意于天下乎有意于天下當文王而不出何時而出無意于天下則雖俱載以歸猶將鑿坯而遁而又奚以師為遷之言蓋取之戰國一時辨士之説而不知決擇者也且既曰畋得之矣而又曰四子於隱所相與見西伯於羑里其相盩乃如此且君奭之言文王之修和有夏也時則有若虢叔若閎夭若泰顚散宜生南宮括曽不及于太公而孟子論五百歲聖人出則以太公望散宜生于文王為見而知之然則公之聞道實有自文王矣此武王言豫有亂臣十人而説者始以為太公在焉是太公未嘗為文王師也詩云維師尚父時維鷹揚則公之在當時特將帥之任爾劉向别録云師之尚之父之合三元以為名則非必太公也至雒師謀乃以為號師尚父則亦本諸此也夫學訟而脫人之囚與陰謀以傾人之國皆兵謀詭計出于後世所謂太公六韜書者其果信邪六韜之書顧非必太公也班固述權謀不見其書志雖有太公兵謀而乃列之道家儒家有六韜六篇則又周史所作定襄時人或曰顯王之世故崇文自謂漢世無有今觀其言蓋雜出于春秋戰國兵家之説爾自墨翟來以太公于文王為午合而孫武之徒謂之用間故權謀者每並緣以自見蓋以嘗職征伐故言兵者本之以為説騎戰之法著于武靈之伐而今書首列其説要之楚漢之際好事者之所掇豈其本哉君子于此其可不審所取而讕説之是徇耶太公舟人説伊尹庖人昔之人有負鼎以干世者人見其為鼎而不知其所以為鼎因曰庖人也然則太公負釣以干世而或謂之舟人亦宜太公望河內汲人也其為人也博聞而內智蓋亦嘗事紂矣紂之不道去而遊于諸侯退居東海之濱聞文王作興翻然起曰吾道信矣或曰傺七十餘主而不遇人皆曰狂丈夫也文王獵而得之嗟夫風雲之會不約而合豈繄俗所窺哉方公之遇文王説者謂其陰謀詭計以午合此既失之而或者因其釣合復以為之舟人漁父韓詩傳云文王舉之舟人七十二矣其果然邪夫太公于文王孟子之説最為近之始其來也蓋以釣道説爾陳以釣道豈世俗所謂漁哉迹文王畋于渭之陽也太公鉤餌手竿而蹲于茅王問焉曰子樂漁邪對曰君子樂其志小人樂其事吾漁非樂之也然則奚其餌對曰魚求于餌乃牽其緡人食于祿乃服于君故以餌取魚魚可揭以祿取人人可殺以小釣釣川而禽其魚中釣釣國則禽其萬國諸侯是以公之為釣非舟人也明矣伊尹之負鼎爼蓋亦以滋味説豈庖人哉滋味之説鹽梅之説也具之呂覽本味之篇由此語之太公之事益可知矣然則莊子謂湯以庖人籠伊尹而范睢以太公為漁父厥有由也鬼谷子云尚三就于文王然後合于文王必其知之至而後歸之而不疑豈茍合邪辭棘津西入渭其亦知文王之所以興矣知其興而來以求合其道則其所以釣釣文王者豈在魚乎雖然卜畋之事我知之矣太公之賢文王既雅知之豈又懼夫世不之知而我異故于是為之畋且卜耶胥靡之賢武丁豈不之知而必曰夢帝賚豫者武丁雖已知之而天下未之知天下未之知故不得不託之夢然則文王之不得不託之于卜也審矣知武丁之夢為非夢則知文王之卜為非卜矣武丁之夢文王之卜是或一道也夷齊子南兄弟之間天理之所在也然天下之仁義自兄弟始而不仁不義亦多自兄弟始蓋是非之相形朝夕見也有能禮遜得不為之肅矜而屢嘆歟子曰伯夷叔齊不念舊惡怨是用希又曰求仁而得仁又何怨夷齊孤竹君之二子也其父子兄弟之間豫列之詳矣二子他日義國其弟去而歸周其賢可得而知矣是以孔子每亟稱之凡有為也兹未暇細姑迹子南一事以明子貢之問而信後世學者之弗察也子南公子郢之字靈公之介子而蕢瞶之弟也蕢瞶既奔靈公遊于郊子南僕公曰豫無子將立汝不對他日又謂之對曰郢不足以辱社稷君其改圖君夫人在堂三揖在下三揖卿大夫士君命祗辱夏靈公薨夫人曰命公子郢為太子君命也對曰郢也異他子君沒於郢之手若有之郢必聞之言當以臨沒為正且亡人之子輒在乃立輒子南之德實嫓夷齊孔子居衛蓋有疑輒逆德不可為君而子南之賢可立而不立者故冉子求折於子貢而子貢舉夷齊以為問夫子以為古之賢人求仁而得仁者蓋以明其志之得也始叔齊之遜夷也固以夷長而當立也曰無兄弟之義何以為國夷以叔齊為父之所命也曰無父子之義而又何以為國爰與俱去一遜而兄弟之倫正再遜而父子之義立兄弟正父子立而君臣上下之分定可謂求仁而得仁矣故聞夷齊以遜國為仁則知夫子不為衛君而郢賢可知矣當夫人之以君命而立我承之可也而固以輒在辭此叔齊之義也使輒當時逡巡側避授之子郢以俟蕢聵之入則伯夷之舉矣而顧不知是方且嬥嬈周章固位仁人君子之忍言歟曷儒老先而猶昧此乃更以為夫子善夷齊兄弟之遜為惡蕢輒父子之爭蘇轍更取而著之伯夷之傳至謂夷齊之出父子之間必有間言者豈夫子志哉父子之爭十惡之罪首也當時諸侯固數以為譙矣是非隱奧也孰有求賜高弟不能知此而反聖人疑邪且出公之欲用夫子也子路固以政之所先為問矣子曰必正名乎何名哉直父子而已矣而君子猶以為隱後世如公羊高者果以輒之拒命為正謂其不以父命辭王父命故慕容輿輩遂至以子拒父為可嗟乎父子之間純乎天理者也豈較是非曲直所哉瞽瞍殺人竊負逃之則凡世間之事不暇顧矣今也爭國則父子之義蔑而國不可一日立矣乃復論當立不當立邪蕢瞶欲入為輒者繫鼓去位而唯父之從可也顧兵以拒之邪蕢瞶見書必以世子明當立也圍戚必書以罪輒也聖人豈為輒哉奈何謭謭徒知輒之受遜於郢夫亦豈知世子之名誓之天子而蕢瞶之出先君未嘗絶之邪雖然爭者怨矣而遜亦有怨乎曰怨出乎心而人之為遜非必無心也宋宣公魯隱公與夫韋元成劉愷丁鴻鄧彪之徒其初未必出于矯拂勉強以沽名然其心顧不能不以是為世間之美事也時以為美則有時而怨矣有心者怨之府也介推子胥沒齒不釋豈君子之為哉郢之去可謂求仁而得仁矣求仁得仁夫又何怨之有或以郢遜悔而怨者唯豫知其辭出于誠無怨也蕢奚不怨輒奚怨哉論伊尹嗚呼人之諒亦有如伊尹之大者乎君臣者天下之大義也以民而伐其主以臣而放其君二者天下之大不義也而尹且為之泰然不疑豈其忠之未諒哉義有時而不濟也今夫匹夫匹婦得一豆甌而不知所處以一介人臣起于耒耜之間而犯二難焉非有脫略萬乘芥視天下之心疇克爾唯其平日養之者至達道義之所在而能不以天下動其心故其出而制世有不可得而變者湯誓太甲此聖人之所以不廢者亦將以為萬世君人者之戒爾雖然豫不敢以為正也昔孟軻氏以仁義遊諸侯思濟斯民然其要説諸國之君必以湯武之事是其所以自處者非伊尹不為遂以是得罪于後世之學者惟其尊之者衆詆者未幾而詆之者至矣卒未得其衷也夫其言曰仲尼之徒無道桓文之事又曰管仲曽西之所不為而所言者必伊尹豫則曰仲尼之徒有道桓文管仲而無道伊尹豫非異于聖人也聖人之意則然也何則孔子之于管仲未嘗不愛之也所惡其小器者特以三歸反坫山楶藻梲之事纍大德爾至稱齊桓之功九合諸侯不以兵車則斷以為管仲之功而至以如其仁許之如其言管仲相桓公霸諸侯一匡天下民到於今受其賜微管仲吾其被髮左衽矣豈若匹夫匹婦之為諒哉其稱於管仲也蓋如此而未嘗一言以及伊尹伊尹之事不可揄也或曰論語雖不及之而書固已取之矣聖人非不稱之曰不然書者史而已有其事而可監則直著之非有議也而論語則聖人譏評折衷之書也學為君子者必于此乎取之取之此也伯夷伊尹栁下惠是皆以身制行特立乎天地之間以為人道之大經者也世固未有臣伐君者也而伊尹以為吾盡其所以為臣之道而不得其君湯者天之所命也吾不忍坐視斯民之塗炭徇人而逆天于是俯就湯而説之以伐夏救民然天下之大義惟君臣爾今以君為無道而伐之則後世亂臣賊子將羣起而效矣故伯夷不敢以武王而廢天下之大義于是叩武王而告之以伐君非忠夫存伊尹則廢人徇伯夷則逆天于是栁下惠復出而正之不羞汚君援而止之而止固盡其所以為臣之道而幸其君之能奉天而已矣故仕于定哀之間而不去曰後世必有得吾心者然子謂伯夷餓于首陽之下人到于今稱之謂栁下惠直道事人焉往而不三黜至於伊尹又未嘗有言焉蓋伯夷栁惠人之所不屑為而伊尹之事不患於無人為之知夫此則孟子之猷在所考矣雖然栁惠之行近于降志而辱身藉使其君又不可幸焉則仲之業在所進矣以其君霸而致天下于一正則已矣豈必曰如彼其卑而棘為其大哉吾見秦漢而下篡敓之等每為也果於秦漢之前則誠軻之尤也雖然軻於三子亦既俱以為聖矣至論聞風興起則亦不及于尹豈非清和者可學而任者不可學歟學清和而不至猶不免于隘不恭學任而非其志弊如何耶然則軻豈不知其弊哉嗚呼微軻之論則伊尹之志幽微吾之言則夫子之意蕪矣固不可墨也如曰若何甘處于仲之卑而弗自致于尹之高則弗病伊尹無廢立事李昱之雜説惑伊尹曰伊尹未盡善也君之不明持其顚而正救之可也黜而放之可乎太陽不明星月奮曜非星月矣大海不受江河自納非江河矣且操刀而割藏貨而集利曰不為屠賈吾不信也尹為厲階權臣逆夫假廢立以圖國竊此道爾或曰尹之得至公之稱以有三年之歸政也世有醫生善視疾者語人曰吾能易爾腸胃更爾系絡則疾可為也然人無肯致其身其難信也周旦北靣相沖子不僣天下之尊不居假王之位聖人之心不可易者同也尹縱明誠自誓懷至公于不疑一旦溘先朝露則太甲之於天下一旅人爾大事已去其如何邪羅昭諫則又曰唐虞以揖遜得天下而猶用和仲稷契以厚風俗成湯放桀而有天下揖遜已異淳朴大壞伊尹放太甲立太甲而臣下知權矣乃曰耻君不及堯舜夫尹不耻其身之不和仲稷契而耻其君之不如堯舜在致君之誠則善矣顧厲己之事如何哉二子之説如此歸愚子曰伊尹之事顧非不韙也苐君臣之義為弗順爾且以世之亂臣賊子莽丕懿裕之徒盜國柄者曷嘗不假尹以糊口兹其所以致議者之如彼也抑嘗求之攝王之事周公之所無而廢立之事伊尹之所無也周公之坐朝抱沖子而太甲之居桐宅諒陰爾蓋古者之君薨太子諒陰百官總己以聽于冡宰三年父母之喪天下之至痛也念慮一起手足俱廢是故繁務之來有不及察茍可以委而置之者悉委之矣聽於冡宰豈唯天子然哉國君亦各有攝臣以上卿為之惟痛均也滕父兄曰吾先君魯先君亦莫之行則其禮廢已久時人無能知矣太甲之書伊尹之事宜後世之弗及知也惟元祀十有二月太甲始居陰之時也百官聽於冡宰此處喪之常紀非攝也唯太甲者立而不明既乃背去師保之訓則亦戾愎自用而不可以順導矣故尹於是因其諒陰營宮于桐俾之密邇先王之室而作其憤悱之心謂之放者自內而外之言抗世子之謂爾非廢也惟三祀十二月伊尹以冕服奉嗣王歸于亳是起復之例爾非再立也始曰太甲今曰嗣王其事亦已明矣自漢羣儒以淺見眯經旨而廢立之説昌及霍光將廢昌邑告于田延年曰古有之乎對曰昔者伊尹相商廢太甲以安宗社後代稱為忠臣將軍誠能行之亦漢室之伊尹也光計遂決夫以光之不學而投之延年循俗無識之言遂使後世信以尹為果嘗擅廢立者莫之省也抑又考之太甲之三篇其上篇乃甲居憂之時中篇乃甲免喪之後而下篇則尹去位之時作者曷嘗有廢立之一言哉聖人之志蓋簡而甚備也嘗試即太甲之史觀之前有伊訓以始事矣而後復取咸有一德以終義則尹之在當時有甚不得已而無一毫之私欺見哉且以復甲也則曰唯王克終厥德實萬世無疆之休其喜之亦至矣及告歸也則又曰臣罔以寵利居成功尹之心豈將利其私哉豫固曰廢立之事伊尹之所無所可議者以舜禹君臣之義概之則有愧爾雖然尹之迹為有愧而心無愧後世為尹事者心迹俱可以唾去矣曰然則尹之事其終不可言歟曰有孟軻之志識則可無孟軻之志識則亂而已矣奚以尚黃帝輕重之法先王之制治莫仁於刑而其所以祥刑莫仁於法法者仁之寓而刑之所取中焉者也夫人之仁非人之仁也天地之仁也人之不仁非人之不仁天地之不仁也寒而給之衣飢而給之食豈能為仁哉不能不為仁也無食則使之飢無衣則致之寒豈能為不仁哉不能不為不仁也是故代天地司牧者制五刑必即天地于民之可以仁而不仁者刑之所以輔天地之不及也可以仁而不仁負天地者也不可以仁而不為不仁不受制天地者也先王之心豈不欲天下之人皆仁而為君子也奈何天下之人有不足以當吾之望以自棄于不仁而為小人之歸自棄于不仁而小人之歸夫然後不得已而待之以小人焉蓋望之以君子者先王之心而待之以小人者天下之法也一怒而天下安四罪而天下服其所以為仁亦已至矣刻膚斷領豈聖人之心哉吾故曰制治莫仁於刑刑者先王之惡石也惡石者神醫不得已而用之刑亦先王之所不得已也不得已寓之法是故法者天下之公而非先王之所得有也管叔作亂司寇致刑瞽瞍殺人士師可執又烏得以吾仁而屈法哉吾故曰其所以祥刑莫仁于法今夫殺人者誅欺君者誅此所謂法也先王豈故為是嚴哉威莫大于殺人而罪莫大于欺君也擅殺人之威而無殺人之罪敢欺其君而無欺君之誅小人何憚而不為哉是故謀殺人者坐之以殺人之罪謀欺君者與之以欺君之誅則小人何利復敢生事于國吾觀黃帝輕重之法自言能司馬不能者釁鼓自言能治里不能者釁社自言能為官不能官者劓以為門故相任寅為官重門擊柝不能者亦隨之以法其于欺君邀功之罪何其重邪雖李悝之法不是過也然輕重之法黃帝用之而天下大治李悝之法商鞅用之而秦有覆窠之禍何邪唯所附之不同與用之之有異爾吾故曰法者仁之寓而其所以不仁者人不仁也夫唯明者為能用刑唯仁者為能制法刑欲重而不欲急法欲嚴而不欲詳刑重則犯者鮮法簡則人易避以是為辟何有惡德黃帝氏之法亦此之由也而律魁大士不是之法侮文亂典動則失衷不有過急必有處息是二者雖不同而皆可以速亂幸而不亡後王繼之必有法令不行之患然後小人得以沿隙勦竊而天下亦從之矣梁統嘗言刑罰在中無取于輕刑輕之作反生大患是故殺人減死而人益犯法此初元建平之際盜賊之所以浸多而不可制歟嗚呼後之持律者亦不在涕持丹筆唯黃帝之為法哀矜勿喜而母使有臡炭凝脂割鼻飴口之悔則幸矣黃帝乘龍上升説或問荆山經龍首記黃帝服神丹已龍來迎之去羣臣追慕靡所搆思或即其几杖而廟祭之或取其衣冠而葬守之一應神仙之傳至于儒書以莫不然而夫子紀其為死豈其然邪曰有以明之昔公仲承問于程子曰人有常言黃帝之治天下也百神出而受職于明堂之庭帝乃采銅首山作大罏焉鑄神鼎于山上鼎成羣龍下迎乘彼白雲至于帝鄉羣小臣不得上升攀龍之胡力顫而絶帝之弓裘墜焉于是百姓奉之以長號故名其弓曰烏號而藏其衣冠于橋陵信有之乎程子曰否甚矣世之好譎怪也聖人與人同類也類同則形同形同則氣同氣同則智識同矣類異則形異形異則氣異氣異則智識異矣人之所以相君長者類也相使者形也相管攝者氣也相維持者智識也人之異于龍龍之異于鼎鼎之異于雲言之辨也曷足以相感召而帝使之邪此其必不然也甚矣世之好譎怪也吾聞之太古之聖人所以範世訓俗有直言者有曲言者直言者直以情貢也曲言者假以指喻也言之致曲則其傳也久傳久而詭偽則智者正之訛甚而殽亂則智者止之黃帝之治天下其精微之感蕩上浮而下沉故為百神之宗為百神之宗則是百神受職于庭矣帝乃采銅者錬剛質也登彼首山者就高明也作為罏火者鼓陽化也神鼎者熟物之器也上水而下火二氣升降以相濟中和之實也羣龍者衆陽之器也雲龍屬也帝鄉者靈臺之關而心術之變此之謂所類也形也氣也智識也雖與人同然而每上也成成而每上則其精微之所徹達神明之所之適其去人也逺矣羣小臣智識之不及者攀龍之胡有見于下也不得上升無見于上也有見于下無見于上者士也上下無見者民也弓裘衣冠帝所以善世制俗之具也民無見也懷其所以治我者而已故于帝之逝也號以決其慕藏以奉其傳此假以指喻之言也而人且亟傳之以相詆欺甚矣世之好譎怪也千世之後必有世主好高而慕大以久生輕舉為慕羡者其左右狡詐希寵之臣又從而逢之是甘心黃帝之所為矣夫生而少壯轉而衰老轉而死亡此人之大常聖凡之所共上帝之所弗幸免焉者也且自古記之傳若存若亡大庭中皇赫胥尊盧以來聖人者不一族誠恐大圓之上嶢榭聫纍雖數千百有不足處而復何主宰何臣使而猶昏昏默默以至于今乎此不然之甚者也然世之人智者歆羡愚者矜跋而不已甚矣世之好譎怪也夫周之九鼎大禹所以圖神姦也黃帝之鑄一禹之鑄九其造為者同而所以之適焉者異是可以決疑矣歸愚子曰無見于下衆人之所同有見于上聖人之所獨首山之銅豫不敢伸誠恐遊方之士文從而引之以歸于天庭至寶之言故言之不可易也如此論槃瓠之妄有自辰沅來者云盧溪縣之西百八十里有武山焉其崇千仭遙望山半石洞鏬啓一石貌狗人立乎其傍是所謂槃瓠者今縣之西南三十有槃瓠祠棟宇宏壯信之天下有竒迹也豫曰是黃閔武陵記所志者然實誕也記云山半石室可容數萬人中有石牀槃瓠行迹今山窟前石獸石羊竒迹尤多辰州圖經云隍石窟如三間屋一石狗形蠻俗云槃瓠之像今其中種有四一曰七村歸明户起居飲食類省民但左祍二曰施溪武源歸明蠻人三曰山􅀈四曰犵獠雖自為區别而衣服趍向大略相似土俗以歲七月二十五日種類四集扶老攜幼宿于廟下五日祠以牛彘酒鮺椎鼓踏歌謂之樣樣蠻語祭也云容萬人循俗之妄樣當用養曰然則所謂槃瓠者非歟曰非也何以言之豫稽夏后氏之書知之也伯益經云卞明生白犬是為蠻人之祖卞明黃帝氏之曽孫也白犬者乃其子之名蓋若後世之烏菟犬子豹奴虎豚云者非狗犬也雖然世之誕妄厥有形影其言之不典亦實自于經也按經又言卞明生白犬白犬有二自相牝牡郭氏以為自相配合蓋若今之婆羅門半釋迦者鳥有曰鵸􅀈曰􅀈􅀈者一身之間自為牝牡半釋迦者其種有五有具男女二體者有半月為女者皆偏氣所孕而應劭書遂以為高辛氏之犬名曰槃瓠妻帝之女乃生六男六女自相夫婦是為南蠻則知其説原衍于此是殆以白犬為龎爾至郭璞張華于寶范曄李延壽梁載言樂史等各自著書枝葉其説人以喜聽而事遂實矣且其説曰高辛氏募有得犬戎吳將軍首者黃金千鎰邑萬家妻以少女杜君卿固疑其誕謂黃金古以斤計至秦始曰鎰一也三代分土漢始分人古安得萬家之封二也將軍周末之官三也吳姓宜周始有四也佑之難亦當矣又引其獄中與諸甥書證之然不知其説之不出乎曄也伯岐同吳權之妻而羿之友有吳賀不可謂吳姓至周始有謂夷狄古無姓可也伯益為百蟲將軍玄女立五軍之將不可謂將軍周末之官謂夷狄古無官號可也其説本出應氏書夫人畜之交通世蓋每有昔元嘉中孟慧度之婢蠻與犬通處者且逾年然高辛之事常竊誕之慧度吳興人事具宋書志等槃瓠者特􅀈狐之轉爾犬尾大按玄中記槃瓠浮之東南海中是為犬封氏蓋因本風俗通然亦不謂蠻人之祖記云高辛時犬戎為亂帝曰有討之者妻以美女封三百户帝之狗曰槃瓠七三月而殺犬戎以其首來帝以女妻之不可教訓浮之會稽東有海中得地三百里封之生男為狗女為美人是為犬封氏玄中之書崇文總目不知撰人名氏然書傳所引皆云郭氏玄中記而山海經注狗封氏事與記所言一同知為景純曰然則盧溪之祠君武山之像何彰邪曰見石西俯則以為為惠逺點頭見石東僂則以為為秦皇赴海木石之象物厥類多矣偶然喚作木居士豈特一槃瓠而已邪不然犬戎國之神哉經亦有云犬戎國有犬戎神人靣而獸身非蠻人之祖也路史卷三十三

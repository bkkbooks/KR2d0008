body:
  text: 路史卷八宋羅泌撰前紀八禪通紀尊盧氏尊盧氏董氏錢書有尊盧氏幣其文作以夏商幣考之知為尊盧幣也是為宗盧宗尊古通用故賈逵以宗盟為尊盟榖梁以伯宗為伯尊其立政也官天地府萬物革天下之故惟以幣行遂人而降帝世者皆立貨幣以通有無史皇而下君人者咸與封禪以昭受命今惟著代有其迹者尊盧之幣蓋以代别或疑此為黃帝幣者蓋以葛盧之山發而出金黃帝取以制幣以通百貨也然幣舉一字而合為山名不應如此之異無所甚親無所甚疏抱德揚和以順天下而世用寧焉治九十餘載位嵹臺之陽葬浮肺山之隂即今藍田山其西尊盧氏冡存焉亦見後魏風土記及長安志等山一名覆車郭緣之云如覆車次有女媧谷一名玉山寰宇記女媧氏陵亦在此知兹地為三皇舊居後有尊氏尊盧氏樽氏見纂要文世紀尊盧後為混沌昊英有巢朱襄世本以尊盧在伏羲後應劭風俗通則因班表之序乃謂為太昊之世侯者姓纂等從之非也班氏蓋失其世而妄著之于後爾自余季甫志學遾通三經且待且業未嘗終日三商不屬意于是史也訪博士適異書訊旅人求金石之遺豫是有益雖奴客必師不知祈寒溽暑之為毒于衡湘得雲陽之從于廣都得盤古之祀于馮翊得史皇之墓于藍田得尊盧之埰于衡山得祝融之􅀢于長安得隂康之冢于肺山得華胥之封于黃龍得女媧之碣于荼水得炎帝之陵于蛾眉得黃帝之欵于雍得帝鴻之坌于雲陽得少昊之堬于成陽得慶都之𥮚于大山得有虞之文于陳倉得娥盲之殔于商於得女英之壟于杼山得夏后之銘一何多邪獨怪劉子政説湯無葬處而崔駰薛瓚俱云濟隂亳縣今有湯冢皇覽云在亳城北郭東三里髙七尺韓嬰所謂帝乙墓者何謂無邪按伏韜北征記博望城內有湯伊尹及箕子冢今悉成丘而杜征南亦云梁國蒙縣北薄伐城中有湯冢其西有伊尹箕子冢今城內有故冢方城宜其為是而記乃稱王子喬墓亳之湯冢己氏之伊尹冢顔籀亦固疑之爰求徴地則又别有湯冢漢建平元年大司空史御長卿按録水災行湯冢者于漢𨽻扶風地有湯池徵陌何謂無邪然湯之都亳與葛比似亦不在兹土及考秦寧公本紀二年伐湯三年與亳戰亳王奔戎遂滅湯則知周穆桓之時别自有湯亦號亳王為秦所滅乃西戎之君葬于徵者而非成湯之墓繼觀聖賢成冢記則湯之冢後魏天賜中已圯矣銘言二千年困于恩其明器悉為河東張恩􅬆之于河是知成湯之窆久矣無沒至是已不復存子政之言為不茍矣於戲太古尊盧祝融隂康華胥之陵尚猶厯厯可知如此而成湯之臧不壽獨何歟良可嘆也祝誦氏祝誦氏庸誦古通用一作頌故禮庸鐘容磬及漢書為容皆作頌有以也一曰祝和見金樓子等是為祝融氏祝斷也化而裁之之謂陸佃解月令説云木發而榮之金辱而收之火祝而融之水玄而𡨕之蓋融而熱之火也白虎通云祝屬也融續也能屬續三王之道行之也未有耆谷無所造作師于廣壽以育其德道書以為即老子説見餘論刑罰未施而民勸化三綱正九疇序是以天下洽和萬物咸若梁武祠堂畫像碑云祝誦氏無所造為未有嗜欲刑罰未施六韜云赫胥氏尊盧氏祝融氏此古之王者也未使民民化之未賞民民勸之皆古之善為政者也于是聽弇州之鳴鳥以為樂歌作樂屬續以通倫類諧神明而和人聲是以耳目聰明血氣和平而壽令長移風易俗天下大治則歌樂為之節文也古非帝王不作樂孝經五行鉤命決云伏羲氏有立基神農氏有丁謀祝融氏有祝續祝本多作屬見白虎通義及諸樂緯其義通也以火施化號赤帝淮南子云南方之極自北方之界至炎風之野赤帝祝融之所司祝融亦號赤帝也故後世火官因以為謂祝融氏號也祝融職也本非人名黎為祝融回為祝融皆職都于會故鄭為祝融之墟會即鄶也其地後為鄭詩譜云溱水在鄶祝融之墟至周重黎之後處之為鄶國春秋有鄶城其地在溱洧間今新鄭東北三十里有古鄶城是也上古帝王之都為之墟爽鳩氏人臣故齊止言建國其治百年葬衡山之陽是以謂祝融峯也衡山記云祝融託其隂非也今祝融峯下有舜觀南有祝融冢楚靈時山崩冢毁得營丘九頭圖焉荆州記云衡山之南有南正重黎墓故思玄賦有俯衡阿睹有黎圯墳之語然張盛二子皆以為黎則不然矣今其祠廟記咸以謂髙辛之臣且髙辛時黎為祝融黎死吳回代之而黃帝時庸光亦為祝融何得指為黎哉且少昊四叔咸無葬處何獨于黎有墓此又漢儒臆説也後有祝氏融氏祝宗氏祝和氏見姓苑等書白虎羣儒通義以祝融為三皇宋𠂻論三皇亦數祝融而出黃帝梁武帝祠畫像述先伏羲氏次祝誦氏次神農氏乃及黃帝顓帝蓋有所本豈得云帝嚳之臣哉洪丞相云先儒説三皇不一太史公采大戴禮遷少昊而不録又經傳顓帝之後黎為祝融惟莊子以祝融氏與伏羲神農赫胥同辭白虎通既依史記遂以羲農祝融為三皇至論五行則又以祝融為南方之神初非通論此梁碑以祝融為祝誦而介于羲農之間白虎之説也贊曰伊古祝融人萌揄樂刑賞未施何所造作弇州之聲庸致樂歌樂希屬續是為祝和以諧人神以通倫類順火開祥肇稱炎帝承師育德三綱以平萬物自若天衢總清為治而至于樂然後可以為僃矣樂者治之至也夫人之生天地同體莫不有神明之性湛然中足不自外入一蔽于物則浸淫畔肆滑喪其天以至窮人之欲而不能反其性命之朔何哉有血氣心知之性而哀樂喜怒之無常五綦六鑿壞之于外無以為之節也是以先王因其性之所自有索其天和而作為之節以樂其所自生而反其朔樂者人之節而性之所自有者也其感人也深其化人也著金石絲竹無自鳴之聲也羽旄干戚無自動之容也藏之于無出之于虛必有所緣者矣聲嗟氣嘆此天籟之自鳴者也手舞足蹈此天機之自動者也具之于心作之于氣必有所寓者矣人藏其心不可測度而憂喜忿鬱感發于外者有不可得而抑是故聖人南面而治天下本之于心律小大之稱比終始之序作樂以應天深入教化于民循數以召之因器以迎之而樂之倫合德矣隨之以節義達之以事業起居視聽事親從兄凡所以行而樂之者一不外是夫然故至和日以積而乖爭之念消至順日以積而拂戾之氣泯五官七體畢順其正而君臣父子兄弟夫婦長幼朋友莫不相和而不相倍詩以志之書以著之易以通之禮以體之春秋以守之本末相從五者􅍯道故得隂陽序次聲動氣隨而物􅍯而樂成矣情深而文明德盛而化神􅀢蜳旁魄渢渢驛驛而庶物之露生天地之德産莫不誘然皆作動蕩血脈流通精神浹于骨髓之間而固其肌膚之會鼓舞品彚陶冶姓族而不自知故中聲發越而塞于天地之間郊焉而天神格廟焉而人鬼享凡以出乎素有之和中聲自至而然也中聲者一性之和而與天地八方之氣相為流通者也人為之主而情為之本律為之用而器為之居六間六始所以為之用金石絲竹陶匏革木則所以為之居也升歌下管貴人聲也歌鐘在左歌磬在右人聲之佽也而五聲以為之侑宫肩信而侟意徵肩禮而侟神龣肩仁而侟魂商肩義而侟魄羽肩智而侟志宫𢎞以舒徵貶以疾龣防而約商散而明羽展而虛變宫生徴變徵生商變商生羽變羽生龣變龣生宫而五音之氣協矣五音協而五運之氣平五緯之行正黃鐘以生之中正以平之而四六之氣得矣黃鐘者律之本而中正者厯之源也在律為聲在厯為氣以故律歷同起冬至聲生于三始而歷原于三統以故黃鐘之律本于三寸三吕之為三十有六三律之為四十有二而黃鐘之本立矣六始為律六間為吕律凖乾吕凖坤是故六陽乘位而始于復六隂乘位而始于垢隂成于坤陽成于乾乾卦已而位亥坤位申而卦亥亥者乾坤之交隂之極而陽之所繇始也引于申該于亥是故亥為陽月水之位也人之孩草之荄皆自始矣乾為大赤坤為大黑赤入黑以成玄玄中生白造化出焉孩于亥根于艮而三白之化寓矣赤黑配于乾而三白生乾坤嫓于亥而三統出是故樂由陽來而水化律有五聲十二律之變既而六十卦之合得六十卦之合得而十日十二辰之數制矣因而六之當期之日致矣氣不頓進律無獨成奏黃鐘歌大吕奏大簇歌應鐘以合聲也聽樂均權土灰度晷景候鐘律以諧氣也聲合而後神示之降出可期氣諧而後隂陽之進退可效相生相化輕者黈之重者溓之畸者我之訛者削之而五運六氣九宫四治之難去矣體用相權彌綸布㨭于以退乎不正之氣而召乎不及之氣是故春宫秋律而百卉凋冬宫夏律而雷發聲宫動龣而寒谷春生徵動羽而霜雹夏苓猶寓之造化而取之也聲生于日律生于辰日紀六甲辰紀五子八卦納甲而土日通焉五子居律而八卦隱焉是故以聲召氣以律定歷取八方之全聲而寓之八方之全器于以察天地之和命乖别之妖而敵情之勝負馬步之多少悉未逆而知之同聲相應物之情也是故殺氣并而音尚宫武王徯紂之必敗南風委而死聲至師曠必楚之無功七六之絲合而八卦之氣成四寸之管來而八方之風至充之者足以移民風而化民俗聞之者有以考其德而知其治英莖弗得弗諧雲咸弗得弗和淵韶弗得弗備濩武弗得弗古探五行之妙用竭萬物之英華著其素而直其情以之節事而治容徹志之孛解心之繆去德之素達道之塞是以陽不究而隂不密剛氣不怒柔氣不懾在內者皆玉色在外者皆金聲貌正而氣得氣得而肌安肌安而色齊色齊而天下化空窽之窒厝胃之伏關鬲之擬渾涵氷結之處隨其元而充之無細微之不入七始既定九奏具成至于鳥獸之聲猶悉關于樂律大昭小鳴四時迭起而協氣薰蒸嘉生殖祉地紀天瑞諸福之物皆不約而自至若方諸之水圓鐆之火緣類而生有不期然而然者又豈復吹斂衍鬱振窕竭怒之患哉祝誦氏之屬續朱襄氏之來隂隂康氏之來和伏羲氏之立基神農氏之扶犂黃帝氏之雲門少昊氏之九淵髙陽氏之承雲髙辛氏之六厲堯之章舜之招禹之夏是皆得天地之中以發人之抑道人之伏達人之慧而為政之平則凡以得乎人聲之和而已故清龣一奏而鳯凰翳日簫韶九成而百獸率舞其事然也三五以降醇澆而偽璞散而器而人始狙詐與物敵矣天地之元時至之氣始離次而不安其所矣其所謂樂不過留意鐘鼓巢産之聲綴兆疾徐之文紀鏗鏘著節奏俶詭殊瑰為彌文煩飾而已簸邏鏜􅀈進俯退俯欲其召和氣而致柔嘉服人心而固壽命是為齊謳而希楚和吳歈而幾越應不已難矣下逮列國曹奢魏𥚹陳汰唐憂無足言者桑間濮上流連荒亡之音作而君驕而政散民流官壞而不可繫止煩等淫聲慆心闉耳而哀痛生之春秋之際干戈日尋魂為燕氛魄化魏土而凄怨之聲入于匏管輕生敗倫賊君棄父而變逆之音出于金石三綱淪六紀墜遁情傷化惟不能當于天心是以祅沴災眚百疾俱起而鼓師三飯寄遁河海至不可以為國千鍾作大吕鑄而內益亂新聲興巫音起而君愈卑志惟焦殺求其所謂一唱而三嘆何可得邪漢魏而來情文俱泯人狃辭狎而聲匪純懿匏不成列舞不像成陳鄭聲于楓庭升胡部于堂上迎神帶邉曲宫案次熊羆而房中之樂則惟恐淫哇之不聞變態之不新也不中其聲名器隨變既聲有餘于數則更從而分之求五音而不得則益之以二變合十二律而不協則載之以四清立四通制留尺倚歌梵唄婁羅悅般而風雅進矣夫以五日四分日之一不之減六日八十分之七不可裁而六十之卦未嘗增也二變不得而應聲增四清不合而子聲起七五音而八律吕豈本爾邪是則雖有黃鐘大吕之聲商龣徵羽之器以旋宫則不得其變以迎氣則不得其平中聲何自而得哉中聲失則律無當律無當則樂不比樂不比則情文俱泯情文既泯而旋宫之制迎氣之律其能以獨正乎是使後世議者見先王之所以為樂古猶今也陶匏革竹之器摶拊戞擊之用古猶今也其所謂八風十二律未必不與人齊而其所謂麟鳯龜龍其去人也逺矣于是始疑先王之事為是夸言蓋不知理之宜然而無足怪者夫有恢蕩之音者有榮懷之慶有和平之聲者有蕃殖之財淫厲而哀萬寶常所以知隋之不久宫出不反王令言所以卜煬之無回宫離不屬商亂而暴而子憲識明皇之播宫不召商龣與徵戾而嗣真明章懷之廢王仁裕耳黃鐘有爭鬭之事裴知古聆廟樂當慶賜之行發于其聲害于其政有不可而泯者是故龍舟五更之聲作而國不可遊胡戎無愁之曲作而君不可留除愛水斷苦輪之歌奮而臺城沒打沙鑼振銅鈸之伎進而屈茨恤故樂也者天地之合也其形變者心亦隨其志變者聲亦絶發于􅳩芴應于遐逖雖聖人不能抑也亡國戮民非無樂也而不樂其樂蓋出之中者不得其寓而道之外者不得其所也趨數傲辟煩戾濫溺此亂國之所好而哀姓之所樂也故孔子曰君子之音象生育之氣憂愁之感不加乎心暴戾之動不存乎體此治安之風也小人之音象殺伐之氣中和之感不載于心溫柔之動不存乎體此亂世之風也治世之君以道勝欲故其音安以樂雅頌之作政其有不和乎亂世之君以欲忘道故其音怨以怒鄭衛之作政其有不乖乎世異異音音異異政然則亡國之君眩惑轉易刑政紛糾豈惟哀以思哉而其民亦困矣故君子之聽聲不徒鏗鏘節奏而已亦必有合成已之志也天地之間溫乎其和者無非樂也而得之者異取夷則之羽不興嘉慶之門黃鐘之宫不作庶人之室是故必有盛德斯有備聲必有大功斯可制樂此先王之所恃以籞也故有樂備制矣而德薄功小有不足以作者豈惟不足樂哉魯莊公國小鐘大而曹劌方請圖之齊桓公謀以大鐘而鮑叔且以為過况不有功者乎方晉侯之如宋也享以桑林晉侯懼而退入于房至著雍而病卜之祟在桑林及平公登施夷之臺欲作清龣師曠以為黃帝所作今君德薄不足以作之瞑臣請辭公弗聽作之飄瀑總至發屋亂豆平公恐伏晉國大旱夫清龣非固能變而桑林非固真能祟也蓋先王所以持禮樂之分者甚急而不可亂故其衰也邦君諸侯一越用之則魄奪氣裭而不能以自止也故曰樂也者始于懼懼故崇次之以怠怠故遁卒之于惑惑故愚愚故道道可載而與之俱矣癃病之生赤地之變將非恐懼之所致邪故樂之足恃也如此夫國有飢主不飱國有凍君不裘有九年之稸而後天子食備味日舉以樂諸侯食珍不失鐘鼓之懸是故草木未若則不煩鐘鼓之聲文德未敷則不必干羽之容鐘鼓干羽固飾和之具爾彼杜詵之所言張文收之所請唐太宗每折而不許者亦以謂百姓安樂則金石自暢樂在人和有不在乎聲也何後之世不明乎此乃復膠意于區區之纍黍以祈中乎和氣不已􅀈乎夫絲固不足以制聲而黍固不足以稽律也久矣㽔賓下生大吕八八左旋終于中吕此班固之所本也應鐘聲下大吕十律而反髙一均此失不紀清濁之變也其曰黃鐘未必果非大吕也其曰應鐘未必果非無射也蕭條者形之君而寂寞者音之主也繩凖無所施而平直之運無所逃此不共之術也五音無所比而二十五絃以聲應此不傳之道也遊心乎衆虛之間而與物為際者父不能以詔其子放乎事物形氣之表而形乎絃者兄不能以喻其弟三如干之銅三如干之炭同時鼓之鑄三黃鐘聲不同也而况尖圓肥瘦之不等者乎故不神解默理而恃器數以為正祗以惑也以至崇寧之初魏漢津制指尺于是上悼黍之非度謀以聲而定律而典樂之臣莫能以也夫以神瞽定律必考中聲亦不過因其自然而道之豈河內無真葭而上黨無真黍哉髙山流水固不在乎絃爾雖然天之自髙地之自厚日月之自明神不易也黃帝伯禹沖正所合是故律度出而幽顯遂若以齊緯隨廣叔寶之徒度之固不能損荒陋而廣正之也鳯鳴岡衆鳥從鶴在隂其子和夫物固有有其方而智巧果敢不足以相賓有其情而皮毛色澤不足以相使者必也以仁為恩使天下無不親以義為理使天下無不宜殘虐暴橫不見乎其上憂愁忿鬱不作乎其下黃沙息送元戎偃伯而士農工商無或失所然後本之性情稽之度數修五府和三事以為之理合生氣之和道五常之行取仁義道德之端而倡之平淡恬愈之韻布揮而不泄幽昏而無聲以為之用應之以人順之以天內以正其志外以達其情廣不容姦狹不留欲而邪汚淫辟之氣無自而接上以著泰始下以善民心異文而合愛窮本而知變故考之于文則文足論而不諰發之于均則均足樂而不流聽斯喜喜斯暢暢斯達達斯反莫不鮮然窹犂然契舍其故而趣于新君子以益厚小人以無悔而治道達矣舉鼎移梁樂以邪鄃春耕秋穫休以聆缶是故諸侯勤治息以鐘鼓卿大夫卷治息以竽瑟馬駕而不稅弓張而不弛固非有血氣者之所能也聖王豈固不為樂哉兩君相見揖讓而入門入門而懸興揖讓而升堂升堂而樂闋入門金作以示情也升歌清廟以示德也下管象武以示事也故君子不必親相與言也以禮樂示之而已重華聆鐘石而傳夏伊贄在樂音而歸亳朱干玉戚夏籥序興豈徒樂而已邪韶用于齊八佾舞于家庭世之人無或非之是徒見聲音節奏之可樂而已至孔子則不忍見而聞之是蓋不徇其情不喪其心知其德之不有而作之不以禮也雍者天子之所以享元侯也相為辟公天子穆穆奚為而起三家之堂諸侯僭天子大夫僭諸侯其已久矣設兩觀乘大路朱干設鍚冕而大武八佾以舞大夏宫懸而祭白牲此天子之禮子家駒之所以告也而昭公不知乃曰吾何僭然則臣下化之而動于惡何尤乎故禮也者樂之大本也豢豕為醴非以賈禍也而獄訟以繁化蠶為祫非以為奪也而鉗􅎂益衆是故鐘鼓誠設籩豆有踐而百拜之不至則寧酸而不飲十獻之不至則寧乾而不品酒酣耳熱拔劍擊柱安知天子之尊蹻腳弄目筋斗祼逐夫又安知名教之樂邪當此之時而樂幾禍矣是故君子窮其起謹其示哀樂之分必以禮終教訓正俗必以禮成必禮先備而後樂之文得而舉故禮者挈裘領詘五指而頓之順者不勝數也禮作乎外而生乎內者也樂作乎內而動乎外者也禮以治外則見而知樂以反內則聞而知見而知者觀而化聞而知者感而化故禮樂者觀感之術而不可以偏廢也禮交動乎上樂交作乎下而觀感之道得矣禮極中樂極和中和之本率于吾心非假它求也亡國戮民惟于吾心之所同然者不致察而後外此身以求禮樂而禮樂益逺矣故曰化不時則不生男女無辨則亂成化不時為無樂也男女無辨為無禮也夏殷之禮吾能言之而樂不及禮具而樂存也鯉趨過庭訊以學禮而樂不告樂必夫自得也顔子為邦終之韶舞虞帝教胄先之典樂非無詩禮也立于禮則成于樂矣樂需禮而立禮非樂不成是故興世則禮樂之形實而人因器以達本世不足以明道則禮樂之用為虛文而人不足以化其上偏禮恃樂傷天地損人民所以悖理而害政者至矣王德不下通民欲不上達而欲人之興讓務本國富家給是濁源而求清流雖十舜不能矣故曰節怒莫若樂節樂莫若禮是何有司請定法筆則筆削則削而至于禮樂則云不敢是敢于法殺人而不敢于禮樂惠人也必以俎豆管籥之間小不備絶而不事是去小不備而就大不備也此漢之禮樂之所以為可恨而張奮之所以自歎鬱可不懼乎路史卷八

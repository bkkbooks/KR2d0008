body:
  text: 路史卷三十六宋羅泌撰發揮五堯舜禹非諡辨學者必自見不有所見而唯一隅以求經天下之通患也夷益棄契皆名也而夷棄獨以官稱稷棄益稷虞伯后稷司徒皆官也而契洎益何為以名著耶古之人要不為是拘也名分之際要不可亂非此則唯取其辭之順而已書曰咨伯謂宗伯也即秩宗爾伯爵也亦非字周五十以伯仲豫述路史既推堯舜禹之為名矣復以放勳重華文命為之名學者疑焉謂放勳重華文命昔之人或以為名而堯及舜禹在昔俱以為諡鮮有以為名者曰否皆名也諡不出於古書傳雖云諡出黃帝然實出於周公何以言之豫觀夏商帝王皆非諡法知之也夏世帝王猶以名紀至商始以甲乙為號故湯名履而號天乙外丙沃丁大庚小甲皆别有名世不知也世本云湯名天乙妄矣唯湯名履而又曰舉世不知也説張晏顔師古等以為禹湯皆字亦非特商國中一邑名爾故潛夫論商後有湯户今相之湯隂古北隂之地昔秦伐湯是也曰成湯者猶成周然死諡周道也古者生無爵死無諡故始皇之制曰朕聞太古有號無諡中古有號死而以行為諡是以秦秀謂昔周公弔二季之陵遲哀大道之不行於是作諡以紀其終非古有之而榖梁子亦曰武王崩周公制諡法大行受大名小行受小名所以懲惡而勸善也世有諡法輒悉文致堯舜禹湯桀紂之類而羼入之蓋始於白虎羣儒斯最荒唐者也夫堯舜禹之為名固自章也堯曰咨汝舜舜曰咨汝禹汝棄汝契是果名也若以為諡則棄契垂益夔龍一皆為諡而後可有鰥在下曰虞舜是豈鰥而在下已有諡乎彼則又曰此後世之追志斯亦罔矣夫書之於名分法最嚴密世莫稽也方舜未嗣每書以舜蓋未始一稱帝逮其既立則唯書帝而弗復書以舜此則上古記史之法如是抑豈先諡而後帝乎按舜典未受禪命則惟稱舜其稱帝者皆堯也及文祖之後始稱以帝唯首咨四嶽一稱舜蓋方求代之初所以别於堯爾且舜典所稱帝皆為堯三謨所稱帝皆為舜亦宜審取昔魏周欣謂魏君曰吾所賢者堯舜而堯舜名是古未嘗以為諡也然則其説謬於漢儒可知矣雖然堯舜禹之為名其受命於尊者而放勳重華之與文命則其號謂之名人之所以名之者也放勳者極功也推而放之無所至極者也重華者繼明也紹堯之後唯有光華而文命則特文德之命若贊舜之格苖者是也孟子曰放勳乃徂落放勳曰勞之來之屈原曰嗟重華之不可忤就重華而陳辭而書中候亦曰文命德盛俊乂在官而朱草生夫考古之迹必求古之無意於言者推之屈孟之書此無意之言而又出於秦漢之前者也然則史記大戴世本不為無所本矣王肅淺陋其家語全取大戴禮五帝德惟去其放勳重華文命與赤帝為炎帝之語且易其秋乘龍與教熊羆為猛獸之説特未達厥指爾説者又曰放勳重華第言其德乃若文命而以為之號名則敷於四海者為何事邪以類言之則允迪當為臯陶之號而下文亦不相侔斯又謬矣夫禹臯兩謨其文正異其云大禹謨曰者此敘書者之曰也云若稽古大禹曰文命者此史官之曰而秪承於帝曰者乃禹言也蓋所謂敷於四海者敷土也禹既敷土而後敬承於帝而言之也是故禹謨首三曰而用各異臯謨則不然其云臯陶曰允迪厥德者是直臯陶之言爾故禹復之曰俞斯可質矣惟協於帝者舜之德而敷于四海者禹之德然也猶曰其名如是其德亦如是若劉寬之寬班固之固申屠剛之能剛謝安之能安皆名象其德也若以是為不侔則重華之下尤不侔矣正不可若是其拘也舜禹帝者故世有號以尊其名臯陶人臣自不應有兹益可知大抵陋儒敢於為妄章句之學雖不可泥然亦有不可考夫經指之久晦正以章句之不明也鄭少梅云放勳重華文命史官以此稱堯舜禹之功德後世因史有是稱遂以為之號如子貢稱孔子天縱將聖後世因謂孔子為將聖然允迪不可為臯陶之號故不可以為稱程子云放勳猶言仲尼或曰夫子云或曰孟子為信則謀蓋都君皇父謐既以為舜之字矣奚為廢之則又非也揚雄韓愈李翺既有辨蓋都鄙之君云爾一徙成市再徙成都都之有君自昔然也雄翺云都鄙之都愈云張以都為于非也君于都爾抑又論之名以制義以義則堯遜也舜運也禹舉也名有五以德命為義斯之謂矣堯遜也本只作壵從三士後下加凡云壘土而髙非也舜轉也變也從中中戾拚轉之意後加厺奕字赫盛貌故敻華蔓蘩蓐槿華翩反皆有舜名禹舉也從宄九禹􅀢也外柔而強禺卨同意若夔龍類古人名多有此廣雅云堯曉也鄭禮記云舜充也篇云禹舒也是亦一義翼善傳聖曰堯仁聖盛明曰舜受禪成功曰禹後世影意之論各詳紀注嗟乎堯舜禹之名一無所隱而人之所以言之亦唯如此而已後世從文制為號諡緣天以誄之曰文曰武斯已矣至唐天皇事不師古於是始取祖宗號諡而悉變之天寶之後加增重復遂至繁不可紀是則以為過三聖邪夫祖宗之功德果足以超世歟則唯曰放勳曰重華一二言已足矣茍無其實是厚誣之而誘後世之訕毁也故孝子仁孫之欲顯其親則莫若使名副其實曷聞以號諡繁多之為貴哉莊生曰夫海不辭東流大之至也聖人并包天地澤及天下而不知其誰氏是故生無爵沒無諡實不聚名不立此之謂大人豫以是益知堯舜禹之非諡而後之學士指言堯舜禹者其為不遜昧去就甚矣論諡法書蘇洵諡法古之法行于今者唯諡行然二千餘年而靡有定法大戴氏曰昔周公旦太公望相嗣王以制諡法周書之説亦然故今周書有諡法一篇頗為簡要至杜預取而納之釋例而世遂重出之謂春秋諡法蓋不知也異時有廣諡者沈約賀琛皆嘗本之約又撰著諡例事頗該備而琛之書特少去取且復強為君臣婦女之别亦無取焉太宗皇帝爰命扈蒙裁著新書然而亦莫究明太平興國八年八月詔增周公諡法五十五字美諡七十一字為百字平諡七字為二十惡諡十七字為三十仍令翰林學士承旨扈蒙中書舍人王祐同詳定蒙等奏廣增五十五字皆可用沈約賀琛續廣諡請廢不行蘇洵于是究定古今斷以書傳刋其重復以為法雖其或得或違時亦有合聖人之意唯其必欲以堯舜禹湯等入諡而謂其法起於三皇五帝之時則大繆矣夫諡者原其號者也其不出於周公之前豫嘗論之彼號近古而好牽合者無過漢儒而漢儒亦自謂堯舜禹湯不入諡法則其説可槩見矣且在周書初無堯舜禹湯桀紂之文至預而後增之以湯益無所據商之太宗中宗髙宗本非諡法特以其一時功行推而崇之爾乃若甲丙庚壬乙辛丁癸何由而為諡哉若古論諡為法最簡故賈山云古聖作諡不過三四十世而蔡雍之書才四十六然猶不見世本大戴之所載者洵乃以為二書雍無不見見則無不載矣周書之篇乃周公之法而春秋之諡乃出於此今洵反謂周公者為最繁雜而春秋者為簡而不亂又謂周書諡法以鄙野而不傳則知三書洵亦未嘗見也按洵書云匹夫之有諡始東漢之隱者婦人之有諡始景王之穆后夫婦人之典周三母其著者也而穆王之盛姬亦有哀淑人之諡見于穆天子傳匹夫之典夷齊其著者也而齊之黔婁已諡曰康見于髙士傳二者其來久矣比楊侃為職林書謂公主之有諡自唐之唐安始乃不知世祖之平陽昭文公主與齊髙帝之女義興憲公主諡也雍之言漢母無諡至明帝始建光烈之稱於是請正和熹之號而乃不知元帝之母許恭忠而髙帝之母媪已有昭靈之號又何邪五年二月甲午日昭靈夫人五月辛未日昭靈后見之後書紀論雍不考見而獨于和熹以為當然豈禮也哉婦人無外行者也是故生也姓配其國沒也諡從其夫明有屬也秦嬴鄧曼陳媯燕姞以姓配國者也秦穆姬宋共姬魯文嬴與夫共宣莊之三薑此以諡從其夫者也唯死先夫則異其諡景之穆后桓之文薑莊之哀薑之類是也後死而殊諡抑何典邪今不知考而更請正和熹光烈之稱豈先王之典哉嗟夫禮不下庶人而諡者非下之所造也顔閔至德不聞有諡而蔡暉子穆輒正加以貞宣及穆之死雍復以文忠被之穆則廢典雍亦不知禮邪其貽譏於荀爽而見誚於張璠也宜矣抑嘗言之諡者正先王之所謂名教也然古之諡為名教而後世之諡也為辱典東漢莎車以蠻夷而膺茂典此何為邪然則雍之違禮豈唯雍之罪哉德又下衰其流及於藝術與緇黃矣名器之失孰甚于此顧不謂辱典耶九錫備物霸者之盛禮臣瓚大宗伯以九命正邦國之位九命者一受職再受服三受位四受器五賜則六賜官七賜國八作牧而九作伯也王制制三公一命衮有加則賜夫三公八命更加一命則服衮龍與王者之服同矣春秋書錫命者三此侯伯之命公羊以為加衮服者非左氏説為命圭使執以朝晉羊玄云圭者諸侯朝覲所執成公八年乃錫則三年如晉何執哉是知命者策書教令也然覲禮諸侯奉策服加命書其上而文侯之命亦有秬鬯之類則命者所以將之爾非専教令也故子思子曰王季以九命作伯而文王因之記有九錫蓋九命之外有加賜者或以為九命者非也鄭司農許異義以九命與九錫為一蓋以禮言人子三賜不及車馬而九錫有車馬遂以為三命受位則賜車馬不知九錫車馬牧伯有功始賜宗伯八命作牧注侯伯德者加命得専征傳晉文侯受賜皆九命之外故康成知與九錫不同在春秋説以車馬大輅一玄牡二駟衣服衮冕赤舄副之樂器軒垂六朱户彤其扉納階納入也鑿堂對陛入為小階虎賁三百夫虎賁三十可也云三百者蓋因牧誓有此文譏之鈇鉞各一弓矢彤弓一矢百玈弓十矢千秬鬯一卣圭瓉副之為之九錫後世不能改張華記同亦見禮含文嘉禮外傳以朱户在虎賁下韓詩外傳以虎賁第三樂器第四朱户第六弓矢第七鈇鉞第八榖梁傳亦以七弓矢八鈇鉞非是皆後世遷就之説若昔先王以德詔爵以功制祿其功大者其祿厚其德盛者其禮豐叔旦有夾輔之勳師望有鷹揚之烈是故並啓土宇并受備物宣王中興召虎是資是故釐以圭瓉告於文人皆所以表元勳異賢哲也彤弓之詩天子之所以錫有功諸侯者也平王有犬戎之難文侯是保是以有弓矢秬鬯圭瓉之錫爰及襄王楚人不供而文公是賴是以有輅服虎賁弓矢秬鬯之錫出於曠典俱匪常秩暨漢武帝詔議不舉者罪議者乃謂古者諸侯貢士一適謂之好德再適謂之賢賢三適謂之有功乃加九錫而應氏遂以九錫天子制度尊之故事錫豫但數少爾臣瓉乃云九錫備物霸者之盛禮齊桓晉文且不能備今三進賢而輒授之此殆不然當只受進賢之一錫爾台竊求之議者之説蓋出于虞夏傳其為説曰有功天子一賜車服弓矢再賜秬鬯三賜虎賁百人曰命諸侯命諸侯者鄰國有臣弒其君孽賊其宗者弗請于天子征之而歸其地于天子可也一不適謂之過再不適謂之敖三不適謂之誣誣則黜之一黜少以爵再黜少以地三黜而爵地畢此之是矣禮賜弓矢然後征賜鈇鉞然後殺賜圭瓉然後為鬯未賜圭瓉則資鬯于天子未賜弓矢則不得専征未賜鈇鉞則不敢専殺大傳云諸侯賜以車服弓矢者得以祭不得専征者以兵屬于得専征之國不得専殺者以獄屬于得専殺之國不得賜鬯者資鬯于天子之國然後祭此晉文公所以執衛侯則歸之京師也平王錫晉而書紀文侯之命者聖人于此見征伐自諸侯出錫也者賜也上公九命數已崇極勳業更茂蔑以加矣是故制之褒錫以寵綏之車馬以代其勞衣服以章其德樂器以頤其神納陛以節其升虎賁以衛其軀朱户以表其居鈇鉞以重其威弓矢以資其權圭瓉以廣其孝蓋有之矣其數比之九命所以尊有功崇有德也宗均禮含文嘉注云進退有節行步有度賜以車馬以代其步言成文章行成法則賜以衣服以表其德周旋可觀動作有禮賜之納陛以佚其體長于教訓內懷至仁賜之樂則以化其民居處修理閨房不媟賜之朱户以明其别勇猛徑疾執誼堅強賜之虎賁以備非常抗揚威武志在宿衛賜以鈇鉞使得専殺內懷仁德執義不傾賜以弓矢使得専征親睦九族慈孝父母賜以秬鬯以祀先祖其義蓋有備矣然書傳亦自有異禮外傳云車馬以適逺代勞衣服以飾體象德樂器以和情朱户以表飾納陛以升降鈇鉞以飾威虎賁以禦衛弓矢以征伐秬鬯以享宗廟然事於經無有明文厥自後世顧亦多有受其典者而大率非家事是以劉頌梗趙倫之事云漢之錫魏與夫魏之錫晉俱非可以通行周勃誅諸吕而尊孝文霍光廢昌邑而奉宣帝悉無是舉亂舊典習權變非先王之制也九錫之議竊謂無所施之文若固惜於曹操安石祕吝於桓溫是皆深達國體者也通典一衣服二朱户三納陛四輿馬五樂則六武賁之士七鈇鉞八弓矢九秬鬯此本之公羊説非也又云大國不過于九次國七小國五尤非公羊説一加服餘同瓚駁漢儒之議當矣世莫知其誰氏蓋薛瓉云崇文書目及漢書序考皆不知為誰氏或云于瓉史記索隱以為傅瓉皆非乃薛瓚也瓉有集注漢書極博通云巽禪非求為異聖人之事一不幸而庸儒以為美談重不幸而姦人搴以藉口堯為天下七十載其明于憂患世故可謂悉矣見丹朱之不肖不可以為天下于是謀賢而巽之巽于四嶽四嶽不受然後明揚側陋始得舜而庇位焉舜之來也堯蓋不勝其喜也嬪以二女賔于四門置之百揆納于大麓凡可以試其更變而應世者索為之矣方是時堯非固難之也天下重器授之不得而輕也及夫典職數載績用既成于是舉天下而付之其付之也特不異于寄器其鄰顔色不變又非其易之也得其人則不得而不授也昔之試今之授皆堯之所不得已也夫以四嶽之賢付之以天下皆能以朝諸侯而不斷以豫之以四嶽之親首膺巽命皆可以承重器而亦斷不自受乃皆屬之四海在下之一窮人然則重華之登舉而付之堯何心於其間哉嚚訟嫚遊天方廢之堯顧能違之乎特亦不過行所無事在賢豫賢在子豫子唯天所命而已矣夫天之所豫豈偶然哉必其有德見于天下者也天之所廢亦豈偶然哉必其有罪見于天下者也是故君薨而世子生且猶不廢以世子為不得罪于天下也不可豫而豫與可豫而不豫俱廢命也黃帝而來皆豫其子而武王不以豫周公然則堯舜豈求為異也邪借使朱足以授天下吾知其不以授之舜使其時而不得舜吾亦知其必不授朱也舜之授禹亦若是而已矣至于後世不求其故見爭傾之患作而堯舜之道愈隆則以為有所矯為乃諄諄以為説而詭特之行行矣中材之主循其名而昧其致不知德之不足事之獲已而額額行之反道飾情以冀一時之名幾何而不亂邪吳季札廢遺言而立王僚亂者四世宋宣公舍與夷而立穆公亂者三世隱桓之胥賊之噲之失國可以監矣是皆樂為堯舜之禪而不知其所以禪之所致也宋襄公將遜目夷目夷不聽鄭穆公將遜去疾去疾不聽及楚昭欲遜公子閭而子閭亦不之聽後皆無亂是三子者非貪于名而為辭也非惡其富而不為也誠知一避之為重而國為輕也使三子者從而利之則亦頻此亂矣蓋嘗言之虛靜者可以集事而無欲者唯可為君世有得道之士能化黃金丹砂一鋝成金一鋝成白鑞一斤得金四兩及耄求其人而授之寓其神於風監者數十載矣其所閲者幾千人矣莫豫叶也一旦得無欲者然後誓而授之不得其人則寧沒而不授何也懼其黷貨妄作而將及禍失吾知人之監也夫以燒金之術而受之者必無欲而欲之者必不得而受則巽禪之事從可知矣是故巽以天下非難也得其人之為難以天下巽非貴也合于義之為貴堯舜之事豈求于異而可為哉德又下衰亂臣賊子盜竊名器乃至矯飾詐偽致惡聲於聖人曹丕之攘漢也登壇而顯言曰堯舜之事吾知之矣爰詆孟軻荀况以為不通禪代之變而自比于媯汭納漢二女明勒麗石其襲偽業姦以傖囊天下非唯無恥乃有源流復以盜賊之行加之聖人何聖人之不幸邪嗚呼世無聖人使堯舜之道不尊為此曹玷褻者庸儒之罪也昔姚萇固嘗令尹偉馳説苻堅求為堯舜之事矣堅且持之曰姚萇叛賊奈何擬之聖人夫以苻堅一介妄人猶知守此顧儒名而反惑之邪或曰若子之誨則巽禪之事其不可行歟曰否不然也禪者聖人之事也自非得乎聖人則亂不止也堯為父舜為子則巽禪為可行矣台嘗十復風雷之事感世之賢君尚慕美談多以禪而召亂而亂臣賊子售其姦者交援此以自蔽恐世之君子因以禪為德也勉為之道辨帝堯冡明舜禹事古今之事緒無窮而地理之差尤為難於究竟堯之冡在濟隂成陽堯母靈臺在南漢章帝元和二年使奉大牢祠堯于成陽靈臺是其處也今皆在濮之雷澤東南元和郡縣志堯母廟縣東南四里堯陵縣西三里堯即位至永嘉三年二千七百二十一年紀載于碑正觀十一年禁樵採春秋奠酹而王充乃云葬崇山墨子則謂北教八狄道死南已之市而葬蛩山之隂蓋儀墓爾論衡曰堯葬冀州或云葬崇山儀墓如漢世逺郡園陵與蒼梧舜墓之類非實葬所山海經云堯葬狄山之陽酈善長以為非亦此類按歐陽文忠公集古録言靈臺碑以為史記地志水經諸書皆無堯母葬處粵稽地志及范曄志則云成陽有堯冡靈臺而此碑云堯母葬兹欲人莫知名曰靈臺又郭緣之述征記成陽城東南九里有堯陵陵東有中山夫人祠在城南二里蓋堯妃也東南六里有慶都冡上有祠廟而水經注言成陽城西二里有堯陵陵南一里有慶都陵于城為西南稱曰靈臺鄉曰崇仁邑號修義其葬處明白若此惡得云無言邪然述征記在成陽東而今之所識乃在成陽西北四十里榖林則古今疆埸相出入有不同者郭氏所記乃小成陽小成陽在成陽西北五十里𨽻于河南有山曰成陽榖林在其下髙誘注吕春秋云成陽山下有榖林是小成陽以山得名乃堯葬所在有堯之故名焉即庸俗所謂囚堯城者鄄城東北五里有堯城竹書紀年以為堯之末年德衰為舜所囚在是演義囚堯城在相之湯陰又濮陽有偃朱城在鄄城西北十五里竹書謂舜既囚堯偃塞丹朱于此使不得見寰宇記以載言所録不欲去蘇鶚謂是丹朱息沐之所非塞之瑣語云舜放堯于平陽而山海經放勳之子為帝丹朱故劉知幾疑舜既廢堯仍立其子俄又奪之而又謂任昉記朝歌有獄基為禹囚虞舜之宫竹書而謂讓國為虛語荒矣抑嘗訂之蓋其遁位之後作遊于此此宵人所以得迹其近似而誣焉漢志堯作遊成陽遊都也蓋武王之牧宫漢祖之沛宫周禮所謂國遊者三齊略云廣固南有堯山巡狩之所登者頂有堯祠豈其所囚哉何以龜之莊周之書極天下之譎者也其讓王之説至有堯不慈舜不孝等語而未嘗有篡竊之一言使差有之周肯不言哉韓非戰國之從橫自賈者也其説疑曰姦人之事其君其諷一而語同世主説其言而不之辨則姦人愈反而説之曰古之明王非長幼弱也皆聚族逼土而求其利也因曰舜逼堯禹逼舜而自顯其名也田成子宋子罕皆是物也嗟乎以韓非之輩猶能破其説于處士橫議之時而今之學士乃不能毆其惑于聖哲清明之代可謂智乎因三思之是蓋魏晉之事而竹書又出於魏晉之間則其當時逢君之臣為主分謗而附益之不言而諭爰復偵之燕之慕容盛晉之傖囊姦義者也嘗稱商之太甲而以伊尹事同夷羿郎敷之徒雖能初與之較而終以屈聽更譽其言之當而今竹書果有伊尹放太甲太甲潛出殺伊尹之言乃知逼于一時雷同詭隨謂白為黑者衆矣韓非子之説甚明蓋戰國仲時已有此妄竹書紀年云壬即位居亳其卿士伊尹仲壬崩而立太甲伊尹放太甲于桐乃自立伊尹即位太甲三年太甲潛出自桐殺伊尹乃立其子伊陟伊奮命復其父之田宅而中分之夫太甲之事見于尚書孟子此為可信故左氏曰伊尹放太甲而相之卒無怨色兹足明矣杜預猶以竹書而疑伏生之昏妄况知幾者按書太甲三年已復政乃陳戒而作咸有一德伊尹沒太甲子沃丁葬之復命咎單訓尹事作沃丁伊陟相太戊作咸乂烏有甲立其子與七年太甲出殺之事髙宗亦云先正保衡作我先王又曰格于皇天爾尚明保豫罔畀阿衡専美有商皆賢之之辭也夫以後王極誦休烈如此何有如是之妄説哉此太宗皇帝所以稱其特立而謂疑義之不可訓也夫治古之事曲引而説之何不可哉知幾之妄泌請得以佐其説而盡破之毋俾世迷得以引戈而議其後伯禹曰毋若丹朱朋淫于家用殄厥世豫創若是而史記亦曰朱絶厥世托此附會則知幾之説牢矣鄉使知幾援此自證則將遂信之乎我無是也夫殄世者不繼世以有天下也豈絶滅云乎哉方堯之遁位也將遜之語先聞于嶽薦之前而使嗣之誠已見于側微之日及其出也然後女于畎畝試以百為如慈親之育其子含飴䙔葆由小以髙大豈若凶殘鬼類愒日玩嵗處髙據勢怙寵冒權而為逼邪舜之事官也以之徽典則必使其從以之賔門則必使其穆逮其底績然後致自大麓格于文祖若蒲輪而赴京緩轡取程自邇而之逺非若輕狷少年不召自至衝尹突蹕蹶坑墜塹而後息也雖然犬豚鳬鴈之徒智不足以知聖人汚自昔然矣先聖垂教不俾世疑堯舜之事二典自備顧學者自昧之舜之聰明堯實聞之及將使嗣位時尚在側微何有逼挾之事且舜之未舉也堯先以其事咨于四嶽四嶽不受然後舉舜則是未得舜之時堯已有巽禪之意足見堯心本不為舜而巽也知此則知聖人已知天下後世之有妄學而必存其始末稍疑者不以之垂世矣而文忠公之跋亦何足邪謂俗本多作城陽獨此碑為成陽夫成陽與城陽正自二所成𨽻濟隂乃古之成昔成王封母弟于成後遷於成之陽遂曰成陽十道志引左傳衛師入郕即成也寰宇記并史記武王封季載于成之陽漢於此置雷澤縣而城陽乃漢齊悼惠之子章所食之國今之兖州是矣不得為一也趙明誠黃伯思洪丞相皆有説其云廷尉某姓名磨滅據漢廷尉仲定碑云遷廷尉卿託病乞歸修堯靈臺黃屋三十餘而靈臺碑言濟隂太守成陽令各遣大掾輔仲君則知為仲定矣至言漢受濡期則又以為不知何語此蓋指言漢氏承秦之水運而已夫君子恥一物之不知而病聖賢之失世而公以為久逺難明之事不知不害為君子君子博學而反約今也畫論舜不出黃帝道有所謂經亦有所謂權法有所謂正亦有所謂義經與正者常也權與義尤不得而廢焉舜之有天下受之堯也受之于堯于是祖堯之祖而不自致其祖方其攝也受終文祖文祖者堯之太祖也及其立也則復格于文祖皆不自致其祖而祖堯之祖以其受之堯也權也虞書曰祖考來格夫所謂考者瞽目之叟而祖者叟之父非可易也然則祖顓頊者特推其位之所自傳者祖之非祖也其宗堯也亦唯推本帝業之所從受而取之以為配也義也禘于員丘黃帝非虞氏在廟之帝也郊於國之陽帝嚳非虞氏在廟之主也由是言之顓頊豈虞氏之祖哉顓頊傳之帝嚳嚳傳之摯傳之堯是知堯亦祖顓頊矣然則堯舜之所祖為傳位者信也降及夏后天下為家于是而始祖其祖矣祖其祖常也故康成云有虞氏尚德其禘郊祖宗之人配用有德而已皆非虞氏之親也自夏而後稍以其姓代之郊鯀是也是鄭亦以舜為不出髙陽矣然云尚德是不知權與義之説也蘇軾亦云受天下于人必告其人之所從受者虞祖顓頊而宗堯則神宗當為堯而文祖當為顓頊帝嚳舜禹之受天下也及堯舜之存而受命于其祖宗矣至有天下從而宗祖之謖以是知顓頊帝堯為虞氏明堂禘郊之祖幕而宗洎瞽則祖宗于廟蓋自幕以來微在匹庶等禮亦無得而豫大祀祖宗于廟禮亦冝之此記禮者所以唯識其禘郊之祖宗而遺其幕與瞽于其禮之盛者著之是經權之説也抑固考之舜非顓頊之後有數驗史云自窮蟬以來微在庶人夫窮蟬既云帝子何得未幾微為匹庶一也男女辨姓禮之大司而綴食之禮雖百世而婚姻不通舜既堯之五世從玄孫豈得御堯之女况以玄孫而尚髙祖姑昭穆失當無是若者二也夫源流之最可考者唯氏姓也故昔者帝王之姓各有所循非賜不改少昊青陽髙陽玄囂髙辛之姓皆纍世不易唯舜之姓非先王之姓三也且以所言舜為堯之從孫禹乃舜之從祖堯授天下于從孫舜受天下于從祖自其家人烏得謂之至公而能以天下豫人哉顓頊之傳帝嚳何以不謂之傳賢不降之授帝扃何以不謂之巽位商周漢唐若此者亦衆矣胡得獨稱堯舜乎唯堯能以至公之天下授之異姓在下之鰥夫故得為傳賢之帝唯舜能以所受之天下傳之外姓有功之賢臣故得稱巽位之君四也八元八凱堯帝固多用之然不云堯舉者以其親也至舜則非其親而能用故于是美其能舉五也舜茍堯親非大相逺也顧豈不知而必資夫嶽薦然後舉之歷試諸難如此之艱而後授之若曰出于側微則舜之德聞非若顓頊之出若水帝嚳之出江水特出而授之蓋堯以為非所當授而授之則天下必將駭其為者故必歷試使攝及我存而俾之為政逮夫厭世而天下已安之矣是以堯假舜立而朝不易位國不更制天下晏然與鄉無以異者此其必不然六也是皆經傳明證顯驗可得信者或曰禆竈之言陳水族也故昔史趙謂陳為顓頊之族是則舜為水帝後矣曰不然此假類之言也竈知陳之將作而假類以驗之爾舜土屬也豈有近舍舜土而逺攀顓帝之水哉且昔帝王之裔多矣孰有與其所承之類終同者邪楚先火正故火為楚然吳回之父其王木也曷又舍祖而依宗哉此皆賢哲有以知之宜不可以考世者雖然隋之崔仲方亦嘗申史趙之説謂天時人事隨當滅陳陳既滅于隨矣然陳之必毁隨之必興亦人事之必然者也若曰楚隨火屬則自古以來水必克火曷嘗有火克水邪且陳承土隨火且猶生之己酉土嵗而顧反為殃乎其不由此明矣泌以是知子羔子所以有虞夏禘郊祖宗或乃異代之問而孔子有召伯甘棠之答不獨為子羔發也舜不幸以孝名井廩事孝道之難言久矣公西之養親若朋友處曽參之養親若對嚴主參之矜矜固不如損油油也父兄不淑孝悌乃章竒有吉參有晳而後孝之名始著龍逢比干忠著後世桀紂惡也伯夷后稷忠曀當日堯舜賢也忠臣不顯聖君之代孝子豈聞慈父之家哉舜之大孝此舜帝之不幸也韓忠獻言古者聖帝明王為不少矣而獨舜稱大孝豈其餘盡不孝哉父母慈而子孝此事之常不足道也昔者齊景公問於晏子曰忠臣之事其君如之何對曰有難不死出亡不送公曰列地以處之疏爵以榮之難不死亡不送可謂忠乎對曰言而見用終身無難臣奚死焉諫而見聽終身不亡臣奚送焉言不用而難死之是妄死也諫不聽而亡送之是偽送也故忠臣者能盡善於君不能與陷於禍死事而立忠不為全矣是故大賢寡可書之節衰亂見易名之行世不危亂竒行不見主不悖惑忠節不立父兄必慈良則孝悌之名無所見矣帝舜不幸而以孝名後世豈其所欲哉自孟軻氏唱井廪之事而列女傳首著鳥工龍工之説且以為瞽叟速舜飲二女與藥浴汪豕往終日不醉而史記亦有匿空旁出之語故史通子非之謂使如是特左慈之為羊劉根之入壁者豈拘羑厄陳之事而栁粲且辨之謂聖人受命必有天祐髙帝匿井脫項羽之追光武乘氷免王郎之逐或飛鳥或詐言人謀天算世固有其傳矣抑嘗訊之親之於子既惡之而無道殺之可也又何井廪完浚之迂哉豈凶人之為不善亦猶有所愛歟晉獻公之欲殺申生也計誠決矣然且數年而先戮其傅則無道之心雖父子間有不得以直肆者聖人之事固可理考而不可以迹求也夫堯之所以舉舜者正以其父頑母嚚象傲而獨能諧以孝俾不格於姦爾既不格姦則瞽叟已底豫矣叟既底豫則井廪之事何自而舉乎凡此一皆未試用之前也逮其試用則有二女百官而奉之又何躬為井廪之事乎哉妻帝女備百官其貴勢亦大矣象縱不仁可得施其志乎兹皆坦然可理曉者抑何至遃遃如萬子之云哉程氏訓井廪謂孟子方明象憂亦憂象喜亦喜而不暇井廪是非之辨斯亦黨矣夫軻固曰奚為不知則是以為有是事矣雖然匪軻志也唯兹臣庶汝其於豫治舜告臯陶語也鬱陶乎思君顔厚爾忸怩五子戒太康語也而牽合之以為舜象之言此漢人之蔽也昔者孫盛録曹公平素之語而裴少期且譏之以其全作夫差亡國之辭也言以春秋事殊乖越然則規前羼後代有之矣奚獨於此而疑之哉且渠乞伏儒雅並之元封拓跋宇文德音同乎正始偽修混沌何代無有不弔昊天節南山也不憗遺一老俾守我王十月之交也嬛嬛在疚閔豫小子也而乃以為讄孔之辭哀公顧亦集詩言而讄之乎故曰稱豫一人非名也變仲言父非字諡也盡信書不如無書信矣大麓説孰謂説經之誤其祻小哉大麓之事自孔安國以為大録萬機之政而桓談新論以為麓者領録天下之事若今之尚書然蓋自漢以來有是説矣是以章帝置太傅録尚書事而魏晉而下權臣之將奪者一以命之肇亂於此嗟乎六經之不明漢儒害之也唐虞之際內有百揆四嶽外有州牧侯伯執事之臣無踰於百揆矣豈復有領録之長職哉録尚書事自東漢牟融始宋百官志云成帝初王鳳録尚書事章懷注肅宗紀云武帝初以張子孺領尚書事録尚書事由此始誤也西京無録尚書止有領尚書平尚書事王鳳止領尚書事爾夫所謂納于大麓者歷試諸難之謂而其所謂烈風雷雨弗迷者是天有烈風雷雨而舜弗迷爾陰陽之和則風柔而雨順今也風烈而雷且雨非大動威則陰陽之不和者也乃更以為陰陽和風雨時邪聖人之立言無若是也云大録萬機之政故陰陽和諧烈風雷雨各以其應而不迷錯愆伏此孔鮒所記以為孔子答宰我之言安國附會之非聖人意也夫以納麓為領録烈風為陰陽和不迷為不愆易春秋論語無此類也風之烈雷而雨豈得謂和且時哉竊以太史公之記觀之謂不然矣其言堯使舜入山林川澤暴風雷雨舜行不迷而王充亦謂堯使舜入大麓之野虎狼不搏蝮蛇不噬逢烈風疾雨而行不迷惑其與劉子政列女傳遜於林木入於大麓之言俱其實迹如是豈領録云乎哉以大麓為三公之位王充已非之李文叔乃以子長為不知經而蘇氏書解與古史皆論如子長先達多不能決張九成云處之深林大澤之間凡學聖人若當自其難堪處觀之也按考大麓則大陸也故趙之臨城隆平鎮之大陸澤也一曰沃洲是為廣阿澤漢之巨鹿廣阿縣隨為大陸即今邢之巨鹿密邇於趙故酈元注水經引古書云堯將禪舜納之大麓之野烈風雷雨不迷乃致以昭華之玉故巨鹿縣取名焉澤在今巨鹿縣西北五里地即廣阿澤東西二十里南北三十里寰宇記在昭慶一名大麓一名巨鹿一名大鹿一名沃洲隋國經云大陸大鹿廣阿一澤而異名麓鹿通用也淮南子九藪趙有巨鹿而爾雅晉有大陸吕春秋云晉之大陸由趙之巨鹿則為二矣統之則一也十三州志云巨鹿唐虞時大麓也堯試舜百揆納于大麓麓者林之大也堯欲使天下皆見之故置諸侯合羣臣與百姓納之大麓之野然後以天下授之明已禪之公也大陸縣今有堯臺髙與城等乃堯禪舜之處始皇二十五年滅趙為巨鹿郡縣即唐之昭慶矣禹貢大河北過洚水至大陸然今大陸與河逺不相涉唐成書傳引地説大河東北流過降水千里至大陸為地腹按降在信都密近巨鹿豈容千里宜此謂絳然鄭音為下江切謂即共縣之淇酈氏非之今柏人城之東北有孤山者世謂麓山所謂巏嵍山也記者以為堯之納舜在是十三州志云上有堯祠俗呼宣務山謂舜昔宣務焉或曰虛無訛也寰宇記云邢州堯山縣有宣務山一曰虛無山在西北四里髙一千一百五十尺城冡記云堯登此山東瞻淇水務訪賢人者也巏嵍王喬所仚顔之推與王劭見之以示魏收收大驚歎及作莊嚴寺碑用之而之推遂以入廣韻音為權嵍然嵍本音旄故亦用旄字林乃為亡付亡夫二切故玉篇止音雚旄瑣言載馬郁贈韓定辭云别後巏嵍山上望羡君無語對王喬蘇子瞻愛之不知為平聲矣仙傳王喬為柏人令於東北巏嵍山得道故詩銘及之虞夏傳曰堯推尊舜屬諸侯致天下於大麓之野應邵以謂麓者林之大也故康成云山足曰麓麓者録也古者天子命大事命諸侯則為壇國之外堯聚諸侯命舜陟位居攝致天下之事使大録之因地譬意斯得其指而孔説乃如彼夫子長受經於安國顧豈不知而故倍其師哉蓋有以知其説而當時之有見如此也遷受書於安國嘗竊語之為其難則易斯至矣堯之試舜亦可謂多術哉震雷虩虩且喪七鬯以烈風雷雨而行乎茂林蘙薄之中孰不禽驚麕怖恐懼而失常者而舜方此泰然不迷豈唯度越尋常哉亦天地鬼神之實相也歷踐至此天下無難者矣或曰泰山之麓禪代之所易姓受代故於此乎告之夫堯之觀舜也試之者三年矣於人民則五典從於朝廷則百揆序於賔客則四門穆夫然後納之大麓以觀夫天意之從不既已烈風雷雨之弗迷然後授之而舜方此謙遜未遑受也既未受禪豈有先告代於泰山者乎雖然其所以納之亦必有其禮矣其不禋柴寅告而遂納之未可也惜乎其不傳爾封則于其家禪則於其麓封禪告代之禮也納之之禮蓋可知矣抑又訊之舜之授禹亦有納麓烈風雷雨之事然則堯舜之事斷可識矣蓋天下大器王者大統授受之際得不歷試諸難而決之天哉虞傳云唯五祀興韶樂于大麓之野十四祀笙管變天大雷雨疾風為遜禹之事也詳著紀中嗚呼禪以天下事有大於此者乎周公遭謗天且動威以章周公之德况舜禹之事邪然則堯舜之所以納之大麓者豈唯使之主祭哉實亦薦之天其所以薦之天者抑以盡其命而已矣命者安亂禦妄之正理也論語二十篇終之以不知命而今之君子皆曰孔不言命夫命孔子之所與也曷不言哉與命與仁豈不言仁后稷之生鳥翼羊腓齊頃之誕貍乳羶嫗后稷之事詳見生民名之曰棄其事明甚齊惠之妾蕭桐子有身賤不敢言生頃公棄之野貍乳之羶覆之故長名無野昆莫之棄野鳥䘖肉東明之擲豕嘔馬噓是豈人為之哉昆莫生棄于野鳥䘖肉飼之凶奴收養後王烏孫槖離生東明棄之溷豕嘔之棄之廄馬噓之後王扶餘小白中鉤棄疾猒紐俱本天命漢髙帝唐太宗夫豈項羽范增建成元吉之所能謀邪陳橋之歸契丹自退報退與受禪同日澶淵之役絞車暗發中夜射殺撻覽是與淳風之不肯去武氏肅宗之不能圖祿山皆若有鬼神陰沮于其間者肅宗嘗召祿山過東宫傳鴆將飲飛燕落泥其中自此不至而况河圖洛奧生民玄鳥之類卓然見于詩書者多矣焉可誣哉奈何鉛槧之夫諱言符命遂使小人不知天命皆自謂智角立黨與相擠以傾人之家危人之朝者不勝舉至有因夫一夢一讖以訌國而速殪者其視大麓之事為何如邪然則符命之説其可廢哉彼以或者推言太過流入讖緯如孔熙眭孟先以速禍王莽公孫述之徒沿以篡竊而隋煬帝唐太宗武韋之流又因之以濫殺于是歸罪三代受命之符舉而廢去者亦矯枉過直矣不知聖人未嘗廢也韶説子曰韶盡美矣又盡善也及在齊而聞韶則三月不知肉味抑不知韶簫之音何如其和而其為感之至於斯邪豫既紀虞帝觀唐書見后夔之論樂然後解矣寤曰韶至矣乎一代之治至于樂而極矣而韶者又今古樂之獨隆者也今夫黨巷之聲有不可常理詰堯舜之事固難於鄙見俗情測也且書小藝也能草者不能為行能𨽻者不能為真真行既得則或能今不能古其或極真行備今古矣而胸中無千卷之資日用乏忠恕之行以涵養之則筆下自然無千嵗之韻故雖銀鈎蠆尾八法具備特墨客之一長爾求其所謂落玉垂金流奕清舉者一點不可得也此虞帝簫韶之樂所以俟孔子而後知歟夔之言曰戛擊鳴球摶拊琴瑟以詠祖考來格虞賔在位羣后德讓下管鼗鼓合止柷敔笙鏞以間鳥獸蹌蹌簫韶九成鳯皇來儀擊石拊石百獸率舞庶尹允諧于有以見其音之能合天而幽明飛走無一物之失其情也兩大之間理固有是而宋子京乃以為推美舜德而侈言之謂鳯未始來獸未始感且樂作之朝廷郊廟朝有宫室之嚴廟有垣壖之護郊有營衛之禁百獸何自而至使自山林林林戢戢而參乎百工之間何其怪邪又如祖考來格則見其上世闖然坐堂上乎吁兹亦挾兩崖之見度聖人矣夫孝弟之至者通神明而仁聲之感入人也深故一極其和則天地為之格鬼神為之感而况于百物之顯者乎聲律氣臭先王之所以通物類而交神明者也視之而弗見聽之而弗聞于是有蕭鬱以達其氣化之而弗至喻之而弗及于是有鐘鼓以達其聲至其肹蠁潛通沖虛軮軋而于于􅓥􅓥或接乎其左右氤氲妙㡫幽逺畢而鳥獸百物亦且咸得其樂是故九變八變而天神地示舉為降出幽明之理默然相契若祝而雞集呼而蛇至有不可以言語詰者蓋樂也者通倫類之鑰而置神明之軺也周禮六變而天神降八變而地示出九變而人鬼享説者以為大者易感小者難格此何語邪或曰六水數八木數水者物之始而木成乎地乾知太始坤作成物故天用六而地用八宗廟以九所以法天之終數斯亦妄矣天下之物孰不成于地哉且六變所致之物以羽物配川澤裸物配山林鱗物配丘陵毛物配墳衍介物配土祗與大司徒土地所宜之物皆不同焉又何邪聖人之于禮樂也惟致其至而已樂作于此物應于彼雖聖人亦安能必限其至于一變二變之時哉唯致其至斯有以知其必降而必出蓋所謂降出者非必如是而有時乎如是爾詩云先祖是聽而禮齋三日必見其所為齋者又豈若釋氏之徒以或見齊其不見而以不見歸之于必見昔者秦漢垂情祠祀數著光怪悉漢前朝陳寶一祠髙文武宣之代百三十有一見初元以後亦二十至此則陽氣舊祠劉更生之所列者髙帝時五來文帝二十六武帝七十五宣帝二十五比武帝之為樂采詩夜誦文必爾雅而猶聞者興起用事甘泉僮聲一奏而神光集壇師曠之作清角一奏輒有玄鶴二八棲門之危再奏而列三奏于是延脰長鳴舒翮迅舞杜鴻漸罷蜀副帥月夜率燕錦谷郵亭奏羯鼓數曲四山猿鳥皆翔飛欣鳴又于别野登閣奏之羣羊與犬忽皆躑躅變旋如其疾徐髙下之節此則自然之聲有以感召非必牽挽而後獲其應也且鈞奏鶴舞歷代亦已多矣宣帝世宗廟告白鶴集庭孝昭寢祠鴈五色集西河廟赤鶴下燭起房廣川廟殿鐘聲光明夜遍厥類非一皇甫政之為越泛月鏡湖有吹笛者俄而細浪旋湧二龍輔舟如聽夏仲御之刺水也折旋中流為鯔鷠之躍附䱐之引而風濤震駭雲霧窅冥白魚之躍船者八九遽土作曲扣舷引轉而大風應至含氷潄空雲雨響集逮其集氣長嘯則煙塵頓起蓋樂自內作茍一氣之英合乎其內而中聲之和駿發其外則空穴為之來風丘岑為之出雨草木魚鱉翹搖咸若亦自然之理也變四時暖北方固有不得而不然者魚出聽馬仰秣顧常人有能之而况聖人御天賢者考樂熙孝治以嫓仁聲則其致神響之格飛走之感理宜然者且鳥獸之喜聲性與人同而鬼神之情亦樂音也樂五教反而况笙管有鳥之聲鐘鼓柷敔有獸之音茍得其中則頏空跖實之等蹌蹌乎四海之內而率舞乎椒薄之間矣亦奚必蹁躚虞氏之庭而曷止盤辟夔之目前邪火木相感而然金水相際而流孰匪自然如必一為之説則事有不得而言者故孔子曰其功善者其樂和樂和則天地且猶應之况百獸乎李後主演樂記曰鳥歌嚶嚶以其彚征鹿鳴􅀢􅀢以其類聚情發于聲而流于音則感動之理逮于鳥獸而况于人乎夫以人而不知夫樂是同芻人具質而無心者也豈足言哉方鴻漸之作樂于利州望喜驛見猿鳥之感乃大歎曰若其于此稍致其功猶能及此况聖人御天而賢者考樂乎王充云鳥獸好怨聲其耳與人同何為而不樂然以率舞為司信而風雨癃病為虛言謂樂能亂隂陽則必能調隂陽如是則王者奚必修身正行唯鼓隂陽之曲則和氣自至太平自立矣彼蓋以為一物一事即可以致其和夫亦豈知道德仁義政教為大樂之本也大抵溺於人者不可與言天狃於俗者不足以知聖夏王懋德山川鬼神以莫不寧而鳥獸魚鱉亦復咸若周王在囿麀鹿攸伏王在靈沼於牣魚躍而説者亦以為是夸美之辭是則先聖仁人莫非誑矣聞易水之歌者至于怒髮衝冠聆房陵之謳者至于流泣沾水則遜羣后諧庶尹非泛辭矣劉琨清嘯而羣胡為之長歎罷圍劉疇吹笳而羣胡為之倚泣郤去則格有苖馴虞賔非溢語矣棠梨之花羯鼓而綻美人之草度曲而舞而况有情之鳥獸乎唐之園陵王晨衣舉漢之祠室房户夜開而况流光之祖考乎宫樂一奏而黃鵠下籞中吕一叶而黃鶯繞林然則鳯之羌羌又何足異邪雖然是特類之相召烏足上窮虞帝之妙哉若夫南風報德之絃其所以阜財而解愠者雖目窮乎所欲逐耳窮乎所欲聞有不可得而及矣且時聞之子之如齊也遇童子郭門之外挈壺而俱其視精其行端子謂御者趣驅之曰韶樂作矣比至果聞韶焉三月不知肉味故樂非獨自樂也又以樂人非獨自正也又以正人不圖為樂之至于斯兹其所以悠然不覺發也嗚呼卒爵而樂闋孔子屢歎之寢夢而見周公學琴而見文王神交氣合千載一日其聞韶也其身固已揖遜乎虞氏之廷際九官之肅穆而評合止之宜矣此所以一為感悅于至彌時猶口爽也􅍀然忘味夫又烏知耳目口鼻之在我而聲色臭味之在彼哉啜醯而口爽嘬梅而齒􅀈固有兼旬不能飯者而未嘗知梅與醯者猶莫展也傳曰人莫不飲食鮮能知味以三月之字為音豈達聖人之口耳哉夔論自知審音者言有所不慙而非矜喜得其君者智無隱而必期有以自效蓋士君子之生世必期有以自見肯與區區草木同炎而共盡哉方虞帝之命九官也八官皆遜而夔獨無所遜且復昌言于帝前曰於豫擊石拊石百獸率舞於讀如烏及益稷之論功也則又贊夫韶曰戛擊云云擊石拊石百獸率舞蓋前之語夔之喜得其君而所以自期者後之語則夔之所以敘其樂之成果如其所期者有以見其收功必效而無言之不酬也夫以舜之樂得夫夔而益和夔之道遭夫舜而益章此夔之所以屢道其功而不遜者誠所不慚故也昔在先朝李照欲下其律乃自言曰異日聽吾樂當令人物舒長夫以照之為樂而自許已如此則夔之樂為可知矣李照鐘見長編嘉祐元年八月以仁聖之君而得夫夔臣以孝悌之治而嫓之仁聲則其崇德象成參偕造化與天地八荒之氣相流通而無間不為難者此夔之所以自嘉其遇遽許其君而不疑也劉薛王蘇林梅胡李乃以前語十字為益稷篇之脫簡復出亦何妄削聖人之經也邪大抵學者患在矜管蠡而不識聖賢之事業衆之所難以聖人處之為甚易聖之所就以衆人覩之為甚疑遺屨失著之徒夫亦豈知聖人之語凡出自然而非以遊言赫也子曰我戰則克祭則受福如有用我者期月已可三年有成由學者億之為果然邪以小人腹度君子心不既指以夸譀之辭哉明乎此則知夔之所以自期為自信矣嗟夫夔龍稷契等人也始帝命夔以典樂教胄子蓋是以典樂之官兼教事者其賢為可知矣而記禮者乃以為夔不達禮其知言歟方帝之命夷秩宗典三禮也夷巽之夔則夔固非不達禮也唯其禮樂兼備特在當時知樂優於禮爾教國胄子直寬剛簡不達於禮者能之乎唯直唯寬唯剛唯簡則知教之所由興矣而溫而栗無戲無傲則又知教之所由廢而師道亦裕矣孰謂夔其窮歟且昔重黎之舉夔為樂正也重黎欲益求人以佐帝曰樂者天地之精得失之節也夔能和之以平天下一而足矣故荀子曰知樂者衆矣而夔獨傳一也豈為不達禮哉嗚嘻人之好樂也甚矣其不可奪也先王之時以樂合天下之情是故必命大賢深窮情致而後聞者日興起末世之君視為一技畢付庸瞽啁啾嘈囋唯以取聒是以無益於智又何有於物類之感而啓人之信喜哉人之化感尤在觀聽樂缺至此此釋之徒所以得竊其鼓舞之權取西俗戎蠻之樂而附之慈悲不忍之聲以感動夫人之良能者而人樂之死復之家禮律所禁則又比其鐃鉢八音者而易其為樂之名度以鄙猥辛酸之語而叶之曲破以施之服舍之側于是乃有倀倀辟經而品校精否者果何為邪情實之相變理固至是故豫嘗謂灑其金碧則釋者萎制其鐃鉢則釋者寂矣于是引而歸之先王之聲教以動化于天下則移風易俗吾知其不難矣又何俟于異世之夔邪申都虞帝之未嗣也職為司徒故其後有司徒氏司徒之轉又為申屠勝徒申都之氏按漢功臣侯表張良以廄將從起下邳以韓申都下韓楚漢春秋則作信都信申古同音也然在史記作韓申徒而良傳復作韓司徒一也云項梁使良求韓成立為韓王以張良為韓司徒云云蓋申屠勝徒者司徒之聲轉申徒申都者申徒之聲轉而信都者又申都之轉也劉敞博聞強記亦意申都為是司徒而不得其證不知王符言之詳矣潛夫論志氏姓篇云沛公之起良生屬焉沛公使韓信略定韓也立橫陽君成為韓王而拜良為信都又曰信都者司徒也或曰司徒或為勝徒然其本共一司徒也後作傳者不知信都何因妄生事意以為是乃代王為信都也由此觀之則知當時已自疑誤然申都之為司徒固也顔籕不知乎此直以韓申都為韓王信劉知幾直又以為韓名信都謂子長謬去都而留信踈妄又甚辨帝舜冡孟子曰舜生于諸馮即春秋之諸浮冀州之地遷于負夏衛地卒于鳴條東夷之人也在河中府安邑或云陳留平丘有鳴條亭然湯伐桀與三朡昆吾同時三朡在定陶鳴條義不得在陳留又安邑有昆吾亭顯其非是也諸馮負夏鳴條皆在河南北故葬于紀所謂紀市也詳紀中紀在河中府皮氏今帝墓在安邑而安邑有鳴條陌其去紀才兩舍帝記言河中又舜冡信矣亦見廣川家學而竹書郡國志等皆言帝葬蒼梧則自漢失之禮記是至鄭康成遂以鳴條為南夷之地不已踈乎孟子言諸馮負夏鳴條伊訓言亳鳴條三朡皆衛晉之地豈得越在南夷哉故竇蘋云舜卒鳴條去所都蒲阪七十里無緣葬于蒼梧四千里外而司馬考異乃謂蒼梧為在中國非必江南然無明文且謂江南抑又踈矣夫蒼梧自非五服人風婐劃地氣髙瘴在虞夏乃無人之境豈巡狩之所至邪方堯老舜攝也于是乎有巡狩之事今舜既已耄期倦劇形神告勞釋負而付禹則巡狩之事禹為之矣豈復躬巡狩于要荒之外也哉是以劉知幾之徒得以托厲王流彘楚帝遷郴及夏桀趙嘉之事而疑舜禹之明德泌嘗考之象封有鼻今道州故墓在于始興幽明録云始興有鼻天子冡鼻天子城即南康記南康縣鼻天子城者亦見虞賔録蓋地後貫南康昔人不明為何人乃象冡也義均封於商故女英之冡在商事見劉禹錫嘉話廣記等世紀云舜三妃娥皇無子女英生商均女英蓋隨子均徙于封所而死葬焉有説别見其餘支庶或封巴陵或食上虞采西城邑池陽與夫懷戎衡山長沙無錫故其墓或在江華或在巴陵上虞荆湖之浙虞帝之迹遍所在有風土記上虞有舜冡郡國志云上虞東有姚丘舜葬之所東又有谷林云舜生之地復有歷山云舜耕于此而嘉禾降之又越之餘姚餘姚山記以為舜父所封而風土記乃云舜支庶之所封又會稽山有虞舜巡狩臺臺下有望陵祠云民思之而立風土記云舜東夷之人生于姚丘媯水之汭損石之東今姚丘山在餘姚西六十上虞縣之東本作桃丘又始寧界有舜所耕田始寧乃故上虞之南鄉也今有吳北亭虞濵皆在小江裏去縣五十對小江北岸臨江山上有立石謂之損石俗呼蒍公嶄又餘姚有漁浦湖輿地寰宇記以為舜漁于此沈稷謂湖今在上虞而今冷道乃有舜廟徐儉碑謂是舜之所都而營浦南亦記有舜巡宿處而道州學西有虞帝廟營其它蓋不勝記如營道廟舊在太陽溪溪今不知處漢以來廟九疑山下至唐不存元結建之州西置廟户刻表勑并狀僖宗時士胡曾權延唐始復之九疑國初王繼勳奉詔修嵗春秋降祠版蓋皆其後祠之禹為天子帝之諸子分適他國其之巴陵者登北氏蓋從之故其墓在于巴陵黃陵也登北氏帝之第三妃帝之三妃不得皆後于帝死育既葬于陳倉則其先死矣育即娥皇漢志陳倉有黃帝孫舜妻育冡既皇英各自有墓則黃陵為登北之墓審矣世以湘隂黃陵為舜妃墓而臨桂縣城北十餘里有雙女冡髙十餘丈周二里亦云二妃之葬俱繆今江華太平鄉有舜寺湘隂有大小哀洲圖經以為二妃哭舜而名亦妄特舜女也唯登北氏從徙巴陵則其二女理應在焉故得為湘之神而其光照于百里是皆可得而考者胡自氛氛而爭為堯之二女乎舜之二女一曰霄明一曰燭光登北氏之所生有辨别見雖然虞帝之墳在在有之何邪海內南經蒼梧山帝舜葬其陽大荒南經帝舜葬嶽山又海內北經有帝舜臺之類有陵臺説别見蓋古聖王久于其位恩沾于倮隅澤及于牛馬赴格之日殊方異域無不為位而墳土以致其哀敬而承其奉是以非一所也顓嚳堯湯之墓傳皆數出漢逺郡國皆起國廟亦若是也是則九疑之陵或弟象之國所封崇爾漢惠帝元年令郡國諸侯王立髙廟今山陽縣西四十里髙廟也至元成時郡國祖宗園廟百六十七所自髙祖至悼皇考各居陵旁立廟并京百七十六園中各有寢便殿不然商均窆也大荒南經云赤水之東蒼梧之野舜子叔均之所葬也而九疑山記亦謂商均窆其隂豈非商均徙此因葬之後世遂以為虞帝之墳邪山海經古書也苐首尾多衡決後世不考按海內朝鮮記云南方蒼梧之泉其中有九疑山舜之所葬在長沙零陵界中此世所憑信者蓋後人所增長沙零陵名出秦漢非古明矣嘗又訊之大傳符子之書虞帝遜禹于洞庭張樂成于洞庭之野于是望韶石而九奏則帝蓋嘗履洞庭而樂韶石亦既遜位而歸國矣遜禹後十八載乃崩九山皆石峻聳特立亦謂之韶石故集仙録言帝得修身之道治國之要瞑目端坐冉冉乘空而至南方之國八十龍之門泛昭回之河其中有九疑山焉歷數既往歸理兹山是則九疑之遊特夢想之所屆者是以蔡雍九疑碑辭乃云解體而升而胡曾九疑碑圖且謂今無復墓然則蒼梧之藏有其語而已矣真源賦云因南狩走馬逐鹿同飛蒼梧莫知所去蓋誕河中之壠焉可誣也世逺論略而諸生若信蒼梧之言為出于經而豫之言亦難乎為信也李白云重瞳孤墳竟何是則虞帝之冡不明自昔以為恨也王充謂舜禹皆以治水死葬于外按是時水平已久栁璨闢劉知幾之説當矣然謂舜因天下無事肆覲南巡零陵桂林不期奄化而因葬之至比始皇孝武章帝之崩載歸路寢而後成禮又大妄矣書云陟方乃死説者以陟方為巡狩孔氏謂升道南方以死韓愈非其説曰地傾東南南巡巡非陟也陟者升也方乃死者所以釋陟為死也蘇軾亦謂陟方猶升遐乃死為章句後學誤以為經文書云商禮陟配天唯新陟王故汲紀年帝王之沒皆曰陟然則在位五十載陟者為紀帝之沒明矣蘇謂陟方猶升遐誤矣蓋未見紀年爾解者又何必區區以非五服之地巡狩所不至言哉傳又謂伐苖民而崩于蒼梧伐苖乃禹也穎達云時苖民已竄三危韓非曰商周七百餘嵗虞夏千餘嵗而不能定儒墨之真今欲審堯舜之道于三千嵗之前意者其不可必乎無參驗而必之愚也非能必而據之誣也故明據先王必定堯舜者非愚即誣也豫既考定有虞若三妃有鼻諸孤之墓一旦明白歷歷可知如此抑不知豫之愚誣邪韓子之愚誣邪路史卷三十六

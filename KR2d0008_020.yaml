body:
  text: 路史卷二十宋羅泌撰後紀十一疏仡紀陶唐氏帝堯陶唐氏姬姓世謂堯生伊長孺家而姓伊祈妄也伊祈乃炎帝之姓堯姓姬出于唐嚳不為伊盖皆以堯與炎帝俱火德王故謂堯為炎後自漢以來有是說世遂果以堯為炎帝子孫因云姓伊祈失之世紀云慶都寄於伊長孺家故堯從母所居為姓又云為祈氏或從母姓伊姓非其本姓亦自辨矣稽古録從之為祈姓誤也靈臺碑言昔者都慶兆㑹穹精氏姓曰伊則伊其母姓爾然亦不得為祈云髙辛氏之第二子也母陳豐氏曰慶都史作陳鋒借嘗觀三河之首見春秋合誠圖注云河東北端今荆州赤帝顯圖奄然風雨慶都遇而萌之帝堯碑云其先出自塊㠕翼火之精有神龍首出于常羊慶都交之生伊堯不與凡等龍顔日角眉八彩謖自侯伯游于𤣥河龍龜負銜投鈐授與然後受命按合誠圖大帝之精起三河之州中土之腴流潤大石之中而生慶都于斗維之野身形長大有似大帝蔑食不饑年二十寄伊長孺家觀于三河之首常若神隨赤龍負圖出慶都讀之云赤受天運其下圖人衣赤衣光靣八彩鬢鬚尺餘長七尺二寸兌上豐下足履翼星題曰赤帝起成天下寳奄然隂雨赤龍與婚龍消而乳堯既乳視堯如圖及堯有知慶都以圖與之此事正類後魏序紀詰汾力㣲之異黄雲覆之震十有四月而生于丹陵見遁甲開山圖及世紀漢鉤弋夫人生昭帝姙身十四月上曰昔聞唐堯十四月而生乃命所居曰堯母門曰堯本只作壵三士為堯譲也惟士能讓即為優饒後下加乃人字象引乞之出堯母碑堯堯碑堯可見即云􅵽士故有嶣嶤竨嶢等說俱妄猶􅵽士爾魏周訴曰吾所賢者堯舜堯舜名世以為謚者非也詳見發揮是曰放勲王功曰勲達于四方曰放或曰以帝徳偈後人則曰放勲所放在堯以帝德終前烈則曰重華所重在堯也身侔十尺孔叢子及世紀按合誠圖云赤帝之為人視之豐長八尺七寸豐下兊上龍顔日角八彩三眸合誠圖云光靣八彩謂八位皆有光彩注云彩色有八者非而孝經援神契及元命苞乃云眉有八彩書大傳等遂以為眉如八字妄也王充宣漢云正使堯復佌齒舜復八日眉一作八月豈八眉哉鳥庭荷勝琦表射出援神契注云堯火精鳥庭庭有烏骨表取朱鳥與太㣲庭也朱鳥戴聖荷勝似之堯碑云性發蘭石生自馥芬琦表射出雙握嘉文手有文也握嘉履翼竅息洞通合誠圖云足下五翼星聰明密㣲其言不式其德不囘大戴禮仁如天智如神明如日而晦如隂仁以蒞之智以周之明以察之晦以蓄之好謀能深和而不怒憂而畏禍快而愉莊子虚静恬淡寂寞無為堯之為君也年有十三佐摯封植受封于陶摰為髙辛封植陶今廣濟治定陶故范曄謂定陶為陶堯所居皇甫謐繆為舜陶之所今夀光有堯水伏琛晏謨皆以為堯頓駕處明人察物昭義崇仁禁詐偽正法度不廢窮民不敖亡告苦死者而哀婦人底德靡解百姓和欣于是改國于唐輿地廣記堯為唐侯于此餘詳國名紀有說别見勤勞不居儉而用禮不貴時巧不視文繡溫飯煗羮不餧不易褍衣袿履不敝不更御柈土朹夏葛衣而冬鹿裘栝柱采椽為人愛費儉吉德也然世之言堯舜者多過實六韜計用云堯王天下世謂賢君其治則宫垣室屋不堊也金銀珠玉弗服也錦繡文綺弗展也淫佚之樂弗聽也桶椽楹柱非藻飾也茅茨之盖弗椾齊也褍衣袿履不敝不更為温飯煗羹不酸穢不易尸子云人君之有天下瑶臺九纍而堯白屋黼衣九種而堯大布宫中三市而堯居珍羞百種而堯糲飯菜鬻騏驎青龍而堯素車璞馬堯盖不盡然也由余亦言昔堯飯于土簋飲于土型而墨子且謂堯黍稷不式羹胾不重飯土𠺕啜土鉶又淮南五術云大路不畫越席不縁太羹不和粢食不毁布衣揜形韓非至謂糲粢之食藜藿之羹冬日麑裘夏日葛衣雖監門之養弗虧于此者故紆而非中道者悉不取不以鶉居易九市不以私故㽞耕時水處者漁谷居者牧陵阪耕畬臯澤織罔是以地宜其事事宜其械械宜其材故人得以所有易所亡所工易所拙而上下達矣見文子淮南子所謂安天下之所當安欽明文思内行謹飭篤孝慈仁敬使人知子弟之道仁恩被于蒼生德化敷于四海故亡膠漆之約于當世而道行欽明文思駿德也欽為仁明為禮思為智文為義四者易之元亨利貞也而聰明文思者性矣天道主聰故言明文思而以聰冠之人道主欽故言明文思而以欽冠之性圓而成德顯而用與天下治而不為貪以天下巽而不為亷允恭克讓與道合矣年十有七謖以侯伯恢踐帝靈臺碑云堯以侯伯恢踐帝而許叔重謂堯以楚伯受命滅不義于丹水楚今唐州亦見御覽一百七十一董仲舒亦云堯發于諸侯而蘇秦說趙肅侯云堯無三夫之分舜無咫尺之地以有天下禹無百人之聚以王諸侯淮南子云堯無百夫之郭舜無植錐之地禹無十人之衆作文者之常蔽曰陶唐氏韋昭書云陶唐皆國名猶殷商然邢昺謂未聞堯居陶與湯稱異頴達亦謂書傳未聞有陶疑陶唐或共一地不知爾雅說文陶坐再成者在于濟隂永初山川記堯先居陶後居唐曰陶唐氏也都于平陽今晉之臨汾漢平陽也即晉陽有故堯城姑射山元和志有堯帝廟在臨汾東八及南六里世紀謂自唐封從晉陽及為天子都平陽謬也平陽太原大夏大鹵夏虚晉晉陽七名一地寰宇記云平陽今晉晉陽太原也然魯衞皆有平陽非堯都矣安邑夏歌惟彼陶唐有此冀方今霍邑至平定有故晉陶城本永安地去晉四百里皆古太原地開皇卜于并城中古晉陽置太原縣皇朝為平晉軍九域志翼之唐陽有堯臺九門城郡國志云信都堂陽九門城古臺二並號堯臺城塚記堯臺二所九門城􅕐所造又今河中有故唐城在絳之翼城西二里故通典謂堯舊都在蒲也以火紀德謂赤帝詩含神霧云慶都以赤龍合昏生赤帝伊祈堯色尚白家語大戴禮云土王色尚黄非黄収純衣彤車白馬乃立三公六卿百揆暨百執事大傳舜攝時三公九卿百執事此堯之官也故使百官事舜富而亡驕貴而不舒居于明堂斥題不枅土階不戚茅茨不􅗴泊如也明堂之制如此非皆居也潘尼云古之為君無欲而至公故土階茅茨之儉墨子以為堯居土階三等堂髙三尺非所以為儉者重先務急親賢明駿德以親九族九族既穆乃辨章于百姓百姓昭明而恊和于萬邦黎民於變時雍此施彼應如響聲者所謂立之斯立丐施政制因事立法不激不涹取人以狀明非見有于人翹翹惟以天下為憂務求賢聖爰得稷契夷臯朱斨伯譽羣龍輔德是以教化大行天下洽和民安仁而樂義乃更制五服均五等五國相維禹貢五百里甸服傳謂甸服堯制賦其田使入穀禹輔成其外百里者賦納總至五百里米甸服之制本自納總禹為之差有輕逺之法周則圻田用貢法以禾米采服則取美物以當邦賦不入穀矣又云周之納穀止于千里唐虞所轉為二千里是方千里者四納穀比周為多謂唐虞萬國諸侯歲一見其用費于後故鄭志答趙商云圻内四百國郊内亦封諸侯矣周法十國入一于天子雖千里四其稅猶少于周故使方二千里一納米繆矣設四岳八伯以典諸侯帝立八伯以典諸侯立四岳以稽八伯八伯即九牧也史以四岳為司馬氏之先故蘇氏以為一人失之舜廵狩覲四岳又使四岳還瑞則四岳在外而非一人矣至岱宗覲東后則東方之諸侯在焉岱在兖則兖青徐三州所統之侯畢朝胡益之以為四岳寓于十二牧不然也孔氏以四岳為羲和四子星文之官豈與岳牧雜哉均井邑都制鄙晉志云昔在帝堯卟和萬邦制八家為鄰三鄰為朋三朋為里五里為邑十邑為都十都為師州十二師盖本黄帝之法也而臨民以十二孔子云舜臨民以五堯臨民以十二謂十二載一廵狩也鄭云天子以四海為家時一廵省之五年者虞夏之制周以十二年安國謂堯舜同道舜攝既然堯又可知義宗云唐虞五載一廵故周語云堯臨民以五以五服一朝考之古盖皆以五年第堯以洪水遂為十二年爾十征兼虞夏法者重古而言周十二年一廵法歲一周不必專十二年或云五載廵一岳二十年而徧四岳周則四十八年而徧故杜佑謂堯十二載一岳四十八載乃徧益遐濶矣春省耕秋省歛宣聲教以同俗振彫瘵聽民聲觀四履之所以化其上五服服五百里為方五千里故魏許綰云堯舜建諸侯地方五千里大司馬九畿四面萬里書疏云禹成五服實是堯時以禹所制故云禹制周公所定乃禹之舊制也入其疆土地辟岐旁趨養老尊賢俊傑在位則有慶反是則絀三載小考正職九載大考有功五載而一述職其所典職以備則賞不備則罰因地之生美為貢賦故民出而不憾因人之好惡為政教故令不犯九共云予辨下土使民平平民以無傲是也三歲貢士而賓興之一適為之好德再適為之賢賢三適有功于是始命有不正則以絀一少絀以爵再少絀地三少而爵地畢一不適為過再為之敖三為之􅰸其絀如之附下而罔上者刑豫聞國政而亡益于民者斥在上位而不能進賢者逐比年而秩官之亡文者次絀之而代以賓見之賢者進使亡繇得其所利退使亡繇避其所害故安其位而樂其羣德行有所是道義有所明故士莫敢詭俗異禮以自見于國莫敢布惠緩行以修上下之交而和親于民故臣莫敢阿君嫵上躐等踰爵漁利蘇功而駿艾在官矣命謂一命為命諸侯三適之賞見虞夏傳大抵上世之事可以槩見有不可得而執者如略說所言諸侯有德者一命以車服弓矢再命虎賁三百人三命秬鬯三命者皆受天子之樂以祀宗廟雖云德之所貴然未遽若是輕三適之說亦未遽執有九錫辨見發揮于是命偰司徒和合五教以保于百姓棄為大田職司馬播嘉穀辨五土之宜教民稼穡按孟子契為司徒在舜攝後非也始堯得舜命為司徒矣故文子淮南子皆云堯治天下舜為司徒偰為司馬禹為司空棄為大田此舜試後也按古農作繆為田故伏書亦謂棄為田也伯夷宗秩降典邦禮以治人神和上下鄭語云伯夷禮神以佐堯注秩宗之官周為宗伯漢太常也主司祭祀臯繇為士庶折繁獄政教平姦宄息淮南子堯舉禹契后稷臯陶政教平姦宄息獄訟止而衣食足按堯命三后乃伯夷禹稷云尊忠正之位表勤孝之閭厚亷潔愛民之禄民之敬長憐孤取舍克讓而舉事功者則命于上然後得飾車駢馬而被文錦未命而乗衣之則罰故雖有餘財侈物亡禮義功德謖亡用所謂命民庶民則木車單馬衣布帛以賢制爵以庸制禄故人慎德興功輕利而興義伏氏大傳政先仁而後殺先暱而後疏先化而後教三教不率而刑賞寓焉惟敬五刑以成三德是故明法察令申子堯之治天下明法察令而已聖君任法而不任智任數而不任說單均刑法國語單均刑法以儀民禮作賞均非是非汔于威惟汔于富象刑以儀之而民亡犯典獄非汔于威不絶威也惟汔于富賂不行也畫衣冠異章服謂之戮故人可殺而不可辱凡斬其人鑿形膚曰刑畫衣冠異章服謂之戮上世用戮民不犯也見慎子上刑赭衣不純中加雜􅀈下則墨幪以居州里故民有恥而興禮唐傳作反于禮甫刑傳以三刑為有虞氏者非純縁也幪巾也周禮罷民亦然上刑易二十刑易一輕重之差也此以四萬二千家為州七十二家為里與周禮異宥過亡大刑故亡小以人而戒故禮義興禮義興而民亡爭民亡爭而治達矣公孫宏云堯舜之時不貴爵賞而民勸善不重刑罰而民不犯躬率以正而民愈信故大傳子贑曰傳云堯舜之王一人不刑而天下治教誠而愛深也史記禮書乃以為堯治天下殺一人刑三人而天下治此以四罪言爾過誤也誤則赦之不以大故用意者刑之不以小然在堯時而已以其待之盡白虎義云五帝畫象者其服象五刑墨者幪巾劓者赭衣髕者墨幪宫者扉屨大辟布衣無領故法言云唐虞象刑傳言五帝畫象而民不犯盖唐虞有象刑而更設畫衣冠之法如周明祮秦赭衣者或疑與刑故之事戾戾者何得察哉乃立四學以詔于國而養更老故民興孝禮注五帝有太學曰成均虞庠近是更五更老三老更以更事為名蔡云當作五麥非在位七年民不作忒鴟乆逃于絶域麒麟遊于藪澤則能信于人也拾遺記嘉言罔伏賢亡野遺猶絀聰明開肺意舍已稽衆師于善綣許由尹中而學于務成子附善綣即善卷尹中尹夀也荀子等作君疇者非世紀尹夀為許由友許由諸侯堯師臣也新序引吕子言舜亦師之而讓天下之說甚著說在炎紀下詢政行人問老衢室務急讜言以為教先達立建善之旌廷置敢諫之鼓愽咨芻蕘以成盛勲塗說巷議咸所不廢管子云黄帝立明臺之議上觀于賢也堯有衢室之問下聽于人也舜有告善之旌主不蔽也禹立建皷備評謡也佃云取其垣四合曰合宫取其門四達曰衢室晉張紘云堯舜立敢諫之鼓三王立誹謗之木吕春秋言堯有敢諫之鼓尸子言堯立誹謗木文紀注進善之旌堯立之五達之道誹謗木堯作之橋梁板所以書政治之愆失古今注云大道交衢施之韋昭云堯時然也後世因之今宫外橋梁頭四柱木也崔浩云木裂柱表四出名桓陳楚俗曰和曰和表聲之訛而又書銘竹帛瑑戒杅柈墨子謂人莫躓于山而躓于地是故翼翼民上如臨不測之谿戰戰栗栗罔敢暇豫允恭以持之虚静以待下心存天下而志加于窮民民一有饑如已饑之民一有罪如已䧟之是以篤實光輝被四表而塞天地淮南人間云堯戒曰戰戰慄慄日慎一日人莫蹪于山而蹪于垤賈誼書堯曰吾存心于先古加志于窮民痛萬姓之罹罪憂衆生之不遂也先古說苑作天下翼翼金匱惴惴虚静出家語率天下以仁而人從之故天下以均平百姓按静不知喜不知怒欣欣焉樂其性故一出言而天下誦萬物齊使之而成户之而止惟恐言而莫予違也管子云禁之而止猶埴已而撚莊子云堯治天下欣欣焉樂其性是不恬也不知喜不知怒善卷語初重黎受職髙陽之代髙辛氏衰摰三苗復九黎之事民興胥漸罔中于信而二官以廢閏餘乖統民黷齊盟上帝不蠲苗民遏絶于是復育重黎之後使纂舊業九黎𤣥都也别自一人說者以為祝融黎妄矣其亂在少昊時此其後世班志云髙辛氏衰三苗復九黎之事二官俱廢帝乃復育重黎之後此本楚語故或謂堯滅苗民吕刑注遏絶為堯也程伊川云只是舜乃命羲和絶地天通羲載上天黎獻下地俾主隂陽羲和居卿而致日傳云日官居卿乃命為天地之官分命為四時之職六卿也故周禮疏序舜格祖之年堯始以羲和為六卿春夏秋冬并掌方岳是為四岳出則為伯羲和與下叔重六人也孔氏以其分命謂即下四人故頴達云有叔仲無伯季者以其不賢豈羲氏伯季不賢和氏伯季亦不賢哉故疑國語史記羲司天和乃司地而書則羲和通掌天地按齊職儀云太宰品第一堯命羲和使主隂陽羲伯司天則天官也故昌言云冢宰堯官則固有羲伯為天官卿矣頴達謂時羲和似尊于諸卿後世稍卑之不得謂無伯季立渾儀曜鉤云唐堯即位羲和立渾儀盖名渾爾王著云渾天儀羲和之舊器考靈曜乃命中星觀玉儀之游注以玉為渾儀也欽若昊天厯象日月星辰厯數也象占也星四方之中星辰日月之所㑹敬授人時帝堯時事以寅正時命羲仲宅嵎夷敬賓出日平秩東作張昏中而播穀書帝命騐禺鐵在遼西即青之嵎夷近出日故敬賓出之古者君臣尊天事如此一云春夏民欲早作故令民先日出而作是謂寅賓出日秋冬民欲早息故令民候日入而息是謂寅餞納日春迎其來秋送其去無不順命羲叔宅南交南交故交趾郡一行云開元十二年七月戊午當食自朔方至交趾候之不差知堯亦于此候日四方既定然後可以候日月出没測星辰運行以起厯法平秩南訛敬致所謂日至化者南方火盛物化易則歲終東北代易今書作訛以勸南偽繆矣一作為云東作南為西成朔易以人事言火昬中種黍菽齊職儀云羲叔為司馬夏官也命和仲宅西寅餞納日平秩西成宵昬虚中而傳麥西隴西漢之西縣其地周望栁谷敬送日而納之春陽故言日秋隂故云宵周官言中春晝中秋夜同日中星不見故不指一星昏中惟一宿故不及他宿星鳥以四象言鳥火以辰次言虚昴以經宿言之此四方之中星以分至昏見者也朱鳥七星星為中故言鳥以見其體乂為鶉鳥言火以見其次以見堯法之密昔王孝通詰傳仁均推歩之法謂日短星昴以正仲冬七宿畢見舉中宿言之仁均専守昴中說誤矣且月令昏璧旦昴甲子元厯推合堯時冬至日在危合昏時昴星正午先儒誤連星鳥星虚讀之故不解爾大傳春言張昏中秋虚昏中道其常也命和叔宅北幽平在朔易霤昏中而収歛幽幽州易易州東始北終相代易古有易地王肅謂四子居京師而統之有時述職故疏謂在京都而遥領修劇厲謹盖藏畋獵斷伐上告之天而賦之民天子南靣視四星以知民之緩急急則不賦籍不舉力役考靈曜視四星之中大傳同舜廵三岳一如岱禮堯命三時一如春令以見聖人之治簡而不亂純而不雜君人法此優㳺矣故二典之言常道也著推術設蔀首演紀于虚之初建困敦而首大吕易乾鑿度云堯以甲子天元為推術注云以甲子為蔀首起十月朔竹紀年云堯元年丙子故隨袁光云堯以丙子受命四十九年得上元第一紀甲子天正十一月庚戍冬至至仁夀甲子凡八經上元然考堯以戊寅即位而非丙子四十七年始得天正甲子是年冬至日在虚一度為演紀之端在位百年禪舜舜五十年起戊午自天正甲子至開元甲子三千一年日退三十八度四千一百二十八分日至在斗十度下至皇朝慶厯四年甲申積凡三千三百二十一年日退四十二度五千五十八分是歲冬至在斗五度以歲差考之每七十八年而差一度則堯甲子歲日至在虚一度于是中星皆正皇甫謐邵堯夫皆以堯為甲辰即位舜以壬午堯在位七十載皆誤朞三百又六旬又五日而期以閏月定邪而成歲攽之諸侯而臧之祖在天為度在厯為日合朔旦則月有小盡之法取之以加歲外之餘此閏之所起故古人謂之首氣于節六六日示斗建于月半之辰退閏餘于相望之後必得閏乃能収天地之餘氣使四時之不忒故無閏則時不定歲不成三年無閏則孟為仲九年無閏則以秋為冬羲和知朞之日以閏定之則天道之運舉積此矣百工因天運而作者必以此允釐之沈括去閏之論亦妄人也析因夷隩不失其宜以故單民得職而不佻不病山不槎枿畋不䴠胎故鳥獸孳尾希革毨縟咸若正星而後正時正時而後正民事民事正乃及鳥獸草木帝治非止及民桐梃東廂蓂生下庭龜書乃來于是稽蓂以正月訪桐以定閏録龜字而施之是曰龜厯伏滔述帝功德銘云胡書龜厯之文盖堯厯曰龜厯述異記陶唐世越裳獻千歲神龜背有文紀開闢以來録為龜厯唐事始言堯因軒轅靈龜有圖作龜書也分積定時日得故百穀又而風雨時百工釐庶功興帝之出也萬物作焉帝之入也萬物復焉物方作則聖人之治政事者衆績于是熙物既入則聖人之治政事者庶績于是凝熙其作如春焉凝其成如秋焉故堯于成歲言衆績熙陶于撫辰言衆績凝乃命遏伯長火居商丘祀大辰而火紀時焉是時于心故因其出入而望之以修其官而戒民事是為火祖命倕為工作和鍾利器用向列仙傳赤松子輿在黄帝及堯時為木工或云即垂非命母句氏作離磬世本樂録云磬叔所造乃無句也一作無間禮記云叔之離磬古史考云堯時人制七絃徽大唐之歌而民事得文心雕龍云堯有大唐之歌舜有南風之詩辭達而已琴清英云五絃堯作二絃新論廣雅等謂二絃文武王所加妄也通禮義纂堯使母句作五絃誤七絃也命質放山川谿谷之音以歌八風作大章之樂禮書質作􅬣或云即䕫以世紀作䕫也擊石拊石上當玉磬乃麋􅛘置缶而皷之立瞽叟􅀈五絃之瑟為十五絃命延􅀈瞽叟之所為瑟益之八絃以為二十三絃瞽􅀈或作瞽叟紀原瞽叟作十三絃之瑟誤也董遒謂秦文以􅀈為佶云與嚳同制咸池之舞而為經首之詩以享上帝命之曰大咸樂動聲儀云黄帝樂曰咸池而大司樂以咸池祀地云又夏日至于方澤奏之堯盖用黄帝之樂大咸樂章有經首之類莊子所謂中于經首之㑹者教國子舞大咸注云堯樂者也作七廟七廟古制虞禋六宗尹言七世之廟禮酬六尸一尸發爵六尸旅之非自後世虞嘉云七廟不始于周建隆元年張昭議堯舜禹皆立五廟二昭二穆與始祖商改立六廟昭穆外増契與湯周七廟親廟外加太祖此先儒牽于禮緯元苞非孔子意立五府以享先祖而祀五帝杜佑云唐虞祀五帝于五府羊宏云黄帝合宫堯五府皆明堂也書帝命驗云帝者承天立五府以尊天象蒼曰靈府赤曰文祖黄曰神計白曰顯紀黒曰𤣥矩注唐虞之天府夏世室同矣祭以其氣迎牲殺于廷毛血詔于室以降土神然後樂作所以交神明也乃設五吏立祈祥五吏五官齊桓公欲藉宫室六畜管仲不可謂立五厲之祭曰昔堯之五吏五官無所食請立之以祭堯之五吏春獻蘭秋歛落則澤魚百倍異日無屋粟邦布籍此謂祈祥推之以禮義也或以為五行之官非守歲之盈虚乗民之緩急正其甲令而御其大權燒山林焚沛澤以通刀布堯布文作上十全又亐大止又一品小者􅀢盖古文泉久在水水詳董譜元澄云周外府掌邦布之出入藏曰泉流曰布則錢之興也始于六品欲令代匠均同圓流無極布幣泉貨一也乃為金三等禺氏邉山之玉赤野末光之珠上幣汝漢右洿之金以為中幣泉貨以成下幣勝禽獸之仇大夫隨之鞚財髙下以衡民之好惡焉楚世家注三錢府虞夏商周錢幣三等赤白黄為上錢為正故平凖書云虞夏之幣金為三品黄白赤非惟虞夏管子云堯舜之王所以化海内者北因禺氏之玉南貴江漢之珠其勝禽獸之仇以大夫隨之桓公曰何謂對曰令諸侯之子將委質者以雙虎之皮卿大夫豹飾列大夫豹蟾則將㪚其邑粟財物以求之故山林之人刺其獸若從親戚之仇君冕服于朝而猛獸勝于外大夫散其財物萬人得受其流矣此堯舜之數也而又為之儲偫以備其歉故沈菑九刈雨雹彌旬而下亡菜色兎園策注堯湯之時三年耕餘一年之食謂之升平九年耕餘三年之食謂之登平二十年耕餘七年之食謂之太平徐光對石勒云堯時暴風雨雹九日楊震曰堯遭洪水而民無菜色西夏廢志惠而非兵隳城守棄武德好貪以求于民于是伐而亡之有唐不享于是偏以劘之䘮之丹浦西夏事見神武秘略及吕春秋吕氏又云堯有丹水之戰丹水在今商洛其地近唐故鶡冠子云堯伐有唐今南陽之唐鄉也六韜乃謂堯伐有扈戰于丹浦世紀則謂堯伐有苗于丹水之浦非惟地理遼濶而伐苗乃舜伐扈乃啓皆非堯文字之誤如此在位六十二載沈䝉洚水演天方害龍門未闢吕梁未發后土冐没而填星逆于水府詳後魏書張淵傳帝乃憂中國之不康詔曰洚水滔天下民其咨孰能使將任焉四岳稱􅕐帝知􅕐之圯族方命而民患弗可竢方命則不知敬君圯族則不知愛親猶不妨于水事又自中國至條方莫薦于是試􅕐俾司空欽哉程晏云云汲害也試􅕐以其僉同所謂稽于衆九載功用不成而止九載三考績嗟乎予于用􅕐見堯之仁汲焉當是時禹年穉而在廷之可就水者莫􅕐若也及􅕐垔水而後帝知厯厯運之遭七年衰志閔復覘嗣子之嚚訟于是巽遁之願軫焉充治斯云年歲水旱非政所致堯洪水湯大早皆以為有遭遇按太乙厯數有所謂大水浩浩周世宗使使竇儼論水沴云隂陽水火之本隂之主始于淵獻水之行犯于九六凡千七百二十八歲為浩浩之㑹乃當此之時陶唐之君不能弭其患至于后辟狂妄以自率權臣詐冐以下專政不明賢不章苦雨數至潦水厚積若德宗壬申之水是政也昔魏主疑任􅕐九年為失序庾竣云聖主不容無失竊詳書傳皆言堯水九年此讀書之誤使九年則􅕐當之矣又何俟禹之八年且其命􅕐時已非一年矣禹之用亦非按殛􅕐年盖是数十年亊洊之窫窳鑿齒九嬰十日大風封豕長它之害民㒺攸止按經融天之山有人曰鑿齒羿煞之又羲和君之子曰十日而傳以吳為封豕長蛇北伯封之子亦號封豕盖大風九嬰等皆當時兇頑貪婪者之號如檮杌饕餮之類應劭以貐類貙食人服䖍以鑿齒長五尺似鑿食人大風風伯九嬰以火之怪妄以為真蛇豕怪獸大風十日者妄于是澤兵稱旅屠長它于洞庭射十日繳大風于青丘殺窫窳禽封豕于桑林乃誅鑿齒于疇華之野戮九嬰于凶水之上而後萬民復生四方同塵夷夏廣陿險易逺近始復道里長它即所謂巴蛇在江岳間其墓今巴陵之巴丘在州治側江源記云羿屠巴蛇于洞庭其骨若陵曰巴陵也青丘記為東方澤疇華南方澤凶水在北狄或曰臨濮西三十五清丘也淮南子以為堯皆命羿除之故許氏云羿臣堯河伯溺殺人羿射其左目風伯壊人室屋羿中其膝又誅九嬰窫窳之屬非有窮君也歸藏楚辭言羿彃十日非天之日矣于是為世載七十矣天下猶未平洚水横流草木暢茂獸蹄鳥跡之道交於中國堯實憂之乃疇咨能若時之賢以屬天下之統方是帝畿巨浸稽天而冀人虞舜身修家正所在數有美祥四明山記云堯時有老人持圖曰予姓伊名獻諸山洪水遇舜則正矣亦數也真源云年大饑惟舜所熟帝知其聖然猶忌其私也爰巽四岳岳辭其德弗辱則又俾之顯揚幽側而岳且知帝之在舜以舜錫薦于是舉之童土之地而厯試之命為司徒二女女焉觀厥刑于二女官材任士一耳目之而不疑舜修畎畝之中而聞之堯此舜之難堯㳺巖廊之上而知畎畝此堯之難也是必舜之聖德章如日月故能以一野人而達之人主帝曰師錫則衆舉知之帝曰予聞則堯之知之審矣然則豈徒遜哉方其薦岳俾揚側陋盖可知矣夫咨若時而放齊舉朱知若時為是位咨予采而驩舉共工亮采百揆職也欲帝不用之二事齊以常情信堯父子世及古今通義其遜四岳也亦將使自推之猶漢文時請建太子帝曰楚王梁王淮南王皆舉德以陪朕之不能有司請曰子啟最長寛厚請建為太子也帝于時授位之意决矣事之畎畝之中未為司徒也帝曰欽哉然後為司徒故孟子曰國人皆曰賢然後用之大傳謂堯為天子朱為太子舜為左右堯知朱之不肖必將壊其宗廟滅其社稷而天下同賊之故推尊舜屬諸侯焉致天下于大麓之野夫堯之治天下豈惟朱之憂二女事之豈復使之佐其子乎世無知堯此固難其言也薦之天暴之民天子不敢以天下予人三載稽厥行事亡不時叙于是㳺于康衢聞童之謡曰天生蒸民莫匪爾極不識不知順帝之則乃還宫召舜而乃命以位正月上日授終于天府而遂老焉天府即五府書帝命驗云帝者承天立五府以尊天注云天府五帝集居太㣲降精以生聖人故帝者承天立五帝之府是為天府于是修壇河洛擇良議沈仲月辛日昒明禮備榮光出河休氣四塞越歲仲春率百工沈璧于洛且告䄠事握河紀云堯即政十七年仲月甲日至于稷沈璧于河青雲起囘風摇落龍馬銜甲赤文緑字自河而出臨壇吐甲囘遰云云又沈璧于洛赤光啟有靈龜負書出背甲赤文成字止壇世紀堯與羣臣沈璧于河乃為握河紀今中候也詳說見餘論禮聖姑射拜師沮洳姑射山在臨汾廣固北平陽界曰平山是為壺口山冀州圖經云西入文成郡以山為界有故堯城及堯祠述征記堯廵登此山陞首山道河渚遇五老而濟焉論語撰考云堯修壇河洛擇良議沈率舜等升首山道河渚有五老㳺焉相謂河圖將來告帝以期云云亦詳野王符瑞圖說在餘論乃賞侯伯封偰棄世紀始封稷契臯陶褒進伯禹又東沈書日畟受圖以歸即日稷鄭讀為側故宋均云稷側也世紀吿禪後二年刻璧為書沈洛今中候論衡篇也所授之圖書今握河紀也考靈曜云五百歲聖紀符四千五百六十精反初握命乙起河出圖聖受思鄭云聖謂堯也天握命人當起者河乃出圖堯受而思之以厯數也始舜之攝俾益掌火禹平水土禹疏九河瀹濟漯决江漢排淮泗而注之海益審封植烈山澤禽獸逃匿然後人得平土而居而食未足禮莫起于是富而教之俾棄為田教之稼穡五穀熟而人民育然後拼偰司徒教以人倫于日之徠之匡直之輔翼之又從而振德之彊于行薔于志以養天下之形是以庶政惟和萬國咸寧民皆廸吉莫不振動服化比屋可封而隮仁夀揚終傳云比屋可封者堯舜為之隄防也大抵堯之治有上中下三自命羲和而日月星辰得其序為上治自若時登庸而公卿大夫得其職為中自洪水方割而山川丘陵順其理為下聖人之能事畢矣乃渉流沙封獨山訓大夏討巨􅙕西暨沃民東𨽻黒齒貫匈離耳天督該首莫不有仁義之心軒常之志獨山在毉無閭東北九十巨􅙕今朔渠㮴縣鄭以為二國誤不言南北已見命羲和中二十有八載㳜然寫其天下之尊爰與方廻㳺于陽城乃徂落魂氣徂體魄落落降徂往堯于是死形乃死者鳯靡鸞訛之謂百姓如䘮考妣三載四海遏密八音親如父母信哉我忘天下易天下忘我難如甚也四海親如父母三載遏密八音盖不能使之忘我也衝波傳云宰我謂三年之䘮日月既周星辰既更衣裳既造百鳥既變萬物既易黍稷既生朽者既枯于朞可矣顔淵曰人知其一莫知其他俱知暴虎不知馮河鹿生三年其甫乃堕子生三年而離父母之懷予雖辨豈能破堯舜之法改禹湯之典更聖人之文改三年之䘮哉父母者天地也天崩地壞為之三年不亦宜乎是三年之䘮堯舜之制也此言堯崩四海思慕堯德且明舜雖受終天下服䘮三年如繼世之禮非率天下諸侯以為三年䘮也葬濟隂成陽西北四十里是為穀林通樹之墨子曰古者聖人制為葬埋之法曰桐棺三寸足以朽體衣衾三領足以覆惡堯北教八狄道死卭卭之山衣衾三領滿抗無封已葬牛馬乗之舜西教八戎道死南紀之市既葬市人乗之禹東教于越葬㑹稽之山桐棺三寸皆下不及泉上不通臭三王豈財用不足哉為葬埋之法也云死卭山妄矣墨意盖謂堯舜皆以勤民死不于家爾劉向云葬濟隂丘隴山續征記小成陽南九里通典曹州界有堯家堯所居王充以為堯葬冀州或云葬崇山妄之甚宛心約志以從事于亡為隱不肖舍已從人處撝宫徽神暢不施智力而萬國平古今樂録云堯郊天地祭神示在坐響誨堯曰洪水方至為害而子救之堯乃作歌故琴譜堯有神人暢大周樂正之序自堯神人暢九十三弄為上名琴道云堯暢者達則兼善天下無不通暢之謂居衢室隱精神篤恭而王天下不廢困窮不敖亡告是以離畔者少聽從者衆鄰國相望彘犬相聞而正迹不接諸侯之竟車軌不結千里之外蒼髫巷歌黄髪擊壤帝何力之知哉論語比考云叔孫武叔毁仲尼如堯民云堯何力功者事見列子王充云堯時天下太和百姓無事有壤父五十餘人擊于康衢有觀者曰大矣堯之德也壤父作曰吾日出而作日入而息鑿井而飲耕田而食堯何力之有世紀及列士傳云八九十老人擊壤歌于康衢文子曰堯治天下舜為司徒棄為司馬禹司空稷田疇奚仲為工師是以離畔者少聽從者衆猶風之過簫忽焉感之各以其清濁應萟經云壤以木為之前廣後狹此後世依倣而托之者風俗通云形如履長三四寸下僮以為戲俱妄要是􅒱擊土壤爾始帝在唐夢御龍以登雲天而有天下見夢書世紀等昔齊髙帝年十七夢乗青龍上天西行逐日每懷憂懼及出鎮淮隂淮南守孫奉伯嘗同卧夢帝乗龍上天已于下捉龍脚不得而死故夢書為不誣及資有天下制在一人管子以德化為冠冕以稷偰為筋力都俞吁咈于一堂之上是以德政清平風教大洽化格上下而信孚于升濳慶雲鮮菩五緯順軌景星炳曜甘露被野神禾滋畝朱草茁牧澧泉泆岫倚翣生厨蒲薤茁鳯巢閣榮光幕河河馬輦籙一日而十瑞至見世紀典術云聖王仁功濟天下者堯也天降精于庭為薤感百隂而為昌蒲故吳氏本草昌蒲名曰堯薤倚翣􅛋莆也冬死夏生俗作􅛋脯謂肉物者妄說在餘論書中候云堯即政七十載德政清平比隆伏羲鳯凰巢于阿閣驩林景星出翼軫朱草生郊嘉禾滋連甘露潤液醴泉出山修壇河洛榮光出河休氣四塞述異記王義興表云堯生神禾晉有蠱栗詩含神霧云堯時嘉禾七莖三十五穟古之聖王不貴祥瑞理人事而瑞應之因并著以見至治之馨香者上黨有慶雲山上黨記云堯將興慶雲出之矢心與治立于靈扉雲生牖坐于華殿松生棟萬物皆備于我而亡黄屋之心舉天下以為社稷非有利也故垂襞幅委輕裘而天下治僥民獻其没羽封人祝之夀富翕然各以其所重報是以比隆伏羲後世莫及先聖本紀云許繇欲觀帝意謂堯曰帝坐華堂之上靣雙闕之下君榮願已得矣堯曰余立雲扉之内霏然而雲生牖坐于華堂之上森然而松生棟雖靣雙闕無異崔嵬之冠蓬萊雖背郭無異囘巒之縈崑崙予安知其所以安榮孔子曰人之所貴為天子者為其窮耳目之欲適五體之宜也采椽葛衣藜羮土機人之所棄而堯安之勤勞求賢以恊治舉天下授之舜如舍儋然大哉堯之為君也惟天為大惟堯則之蕩蕩乎民亡能名焉巍乎其有成功煥乎其有文章而疇人云堯以義終舜以事没稽諸典祀貽世永教游夏之徒豈誣也哉見韓子淮南子等劉子政曰古有行大公者帝堯也貴為天子富有天下得舜而傳之不私其子去天下若遺躧于天下猶然况細于天下者乎帝初取富宜氏曰皇生朱皇即女皇世本帝系漢書等云女皇生丹朱帝繫人表作散宜氏繆堯三妃一后或云即中山夫人靁澤縣西五十歩有中山夫人祠云堯之四妃張謂舜廟碑謂堯舜皆娶一姓也朱即嗣子朱說文引虞書作丹絑御覽世紀女罃生丹朱非也安國以嗣子朱别一人妄驁佷􅎱克兄弟為䦧嚚訟嫚游而朋淫朱于兄弟有䦧故鄒陽傳云骨肉為讐者朱象管蔡是也帝悲之為制奕棋以閑其情愽物志堯造圍棋以教丹朱故中興書陶侃云圍棋堯以教愚子虞愿亦云朱明言堯帝以此教丹朱非人主所宜好使出就丹御覽尚書逸篇云丹朱不肖舜使居丹淵為諸侯號曰丹朱乃堯居之丹見漢厯志竹書云放帝丹朱于丹水今朱虚縣有丹山東丹西丹二水水近有長坂逺峻謂之破車坡記為丹朱弄奕之所今青之益都有堯山三齊記堯廵所登伏琛云山南有二水名東西丹然鄧之内鄉亦有丹水漢丹水縣荆州記為丹川堯子所封即丹浦堯敗有唐之處盖非朱國帝崩虞氏國之于房為房侯韻云舜封丹朱為房邑侯今荆河之畀房同作防昭王后家以奉其祀服其服禮樂如之謂之虞賓天子弗臣夏后封之唐如虞之禮朱卒葬笰陽相之安陽永和鎮南有故堯城開皇四堯城縣以為堯居乃朱居也相圖經引孟子注舜封丹朱于白水白水乃今清河盖夏封之在鎮西南三里有丹朱陵南八里有帝子夜游臺周二百歩相臺志云丹朱嫚㳺之地笰䣡同羛陽鄉在内黄北二十羛陽聚元和志丹朱墓唐山縣東一里寰宇冢在永定東二里有唐縣有䲨郎城九州要記云堯時丹朱所居相之冢為是矣而經注城陽有丹朱塚海丙南經蒼梧之山帝丹朱葬于隂無信朱生陵以父封為丹氏房氏防氏陵三十五世鍾昭王世采靈夀生沈姓書陵四十八代孫雅莽時為清河守又云沈十二代孫雅俱繆也又有屋引氏晉初房乾留虜改為屋引後隨魏南遷復之而河南猶有此氏又沛相朱自云丹朱後故姓録以沛郡朱為丹朱後非朱之兄考監明先死而不得立庶弟九莊子云堯不慈故云殺長子殆先死爾而近尹子其四譏論乃有堯囚十子天下不論之無義之說淮南子云堯得舜任以百官属以九子孟軻亦有九子之說然說苑堯時舜為司徒契司馬禹司空稷為田疇䕫樂正倕工師伯夷秩宗臯陶大理益敺禽獸九子為臣堯知九職之亊使九子者各受其事以成九功則非堯之子矣盖自二事云其封于留者為留氏留與劉同張良之封字只作㽞故說文止有鎦而無劉漢因識始為卯金刀之說妄也劉康公亦作封鎦周初匡俗事老子劉越劉亦非至秦方有文子華子有留務茲日有傳有留長孺功臣表有留盻吳有留贊與漢同出宋武以竟陵誕反貶其族為留氏不知乃其本姓也後有劉累以豢龍事夏𦙍甲賜之氏曰御龍以更飂董之後既遷于魯事具左傳襄二十四年宣子之言及昭公二十九年蔡墨之言云使豢龍以更豕韋之後非也豢龍乃已姓廖叔之後豕韋之族爾宣子云在商為豕韋亦妄商居大夏為唐氏御氏擾氏擾龍氏周書王㑹解云堂下之右唐公虞公左則夏公殷公是也至周封帝後于鑄鑄祝是分侯于隨為鑄氏祝氏隨氏周有鑄仁達臧宣叔娶于鑄者禮傳皆作祝聲同轉吕春秋云封後于黎丘其處也祝睦二碑云出髙辛祝融非既更累之裔于方城為唐公傳謂成王以舊唐封叔虞而更之非楚併唐其徙杜者為杜氏唐杜氏屠氏唐孫氏李氏杜伯友為卿士宣王四十三年誅之杜蒯記作屠簣唐賜杜伏威為李氏達云武王並封堯後為唐杜二國非滅唐封杜又炫云唐非豕韋後杜亦未必是安知滅唐遷杜司馬貞謂唐杜陸終後亦非杜更為祈晉文妃杜祈是故世紀謂堯姓祈也杜伯之息隰叔如晉生蒍字子輿為李以正于朝朝亡間官故氏為士氏李理同土官也晁說之書說謂雲土為古杜字如詩言桑土因有土氏而以陶唐氏豕韋氏御龍氏為土氏之宅後為唐杜氏遂以蒍縠㑹丐爕鞅吉射富魴皆為士氏矣為士員士弱士文伯景伯為士氏異哉及官司空以正于國國亡敗績故氏為司空以正于國國亡敗績故氏為司空是生士縠為縠氏縠生㑹㑹采隨故氏為隨是佐文襄諸侯亡惡謖傅成景軍亡敗政中軍太傅端法集典國亡姦民是以受范故氏為范逮文子爕能穆宗侯爰受栒櫟故氏栒櫟作郇非士魴受彘故氏為彘臯夷采函與故氏函與而魴氏陽氏士丐氏士季氏士吉氏士為氏士思氏司功氏祈成氏士弱氏胥氏張氏陶氏朱氏陶朱氏鴟夷氏范雎䝉難變稱張禄入秦為丞相應侯范蠡功成去為鴟夷子號陶朱以范仲淹隨母嫁朱復姓啓及之姓纂又有士弱氏姓源韻有士丐氏亦作士貞按此左氏文當時語未必有也風俗通晉大夫有司功景子世本云匄弟他晉司功為氏又風俗通范蠡之齊為鴟夷子後人以為氏濳夫以為鴟夷出于子姓宋㣲子後恐目夷之誤其犇秦而復也秦歸其帑其處者生明為劉氏明生逺逺生陽十世孫獲于魏為大夫生清始居沛生仁是為豐公生煓是為漢太公字執嘉士安云名四子伯仲邦交世紀昭靈后名含始㳺于洛池有玉雞銜赤珠刻曰吞此者王含始吞之生高祖握誠圖詩含神霧云執嘉妻含始生劉季索隱乃云母湯氏貞時餘泗水碑天德光堯㓟項授沛邦實著符是為漢祖炎祚復煇載祀四百以其留秦故為留氏而左氏謂其處者為劉氏夫伍員屬其子于齊使為王孫氏知己必死預令改族故傳為發之士㑹之帑在秦不顯于㑹之身復無所避而傳言之故達炫之徒深疑此文非傳本㫖盖漢初左氏不顯先儒無以自申劉氏從秦徙魏原出劉纍挿注此辭以媚于世明帝時賈逵上疏謂五經無証圖䜟明劉氏為堯後者左氏獨有明文前世籍此求通故引之為証爾有漢氏厥氏兀氏紅氏横氏吳氏宗正氏中壘氏谷蠡氏獨孤氏公族氏陳氏徐氏吳氏芮後望濮陽長沙漢沛獻孫進伯因孤山下生尸利單于以為谷蠡王號獨孤部七世羅辰從魏徙洛為獨孤氏後漢谷蠡王獻為谷蠡氏漢賜衡山王為厥賜安樂王為兀而廣陵陳乃後漢魯相無子以外孫劉嶠嗣曰陳嶠又蜀齊王徐畊乃杜悰之遺蘖何氏姓苑東莞有漢氏劉備立蜀再世而魏滅之裕起南朝者八世有員氏留氏宋書劉凝之慕伍員忠烈為員氏唐書云半千七世祖改按半千家狀云宋營陵侯遵考子凝之事魏太武以忠比伍員改江休復雜志堯山民得半千銘云十八代相賜然員古有平聲出于鄖前凉録有員敞員平自音運嗟乎物固未有張而不弛成而不毁者也惟聖人能盛而不衰帝之傳天下非為讓也為有法度而朱弗能統也漢承堯祚著矣而杜林等何知哉火德相承東觀記杜林云漢德基業特起不因乎堯堯逺乎漢人不曉信終不說諭而揚光輔對仁宗云堯舜之事逺矣亦未易行是何鄙陋不敬如是先是房之後有貍氏裔子大繇夏后氏封之傅為傅氏見傅子貍氏事出國語甚顯姓書云出季貍大妄唐表云繇黄帝後韋昭云貍氏在周為傅亦非說築于巗商宗得之陞為太公又有傅餘氏餘氏晉傳餘顔著復姓録云出傅氏史謂得之傅巗名為傅氏非也傅餘猶梁餘韓餘也姓書猶有說氏妄其分于冀者為冀氏春秋時冀子帝之後又有薔氏御氏陶丘氏周生氏堯氏姓纂丹朱居陶丘為氏焞皇實録云魏侍中周生烈本姓唐外飬周氏因為姓亦見七録及中經簿姓書又有堯氏云出帝堯雖未足考然隨有鷹揚將軍堯泰矣又周賜唐環為紐于氏劉志為宇文氏劉亮為侯莫陳氏至隋皆復慶都葬靁澤贊曰聰明文思蕩蕩巍巍惟天為大惟堯則之不激不委因事立法昭義崇仁内穆外協詢政行人問老衢室茅茨土階允恭勿失萬物備我生化咸宜誦言行道比隆伏羲子曰大哉堯之為君也惟天為大惟堯則之蕩蕩乎民無能名焉嗟乎堯之治天下豈有竒謀秘計而日與之為鬬哉生者自生死者自死而已矣天下大器為者敗之生者不得不生死者不得不死堯何心于間哉隱精神居衢室固已雲行雨施而見品物之流形矣立于櫺扉而雲生牖坐于華殿而松生棟何容心哉吾知都俞吁咈一堂之上而已矣日往則月來月往則日來天何言哉四時行焉百物生焉此天之所以為天也委輕裘垂襞幅堯何為哉月白風清萬籟空而七絃定此堯之所以為堯也陽光之熙羣目之隨浹沐之聚羣心之豫豈有心于為哉林焉生總焉羣一日而風之二日而霖之三之日蕩然矣天地不異化萬物無異性無攖則寧無拂則全此同然之情也聖人者操造化之權以鼓舞動蕩而作成之爾三年成一葉則物之有葉者固鮮而一日揠其苗則物之成性者亦罕矣道之以政齊之以刑而天下始慘然矣風之過簫芴焉感之各以清濁應離畔者少服從者衆堯豈家至而日見之哉蒼髫巷歌黄髪擊壤果何力之有邪天生烝民莫匪爾極不識不知順帝之則堯之所以為大固有不俟孔子而後知者然而猶曰修已以安百姓博施濟衆堯舜其猶病諸是何邪盖凶旱水泆天有所不能全寒饑疾痛天有所不能蔑洪水十日此九六之大㑹也而堯于此能通其變而不抵于窮七十在位弇茲日薄而若時之庸猶未適也咨若予采而獲象恭之夫咨乂滔天而得圯族之子帝之心果如何邪九載之績弗成而密藏之意已迎鏡壇宇間矣能庸命朕位巽吾亦何意于天則哉昕而作夕而瞑安時處順亦適然而已矣庸君事采臣事二典言庸者三言采者三如登庸如奮庸庸命皆君事也如亮采如予采載采采皆臣事也前此無能知者若時者指言能順天時即言農功曰庸非所譬矣大抵帝堯之政不過天地人之三事厯象日月者天亊親族叶邦者人事而東作西成者地事也今欲若時為天事而不得其人欲若采為人事而不得其人欲乂水為地事而又不得其人則亦無可幾者天下之事亦如此而已矣堯以是知天之厯數有不屬乎我而有在夫人者故一舉而遜之夫以三者之咨其文皆舉而無結至于治水又以無功則此篇特為遜位一事張本明矣且昔聞之堯之治天下七十載不知天下之治與不治億兆之願已與不願已也顧問左右問在朝問外朝俱不知也乃㣲服于康衢聞立我之謡喜而問焉曰誰教爾此言者則皆曰聞之大夫問大夫曰古詩也于是還宫召舜甥而禪之舜不辭而受焉舜之紹堯惟不異于堯也承安引佚萬物皆作履中行善日月照而四時行庸非天邪故子晉曰如舜者天舜居其所以利天下奉翼逺人咸得其人此之謂天易曰乾元用九乃見天則此堯之所以同天也首出庶物萬國咸寧此舜之所以亦天也彼之引竹書援地記而上疑夫兩聖者亦欺詬唾射之徒爾雷動風行鳥歸獸息而驢鳴狗㺝方此大作曽何傷于在上哉祗見其弗知量爾路史卷二十

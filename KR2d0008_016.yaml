body:
  text: 路史卷十六宋羅泌撰後紀七疏仡紀小昊小昊青陽氏少昊幣文作小周書亦作小顥紀姓世紀青陽姬姓古史攷云窮桑氏嬴姓非春秋諸紀系出可見名質周書云乃命小昊清司馬烏師以正五帝之官因名曰質質贄同故史傳多云名摯而以為髙辛之子誤矣是為挈世紀云少皓名摯亦見世本宜與摯通即攷挈本作栔乃契刻字故年代厯云少昊名栔或云名契溝洫志栔苦計切而契刀文正作栔汗簡直以栔為契然質在周書若果為贄徃來音呼其父曰清黄帝之第五子方傫氏之生也累傫嫘間本皆從畾以音靁𨽻省從田大戴禮嫘祖生昌意方雷生青陽而史記𤣥囂亦雷祖所生然史以𤣥囂為青陽則非也青陽少昊之父也故帝徳攷云青陽之子曰摯而曹植贊少昊云青陽之裔則少昊為青陽之子信矣蓋少昊亦號青陽帝王年代紀以少昊為帝青陽故世誤以為一人辨見發揮胙土于清是為青陽清在鄆故樂平漢髙帝封宫中同為清侯國大戴禮黄帝之子少昊曰清又云青地也一曰青陽屬鄭杜云滎陽中牟西清陽亭是按清有四詳國名記然雲陽本曰青陽昔荆獻青陽以西于秦者今長沙蓋帝之始封亦繇清音二地一名少昊父子同以為號或少昊襲先封之名以來雲陽猶商亳楚郢重名者今其後裔猶曰青陽可見知少昊非黄帝子者母異也元為紀姓蓋初得紀而為姓配于類氏曰娥居河之微逆星流槎奏便媚之樂樂而忘歸震而生質白帝子也見拾遺寳櫝等記曰星娥一作皇娥處于璇宫夜織撫臯桐梓琴與神童更倡白帝子太白也因有桑中之目多過實故不摭既生其渚為陵地有興廢各因其時休子云少昊生于稚華之野其渚一旦為陵鬱鬱葱葱焉此亦闗軸轉動而發者有說見餘論秀外龍庭月縣通􅀈襲青陽以處雲陽故謖號以青陽亦曰雲陽氏攷古帝王皆兼所興之地以為號張晏云少昊之時天下之號象其徳顓頊以來天下之號因其名髙陽髙辛始以所封之地則非也以金寳厯色尚白邢昺論語疏云女媧尚白神農赤黄帝黒少昊白髙陽赤髙辛黒陶唐白有虞赤此以三正言之非五運之所尚故又曰金天氏金西方之行世以號之如西岳之號也洪慶善云以金徳王白精之君惟能任道不事心不動力逺憲大昊而乘西行是稱少昊南方火北方水水精火神故夏曰神農冬為顓頊東西二方春秋二氣之中其氣昊淑故歐陽書四天春昊夏蒼吕覽九野東蒼西顥顥皓昊皥同昊者髙廣以和之謂也有大小爾爾雅春蒼夏昊特取其大洽聞記言夏炎冬昊則差矣禮志云西方少昊譙周云金天氏能脩太昊之法故曰少昊少者小之文古字只用小其即位也五鳯適至而乙遺書田俅子云少昊之時赤燕一羽鳥飛集戸遺其丹書五鳯見春秋内傳故為鳥紀鳥師而鳥名後魏登國中嘗以鳥名官故魏書美其好尚淳樸逺師少昊者夫魏興邉朔少識典墳鳥官創置豈關郯子之言哉乙鳥氏司分伯趙氏司至蒼鳥氏司啟丹鳥氏司閉而鳯鳥氏董之以為厯正燕以春分來秋分去故司分鵙以夏至鳴冬至止故司至鷃以立春來立夏去故司啟鷩以立秋來立冬去故司閉鳯知天時故厯正五鳩五雉篤九雇之利祝鳩氏司教且鳩氏司制尸鳩氏司空爽鳩氏司㓂滑鳩氏司事五鳩紏民者也司教則司徒司制則司馬也祝鳩鵊鴿孝故司教且鳩王鴡别故司制尸鳩鴶鵴均故司空爽鳩為罹摯故司㓂滑鳩鶻鴅多聲故司事司事納言之職頴達以為營繕之事非也營繕有司空矣釋詰鳩聚也民惡散故以鳩名五雉用五工正利器用正度量夷民者也鷷雉攻木之工甾雉摶埴之工壽雉攻金之工希雉皮工翬雉設色之工雉性介直故民可取平九雇為九農正教民事户民亡淫者也戸止也雇取其義晉貨志云昔在金天勤于民事命春鳸以稼耕召夏鳸以耘耡秋鳸于以收歛冬鳸于焉蓋藏蔡氏云春雇氏鳻鶞趣民耕種夏雇氏竊𤣥趣民芸除秋雇氏竊藍趣民收歛冬雇氏竊黄趣民蓋藏棘雇氏竊丹為果毆鳥行雇氏唶唶為晝毆鳥宵雇氏嘖嘖為夜毆獸桑雇氏竊脂趣民養蠶老雇氏鴳鴳趣民收麥令不得晏起者各隨時宜而督勸之賈逵樊光說同獨斷云少昊致九農之官是也鳻鶞猶分循民事既正乃法度量調氣律行二十有八宿天祐紫微經云少昊明二十八宿顓頊立九寺九卿以應上象也十二月以為元而民事定宋志云黄帝髙辛夏后以十二月為正少昊唐商以十二月髙陽虞周以十二月所謂三正之說然以昬中攷之則亦四時為正爾正在人時在天王者有改正之文無改時之實人事定也有三正說見發揮既處甘泉甘泉古之雲陽在西與西近宜為少昊之都詳時紀雲陽氏于是興郊禪崇五祀祭有其舉之莫敢廢也羲炎之郊禪黄帝之五祀後世唯以循守董氏錢譜引世本云少昊黄帝之子名契字青陽黄帝殁契立王以金徳號曰金天氏同度量調律吕封泰山作九泉之樂以鳥紀官正都邑肇車牛古史攷云黄帝作車少昊畧加以牛禹時奚仲駕馬更廣其制然馬駕黄帝有矣肇車牛謂服賈之車作布貨以制國用李錢譜異布一種長寸七分肩廣一寸足間六分有好面有已舌􅀢三字已化字􅀢􅀈字古金字又董譜一種面文帝昊字也幕文作全董以已為帝字非于是通窮拒􅦤老老慈㓜恤孤合獨然後矜寡窶極瘖龍跛躄扁籧握遞者偕有所養立史官内則五帝有史官尊耆老脩其方而天下治炎黄以來皆有養老記曰凡養老五帝憲憲者法其徳義養其氣體而不乞言丕釐景命放凖循龜是故天用大戒久而不亂人亡疵厲鬼亡靈響百工法而亡偽而竒術怪行亡敢煩言孟行以過其情遇其上者守故常抱雌節生而不有為而不恃是以垂象著瑞后土錫符長庚輝日五色山金鳴澤銅益諸福之物必至體白帝也故長庚曜明尸子云日五色至陽之精象君德也少昊金天氏邑于窮桑日五色互炤窮桑按易傳聖王在上則日光明五色具禮斗威儀以為政太平則日五色爰書鸞鳯見書斷字源等作鸞書立建皷制浮磬以通山川之風通禮義纂云建鼔大鼔也少昊作之為衆樂之節大晟樂書云少昊造以節衆樂夏后加之四足曰足鼓出隨音樂志作大淵之樂以諧人神龢上下是曰九淵世紀少昊樂曰九淵文選隨晉書唐文集皆作九泉避唐諱龍山鳯水日五色雲從龍之章也日五色亦見田俅子故唐李程擢宏辭以日五色賦後浩虚淵亦以此龍山鳯水以龍鳯瑞故作之寳櫝記謂有山屈如龍妄矣德廣逺而樂時節是以逺服而邇不遷鞬鞮旄人獻其羽製賨䌖苞棐亡逺弗屆田俅子云少昊都于曲阜鞬鞮毛人獻其羽裘渠摉之人服禹之徳獻其􅡋裘毛出五采孫氏瑞圖云王者奉五行教民種植以時則渠摉來獻裘德茂盛不耻惡衣則四夷獻其白裘在位八十有四載落年百有一世紀在位百年葬于雲陽見世紀遁甲開山圖蓋歸葬于始封之國今在茶陵之露水鄉攸縣界生鐡成墳予㳺炎陵訪之圖諜俱云是黄帝陵鄉俗謂為軒轅皇帝墳不知也其神降于長流之山主祀于是司反景故傳又偁西皇騷經云詔西皇使涉事西山經云積石之西二百里長流之山其神白虎少昊居之實唯員神隗氏之官是神也主司反景亦見世紀今臨朐有熏治泉源麓之側有祠曰治泉祠廣雅以為金神之祠謂之清明斯少昊所降也酈善長以為古理官所在故昔人謂治獄參軍為長流誤矣家訓作長留亦非都于小顥顥地也故周書云命蚩尤宇于小顥宜在西方梁雝之域以故昊皓皥姓多出西方然靡究其所逺㳺章句云西皇所居在西海津拾遺記窮桑者西海之濱蓋近西也故咸陽為雲陽漢甘泉宫武帝立太畤平王之元年秦為諸侯至襄公自以居西垂主少昊之神乃作西畤祠白帝後文公東獵汧渭卜居之吉乃夢黄虵自天而下口屬于鄜衍于是復作􅀈畤以三牢祭白帝以宇窮桑故亦曰窮桑氏見世紀賈逵云處窮桑以登帝天下號曰窮桑帝寳櫝記一曰窮桑氏一曰金寳氏一曰桑丘氏是為白帝然非河圖所謂白帝朱宣也或云曲阜鹵是以云小昊之虚曲阜無攷世紀以為都徐州蒙羽之野奎婁之次晉志云少昊始自窮桑而遷都曲阜因傳與世紀也曲阜魯城中小地名也有空桑說别見前紀元妃生倍伐降處緡淵既封蔑為蔑氏夏后世衰有緡為桀所克有倍氏緡氏倍伐或作代見山海經次妃生般音磐為弓正是制弓矢主祀弧星封于尹城世掌宫職尹耆事唐為尹氏周宰尹亦為尹氏非有子曰昧為𤣥㝠師是生允格臺駘俱臣髙陽水經六注引左氏以臺駘為實沈後非駘宣汾洮障大澤封于汾川沈姒蓐黄實守其祀有臺氏沈姒蓐辱之氏沈姒蓐黄四國故鄧名世云姒乃國名允格封鄀寰宇記世本允姓國有子鄀姓虞帝投之幽州是為隂戎之祖姓纂云允格後金天氏之裔詹桓伯云先王居檮杌于四裔故允姓之戎居于𤓰州杜預以為隂戎與三苗俱竄三危後世因謂出于三苗通典等以駒支為𤓰州允姓戎非也按宣子語駒支云昔秦人迫逐乃祖吾離于𤓰州此自羌姓為秦所逐者左之繆己氏格氏戎氏允戎氏戎州氏皆允類也鄀楚滅之十道志云戎本國號已氏其姓今楚丘已氏城也輿地廣記云謂昆吾後别在戎者周衰入居此僖廿二年陸渾戎遷伊川允姓戎遷渭汭傳以秦晉九州陸渾戎為允戎之散亦非也按國都記魯衛間戎為昆吾之後云重熈脩該帝之四叔也佐髙陽氏髙辛氏衰五官失守堯乃復育重氏之後羲仲羲叔俾世守之有羲氏重氏羲和異出世不能别吕邢傳云重即羲也黎即和也蓋羲和亦曰重黎帝堯所命楚語云堯復育重黎之後孔安國班固皆云羲和其後法言云羲近重和近黎羲重後和黎後也帝之入立也其屬有更于青陽者厥後疆力侵尋四伐重氏苦之而遺之姝或而不治大臣爭棅逺近相襲而青陽遂分有青氏青陽氏漢有東海守青陽倍東海王尉青陽精蜀唐道母青陽氏風俗通云黄帝子孫始姓之六韜作績陽非重氏一作重丘氏即重之國初帝裔子取髙陽氏之女曰脩生大業大業取少典氏女曰華生繇繇本再生者今作陶同本音由易林遯之既濟云兹基逢時稷契陶繇上食得願微子解囚而禮記喜則斯猶先儒亦為揺讀謂秦人猶揺聲相近小顔漢書讀繇皆為由唯臯繇正五刑為弋昭切未之攷爾繇生馬喙忠信疏通㔓而敏事漁于雷澤虞帝求旃以為士師繇一振褐而不仁者逺繇生于曲阜年代厯云少昊四世孫世以秦紀言女脩遂謂髙陽之後鄧名世猶以李嬴出髙陽不知攷也馬口見論衡故今繪獄主為馬頭淮南子作鳥喙元命苞云鳥喙子宜誤乃立􅀈獄造科律聽獄執中為虞之氏而天下亡寃封之於臯是曰臯陶風俗通云咎陶謨虞始造律蕭何成九章闗諸百王不易之道故傳子曰律者臯陶之遺訓漢命蕭何廣之後漢張敏議云臯陶造法律原其本意皆欲禁民為非者也急就篇云臯陶造獄吕覽云臯陶作刑而世本云陶制五刑非也六藝論言符瑞與中侯最詳如臯陶于洛見黒書等事亦見詩疏如解豸事有說别見餘論虞禪禹禹巽之臯辭焉卒崩于臯所謂公琴者在今六安縣北十五安豊芍陂中大冢也廣記即臯陶冢楚人謂之公琴寰宇記六安北十三有二古城一曰六合一曰白沙上有臯陶廟冢在東五里酈元云楚人謂冢為琴臯克天德自作元命配享在下摯虞雜記議云故事祠臯陶于廷尉寺故范滂至獄獄吏請祭臯陶晉志故事祠臯陶廷尉新禮祠律署以同祭先聖太學故事以社日新禮改以孟秋以應社政摯以臯陶作士國重其功人思其當是以獄官禮其神郡縣逺方神祠各奉祠之雜五行書臯陶壬辰日死不可劾罪人成罪天寳二載尊為德明皇帝有子三人長伯翳次仲甄次封偃為偃姓伯翳大費也少昊之後史傳以為伯益而謂為髙陽後妄甚辨見發揮偃匽之後有州絞貳軫謡皖參㑹阮棐鬲酈郾止舒庸舒鳩舒龍舒蓼舒鮑舒龔州則鹵滅之絞佼則朱滅之舒皖貳軫鳩庸龍蓼則食于楚矣後各以國命氏史記匽姓臯陶後莊帝母匽氏國潛夫論偃姓有舒庸舒鳩舒龍舒共止酈謡參㑹六阮棐髙髙即臯也偃或作優誤釋例舒鳩亦偃姓也按蓼舒及舒蓼三國也舒黄帝後任姓蓼庭堅後姬姓而舒蓼偃姓也杜皆以為臯陶後又以蓼為即舒蓼失之詳髙陽紀仲甄事夏封六其後分英俱為楚并有甄氏六氏臯咎繇睪英黥之氏英六貳軫古皆臯地並詳國名紀文五年楚滅之通典寰宇六臯陶封世本六為姬姓非也或以英六臯尤妄商有咎单乃音為舊恐非伯翳大費能馴鳥獸知其語言以服事虞夏始食于嬴為嬴氏盈暨功于洪帝乃錫之皁斿𤣥玉姚女而封之費費乃國名古人多以人加國如大唐大彭大封皆是非字也嬴盈也庶物盈美而以為封即太山嬴縣益翳二人書傳多以為即伯益故以嬴姓臯陶為出髙陽而大亷若木為伯益子者都成記伯益二子大曰大亷封鳥俗氏小曰若木别為費氏居南裔為諸侯九真守谷朗碑出自顓頊益為舜虞賜姓嬴氏至非子封秦各為氏皆繆以益翳聲近而職同爾生大亷若木恩成三人大亷事夏后啟為鳥俗氏路俗氏俗史作浴一作洛非後有孟虧仲衍孟虧能帥翳者作土于蕭是為蕭孟虧夏后氏衰孟虧去之而鳯皇隨焉見括地圖史作孟戲云大亷𤣥孫張華作孟舒誤仲衍臣商太戊其裔戎胥軒内酈山氏生仲潏史以仲衍為孟戲兄弟以戎胥軒為仲衍𤣥孫夫孟戲當夏之中世豈有母弟乃後出四五百年而臣太戊哉且太戊至紂四百餘年而革纔六世遽事紂乎申侯曰仲衍以故親西周西周文王先世蓋當太戊時仲潏生處父處父徤步是為蜚亷生革暨季勝革惡來也武王殺之見世家紀云早死勝三世造父封趙復七世叔帶乃𨽻晉九世而武立又六世籍始命復再世而析晉三世主父益大又五世邯鄲没秦諸大夫立嘉于代六年重剡于秦子公輔主西戎西戎懐之號趙王世居天水史記屠岸賈滅趙與程嬰公孫杵臼保趙孤事最失實程嬰杵臼墓在絳之太甲南二十一里趙盾墓塋中見元和郡縣志然邯郸西十五亦有嬰杵臼墓事為難信隨圖經云今洺州趙氏數百家每祭則設客位以祀嬰杵臼主號曰祀祖此亦魏晉而後形影而為之者辨見發揮有張氏狼氏屏氏訾辱氏樓季氏主氏主父氏康氏馬服氏馬氏馬矢氏馬適氏莽氏武成氏周陽氏邯氏邯鄲氏屠封馬服君援馬服之後一云趙官名趙括號馬服服武事者風俗通平原君勝封武成成因氏宫馬氏之後彚狀云出于嬴趙漢封周陽由為周陽氏馬何羅後為莽張遼趙壹之後及叔帶中衍戎胥冬日之氏四姓見姓纂姓苑等英賢傳齊大夫叔帶子莊又西魏趙肅賜氏乙弗至隋而復采于眭者又為眭氏姓書又有朔氏盧氏嬰氏嬰齊氏之類以名為姓古未至若是野今絀革五世曰非子孝王封之秦谷使復嬴氏史記非子邑于秦谷朗碑與永寜侯相碑皆作扉子五世襄公勤于平王錫之岐豐以為侯二十有九世而趙政替周號始皇帝隳天亂地振古亡與二世而漢有之始皇生于邯郸故號趙政有秦氏非氏扉氏處氏房氏旁氏蜚氏飛亷氏亷氏徴氏寜氏子桑氏子車氏車氏仲行氏鍼氏侯麗氏繆氏謬氏縶氏整氏庶長氏不更氏稻氏谷氏繞氏將閭氏王莽改嚴尤亷丹皆為徴號二徴將軍是也姓書為丁丘二音云皆出李徴者妄將閭秦公子將閭後姓纂引將閭莬非乃莊子之蔣閭葂姓書秦後又有蹇奚穆畜等氏亦非乃炎帝後王功秦仲既國襄而復錄其少子康使有夏陽為梁伯秦溘之有梁氏梁餘氏梁于氏將氏將良氏此乃少梁又西魏賜梁禦為紇豆陵氏至隨而復漢莽以梁攘為脩逺伯奉小昊祀而又有運期氏梁鴻改名曜其食于運者為運氏自運采掩為奄氏掩氏運奄氏采鍾離者吳滅之為鍾氏離氏鍾離氏終黎氏世本作終犂魯昭二十四年滅尋衙汪良莵裘不羮灌東東閭脩魚㯉里宻如髙陵附庸氏也凡十二氏或云灌氏亦出灌東非秦鍼奔晉封裴中曰裴君即䓃唐表云裴非子支孫是也傳謂平公封顓帝孫鍼為裴君故表又以為顓帝風姓之後妄矣六世陵遷解為解君有裴氏解氏壘氏履氏釐王遷之符堅時梓橦守壘襲一作裴而後趙錄有壘澄木作斐也集韻裴音非後轉為匪又為履則為斐也唐疏勒王裴氏號阿摩攴若木事夏襲翳之封後有費昌為湯御右費仲事紂當音吠與姒費别其立于淮者為嬴氏夏世有調王命以徐伯主淮夷三十二世君偃一假仁義而賓國三十六周王剡之偃即康王乃穆王時都城記云穆王西巡聞其威徳日逺遣楚師襲破殺王偃後漢書七諫淮南子注以為楚文滅之楚文乃春秋時誤而錄其子宗十一世為吳所滅宗北走彭城武原山萬衆從之因曰徐山昭三十年吳子執鍾離遂伐徐防山水之章羽斷髪攜孥逆吳子復之徐子奔楚楚城夷而處之有徐氏蟲氏取慮氏李氏世勣本徐氏賜潛夫論偃王後食邑取慮故氏十三州志音陬閭恩成之伷世為理以命族至紂時理徴為翼肄中吳伯弗合以死取契和氏逋難伊虚為李氏李理字通辨見發揮利貞生仲師昌祖家于若生肜徳其曾碩宗因采焉康王命之五世孫乾元杲為周上御史字元杲老子之父𤣥妙内篇云老子母無壻故范祖禹曰老子父書傳無見非也胎刵且𦕈取洪氏曰嬰敷前涼錄索綏云元杲胎刵無耳一目不明又云生而孤單年七十二無妻與鄰氏人益壽氏野合而娠十年而生儒道二家多言老母為益壽氏妄也國臣記云乾娶滕氏宜非一娶云感飛星而震十有二年副左而生儋宣王四十二年乙夘二月十五日生劉向列仙傳生于商時妄曰𤣥祿集真錄老子始生母名之曰𤣥祿是為伯陽甫生而能語黄面皓首故謂老子耳七寸而參屚故名耳而字儋即太史儋世以為二人不知儋與𣆀同幹籍九尺方童長眉鼻雙柱齒六八詳金蕭内經朱韜玉禮等書仙傳云生而能語九日長九尺大抵傳記老子事至多難稽云邑于苦之賴賴乃萊也故又曰老萊子世以老萊子别一人亦非列女傳云萊子逃世耕䝉山之陽楚王求之按髙士傳孔子至楚見老萊子時已二百餘歲班衣戲母側所問答皆禮事知非二人孔學禮時年十七當景王之十年老時二百五十餘歲蓋弃仕矣以三十六法治心理性究忠盡孝桓莊世柱下史簡靈世守藏吏一云平王時為太史著道徳經孔子嘗學禮焉學禮之事亦備禮記或謂孔子未嘗師之蓋因劉向誤以老子為商大夫老彭也孔没十九歲而儋入秦西厯流沙八十餘土化暨三千九萬品戒云漢所獲大月氏復立經化胡成佛于闐西南五百里有比摩寺記為老子化胡之所彼人言老子于此昇天與羣胡泣訣而釋子諱之夫佛特西土一聖胡爾中國之人不知其由乃推而歸之不可知之神愚陋之徒復肆為詭誕之說而不可詰大抵天下之事唯近于人情者為是西域諸國事佛其言可得而攷有化胡恒星等辨見發揮壽四百有四十見仙傳太平廣記等實不究所終或云二百七十然儋見秦獻公在孔子後百餘年故韋昭以為非禮外傳云夀者百二十過此不死為失歸祅怪今􅀈縣栁谷水面有老子墓蘇鶚云冠劍儋生宗邑段干世濟其德至世民而興唐傳世二十則少昊瘖繇之德在人也宗魏將軍封段干生注及司注生宫宫生譜見魏書然自段干三世而譜見後魏誤也昪養于徐為徐氏既復李有南唐三世而俘以歸于京世言昪徐氏子不知本姓李養于温有理氏里氏相里氏京氏恩氏利氏儋氏𣆀氏耽氏徴氏崇氏段氏段干氏徴音止崇徴本皆姓李遭亂改見程康傳三輔决錄云段出老子段干木之子隱如入闗去干字然段以字段干以地不可合也武士艧娶相里氏老氏老陽氏柱氏丙氏及廣武老萊賀蘭堅吾大野徒何之氏周大夫有老陽子宋老佐左氏注以為戴公子非佐去公甚逺也陵降匈奴裔孫歸魏見于丙殿賜姓丙周龍居縣公明生粲應國公與髙祖有舊避世祖名復為李黠戛斯右堅昆氏與居賀蘭山下皆自云陵後周書賜李弼徒何氏魏書賜李虎大野氏諱之髙祖相周復為李江黄耿弦兹蒲時白郯復巴寘穀麋䢵葛祁譚皆嬴國也秦本紀嬴姓十四有白𡨕氏姓書以為復姓非乃白與𡨕爾郯則越滅之寘則徐滅之兹蒲周滅之沈耿晉滅之譚榖入于齊巴復入于䕫而江黄䢵弦時麋白滅于楚矣後各以國令氏威烈八年越滅郯傳云魯滅之非也外紀簡王三年明年僑如㑹伐之或云宋滅之尤非沈逞奔楚曽孫諸梁為右司馬采于葉為葉氏尹氏諸梁氏成八年晉滅沈沈子逞奔楚字循之為沈氏生嘉字唯良二子尹丙尹戍戍字中逹為右司馬生諸梁字子髙及后臧子髙采葉號葉公二子尹射文尹射為令尹旬日去隱華山生尹朱尹赤姓書以為出𣆀季載又以葉諸梁出于楚俱誤􅀈氏沈氏世次唐表極為差繆沈在汾川與平輿之沈别沈約宋書以為平輿者非也其世序亦繆表譜更以為季載後尤非周興封帝之後于祁潛夫論武王封少昊後蓋古帝後皆封矣按周封杞宋為二後并陳以備三恪左氏說者更以黄帝堯舜後為三恪而少昊不預熊氏云周之三恪越少昊髙辛而逺存黄帝者取其制作人非也而置莒後輿期于始都計二世兹丕歸莒至紀公復紀姓世本紀同按聲已戴已皆莒女厯世三十楚簡併之與曹姓莒别故名世猶以輿期為陸終後誤尸子莒尹好巫鬼亡國有莒氏萭氏莒子氏萭古莒同漢有宿猾萭章蘇林音矩傳謂黄帝子萭陽非急就章有萭改鄉兹丕氏展輿氏庶其氏姓纂郊氏捷氏裂氏若犂比林閭渠丘著丘安丘且于務婁無婁菀羊之氏與林氏拏氏氏以邑也此成都林也楊雄師林閭氏嬴之後又有盈氏􅱡氏姓苑又有􅀈黄之後又有胡氏廣本黄氏見語林若巴後之巴公白後之白侯武安蒲後之蒲候蒲餘與符洪是也載記等以為因家生蒲妄江後之析析象本姓江祖封析侯因氏後漢譚後之覃談佼三姓姓源覃音尋耿後之簡諫東其衍也蜀簡雍本耿也幽州多此姓然諫亦音簡詩云是用大簡周有簡師父晉滅耿姓纂以簡出狐鞠居諫出周之司諫杜謂皆姬姓國失之又有昊皓星金桑雉芒勾瞫皥秋伯瞫皥出武落鍾山黑穴中見蜀錄姓書勾氏出勾芒羊氏家傳羊續聚星重女及西方桑丘空桑龍丘五鳩有偃之氏後趙將軍五鳩盧贊曰邈矣西皇小昊靑陽秀外龍庭抱雌守常五鳯既至乃法度量通窮拒􅦤孤獨得養惟能任道人亡疵厲德廣樂時逺亡不至降彼長流是司反景李趙隆興于斯為盛厯者大中之符聖人之所以順天命而經世者也其原出于天其法成于人有其數而無其文聖人之授受傳數而已昔者堯之為世欽若昊天厯象日月星辰敬授人時故其耋而授舜曰咨女舜天之厯數在爾躬允執其中舜之受終也在璿璣玉衡以齊七政故其旄而授禹曰咨女禹天之厯數在爾躬允執其中三聖之所授執中而已執中者以厯數之本乎中也是故厯法作而中道著矣班固之志厯也亦以是為堯之授舜者也蓋聖人之為治不過欽天厚人而已而先儒之言厯數類皆歸于䜟緯之言非先王之正也天生河圖八卦之原也地應龜書九疇之寄也八卦者厯數之始也而本于太極太極者至中也九疇者厯數之成也而本于皇極皇極者大中也太極元氣含三為一三才之所基也稽疑庶徴五福六極此鬼神之所同故屬之天五行五事八政此百姓之所用故屬之地而三徳五紀之與皇極同居九位之中然則聖人中道而立者亦以保其在躬之厯數而已矣律應鳯鳥而厯數詳焉此少昊氏之傳中也豈唯欽天厚人哉抑亦以保其在躬之厯數也嗟夫善言古者必有驗乎今善言天者必有信于人傳厯數豈徒為天哉以為人也豈徒為古哉抑為今也一晝一夜一寒一暑此盛衰之常變也乾用九坤用六用者變之謂也九六者隂陽之盡也窮者未有不為災陽九百六此其不知變者也亢之與戰豈厯數之中哉彼少昊之法凝矣其所以與太昊氏兩立乎九閡之内而稱皇者唯能任道不事心不動力知所變而已矣少昊既假歴數復于堯舜堯舜唯知變也故唯九黎亂徳苗民逆命而不抵于窮垂衣裳而天下治則其所以取之乾坤者用九六也是故易窮則變變則通通則久變而通之此歴數之所以長也六而後窮數止則起六六者一變之數也以故夷昭不馭幽厲失圖頽亂惠遷帶叛襄出楚子問鼎晉侯請隧猶且三十六傳一變之數先王定筞之驗不可易也有用我者吾為東周潛心文王可變之謂也使其得文王之位而合其變則東周之胙何止八百年哉惜乎執中之道不傳至于窮不知變不能盡當運之數也蒼既朒矣而況秦漢而下不全其天者邪受命不知其數傳國不知其符係胙不永豈唯厯數之微哉亦人謀之不臧也嗚呼甌脫捃邉幅沮梪化侯王戎狄焉能舉華哉中國丘墟生靈荼炭可勝痛耶變而通之此無窮之厯數也路史卷十六

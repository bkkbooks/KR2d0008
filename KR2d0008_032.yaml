body:
  text: 路史卷三十二宋羅泌撰發揮一論太極道不可以言知言之愈希夷性不可以辨索辨之益晦惑性與道固非言與辨之所能竟也子貢曰子如不言則小子奚述焉其欲聞之也可謂至矣而性與天道終不得而聞之豈非上焉者示其朕已得於言辨之表而下焉者不得其所以言愈曉而愈瞀邪易有太極是生兩儀兩儀生四象四象生八卦夫太極之與兩儀四象八卦析而語之則一十有五盍而言之則一一即太極而太極者即太一也有物之先本已混成有物之後未嘗虧損惟有性而無形其與兩儀四象八卦與我偕生一時具備而未嘗生未嘗死者也蓋有中則有兩位四方八極有太極則有兩儀四象八卦大自天地細臻萬彚物物具之而無餘欠有形有色孰不具此極此儀哉傳曰太極元氣含三為一曰含三者一與一為二二與一為三也太極與兩儀即二而兩儀與太極即三一即三三即一也豈惟含三五十有五莫不具焉猶有形則有影有一則有二有三以至於無窮焉爾是太極者在天地之先而不為先在天地之後而不為後終天地而未嘗終始天地而未嘗始惟其有與天地萬彚融和合一而無所先後終始是故道得之而為太一天得之而為天一帝得之而為帝一萬物無不稟而謂之命無不本而謂之性無不生則謂之天無不主則謂之心自古自今無時而不存亦無時而不有固非今日有太極而明日方有兩儀後日而乃有四象八卦也又非今日有兩儀而太極遯明日有四象而兩儀亡後日有八卦而四象隱也今夫果核之未坼也斯以謂太極也方其未坼固具兩儀兩儀之間兩枼自具兩枼之具即人字也蓋所謂桃梅杏人者三才之道一時具足於此見矣一生為􅕆􅕆與人同所謂側􅕆是故木之性仁而善謂之榖皆有生之理也方夫兩枽以謂之人迨其􅀢土復生兩枽而枽復生則為仌矣仌者人之著者也故孔子曰仁者人也方核未人在其中是以賜果君前核則懐之人存焉爾田此觀之人雖一物而與兩儀並生其於萬物也殊矣故曰天地之性人為貴人為萬物之靈可不重邪嗟乎子則不言荀楊之徒奚擇焉後荀揚者可得而知矣始予黙探於是以謂可與易埒者惟有字學欲著成書惜乎許叔重王安石輩不足與言也爰伸佔畢惟特立後起者與明焉明易彖象易者明象之書也昔者聖人之作易也賾天下之故窮造化之隱而其妙有不得而言傳者於是儗之形容近而身逺而物一皆取而寓之於象以見焉兹聖人之大恵也子曰八卦成列象在其中矣方三畫之未峙也固已有是象也天地定位山澤通氣雷風相薄水火不相射此皆以象而告者也是故八象立而八卦之義見矣非惟八卦而六十有四莫不皆有象也澤中之火山中之天豈故為是夸哉大腹白眼豕塗鬼車語譬淺鄙而取類甚大蓋不求之顯則幽不得而闡不取之近則逺無自而明内外上下逺近小大是必交互反錯遞相煥發而後理無餘藴也抑又求三百八十四爻一皆有象而曰易曰彖曰象是亦一象也易者逷也日月更逷而相貿者也彖者􅋟也瘦去匿􅋟而迹焉者也至於象則像此而已景兆彷彿而未有形焉者也􅋟與遯同􅋟猶搏也如𤣥之有測象猶想也如𤣥之有擬曰遯甲者起數藏匿法也豚之放者一起足而有隠去之意蓋形也者象之著而象也者彖之章也即而言之則易與彖象亦以三物取名易取於易象取於象而彖取於彖何謂也易者廬􅨦之名守宫是矣身色無恒日十二變是則易者本其變也易即刺易蜥蜴是也亦曰石蜴曰辟宫曰龍子曰蠑螈曰蝘蜓曰祝蜓曰蝎虎曰守宫又曰蚵蠪東齊曰䗂􅀈善治虵疾俗呼虵師一曰虵舅母一曰十二時每時一變色故正名曰易餧以朱砂則丹漢武用之宫闥為守宫之術與龍通氣故禱雨者用之又能嘔雹與魚合六彖者茅犀之名豨神是矣犀形獨角知幾知祥是則彖者取於幾也彖亦曰茅犀狀如犀而小一角善知吉凶交廣諸山有之土人謂之猪神而象則直取其身形相象逺近不變􅀈有成位膽應四時而已韓子云人希見生象也而得死象之骨按其圗以想其生故諸所意想者皆謂之象今諸獸之形一各自别惟象無巨細悉皆相類乂近視之與逺無異是故謂之象身具十二少肉惟鼻其本肉膽隨四季移於四足五歲始乳三年一産亦能知吉凶淳化中上苑馴象死上命取其膽不獲問之姚鉉得之前左足是故易者象也取諸物以為象聖人之意見矣如乾之龍坤之馬小過之鳥損益之龜姤中孚之魚解未濟之狐童牝之牛豶羸之豕虎豹莧狗羊䑕豚羝牲禽見鮒隼雉鴻雞鳴鶴鳳皇咸取而象之鳳皇見穆姜之筮至於器則取于牀于几于枕于柅于舟于車于鼓于輿于簀于輻于輪于輹于匕鬯于資斧于缾甕缶于匡鼎鬴茀幕弧矢尊酒簋貳於服則取于簪于圭于衣于繻于屨于履于袂于袽于繩于囊赤紱黄裳于布于帛鞶帶徽纆於居則取于家于室于庭于宫于庖于藩于牖于舍于廬蔀屋王居于次于處棟桷門户於都則取于邑于國于階于衢于城于隍于闗于虚于廟于巷于比鄰郊野於物則取于稊于華于杞于瓜于蘭于竹于葦于木于茅于茹于莽于株于葛藟于枯楊蒺藜叢棘碩果包桑在天則取於月於斗於夜於晝於雷出入於日中􅉴風雲㝠晦雨霜堅氷終朝幾望先甲後庚三歲旬季七日八月在地則取於田於淵於河於川於陂於險於泥於干於塗於隂於甃於磐於菑􅀢於丘園於九陵於岐山於穴於沛澤於谷於平陸坎窞林鹿剛鹵金玉泉井沙石東西南北在人則取於躬於膚於項於趾於頄於輔於口於鼻於頰於舌於牙於齒於夤於限於陽於尾手足耳目頥面須髮腹背脢拇腓臋汗血股肱心膂眇跛孕育天劓剕刖荷校桎梏刵渥尸疾婚娶慶譽齊咨涕洟歌號笑語咥噬嗟泣威儀志意逋係闚盱突來焚棄靡不餂之猶未離其類也髙宗文王王母箕子帝乙鬼方同人弟子康侯大君士夫家人元夫大師夫子宫人考妣妾婦壯耋羣醜臣子童僕主賓朋友大夫小子女須娣妹邑人行人冦盜戎介讐衆族類史巫商旅武人惡人夷主配主金夫後夫老妻女妻不速大首建侯行師幽人丈人錫命好爵災𤯝驅田戰征耕穫憑渉弋獲盟薦言禴元筮失律南狩納約以至􅎗足黔喙翰音鞏華巢飛蹢躅角牿羽翼香臭甘苦𤣥黄朱白孚膏公餗乾胏腊肉飲食烹餁勿藥遇毒之類一皆比配曾無遺棄謂不如是不足盡其意也是以彖立而卦明象設而爻顯曾何凝滯之有而後之學者煩荒辭溺章句且不知易之為義何繇而詣其情哉雖然是特一象也若夫龍非惟乾也而坤亦為龍馬非惟坤也而乾亦為馬龍與馬非惟乾與坤也而坎震亦取象焉是故觸類可為其象合義可為其變學者能因是以索之則可以見羲文之心見羲文之心則能見天地之心矣羲文之心即天地之心而天地之心即吾心也見吾心則見易矣今也不因是以索之徒覩代之人執象以迷易而咎伏羲之費畫以為文王病乃不先明於彖象而欲深求於易此負苓者之妄人也舎蹄而索兔舍杭而窮海古今豈有是哉神而明之則必有在矣易之名或曰夫子以易彖象為三物取名義則然矣敢問聖人之意乎曰予不得而知也賢者之言可以一途盡而聖人之言非可一途盡雖然請試為若漫言易之說乾鑿度曰易者易也不易也變易也夫易之道廣矣大矣而乾坤以為首乾坤者易之門也昔者聖人體諸天地先立乎其二卦以為天地日月隂陽鬼神而六爻為之六子三才以二卦之畫成六爻之位而八卦之象著生生之理具矣畫始於一立於兩一竒象天兩偶象地是故竒畫成於三而為乾偶畫成於三而為坤繇乾之畫交於坤而三男生繇坤之畫交於乾而三女生自主卦言之一卦之中八卦咸具是故卦體一立而分隂分陽四五上以上卦陽而為天初二三以下卦隂而為地初三五之三陽為震坎艮二四上之三隂為巽離兊而八卦成矣初之與三既以陽畫始終而象震艮又以二陽而象春夏四之與上既以隂畫始終而象離兊又以二隂而象秋冬周旋酬酢有不待夫坤者是故用數三百六十乾全用而坤全不用卦變其始爻變其次倒卦不足繼之反類反類不足繼之互體而易道辨矣此所謂變易也天有二正地有二正而共用二變以成八卦天有四正地有四正而共用二十八變以成六十四卦是故小成之卦正者四變者二而成六大成之卦正者八變者二十八而成三十有六純陽卦乾純隂卦坤自一陽始復而為卦六一隂始姤而為卦六二陽始臨而為卦十五二隂始遯而為卦亦十五三隂三陽始於否泰而為卦者二十凡六十有四陽自下以順生則隂反上而逆復隂自下以順生則陽反上而逆復始於乾坤中於咸恒而終於既未濟又可得而變易哉是所謂不易也故曰易之為書也不可逺其為道也屢遷動變不居周流六虚上下無常剛柔相易是故易以變者占而亦有不變之占以變易為道而亦有交易之道焉陽畫為剛隂畫為柔外卦之畫來而居内内卦之畫往而居外而交易之理見矣或順生以往或逆反而來或正以交索或反動相對而剛柔每兩相易惟變適也嗟夫交易之道予於日月見之矣月行乎天三日而成震初見乎庚故震納庚八日而成兊初見乎丁故兊納丁十五日而成乾乾納甲壬十六日而成巽始退於辛故巽納辛二十三而成艮爰退於丙故艮納丙三十日而成坤坤納乙而消長之道成矣故曰日月為易謂之日月而於文正為勿勿月彩之散者也故月散於日下為易散於日上為曶相對為明對而虧為昒易者朔也所謂朔易曶者晦也明者望也昒者望而食者也是故西曰昒谷明載東南而朔易二郡乃俱著於東北今夫日往月來月往日來物之易也寒往暑來暑往寒來時之易也將旦忽􅀈比夜忽昶行之易也熱劇而雹寒劇而雨氣之易也暴石泐雨積草炎休勢之易也虵化而鼈鼈化而虵形之易也魚羣而飛鳥羣而沉性之易也精氣為物游魂為變精之易也始感而生終化而死神之易也喜而禍伏懼而福倚事之易也是故萬物不易不生六子不易不成艮兊以終相易坎離以中相易震巽以初相易始則終終則始所以為不窮也顧可一途盡哉易内篇曰日月相逐為易故病有隂陽易者乃大病之後交者輙易男曰隂易女曰陽易易者三穛輙死繇此喃之日月之交易斯益灼矣易曰日月合為明謂明者無踰於日月爾然明非合也嗚呼安得史籕鍾雲房而與之論哉逐音籕夸父與日逐按沈括論日月或問予以日月之形如丸也如扇也若如丸則其相遇豈不相礙予對曰日月之形如丸何以知之以月盈虧可驗月本無光猶銀丸日曜之乃光耳光之初生日在其傍故光側而所見纔如鈎日漸逺則日照而光稍滿如一彈丸以粉塗其半側視之則粉處如鈎對視之則正圓此有以知其如丸也日月氣也有形而無質故相值而無礙程子有云日月之為物隂陽發見之尤盛者也同名氏辨耳目之所接有不得而盡世知孔子之謚文宣王而不知齊之竟陵王子良與隨之長孫雅亦曰文宣王漢兩龔遂俱為郡太守而兩京房俱明易災異然則千歲之乆萬里之逺其不約而合者渠可既邪誰昔嘗聞有唐堯與虞舜矣及摭梁史則又有所謂虞舜者官丞太常嘗薦明堂之議即虞瞬同名録有漢名盜曰虞舜按乃絮舜見東觀記絮女居切而漢更有唐堯為臨武長堯舜而可名哉臨武接交州州舊貢茘支堯諫止之然桂陽志中汝南唐羌為臨武長宜後人惡其僭而易之時永元中予起路史既白祝融氏共工氏帝魁氏青陽氏髙陽氏渾敦氏與夏后啓商湯若有巢氏豕韋氏之不同者而後悵或人之無識也劉恕以神農為大庭氏而謂與古大庭氏異却為非是蓋牽于舊說夏后啓鄒公之子與白公同時見吕春秋夫經史之間名氏同者衆矣如劉𢎞王褒俱有十一𢎞十一十見前録一北齊獲澤縣公褒十一九前録一漢鑄工見孝成鼎一真人自有内傳張良有九而張敞王吉皆有八然則記録之下可勝惑哉録見前士􅲍士鞅之父也而乃相鞅士文伯也亦范氏之族與鞅父宣子同名見昭公六年傳又並作丐或疑此為正字非也春秋時人名字亦皆相配文伯之字伯瑕與楚陽丐之字子瑕其義正同而鄭泗乞亦字子瑕丐乞同義也襄公三十一年使􅲍請命􅲍即文伯豈容妄改又按人表士鞅亦有二一在中上一在中下相去不逺殆不可曉夀夢句呉之君也而乃臣越夀夢即春秋呉子乗也越大夫夀夢見昭公二十四年書裁四代亦既該兩伯夷一虞之秩宗一諫武王者雖不在書孔子所稱也又杜甫之𨽻亦有伯夷見課伐木詩然髙陽師伯夷世或作柏前録從之則非顔魯公集顔柏夷誤矣而論語一書乃有兩南宫括世莫察爾一問羿者一太公之友在十亂中夫公孫龍為孔門髙弟而顔囬為晉代𦍑師時殊事異正得不懣有如王羲之之仕苻徤張華之佐慕容徳韓信降虜曾參殺人亦既並時得不為之投杵邪昔蕭繹陸善經俱著同姓名録然特不能包刺即以後世固不勝窮而在古猶不少請誦其渉史篇者左方按古有庸成氏而黄帝之臣亦曰庸成亦皆作容列仙傳楊玉時容成公自稱黄帝師此又後世赤松子也伏羲曰蒼牙而天雷之吏亦曰蒼牙羲臣曰巫咸而來又商家曰帝曰未宣而為唐刺濮以至離婁事黄帝則論彼商臣王褒傳注離婁黄帝時明目者即離朱張若事黄帝則指夫秦士婁若並見莊子秦張若即蜀郡太守與張儀共築成都城者李氷代之見蜀紀趙隱仕商國而亟舉魏賢魏黄門遷祕書監見魚豢典略又唐宰相趙隱以大中三年登第見唐登科記咸通中同中書門下平章事馮夷友費昌而竟談河伯武王伐商問兩日鬬者河伯即水夷覩叔均而思稷子山海經商均曰淑均后稷之孫叔均見習朋而疑齊臣黄帝臣洽聞記作隰贊風后為軒師禹問風后見𤣥女戰經說伍胥為楚族黄帝臣見𤣥女兵法謂赤松炎帝諸侯皇初平亦號之而以季連為栁恵等伍陸終之子又季克子亦曰季連仲衍為孟戯之弟仲衍紂之兄而孔甲為孔子之孫皆有錯於見聞者也孔甲黄帝史官而孔子八世孫鮒亦曰孔甲又夏后孔甲本誤詳紀中復若帝嚳之臣有窮之君俱曰羿而俱以射名少昊之子魯國之士皆曰般而皆因巧著凡此族者悉莫能紀且以虞仲之孫實曰虞仲周章之孫蔡昭侯申實蔡文侯申曾孫之子也是叵訓者虞國仲字此於義可而二申之名宜有一誤劉貢父云今又曰申逺也夫名同其祖恐古不然然魯莊之孫有仲嬰齊而文公孫曰公孫嬰齊仲嬰齊者從祖也又乃同時鄭有公孫段字子石而印段亦字子石乃公孫段從父子也蓋族大有不相統者近代名子申之宗正善矣漢趙王曰如意矣而廣宗又名之唐義成曰琮矣而奉天又名之鬱林曰恪矣而建王又名之此何為邪三代之王悉尊諜系下世乃有即姓而襲先代之名者烏知其非祖歟以晉王氏一譜而有兩渾昶子戍父兩愷茂仁君夫兩綏俞子戎子兩乂緒父衍父兩澄濟弟衍弟兩處沖還湛兩安期焉含子湛子豈惟它族紊用而無識哉嗟夫有人焉自姓孔而字仲尼則固不可謂仲尼矣然則君子又奚必迹襲以貽識者之譏哉論遂人改火順天者存逆天者亡是必然之理也伊古明王之為治也顧亦豈能違理哉因天事天不逆焉而已是故著時令授人時法而建官象以作服凡以順之也昔者遂人氏作觀乾象察辰心而出火作鑚鐩别五木以改火豈惟恵民哉以順天也四時五變榆栁青故春取之棗杏赤故夏取之桑柘黄故季夏取之柞槱白故秋取之槐檀黒故冬取之皆因其性故可救時疾予嘗攷之心者天之大火而辰戌者火之二墓是以季春心昏見於辰而出火季秋心昏見於戍而納之夘為心之明堂心至是而火大壯是以仲春禁火戒其盛也成周盛時每歲仲春命司烜氏以木鐸修火禁於國中為季春將出火而司爟掌行火之政令四時變國火以救時疾季春出火季秋納火民咸從之時則施火令凡國失火野焚萊則隨之以刑罰夫然故天地順而四時成氣不愆伏國無疵癘而民以寧鄭以三月鑄刑書而士文伯以為必災六月而鄭火蓋火未出而作火宜不免也今之所謂寒食一百五者熟食斷烟謂之龍忌蓋本乎此司烜仲春以木鐸修火禁因火出而警之仲秋火入則不警宫正春秋以木鐸修火禁宫禁尚嚴也而周舉之書魏武之令與夫汝南先賢傳陸􅔨鄴中記等皆以為為介子推謂子推以三月三日燔死而後世為之禁火吁何妄邪是何異於言子胥溺死而海神為之朝夕者乎予初賦潮知此妄説而或者謂昔人言潮無出子胥前者因為舉書朝宗之語而齊景嘗欲遵海觀朝舞矣且屈原云聽潮水之相擊而易亦有行險不失信之言自有天地即有此潮豈必見紙上而後信哉子胥漂於呉江適有祠廟當潮頭不知丹徒南㤙等潮且復為誰潮耶餘詳後賦予觀左氏史遷之書曷嘗有子推被焚之事况以清明寒食初靡定日而琴操所記子推之死乃五月五非三日也古人以三月上已祓禊以清明前三日寒食初無定日後世既以一之而又指為三月之三妄矣周舉傳云每冬中輙一月寒食以子推焚骸神靈不樂舉火然則介子又將以冬中亡矣且子胥之死既云五月五日而浙人每春鬬綵舟誰念招魂節此沈佺期三月三日獨州驩州之詩而重開避忌之席更作招魂之引乃王績三月三日賦也然則招屈亦用三日矣非可信也夫火神物也其功用亦大矣昔隋王劭嘗以先王有鑽燧改火之義於是表請變火曰古者周官四時變火以救時疾明火不變則時疾必生聖人作法豈徒然哉在昔有以洛火度江代代事之火色變青而晉師曠食知勞薪今温酒炙肉用石炭火與柴火竹火草火蔴荄火氣味各自不同是新舊火理應有異顧於五時取五木以變火若劭可謂知所本矣夫火惡陳薪惡勞自開世然者晉代荀朂進飯亦知薪勞而隋文帝所見江寧寺晉長明燈亦復青而不熱傳記有以巴豆木入爨者爰得洩利而糞臭之草炊者率致味惡然則火之不改其不疾者鮮矣泌以是益知聖人之所以改火修火正四時五變者豈故為是煩文害俗得已而不已哉東晉初有王離妻李將河南火渡江云受於祖母王有遺書二十卷臨終戒勿絶火遂常種之傳二百年火色如血謂之聖火宋齊之間李嫗年九十餘以火治病多瘉嫗死人為葬之號聖火冢隂雨每見火出冡門者今號其處為聖火巷金陵故事云禪衆寺前直南小巷也傳不云乎違天必有大咎先漢武帝猶置别火令丞典司燧事後世乃廢之邪方石勒之居鄴也於是不禁寒食而建徳殿震及端門襄國西門雹起介山平地洿下者丈餘人禽死以萬數千里摧折秋稼蕩然夫五行之變如是而不知者亦以為為之推也雖然魏晉之俗尤所重者辰為商星實祀大火而汾晉參虚參辰錯行不毘和所致辨史皇氏吕不韋之書曰史皇作書倉頡氏也管氏韓子國語史記俱無史官之說據世本云史皇倉頡同階又云沮誦倉頡作書亦未嘗言為史官也及韋誕傅𤣥皇甫謐等遽以為黄帝史官蓋肇繆於宋衷衷之世本注云倉頡沮誦黄帝史官抑不知衷何所據而云末代儒流莫見其書更望望交引以為世本之言世本曷有是哉竊嘗攷之倉頡之號曰史皇又曰倉帝河圖說徵云倉帝起天雨粟青雲扶日語亦見之洛書說河而鴻烈解言史皇生而能書是則倉帝史皇非人臣之目明矣後世徒見其有史皇之名因謂為史官爾史豈今之所謂史乎哉古謂字書為史故有倉頡史篇之類揚雄曰史哉史哉非史記也孔子曰吾猶及史之闕文也謂字書之闕文吾猶及見其全而今不復見故班固叙小學云古制書必同文不知則闕問諸故老自後漢徐防始以闕文為是闕事而蘇軾遂以有馬者借人乗之七字為當時之闕者誤矣夫子蓋諭已之有馬不能乗習則借人乗之文有闕失不能是正則因人以正之已不能馬則借於人人有闕亦可正於己庸何害而今無有見其全者不能正云爾故曰今無矣夫夫者惑之之辭且上古始制文字者倉頡也而無懐氏已刻徽號伏羲氏已立書契俱在炎黄之前豈得至黄帝而始制文字邪此崔爰蔡邕曹植索靖顧野王之徒所以咸謂古之帝者為得之矣崔草書體蔡篆書體成公綬𨽻書體繁欽硯銘及許叔重皆稱為頡皇云雖然三五厯古史攷謂在炎帝之世其足信歟書疏張楫書云倉頡為帝王生於禪通之紀而丹壺記禪通之紀首别史皇氏則知楫書為有據者衛氏慎到以為包羲之前斯不誣也孔穎達尚書疏辨之稍詳獨衛氏云在包羲倉帝之世譙周謂在炎帝時徐整謂炎黄之間失之粤復訂之春秋河圖揆命篇云蒼羲農黄三陽翊天徳聖明說者謂蒼為倉頡羲為包羲與神農黄帝之四君者俱能奉三陽以輔上帝益以􅨣倉頡之為帝而在包羲之前矣故河圖玉版云倉頡為帝南巡陽虚之山巡狩之事固非臣下之所行也昔者孔子嘗曰封泰山觀易姓而王可得見者七十有餘君三皇禪於繹繹五帝禪於亭亭三王禪於梁甫而莊書言七十二代之封其有形兆㙬堮勒紀者千八百餘所興亡之代可得而稽矣管夷吾言於桓公曰古之封禪七十有二家夷吾所記者十有二曰無懐曰伏羲曰神農曰炎帝曰黄帝曰髙陽曰髙辛曰唐曰虞曰禹曰湯曰成王皆受命而後封禪無懐乃在伏羲之前是其可紀者而不識者六十又在無懐氏前此皆孔子之得見者而七十二君之前又有孔子之不得見者詩外傳云古封泰山禪梁父者萬餘人仲尼觀焉不能盡識故穎達謂文字在伏羲前特未用之教世至伏羲然後始作書契則知封禪之文其來乆矣上古之君其世夥矣壺記以史皇首禪紀梁未之盡也以彼其說雖不槩見於經然士攷質詩書以其所見推其所不見則自無懐而上可得而論矣倉帝史皇豈人臣之號哉辨葛天氏世紀言大庭氏後十一世為葛天氏而服䖍以大庭氏為即葛天氏敢問所安曰昔莊周叙古帝皇惟曰庸成氏大庭氏柏皇氏中央氏栗陸氏驪畜氏軒轅氏赫胥氏尊盧氏祝庸氏伏羲氏神農氏如是而已曾不及葛天故服遂以葛天為大庭氏六韜大明所叙復有共工氏渾沌氏昊英氏有巢氏朱襄氏葛天氏隂康氏無懐氏而無大庭中皇赫胥此學者之所疑也班生表古今人物也庸成乃在共工之後大庭繼之而葛天亦在朱襄之後然自女媧共工庸成至無懐一皆叙之包羲之下在遁甲開山圖亦然世紀從之故世遂以為皆包羲之後代及其制度無聞則又以為皆襲包羲之制亦厚誣矣不惟是也如固所叙復黜其祝庸氏軒轅氏蓋以史記稱黄帝名軒轅而髙陽之代有祝融謂即其人而黜之爾此孔仲逺所以謂無祝融氏而金樓子興王依莊周所叙而去其軒轅也彼髙誘者更以朱襄為炎帝鄭康成更以大庭為神農而六韜所叙共工且在尊盧之後庸成且在祝融之後而葛天又在朱襄之後違離蔽固不可勝算此禮記正義所以謂封禪之書無懐在伏羲氏前而以為世紀不足信歟開山圖云自女媧至無懐一十五代合萬七千七百八十七嵗外紀云千二百六十嵗或云五萬七千七百八十二或云千一百五十或云萬六千八十此與列子所記楊朱語伏羲以來三萬餘萬嵗者無信也近世有所謂三墳書者乃以有巢為提捷之子遂人為有巢之子而包羲為遂人之子大庭無懐而下則皆以為羲之臣佐復有天一遁甲者正以祝庸少昊等為之四帝居於四方佐黄帝而為治此蓋謂月令四方之帝為黄帝之佐者非黄帝所滅之四帝及王符著夫論又以謂顓帝身號共工代少昊氏子曰句龍生卨其後裔為商湯炎帝身號魁隗其後嗣為伊堯而以帝嚳為伏羲之後帝舜為皇帝之後禹為少昊之後離蔽薠亂尤為可擯委也論幣所起傳曰君有山山有金以金立幣以幣準榖而受禄而國榖斯在上矣金木水火土天之五財與天俱生與物偕行民並用之廢一不可民知飲食衣裳之用而貨幣作貨幣作而天下通聖人守之所以為治也則其勢之來其當生民之物乎昔商之民有無飦而儥子者湯以莊山之金制幣贖之夏之民有無飦而儥子者禹以厯山之金制幣贖之而沈演論布以為興於周代班固桓譚皆謂夏商靡記何邪易稱神農氏聚天下之貨交易而退是貨幣出於炎帝之前矣予嘗博訪古幣訂以封禪之文匜洗之刻證以汗簡集綴古文籕韻外書集字等識則有葛天軒轅尊盧之幣大昊九棘神農一金黄帝少昊之貨嚳貨一金髙陽平陽金堯泉舜當金䇿乗馬之類憲憲如是是古未嘗不以輕重而為天下者也古幣皆以代號為别舊之錢文錢譜例目之為奇品俱不能辨如異布中有作􅀢斤一金者乃大昊之九棘長寸七分肩廣一寸足間六分有肉好幕文作舌芒又有作􅀢山舌者少昊貨也長廣皆同有好天寳元年李幼奇得一種文作乃髙陽金也長寸一分下廣九分首長廣各五分向上漸闊足攴四分間廣三分背文如八字又長平布中有作踐以舌一及作允侖平者凡五種有肉郭皆髙陽金也復有􅀢斤至有長寸八分肩廣寸一分足間五分刑重十二銖無好郭帝嚳貨也又李涿家一品長二寸一分肩寸七分枝長六分間四分半首廣七分質厚重二十八銖文作􅀢豆三斤全幕文作􅀢又一種大小輕重與此正等六字亦同俱倒書之其􅀢作􅀢乃黄帝貨此幣之最大者舜䇿乗馬長二寸上廣寸二分下寸三分首長廣各七分足間五分正文作尚全􅀢疋皆面肉好皆有周郭洪範八政食一而貨二是食與貨必相資而後興不可一日而無者則夫貨幣之行其來逺矣伏羲之貨莢錢書舊譜俱列之於布品傳稱九棘播於羲皇故幣文有而封演顧烜咸譜之周秦之幣黄帝少昊髙陽帝嚳之貨又目為長平異布汙漫蔽固豈復知有古文也董逌之作錢書也蓋略辨之故首之以太昊之幣亦以謂宜興太昊之前然有葛天尊盧之幣而皆著之大昊之後是又未悉攷也接幣文有葛李泊云古之葛字則世以為葛天氏之幣又有作者王存又以為軒轅氏之幣謂古軒轅字合為一雖未可執然皇帝氏既自為皇帝之貨則此為軒轅幣信矣奈何說者復泥史記說幣止於唐虞魯褒論幣出自黄帝之語而謂貨幣不出於上古况葛天軒轅洪荒之世邪三代書名相變不一逮夫虞夏敦所見夏商異文矣古今書文不同豈可以籕文而論之葛天軒轅之幣乎曰不然書文聖人所以立制度而示同文也雖員橢遁形衡邪異置然固有便於事亦遂相因而不改者夫物固有用於一時而廢於後世乆復蹈襲乃與古符者多矣其數然也世有𨽻書謂王次仲之所創而臨菑人得齊胡公之銅棺前龢隱起皆為今𨽻是𨽻不出於次仲矣又烏知不出於上古邪韓非書云倉頡制字自環者為私背私者為之公而漢人論風氣生虫故倉頡制字以凡増虫而為風是則始制之字初不異漢世也且誰昔嘗聞之於古矣包羲氏盡地之制凡天下山五千三百七十居地五十六萬四千五十六里出水者八千里受水者八千里出銅之山四百五十七出鐵之山三千六百九所以分壤植榖也戈矛之所起刀幣之所起也能者有餘拙者不足封於泰山禪於梁甫者七十有二家功業徳望皆在於此是謂國用則伏羲之制亦既大備及觀管夷吾之對桓公則知輕重自遂人以降矣夫自書契而來君君封禪七十二家其文異制而其立貨幣以救時則同也世闊記簡後世弗攷乃謂古無有貨且謂書文不出於葛天軒轅之世者亦已罔矣論三易子曰鳳鳥不至河不出圖吾已矣夫乆矣天之無意於斯文也龜圖鳳苞天地之文也迨其發露天地之文有時而不得祕聖人則之所以為治也祕而不示聖人亦遂已夫若昔聖人之得河圖而作易也神明幽贊蓍實生之聖人於是仰觀俯察即參兩之自然而倚之數因隂陽之變以立其卦發剛柔之藴以生其文而天地之文始粲陳八鴻間矣天地定位山澤通氣雷風相薄水火不相射此小成之易也本乎陽者升而上本乎隂者降而下乾純陽天也故正位乎南坤純隂地也故正位乎北乾付正性于離故中虚有日之象坤付正性於坎故中滿有月之象日生乎東故離正乎東月生乎西故坎正乎西亦南方之火生于東之木而北方之水產乎西之金也今之上經首乾坤而尾坎離取四正之卦也乾坤交而男女生之乾下交坤故三男之卦附於坤坤上交乾故三女之卦附於乾乾一變為巽居乾之左再變為艮故居坎之左三變而之坤坤一變為震居坤之左再變為兊故居離之左三變而之乾艮為山兊為澤地勢髙於西北故艮位之四瀆湊於東南故兊處之雷出乎地故附坤之東南風薄乎天故附乾之西南今之下經以震艮巽兊為用取四維之卦也乾坤離坎純一不變故蒞乎四正震艮迭成巽兌互變故蒞乎四維此伏羲之所理乾坤變化自然之叙故養生者有納甲之論與此正合日月消長之理在焉帝出乎震齊乎巽相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮此連山之易也此大成之易以五行相生為次順也蓋神農之易以人事為重矣乾坤定上下之位坎離别左右之門乾生於子坤生於午坎終於寅離終於申以應天時此誰之易邪乾坤相交萬物化生然及成功則男女以用事而父母以退處此天地之常理也陽以順動故乾順進四位而處於西北隂以逆行故坤逆退四位而處於西南是故伏羲初經以乾先坤而歸蔵之叙以坤先乾卒諸此也離火生東而王乎南坎水生西而壯乎北火炎上水潤下故離自東而南坎自西而北雷以春分出地故自東北歸於夘澤以秋分始伏故自東南反乎西長養萬物于春夏之交者風也故巽自西南而居於已作止萬物于冬春之際者山也故艮自西北而處乎寅此則應地之方而見於用者也蓋亦本於伏羲世不見尒初􅮀初乾初離初􅀢初兌初艮初釐初奭此歸藏之易也此歸蔵初經也亦因于伏羲氏蓋伏羲之易本於天歸蔵之易本于地學者不知究尒乾兌離震在天為陽在地為剛故在天則居東南在地則居西北巽坎艮坤在天則為隂在地則為柔故在天則居西北在地則居東南立天立地自然之理如此􅮀即坤字􅀢即坎字釐即震字奭即巽字此歸蔵本文卦皆六位即黄帝易是所謂三皇易也小成者伏羲之易也而文王因之連山者列山氏之書也而夏人因之歸藏者歸藏氏之書也而商人因之世紀云夏人因炎帝曰連山商人因黄帝曰歸蔵文王廣六十四卦著九六之爻謂之周易傳謂夏曰連山商曰歸蔵而周曰周易以為三代所作者非也神農為市取之噬嗑耒耨之利則取諸益而黄帝之舟楫亦取之渙矣豈惟三代哉山海經云伏羲氏得河圖夏后氏因之曰連山黄帝氏得河圖商人因之曰歸蔵列山氏得河圖周人因之曰周易杜子春從之誤也按歸蔵之文有乾為天為君為父為大赤為辟為卿為馬為禾為血卦之類則知與今易通矣或曰歸蔵黄帝之書而坤啓筮乃有堯降二女以舜妃之語莭卦云殷王其國常毋谷日之類易為伏羲書而有帝乙文王等語文何邪其卦是也其文非也連山之文禹代之作歸蔵之文湯代之作而易之文特文王之作至于爻辭則周公而彖象則孔子也易者易也變易也而乾坤以為首連山者重山也故重艮以為首艮山也歸藏者萬物藏焉故也故重坤以為首坤者臧也從時配位是三統之政也三統為三正黄鍾子為天正林鍾丑為地正大簇寅為人正天正十一月故乾為首地正十二月故坤為首人正十三月故艮為首夏得人統故用連山商得地統故用歸蔵周得天統故用易三易之書其書一其法異其為卦皆六位經卦皆八而别卦皆六十四書一也易尙變連山歸藏尚不變法異也變老也不變少也易用九六尚老也連山用七歸藏用八尚少也尚變之占三百八十有四不變之占亦三百八十有四凡七百六十有八其所以逆天地隂陽之神數定天地隂陽人事之休咎者備矣或云商蓍䇿三十六蓋商氏之易主于坤坤之䇿三十有六雖不著見理則然也或曰易以變者占則不變無占乎曰否凡變之占以所變之人為占不變之占以所不變之爻為占古以三易參而占之非不用也五爻不變則以變者占五爻俱變則以不變者占凡變繇下而之不變繇上而之其不然者惟乾一卦尒穆姜之筮遇艮之八其五皆變惟六二不變故以為占唐人不知以為史茍以是說穆姜但求反于周易非也雖然易道主於用尒至三易則用於占而易道不豫焉連山歸藏其數皆六十有四與易同也惟易則變故一可六十四而六十四可以為一是故以六十四乗六十四得四千九十有六其與連山歸藏倍一之理殊矣於是復以五十約之為三千二百則今之易卦三十二陽三十二隂者也大衍之數五十實筌乎此是伏羲神農以來厯數之本也一倍之而二二倍之而四四倍之而八八倍之而十六十六倍之而三十二三十二倍之而六十四以五十乗六十四得三千二百即三十二之數也或曰三易之變不變則異而其書一皆首乾曰首艮者以艮為首法爾以艮為首法者法其止而不變非首書也曰首坤者以坤為首法尒以坤為首法者法其靜而不變非首書也得意忘象何首卦之云是不然曷亦知夫大易之掌其法而不掌其書邪書果一則連山得陽歸藏得隂繇屯而下卦卦分也而在三易則卦不分焉故曰不異抑且不知雜卦之次與序卦之列不同焉又何歟伏羲氏之小成神農易之為中成神農之中成黄帝易之為大成伏羲氏之先天神農易之為中天神農之中天黄帝易之為後天豈非易道廣大變通不窮有非一法之所能盡是故伏羲作之前而神農黄帝相與振明於後惟變通之術不得不共而其為道則未始不同之歟世之說者不原乎此乃更以為易道不一可以隨時而變置者亦誕惑矣千世而下誠使一遇大聖得知占法之可變而卦不可以損益則易道辨矣亦何至書名之泥而變不變之紛哉夏謂之連山商謂之歸藏而周謂之易其用雖不同其致一也跋三墳書書籍之逸豈特後世邪昔楚倚相能讀三墳五典八索九丘之書及孔子求古之史記自五典九丘之外三墳八索已不得而見矣後世不知其何書也亡書有九共九篇即九丘之字誤也𨽻丘為丘因繆為共丘者區也按左氏或作九區云九州之區域攷古多以丘為區故鬼容蓲為鬼㬰丘而驅嶇軀等轉為駈岴􅥟即云丘聚非也又云述職方以除九丘亦是妄臆孔安國以為羲炎黄帝之書曰三墳少昊顓嚳唐虞之書曰五典康成從之而賈逵亦以三墳為三皇時書五典為五帝常典至馬季長始以三墳為隂陽始生天地人之三氣五典為五行之說籍外論之豈其然哉安國又以八卦之說曰八索九州之志曰九丘賈逵以八索為八王之法九丘為九州亡國之戒而張平子以八索為法之八議九丘為周之九刑紛紜不一孔穎達云三墳之書在五典上數與三皇相當而墳又大名與皇義相類故云三皇之書堯典舜典為二帝之典推此而上則五帝當五典矣賈公彦云孔鄭説無正文故延叔堅馬季長所解有異按道家者流有所謂洞神祕録者謂是三墳小有經下記云三皇治世各受其一以治天下是曰三墳後有八帝繼三皇而起亦以神靈為治各受其一是曰八索至黄帝述厯得其所謂三皇内文者此也抱璞子云黄帝東至青丘過風山見紫府先生授以三皇内文雲笈云八帝治各千嵗上曰三精次曰三變次曰二化凡八卷三洞叙目云小有三皇文本出大有天皇地皇人皇各一卷上古三皇所受之書也字似符篆藏在名山多不具足惟峨眉山備有之昔智瓊以皇文二卷見義汔不能解遂以還之王公以帛公精勤所得傳之賢達大字叙說一十四篇是天文次第之㫖小有經下記所載者十有一卷推部本經分别儀式合一十有四卷孟先生之所録者其山中之所傳猶十一卷二本並行於世晉武帝時南海太守晉陵鮑靚於元康二年二月二日登嵩髙石室見古三皇文皆刻石為字靚以總五兩告𤣥受之為之叙云三皇文者古初以授三皇名為皇文而三皇經叙則云鮑君所得與世不同靚後授之葛洪是為三墳其陸修靜所得者則以授弟子孫游岳本止四卷至陶𢎞景分析枝流稍至十一卷與今皇文小異然觀三皇經文雖號三墳多是符架等事黄蘆子西岳公之所傳者於逢􅀈之言戾矣按三皇經叙云天皇開治用治天下二萬八千嵗地皇代之復次人皇各萬八千嵗合三卷號曰三墳鄭先生所傳葛𤣥三皇文是也逢􅀈之說正以内經素問靈樞與易當之果何所蔽邪靈樞素問醫家明堂之書也世儒第見深言凑理莫探其朕故推之與易並非實貫也予家三墳書自大父孝俛先生傳有三卷以山氣形為之三墳山墳言君臣民物隂陽兵象謂之連山氣墳言生動長育止殺謂之歸藏而形墳則言天地日月山川雲氣謂之坤乾復有河圖姓紀與天皇䇿辟地皇政典之類大率似假羲炎黄帝為言以遷就於孔說云元豐中得諸南陽逆旅酬偽書也云毛漸使西京得之大抵書生髙譚風月華草間猶足以蓋其淺至於語易自非悟入鮮有不可笑者今觀其書有云伏羲作易而君民事物隂陽兵象始明焉一語之中淺鄙備見是豈隆古包氏語哉有如以燧人為提捷之子有巢為燧人之子伏羲為有巢之子軒轅柏皇大庭無懐則皆以為伏羲之臣而加之龍官火紀之號尤可靳也周鼎商盤籕篆佚書已與今不相侔而此書大率作所謂栁葉篆者於今代俗書殆不多較贋可知矣夫墳者防與大之訓蓋禮法之書而索者究八體之應也故史伯云平八索以成人建九紀而立徳近取身也張平子以三墳為三禮而馬融以八索為八卦惟有以也或曰孔子贊昜道以除八索則八索已滅矣亦豈然邪三墳近聞有為之傳以進者宜其究是憯未之見也女媧補天說共工有三聞見之不明智識梏之也夫智識不超者在粗猶惑况妙乎予觀列禦冦記共工氏觸不周及女媧補天之事此古列子之文如是王充説天所引猶尒故尹子盤古篇云共工觸不周山折天柱絶地維女媧補天射十日惟舊木列子先叙女媧事乃及共工蓋近世繆之非古本云蓋言共工之亂俶擾天紀地維為絶天柱為折此大亂之甚也女媧氏作奮其一怒滅共工而平天下四土復正萬民更生此所謂補天立極之功也而昧者乃有煉石成赮地勢北髙南下之說何其繆邪甚矣聞見之誤人也伏羲虵軀神農牛首此事之辨者而世莫之解掘井得人而䕫一足鄉非達者時而鐫之今猶信也何則識不超者見聞蔽而樂人之謶己也共工氏太昊之世國侯也及太昊之末乃恣雎而跋扈以亂天下自謂水徳為水紀其稱亂也蓋在冀土故傳有女媧濟冀州而冀州平之說是女媧代平共工之亂明矣以故郯子述祖之言叙炎帝於其後斯可據矣而傳記緼結莫可尋詳劉安賈逵則以為與髙辛爭帝史記文子則以為髙陽誅之荀卿氏以為禹伐淮南子又指以舜時此無它蓋堯典言共工故學者以為堯時舜典言共工故或又以為舜時也夫共工氏非堯世之共工堯之共工又自非舜之所命者叵不知也堯之共工乃少昊氏之子而舜之共工則炎帝之裔垂也論者惑於衆多之說遂一謂共工乃職非人名而傳記顓嚳堯禹時之共工皆以為之後世何其妄邪彼共工氏自其號氏有國家者而舜之共工職也帝曰垂汝共工是矣堯之共工是則名爾左氏之傳可見烏可妄意而為說乎或者又謂共工氏為即炎帝之裔尤非所謂知理者夫垂特工師之任水紀大事渠得謂為垂哉且炎帝至堯殆二千載事相遼矣夏革曰自物之外自事之先朕所不知也以今揆古年載誠𦕈人情則近可得而知也吁亦目睫之說矣天下一理物之外事之先其别有一理邪理一貫奚古今事物之殊哉共工氏無霸名顯曹君子有䛪予以展禽共工氏霸九有之言傳者咸謂霸無録而王者其徳力粹駮之謂歟曰否霸之名我未之前聞也其當周之標季齊桓晉文之事乎曰韋顧昆吾非商之霸者乎韋顧昆吾固聞諸後世也豈徳力粹駮云哉國佐有言三王之王也植徳而濟同欲焉五伯之霸也勤而撫之以役王命當是時周故家名分猶有存者故國佐知王之不可以為霸而霸之不可謂之王也書中候注云霸猶把也傳云五伯之霸謂以諸侯長把王者之政大抵霸即伯之强者云尒至戰國之士逰談馳說架虚穴空以信行其計而後徳力粹駮之說興焉善乎李泰伯之言曰霸諸侯號也霸之為言伯也所以長諸侯也道之粹駮在人而王霸之號不可易也王之道安天下也霸之道尊中國也非粹駮之謂也借之紂克改作武志不信則西北霸之盛者而已西伯霸而粹桓文霸而駮者也三代王而粹秦漢王而駮者也要之其言王霸之道皆欲粹而不欲駮豈直王霸然哉帝皇之道一也泰伯之言知其一而未悉也予於司馬文正得道同之說焉其言曰古之王者必立三公一公處於内二公分天下而治之曰二伯周衰二伯之職廢二伯之號乃轉而為霸霸之名自是而立荀揚以來不原其本遂以王霸之道分為兩塗此霸道之由始也未聞古之有霸也漢之學者患在望聲求影徒見後世有五霸則以為古亦有霸見共工氏之迹不白則曰昔霸者也其言往昔未有不以當時準也羊容云古之帝王中分天下而使二公治之曰二伯如周召之分陜曰然則共工氏繼乎包羲之世將羲炎之徒歟曰非也其項籍之類乎籍嘗霸有九州矣當秦漢之閒横行宇内尊義帝分天下以王諸侯而自稱曰西楚霸王則其自處者然矣彼共工氏蓋籍之徒而非桓文之徒也竊乎帝者之間而不得謂之霸也路史卷三十二

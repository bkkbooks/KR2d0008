body:
  text: 路史卷十五宋羅泌撰後紀六疏仡紀黄帝紀下帝鴻氏帝鴻氏釐姓帝律生帝鴻是為帝休山海經云帝律生帝鴻律黄帝之字也杜預以帝鴻為黄帝陋矣母方纍氏即方雷故鬱纍亦為鬱雷詳少昊紀感掖晶而生生而多祥黄帝厭帝休是立于寳革命論云鴻黄世及以一民也堯舜内禪體文德也是帝鴻黄帝為世及者顯矣何得以為黄帝哉史記黄帝舉風后力牧常先大鴻以治民順天地之紀幽明之占生死之說人物表序帝鴻于炎帝之前則又失之正朔服度一仍黄帝之故故亡思亡為不慮不圖而臻至治治四十有七載卒葬雝雝之鴻冢是矣在秦漢皆列祀典鴻冢即六鴻冢即帝鴻也史漢書說者更以為鬼容丘益非按今冢在雝以知所都亦不逺黄帝之都也生白民及嘻嘻生季格西荒經云南岳娶州山氏曰女䖍生季格季格生壽麻之國嘻其南岳矣季格生帝魁有本紀言白民銷姓降居于夷是為白民之祖汲冢書有白民之國出乘黄孔晁云是東南夷與白州相接天寳軍錄云日南廏山連接不知幾千里祼人所居白民之後也去前二齒刺其胸為花葩以粉紫畫兩目下為飾其别為防風氏守封禺之間寰宇記􅀈山在武康東南三十輿地記古防風氏之都釐姓至商為汪沶氏漆姓夏為防風釐姓商為汪沶或云號鄋蠻鄋蠻漆姓云即周之長狄故鄧氏辨證文十一年得臣敗狄傳遽以為長狄又云瞞由是遂亡預謂長狄種絶謂防風子孫為長狄大人妄也外傳謂仲尼言周為長狄今為大人謂今非周而何妄繆可笑如此有汪氏罔氏汪沶史作汪罔說文作汪芒姓苑云汪芒釐姓徽州圖經言新安汪氏按姓苑出汪罔氏景徳四年西夏主趙德明之母罔氏卒而縉雲氏亦帝之胄也傳謂縉雲黄帝之官非史註縉雲氏姜姓炎帝之裔黄帝時為縉雲官妄矣蓋國也處州舊本圖經縉雲山又皆以為黄帝氏失之詳國名紀妻土敬氏曰炎融遺腹而生驩頭為堯司徒汲冢書博物志弇義隱賊好行凶慝天下之人謂之倱伅堯放之于崇山崇山在澧之慈利縣有驩兠冢左傳云帝鴻氏不才子凡其後世皆謂之子驩頭者驩兠也以狐功輔繆亡其國狐功驩兠之佞臣生三苗氏北經云顓頊生驩頭驩頭生苗民苗民釐姓苗民長齒上下相冒崇寜五年蔡京修第于河北得瓦棺十數其骸皆長丈餘顱骨不圓而橢牙如犬牙下冒其骸時謂撩牙按述異記苗氏長牙上下相冒蓋當時自有此一種人虞氏􅀢棺則其時所瘞也髙辛邦之緇衣正義云髙辛之諸侯㗖于飲食冒于貨賄侵欲崇侈不可盈猒聚歛積實不知紀極不分孤寡不恤窮匱天下之人以比三兇謂之饕餮山海經顓帝生驩頭又云鯀妻遺腹生驩頭驩頭生苗民故世以苗民顓帝之後果以遺腹則驩頭為禹之弟而苗民其猶子也堯試舜時禹才十歲何繇有弟若姪暴恣為亂且苗民釐姓明甚而黄帝子姓弟七為釐苗民為驩頭之子而驩頭為帝鴻之後則知驩頭縉雲之為釐姓審矣傳言三苗為縉雲氏之子蓋驩頭猶襲縉雲之號也往古之事亦可知堯竄之于三危河西諸羌俱其類也三危在焞煌詳國名記傳三苗與防風同出是也范曄西羌傳乃謂西羌本出三苗姜姓之别炎帝之後姓纂從之繆矣此河關西南羌也隋書以黨須宕昌白狼皆三苖後益非虞之㢲禹三載苗民逆命昬迷自賢反道敗德斷制五獄之刑曰法爰始淫為劓刵㭬黥以亂亡辜練抑惟刑民棄弗保天降之咎俾禹徂征而猶負固帝乃誕敷文德舞干羽而苗格遂分北之其餘入于南海者為驩朱國朱兠聲近外國圖郭璞詳矣三苗之君蓋入仕堯朝其國仍故是以既竄而苗復叛傳言三苗所以不服者衡山在南岐山在北左洞庭之波右彭蠡之水也蓋江鄂之境後有鴻氏洪氏縉氏縉雲氏驩氏䓣氏瞞氏曼氏蠻氏曼蠻同音故說文音蠻為䓣風俗通云瞞氏荆蠻之後本姓蠻其裔隨音轉改為瞞也長狄氏防風氏任昉云吳越防風廟其神作龍首牛耳連眉一目足長三丈南人姓防風氏即其後皆長大越人祭之奏防風樂截竹三尺吹之如犬嗥三人披髪而舞危氏元氏竄三危後為危氏錢塘危氏改為元仔倡全諷之子士有患博非博之足患所患者寡要而已適千里者睨遥途而惑躡道山者見挿架而懣甚矣書文之病人也噫學者既病夫書文矣余顧又欲病之邪帝鴻氏繼黄帝者也而說者以為黄帝何邪以五帝位無地以置之也虞氏之先有幕而惑于史記所叙之世者無地以置夫幕也遂以為之虞思而不暇顧是皆學者沈緜之意病也按春秋運斗樞以帝鴻金天髙陽髙辛唐虞為五代而班氏人表既叙帝鴻于炎帝之前矣豈得謂黄帝哉于令昇曰栢皇㮚陸而前為而不有應而不求執大象也鴻黄世及以一民也堯舜内禪體文德也漢魏外禪順大名也是則鴻黄為世及者信矣雖然亦有以致其疑者昔者文信侯引黄帝告顓頊之言曰大員在上大矩在下汝能法之為民父母而鬻子謂顓頊十五而佐黄帝二十而有天下汲書亦云黄帝死七年其臣左徹乃立顓頊三書世少見信然史記亦言黄帝崩而昌意之子髙陽立少昊且無況帝鴻耶此鄭康成于書中候所以依運斗樞以帝鴻為五帝而乃指之為黄帝也勅省圖云徳合五帝坐者稱之今實六帝而云五者以其俱合五帝坐星也余觀内簡黄帝經黄帝後厯四世乃至顓頊設不之信則少昊為世八十有四載顓頊何由事黄帝哉此其不足疑者然班氏置之炎帝之前則又失之帝魁帝魁氏大鴻氏之曽孫也母曰任已感神而生魁已姒二姓世多一之孝經鉤命訣云任已感神生帝魁故康成云任已帝魁之母而春秋鉤命訣作任姒傳者繆也夫任乃太昊之後黄帝封之為已姓而姒氏夏始有非任之受姓又宋衷春秋傳云魁黄帝子孫而康成李善俱以為神農之名尤疎蓋以炎帝後亦有魁爾既云炎帝俄復指為神農故御覽又引任已生帝嵬魁古書之誤大率如此昔孔子求古史記得黄帝𤣥孫帝魁之書是矣說者以為神農非也傳曰三王百世計神元書五帝之受錄圖世有史記從政之錄帝魁以來訖于秦繆除禮樂之書三千三百有四十篇夫子删之斷自舜始所存者百篇而已典有五而軼其三墳有三而不存其一則知記注之興文字之務時代有之其闕逸可勝慨邪一云二千二百三十篇斷逺取近定可為世法者百二十篇以百二篇為尚書十八篇為中候故漢張霸偽造尚書百兩篇為緯者附之鄭云異者二十在大司徒大僕正平事不經矣鄭依書緯與白虎義正同余為此書蓋未嘗勉為之說而推合之其足以垂示後世亦不茍求為異也昔者夫子贊易自羲炎而下序書自堯舜而下删詩自湯武而下脩春秋自桓文而下豈無意邪然自羲炎而上則有所不書何邪豈非羲炎堯舜者人道之極摯而出乎其前者即羲炎黄帝而可以知之歟抑其教多本于神明懼後世不稱而有求歟亦豈于世有所疑歟予為此書以學猶欲知也予豈妄逆謣讕以誣于人也哉君子于其所不知蓋闕如也予聞昆侖矩縷宛委防山有黄帝之書空桐祝融有唐帝之碑泰山箕山青城海隅有古帝王文字霍灊嵩岱衡華恒山㑹稽空桐雄耳碣石等處皆有禹所記焉天其使得厯而訪之以詔于當來乎路史卷十五

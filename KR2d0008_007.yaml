body:
  text: 路史卷七宋羅泌撰前紀七禪通紀昆連氏昆連氏一曰釐連氏一曰釐蓄氏釐本又作驪昆連者昏晦之謂也昆釐皆有昏意連蓄皆有積意後有釐氏厘氏驪氏于志寜云追連胥之絶軌謂昆連氏赫胥氏也自生民以來君有宇宙者多矣十紀之辟不勝計予繹路史僅得其五其五紀則遂亡之矣有或雜出傳記如焱氏莊子有焱氏之頌孔子窮于陳蔡晨起而歌焱氏之風有其具而無其數也泰氏著于莊子蒲衣云有虞氏不及泰氏司馬彪云上古之帝王無名之君李以為大庭氏注謂伏羲皆非成䧱氏龎子問曰太上聖成䧱氏之道一揆用之萬八千歲有天下兵强而世不奪與天地存久鶡冠子曰成睢得一故物而制焉劉外紀作成鳩繆矣素皇氏内耑氏之著于鶡冠子近者視其善逺者慕其徳是以其教不厭其用不蔽故能疇闔四海以為一家夷貉萬國以時朝服此素皇内耑氏之法成睢之所防以起等世不可奪者雖間存一二而政迹無滅沕穆難稽然又懼没厥號因復著之庶來者得以觀焉易曰過此以徃未之或知子休曰人之所知不若其所不知信矣軒轅氏軒轅氏作于空桑之北山海經空桑之北有軒轅山然空桑乃魯地也紹物開智見轉風之蓬不已者于是作制乗車㭒輪璞較横木為軒直木為轅以尊太上故號曰軒轅氏或云居軒轅之丘而以為名非也葢軒轅所迹後人因以名丘非因丘而為號且其丘在昆崙之下世以為黄帝之所避風雨者非所居也權畸羨審通塞于是擅四方伐山取銅以為刀貨以衡域之輕重而天下治矣軒轅金長寸七分重十二銖文作者至乃軒轅貨一金字也王存義云古文軒轅字合為一按古封禪文與此正同貨字古皆作化故蔡氏化清經云貨者化也變化交易之物是也有幣論見發揮贊曰禪通著紀伊予握旋秉數稽功一德乘乾地不愛珍乃權畸羨制彼貨刀與民通變稱物平施有無以遷皇上由尊大號軒轅軒轅氏古封禪之帝也在黄帝氏之前承學之士乃皆以為即黄帝氏失厥所謂莫此甚焉昔䝉莊氏論至德之世軒轅氏後乃有赫胥而尊盧祝融次之又後乃有伏羲神農黄帝其明著若是六韜栢皇氏㮚陸氏驪連氏軒轅氏赫胥氏尊盧氏祝融氏古之王者也伏羲氏神農氏教民而不誅黄帝堯舜誅而不怒别亦為二矣訊諸幣欵有黄帝金而又有軒轅金董氏别有兩種封禪文識有軒轅氏而又有黄帝氏莊子所載二古封禪之王王存義云軒轅字古封禪文也則軒轅自為古帝信矣後世惟見史遷紀黄帝名軒轅更弗復攷于古失之赫蘇氏赫蘇氏是為赫胥胥蘇也傳謂赫然之徳為人胥附而號之也又以為即炎帝妄矣赫胥氏之治也尊民而重事方是之時人居不知所為行不知所之鼓腹而游含哺而嘻晝而動夕而息渇則求飲饑則求食莫知作善而作慝也出三入一惝怳如遺子華子天之精氣大數常出三而入一其在人呼出也吸入也一之謂尊二之謂耦三之謂化精氣以三成宓羲軒轅所柄以計也赫胥大庭惝怳如有所遺也故曰出于一立于兩成于三連山以之呈形歸藏以之御氣大易以之立數光曜赫奕而隆名有不居即以胥而自况胥史之義九洛泰定爰脫灑于潛山即天柱第十四洞天也仙傳拾遺云薛伯髙之祖𤣥真曰祝融棲神于衡阜虞帝登仙于蒼梧赫胥曜迹于潛山黄帝飛輪于鼎湖此也葬朝陽寰宇記赫胥氏在臨濟東故朝陽城内二里今章丘後有赫氏赫胥氏見風俗通山有扶蘇草木疏作扶胥越絶書言姑胥之臺董鑑吳地記言姑胥之山即姑蘇也甚矣人欲之不可從也求以從其欲未有不失其所欲者也是故求為樂者失其樂求為富者喪其富求存者先得其亡求榮者必至于辱求以為大未有不先獲其小者也昔者穆王從欲而既失其欲矣秦皇繼之秦皇失其欲矣漢武又繼之漢武復失其欲矣而明皇又繼之是何邪夸與幾而已矣幾生于所無而夸出于不足皆欲也位祿名壽四者人之所大欲也貴為天子富有四海則既有其位又有其祿矣其不足者名而所無者壽爾且名之所難及者逺而壽之所不能致者僊也于是事四夷將服逺以夸名而治愈卑禮方士將求僊以幾壽而身愈乏盡心力而求之而名與壽愈不可得也雖然服逺難也猶人之所為也而其所謂僊者則尤人之不能致者也彼以為致人之所能致未足為至必于人之所不能致者致之然後足夸也是以中材之主好名之心常卑于欲壽而求僊之志尤重于服逺也嗟夫道在邇而求之逺事在易而求之難惟精惟一此白晝蜚昇法也羲以是傳之炎炎以是傳之黄堯傳舜舜傳禹小顥顓頊髙宗文王䕫龍益稷周召箕盤與孔子之所共得也穆王之倫不知出此而乃區區外馳以求之是之燕而南轅兩騑愈疾自謂即至而不知其日逺也善乎周隱遥之告隨文曰帝王修道速于人臣一言之善萬域䝉福臣之所學非萬乘所修而劉知古亦謂明皇人主長生與庶人異欲得長生當先道化人和氣洽則僊自致矣若為庶人之事臣所未悉二子之言可謂知所本者代之人能因是而求夫所謂精一者則自得之矣又何必敝精神苦筋骨而與死禍鄰哉雖然黄帝之所為不在是赫胥氏之所為亦固不在是也且以秦皇愎惑不悟卒至陵遲沙丘身首不歛為天下笑鄉使穆王遺祭公之諫則不獲没于祗宫明皇稽至徳之䄠則不得崩于神龍武帝茍非狠狽自悔易危為安則龍淵之廟不立矣方東方生之薦藥石于帝也固以為僊者得之自然非可躁求若其有道不憂不得不然雖之蓬萊見僊人猶無益也而帝且不悟既晚因大鴻言于是悉罷方士候神人者每對羣臣自歎曩之愚惑為方士之所欺則不知道而已伊尹有言天子惟不可彊為也必先知道知道則人欲輕而民事重矣如是則脫灑曜迹不為難也赫胥氏之果僊乎予不得而知也予悲夫求僊者之喪其欲也故侟紳之學者毋謂太謾將有嘿而識之者葛天氏葛天氏葛天者權天也爰儗旋穹作權象故以葛天為號說文葛葢也與鶡皆音葢而集韻葢覆也居曷切葢曷盍古通用故曷旦作盍旦渇碣本從盍堨􅀈一從葢􅀈􅐀􅙟􅀈一皆從葛世不知爾其為治也不言而自信不化而自行湯湯乎無能名之其及樂也八士捉扴投足􅋵尾叩角亂之而歌八終一曰載民二曰𤣥鳥三曰遂物四曰奮穀五曰敬天常六曰達帝功七曰依地徳八曰臨萬物之極上林賦云聽葛天氏之歌張揖云三皇時君也其樂三人持牛尾捉足以歌八曲一曰云云八曰總萬獸之極韋昭云古之王者其事見吕春秋李善以遂物為育草木奮榖為奮五榖逹為徹闋為曲塊柎瓦缶武喿從之是謂廣樂于是封泰山興貨幣以制數㑹故沈滯通而天下泰矣幣文有葛李洎云古葛字董氏譜云葛天氏之幣字雖質而與今𨽻無異但今曷從曰匃曰辭匃聲無義而此特從土從曰曰乃古之曷字即為聲也曷與堨同所謂田堨田堨土事古文曷多作猶此後有葛氏見風俗通然少昊後自有葛權氏贊曰旋穹蒼蒼孰測至極不有聖人伊誰軌則無言而信不化而行垂法葛葢天蕩蕩難名載民𤣥鳥臨物之極八闋興謡莫知帝力治者致順之道也無非事也亦無非教也夢有占戎有卜災有祈信有盟聖人未嘗廢也是故無常祀則淫祀不可勝舉矣無中聲則淫樂不可勝用矣凡民之不可去者聖人不廢也抑為之節文爾已古者未嘗無樂也洪荒之世聖人出道以應世各有一代之業有一代之業則必有一代之樂也雖然樂者治之章而禮者治之文也文生而章出禮先而樂後不可易也八士八終節未嘗無也節未嘗無則禮未嘗廢也而世之人蔑禮節隳形體洿衊以為行疃怨以為賢託音乎聚僂之傍而羅嗊乎父師之側曰吾為達也吾聞無懷葛天不如是之蕩無度也予嘗學論語矣及微子之篇見其著周公謂魯公之語而遂知孔子與三仁八士之心然後三嘆孔門弟子善述聖人之志而楊雄王通皆不足以知之也夫微子一篇論出處之大致以仕為通者溺而不止以隱為髙者徃而不返然而特雜是章于間何哉彼周公之言上以為君人者而下以為事君者發也為君難為臣固不易君臣之間微矣哉于其所厚者薄則無不薄矣親而可施則何有賢士大夫哉施者殺而肆之内則施羊亦如之氏麋施鹿施麕皆如牛羊左施秦施兾芮晉施邢侯叔魚于市山海經殺而施之二世之殘骨肉六朝之戕宗室此可仕其朝邪大臣不以則必愎狠信任小人矣剝喪元良而信崇虎賊虐諫輔而任尹諧與夫信石顯而疑蕭傅任裴齡而絀陸贄此可仕其朝邪非是二者聖人不去也是故子言衞靈公之無道猶且徬徨于其域有仲叔圉祝鮀王孫賈等知此則三仁之或去或死栁惠之或絀或處孔子之去齊去魯樂師之適齊適楚八士之著于是列皆可知矣故舊無大故猶不可棄則君非有大故而可去乎朋友且不可求備也一人或過其可求備而去乎知是則接輿沮溺晨門荷蓧有可得而議矣於戲山林之士豈止于不知反哉而世又有無故宅嶺稱慕巢許以蘄達者中南少室皆為捷徑大有佳趣豈特岑岑之中南邪巢許之事予無信焉且不仕無義可也長㓜之節如之何其廢之夷俟之態固嘗見于原壤矣然則數之賊而叩之杖是乃聖人之隱也彼阮籍韋髙王澄胡母輔之之徒復何為邪譏山甫姍文王謑髁無任而笑天下之尚賢縱脫無行而非天下之大聖莊周不如是也而况無懷之與葛天氏乎晉室之為夷南北之紛更皆由此徒出矣而何任達之足云是故先王之治先其禮而後其樂樂者混澖之竟而禮者人之城也禮勝則愚故樂以生之樂勝則流故禮以守之禮也者所以嚴分而防泆者也茍嚴矣何慢之足憂茍防矣何亂之足病彼箕躆祼䄇託言為達其禍已不可勝言矣非直聖人病之俾門㑋役莫不以為病也詩云野有死麕白茅苞之夫麕既已死矣在所可棄矣而猶苞以白茅何耶死惡其汚于地也夫茅之為物薄而用可重也易曰藉用白茅无咎茍厝諸地而可矣藉之用茅何咎之有此其禮之所以不可以已而流遁者之所以獲罪于聖人也路史卷七

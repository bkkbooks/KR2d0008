body:
  text: 路史卷二十七宋羅泌撰國名紀四陶唐氏後陶髙辛封之今廣濟軍治古定陶城有陶丘范蠡變姓名間行止陶今鄆之平隂有陶山唐國即中山今定之新樂與唐縣俱是即漢唐縣有堯山唐水望都故城望都里東北有廣唐城即中山故城張曜記之中人城東有堯故城俗訛為堯姑猶故州為𣲖州後都平陽安邑亦皆曰唐平陽亦丹朱封也楚許氏叔重謂堯以楚伯受命今之唐州故湖陽有西唐山宣十二年之唐乃唐成公之國記云成王滅唐徙其後於許郢之間者也丹朱之國今朱虛有丹山丹水出焉東丹西丹二水近有長阪遠峻謂之破軍坡記為丹朱弄兵之處又鄧之內鄉亦有丹水漢之丹水縣荆州記云丹川堯子封者九域志云在鄧有丹朱冢然丹朱陵乃在相之永和鎮房防朱封防也昭王取房后今蔡之遂平西南四十吳房故城孟康云本房子國輿地志云房子國楚靈滅之遷房于楚夫槩奔楚封之因曰吳房元濟平因曰遂平即西魏之先遷國周為遷州水經云陽武有房故城非趙之房也秦之防陵昭二十二吳房亦作防有唐王墓武德初為房州與趙房異詳周後世國傅大繇國唐表云黃帝後夏封之在虞虢之間在河東大陽北十里有顛軫阪説阪築之所有傅虛傅巖傅説之祠古之北虞今𨽻平陸尸地多傅姓子云傅巖在北海之洲妄也鎦留劉長子之後妘姓留也丘中有麻彼留子國者漢𨽻彭城酈云留縣故城翼佩泗濟張良遇髙祖處縣至隋猶在今在沛縣泗水縣東南二十五或以為襄元年宋吕留在彭城也子房之封有廟墓蘇鶚云騰縣有留城是鄭留邑陳併之曰陳留今陳留有子房廟陳留圖經云靈臺非也乃此􅚆氏之劉亭隱十一年傳之劉也今徐之留城鎮有留鄉留故城繁休伯避地賦朝余發乎泗州夕余宿乎留鄉世作卯金刀繆也説文無劉字春秋劉康公故只作鎦纂古亦作鎦豕韋防姓韋也見世本或云劉氏非鑄祝侯爵祝也兖之龔丘治故蛇丘屬濟北有鑄鄉廣記云龔丘春秋鑄遂二國地然記齊之歷城為祝國春秋之祝阿寰宇記為古祝國黃帝後故城在今豐齊東北二長清東北四十五記云黃帝後封因禮記誤唐二桀伐有唐堯帝後洛陽之唐聚昭二十三注或云洛陽東南有唐亭若邲之戰唐侯為楚左拒預謂楚之小國定五年秦子期滅唐者隨之唐城唐鄉也魯御龍邑左傳云懼而遷于魯魯陽國夏魯陽縣亦號唐侯漢屬南陽固云南陽魯縣御龍氏所遷今汝之魯山有魯陽關有大龍山堯山今曰大陌山因絫立堯祠水經注絫祠堯山上後忞魏魯州王世充魯州也有魯陽公墓豢龍城汝之龍興九域志魯陽關城在鄧有松嶺即古魯陽關杜屠一曰屠括地志云杜伯國今永興長安縣南十五有下杜伯冢廟記云杜伯所築漢之杜陵今萬年杜縣秦有周右將軍三杜主祠通典城在萬年東二十四杜陵後魏為杜城在下杜東城今在萬年東十五非杜伯國唐杜兩國也即國志云雍州杜城在安山國七里范氏云唐杜氏此也隨士會邑晉地晉人逆晉侯于隨者非隨州然按類林隨侯祝姓則亦陶唐氏之後范三士丐封今濮之范漢故縣有故范城武德二為范州領范一縣與范陽夀張異鄆之夀張有范城􅀈櫟彘一河東永安東北故彘縣也今晉之霍邑晉先縠為彘子宣十二年彘子尸之者有彘水霍邑即漢彘縣非周彘昭二十九年傳彘周地函與右五邑皆士氏冀冀氏也並于晉郤芮封之昔臼季過冀者僖三十三漢之崎縣今𨽻晉有冀亭在皮氏東北傳云冀為不道者非冀州髙唐博之屬縣縲所出桑欽地里志云縲出髙唐今濟南之祝柯預云祝阿西北上堂城上唐唐之名非一若帝堯伐有唐則為上唐故蔡陽上唐鄉晉楚之戰後為縣晉上唐縣今隨之唐城有故唐城劉纍之封則南唐也見前復有廣唐北唐之類冒其名耳髙唐齊邑今齊之章邱則故髙唐闞駰云漢縣平原郡南五十宋髙唐縣開皇以博有髙唐改為章巫髙唐故城在齊之禹城南五十昔夙沙衛以髙唐叛後使盻子治髙唐地者堯之子十其長考監明先死而不得立故堯有煞長之誣監明之嗣式封于劉其後有劉纍事存漢紀唐表云陶唐子孫生子有文在手曰劉纍按左傳有文在手曰劉朱又不肖肖克也禮云簡不肖謂不似其父母非而弗獲嗣然亦弗絶於世其代之封者可得而知矣有虞氏後虞三帝先世所封河東虞阪所謂嬪于虞者今解之虞鄉一曰吳在虞城北十三志云平陸吳山上有虞城舜始封是故虞城在陜之平陸東北六十穆天子登薄山置軨之隥宿于虞是也薄山即首山預在河東太陽陜之夏縣有太陽故門樂史以為安邑忞同故武德為虞州元年乃都也媯六本作溈因水嬴也媯同見説文古書賈昌朝音辨柱所都蒲阪今之河東有溈水徑首山下復一水曰汭溈南汭北西注河河東舜廟記云二泉在首山東北山中寰宇記出河東縣南三十首山南流溈北流汭孔安國馬季長吕忱王肅杜預皇甫謐以為溈水之曲非也有帝廟宇文護造然潘城饒汭皆有媯名並見下而泗水亦有媯亭媯亭山在兖之泗水源陶虛乃謝息所遷桃虛也長沙有媯水皆有祠去都逺矣又安息去代二萬千五百亦有媯水商義鈞國今商之商洛漢商縣有堯女墓盛𢎞之云武關西北百二十商城是緡季釐國見山海經今濟之金鄉詳少昊後國虞公爵虞思國少康所依商均後寰宇記後為少康邑非宋之虞城漢虞縣伯禹所封即有虞哀元君專於樂臣爭於權民盡於利而亡圭鄭穆妃圭媯國後為邽秦武公伐邽縣之者武公十年伐邽戎置下邽今華隂有下邽天水有上邽故城在成紀有邽山胡古胡子國歸姓范史汝隂本胡國汝隂今頴治西二里有胡故城九域志開封有陳胡公廟胡公媯姓而盟會圖胡在豫之郾城此姬姓胡楚所滅之昭二十三年越世家云折酈宗胡索隱宗胡邑也為胡姓之宗負負黍世紀舜遷于負黍按少室一曰黍室負黍城在其南定六年之負黍也杜云陽城西南有負黍亭今在登封遂虞後商人置之遂見風俗通杜云商封虞邑璠云在蛇丘東北十里字書作隧今兖之龔丘有蛇丘城西北十里有隧鄉漢隧縣齊滅之莊十三年廬國故楚地今襄之宜城漢中廬春秋時廬子􅀈黎者縣北有漢黎丘城應氏謂在廬江非郡國志寰宇記應劭廬江故廬子國故通典以為廬州蓋古廬廬亦或通言故廬潘辨載籍無廬國而左傳廬戎亦曰廬在宣城西山中劭以後因以廬江為廬戎國蒲蒲衣之故國河中之河東西二里蒲津關也寰宇記為子路問津之所而又以為開封長垣西南之蒲城又以為在黃城山亦自不一今長垣東北十故蒲城有子路祠即蒲邑秦昭襄之蒲子四年後周唐為蒲州亦祁之蒲隂中山記蒲隂昌安郭東有舜氏昔泉及舜二妃祠寰宇記同之邰陽有故蒲城衛郡國志云東郡衛公國姚姓本觀國也有河牧城亦見水經今鎮之靈夀西北潘故縣屬上谷左傳潘獲潘子者本北燕州貞觀改曰媯州今媯之懷戎亦曰媯虛魏土地記下雒城西南故潘城也饒今之西城有姚方媯虛世紀謂之姚虛佑云本曰饒汭有舜祠或謂舜生於此世本云媯虛在西城西舜居而頴容釋例亦謂舜居西城西本曰媯汭非也傅河東商滅之鄒桑欽水經云濕水徑鄒平故城酈元云古鄒侯國舜後姚姓今在濟南息今新息楚文妃息媯國後周之息州隨志周于新息置息州大業中廢集古録有息州刺史梁洋碑非姬姓之息杜以為姬姓非也按字書鄎齊附庸今齊南郡母胡母衛地在曹衛之間田世家伐衛取母者田氏取之以封胡之支子逺本胡公為胡母氏春秋舊圖云母邑在曹衛間漢劉楚為胡母侯屬泰山轅袁齊之禹城西有故轅城寰宇記作瑗池禹城南百里哀十年趙鞅取轅宜非此漢有袁良食遺鄉按良碑云滿為陳侯至陳濤塗以宅立姓曰袁漢有關內侯良食遺鄉餘姚風土記云舜支庶所封今縣𨽻會稽在餘姚山之西以河東有姚故曰餘姚武德為姚州上虞今縣𨽻會稽拒餘姚七十酈道元所謂虞濱西三十有虞山以有宋之虞曰上虞上虞故城則在餘姚太康地記謂帝避丹朱于此故縣北有百官橋一曰舜橋郡國志云禹與諸儒會事于此相虞樂而名尤妄西虞齊桓公收西虞者餘虞即虞吳今長興東北四十二有餘虞浦陽羡之東鄉周處云諸漁浦一名餘吳溪舜虞時人化之徠居故記每作餘漁非也巴陵古巴丘今嶽州有黃陵舜妃登北氏墓詳路史舜冢辨長沙今嶽之沂江潭之益陽梁之重華縣有重華城一號虞帝城記為帝都非濮帝子散封者今濮州有歷山靁澤故衛有曲濮定八城濮桓十二宛濮僖十八濮水在曹之南華莊子釣處箕四箕子之先箕伯之封小國也春秋猶有箕崇之國姓纂云商之圻內今太原晉敗狄于箕者僖三十三預謂太原陽邑有箕城是陽邑隨之大谷後為骨打都今遼之榆社東南三十古箕城在遼山又地形志與琅邪漢箕國屬琅邪宣帝封城陽荒之子文為箕侯今莒縣有箕山益都青之益都有箕山襄邑異石勒破州郡必柬衣冠號君子城其平幽州擢荀綽等還襄邑今訛為箕子城矣朝鮮箕子後封遼之樂浪今平之盧龍有朝鮮城故武德以遼為箕州八年而髙麗亦其地鮮于箕子之支子仲國顔真卿云武王封之鮮子仲食邑於于一云朝鮮後入海者為鮮國直直柄國昭二十三年直人周地溈長沙縣有溈水水經云東入臨湘陳媯滿之封本商侯武王伐而封之今陳治宛丘苑城城記云胡公所築楚初滅陳項襄後都之昭八漢初淮陽國章和為陳國二年後魏為陳郡隨為州陸畨邾國也漢縣屬魯國今滕縣移蕃城中去古滕二十里一作鄱邰音皮白褒魯國記云陳子遊為魯相太尉陳畨子也國人為諱改曰皮罕羌燒當後有庳象國今道州孟子作鼻象城漢縣屬巨鹿今趙之臨城昭慶鎮西北古象城趙記舜弟象居九域圖經同故仁夀以廣阿為象城樂史引左傳舜弟所封二國附君必不道而後國不祥國不祥而後國幾亡陳殺泄冶宣九年明年而夏舒弒其君十年夏舒弒其君而後楚入陳十一年楚莊殺夏舒陳招殺世子昭八年春未幾而陳侯卒陳侯卒而後楚滅陳十月楚靈殺昭楚莊欲縣陳已而復之故楚靈滅之凡四十八年楚靈滅陳已而陳吳復歸昭十三年故楚惠復滅之哀十七凡五十二年凡楚三滅陳矣昭八年滅陳九年書陳災劉向謂已滅而猶書陳者不與楚滅中國蓋不知暫滅而猶存也前書叔弓會楚子于陳見楚子已在陳繼書陳災所以災楚且存滅國若陳之未滅者傳言禆竈謂災五年當復封封五十三年而遂亡亦左氏之妄方其欲縣陳也以申叔時之一言復之既而納其致亂之二臣故聖人書曰納公寧儀行父于陳夫復人之國而乃納其致亂之臣則是制人之國而使之不得其君臣之道也昔者晉人以幣如鄭駉駟乞之立者子産辭曰以寡君之二三臣而晉國之大夫專制其位是晉之縣鄙也何國之為辭之幣而報之晉人舍之四國有王它國非所當與也今也納其致亂之臣則是私利之而制之國矣存亡繼絶顧若是耶納者莫之受而強焉者也然則為楚也如之何豬夏舒之宫封泄冶之墓施孔寧儀行父于朝而後謀諸宛丘耆德定其君而去其誰不可何至納其致亂之臣哉經明先煞夏舒而後入陳左氏煞之在入陳後非也太史公曰舜重瞳子項羽亦重瞳子豈其苗裔耶何其興之暴也朝鮮罕羌固亦聖後然有虞氏之明德不以天下私其子而傳禹彼區區之爭殘者其何以承之哉方楚滅陳史趙曰盛德必百世祀虞之世數未也陳氏得政于齊而後陳卒亡田氏之取論者猶以為虞帝之羞而况彼之爭殘者乎夏后氏後駱􅕐父之國王符云駱慶姓今京兆宜壽有駱關駱谷故盩厔地崇􅕐國伯爵昔文王伐崇命無殺人民壞宫室崇人歸之如父母而趙穿且侵崇宣元今永興鄠東故酆宫是鄠扈也故扈一曰崇扈虹堯封之命縣𨽻宿輿地志云堯時禹為夏伯邑于此有廟九域志同張耒南遷録云當作紅以為紅陽侯國訛為虹誤髙密今洛之密縣然髙密縣乃𨽻密陽翟櫟也今許之陽翟縣本曰夏故後曰有夏本此世紀云夏今陽翟是也夏今陜之夏縣唐𨽻絳周成王封夏公在此本侯爵莊辛云堯時漢安邑之地故安邑城在夏縣北十五蓋冒陽翟之名辛帝支子封韻或云辛之轉非也一作騂􅢲姺也今陳留有辛城辛虛周語作莘墟地記莘城辛之轉長子紂太史辛申國今潞之長子縣紀年之尚子也梁惠成十二年鄭取屯留尚子西翟辛繇靡之子周封之觀后啓五庶俱封于衛是為五觀外傳云啓有觀注太康弟封夏襄滅之潛夫論水經云兄弟五人是為五觀故頓丘杜預觀國夏同姓在頓丘頓丘今熙寧省入清豐澶之觀城陳氏禮論觀為姚姓誤寰宇記古頓丘縣在清豐東南十五後移澶河決之地平準書河決觀元和志云觀城漢之觀縣古之觀國後漢為魏田縣漢之畔觀故屬趙竹紀年梁惠成二年齊田壽帥師伐趙圍觀觀降記志皆以為灌説者又謂斟灌俱繆諸斟接爾扈觀扈二國昭元滎陽武原西北有扈城扈亭莊二十三故卷縣地後齊省入洛陽汲紀年晉出公三十二年河絶于扈者非己姓之扈莘八笙姒姓世本文王妃母家今同之夏陽漢郃陽有太姒冢城祠廟詩云纘汝維莘在洽之陽十道志在同之河西河西即郃陽郡國志云郃陽南二十有城古莘國昔散宜生求有莘氏美女獻紂周代有神降之本虢地陜石鎮西十五莘原也在陜州陜縣然大名之莘縣有莘亭桓十六衛盜待諸莘廣記莘縣為殺伋處京相云平陽陽平北十里有莘亭伋壽沒焉亦國也隨為莘州而齊成二從齊師于莘即宣十八年笙也注魯境外此齊地杜例博州武壯西北有故莘城蔡莊十八荆縣蔡師于莘乃蔡地濟隂元和志古莘仲國濟隂縣東南三十古莘國伊摯耕處管城史伯云厯莘昭云國在管城有莘城陳留俱用莘字作兟甡姺􅀈同集辟巢鄧仲康子國楚之北境史云阻之以鄧林者今之南陽故杜佑以鄧為禹都綸少康居虞邑今宋之虞城西三十五有綸城秦楚伐鄭圍綸氏者汲紀年三山海經狂水徑綸氏城注在陽城然漢綸氏故城在今登封西南盟會圖疏云虞邑在洛之嵩陽漢輪縣屬潁川十道志臨武縣夏之綸邑魏孝文于綸氏置潁陽縣故寰宇記潁陽夏之綸邑博物志以汾隂為古綸今汾隂北九汾隂城繒二子爵昭公取鄫也曲列國一曰繒衍今沂之承縣東八十故繒城莒滅之襄六漢繒國屬東海開皇為鄫州大業廢武德四復置非鄭鄫按滎陽有鄫水城有鄫水水經云出鄫城西北雞絡塢下入洧乃溱也襄元年次鄫者城在拱之襄邑東南越季扞國姒姓􅀢也一曰於越杜云發語聲王會解有於越墨子遊公尚過於越蘇軾云於嘆聲繆矣處埤中號無餘今會稽越州治謂之句踐城與南越異越絶書云句踐小城山隂是爵不過子會稽王會解有會稽或云即越蓋自一國姑越今處州通典云本甌越之地姑蔑一曰姑妹大末也晉之龍丘今衢之龍遊有姑蔑城在縠水南三里東門臨薄溪昔彌庸見姑蔑之掑者漢之大末即東陽之太蔑縣而瑕丘其析也隱元年盟邾之處今兗之瑕丘有姑蔑城于越越之别漢書荀子吕覽明作于昭云是餘于今𨽻饒漢之餘汗杜佑謂句踐之西界所謂于越淮南云越人有變必先守餘于者韻作邘為盂音非董逌以為亐云即于越因杜以於為發語爾漢音云南方越名誤句餘周書有句餘蓋句越也亢倉子言句越之幹者山經有句餘之山郭云在句章之北餘姚之南取二縣以名不然甌餘今烏程東二十有歐餘山一曰烏山一曰甌亭山以王逸少升之曰升山顧余輿地志漢文封東海搖之子期視為顧余侯侯今升山東十八有西余山閩越海內南經云閩在海中許説文云閩越蛇種郭氏以為西甌今建安非鬱林乃今福之閩縣即東冶亡諸之封冶後分為會稽故冶城今在永嘉亦曰西越郡國志西越建安郡東甌永寧郡今福州南九里南臺江有亡諸釣龍臺州南二百步越王山乃亡諸舊城中有越王井其中金雞有聞之者有閩山在州南一里二百步有五姓黃林等是或云東越者非開元録云閩川越地即古東甌今建州亦其地皆蛇種有五姓謂黃林等是其裔無諸封閩越王乃秦之閩中或云即東越非也建元三年閩越發兵擊東甌六年擊南越不得為一黃林餘不烏程有餘不鄉扶鳩切今湖之德清東百步武康東二十四里有餘不溪溪水絶清與餘溪不類晉孔愈放龜於此榆餘不亭侯沈氏家傳後漢沈戎居烏程餘不溪姑於見王會解説云顧見下然在漢世一云姑熟於孰音轉也海陽見王會解漢之揭陽亡餘復封是今潮之海陽縣潮舊謂南越地二越之間爾琅邪漢縣故城在密之諸城東句踐圖霸徙此起觀臺山上徙三萬户于下秣陵上元西南七里有故越城越絶書云東甌越王所立元王四年范蠡築寰宇記在今瓦官門東南曹氏記云在秣陵西十五句踐平吳戍之而築去建康宫八里東甌王搖王東甌今溫之永嘉也郡國志云永嘉為東甌漢之治縣有甌水永嘉記甌水出永寧山郭氏以臨海永寧為東甌有東甌王都城有亭積石為道今猶在故章安之東甌鄉也地有回浦浦東乃漢侯官都尉理閩越王東甌告急遣嚴助救之未至止東甌為徙國於江淮間而遺人漸出乃以東甌地為回浦光武以回浦為章安東越越之分封顧余者號東越郡國志云婺州正得東越之地越漚四方令越漚在正東越之分或云即甌人漚歐甌區通句章故城在明之鄞縣西圖經鄮縣東有甬東及句章故城郡國志句章本是華平山甬東甬史記句踐平吳徙夫差於甬東韋昭云甬東即句章東溪口外洲句踐都即哀二十二年之甬也預云甬東乃句章東海中洲窮地也甌人王會解云甌人鱓蛇鮀字注云東越甌人海內南經甌居海中注岐海今臨海永寧縣即云東甌甌鄧諸暨秦縣界有諸山暨浦元常之都武城隨寰宇圖云夏禹七代孫芒封公子武于此建國今具之武城北十里有故城沒鹿經之無勿説之而有經之直勿煩之而紆魯僖公十九年夏六月宋公曹人邾人會于曹南鄫子會盟于邾己酉邾人執鄫子用之會盟者彼自為盟而已往會之也用之者亦猶易之用牲云爾或以饗或用享所不得而知矣聖人惡其詳而書之曰用則其惡己具矣焉用究然執鄫子固邾人而左氏者乃以為宋公使邾文公執而用之次睢之社説者復有叩鼻血社之説蓋因上文曹南之會相屬而為之言兹大妄矣夫經文之曹南乃别自一會也于時雖有邾人而非文公其會盟于邾也乃是邾國自為盟事而鄫子往參之鄫子參之因以見執非復向者曹南之會也曹南者曹之南而邾者直邾國也若以同為曹南則經之書必曰如會不得云會盟于邾矣即按曹南在濟隂東二十里邾在東濟任城南二十里西南去曹三百一十次睢在宋城南其東北一百八十至單又一百八十而至濟其西北至曹南二百八十道路越絶不知何為而有是説且曹南之會實非為盟亦何得謂之會盟而辨疑更以謂用為牲而歃之以盟不知鄫子已用則復誰與盟耶以為盟曹南之人則非惟壤隔而己酉後曹南抑又逺矣宋公亦當代之盟主也而今為會乃遽制使邾子執用鄫君則罪正在宋不在邾矣春秋胡得越宋而理邾哉設以宋公果使邾子執鄫君而用之則春秋必曰宋公使邾子執鄫子莫用之宋公主使國君戕一國君理無不書不書宋公是宋公未嘗使邾人執鄫子書邾人執鄫子見執鄫子者乃邾人宋無豫也夫以季姬之使鄫子徠朝猶切書之况使他國之君執國君而賊之乎果以宋君使之則宣之十八年邾人之戕鄫子又誰使邪昭公十一年四月丁巳楚子虔誘蔡侯般殺之于申冬十有一月丁酉楚師滅蔡執蔡世子友以歸用之時之月之日且地之又名其二君曰誘曰殺曰執曰滅曰用其辭之曲盡如此宋果使邾度得而不書乎蔡友之用左氏以為用祭岡山而公羊則以為用其頭以築深戒小人之不能順事者果聖意乎然春秋之諸侯死不以其道名鄫子不名其所以放乎死惟自取也季姬許嫁邾鄫子請強委禽焉既歸邾矣而鄫子者復往而參其會其取死者固非以其道也胡文定云用為臣僕用為臣僕固不足乎書也巢二南巢氏桀之封秦為居巢亦作鄛羽傳范增居鄛人今無為之屬鄛縣也古巢伯國見書亦為子入楚為巢公吳滅之昭二十四寰宇記楚滅非既為羣舒邑故楚圍之故巢城在皖北六東同安志巢城在桐城寰宇記在縣南六十五號古重城城有三重南北川澤左右陂湖故有夏水合肥巢胡云居巢陷者九域志謂之焦吳志作勦同吕交切非衛巢杜云吳楚間小國是左云楚邑邑無書滅把定姒國商封之今汴之雍丘有古把城武德初為把州又開皇初杞州今滑之白馬僖十四遷緣陵邵謂營陵地志云北海營陵亦謂營丘唐省入北海今維治有禹廟後復遷淳于今髙密瓚云即緣陵文公遷之桓六淳于公亡貞定二十四楚滅之微不紀公羊僖十四莒滅之古作衛宏説婁五婁樓牟樓也本作僂商所封即牟婁隱四莒伐杞取之者曹東之地一曰無婁密之諸城有婁鄉牟夷國也説謂封把而號東樓繆東樓與晉婁穰䣚異僖二十四傳婁晉地而南陽穰鄉乃婁也漢祖云婁者劉也故吳疁縣漢改為婁姑蘇疁門後亦為婁陽即陽樊在濟源晉文公曰陽夏商之典祀樊仲之官守焉者沛泊見潛夫論或云即鮑然自有鮑弗費􅞣費也一作􅞣扶味切今河南緱氏滑都也與魯費異魯費音祕陸氏一之誤姓纂有􅞣氏别為􅞣並音非也玉篇以􅞣為季氏之鄪亦非冥鄍二鄍也陜之平陸東北二十有鄍城冀伐之者後為虞氏邑又哀六有冥陳地與哀十九越冥異褒二夏有褒君褒姒祖也盟會圖云梁州褒城縣漢之褒中義熙之苞中有褒水褒谷褒國故城為褒水所壞寰宇記褒中古褒國都尉理在興元西三十三樵謂蔡之褒信沈寢沈姒國子爵蔡滅之定四潁之沈丘縣亦謂之寢楚地叔敖之封在縣南百步隋為沈州男南世本之有男氏潛夫作南周書之有南也二臣勢均爭權而分楚地記云漢江之北為南陽漢江之南為南郡者是肜商有肜伯地即肜城鬻齊公子荼毋鬻姒國昭二十六鮑四齊之歷城歷下城東三十四有鮑城三齊記鮑叔牙之食邑而漁陽有鮑丘之水潞水也亳之城父亦有鮑溪水非舒鮑流黃辛姓在三巴之東山海經云廣三百里亦見鴻烈等書葷育熏粥也後為玁允胸奴大夏後為黨項宕昌白狼羌書云成湯放桀于南巢即據典牒成湯放桀芮伯命巢蓋建之也辭曰放為放象放兜顧有以處之矣雖然尹放太甲晉放其大夫胥甲父于衛蔡放其大夫公孫獵于吳哀三楚執陳公子招放之于越昭八穀梁子曰放猶屏也豈建之云乎曰不然辭固有同而辨然則桀非不仁歟曰桀雖不仁君也湯雖仁臣也以臣而建其君置其天下之大而小之一國非放而何哉太史公曰禹之後分封以國為氏然自有扈氏斟尋氏斟氏戈氏則失之矣扈出昆吾斟戈出于己姓蓋由世史誤以己為姒爾非其後云商氏後亳五湯都南亳今南京穀熟髙辛之都與葛鄰葛今寧陵葛鄉亳有五一在杜南先世之居長安杜南有亳亭有激水一偃師西亳屬西京或以此為湯都蓋以詩言商邑四方之極誤之偃師去葛八百亳衆安能往耕而童子餽食哉水注梁國二亳是矣而考城為北亳屬開封後𨽻拱景亳薄是漢薄縣𨽻山陽有景山亳城湯亭宋宗廟墓所九域志景山在澶湯受命都之古亳城在考城東北五十三有陽葬亦有溵水盤庚徙治一鄭地襄十一盟處而譙弗豫亳縣本濟隂故亳今亳州譙郡近南亳南北亳亦皆曰商後代襲威名或以實三亳阪尹者妄謂南西北亳或以考城為南亳安陽為北亳穎逹不能辨杜謂景亳乃周地故今鞏縣西南湯亭亭而降之垣有景原記為湯誓師處按三阪則東成臯南轘轅西降谷分亳民于此三所爾郼殷也讀如衣見吕春秋蓋本杜亳契都故不韋曰湯嘗約于郼薄十八然考城榖熟安陽俱有殷名榖熟湯都古之商丘昭相土之居所謂從先王居殷者亳之內地鄭云始于亳之殷地劉恕以為盤庚始號非也云始號曰殷已前皆追號囂敖仲丁居敖也在陳留浚儀秦之敖倉今鄭之滎澤西十五有敖土有敖城穆傳囂氏之隧即詩薄狩于敖者字書隞猥相二元和志內黃東南十三故殷城亶甲居寰宇同今相州有畿城商亭亶甲故城在安陽西北五里寰宇安陽為紂都亶甲冢在城外西北隅洹水南岸元豐七年水毁民夷之有銅器冶之又有黃堆者后墓魏始名州後魏書道武幸鄴訪立州名崔先取亶甲居名之非鄭相昭元年相鄭也庇祖乙勝即居之紀年沃甲祖丁因居之奄二南庚更自庇遷奄紀年後陽甲居之商奄也晉志奄商奄二國奄君附祿父周公踐伐之伏書周公三年踐奄奄君勸祿父叛也世皆以為魯奄然與祿父封相逺或此是耿邢今河中龍門故皮氏東有耿鄉城為河所毁晉滅耿賜趙夙者開皇之耿州十六年改定陽為耿州以州南祖乙城今慈州若隰之吉鄉即為邢故通典云祖乙遷邢佳韻邢音耿通史記云先耿後邢正義從之失之蒙紀年盤庚旬自奄遷于北冢曰殷虛北冢蒙字爾即景亳湯都今亳之蒙城漢之山桑屬沛後漢屬汝南天寶二改縣北八十有南北二蒙城魏孝文築相拒四十步光武幸處今宋城南十五小蒙故城六國之蒙縣復有大蒙城縣北四十一里或云河北非也地形志北梁有北蒙城索隱殷虛南去鄴三十是殷虛南地舊曰北冢夫亶甲祖乙居河北不利盤庚涉河以民遷矣豈復在河北邪沫武丁遷之在朝歌故城南詩沫之鄉者近紂都水經紂都在冀州大陸之野北殷庚丁徙河北號北殷地即殷虛在相之安陽西有激水北去朝歌百三十里南去鄴三十史項羽傳洹水南殷虛是河北地有殷城述征記河內懷有殷城元和志在武涉東南十里司馬邛都按紀年秦伐鄭次于懷城殷殷城久矣晉之殷州劉聰以郭默為殷州刺史建中復為溵州二年以陳之溵水置真元二廢元和十二復立故史商後有北殷氏或云北冢朝歌武乙徙之世紀今衛之黎陽衛鎮西二十二有朝歌城唐衛縣今通利軍黎陽故東離城紂搜處有鹿臺衛西二十大三里髙千仭七年城沙丘臺紂自朝歌北築之今沙丘在巨鹿東七十故衛北四十寰宇記平鄉東北二十稱妲己臺莽曰雅歌寰宇酒池糟丘斫涉處並在衛縣冀圖經丘池故朝歌南一里巨橋倉在洛之曲周即邸閻城大陸牧野衛之汲輿地廣記故商都牧野之邑寰宇記汲近郊三十商之王蓋屢遷矣書自契至成湯八遷湯始居亳盤庚五遷八遷自湯之前而五遷在盤庚之前故班固曰商今屢遷前八後五蓋十三也自盤庚至紂蓋復五遷世不知矣盤庚遷蒙北武丁遷沫自沫徂亳居庚丁徙河武乙丁徙朝歌至紂之八遷之可考者六契居番昭明居砥石復遷于商相土處商丘上甲居鄴而湯居亳此世所謂不可得而知者至于五遷則囂相庇奄耿也庇奄書所不載而世儒輒以湯盤庚之兩都足之已失之矣而或者更以五遷俱出盤庚尤為妄亂夫盤庚之遷本于洪水都國墊溺為之是豈得已而不已者哉益六四曰中行告公從利用為依遷國勢或不利固有不得而不然者盤庚之告民曰先王不恆厥邑于今五邦是則所謂五遷者非指盤庚而今之遷為有所不得已矣且其遷也涉河南渡而説者猶以為盤庚之遷在于河北儒學荒踈之惑世也如此鄭云祖乙去朝居耿為水所圯修德禦之不復徙其後奢侈逾禮土地迫近山川圯焉至陽甲立盤庚為臣乃謀徙湯舊都民居耿久奢侈成俗故不樂徙王肅云自祖乙五世至盤庚元見陽甲宫室侈奢下民邑居墊壞水泉瀉鹵不可行政教故徙都殷士安亦云自祖辛來民皆奢侈故盤庚遷殷云我民用蕩析離居事可見矣穎達以為久居水變非必奢侈也以盤庚名篇則鄭云為臣之時事宜有據豫記國名而商氏之都不一學者不之能悉庸復著之應氏地里風俗傳曰河內殷國也周名曰南陽故相州圖經云安陽紂都也在淇洹之間所謂北冡戰國策言紂兵左飲淇右飲洹者束晳謂盤庚遷處正義以為盤庚後餘王遷之烏呼商之屢遷亦可謂不幸矣貧氓月徙閼窶士日更名其與庸王之嫚為政而嵗遷都年改號者何異自湯至于盤庚將二十世都始五遷而民胥怨不安方且誥諭大臣諸侯惟恐或怫豈將以其勢毆哉鄉非北都圯廢則劫之以愛子吾知盤庚之不遷矣太室三塗洞庭盟門天下之險而國之者不一姓是地利固不足恃也然則為國者必有道矣奚至朝河而莫隴哉春秋之書以國遷者凡七邢衛蔡各居一而許處其四悉譏其輕動而不能自反也然則為國者亦必有道矣弼鄁武庚之封漕是一作漕今滑之白馬有鄁水即妹之邦紂所城一作㔨晉有㔨督霍叔尹之見詩譜邶霍叔尹之鄘管叔尹之衛蔡叔尹之曰三監孔氏以管蔡商為三監霍有不預班固從之非也武庚得為監以蔡仲之命考之鄭為是武庚之封乃紂之都在邶境也東衛南鄘北邶邶鄘亡於春秋前故有詩樵云中衛南鄘東邶伯邶云南邶東鄘北衛俱非史周公誅三監盡以其地封康叔譜謂庸叔子孫強兼二國亦妄邶詩言亦從其流則在北也鄘楚丘城是今衛之汲東北十三有故鄘城新鄉鎮西南三十二或云楚丘城在澶之衛南西北七里有鄘水出宜蘇山其後東徙野處漕邑而云在彼中河則衛東矣衛曰曹曰衛以在畿域分曹遮衛馮翊扶風之義也三國以淇為分鄘云送我于淇衛云送子涉淇而邶云亦流于淇地俗異也蘇文忠曰武王非聖人也夫手鉞其君而國其子使三叔監之是豈得已邪使武庚而非人也則必不叛假二叔憃而非親也亦豈至于助逆乃一亟而悉誅之子瞻之言劉知幾之説也鄭厚本此而學者誹之知幾曰武庚合謀二叔徇節三監君親之怨不忘臣子之心可察稽之名教生死無慙而論者以其無成即以頑民為目若少康子胥不幸而敗則亦肆迹醜徒竄名逆息邪武庚紂之長子也武王又己國之而大誥乃曰殷小腆誕敢紀其序曰豫復則庚之事可知矣詎可以此為之罪哉或以春秋之法君弒而賊不討則深責其國之無臣子論庚尤非類方武王之誅紂也三年毆蜚亷于海隅而僇之滅國者五十此皆助紂者也紂雖不善然猶有助國與若林之旅如此而乃死之南單之臺而分天之明知微子之賢不立乃貪于武庚之不肖而立之復疑于此而以三叔監之是誠何心哉夫以洶洶之商而輔之以三憃此武王之失策也鄉使克商之後舍武庚求微子以世祀雖無三監吾知商人之不反矣立微子于商退即諸臣之位以聽天命之所屬彼天下之勢既一去而不可反人心已離而不可挽則雖以玄德之賢決不能挾區區之商以令我夫然後之中國踐金戺而朝諸侯俾天下後世知吾心之不利商則雖三聖之授受不是過矣惜乎武王之志荒也書曰武王勝商殺紂淮南子云武王殺紂于宣室或曰殺紂非周人荀子云武王伐紂選馬而進厭旦散之而紂卒易鄉遂乘商人而進誅紂是以為商人殺之是聖人不信也不知乘商人者誰歟乃周人也易鄉者前徒之攻于後者也荀子曰武王誅紂斷其首懸之赤斾周人尚赤所謂大赤太史徒尼書言右秉白旄因謂懸之太白爾孔氏欲明武王不殺紂謂紂之自焚也史遷本紀謂武王以戎車馳商師商師大崩帝辛奔內登廩臺屏遮自燔于火武王手太白麾諸侯進拜王揖之入王所射之三發下車擊以輕劒折之懸之太白其事本見汲書故頴達以為死而斬之且死而斬之則生必不釋之矣殷紂有三説或曰罪浮于桀或曰不共戴天或曰紂多智不殺則必有扶之以叛如武庚者尸子云武王親射惡來之目斬商紂之頭手汙于血當此之時猶猛獸者湯不殺桀也故邵雍云下放一等則至于殺其説如是君子曰武未盡善又曰義士猶或誹之謂之義士則不義有所尸矣或曰孔子殷人也于武王猶有憾然而居周也故于夷齊數致意焉曰否是無義無命也漢武帝時既封周子南君求殷之後絶不能祀丞相衡曰王者存二後所以尊先王通三統也其罪絶者更封他親以承其始今宋已失統宜立殷後非當繼宋乞以孔子世為湯後不幸事廢逮孝成時九江梅福更以為言始以諸經相明録其後世為殷紹嘉公微三郿子爵本扶風郃陽今岐之郿縣有郿鄉紂徙畿內則在聊城十道志今故城在潞東北寰宇記微子城在潞東北三十里九域志博州有微子城或云在魯今徐沛東南微山有微子冢非也亦曰郿莊築郿公羊作微杜云魯下邑璠云微子國東平夀張西北三十有微鄉宋古商邱火正遏伯之虛相土因之漢睢陽隨為宋城今南京治縣西南十二有微子冢廟五隕石目夷今徐之滕東有目夷亭木門今滄之清池西北四十六有木門故城衛鱄所託襄二十七奔晉託于木門輿地志云中有大木因名桐門樂大心采不其今祕之即墨西有漢不其故城祝其今海之懷仁故祝其也長勺宋之汋陵城今在寧陵東南二十五後𨽻魯坎氏宋附庸英賢録鞏縣東坎􅀢聚服云鞏東邑向二許之長社東北有向城向岡向鄉鄭地襄十一師于向一云尉氏西五十向城鍾今亳之臨渙漢之鍾縣鍾離州犂采楚地樂氏鄭地津名襄二十六華華子國鄭十邑有華酁皇瑗之子般邑酁曰酁般戴災災也博雅䅔析也或作戴􅲍􅯦災今拱之考城有故戴城考城今𨽻開封初併于鄭隱十鄭伐取之劉傳云附庸故曰取楚滅宋曰榖廣記秦謂之榖漢之災縣應氏災戴聲近故詩箋以俶戴為熾災廣記云楚漢兵起邑多災而名妄章帝為考城東巡詔取光烈考之義隋為戴州有戴水國都城記考城西南有戴水今戴陂戴國褚昭二十六子段采共公子今洛縣南有褚氏亭褚氏聚合向氏邑向戍曰合左師郃也今同之郃陽徐史音郃陽國近龍川鞍向魋邑成二穀梁云去齊五百里防今單州有古西防城隱九取防杜云髙平昌邑西南有西防城漢西防縣城在單父北魯防臧氏邑郰襄四魯下邑今兖之魯孫預云魯縣東南垂城是樵未詳孔子之生處與孟軻之鄒異或作鄒非武王既勝商殺紂即武庚而立之夫弔其民誅其君而乃立其子獨不以其他日之將不利而廢之此周之至德也至于周公謖使管蔡二叔監商監之云者所以制止其沈湎淫奔之俗而納之道爾土地人民皆我之有固非利其國而欲之如宇文之于蕭氏也及武庚之作難三監淮夷並起應之當此之時周之事亦洶矣周公于是濯征龕伐至久而後克之兹宜深監武庚之事而乃更立商王之元子微子啓夫以微子之賢吾君之子而商人父師之顧乃使之代商後而邦之宋宋為故亳商之舊都民之被其澤者固未忘也使微子而非人少異其志則全商之地恪非周矣而成王周公方且晏然命之統承先王修其禮物不少為疑而宋之臣人卒以按堵非聖人之盛德能如是乎于以是知立國惟在于賢而不在于疑之多也秦漢而下不原仁義而徒汲汲以防虞天下為心豈不大可慙哉曼蔓􅀈鄭邑曼伯國昭十二鄭京櫟實殺曼伯為曼姓一作蔓玉符作曼鄤也成二集音瞞鄉在廣漢􅀈訛穆傳蔓伯一出集􅀈音吻鄉在廣漢又音萬作鄤鄧曼姓侯爵鄭莊娶鄧曼今襄之鄧城二漢鄧縣古鳯林也是為鄧林秦昭使左更錯伐楚取鄧置南陽郡十六年封公子悝今鄧故城在鄾城西北十餘里而蔡鄭盟處則蔡地乃今鄧州與鄧城接桓二年優鄧之分曼姓子爵鄾也寰宇記鄾子國巴人圍之哀十八楚並之傳云鄧之南鄙鄾人是已今鄧城有鄾城沔水之北光武言宛最強鄾次之者范謂安養有鄾聚是苑武丁子文封苑城為苑侯今鄧之南陽漢宛縣也為平去二聲非權今荆門當陽東南有權城臨權水口當陽古屬南郡楚武滅之遷之那處鬪緡尹焉非定之權今真定北二十有故權城古捷鄉也御襄二十二後為御叔之邑蕩御姓湯也潛夫作湯今相之湯隂漢蕩隂也桓王十六年秦寧公伐蕩氏取之陽御姓侯爵淮南子番鄱御姓鄱也史夫差取番者今饒之番陽漢之番陳勝傳番盜有番江今縣東有番故城錫御姓錫時子之先今均之鄖鄉有錫穴漢之中錫署御姓堂陽侯爵漢縣今在冀時郲春秋之時來鄭地子姓世本子姓有時氏蕭氏預以為滎陽之釐城璠云滎陽東四十釐城是荼䣝䣝也王符云皆殷氏舊姓郃陽䣝城是共恭恭也世族譜云附庸國今朝之共城文王侵阮徂恭者即共伯國漢之共縣共故城縣東百步非叔段邑詳略史發揮共和辨梅伯爵寰宇記云梅伯國九域志云殷伯紂所滅今譙南四十有故梅城河南密縣有梅山集韻音每稚史記商後有稚氏以國為姓定渭水有定城是郭述征云定城去潼關三十夫人定子世以為諡失之巢三鄛子姓一作鄛南陽棘陽有鄛鄉吳人伐巢克棘者有巢亭在襄邑南二十與衛巢異大叔疾處巢哀十一或云居巢非也郅同一作􅀈春秋地圖謂今同州為同國黎黎氏故國或黎山氏子姓國侯爵宣十五酆舒奪黎氏地後荀林父滅潞立黎侯而還一作玉篇文王所戡者與紂都接今潞城東十八有故黎侯城黎亭即黎陽故城一曰黎侯城水經黎陽故城在黎山東北班志上黨壺關東北有黎亭九域志亭在黎侯嶺上衛地故黎侯寓衛今通利之黎陽漢黎縣有黎陽山古今山川記云衛黎陽國也黎侯寓衛以中潞泥中二邑處之比沘比干國馬融鄭玄王肅云紂諸父今唐之北陽有沘水後魏為殷州而比干墓乃在偃師西北十五寰宇記在汲北十里有石銘云大夫比干之墓魏孝文弔之黎陽西北三十枉人山云比干殺于此而名止陽三山有廟在滑唐太宗諡太師又汾之西河縣北百二十有比干山九域志石州有比干山比干祠禱驗髦旄見世本一作旄姓書復姓有比旄重誤朸漢平原有朸縣音勒世本牞劉辟強為侯國者段段干也芮城東北十五有段干木墓髙三丈貞觀禁樵采瓦也衛地定八會處有亭在胙城杜云亭在東郡燕縣東北燕即今胙城非成紀之瓦亭也成紀有瓦亭水瓦亭山在秦之隴城東北二百鐡衛地哀二今衛州有鐡丘預云在戚地南七國並出世本萊子爵來也登之黃縣東南二十五故黃城是樂史云即萊子國古之萊夷今文登東北八十不夜城也元和志齊人遷之郳曰東萊漢故東萊郡昔晏弱城東陽川逼萊乃齊境上青之臨朐隨立萊州亦作郲宣七又襄七齊人以郲寄衛侯云時來鄧名世以為鄭之時來非萊蕪俱非萊蕪乃魯菜柞之地竇蘋云萊人流播邑落荒蕪而名妄萊蕪故城今淄非東南桐二桐鄉三空桐也世本云商後國宋之虞城南五里有桐亭故空桐地今尚曰空桐哀二十六景公卒大尹奉公以入空桐寰宇崆洞俗非桐鄉桐鄉有三一在舒城詳三皇時國一在扶溝即開封之桐本鄭地一曲沃西南聞喜西南八里桐有桐鄉故城隨圖經云俗以此城為桐宫皆云放太甲處按湯葬在今尸鄉乃放處在偃非此向五皇甫作都沛國之向漢屬龍亢今入穀孰西南五十有龍亢城附庸國世族譜非河內詳炎後尉氏西南五十見有向城沂承縣亦見尖後許之向襄十年向鄭地今許之長社有向鄉向岡沛徐也有沛氏商人六族有條氏徐氏王符云殷氏姓也繁二澶之清豐有繁淵繁陽故城而臨河有繁泉郡國志云繁陽城漢之外黃有繁陽亭通典城在內黃西北應云在繁水之陽漢強占為繁侯者亦音皤一在汝隂杜云繁陽亭在汝隂鮦陽南今穎州也施本嬉國紂伐有施有施以嬉進今施州樊慶姓潛夫今襄之鄧城有樊城鎮漢之樊縣有樊古城樊陂樊侯國也寰宇記樊陂在南陽西南南雍州記荆州圖副摯虞等皆以為仲山甫之封荆州圖云樊城仲山甫所封記志皆然詳泰伯後國樊村鎮在宜城皆其地魏孝文帥十萬攻樊城不下者曹虎鎮之齊書或云樊噲所食采薄姓書宋大夫食邑為氏飢條蓨是周亞夫封條今冀之蓨縣樂史云即條國晉改條桓二年晉地索鄭之索氏昭五年鄭勞叔向處故成皋東有大索城成皋開皇為汜水屬孟今鄭之滎陽有索水鮮虞續志云子姓國鮮虞子中山新市也有鮮虞故城白狄别居種最大晉伐之昭十五定四哀六今定之新樂通典漢盧奴故鮮虞縣後周鮮虞郡唐鎮州應氏地理記左人城西北四十左人亭鮮虞故邑左人即今定之唐縣姚春秋姚子國子姓或云蕭姓非蕭子姓附庸莊十二大心煞南宫牛始封為附庸本宋邑寰宇記周封子宋之别為庸后并為邑非也先為邑矣故有封人宋髙哀為蕭封人云任于附庸非楚滅之宣十二定王十今徐之蕭故漢縣屬沛北征記云城周十四里南臨沔水虞城梁丘楹書待子櫝硯貽孫有田祿思以貽其子孫人情所同然也是故諸侯有國以處其子孫大夫有采以處其子孫采者服事之稱也所謂亮采一作寀爾雅云尸寀也寀寮官也郭璞云官地為寀同官為寮義亦同采取以奉君子故亦用菜猶偹食菜字書又作􅀈集韻音菜云臣食邑俗內諸侯祿有采者也外諸侯嗣有國者也圻外之侯惟嫌紛變是故必世子而世祿圻內之侯入為王官必選賢德是故異於外侯有祿而不必世然有大功亦有采地以嗣其子所謂官有世功有官族者邑亦如之所以處子孫也書大傳曰古者諸侯始受封則有采地百里諸侯以三十里七十里諸侯以二十里五十里諸侯以十五里其後子孫雖有罪黜其采地不黜使其子孫賢者守之世世以祠其始受封之人此之謂興滅國繼絶世書曰兹豫大享于先王爾祖其從與享之此之謂也亦見韓詩外傳若古封建惟以其功德于民者則與民共封之所以繫民心也至于後嗣弗能遵守廢祀失國則民望于是絶故必興而繼之使歸心焉漢追何後魏録由世縱其不肖猶當十世宥以勸能者後世不知乎此見功臣之子孫有無功而受祿則思所以削而奪之而不知其乃祖乃父固嘗功于爾民功于我矣吾之有天下亦猶是也孟軻曰所謂故國者非謂有喬木之謂有世臣之謂也成季之勳宣孟之烈而訖無後則為善者懼矣韓厥云茍有先祀何廢二勳臧武仲云若子文而無後奚以勸善楚王官人以世雖紂之粃政然賞延于世者臯陶之訓仕者世祿亦文王所由興也所主惟賢豈其不必嗣歟句龍共工臯陶伯夷昭明伯益相土伊陟三五之時祿不免世春秋胡為􅏺世卿哉八元八凱世濟其美尹單甘劉代食厥地豈非繼世象賢則以興鮮克由禮者以亡而非縶于世不世乎公羊以為春秋訊世卿漢許伯張敞何休之徒每持此論非是詳官制中左氏説者知其不然故又云公卿大夫世祿而不世位父死子食其邑而不繼賢則復之烏戲以人情為天下則天下莫能破昔蘇軾論夏以為人之愛子天下之通義有得為而欲與其子孫人情之所皆然聖人以是為不可易也故從而聽之使之父子相繼而無相陵是封建之理也事情深盡今古無二然至海外之説乃大不然豈作以蚌異于蛤而二五之非十者乎宋景文傳宗室謂李百藥帝王之興自有天命歷祚之短長不緣封建為臆論及十一宗諸子之傳乃以為厯數短長自有底止漢七國晉八王不皆常得其效以此見其非好惡之不同特知識之未昭爾若蘇子者蓋亦習于百藥宗元衆楚之咻而未晰其致者歟土蕃設官父死子代非其種類汔不相伏屈茨之法國酋首領相承不絶他姓别系決不得而處之燕吳禪亂葉白爭滅古之君子豈顧自為膠擾而欲民之定哉明賢于斯亦有所決擇矣路史卷二十七
